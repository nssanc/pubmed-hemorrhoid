7 名患者的 19 项研究符合纳入标准（13 项病例系列研究 - 68% 和 6 项队列研究 - 32%）。患者中位年龄范围为 51 岁至 68 岁，其中 73.7% 为男性。大多数患者的 ASA 评分为 2 分（53.1%），BMI 范围为 21.1 至 28.6。肿瘤位置主要位于肛缘附近（中位：3-6 cm），最常见的临床分期是 cT3、cN1 和 cM0。手术并发症包括泌尿问题（22.6%）、吻合口漏（11.4%）、肠梗阻（10.4%）和出血（5.3%）。随访数据显示复发率为24.9%，1年生存率>90%。这些研究报告的总体并发症率为 49.7%，中位随访时间为 12-36 个月。尽管研究之间的生存数据存在显着差异，但肿瘤学结果良好。研究的异质性使得最终确定机器人 bTME 作为黄金标准的可行替代方案具有挑战性。需要进一步的前瞻性研究，具有可测量的结果和一致的术语，以确保同质性。", "keywords_zh": "肛门直肠癌、全直肠系膜切除之外、微创手术、盆腔廓清术、机器人手术", "keywords_en": "Anorectal cancer, Beyond total mesorectal excision, Minimally invasive surgery, Pelvic exenteration, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40670732/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 16 Jul 2025"}, {"id": "40665575", "title_en": "Haemorrhoidal artery ligation: Is Doppler guidance useful? A systematic review and meta-analysis of randomized controlled trials", "title_zh": "痔动脉结扎：多普勒引导有用吗？随机对照试验的系统回顾和荟萃分析", "authors": "Gaetano Gallo", "abstract_en": "**Aim:** Haemorrhoidal arterial ligation (HAL) with or without mucopexy (recto-anal repair, RAR) is a minimally invasive technique for the treatment of haemorrhoidal disease. It is still debated if it should be performed with Doppler guidance (DG-HAL) or without. The primary aim of this study was to find evidence that the use of Doppler guidance reduces the risk of recurrence. The secondary aim was to evaluate the benefit of Doppler guidance on postoperative complications.\n\n**Methods:** A comprehensive literature search was conducted according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines (2020). The population, intervention, comparison, outcomes and study design (PICOS) framework was used for eligibility criteria. Data were extracted independently by two reviewers for initial screening and for eligibility to be included in the meta-analysis of randomized controlled trials. Random effects meta-analysis, leave-one-out meta-analysis and meta-regression were performed to assess the main outcomes.\n\n**Results:** Seven randomized controlled trials, published between 2008 and 2023, were selected. They included 514 patients (mean age 49.13 years, 46% men) with different haemorrhoidal degrees. The HAL technique was performed in 255 patients and DG-HAL in 259 patients. The meta-analysis revealed that the DG-HAL procedure was associated with a significant risk of recurrence (P = 0.007) and similar postoperative pain (P = 0.623) compared to the HAL procedure. In a subgroup analysis of patients treated with a combined RAR procedure, no differences were found between the DG-HAL-RAR and HAL-RAR regarding the risk of recurrence (P = 0.36) and postoperative pain (P = 0.31).\n\n**Conclusion:** In conclusion, this meta-analysis did not find superiority of DG-HAL over HAL with or without RAR in reducing postoperative complications and recurrence.", "abstract_zh": "**Aim：** 痔动脉结扎 (HAL) 联合或不联合粘液固定术（直肠肛门修复术，RAR）是一种治疗痔疮疾病的微创技术。是否应该使用多普勒引导 (DG-HAL) 或不使用多普勒引导进行仍有争议。本研究的主要目的是寻找证据证明使用多普勒引导可降低复发风险。第二个目的是评估多普勒引导对术后并发症的益处。\n\n**方法：** 根据系统评价和荟萃分析的首选报告项目 (PRISMA) 指南 (2020) 进行了全面的文献检索。人口、干预、比较、结果和研究设计（PICOS）框架用于资格标准。数据由两名评审员独立提取，用于初步筛选和纳入随机对照试验荟萃分析的资格。进行随机效应荟萃分析、留一荟萃分析和荟萃回归来评估主要结果。\n\n**结果：** 选择了 2008 年至 2023 年间发表的七项随机对照试验。他们包括 514 名患有不同痔疮程度的患者（平均年龄 49.13 岁，46% 为男性）。 255 名患者接受了 HAL 技术，259 名患者接受了 DG-HAL 技术。荟萃分析显示，与 HAL 手术相比，DG-HAL 手术具有显着的复发风险 (P = 0.007) 和相似的术后疼痛 (P = 0.623)。在对联合 RAR 手术治疗的患者进行的亚组分析中，DG-HAL-RAR 和 HAL-RAR 在复发风险 (P = 0.36) 和术后疼痛 (P = 0.31) 方面没有发现差异。\n\n**结论：** 总之，这项荟萃分析没有发现 DG-HAL 在减少术后并发症和复发方面比有或没有 RAR 的 HAL 具有优越性。", "keywords_zh": "多普勒、痔疮、痔动脉结扎、痔血管化、粘液固定术", "keywords_en": "Doppler, haemorrhoid, haemorrhoidal artery ligation, haemorrhoidal vascularization, mucopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/40665575/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 16 Jul 2025"}, {"id": "40632066", "title_en": "Negative pressure wound therapy for colorectal incisions: a systematic review and meta-analysis of controlled trials", "title_zh": "结直肠切口负压伤口治疗：对照试验的系统评价和荟萃分析", "authors": "Chiehfeng Chen", "abstract_en": "**Objective:** Negative pressure wound therapy (NPWT) has demonstrated promising results in reducing surgical site infection (SSI) rates following orthopaedic, vascular, cardiothoracic, plastic and abdominal surgery. The literature on use of NPWT on colorectal incisions is growing, with several randomised controlled trials (RCTs); however, findings have been inconsistent. This review evaluated the effectiveness and safety of NPWT for colorectal incisions in elective and emergency surgery.\n\n**Method:** The Cochrane Central Register of Controlled Trials, PubMed, EMBASE, Cumulative Index to Nursing and Allied Health Literature, and ClinicalTrials.gov databases were searched for RCTs and non-RCTs comparing NPWT with standard of care.\n\n**Results:** A total of five RCTs and six non-RCTs were included (with a total number of patients 2193). NPWT significantly reduced the rate of infection in colorectal incisions (odds ratio (OR): 0.57; 95% confidence interval (CI): 0.41, 0.78; I<sup>2</sup>=14%; p<0.0005) and wound complications of the colorectal surgical incisions (OR: 0.33; 95% CI: 0.13, 0.88; I<sup>2</sup>=59%; p=0.03). NPWT also shortened the wound healing time by three days (mean difference: -2.98; 95% CI: -4.99, -0.97; I<sup>2</sup>=0%; p=0.004). Subgroup analysis revealed that NPWT conferred greater benefits on wounds resulting from life-threatening emergency surgery, and contaminated or dirty-infected wounds.\n\n**Conclusion:** The findings of this review showed that NPWT is an effective intervention for the closure of wounds in patients following colorectal surgery, and lead to a significant reduction in SSIs, overall wound complications, and mean complete wound healing time. It was particularly effective in emergency cases and in contaminated to dirty-infected wounds. Treatment options should be considered in terms of cost-benefits and adequate patient selection during shared decision-making.", "abstract_zh": "**目的：** 负压伤口治疗 (NPWT) 在降低骨科、血管、心胸、整形和腹部手术后手术部位感染 (SSI) 率方面已显示出良好的效果。关于在结直肠切口上使用 NPWT 的文献越来越多，其中有几项随机对照试验 (RCT)；然而，调查结果并不一致。本综述评估了 NPWT 在择期和急诊手术中结直肠切口的有效性和安全性。\n\n**Method：** 检索了 Cochrane 对照试验中央注册库、PubMed、EMBASE、护理和联合健康文献累积索引以及 ClinicalTrials.gov 数据库，以查找比较 NPWT 与标准护理的随机对照试验和非随机对照试验。\n\n**结果：** 共纳入 5 项随机对照试验和 6 项非随机对照试验（患者总数 2193 例）。 NPWT显着降低结直肠切口感染率（比值比（OR）：0.57；95%置信区间（CI）：0.41，0.78；I<sup>2</sup>=14%；p<0.0005）和结直肠手术切口伤口并发症（OR：0.33；95% CI：0.13，0.88；95% CI：0.13，0.88；p<0.0005）。 I<sup>2</sup>=59%；p=0.03）。 NPWT 还将伤口愈合时间缩短了三天（平均差：-2.98；95% CI：-4.99，-0.97；I<sup>2</sup>=0%；p=0.004）。亚组分析显示，NPWT 对危及生命的紧急手术造成的伤口以及污染或脏感染的伤口具有更大的益处。\n\n**结论：** 本次综述的结果表明，NPWT 是结直肠手术后患者伤口闭合的有效干预措施，可显着减少 SSI、总体伤口并发症和平均伤口完全愈合时间。它在紧急情况和污染到脏感染的伤口中特别有效。在共同决策过程中，应根据成本效益和充分的患者选择来考虑治疗方案。", "keywords_zh": "结直肠手术、荟萃分析、负压伤口治疗、手术切口、手术部位感染、系统评价、伤口、伤口护理、伤口敷料、伤口愈合", "keywords_en": "colorectal surgery, meta-analysis, negative pressure wound therapy, surgical incision, surgical site infection, systematic review, wound, wound care, wound dressing, wound healing", "link": "https://pubmed.ncbi.nlm.nih.gov/40632066/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 09 Jul 2025"}, {"id": "40624403", "title_en": "Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Azka Mustaan", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40624403/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Jul 2025"}, {"id": "40596934", "title_en": "Comparison of efficacy and safety between surgical and conservative treatments for hemorrhoids: a meta-analysis", "title_zh": "手术治疗和保守治疗痔疮的疗效和安全性比较：一项荟萃分析", "authors": "Xiaoqiang Jia", "abstract_en": "**Objectives:** Hemorrhoids, a common anorectal condition, can be managed through surgical or conservative treatments. The aim of this meta-analysis is to compare the efficacy and safety of surgical and conservative treatments for hemorrhoids.\n\n**Methods:** A systematic search was conducted from of PubMed, Embase, the Cochrane Library, and Web of Science from their inception to September 25, 2024. Eligible studies compared surgical treatments with non-invasive conservative treatments in hemorrhoids. Statistical analyses included pooled odds ratios (ORs) and mean differences (MDs)/standard mean differences (SMDs) with 95% confidence intervals (CIs).\n\n**Results:** Seven studies, including 760 patients, were analyzed. Surgery achieved higher rates of complete symptom resolution than conservative therapy (OR = 2.96, 95% CI: 1.66-5.28, p < 0.001). Overall pain scores favored surgery (SMD = -0.93, 95% CI: 1.73 to -0.13, p = 0.02). Subgroup analysis showed clear superiority within four days (SMD = -1.26, 95% CI -1.84 to -0.68) but parity beyond ten days (SMD = 0.00, 95% CI -0.44 to 0.44; p = 0.99). Comparable patterns were observed in pregnant women with thrombosed external hemorrhoids. Rates of postoperative bleeding (OR: 1.09; 95% CI: 0.42 to 2.82, p = 0.86; I2 = 41%, p = 0.15) and urinary retention (OR: 1.75; 95% CI: 0.30 to 10.31, p = 0.54; I2 = 45%, p = 0.18) did not differ significantly between groups. Surgical-specific adverse events were infrequent (incontinence 3%, persistent pain 5%, watery discharge 6%). Surgery shortened recovery in pregnant thrombosed cases by approximately seven days (MD: -6.80; 95% CI: -7.64 to -5.96, p < 0.001; I2 = 55%, p = 0.14) and reduced overall recurrence (95% CI: 0.10 to 0.37, p < 0.001; I2 = 0%, p = 0.97).\n\n**Conclusion:** Surgical treatments provide superior symptom relief, faster recovery, and lower recurrence but with some specific post-treatment complications, while conservative treatments are safer and less invasive but with provides slower symptom relief and higher recurrence rates. Individualized treatment should consider symptom severity, patient preferences, and risk tolerance.", "abstract_zh": "**Objectives：** 痔疮是一种常见的肛门直肠疾病，可以通过手术或保守治疗来治疗。这项荟萃分析的目的是比较手术治疗和保守治疗痔疮的疗效和安全性。\n\n**方法：** 对 PubMed、Embase、Cochrane 图书馆和 Web of Science 从成立到 2024 年 9 月 25 日期间进行了系统检索。符合条件的研究比较了痔疮的手术治疗与非侵入性保守治疗。统计分析包括合并优势比 (OR) 和平均差 (MD)/标准平均差 (SMD)，置信区间 (CI) 为 95%。\n\n**结果：** 对七项研究（包括 760 名患者）进行了分析。手术的症状完全缓解率高于保守治疗（OR = 2.96，95% CI：1.66-5.28，p < 0.001）。总体疼痛评分倾向于手术（SMD = -0.93，95% CI：1.73 至 -0.13，p = 0.02）。亚组分析显示四天内具有明显优势（SMD = -1.26，95% CI -1.84 至 -0.68），但十天后则具有同等性（SMD = 0.00，95% CI -0.44 至 0.44；p = 0.99）。在患有血栓性外痔的孕妇中观察到了类似的模式。术后出血率（OR：1.09；95% CI：0.42至2.82，p = 0.86；I2 = 41%，p = 0.15）和尿潴留率（OR：1.75；95% CI：0.30至10.31，p = 0.54； I2 = 45%，p = 0.18）组间没有显着差异。手术特异性不良事件并不常见（失禁 3%、持续性疼痛 5%、水样分泌物 6%）。手术使妊娠血栓病例的恢复时间缩短约 7 天（MD：-6.80；95% CI：-7.64 至 -5.96，p< 0.001；I2 = 55%，p = 0.14），并减少总体复发（95% CI：0.10 至 0.37，p< 0.001；I2= 55%，p = 0.14）。 I2 = 0%，p = 0.97）。\n\n**结论：** 手术治疗可显着缓解症状、加快恢复速度并降低复发率，但会出现一些特定的治疗后并发症，而保守治疗更安全且侵入性较小，但症状缓解较慢且复发率较高。个体化治疗应考虑症状严重程度、患者偏好和风险承受能力。", "keywords_zh": "保守治疗、痔疮、荟萃分析、手术治疗", "keywords_en": "Conservative treatment, Hemorrhoids, Meta-Analysis, Surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40596934/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 02 Jul 2025"}, {"id": "40590873", "title_en": "Endoscopic Submucosal Dissection and Transanal Endoscopic Microsurgery in the Treatment of Rectal Neuroendocrine Tumors: Systematic Review and Meta-Analysis of the Observational Studies", "title_zh": "内镜粘膜下剥离术和经肛门内镜显微手术治疗直肠神经内分泌肿瘤：观察性研究的系统回顾和荟萃分析", "authors": "Andrzej Białek", "abstract_en": "**Introduction:** Rectal neuroendocrine tumors (rNETs) are subepithelial lesions with potential of malignancy. Despite the guidelines recommending that rNETs measuring 10-20 mm should be removed either endoscopic submucosal dissection (ESD) or transanal endoscopic microsurgery (TEM), the management with these entities is still a clinical dilemma. We performed a meta-analysis to compare ESD and TEM regarding method effectiveness and safety in the treatment of rNETs.\n\n**Methods:** PubMed/MEDLINE/Embase/EBSCO/CINAHL was searched up for observational studies analyzing the efficacy and safety of both methods in the treatment of rNETs.\n\n**Results:** A total of 59 observational studies with a total of n = 2,804 participants were included. In a subgroup analysis, we demonstrated that the R0 resection rate was significantly ( P = 0.002) lower for ESD (rate: 0.854) than for TEM (0.924). The recurrence rate differed significantly ( P = 0.008); the lowest (event rate [ER] = 0.015) was found for ESD and the highest for TEM (ER = 0.035). The overall bleeding rate was 0.046 and perforation rate was 0.023 and no significant differences ( P = 0.274 for bleeding, P = 0.808 for perforation) were found by intervention type. The rate of other complications (wound dehiscence, soilage, incontinence, rectovaginal fistula, pelvic pain, retroperitoneal emphysema, coagulation syndrome) was significantly ( P = 0.000) higher for TEM (ER = 0.107) than ESD (ER = 0.013). We also included 4 comparative studies with 490 patients. Using random-effects analysis, we found that the risk ratio for R0 resection was approximately 10% lower for ESD. Our analysis showed significantly greater size ( P = 0.01) and follow-up ( P = 0.03) in the group treated with TEM.\n\n**Discussion:** The efficacy of TEM is higher than ESD with a higher risk of complications in this method. Lesions with a greater size are treated with TEM, and recurrence rate is greater for this procedure. Long follow-up is needed after the treatment of rNETs to detect the recurrence early.", "abstract_zh": "**介绍：** 直肠神经内分泌肿瘤（rNET）是具有恶性潜力的上皮下病变。尽管指南建议应通过内镜粘膜下剥离术 (ESD) 或经肛门内镜显微手术 (TEM) 切除 10-20 毫米的 rNET，但这些实体的治疗仍然是一个临床困境。我们进行了一项荟萃分析，以比较 ESD 和 TEM 治疗 rNET 的方法有效性和安全性。\n\n**方法：** 检索了 PubMed/MEDLINE/Embase/EBSCO/CINAHL 的观察性研究，分析这两种方法治疗 rNET 的有效性和安全性。\n\n**结果：** 共纳入 59 项观察性研究，共有 2,804 名参与者。在亚组分析中，我们证明 ESD 的 R0 切除率（比率：0.854）显着低于 TEM（0.924）（P = 0.002）。复发率差异显着（P=0.008）； ESD 最低（事件率 [ER] = 0.015），TEM 最高（ER = 0.035）。总出血率为0.046，穿孔率为0.023，不同干预类型差异无统计学意义（出血P=0.274，穿孔P=0.808）。 TEM (ER = 0.107) 的其他并发症（伤口裂开、污渍、失禁、直肠阴道瘘、骨盆疼痛、腹膜后气肿、凝血综合征）发生率显着高于 ESD (ER = 0.013) (P = 0.000)。我们还纳入了 4 项比较研究，涉及 490 名患者。通过随机效应分析，我们发现 R0 切除的风险比 ESD 大约低 10%。我们的分析显示，TEM 治疗组的体型显着增大 (P = 0.01)，随访时间也明显增大 (P = 0.03)。\n\n**讨论：** TEM 的疗效高于 ESD，但该方法出现并发症的风险较高。病变尺寸越大，则采用 TEM 治疗，复发率越高。 rNET 治疗后需要长期随访，以便及早发现复发情况。", "keywords_zh": "ESD、TEM、rNET、直肠神经内分泌肿瘤、治疗", "keywords_en": "ESD, TEM, rNETs, rectal neuroendocrine tumors, treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40590873/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 01 Jul 2025"}, {"id": "40576944", "title_en": "Operative versus nonoperative treatment of thrombosed external hemorrhoids: a systematic review and meta-analysis", "title_zh": "血栓性外痔的手术与非手术治疗：系统评价和荟萃分析", "authors": "Rachid Eduardo Noleto da Nobrega Oliveira", "abstract_en": "Thrombosed external hemorrhoids are a complication of hemorrhoids characterized by severe pain, swelling, and lump formation due to acute venous engorgement. Treatment options remain controversial, with limited evidence guiding the choice between surgical and conservative approaches. PubMed, Embase, and Cochrane Library databases were searched from inception to December 2024 to identify clinical trials comparing surgery with conservative treatment in thrombosed external hemorrhoids. Statistical analyses were performed using Review Manager 5.4.1 with a random-effects model. Heterogeneity was assessed using the I<sup>2</sup> test. We included six studies with a total of 851 patients, of whom 390 (45.8%) underwent surgical treatment. Surgical treatment was associated with a lower risk of recurrence compared to conservative management (RR 0.49; 95% CI 0.26-0.91; P < 0.05; I<sup>2</sup> = 54%). However, there were no significant differences in the risk of bleeding between the groups (RR 0.96; 95% CI 0.27-3.44; P = 0.95; I<sup>2</sup> = 60%). Subgroup analyses of the excision surgery group revealed no differences between approaches. Our main findings indicated no significant difference in bleeding between surgery and conservative treatment groups. However, operative management is associated with significantly lower recurrences, which should be the preferred choice.", "abstract_zh": "血栓性外痔是痔疮的一种并发症，其特征是由于急性静脉充血而导致剧烈疼痛、肿胀和肿块形成。治疗选择仍然存在争议，指导手术和保守治疗之间选择的证据有限。对 PubMed、Embase 和 Cochrane 图书馆数据库进行了检索，从最初到 2024 年 12 月，以识别比较手术与保守治疗血栓性外痔的临床试验。使用 Review Manager 5.4.1 和随机效应模型进行统计分析。使用 I<sup>2</sup> 检验评估异质性。我们纳入了 6 项研究，共 851 名患者，其中 390 名 (45.8%) 接受了手术治疗。与保守治疗相比，手术治疗的复发风险较低（RR 0.49；95% CI 0.26-0.91；P < 0.05；I<sup>2</sup> = 54%）。然而，各组之间的出血风险没有显着差异（RR 0.96；95% CI 0.27-3.44；P = 0.95；I<sup>2</sup> = 60%）。切除手术组的亚组分析显示方法之间没有差异。我们的主要发现表明手术治疗组和保守治疗组之间的出血没有显着差异。然而，手术治疗可显着降低复发率，这应该是首选。", "keywords_zh": "痔疮，非手术性，手术性，复发", "keywords_en": "Hemorrhoids, Nonoperative, Operative, Recurrence", "link": "https://pubmed.ncbi.nlm.nih.gov/40576944/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 27 Jun 2025"}, {"id": "40548987", "title_en": "Robotic surgery in anorectal malformations: Where are we? A systematic review", "title_zh": "肛门直肠畸形的机器人手术：我们在哪里？系统回顾", "authors": "Giovanna Riccipetitoni", "abstract_en": "Robotic surgery has emerged as a promising technique in pediatric colorectal surgery, offering enhanced precision, superior ergonomics, and potentially improved outcomes compared to conventional laparoscopic and open approaches. This systematic review aimed to evaluate the current literature on robotic-assisted surgery for anorectal malformations (ARMs) in pediatric patients. A comprehensive search of PubMed, Web of Science, and the Cochrane Library was conducted for studies published between 2000 and 2025, focusing on robotic procedures in infants with ARMs. Eight studies met the inclusion criteria, reporting on a total of 39 patients (male-to-female ratio 15:0.5), with a median age at surgery of 6.9 months. The most frequent ARM types were recto-prostatic, recto-bulbar, and recto-vesical fistulas. Median operative time was 226.3 min, and median length of hospital stay was 5.5 days. No intraoperative or early postoperative complications were observed, while late complications occurred in 18% of cases. Only one study included a comparative analysis with laparoscopic-assisted PSARP, precluding meta-analysis. Robotic-assisted anorectoplasty appears to be a safe and feasible approach, particularly advantageous for nerve-sparing pelvic dissection. However, further high-quality studies are necessary to define indications, evaluate long-term functional outcomes, and compare this technique with conventional surgical approaches.", "abstract_zh": "机器人手术已成为儿科结直肠手术中一项有前景的技术，与传统的腹腔镜和开放手术相比，它具有更高的精确度、卓越的人体工程学设计以及潜在的改善结果。本系统综述旨在评估目前关于儿童患者肛门直肠畸形 (ARM) 机器人辅助手术的文献。对 PubMed、Web of Science 和 Cochrane 图书馆对 2000 年至 2025 年间发表的研究进行了全面检索，重点关注 ARM 婴儿的机器人手术。八项研究符合纳入标准，共报告了 39 名患者（男女比例 15:0.5），手术时的中位年龄为 6.9 个月。最常见的 ARM 类型是直肠前列腺瘘、直肠球瘘和直肠膀胱瘘。中位手术时间为 226.3 分钟，中位住院时间为 5.5 天。未观察到术中或术后早期并发症，而18%的病例出现晚期并发症。只有一项研究包括与腹腔镜辅助 PSARP 的比较分析，排除了荟萃分析。机器人辅助肛门直肠成形术似乎是一种安全可行的方法，特别有利于保留神经的盆腔解剖。然而，需要进一步的高质量研究来定义适应症、评估长期功能结果并将该技术与传统手术方法进行比较。", "keywords_zh": "肛门直肠畸形、肛门直肠成形术、机器人辅助手术", "keywords_en": "Anorectal malformation, Anorectoplasty, Robotic-assisted surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40548987/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 23 Jun 2025"}, {"id": "40508850", "title_en": "Biopsychosocial Strategies for Alleviating Low Back Pain in Late Mothers: A Systematic Review", "title_zh": "缓解已故母亲腰痛的生物心理社会策略：系统评价", "authors": "Mariola Bidzan", "abstract_en": "<b>Background:</b> Low back pain (LBP) in older mothers is a prevalent and multifaceted condition influenced by a range of biopsychosocial factors. As the trend of late motherhood increases globally, it is essential to understand how LBP affects this population from a biopsychosocial perspective. <b>Objective:</b> This systematic review aims to examine the biopsychosocial determinants of LBP in older mothers by synthesizing findings from quantitative studies published between January 2010 and May 2024. Specifically, it explores the biological, psychological, and social factors contributing to LBP in this population and how it affects their daily lives and well-being. <b>Methods:</b> A comprehensive literature search was conducted across PubMed, PsychInfo, Web of Science, EMBASE, DARE, and the Cochrane Library. Studies were screened for eligibility based on predefined criteria. Five quantitative studies with a combined sample of 118,964 participants were included. The methodological quality was assessed, and data were extracted for analysis. <b>Results:</b> All five studies addressed biological aspects of LBP, including pelvic girdle pain, hemorrhoids, and varicose veins. Three studies also explored psychological factors such as depression and stress. Two studies incorporated social dimensions, including inadequate support systems, occupational burdens, and healthcare access barriers. Age and parity were consistently reported as exacerbating physical and psychological symptoms. <b>Conclusions:</b> This review highlights the importance of considering biopsychosocial factors when managing LBP in older mothers. Tailored interventions, such as exercise programs, family support, and workplace accommodations, are essential for improving outcomes. Further research using longitudinal studies is needed to explore these factors in greater depth.", "abstract_zh": "<b>背景：</b>高龄母亲的腰痛 (LBP) 是一种普遍存在的多方面疾病，受一系列生物心理社会因素的影响。随着全球晚孕趋势的增加，有必要从生物心理社会角度了解光体痛如何影响这一人群。 <b>目的：</b>本系统综述旨在通过综合 2010 年 1 月至 2024 年 5 月期间发表的定量研究结果，探讨老年母亲 LBP 的生物心理社会决定因素。具体而言，它探讨了导致该人群 LBP 的生物、心理和社会因素，以及它如何影响她们的日常生活和福祉。 <b>方法：</b>在 PubMed、PsychInfo、Web of Science、EMBASE、DARE 和 Cochrane 图书馆进行了全面的文献检索。根据预先定义的标准筛选研究资格。其中包括五项定量研究，合并样本为 118,964 名参与者。评估方法学质量，并提取数据进行分析。 <b>结果：</b>所有五项研究都涉及 LBP 的生物学方面，包括骨盆带疼痛、痔疮和静脉曲张。三项研究还探讨了抑郁和压力等心理因素。两项研究纳入了社会层面，包括支持系统不足、职业负担和医疗保健获取障碍。据一致报道，年龄和胎次会加剧身体和心理症状。 <b>结论：</b>本综述强调了在管理高龄母亲腰痛时考虑生物心理社会因素的重要性。量身定制的干预措施，例如锻炼计划、家庭支持和工作场所住宿，对于改善结果至关重要。需要使用纵向研究进行进一步研究，以更深入地探讨这些因素。", "keywords_zh": "生物心理社会因素、生物心理社会模型、腰痛、高龄母亲", "keywords_en": "biopsychosocial factors, biopsychosocial model, low back pain, older mothers", "link": "https://pubmed.ncbi.nlm.nih.gov/40508850/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 13 Jun 2025"}, {"id": "40501157", "title_en": "The median sacral artery and its surgical anatomy in pelvic and spinal surgery: a systematic review and meta-analysis", "title_zh": "骶正中动脉及其在盆腔和脊柱手术中的手术解剖：系统评价和荟萃分析", "authors": "Przemysław Pękala", "abstract_en": "**Background:** The median sacral artery (MSA) is a small but clinically significant artery arising from the aortic bifurcation and traveling along the anterior sacrum. It supplies the lumbar and sacral vertebrae and, in some cases, parts of the rectum. Despite its size, the MSA is crucial in regional circulation and is particularly relevant in spinal, pelvic, and vascular surgeries. This meta-analysis aims to provide a comprehensive synthesis of anatomical evidence regarding the MSA's origin, variations, and surgical relevance.\n\n**Materials And Methods:** A systematic search was conducted in major databases (PubMed, Embase, ScienceDirect, Scopus, Web of Science, and SciELO) until January 2025. Studies reporting anatomical data on the MSA, including its origin, variations, and clinical significance, were included. A total of 13 studies (n = 1,007 arteries) met the criteria.\n\n**Results:** The MSA originated directly from the aorta in 89.98% (95% CI: 84.05%-95.92%) of cases. In 8.27% (95% CI: 3.29%-13.25%), it shared a common origin with a lumbar artery, typically the 4th lumbar artery (97.86%). The 5th lumbar artery variation was rare (0.66%). Regarding its position relative to the sacral midline, the MSA was found on the left (48.80%), right (31.32%), or directly along the midline (13.35%). The mean distance from the midline was 3.54 mm.\n\n**Conclusions:** Recognizing MSA variations is essential for surgical planning to prevent vascular injury during spinal and gynecological procedures. Further cadaveric and imaging studies are needed to enhance procedural safety.", "abstract_zh": "**背景：** 骶正中动脉 (MSA) 是一条小但具有临床意义的动脉，起源于主动脉分叉并沿骶前部行进。它供应腰椎和骶椎，在某些情况下，供应部分直肠。尽管 MSA 很大，但它对局部循环至关重要，尤其与脊柱、骨盆和血管手术相关。这项荟萃分析旨在提供有关 MSA 起源、变异和手术相关性的解剖学证据的全面综合。\n\n**材料与方法：** 截至 2025 年 1 月，我们在主要数据库（PubMed、Embase、ScienceDirect、Scopus、Web of Science 和 SciELO）中进行了系统检索。报告了 MSA 解剖数据的研究，包括其起源、变异和临床意义。共有 13 项研究（n = 1,007 条动脉）符合标准。\n\n**结果：** 89.98% (95% CI: 84.05%-95.92%) 的病例中 MSA 直接起源于主动脉。 8.27%（95% CI：3.29%-13.25%）的患者与腰动脉有共同起源，通常是第四腰动脉（97.86%）。第5腰动脉变异罕见（0.66%）。就其相对于骶骨中线的位置而言，MSA位于左侧（48.80%）、右侧（31.32%）或直接沿着中线（13.35%）。距中线的平均距离为 3.54 毫米。\n\n**结论：** 认识 MSA 变化对于手术规划至关重要，以防止脊柱和妇科手术期间发生血管损伤。需要进一步的尸体和成像研究以提高手术安全性。", "keywords_zh": "解剖变异、临床解剖学、骶正中动脉、荟萃分析、盆腔血管化、骶骨", "keywords_en": "anatomic variations, clinical anatomy, median sacral artery, meta-analysis, pelvic vascularization, sacrum", "link": "https://pubmed.ncbi.nlm.nih.gov/40501157/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 12 Jun 2025"}, {"id": "40500490", "title_en": "Indocyanine green and height of anastomosis in colorectal surgery- a network meta-analysis", "title_zh": "吲哚菁绿与结直肠手术吻合高度的网络荟萃分析", "authors": "James Wei-Tatt Toh", "abstract_en": "**Purpose:** Anastomotic leak is a potentially life-threatening complication of colorectal surgery, with perfusion and height of anastomoses considered important risk factors. Indocyanine green (ICG) is commonly used in fluorescence angiography (FA) for perfusion assessment though techniques vary. This is a network meta-analysis comparing use of ICG-FA and height of anastomosis for left sided colorectal anastomoses and rates of anastomotic leak.\n\n**Methods:** A systematic review was performed including all adult clinical studies using ICG-FA in colorectal anastomoses. A network meta-analysis was performed to compare high and low anterior resections and the use of ICG for the outcome of anastomotic leak.\n\n**Results:** Of some 333 studies retrieved during review, 31 studies were included, totalling 6431 patients. In a meta-analysis to compare high and low anterior resection, with and without ICG, odds of anastomotic leak were greater in low compared to high anastomoses, and ICG is protective in both, OR of 0.38 (0.20-0.73) for high and OR of 0.41 (0.30-0.54) in low anastomoses, with ICG compared to without.\n\n**Conclusion:** There is benefit of ICG for both HAR and LAR in reducing anastomotic leak. While there is no consensus on the application, dosage and timing of ICG during anterior resection, pooled results and most studies have shown that the use of ICG to check for tissue perfusion of anastomosis reduces leak. ICG should be considered as part of a surgeon's armamentarium for intraoperative anastomotic check to reduce the risk of postoperative anastomotic leak.", "abstract_zh": "**Purpose：** 吻合口瘘是结直肠手术的一种潜在危及生命的并发症，灌注和吻合口高度被认为是重要的危险因素。尽管技术有所不同，吲哚菁绿 (ICG) 通常用于荧光血管造影 (FA) 中进行灌注评估。这是一项网络荟萃分析，比较了左侧结直肠吻合术中 ICG-FA 的使用和吻合高度以及吻合口漏率。\n\n**方法：** 进行了系统评价，包括在结直肠吻合术中使用 ICG-FA 的所有成人临床研究。进行了网络荟萃分析来比较高位和低位前切除术以及 ICG 对吻合口瘘结果的使用。\n\n**结果：** 在审查过程中检索到的约 333 项研究中，纳入了 31 项研究，共计 6431 名患者。在一项比较高位和低位前切除术（有和没有 ICG）的荟萃分析中，与高位吻合相比，低位吻合术发生吻合口漏的几率更大，并且 ICG 对两种情况都有保护作用，有 ICG 与无 ICG 相比，高位吻合的 OR 为 0.38（0.20-0.73），低位吻合的 OR 为 0.41（0.30-0.54）。\n\n**结论：** ICG 对于 HAR 和 LAR 都有利于减少吻合口瘘。虽然对于前切除术中 ICG 的应用、剂量和时机尚未达成共识，但汇总结果和大多数研究表明，使用 ICG 检查吻合口的组织灌注可减少渗漏。 ICG 应被视为外科医生术中吻合口检查装备的一部分，以降低术后吻合口瘘的风险。", "keywords_zh": "吻合口漏、结直肠吻合术、高位前切除术、吲哚青绿、低位前切除术", "keywords_en": "Anastomotic leak, Colorectal anastomosis, High anterior resection, Indocyanine green, Low anterior resection", "link": "https://pubmed.ncbi.nlm.nih.gov/40500490/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 11 Jun 2025"}, {"id": "40493094", "title_en": "Limitations of the Goligher classification in randomized trials for hemorrhoidal disease: a qualitative systematic review of selection criteria", "title_zh": "痔疮疾病随机试验中 Goligher 分类的局限性：选择标准的定性系统评价", "authors": "G Gallo", "abstract_en": "**Background:** The diverse range of therapeutic options for hemorrhoidal disease (HD) highlights the need for precise classification systems to guide treatment. Although the Goligher classification remains the most widely used, it has been criticized for its simplicity and limited ability to capture symptom severity or guide treatment decisions. This study aims to evaluate the patient selection criteria and classification systems employed in randomized controlled trials (RCTs) for HD.\n\n**Methods:** A systematic review was conducted following the 2020 PRISMA guidelines. A comprehensive search of databases identified randomized controlled trials (RCTs) comparing treatments for HD, focusing on classification systems used for patient enrollment. Eligible studies included adult patients and at least one arm involving surgical treatment.\n\n**Results:** Out of 6692 records, 162 studies met the inclusion criteria, with a median cohort size of 84 patients and 55.4% male. Most studies (86.4%) used the Goligher system, though the majority did not fully describe or cite the system. Only 13.6% of studies employed more recent alternative classification systems. The most common outcome measures across studies were postoperative pain (147 studies) and complications (133 studies). Recurrence rates were reported in 42% of studies, yet 70% of these did not provide adequate inclusion criteria or references to Goligher's classification.\n\n**Conclusions:** The inconsistent application of the Goligher classification and the variability in patient selection criteria across RCTs highlight the need for more nuanced and standardized systems. Future research should focus on refining classification methods and incorporating patient-reported outcomes to improve the reliability and relevance of HD trials.\n\n**Prospero Registration:** CRD42023387339.", "abstract_zh": "**背景：** 痔疮疾病 (HD) 的治疗选择多种多样，凸显了需要精确的分类系统来指导治疗。尽管 Goligher 分类仍然是使用最广泛的分类，但它因其简单性和捕捉症状严重程度或指导治疗决策的能力有限而受到批评。本研究旨在评估 HD 随机对照试验 (RCT) 中采用的患者选择标准和分类系统。\n\n**方法：** 根据 2020 年 PRISMA 指南进行了系统审查。对数据库进行全面检索，确定了比较 HD 治疗方法的随机对照试验 (RCT)，重点关注用于患者入组的分类系统。符合条件的研究包括成年患者和至少一只涉及手术治疗的手臂。\n\n**结果：** 在 6692 项记录中，有 162 项研究符合纳入标准，队列规模中位数为 84 名患者，其中 55.4% 为男性。大多数研究 (86.4%) 使用 Goligher 系统，尽管大多数研究没有完全描述或引用该系统。只有 13.6% 的研究采用了更新的替代分类系统。研究中最常见的结果指标是术后疼痛（147 项研究）和并发症（133 项研究）。 42% 的研究报告了复发率，但其中 70% 的研究没有提供足够的纳入标准或对 Goligher 分类的参考。\n\n**结论：** Goligher 分类的应用不一致以及随机对照试验中患者选择标准的可变性突出表明需要更细致和标准化的系统。未来的研究应侧重于完善分类方法并纳入患者报告的结果，以提高 HD 试验的可靠性和相关性。\n\n**Prospero registration：** CRD42023387339。", "keywords_zh": "分类系统、Goligher 分类、痔疮疾病、痔疮、患者选择、随机对照试验", "keywords_en": "Classification systems, Goligher classification, Hemorrhoidal disease, Hemorrhoids, Patient selection, Randomized controlled trials", "link": "https://pubmed.ncbi.nlm.nih.gov/40493094/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 10 Jun 2025"}, {"id": "40481245", "title_en": "Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Gianpiero Gravante", "abstract_en": "Polidocanol foam sclerotherapy has gained increasing attention as a minimally invasive treatment for hemorrhoidal disease (HD). However, significant variability exists in its clinical application regarding patient selection, procedural techniques, and postoperative management. This study aimed to assess real-world practice patterns among international experts, summarize existing evidence through a systematic literature review, and develop evidence-based clinical practice recommendations. A systematic review was conducted in MEDLINE, EMBASE, and CENTRAL to identify studies evaluating polidocanol foam sclerotherapy for HD. A total of 20 studies met the inclusion criteria. Additionally, an international survey was distributed to 30 experts in proctology and colorectal surgery to explore variations in indications, perioperative management, technique, and follow-up. Survey responses were analyzed descriptively to identify common trends and areas of divergence. Subsequently, based on both the experts' opinions and the results of the survey, a Delphi method was employed to produce clinical practice recommendations. The questions for the Delphi process were developed by the authors leading the project, followed by a detailed discussion with the whole panel of experts. Most experts (90%) reported using polidocanol foam sclerotherapy primarily for Goligher grade II HD, with 67% extending its use to grade III cases. Preoperative bowel preparation and anesthesia use varied widely. The preferred concentration was 3% polidocanol, with 2 mL injected per hemorrhoidal pile in most cases. Post-procedural care lacked standardization, though stool softeners and flavonoids were commonly recommended. Compared to rubber band ligation, polidocanol foam was perceived as having higher success rates (88.3% vs. 66.7%) and lower recurrence rates (16.1% vs. 41.2%). Adverse events were infrequent. The present article offers a comprehensive suite of clinical practice expert-based recommendations concerning the use of polidocanol foam sclerotherapy for HD. However, there is still significant variation in its application. These findings highlight the need for standardized guidelines and further research to optimize procedural strategies and long-term outcomes.", "abstract_zh": "聚多卡醇泡沫硬化疗法作为痔疮疾病（HD）的微创治疗方法越来越受到关注。然而，其临床应用在患者选择、手术技术和术后管理方面存在显着差异。本研究旨在评估国际专家的真实实践模式，通过系统文献综述总结现有证据，并制定基于证据的临床实践建议。 MEDLINE、EMBASE 和 CENTRAL 进行了系统评价，以确定评估聚多卡醇泡沫硬化疗法治疗 HD 的研究。共有 20 项研究符合纳入标准。此外，还向 30 名直肠病学和结直肠外科专家进行了一项国际调查，以探讨适应症、围手术期管理、技术和随访方面的差异。对调查回复进行描述性分析，以确定共同趋势和分歧领域。随后，根据专家意见和调查结果，采用德尔菲法提出临床实践建议。德尔菲流程的问题是由领导该项目的作者提出的，然后与整个专家小组进行了详细讨论。大多数专家 (90%) 报告主要使用聚多卡醇泡沫硬化疗法治疗 Goligher II 级 HD，其中 67% 将其使用范围扩大到 III 级病例。术前肠道准备和麻醉使用差异很大。首选浓度是 3% 聚多卡醇，大多数情况下每个痔疮注射 2 mL。尽管通常推荐使用大便软化剂和类黄酮，但术后护理缺乏标准化。与橡皮筋结扎相比，聚多卡醇泡沫被认为具有更高的成功率（88.3% vs. 66.7%）和较低的复发率（16.1% vs. 41.2%）。不良事件很少发生。本文提供了一套基于临床实践专家的全面建议，涉及使用聚多卡醇泡沫硬化疗法治疗 HD。然而，其应用仍然存在显着差异。这些发现强调需要标准化指南和进一步研究来优化程序策略和长期结果。", "keywords_zh": "专家调查、痔疮疾病、聚多卡醇泡沫、硬化疗法、系统评价", "keywords_en": "Expert survey, Hemorrhoidal disease, Polidocanol foam, Sclerotherapy, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40481245/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 06 Jun 2025"}, {"id": "40461025", "title_en": "Comparison of endoscopic vacuum therapy with standard care for colorectal anastomotic leakage: a systematic review and meta-analysis", "title_zh": "内镜负压治疗与结直肠吻合口瘘标准护理的比较：系统评价和荟萃分析", "authors": "Yunhong Tian", "abstract_en": "This systematic review and meta-analysis aimed to evaluate the effectiveness of endoscopic vacuum therapy (EVT) compared with standard care in managing colorectal anastomotic leakage, a serious complication following colorectal surgery.We conducted a literature search across PubMed, Embase, and the Cochrane Library for clinical studies published before October 2024 that compared the outcomes of EVT and standard care for anastomotic leakage, including leakage resolution rates, treatment duration, hospital stay duration, or postoperative complications. The pooled estimates of risk ratio (RR) or mean difference were primarily derived using a fixed-effects model, with a random-effects model used when high heterogeneity was detected.The analysis included six observational studies (273 patients). EVT was associated with a significantly higher resolution rate compared with standard care (RR 1.18, 95%CI 1.03 to 1.35; <i>P</i> = 0.02). Treatment duration was significantly shorter in the EVT group (mean difference -30.6 days, 95%CI -43.5 to -17.7; <i>P</i> < 0.001), while hospital stay duration showed no significant difference between EVT and standard care (mean difference 1.7 days, 95%CI -4.2 to 7.7; <i>P</i> = 0.57). No statistically significant difference was found in the rate of treatment-related complications between EVT and standard care (RR 1.17, 95%CI 0.52 to 2.80; <i>P</i> = 0.71).This meta-analysis suggests that EVT has superior effectiveness in terms of leakage resolution rates, as well as a shorter treatment duration compared with standard care for colorectal anastomotic leakage. This study is however constrained by the lack of prospective data, the risk of selection bias, and heterogeneity, requiring cautious interpretation of the findings.PROSPERO registration: CRD 4873455814.", "abstract_zh": "这项系统评价和荟萃分析旨在评估内镜真空治疗 (EVT) 与标准护理相比在处理结直肠吻合口瘘（结直肠手术后的严重并发症）方面的有效性。我们对 PubMed、Embase 和 Cochrane 图书馆进行了文献检索，查找 2024 年 10 月之前发表的临床研究，比较 EVT 和标准护理对吻合口瘘的结果，包括泄漏解决率、治疗持续时间、住院时间或术后并发症。风险比 (RR) 或平均差的汇总估计值主要使用固定效应模型得出，当检测到高度异质性时使用随机效应模型。该分析包括六项观察性研究（273 名患者）。与标准护理相比，EVT 的缓解率明显更高（RR 1.18，95% CI 1.03 至 1.35；<i>P</i> = 0.02）。 EVT 组的治疗时间显着缩短（平均差 -30.6 天，95%CI -43.5 至 -17.7；<i>P</i> < 0.001），而 EVT 和标准治疗之间的住院时间无显着差异（平均差 1.7 天，95%CI -4.2 至 -17.7；<i>P</i> = 0.57）。 EVT 和标准护理之间的治疗相关并发症发生率没有发现统计学上的显着差异（RR 1.17，95%CI 0.52 至 2.80；<i>P</i> = 0.71）。该荟萃分析表明，与结直肠吻合口瘘标准护理相比，EVT 在渗漏解决率方面具有更高的有效性，并且治疗持续时间更短。然而，这项研究受到缺乏前瞻性数据、选择偏倚风险和异质性的限制，需要对研究结果进行谨慎解释。PROSPERO 注册：CRD 4873455814。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40461025/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 03 Jun 2025"}, {"id": "40456210", "title_en": "Transmission of gonorrhea from the oral cavity to the rectal tract: A systematic review", "title_zh": "淋病从口腔传播到直肠：系统评价", "authors": "Mabel Miluska Suca Salas", "abstract_en": "BackgroundThe antimicrobial resistance of Neisseria gonorrhoeae and the high prevalence of asymptomatic extragenital infections are a worldwide concern. This research investigated whether gonorrhea can be transmitted from the oral cavity to the anorectal tract among men who have sex with men.<b>Purpose</b>The aim of this research is to find plausible relationships regarding the probability of gonococcal transmission from the oral cavity to the anorectal tract among MSM.<b>Research Design</b>A research question was defined using the P.I.C.O. strategy (population, intervention or exposure, comparison and outcome), where the target population is MSM, the intervention is exposure to contaminated oral cavity/saliva, the control is the absence of exposure, and the outcome is the acquisition of GC. The eligibility criteria included observational studies involving men who have sex with men, regardless of sexual orientation, aged 16 or older, screened for oropharyngeal and rectal gonorrhea, and examining the role of oral fluids in transmission. Studies involving partners previously diagnosed with urogenital gonorrhea or reporting consistent condom use during receptive penoanal sex were excluded to avoid urethral-to-anorectal transmission bias.<b>Study Sample</b>The databases employed were PubMed, Scopus, Web of Science, EBSCO, SciELO, and the Virtual Health Library (VHL). A total of 383 studies were identified, however, only 6 were included.<b>Data Collection and/or Analysis</b>According to the Newcastle-Ottawa Scale (NOS), two studies were \"very good,\" two \"good,\" and two \"satisfactory\". Most studies described a complete methodology according to Strengthening the Reporting of Observational studies in Epidemiology (STROBE).<b>Results</b>Differences in diagnostic methods, methodologies, and variables limited the findings. While the results do not confirm transmission from the oral cavity to the anorectal tract, they suggest its possibility. Further research is needed to better understand this transmission route.<b>Conclusions</b>Transmissibility of gonorrhea from oropharyngeal via to the anorectal tract cannot be totally establish. However, evidence suggested the existence of this gonorrhea transmission. The fact that men with rectal gonorrhea continue to appear, even in contexts of condom use or the absence of receptive penoanal sex, brings the importance of cases monitoring and the establishment of preventive strategies.", "abstract_zh": "背景淋病奈瑟菌的抗菌药物耐药性和无症状生殖器外感染的高患病率是全世界关注的问题。本研究调查了男男性行为者中淋病是否可以从口腔传播到肛门直肠。<b>目的</b>本研究的目的是寻找 MSM 中淋球菌从口腔传播到肛门直肠的概率之间的合理关系。<b>研究设计</b>使用 P.I.C.O. 定义了一个研究问题。策略（人群、干预或暴露、比较和结果），其中目标人群是 MSM，干预是暴露于受污染的口腔/唾液，对照是不存在暴露，结果是 GC 的获得。资格标准包括对年龄在 16 岁或以上的男男性行为者（无论性取向如何）进行观察性研究，筛查口咽和直肠淋病，并检查口腔液体在传播中的作用。涉及先前诊断为泌尿生殖淋病或报告在接受性肛交期间持续使用安全套的研究被排除，以避免尿道到肛门直肠传播偏差。<b>研究样本</b>使用的数据库包括 PubMed、Scopus、Web of Science、EBSCO、SciELO 和虚拟健康图书馆 (VHL)。总共确定了 383 项研究，但仅纳入 6 项。<b>数据收集和/或分析</b>根据纽卡斯尔-渥太华量表 (NOS)，两项研究为“非常好”，两项为“良好”，两项为“令人满意”。大多数研究根据加强流行病学观察研究报告 (STROBE) 描述了完整的方法。<b>结果</b>诊断方法、方法和变量的差异限制了研究结果。虽然结果并未证实从口腔传播到肛门直肠，但表明了其可能性。需要进一步研究以更好地了解这种传播途径。<b>结论</b>淋病从口咽到肛门直肠的传播能力尚不能完全确定。然而，有证据表明存在这种淋病传播。即使在使用安全套或缺乏接受性交的情况下，患有直肠淋病的男性仍然不断出现，这一事实凸显了病例监测和制定预防策略的重要性。", "keywords_zh": "口腔、淋病、直肠、性少数和性别少数、性传播疾病", "keywords_en": "Mouth, gonorrhoea, rectum, sexual and gender minorities, sexually transmitted diseases", "link": "https://pubmed.ncbi.nlm.nih.gov/40456210/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 02 Jun 2025"}, {"id": "40434549", "title_en": "A rare combination of hypogonadotropic hypogonadism, GH deficiency and rectal atresia in a female with an FGFR1 variant: a case report and systematic review of the literature", "title_zh": "FGFR1 变异女性罕见性腺激素减退症、生长激素缺乏症和直肠闭锁的组合：病例报告和文献系统回顾", "authors": "George Mastorakos", "abstract_en": "**Purpose:** To report a case with combined pituitary hormone deficiency (CPHD) and Fibroblast growth factor receptor 1 (FGFR1) gene defect, and summarize the clinical characteristics of similar cases by reviewing the current reports from the literature.\n\n**Methods:** A 24-year-old woman was admitted to the outpatient endocrinology unit with a diagnosis of primary amenorrhea, history of Growth Hormone deficiency and multiple congenital anomalies including rectal atresia. The subsequent hormonal investigation led to the diagnosis of hypogonadotropic hypogonadism and persistent GH deficiency. Abdominal and pelvic ultrasounds were normal whereas the brain MRI revealed a hypoplastic sella turcica with a hypoplastic anterior pituitary lobe, an ectopic posterior pituitary lobe and a thin pituitary stalk. The genetic analysis revealed a novel pathogenic missense heterozygous variant (c.1958G > A, p.Agr635Gln) in exon 15 of FGFR1 gene. PubMed, Scopus, and Web of Science were searched for the identification of studies reporting cases of CPHD with FGFR1 gene defects.\n\n**Results:** Of the 648 records retrieved, 10 were included in this review. A comprehensive overview of the cases was summarized, and their clinical and genetic characteristics were presented.\n\n**Conclusion:** Although FGFR1 variants have been associated with Kallmann syndrome and isolated hypogonadotropic hypogonadism and recently with CPHD, the patient's phenotype includes phenotypic alterations not previously described, to the best of our knowledge, within the spectrum of non-reproductive features of either of these entities. Isolated GH deficiency combined with other non-common abnormalities exerts a great possibility for subsequent CPHD manifestation.", "abstract_zh": "**Purpose：** 报告1例合并垂体激素缺乏症（CPHD）和成纤维细胞生长因子受体1（FGFR1）基因缺陷的病例，通过回顾现有文献报道，总结同类病例的临床特点。\n\n**方法：** 一名 24 岁女性被送往内分泌科门诊，诊断为原发性闭经、生长激素缺乏病史以及包括直肠闭锁在内的多种先天性异常。随后的激素检查诊断为低促性腺激素性性腺功能减退症和持续性 GH 缺乏。腹部和盆腔超声检查正常，而脑部 MRI 显示蝶鞍发育不良，垂体前叶发育不良、异位垂体后叶和细垂体柄。遗传分析揭示了 FGFR1 基因第 15 号外显子中存在一种新的致病性错义杂合变异体（c.1958G > A，p.Agr635Gln）。对 PubMed、Scopus 和 Web of Science 进行了搜索，以确定报告 FGFR1 基因缺陷的 CPHD 病例的研究。\n\n**结果：** 在检索到的 648 条记录中，本次审查纳入了 10 条记录。对病例进行了全面的概述，并介绍了它们的临床和遗传特征。\n\n**结论：** 尽管 FGFR1 变异与卡尔曼综合征和孤立性低促性腺激素性性腺功能减退症以及最近的 CPHD 相关，但据我们所知，患者的表型包括以前未描述过的表型改变，属于这些实体的非生殖特征范围。孤立的 GH 缺乏合并其他不常见的异常很可能导致随后的 CPHD 表现。", "keywords_zh": "CPHD、FGFR1、GHD、垂体功能减退症、评论", "keywords_en": "CPHD, FGFR1, GHD, Hypopituitarism, Review", "link": "https://pubmed.ncbi.nlm.nih.gov/40434549/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 28 May 2025"}, {"id": "40413456", "title_en": "MicroRNAs involved in colorectal cancer, a rapid mini-systematic review", "title_zh": "与结直肠癌有关的 MicroRNA，快速小型系统评价", "authors": "Mahdi Barazesh", "abstract_en": "**Introduction:** Colorectal cancer (CRC) involves the uncontrolled proliferation of glandular epithelial cells in the colon or rectum. The high mortality rate associated with CRC has driven extensive research into innovative diagnostic and therapeutic strategies. Among these, microRNAs (miRNA) have gained attention for their crucial role in regulating various cellular processes that contribute to the initiation, progression, and metastasis of CRC.\n\n**Method:** This systematic review aimed to assess the roles of various miRNAs in CRC by analyzing multiple studies. The PICO framework was followed to structure the study regarding miRNA involved in CRC development and progression compared to normal cases. The outcomes were measured according miRNAs impact on CRC progression, survival rates, and treatment response. Systematic review of studies published from 2000 to November 2023 were included. Data were collected from prominent databases, including Google Scholar, PubMed, ScienceDirect, Irandoc, SID, and Magiran, covering studies from 2000 to November 2023. Studies were managed using EndNote for citation management, and duplicates were removed. The remaining studies were evaluated based on predefined inclusion and exclusion criteria.\n\n**Results:** In our review, we categorized 28 miRNAs based on their potential tumor suppressor or oncogenic effects in CRC progression. Among them, 14 miRNAs were highlighted as important based on the assessment using TCGA data, with miR-200a also showing a significant effect on patient survival.\n\n**Conclusion:** This study compiled and analyzed validated miRNAs associated with CRC progression. The findings suggest the potential of these miRNAs as non-invasive biomarkers, which may be used alone or in combination with traditional tumor markers for improved diagnostic and prognostic applications in CRC. This review contributes novel insights by updating the current understanding and offering a comprehensive evaluation of miRNAs in CRC.", "abstract_zh": "**介绍：** 结直肠癌 (CRC) 涉及结肠或直肠中腺上皮细胞不受控制的增殖。结直肠癌相关的高死亡率推动了对创新诊断和治疗策略的广泛研究。其中，microRNA (miRNA) 因其在调节各种细胞过程中的关键作用而受到关注，这些细胞过程有助于 CRC 的起始、进展和转移。\n\n**Method：** 本系统综述旨在通过分析多项研究来评估各种 miRNA 在 CRC 中的作用。遵循 PICO 框架来构建与正常病例相比参与 CRC 发生和进展的 miRNA 的研究。结果是根据 miRNA 对 CRC 进展、生存率和治疗反应的影响来衡量的。对 2000 年至 2023 年 11 月发表的研究进行了系统回顾。数据收集自著名数据库，包括 Google Scholar、PubMed、ScienceDirect、Irandoc、SID 和 Magiran，涵盖 2000 年至 2023 年 11 月的研究。研究使用 EndNote 进行引文管理，并删除重复项。其余研究根据预先确定的纳入和排除标准进行评估。\n\n**结果：** 在我们的综述中，我们根据 28 种 miRNA 在 CRC 进展中的潜在抑癌或致癌作用对其进行了分类。其中，根据 TCGA 数据的评估，14 个 miRNA 被强调为重要，其中 miR-200a 也显示出对患者生存的显着影响。\n\n**结论：** 本研究编译并分析了与 CRC 进展相关的经过验证的 miRNA。这些发现表明这些 miRNA 作为非侵入性生物标志物的潜力，可以单独使用或与传统肿瘤标志物结合使用，以改善 CRC 的诊断和预后应用。这篇综述通过更新当前的理解并对 CRC 中的 miRNA 进行全面评估，提供了新颖的见解。", "keywords_zh": "生物标志物、结直肠癌、MicroRNA", "keywords_en": "Biomarker, Colorectal cancer, MicroRNAs", "link": "https://pubmed.ncbi.nlm.nih.gov/40413456/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 24 May 2025"}, {"id": "40410673", "title_en": "The efficacy of retrograde and antegrade enemas in the management of low anterior resection syndrome in patients undergoing rectal resection: a systematic review and meta-analysis", "title_zh": "逆行和顺行灌肠治疗直肠切除术患者低位前切除综合征的疗效：系统评价和荟萃分析", "authors": "Hui Yang", "abstract_en": "**Background:** Rectal resection could potentially cause low anterior resection syndrome (LARS). Although recent studies have reported the efficacy of enema against LARS, no systematic review and meta-analysis has been conducted.\n\n**Methods:** A systematic search was conducted in PubMed, EMBASE, MEDLINE, CINAHL Complete, Cochrane library and Web of Science. Eligible studies that quantified the effect of enema vs. other approaches on LARS following rectal resection were selected. Meta-analysis was conducted by using RevMan 5.4 software and StataMP 17. Where meta-analysis was not possible, vote counting was performed.\n\n**Results:** This study comprised five RCTs with 159 participants and meta-analysis was performed in 4 studies. Compared with the control group, enema reduced LARS score with mean differences of -10.84 (95% CI: -16.71 to -4.98, P = 0.0003). Subgroup analysis based on the type of enema were performed, with three European studies using retrograde enema and one Asian study using antegrade enema, with mean differences of -13.77 (95% CI: -17.97 to -9.57, P < 0.00001) and -4.86 (95% CI: -9.26 to -0.46, P = 0.03), respectively. According to follow-up period, two trials reported short-term effects and the other two investigated medium/long-term effects with mean differences of -14.22 (95% CI: -20.05 to -8.38, P = 0.23) and -7.59 (95% CI: -14.47 to -0.71, P = 0.13), respectively. One study that used antegrade enema was key contributor to the substantial interstudy heterogeneity by the leave-one-out sensitivity analysis. After exclusion of this study, no heterogeneity was found (t<sup>2</sup> = 0.00; χ<sup>2</sup> = 1.63, df = 2, p = 0.44; I<sup>2</sup> = 0%). Vote counting also showed positive effects of enema on LARS.\n\n**Conclusions:** Enema, particularly retrograde enema, is effective in managing LARS. However, the effectiveness of antegrade enema deserves further investigation. The short-term effects of enema are more pronounced compared to long-term outcomes. Due to the limited number of included studies, these findings should be taken cautiously. More RCTs on other continents are needed to validate the impact of enema on LARS, as well as to develop standardised protocols to facilitate clinical practice.\n\n**Prospero Registration:** CRD42024539973.", "abstract_zh": "**背景：** 直肠切除术可能会导致低位前切除综合征（LARS）。尽管最近的研究报告了灌肠对 LARS 的功效，但尚未进行系统评价和荟萃分析。\n\n**方法：** 在 PubMed、EMBASE、MEDLINE、CINAHL Complete、Cochrane 图书馆和 Web of Science 中进行了系统检索。选择了量化灌肠与其他方法对直肠切除术后 LARS 效果的合格研究。使用 RevMan 5.4 软件和 StataMP 17 进行荟萃分析。在无法进行荟萃分析的情况下，进行计票。\n\n**结果：** 这项研究包括 5 项随机对照试验，共有 159 名参与者，并对 4 项研究进行了荟萃分析。与对照组相比，灌肠降低LARS评分，平均差异为-10.84（95% CI：-16.71至-4.98，P = 0.0003）。根据灌肠类型进行亚组分析，其中三项欧洲研究使用逆行灌肠，一项亚洲研究使用顺行灌肠，平均差异为-13.77（95％CI：-17.97至-9.57，P < 0.00001）和-4.86（95％CI：-9.26至-0.46，P = 0.03），分别。根据随访时间，两项试验报告了短期效应，另外两项研究了中/长期效应，平均差异分别为-14.22（95% CI：-20.05至-8.38，P = 0.23）和-7.59（95% CI：-14.47至-0.71，P = 0.13）。一项使用顺行灌肠的研究是留一敏感性分析导致研究间显着异质性的关键因素。排除本研究后，未发现异质性（t<sup>2</sup> = 0.00；χ<sup>2</sup> = 1.63，df = 2，p = 0.44；I<sup>2</sup> = 0%）。计票也显示灌肠对 LARS 具有积极作用。\n\n**结论：** 灌肠，特别是逆行灌肠，对于治疗 LARS 是有效的。然而，顺行灌肠的有效性值得进一步研究。与长期结果相比，灌肠的短期效果更为明显。由于纳入的研究数量有限，这些研究结果应谨慎对待。需要在其他大陆进行更多随机对照试验来验证灌肠对 LARS 的影响，并制定标准化方案以促进临床实践。\n\n**Prospero registration：** CRD42024539973。", "keywords_zh": "灌肠，低位前切除综合征，荟萃分析，直肠切除术", "keywords_en": "Enema, Low anterior resection syndrome, Meta-analysis, Rectal resection", "link": "https://pubmed.ncbi.nlm.nih.gov/40410673/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 23 May 2025"}, {"id": "40407946", "title_en": "Simultaneous robotic-assisted prostatectomy and rectal resection: a systematic review", "title_zh": "机器人辅助前列腺切除术和直肠切除术同时进行：系统评价", "authors": "Matthew J Roberts", "abstract_en": "Prostate cancer (PC) and rectal cancer (RC) are common and can require complex management, especially when presenting synchronously or with invasive characteristics. Robotic surgery has emerged as a viable option for managing these challenging cases; however, the outcomes are yet to be summarised or compared to traditional approaches. This systematic review aims to evaluate the feasibility, oncological outcomes, and functional results of simultaneous robotic-assisted resections of the prostate and rectum. Following prior protocol registration (PROSPERO: CRD42023449872) and according to the Preferred Reporting Items for Systematic Reviews and Meta-analysis (PRISMA) guidelines, we conducted a systematic search across multiple databases, selecting studies that involved simultaneous bladder-sparing robotic-assisted prostatectomy and rectal resection. The Joanna Briggs Institute tool was used for risk of bias assessment. Data on patient demographics, treatment details, post-operative course, and functional and oncological outcomes were extracted and analysed. From 1357 identified records, 25 studies met our inclusion criteria resulting in 45 cases/patients. The median patient age was 62 years. Diverse treatment backgrounds and outcome definitions were recorded. Median operative time was 548 min and median estimated blood loss was 450 mL. The overall complication rate was 44.4%, with major complications (Clavien-Dindo III) occurring in 17.8% of cases. Surgical margins were negative in 92.6% of cases. Continence recovery occurred for most (78.6%) of the cases reporting on urinary function. Simultaneous robotic-assisted prostatectomy and rectal resection appears to be a feasible, safe and oncologically effective approach with satisfactory oncological and functional outcomes for managing patients with synchronous or invasive PC and RC.", "abstract_zh": "前列腺癌 (PC) 和直肠癌 (RC) 很常见，可能需要复杂的治疗，特别是在同时出现或具有侵袭性特征时。机器人手术已成为处理这些具有挑战性的病例的可行选择；然而，结果尚未总结或与传统方法进行比较。本系统综述旨在评估机器人辅助同步前列腺和直肠切除术的可行性、肿瘤学结果和功能结果。在先前的方案注册（PROSPERO：CRD42023449872）之后并根据系统评价和荟萃分析的首选报告项目（PRISMA）指南，我们在多个数据库中进行了系统搜索，选择涉及同时保留膀胱的机器人辅助前列腺切除术和直肠切除术的研究。乔安娜·布里格斯研究所工具用于评估偏差风险。提取并分析了患者人口统计、治疗细节、术后病程以及功能和肿瘤结果的数据。从 1357 份已确定的记录中，有 25 项研究符合我们的纳入标准，共 45 例/患者。患者年龄中位数为 62 岁。记录了不同的治疗背景和结果定义。中位手术时间为 548 分钟，中位估计失血量为 450 mL。总体并发症发生率为44.4%，其中主要并发症（Clavien-Dindo III）发生率为17.8%。 92.6% 的病例手术切缘呈阴性。大多数（78.6%）报告泌尿功能的病例均恢复了失禁。同步机器人辅助前列腺切除术和直肠切除术似乎是一种可行、安全且肿瘤学有效的方法，对于治疗同步或侵入性 PC 和 RC 患者具有令人满意的肿瘤学和功能结果。", "keywords_zh": "腹会阴切除术（APR）、前切除术（AR）、前列腺癌、前列腺切除术、直肠癌、机器人手术", "keywords_en": "Abdominoperineal resection (APR), Anterior resection (AR), Prostate cancer, Prostatectomy, Rectal cancer, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40407946/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 23 May 2025"}, {"id": "40371426", "title_en": "Prostate biopsy in patients without rectal access: a systematic review and proportional meta-analysis", "title_zh": "无直肠入路患者的前列腺活检：系统评价和比例荟萃分析", "authors": "Dionysios Mitropoulos", "abstract_en": "**Introduction:** Historically, the anal canal plays a substantial role in both screening and diagnosis of pro-state cancer with digital rectal examination (DRE) and transrectal ultrasound (TRUS) guided biopsy, respectively. However, in patients with a prior history of abdominoperineal resection the transrectal route towards the prostate capsule cannot be utilized and thus alternative approaches have to be employed. The aim of this systematic review and proportional meta-analysis is to evaluate the available alternative prostate biopsy techniques in patients without rectal access.\n\n**Material And Methods:** The systematic literature review was performed using MEDLINE, Scopus, EMBASE, and the CENTRAL register for randomized controlled trials (RCTs). The following search algorithm was used: \"resection of rectum\" OR \"abdominoperineal resection\" OR \"without rectal access\" AND \"prostate biopsy\" (PROSPERO 2023 CRD42023459080).\n\n**Results:** A total of 21 studies and 203 patients were included in this systematic review and meta-analysis, while 6 different prostate biopsy techniques were detected in the current literature. The transperineal approach under transperineal US (TPUS) and the transgluteal approach guided by computed tomography (CT) were associated with 0.74 [0.48; 0.94] and 0.70 [0.49; 0.89] pooled diagnostic yield estimates as well as 0.01 [0.00; 0.01] and 0 [0.00; 0.01] pooled complication rate estimates. The performance of multiparametric magnetic resonance imaging (mpMRI) prior to transgluteal CT-guided prostate biopsy seemed to significantly affect the biopsy result (p = 0.0002).\n\n**Conclusions:** Based on current data, the TPUS-guided prostate biopsy has the highest pooled diagnostic yield estimate. However, this conclusion is based on poor evidence and more reliable and well-organized studies are needed to thoroughly explore this problem.", "abstract_zh": "**介绍：** 从历史上看，肛管分别在直肠指检（DRE）和经直肠超声（TRUS）引导活检的前列腺癌筛查和诊断中发挥着重要作用。然而，对于既往有腹会阴切除史的患者，无法利用经直肠途径到达前列腺囊，因此必须采用替代方法。本系统评价和比例荟萃分析的目的是评估对于没有直肠通路的患者可用的替代前列腺活检技术。\n\n**Material and methods：** 使用 MEDLINE、Scopus、EMBASE 和 CENTRAL 注册库进行系统文献综述以进行随机对照试验 (RCT)。使用以下搜索算法：“直肠切除术”或“腹会阴切除术”或“无直肠通路”和“前列腺活检”(PROSPERO 2023 CRD42023459080)。\n\n**结果：** 本次系统评价和荟萃分析共纳入 21 项研究和 203 名患者，同时在当前文献中检测到 6 种不同的前列腺活检技术。经会阴超声 (TPUS) 下的经会阴入路和计算机断层扫描 (CT) 引导下的经臀入路与 0.74 [0.48；0.74] 相关。 0.94]和0.70[0.49； 0.89] 汇总诊断产量估计值以及 0.01 [0.00；0.00； 0.01] 和 0 [0.00； 0.01]合并并发症发生率估计值。经臀 CT 引导的前列腺活检之前的多参数磁共振成像 (mpMRI) 的表现似乎显着影响活检结果 (p = 0.0002)。\n\n**结论：** 根据当前数据，TPUS 引导的前列腺活检具有最高的汇总诊断率估计。然而，这一结论的证据不足，需要更可靠和组织良好的研究来彻底探讨这个问题。", "keywords_zh": "活检, 前列腺, 前列腺癌, 经会阴, 超声波", "keywords_en": "biopsy, prostate, prostate cancer, transperineal, ultrasound", "link": "https://pubmed.ncbi.nlm.nih.gov/40371426/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 15 May 2025"}, {"id": "40347378", "title_en": "Effects of low anterior resection syndrome after colorectal cancer resections on health-related quality of life: a systematic review and meta-analysis", "title_zh": "结直肠癌切除术后低位前切除综合征对健康相关生活质量的影响：系统评价和荟萃分析", "authors": "S V Hosseini", "abstract_en": "**Background:** Low anterior resection syndrome (LARS) is a term that encompasses multidimensional bowel dysfunction that typically occurs following resections of rectum and distal parts of the colon. We aimed to systematically assess the available literature on the effects of bowel dysfunction after colorectal cancer (CRC) surgeries on health-related quality of life (HRQOL) and conduct a meta-analysis.\n\n**Methods:** Studies were included if they assessed patients who had undergone sphincter-preservation surgeries for CRC. Studies were eligible if they assessed bowel dysfunction using the LARS score and HRQOL using the European Organization for Research and Treatment Core Quality-of-Life Questionnaire (EORTC QLQ-C30).\n\n**Results:** Of 1410 reports, 28 studies were included. According to the analyses, patients with major LARS had lower global health status [weighted mean differences (WMD) = - 10.98; 95% confidence interval (CI) - 13.18, - 8.79], physical functioning (WMD = - 5.96; 95% CI - 7.40, - 4.52), role functioning (WMD = - 10.59; 95% CI - 12.54, - 8.63), emotional functioning (WMD = - 11.09; 95% CI - 14.34, 7.84), cognitive functioning (WMD = - 9.27; 95% CI - 12.22, - 6.32), and social functioning (WMD = - 15.73; 95% CI - 18.82, - 12.63) and higher scores of symptoms compared to patients with minor/no LARS.\n\n**Conclusions:** The study findings suggest that patients with major LARS experience worse HRQOL compared to those with minor/no LARS.\n\n**Registration:** PROSPERO, CRD42023479657.", "abstract_zh": "**背景：** 低位前切除综合征（LARS）是一个涵盖多维肠功能障碍的术语，通常发生在直肠和结肠远端切除术后。我们的目的是系统评估关于结直肠癌（CRC）手术后肠功能障碍对健康相关生活质量（HRQOL）影响的现有文献，并进行荟萃分析。\n\n**方法：** 如果他们评估因结直肠癌接受括约肌保留手术的患者，则纳入研究。如果研究使用 LARS 评分和 HRQOL 使用欧洲研究和治疗组织核心生活质量问卷 (EORTC QLQ-C30) 评估肠道功能障碍，则研究合格。\n\n**结果：** 1410 份报告中纳入了 28 项研究。根据分析，重度 LARS 患者的整体健康状况较低[加权平均差 (WMD) = - 10.98； 95% 置信区间 (CI) - 13.18, - 8.79]、身体功能 (WMD = - 5.96; 95% CI - 7.40, - 4.52)、角色功能 (WMD = - 10.59; 95% CI - 12.54, - 8.63)、情绪功能(WMD = - 11.09; 95% CI - 14.34, 7.84)、认知功能 (WMD = - 9.27; 95% CI - 12.22, - 6.32) 和社交功能 (WMD = - 15.73; 95% CI - 18.82, - 12.63），与轻微/无 LARS 的患者相比，症状得分更高。\n\n**结论：** 研究结果表明，与患有轻微/无 LARS 的患者相比，患有严重 LARS 的患者的 HRQOL 较差。\n\n**Registration：** 普洛斯彼罗，CRD42023479657。", "keywords_zh": "结直肠肿瘤, 低位前切除综合征, 荟萃分析, 生活质量, 系统评价", "keywords_en": "Colorectal neoplasms, Low anterior resection syndrome, Meta-analysis, Quality of life, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40347378/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 10 May 2025"}, {"id": "40330445", "title_en": "Perirectal spacers in radiotherapy for prostate cancer - a systematic review and meta-analysis", "title_zh": "直肠周围间隔物在前列腺癌放射治疗中的应用——系统评价和荟萃分析", "authors": "Shahrokh F Shariat", "abstract_en": "**Introduction:** Perirectal spacers reduce the radiotherapy (RT) dose delivered to the rectum, but their impact on treatment toxicity remains debated. We conducted a systematic review and meta-analysis to synthesise emerging data (PROSPERO: CRD42024506380).\n\n**Material And Methods:** MEDLINE, Embase, Scopus, and Google Scholar were searched through 2024/08/18 for prospective randomised (RCT) and non-randomised trials evaluating the clinical outcomes of perirectal spacing in prostate cancer (PCa) patients. Random effects generalised linear mixed models were used to pool odds ratios (OR) for rectal adverse events (AEs) from RCTs. Non-randomised trials were summarised qualitatively. The risk of bias was assessed using the RoB2 and ROBINS-I tools.\n\n**Results:** Three RCTs (<i>n</i> = 645) were identified. The rates of grade ≥ 2 (G ≥ 2) rectal AEs in control groups were low, ranging 4.2-13.8% for early AEs and 0-1.4% for late AEs. Perirectal spacers were associated with decreased incidence of early G ≥ 2 rectal AEs (OR: 0.43; 95% CI: 0.19-0.96), but not of late G ≥ 2 rectal AEs (OR: 0.26; 95% CI: 0.02-2.91). Assuming a comparator risk of 7.1% and 1%, this corresponded to a number needed to treat of 26 patients to avoid one early AE, and 135 pa- tients to avoid one late G ≥ 2 AE, respectively. Randomised clinical trial were at moderate risk of bias due to concerns regarding the concealment of allocation.\n\n**Conclusions:** There is evidence that perirectal spacers result in a small decrease in acute rectal toxicity. However, modern RT for clinically localised PCa is generally well-tolerated, and severe AEs are rare. Greater scrutiny of the risks and benefits associated with perirectal spacers is necessary.", "abstract_zh": "**介绍：** 直肠周围间隔器可减少直肠的放射治疗 (RT) 剂量，但其对治疗毒性的影响仍存在争议。我们进行了系统回顾和荟萃分析来综合新兴数据（PROSPERO：CRD42024506380）。\n\n**Material and methods：** 截至 2024 年 8 月 18 日，MEDLINE、Embase、Scopus 和 Google Scholar 均搜索了评估前列腺癌 (PCa) 患者直肠周围间隔临床结果的前瞻性随机 (RCT) 和非随机试验。使用随机效应广义线性混合模型来汇总随机对照试验中直肠不良事件 (AE) 的比值比 (OR)。对非随机试验进行了定性总结。使用 RoB2 和 ROBINS-I 工具评估偏倚风险。\n\n**结果：** 确定了三项随机对照试验 (<i>n</i> = 645)。对照组中 ≥ 2 级 (G ≥ 2) 直肠 AE 发生率较低，早期 AE 为 4.2-13.8%，晚期 AE 为 0-1.4%。直肠周围间隔物与早期 G ≥ 2 直肠 AE 发生率降低相关（OR：0.43；95% CI：0.19-0.96），但与晚期 G ≥ 2 直肠 AE 发生率降低无关（OR：0.26；95% CI：0.02-2.91）。假设比较风险为 7.1% 和 1%，这分别相当于需要治疗 26 名患者以避免一种早期 AE 和 135 名患者以避免一种晚期 G ≥ 2 AE。由于担心分配的隐藏，随机临床试验存在中等偏倚风险。\n\n**结论：** 有证据表明，直肠周围垫片可使急性直肠毒性小幅降低。然而，现代放疗治疗临床局限性前列腺癌通常耐受性良好，严重的 AE 很少见。有必要对直肠周围间隔物相关的风险和益处进行更严格的审查。", "keywords_zh": "Barrigel、ProSpace、SpaceOAR、急性毒性、慢性毒性、胃肠道毒性", "keywords_en": "Barrigel, ProSpace, SpaceOAR, acute toxicity, chronic toxicity, gastrointestinal toxicity", "link": "https://pubmed.ncbi.nlm.nih.gov/40330445/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 07 May 2025"}, {"id": "40327435", "title_en": "Research Perspective on \"Social Determinants of Health in Diverticulitis: A Systematic Review\"", "title_zh": "“憩室炎健康的社会决定因素：系统回顾”的研究视角", "authors": "Ira L Leeds", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40327435/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 06 May 2025"}, {"id": "40269754", "title_en": "Risk factors for unplanned 31-day readmission after surgery for colorectal cancer patients: a meta-analysis", "title_zh": "结直肠癌患者术后 31 天非计划再入院的危险因素：一项荟萃分析", "authors": "Liping Cui", "abstract_en": "**Background:** The high incidence of unplanned readmissions within 31 days after colorectal cancer surgery remains a significant challenge. However, the identified risk factors for these readmissions are inconsistent across the literature. This study aims to perform a comprehensive meta-analysis to estimate the incidence of unplanned readmissions and systematically identify the factors associated with this risk, providing robust evidence for targeted interventions to reduce readmission rates.\n\n**Methods:** This study was conducted in accordance with the PRISMA guidelines. All study steps, including study selection, data extraction, and quality assessment, were independently performed by two authors, with any disagreements resolved through consultation with a third author. A comprehensive search for published studies was conducted across the following databases up to January 2025: VIP Journal Database, Wanfang Data, CNKI, SinoMed, PubMed, Embase, Web of Science, and the Cochrane Library. Statistical analyses were performed using RevMan 5.4 and Stata 17.0, with a p-value of less than 0.05 considered statistically significant.\n\n**Results:** This meta-analysis identified several significant risk factors associated with unplanned readmission during this period (P < 0.05), including age (OR = 1.13), postoperative complications (OR = 1.87), tumor stage (TNM ≥ III) (OR = 2.01), tumor site in the rectum (OR = 1.64), stoma creation (OR = 1.70), Complicated diabetes (OR = 1.56), Charlson Comorbidity Index (CCI) (OR = 1.27), blood transfusion (BT) (OR = 1.24), Length of hospital stay (LOS) (OR = 1.65), and surgical approach (OR = 1.22). Notably, female (OR = 0.85) was identified as a protective factor against unplanned readmission.\n\n**Conclusion:** The unplanned readmission rate within 31 days after colorectal cancer surgery was 11.73%. Current evidence suggests that age, postoperative complications, TNM ≥ III, tumor site in the rectum, stoma creation, complicated diabetes, Charlson Comorbidity Index (CCI), blood transfusion (BT), length of hospital stay (LOS), and surgical approach are significant risk factors for unplanned readmission. Conversely, female has been identified as a protective factor. To mitigate these risks and reduce readmission rates, healthcare professionals should implement targeted educational and clinical interventions.", "abstract_zh": "**背景：** 结直肠癌手术后 31 天内意外再入院的高发生率仍然是一个重大挑战。然而，文献中确定的这些再入院的风险因素并不一致。本研究旨在进行全面的荟萃分析，以估计非计划再入院的发生率，并系统地识别与该风险相关的因素，为降低再入院率的针对性干预措施提供有力的证据。\n\n**方法：** 本研究是根据 PRISMA 指南进行的。所有研究步骤，包括研究选择、数据提取和质量评估，均由两位作者独立执行，任何分歧均通过与第三位作者协商解决。对截至 2025 年 1 月的以下数据库中已发表的研究进行了全面检索：VIP 期刊数据库、万方数据、CNKI、SinoMed、PubMed、Embase、Web of Science 和 Cochrane 图书馆。使用 RevMan 5.4 和 Stata 17.0 进行统计分析，p 值小于 0.05 被认为具有统计显着性。\n\n**结果：** 这项荟萃分析确定了在此期间与非计划再入院相关的几个重要危险因素（P < 0.05），包括年龄（OR = 1.13）、术后并发症（OR = 1.87）、肿瘤分期（TNM ≥ III）（OR = 2.01）、直肠肿瘤部位(OR = 1.64)、造口术 (OR = 1.70)、复杂性糖尿病 (OR = 1.56)、查尔森合并症指数 (CCI) (OR = 1.27)、输血 (BT) (OR = 1.24)、住院时间 (LOS) （OR = 1.65）和手术方法（OR = 1.22）。值得注意的是，女性（OR = 0.85）被认为是防止意外再入院的保护因素。\n\n**结论：** 结直肠癌术后31天内非计划再入院率为11.73%。目前的证据表明，年龄、术后并发症、TNM ≥ III、直肠肿瘤部位、造口创建、并发糖尿病、查尔森合并症指数（CCI）、输血（BT）、住院时间（LOS）和手术方式是非计划再入院的重要危险因素。相反，女性被认为是一个保护因素。为了减轻这些风险并降低再入院率，医疗保健专业人员应实施有针对性的教育和临床干预措施。", "keywords_zh": "结直肠癌、荟萃分析、危险因素、非计划再入院", "keywords_en": "Colorectal cancer, Meta-analysis, Risk factors, Unplanned readmission", "link": "https://pubmed.ncbi.nlm.nih.gov/40269754/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 24 Apr 2025"}, {"id": "40260850", "title_en": "Delivery of intravenous anti-cancer therapy at home versus in hospital or community settings for adults with cancer", "title_zh": "在家中与在医院或社区环境中为成人癌症患者提供静脉抗癌治疗", "authors": "Rachelle Buchbinder", "abstract_en": "**Background:** Intravenous (IV) chemotherapy and immunotherapy are administered at frequent, regular intervals (weekly to four-weekly) for 4 to 24 months, with treatment sessions lasting between 20 minutes and several hours for adults with cancer. These treatments are usually given in chemotherapy day units in hospitals as same-day treatments. However, less complex anti-cancer therapy regimens may be administered in the participant's home.\n\n**Objectives:** To assess the safety, patient preference for, and cost of IV (including subcutaneous) anti-cancer therapy (chemotherapy or immunotherapy) delivered at home as an alternative to the same IV anti-cancer therapy regimen delivered in a hospital or community setting in adults with cancer.\n\n**Search Methods:** We searched CENTRAL, Cochrane Database of Systematic Reviews, MEDLINE, Embase, CINAHL, NHS Economic Evaluation Database, Cost-Effectiveness Analysis Registry and trial registries (ClinicalTrials.gov and WHO-ICTRP) from inception until 16 October 2024. We also searched PDQ Evidence and Epistemonikos for related systematic reviews. We screened reference lists of included studies and relevant systematic reviews.\n\n**Selection Criteria:** We included randomised parallel and cross-over trials, conducted in adults (aged 18 years and over) diagnosed with any type and stage of cancer requiring IV anti-cancer chemotherapy or immunotherapy. Eligible studies compared delivery of IV anti-cancer therapy at home with delivery of the same therapy in a hospital setting (as an inpatient or outpatient), or in the community setting (e.g. GP practice, community clinic). We included economic evaluation studies (i.e. cost-effectiveness analyses, cost-utility analyses, cost-benefit analyses) conducted alongside eligible effectiveness studies. Primary outcomes were adverse events, hospital inpatient admission and additional hospital attendance (e.g. emergency department visit) within 48 hours of administration of anti-cancer therapy, IV line complications, participant preference, and cost of delivering IV anti-cancer therapy from a healthcare system perspective.\n\n**Data Collection And Analysis:** Two review authors selected studies for inclusion, extracted trial characteristics and numerical data, assessed risk of bias, and judged the certainty of evidence using the GRADE approach. The main comparison was delivery of IV anti-cancer therapy at home versus in a hospital outpatient clinic. The primary time points of interest for outcomes related to serious adverse events, complications and cost were those collected at the longest follow-up postintervention. For outcomes such as participant preference, participant quality of life, participant and caregiver satisfaction, and non-adherence to the treatment regimen, data collected at time points as soon as possible after the intervention were of primary interest.\n\n**Main Results:** We identified seven eligible trials (three parallel RCTs, four randomised cross-over trials; 401 randomised participants, with 272 participants included in the final analyses) and five ongoing trials. Five included trials were performed prior to the 2000s and two were performed between 2007 and 2011. Trial participants' mean age ranged from 60 to 70 years. Four trials recruited a mix of cancer patients, including breast, colon, rectum, pancreatic, pancreaticobiliary, non-Hodgkin's lymphoma, lung, and head and neck cancer. Three trials focused on specific cancers (i.e. colorectal cancer, breast cancer, colon cancer). Seven trials compared delivery of IV anti-cancer therapy at home versus in a hospital outpatient clinic. One trial compared delivery of IV anti-cancer therapy in the participant's home, in the hospital outpatient clinic, and in local general practice surgery. All participants were assessed either by a physician or trained chemotherapy nurse prior to receiving each treatment cycle, and trained chemotherapy nurses administered the therapy, as per standard clinical practice, in all settings in all trials. We judged three trials as having low overall risk of bias. In four trials, the overall risk of bias was unclear due to poorly reported study methods, failing to report assessed data points and inaccessible study protocols. Due to the very low certainty of the evidence, we are uncertain of the effect of delivering IV anti-cancer therapy at home versus in the hospital outpatient clinic on the response to and management of adverse events, on both hospital inpatient admission and additional hospital attendance within 48 hours of administration of anti-cancer therapy, and on IV line complications (including infection and thrombosis). Based on low-certainty evidence, participants receiving therapy at home may be more likely to prefer future treatments at home, after receiving treatment in this setting (35 more per 100, 10 to 70 more; data from 1 RCT with 65 participants). Based on low-certainty evidence, delivering IV anti-cancer therapy at home may make little or no difference to the cost of the treatment from the healthcare system perspective in comparison to delivering it in the hospital outpatient clinic (mean cost (in 2022 Australian dollars (AUD)) per treatment at home: 126 AUD less; 1798 AUD less to 1546 AUD more; data from 2 RCTs with 80 participants). We are uncertain of the effect of delivering IV anti-cancer therapy at home, versus a local GP surgery, on the response to and management of adverse events. No studies reported on hospital inpatient admission. Evidence on additional hospital attendance within 48 hours of administration of anti-cancer therapy is of very low certainty. Low-certainty evidence suggests that compared to receiving treatment in a local GP surgery, participants may or may not be more likely to prefer future treatments at home, and delivering anti-cancer therapy at home may make little or no difference to the cost of the treatment.\n\n**Authors' Conclusions:** Evidence on the safety and cost-effectiveness of IV anti-cancer therapy at home is scarce and outdated. IV anti-cancer regimens have evolved; the findings of studies performed more than a decade ago may lack applicability to current practice. However, key considerations when considering suitability for home treatment remain unchanged: safety, duration of treatment and geographic catchment area. The finding that patients may prefer future treatments at home after receiving treatment in this setting, albeit based upon low-certainty evidence, is consistent with the widespread current practice of delivering IV anti-cancer therapy, including immunotherapies, at home when judged safe and preferred by the patient. Appropriate selection of patients and regimens is a key consideration for ensuring the safety of delivering IV anti-cancer therapy at home.", "abstract_zh": "**背景：** 静脉 (IV) 化疗和免疫疗法以频繁、有规律的间隔（每周至每四周）进行，持续 4 至 24 个月，对于成人癌症患者，治疗持续 20 分钟至几个小时。这些治疗通常在医院的化疗日间单位作为当天治疗进行。然而，不太复杂的抗癌治疗方案可以在参与者的家中进行。\n\n**Objectives：** 评估在家中进行的静脉注射（包括皮下）抗癌治疗（化疗或免疫治疗）的安全性、患者偏好和费用，作为成人癌症患者在医院或社区环境中进行的相同静脉注射抗癌治疗方案的替代方案。\n\n**Search methods：** 我们检索了 CENTRAL、Cochrane 系统评价数据库、MEDLINE、Embase、CINAHL、NHS 经济评估数据库、成本效益分析登记处和试验登记处（ClinicalTrials.gov 和 WHO-ICTRP），从开始到 2024 年 10 月 16 日。我们还检索了 PDQ Evidence 和 Epistemonikos 以获取相关的系统评价。我们筛选了纳入研究的参考文献列表和相关的系统评价。\n\n**Selection criteria：** 我们纳入了随机平行和交叉试验，这些试验在诊断为任何类型和阶段的癌症且需要静脉注射抗癌化疗或免疫治疗的成人（18 岁及以上）中进行。符合条件的研究将在家中进行静脉注射抗癌治疗与在医院环境（住院患者或门诊患者）或社区环境（例如全科医生诊所、社区诊所）中进行相同的治疗进行了比较。我们纳入了与合格的有效性研究一起进行的经济评估研究（即成本效益分析、成本效用分析、成本效益分析）。主要结局是抗癌治疗后 48 小时内的不良事件、住院患者入院和额外就诊（例如急诊科就诊）、IV 线并发症、参与者偏好以及从医疗保健系统角度提供 IV 抗癌治疗的成本。\n\n**Data collection and analysis：** 两位综述作者选择纳入研究，提取试验特征和数值数据，评估偏倚风险，并使用 GRADE 方法判断证据的确定性。主要比较是在家中与在医院门诊诊所进行静脉注射抗癌治疗。与严重不良事件、并发症和费用相关的结果的主要关注时间点是在干预后最长的随访中收集的时间点。对于参与者偏好、参与者生活质量、参与者和护理人员满意度以及不遵守治疗方案等结果，干预后尽快在时间点收集的数据是主要关注点。\n\n**Main results：** 我们确定了 7 项符合条件的试验（3 项平行随机对照试验、4 项随机交叉试验；401 名随机受试者，其中 272 名受试者纳入最终分析）和 5 项正在进行的试验。其中五项试验是在 2000 年代之前进行的，两项试验是在 2007 年至 2011 年之间进行的。试验参与者的平均年龄为 60 岁至 70 岁。四项试验招募了多种癌症患者，包括乳腺癌、结肠癌、直肠癌、胰腺癌、胰胆癌、非霍奇金淋巴瘤、肺癌和头颈癌。三项试验侧重于特定癌症（即结直肠癌、乳腺癌、结肠癌）。七项试验比较了在家和医院门诊进行静脉注射抗癌治疗。一项试验比较了在参与者家中、医院门诊诊所和当地全科手术中进行静脉注射抗癌治疗的情况。在接受每个治疗周期之前，所有参与者均由医生或经过培训的化疗护士进行评估，并由经过培训的化疗护士按照标准临床实践在所有试验的所有环境中进行治疗。我们判断三项试验总体偏倚风险较低。在四项试验中，由于研究方法报告不充分、未能报告评估的数据点以及无法获取的研究方案，总体偏倚风险尚不清楚。由于证据的质量非常低，我们不确定在家进行静脉注射抗癌治疗与在医院门诊进行治疗相比，对不良事件的反应和管理、抗癌治疗后 48 小时内住院患者入院和额外就诊以及静脉注射并发症（包括感染和血栓形成）的影响。根据低确定性证据，在家接受治疗的参与者在这种环境下接受治疗后，可能更喜欢未来在家接受治疗（每 100 人中多出 35 人，多出 10 到 70 人；数据来自 1 项包含 65 名参与者的随机对照试验）。根据低确定性证据，从医疗保健系统的角度来看，与在医院门诊进行治疗相比，在家进行静脉注射抗癌治疗可能对治疗成本几乎没有影响或没有影响（在家每次治疗的平均成本（以 2022 年澳元 (AUD) 计算）：少 126 澳元；少 1798 澳元至多 1546 澳元；数据来自 80 名受试者的 2 项随机对照试验）。我们不确定在家进行静脉注射抗癌治疗与当地全科医生手术相比，对不良事件的反应和管理的影响。没有研究报告住院患者的入院情况。抗癌治疗后 48 小时内额外住院的证据的确定性非常低。低质量证据表明，与在当地全科医生手术中接受治疗相比，参与者可能会或可能不会更喜欢未来在家中的治疗，并且在家提供抗癌治疗可能对患者来说几乎没有影响或没有影响。\n\n**Authors' conclusions：** 关于家庭静脉注射抗癌治疗的安全性和成本效益的证据很少且已经过时。静脉注射抗癌疗法已经发展；十多年前进行的研究结果可能不适用于当前的实践。然而，在考虑是否适合家庭治疗时，关键考虑因素保持不变：安全性、治疗持续时间和地理覆盖区域。尽管基于低确定性证据，但患者在这种情况下接受治疗后可能更喜欢未来在家接受治疗的发现与当前广泛的在家中进行静脉注射抗癌治疗（包括免疫治疗）的做法是一致的，当患者认为安全且首选时，在家中进行静脉注射抗癌治疗（包括免疫治疗）。适当选择患者和方案是确保在家进行静脉抗癌治疗安全的关键考虑因素。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40260850/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 22 Apr 2025"}, {"id": "40246613", "title_en": "Carb
