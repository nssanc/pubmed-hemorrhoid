vance scientific understanding and provide guidance for the optimisation of physiotherapy practice within enhanced recovery pathways.\n\n**Materials And Methods:** A systematic review of the literature between 2000 and 2024 was conducted to identify studies of physiotherapy interventions in general surgical populations following an enhanced recovery protocol.\n\n**Results:** Ten studies met the inclusion criteria. Six studies were conducted in colorectal patients, one study (plus a secondary analysis) was conducted in radical cystectomy patients, one in head and neck patients undergoing oncologic resection, and one included a mixed patient sample (colon, rectum, stomach, pancreas and liver surgery). Interventions involving early physiotherapy were found to benefit postoperative walking distance, achievement of activities of daily living and length of stay in hospital. There was mixed evidence for influence on readiness for discharge, quality of recovery measures and health-related quality of life. No consistent effects were observed for inpatient satisfaction or functional outcome.\n\n**Conclusion:** This review supports the feasibility and potential benefits of a structured physiotherapy interventions within enhanced recovery protocols. These results highlight the potential for structured mobilisation interventions to enhance recovery, particularly when supported by education and technology-based strategies.", "abstract_zh": "**介绍：** 物理治疗是加速康复方案的关键组成部分，特别是在启动早期活动和支持恢复功能独立方面。尽管如此，仍缺乏关于最佳动员后物理治疗策略的指导。本系统综述旨在综合并严格评估普通外科患者加速康复途径术后物理治疗干预的最新证据。本综述旨在增进科学理解，并为加速康复途径中物理治疗实践的优化提供指导。\n\n**材料与方法：** 对 2000 年至 2024 年期间的文献进行了系统回顾，以确定在加速康复方案后对普通手术人群进行物理治疗干预的研究。\n\n**结果：** 十项研究符合纳入标准。六项研究在结直肠患者中进行，一项研究（加上二次分析）是在根治性膀胱切除术患者中进行的，一项研究是在接受肿瘤切除术的头颈部患者中进行的，一项研究包括混合患者样本（结肠、直肠、胃、胰腺和肝脏手术）。研究发现，涉及早期物理治疗的干预措施有利于术后步行距离、日常生活活动的完成度和住院时间。对于出院准备、康复措施质量和健康相关生活质量的影响，证据不一。对于住院患者满意度或功能结果没有观察到一致的效果。\n\n**结论：** 这篇综述支持了强化康复方案中结构化物理治疗干预措施的可行性和潜在益处。这些结果凸显了结构化动员干预措施在促进康复方面的潜力，特别是在教育和技术战略的支持下。", "keywords_zh": "加速康复外科 (ERAS)、活动、物理治疗、恢复、康复、手术", "keywords_en": "Enhanced recovery after surgery (ERAS), Mobilisation, Physiotherapy, Recovery, Rehabilitation, Surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40972340/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 19 Sep 2025"}, {"id": "40968352", "title_en": "Stroke risk in cancer survivors: A meta-analysis and meta regression", "title_zh": "癌症幸存者的中风风险：荟萃分析和荟萃回归", "authors": "Rommel Mario Rodríguez Burbano", "abstract_en": "**Introduction:** It is suggested that survivors of different types of cancer may have an increased risk of stroke. Our study aims to evaluate cancer patients and non-cancer controls by analyzing stroke events in each group. Previous studies concluded that certain types of cancer increased stroke risk, however, their results had significant heterogeneity and statistical concerns.\n\n**Methods:** Medline, Embase, and Cochrane databases were systematically searched until February 18th, 2024, assessing stroke in cancer survivor patients compared to the global population. Data were examined using the Mantel-Haenszel method and 95% CIs. Heterogeneity was assessed using I² statistics. Rstudio software, version 4.2.3., was used for statistical analysis.\n\n**Results:** A total of 18 studies were included, and stroke was reported in both cancer and non-cancer groups. Breast cancer (HR 1.09; 95% CI 1.02-1.17; p = 0.01; I²= 0%), Central Nervous System cancers (HR 2.47; 95% CI 1.01-6.01; p = 0.047; I²= 78%), cervical cancers (HR 1.58; 95% CI 1.19-2.09; p = 0.001; I²= 0%), head and neck cancers (HR 1.4439; 95% CI 1.3095-1.5922; p < 0.001; I²=31.5%), lung cancers (HR 1.60; 95% CI 1.40-1.83; p < 0.001; I²=67%), multiple myeloma (HR 1.58; 95% CI 1.32-1.89; p < 0.001; I²= 49%), nasopharyngeal cancers (HR 1.9178; 95% CI 1.3358-2.7533; p < 0.001; I²=89.7%), oesophageal cancers (HR 1.33; 95% CI 1.07-1.65; p = 0.009; I²= 0%), ovarian cancers (HR 1.33; 95% CI 1.07-1.65; p = 0.01; I²= 38%), pancreatic cancers (HR 2,70; 95% CI 2.34-3.11; p < 0.001; I²= 0%) and rectum cancers (HR 1.29; 95% CI 1.01-1.63; p = 0.04; I²= 0%) showed statistically significant differences between groups in favor of non-cancer controls.\n\n**Conclusions:** In this meta-analysis, the stroke risk was increased in all cancers that reached statistical significance. Furthermore, our study brings relevant data to the body of literature concerning this long-term clinical uncertainty.", "abstract_zh": "**介绍：** 研究表明，不同类型癌症的幸存者患中风的风险可能会增加。我们的研究旨在通过分析每组的中风事件来评估癌症患者和非癌症对照。先前的研究得出的结论是，某些类型的癌症会增加中风风险，然而，他们的结果存在显着的异质性和统计问题。\n\n**方法：** 截至 2024 年 2 月 18 日，对 Medline、Embase 和 Cochrane 数据库进行了系统检索，评估了癌症幸存者患者中风与全球人口的情况。使用 Mantel-Haenszel 方法和 95% CI 检查数据。使用 I² 统计数据评估异质性。使用Rstudio软件4.2.3版进行统计分析。\n\n**结果：** 总共纳入了 18 项研究，癌症组和非癌症组均报告了中风。乳腺癌（HR 1.09；95% CI 1.02-1.17；p = 0.01；I²= 0%）、中枢神经系统癌症（HR 2.47；95% CI 1.01-6.01；p = 0.047；I²= 78%）、宫颈癌（HR 1.58；95% CI 1.19-2.09；p = 0.001；I²= 0%）、头颈癌（HR 1.4439；95% CI 1.3095-1.5922；p < 0.001；I²=31.5%）、肺癌（HR 1.60；95% CI 1.40-1.83；p< 0.001；I²=67%）、多发性骨髓瘤（HR 1.58；95% CI 1.32-1.89；p< 0.001；I²= 49%）、鼻咽癌（HR 1.9178；95% CI 1.3358-2.7533；p < 0.001；I²=89.7%）、食道癌（HR 1.33；95% CI 1.07-1.65；p = 0.009；I²= 0%）、卵巢癌（HR 1.33；95% CI 1.07-1.65；p = 0.01；I²= 38%）、胰腺癌（HR 2.70；95% CI 2.34-3.11；p < 0.001；I²= 0%）和直肠癌（HR 1.29；95% CI 1.01-1.63； p = 0.04；I²= 0%）显示组间存在统计学显着差异，有利于非癌症对照。\n\n**结论：** 在这项荟萃分析中，所有癌症的中风风险均增加，并达到统计学显着性。此外，我们的研究为有关这种长期临床不确定性的文献提供了相关数据。", "keywords_zh": "癌症幸存者、荟萃分析、中风风险", "keywords_en": "Cancer survivors, Meta-Analysis, Stroke risk", "link": "https://pubmed.ncbi.nlm.nih.gov/40968352/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 19 Sep 2025"}, {"id": "40956186", "title_en": "Clinicopathological characteristics and biomarker alterations in early-onset vs. late-onset colorectal cancer: a systematic review and meta-analysis", "title_zh": "早发性结直肠癌与晚发性结直肠癌的临床病理学特征和生物标志物变化：系统评价和荟萃分析", "authors": "Lie Yang", "abstract_en": "**Background:** The clinicopathological and molecular characteristics of early-onset colorectal cancer (EOCRC) are unclear. In this study, we compared the clinicopathological features, biomarkers, and prognoses between EOCRC and late-onset colorectal cancer (LOCRC).\n\n**Methods:** A search was conducted on PubMed, Web of Science, Embase, and Cochrane Library from inception to May 2024. The key outcomes were clinicopathological features, prevalence of molecular biomarker alterations, and 5-year overall survival (OS), with pooled odds ratios (ORs) and hazard ratios (HRs), along with their corresponding 95% confidence intervals (CIs), calculated for each outcome.\n\n**Results:** Forty studies were included in the final analysis. EOCRC exhibited distal colon and rectum localization (OR: 0.59; 95% CI: 0.55-0.62; P < 0.001), was poorly differentiated (OR: 0.56; 95% CI: 0.52-0.60; P = 0.01), tended to be more mucinous or signet-ring cell carcinoma (OR: 0.56; 95% CI: 0.52-0.60; P < 0.001), and was associated with advanced stages (OR: 1.49; 95% CI: 1.30-1.71; P < 0.001), lymph node metastasis (LNM) (OR: 0.56; 95% CI: 0.53-0.60; P < 0.001), and distant metastasis (OR: 1.29; 95% CI: 1.04-1.60; P = 0.02). EOCRC exhibited higher TP53 mutation rates (OR: 1.33; 95% CI: 1.13-1.58; P < 0.001), MSI-H status (OR: 1.45; 95% CI: 1.10-1.92; P = 0.01), but lower PIK3CA mutation rates (OR: 0.93; 95% CI: 0.88-0.99; P = 0.03). EOCRC and LOCRC had similar 5-year OS rates (HR: 1.01; 95% CI: 0.79-1.30; P = 0.92). Although no significant difference was observed in the APC, BRAF, KRAS, NRAS, SM4D4, and MMR, subgroup analyses revealed that BRAF ( P = 0.01), KRAS mutations ( P < 0.001), and DNA hypermethylation ( P = 0.01) were less prevalent among westerners.\n\n**Conclusion:** EOCRC often presents with more aggressive and metastatic features due to its frequent diagnosis at advanced stages. TP53 mutations and the MSI-H status are prevalent in EOCRC. EOCRC's prognosis is often comparable to LOCRC. Radical and tailored treatment strategies should be developed to improve the survival outcomes in advanced and metastatic EOCRC.", "abstract_zh": "**背景：** 早发性结直肠癌（EOCRC）的临床病理学和分子特征尚不清楚。在这项研究中，我们比较了 EOCRC 和晚发结直肠癌 (LOCRC) 的临床病理特征、生物标志物和预后。\n\n**方法：** 从开始到 2024 年 5 月，我们在 PubMed、Web of Science、Embase 和 Cochrane 图书馆上进行了检索。主要结果是临床病理学特征、分子生物标记物改变的发生率和 5 年总生存率 (OS)，以及针对每个结果计算的汇总比值比 (OR) 和风险比 (HR) 及其相应的 95% 置信区间 (CI)。\n\n**结果：** 最终分析中纳入了四十项研究。 EOCRC 表现出远端结肠和直肠定位（OR：0.59；95% CI：0.55-0.62；P < 0.001），分化不良（OR：0.56；95% CI：0.52-0.60；P = 0.01），倾向于更多粘液性或印戒细胞癌（OR：0.56；95% CI： 0.52-0.60；P < 0.001），并且与晚期（OR：1.49；95% CI：1.30-1.71；P < 0.001）、淋巴结转移（LNM）（OR：0.56；95% CI：0.53-0.60；P < 0.001）和远处转移（OR： 1.29；95% CI：1.04-1.60；P = 0.02）。 EOCRC 表现出较高的 TP53 突变率（OR：1.33；95% CI：1.13-1.58；P < 0.001）、MSI-H 状态（OR：1.45；95% CI：1.10-1.92；P = 0.01），但 PIK3CA 突变率较低（OR：0.93；95% CI： 0.88-0.99；P = 0.03）。 EOCRC 和 LOCRC 的 5 年 OS 率相似（HR：1.01；95% CI：0.79-1.30；P = 0.92）。尽管APC、BRAF、KRAS、NRAS、SM4D4和MMR没有观察到显着差异，但亚组分析显示BRAF（P=0.01）、KRAS突变（P<0.001）和DNA高甲基化（P=0.01）在西方人中较少见。\n\n**结论：** 由于 EOCRC 经常在晚期诊断，因此通常表现出更具侵袭性和转移性的特征。 TP53 突变和 MSI-H 状态在 EOCRC 中普遍存在。 EOCRC 的预后通常与 LOCRC 相当。应制定根治性和量身定制的治疗策略，以改善晚期和转移性 EOCRC 的生存结果。", "keywords_zh": "临床病理特征, 结直肠癌, 早发型, 分子生物标志物, 生存", "keywords_en": "clinicopathological features, colorectal cancer, early-onset, molecular biomarker, survival", "link": "https://pubmed.ncbi.nlm.nih.gov/40956186/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 16 Sep 2025"}, {"id": "40944330", "title_en": "Efficacy and safety of methylene blue for postoperative pain of haemorrhoids: a systematic review and meta-analysis", "title_zh": "亚甲蓝治疗痔疮术后疼痛的疗效和安全性：系统评价和荟萃分析", "authors": "Li Xu", "abstract_en": "**Objectives:** Pain is a common complication after haemorrhoid surgery. In addition to anaesthetic methods, surgical techniques and postoperative interventions, surgeons also use intraoperative adjuncts to alleviate postoperative pain. This study aims to evaluate the effectiveness and safety of methylene blue in reducing postoperative pain in haemorrhoid patients.\n\n**Methods:** A search was conducted in PubMed, Embase, Cochrane Library and Web of Science for randomized controlled trials (RCTs) up until 9 December 2024, involving methylene blue use for pain relief after haemorrhoid surgery. Two reviewers independently assessed the study eligibility, extracted data and evaluated the risk of bias. Data analysis was performed using Stata 18 software. The primary outcome was the visual analogue scale (VAS) pain scores at different time points within 14 days postoperatively. Secondary outcomes included the number of patients requiring analgesics and the occurrence of complications.\n\n**Results:** 358 articles were retrieved and six studies involving 598 patients were included after screening. Compared with the control group, the use of methylene blue reduced pain within 12 h postoperatively(WMD -1.582, 95% CI -2.834 to -0.330, <i>p</i> = .013), as well as on day 2 (WMD -1.441, 95% CI - 1.874 to -1.008, <i>p</i> < .0001), day 3 (WMD -0.975, 95% CI -1.309 to -0.641, <i>p</i> < .0001), day 5(WMD -0.786, 95% CI -1.094 to -0.478, <i>p</i> = .028) and day 7 (WMD -0.679, 95% CI -1.257 to -0.101, <i>p</i> = .021), decreased the number of patients using analgesics(RR 0.293, 95% CI 0.203 to 0.422, <i>p</i> < .0001) and did not increase the incidence of complications(RR 0.65, 95% CI 0.39-1.10, <i>p</i> = .111) such as urinary retention, secondary haemorrhage, pruritus, temporary incontinence, wound infection, or local skin reactions.\n\n**Conclusions:** This study shows that methylene blue can reduce postoperative pain, decrease analgesic use and does not increase complications after haemorrhoid surgery.", "abstract_zh": "**Objectives：** 疼痛是痔疮手术后常见的并发症。除了麻醉方法、手术技术和术后干预外，外科医生还使用术中辅助手段来减轻术后疼痛。本研究旨在评估亚甲蓝减轻痔疮患者术后疼痛的有效性和安全性。\n\n**方法：** 在 PubMed、Embase、Cochrane 图书馆和 Web of Science 中检索了截至 2024 年 12 月 9 日的随机对照试验 (RCT)，涉及亚甲蓝用于缓解痔疮手术后的疼痛。两名评审员独立评估研究资格、提取数据并评估偏倚风险。使用Stata 18软件进行数据分析。主要结果是术后14天内不同时间点的视觉模拟评分（VAS）疼痛评分。次要结局包括需要镇痛药的患者数量和并发症的发生率。\n\n**结果：** 筛选后共检索到 358 篇文章，纳入 6 项涉及 598 名患者的研究。与对照组相比，使用亚甲基蓝可减轻术后 12 小时内的疼痛（WMD -1.582，95% CI -2.834 至 -0.330，<i>p</i> = .013）以及第 2 天（WMD -1.441，95% CI -1.874 至 -1.008， <i>p</i> < .0001），第 3 天（WMD -0.975，95% CI -1.309 至 -0.641，<i>p</i> < .0001），第 5 天（WMD -0.786，95% CI -1.094 至 -0.478， <i>p</i> = .028）和第7天（WMD -0.679，95% CI -1.257至-0.101，<i>p</i> = .021），使用镇痛药的患者数量减少（RR 0.293，95% CI 0.203至0.422， <i>p</i> < .0001），并且不会增加尿潴留、继发性出血、瘙痒、暂时失禁、伤口感染或局部皮肤反应等并发症的发生率（RR 0.65，95% CI 0.39-1.10，<i>p</i> = .111）。\n\n**结论：** 这项研究表明，亚甲蓝可以减轻术后疼痛，减少镇痛药的使用，并且不会增加痔疮手术后的并发症。", "keywords_zh": "镇痛，痔疮切除术，亚甲蓝，术后疼痛", "keywords_en": "Analgesia, haemorrhoidectomy, methylene blue, postoperative pain", "link": "https://pubmed.ncbi.nlm.nih.gov/40944330/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 13 Sep 2025"}, {"id": "40914745", "title_en": "Robotic versus laparoscopic total mesorectal excision for mid-low rectal cancer after neoadjuvant chemoradiotherapy: a systematic review and meta-analysis of oncological, perioperative, and survival-related outcomes", "title_zh": "新辅助放化疗后机器人与腹腔镜全直肠系膜切除术治疗中低位直肠癌：肿瘤学、围手术期和生存相关结果的系统评价和荟萃分析", "authors": "Shukai Wang", "abstract_en": "A major cause of cancer death, colorectal cancer is becoming more common in younger people. The comparative effectiveness of robotic versus laparoscopic total mesorectal excision (TME) as surgical interventions for mid-low rectal cancer following neoadjuvant chemoradiotherapy (nCRT) remains uncertain. To systematically evaluate oncological, perioperative, and survival outcomes of robotic versus laparoscopic surgery for mid-low rectal cancer following nCRT. A PRISMA-compliant systematic review and meta-analysis included 20 non-randomized studies (13,212 patients) from Web of Science, PubMed, and Embase up to July 2025. Outcomes encompassed pathological completeness (circumferential resection margin, TME quality), perioperative metrics (operative duration, conversion rates), complications, and survival (5-year OS/DFS). Risk of bias was assessed via ROBINS-I; statistical synthesis utilized RevMan5.4 and hazard ratios derived from Kaplan-Meier curves. This meta-analysis of 20 non-randomized studies (13,212 patients) found no significant differences in 5-year overall survival (HR: 1.07, 95% CI 0.20-5.66, p = 0.94, I<sup>2</sup> = 98%) or disease-free survival (HR: 1.16, 95% CI 0.72-1.89, p = 0.54, I<sup>2</sup> = 0%) between robotic and laparoscopic TME after nCRT. Robotic surgery demonstrated superior technical outcomes, including higher rates of complete TME (OR: 1.97, p = 0.02) and reduced conversion to open surgery (OR: 0.46, p < 0.001), but required significantly longer operative time (WMD: + 42.09 min, p < 0.001). Perioperative metrics showed equivalence in intraoperative blood loss (p = 0.20), hospitalization duration (p = 0.78), and postoperative complications, including anastomotic leakage (5.4% vs. 6.5%, p = 0.28) and Clavien-Dindo III-IV events (OR: 1.11, p = 0.54). Pathological outcomes were comparable, with no differences in circumferential resection margin positivity (OR: 1.0, p = 1), distal margin length (p = 0.92), or lymph-node yield (p = 0.55). Local (OR: 0.85, p = 0.34) and distant recurrence rates (p = 0.99) were statistically indistinguishable. Risk-of-bias assessment revealed confounding risks in non-randomized designs, underscoring the need for RCT validation. Robotic and laparoscopic TME achieve equivalent long-term survival and oncological control after nCRT, with robotic advantages in technical precision counterbalanced by prolonged operative duration. The equivalence underscores nCRT's dominant role in tumor control, while procedural differences highlight context-dependent surgical feasibility. High heterogeneity in survival data and reliance on non-randomized evidence necessitate validation through rigorously designed RCTs incorporating standardized protocols and patient-reported functional outcomes.", "abstract_zh": "作为癌症死亡的主要原因，结直肠癌在年轻人中变得越来越常见。机器人与腹腔镜全直肠系膜切除术（TME）作为新辅助放化疗（nCRT）后中低位直肠癌手术干预的效果仍不确定。系统评估 nCRT 后机器人与腹腔镜手术治疗中低位直肠癌的肿瘤学、围手术期和生存结果。符合 PRISMA 标准的系统评价和荟萃分析包括截至 2025 年 7 月来自 Web of Science、PubMed 和 Embase 的 20 项非随机研究（13,212 名患者）。结果包括病理完整性（圆周切除边缘、TME 质量）、围手术期指标（手术持续时间、转换率）、并发症和生存率（5 年 OS/DFS）。通过 ROBINS-I 评估偏倚风险；统计综合利用 RevMan5.4 和源自 Kaplan-Meier 曲线的风险比。这项对 20 项非随机研究（13,212 名患者）的荟萃分析发现，5 年总生存率（HR：1.07，95% CI 0.20-5.66，p = 0.94，I<sup>2</sup> = 98%）或无病生存率（HR：1.16，95% CI）没有显着差异nCRT 后机器人 TME 与腹腔镜 TME 之间的差异为 0.72-1.89，p = 0.54，I<sup>2</sup> = 0%）。机器人手术表现出优越的技术成果，包括更高的完全 TME 率（OR：1.97，p = 0.02）和减少中转开放手术（OR：0.46，p < 0.001），但需要明显更长的手术时间（WMD： + 42.09 分钟，p < 0.001）。围手术期指标显示术中失血量 (p = 0.20)、住院时间 (p = 0.78) 和术后并发症，包括吻合口瘘（5.4% vs. 6.5%，p = 0.28）和 Clavien-Dindo III-IV 事件（OR：1.11，p = 0.54）等方面的等效性。病理结果具有可比性，环周切缘阳性率（OR：1.0，p = 1）、远端切缘长度（p = 0.92）或淋巴结产量（p = 0.55）没有差异。局部复发率（OR：0.85，p = 0.34）和远处复发率（p = 0.99）在统计学上无法区分。偏倚风险评估揭示了非随机设计中的混杂风险，强调了 RCT 验证的必要性。机器人和腹腔镜 TME 在 nCRT 后实现了同等的长期生存和肿瘤控制，机器人在技术精度方面的优势被延长的手术时间所抵消。这种等同性强调了 nCRT 在肿瘤控制中的主导作用，而程序差异则强调了手术可行性。生存数据的高度异质性和对非随机证据的依赖需要通过严格设计的随机对照试验（结合标准化方案和患者报告的功能结果）进行验证。", "keywords_zh": "腹腔镜手术、Meta分析、中低位直肠癌、新辅助放化疗、机器人手术、全直肠系膜切除术", "keywords_en": "Laparoscopic surgery, Meta-analysis, Mid–low rectal cancer, Neoadjuvant chemoradiotherapy, Robotic surgery, Total mesorectal excision", "link": "https://pubmed.ncbi.nlm.nih.gov/40914745/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 06 Sep 2025"}, {"id": "40907429", "title_en": "ICG-FA for Anastomotic Leak Prevention During Minimally Invasive Colorectal Surgery: A Meta-analysis", "title_zh": "ICG-FA 在微创结直肠手术期间预防吻合口漏：荟萃分析", "authors": "Muhammad Shehryar Hussain", "abstract_en": "**Introduction:** Anastomotic leakage is a serious complication after colorectal surgery. Indocyanine green fluorescence angiography (ICG-FA) allows real-time perfusion assessment and may reduce leak rates; however, recent larger randomized clinical trials reported conflicting results. This meta-analysis aimed to clarify the effectiveness of ICG-FA in reducing anastomotic leakage and related complications following minimally invasive colorectal surgery.\n\n**Methods:** We conducted a comprehensive search across the databases to identify relevant studies. The search results were imported into Covidence for article eligibility screening, and all relevant outcomes data were synthesized using risk ratios (RRs) or mean differences with 95% confidence intervals (CIs) in meta-analysis models using RevMan 5.4. CRD420251031138.\n\n**Results:** Six randomized clinical trials involving 3264 participants were included. ICG-FA significantly reduced the risk of overall anastomotic leakage (RR: 0.66, 95% CI [0.53-0.83], P = 0.0005) and complications (RR: 0.88, 95% CI [0.78-0.99], P = 0.03). Subgroup analysis showed a significant reduction in leakage for left-sided anastomoses (RR: 0.57, 95% CI [0.44-0.75], P < 0.0001) but not for right-sided ones (RR: 0.90, 95% CI [0.53-1.51], P = 0.68). No significant differences were found in Clavien-Dindo ≥3 complications, reoperation rates, or hospital stay. However, the ICG-FA group had a longer operation time (mean difference: 5.57, 95% CI [1.56-9.58], P = 0.006).\n\n**Conclusions:** ICG-FA significantly reduces anastomotic leakage and overall complications in minimally invasive colorectal surgery, especially for left-sided anastomoses. However, its use is associated with a slightly longer operative time. Further research is needed to confirm its role in right-sided procedures and long-term outcomes.", "abstract_zh": "**介绍：** 吻合口漏是结直肠手术后的严重并发症。吲哚菁绿荧光血管造影（ICG-FA）可进行实时灌注评估，并可降低渗漏率；然而，最近更大规模的随机临床试验报告了相互矛盾的结果。这项荟萃分析旨在阐明 ICG-FA 在减少微创结直肠手术后吻合口瘘和相关并发症方面的有效性。\n\n**方法：** 我们对数据库进行了全面搜索，以确定相关研究。将搜索结果导入 Covidence 进行文章资格筛选，并使用 RevMan 5.4 在荟萃分析模型中使用风险比 (RR) 或平均差与 95% 置信区间 (CI) 合成所有相关结果数据。 CRD420251031138。\n\n**结果：** 其中包括 6 项随机临床试验，涉及 3264 名参与者。 ICG-FA 显着降低了总体吻合口瘘（RR：0.66，95% CI [0.53-0.83]，P = 0.0005）和并发症（RR：0.88，95% CI [0.78-0.99]，P = 0.03）的风险。亚组分析显示左侧吻合术的渗漏显着减少（RR：0.57，95% CI [0.44-0.75]，P < 0.0001），但右侧吻合术的渗漏没有显着减少（RR：0.90，95% CI [0.53-1.51]，P = 0.68）。 Clavien-Dindo ≥3 种并发症、再手术率或住院时间没有显着差异。然而，ICG-FA组的手术时间较长（平均差：5.57，95% CI [1.56-9.58]，P = 0.006）。\n\n**结论：** ICG-FA 显着减少微创结直肠手术中的吻合口瘘和总体并发症，尤其是左侧吻合术。然而，其使用会导致手术时间稍长。需要进一步的研究来确认其在正确程序和长期结果中的作用。", "keywords_zh": "吻合口漏、结直肠手术、荧光血管造影、ICG、吲哚菁绿、Meta分析、微创手术", "keywords_en": "Anastomotic leakage, Colorectal surgery, Fluorescence angiography, ICG, Indocyanine green, Meta-analysis, Minimally invasive surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40907429/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Sep 2025"}, {"id": "40905480", "title_en": "Neoadjuvant Chemotherapy Without Radiation for Locally Advanced Rectal Cancer: A Meta-analysis of Surgical Outcomes After Total Mesorectal Excision", "title_zh": "局部晚期直肠癌无放射新辅助化疗：全直肠系膜切除后手术结果的荟萃分析", "authors": "Dean A Fergusson", "abstract_en": "**Background:** Neoadjuvant chemotherapy alone (with radiation omission) for locally advanced rectal cancer has been evaluated in several randomized controlled trials. Although oncologic outcomes have been well described, the impact of this treatment strategy on surgical outcomes is unknown.\n\n**Objective:** To evaluate how important surgical outcomes were reported in previous trials comparing neoadjuvant chemotherapy to chemoradiation therapy for locally advanced rectal cancer and to perform a meta-analysis of available data.\n\n**Data Sources:** A systematic review was conducted using MEDLINE, Embase, and the Cochrane Library Databases.\n\n**Study Selection:** All published randomized controlled trials that compared neoadjuvant chemotherapy to chemoradiation for MRI-staged rectal adenocarcinoma.\n\n**Interventions:** Neoadjuvant chemotherapy alone (with radiation omission).\n\n**Main Outcome Measures:** Postoperative surgical outcomes, including anastomotic leak, diverting ostomy use, ostomy nonreversal, 30-day postoperative morbidity, and postoperative bowel function.\n\n**Results:** Four randomized controlled trials met eligibility criteria and were included for data analysis. Oncologic outcomes demonstrated that neoadjuvant chemotherapy was equivalent or noninferior to chemoradiation therapy. Anastomotic leak and use of diverting ostomy were reported in 3 of the 4 trials, whereas 30-day postoperative morbidity and ostomy nonreversal were reported in only 2 trials. Bowel function was measured in 3 trials but was measured and reported differently in each trial. On meta-analysis, neoadjuvant chemotherapy was associated with a significant reduction in anastomotic leak (relative risk [RR] 0.54; 95% CI, 0.35-0.81), use of diverting ostomy (RR 0.79; 95% CI, 0.70-0.88), and ostomy nonreversal (RR 0.37; 95% CI, 0.15-0.93). There was no association between neoadjuvant chemotherapy and 30-day postoperative morbidity (RR 0.88; 95% CI, 0.53-1.45).\n\n**Limitations:** A small number of included trials with heterogeneity in outcome definitions was the limitation.\n\n**Conclusions:** Important surgical outcomes were not reported in trials comparing neoadjuvant chemotherapy alone to chemoradiation therapy for locally advanced rectal cancer. Based on the limited data available, chemotherapy alone was associated with reduced risk of anastomotic leak, diverting ostomy use, and ostomy nonreversal. See Video Abstract .", "abstract_zh": "**背景：** 多项随机对照试验已对单独新辅助化疗（省略放疗）治疗局部晚期直肠癌进行了评估。尽管肿瘤学结果已得到很好的描述，但这种治疗策略对手术结果的影响尚不清楚。\n\n**目的：** 评估先前比较新辅助化疗与放化疗治疗局部晚期直肠癌的试验中报告的手术结果的重要性，并对现有数据进行荟萃分析。\n\n**Data sources：** 使用 MEDLINE、Embase 和 Cochrane 图书馆数据库进行了系统评价。\n\n**Study selection：** 所有已发表的随机对照试验都对 MRI 分期直肠腺癌的新辅助化疗与放化疗进行了比较。\n\n**Interventions：** 单独新辅助化疗（省略放射治疗）。\n\n**Main outcome measures：** 术后手术结果，包括吻合口瘘、分流造口术的使用、造口术不可逆转、术后 30 天的发病率和术后肠功能。\n\n**结果：** 四项随机对照试验符合资格标准并被纳入数据分析。肿瘤学结果表明，新辅助化疗相当于或不劣于放化疗。 4 项试验中有 3 项报告了吻合口瘘和改道造口术的使用，而仅 2 项试验报告了术后 30 天的发病率和造口术不可逆转。在 3 项试验中测量了肠功能，但每项试验的测量和报告都不同。荟萃分析显示，新辅助化疗与吻合口瘘显着减少（相对风险 [RR] 0.54；95% CI，0.35-0.81）、改道造口术的使用（RR 0.79；95% CI，0.70-0.88）和造口非逆转（RR 0.37；95% CI， 0.15-0.93）。新辅助化疗与术后 30 天发病率之间没有关联（RR 0.88；95% CI，0.53-1.45）。\n\n**Limitations：** 少数纳入的试验在结果定义上具有异质性是限制。\n\n**结论：** 在比较单独新辅助化疗与放化疗治疗局部晚期直肠癌的试验中，没有报告重要的手术结果。根据现有的有限数据，单独化疗与降低吻合口瘘、转移造口术使用和造口术不可逆转的风险相关。参见视频摘要。", "keywords_zh": "化疗、新辅助治疗、遗漏放射治疗、直肠癌、手术结果", "keywords_en": "Chemotherapy, Neoadjuvant therapy, Radiation omission, Rectal cancer, Surgical outcomes", "link": "https://pubmed.ncbi.nlm.nih.gov/40905480/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Sep 2025"}, {"id": "40894328", "title_en": "Systematic meta-review: diagnostic accuracy of colon capsule endoscopy for colonic neoplasia with umbrella meta-analysis", "title_zh": "系统荟萃回顾：结肠胶囊内镜检查对结肠肿瘤的伞形荟萃分析诊断准确性", "authors": "Anastasios Koulaouzidis", "abstract_en": "**Background:** Colorectal cancer (CRC) incidence is rising globally, intensifying pressure on endoscopy services. Colon capsule endoscopy (CCE) offers a non-invasive alternative. Despite several systematic reviews showing reasonable polyp detection rates, clinical scepticism remains.\n\n**Objectives:** This meta-review and umbrella meta-analysis aim to synthesise evidence on CCE's diagnostic accuracy in polyp and CRC detection, using CT colonography or colonoscopy as the reference standard.\n\n**Methods:** We conducted a systematic search of EMBASE, MEDLINE and PubMed for systematic reviews evaluating the diagnostic accuracy of CCE in detecting polyps and CRC. A qualitative thematic review and synthesis were conducted following PRISMA guidelines. A bivariate generalised linear mixed model with random effects was used for pooled diagnostic accuracy estimates, and meta-regression was performed using restricted maximum likelihood estimation.\n\n**Results:** Nine systematic reviews encompassing 28 unique studies (3472 participants) were included. For polyps of any size, the pooled per-patient sensitivity was 0.79 (95% CI: 0.69-0.86), specificity was 0.77 (95% CI: 0.71-0.82), and the area under the curve (AUC) was 0.81. For polyps ⩾6 mm, sensitivity and specificity were 0.80 and 0.87 (AUC 0.81), and for polyps ⩾10 mm, 0.88 and 0.95 (AUC 0.95), respectively. Second-generation CCE (CCE2) improved diagnostic accuracy across all polyp sizes. For polyps of any size, CCE2 achieved a sensitivity of 0.90, specificity of 0.81 and AUC of 0.82. For polyps ⩾ 6 mm and ⩾10 mm, AUCs were 0.92 and 0.94, respectively. CCE2 showed high sensitivity for detecting any polyp size and polyps ⩾6 mm, with low heterogeneity (<i>p</i> > 0.05, <i>I</i> <sup>2</sup> < 25%). CRC detection sensitivity was 0.96 (95% CI: 0.73-1.00) after excluding cases where the capsule failed to reach the rectum due to battery exhaustion.\n\n**Conclusion:** CCE2 has high diagnostic accuracy for polyps and colorectal cancer detection. While technical challenges persist, CCE2 shows promise as a complementary diagnostic tool to help address the increasing demands for endoscopy services.", "abstract_zh": "**背景：** 全球结直肠癌（CRC）发病率不断上升，加大了内窥镜检查服务的压力。结肠胶囊内窥镜检查 (CCE) 提供了一种非侵入性替代方案。尽管多项系统评价显示息肉检出率合理，但临床仍持怀疑态度。\n\n**Objectives：** 这项荟萃审查和伞式荟萃分析旨在以 CT 结肠成像或结肠镜检查作为参考标准，综合证明 CCE 在息肉和 CRC 检测中诊断准确性的证据。\n\n**方法：** 我们对 EMBASE、MEDLINE 和 PubMed 进行了系统检索，以进行系统评价，评估 CCE 在检测息肉和 CRC 方面的诊断准确性。按照 PRISMA 指南进行了定性主题审查和综合。具有随机效应的二元广义线性混合模型用于汇总诊断准确性估计，并使用限制最大似然估计进行元回归。\n\n**结果：** 其中包括 9 项系统评价，涵盖 28 项独特研究（3472 名参与者）。对于任何大小的息肉，每位患者的汇总敏感性为 0.79（95% CI：0.69-0.86），特异性为 0.77（95% CI：0.71-0.82），曲线下面积 (AUC) 为 0.81。对于≥6mm的息肉，敏感性和特异性分别为0.80和0.87（AUC 0.81），对于≥10mm的息肉，敏感性和特异性分别为0.88和0.95（AUC 0.95）。第二代 CCE (CCE2) 提高了所有息肉尺寸的诊断准确性。对于任何大小的息肉，CCE2 的敏感性为 0.90，特异性为 0.81，AUC 为 0.82。对于 ⩾ 6 mm和⩾10 mm的息肉，AUC分别为0.92和0.94。 CCE2 对检测任何息肉大小和息肉 ⩾6 mm 表现出高灵敏度，异质性低（<i>p</i> > 0.05，<i>I</i> <sup>2</sup> < 25%）。排除胶囊因电池耗尽而未能到达直肠的情况后，CRC 检测灵敏度为 0.96（95% CI：0.73-1.00）。\n\n**结论：** CCE2对于息肉和结直肠癌检测具有较高的诊断准确性。尽管技术挑战仍然存在，但 CCE2 作为一种补充诊断工具有望帮助满足日益增长的内窥镜服务需求。", "keywords_zh": "CCE、CRC检测、CT结肠镜检查、胶囊内镜检查、结肠胶囊内镜检查、结肠镜检查、全肠胶囊内镜检查、息肉、息肉检测、息肉样病变", "keywords_en": "CCE, CRC detection, CT colonoscopy, capsule endoscopy, colon capsule endoscopy, colonoscopy, panenteric capsule endoscopy, polyp, polyp detection, polypoidal lesion", "link": "https://pubmed.ncbi.nlm.nih.gov/40894328/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 02 Sep 2025"}, {"id": "40877526", "title_en": "Outcomes of embolization therapy of superior rectal arteries for the management of grade 1 to 3 internal hemorrhoids: a systematic Review of clinical studies", "title_zh": "直肠上动脉栓塞治疗 1 至 3 级内痔的结果：临床研究的系统评价", "authors": "Jana Al Jnainati", "abstract_en": "**Background:** Superior rectal artery embolization (\"Emborrhoid\") offers a catheter-based alternative for grade I-III internal hemorrhoids when office therapies fail or surgery is undesirable.\n\n**Methods:** Following PRISMA 2020, PubMed and Embase were searched (Jan 2014-Jan 2024). Two reviewers independently screened records, extracted data, and applied RoB 2, ROBINS-I, or an adapted Newcastle-Ottawa Scale. Prespecified outcomes were technical success, clinical success (≥ 2-point fall in bleeding score or equivalent), adverse events, and recurrence. Substantial heterogeneity blocked meta-analysis; results were narratively synthesized.\n\n**Results:** Twenty-two studies encompassing 810 procedures qualified. Technical success reached 93-100%. Clinical success ranged from 63 to 94%, yielding marked bleeding control and symptom relief. Reported complications were mild and self-limited (pelvic discomfort, nausea, and low-grade fever); no ischemic injury, continence disturbance, or mortality occurred. Recurrence necessitating repeat treatment affected 8-20% of patients, usually when collateral arterial supply persisted. Patient-reported satisfaction exceeded 80% in every series. Only two small, heterogeneous comparative studies versus rubber-band ligation or sclerotherapy were available, precluding a pooled analysis.\n\n**Conclusions:** Current evidence suggests Emborrhoid is a safe, effective bridge between office procedures and surgery-particularly valuable for frail or anticoagulated patients. Yet small single-center cohorts, disparate techniques, and scarce head-to-head trials limit external validity. Multicenter randomized studies with harmonized outcomes and ≥ 24-month follow-up are required to confirm long-term efficacy, cost-effectiveness, and optimal patient selection.", "abstract_zh": "**背景：** 当办公室治疗失败或不宜进行手术时，直肠上动脉栓塞术（“栓塞术”）为 I-III 级内痔提供了一种基于导管的替代方案。\n\n**方法：** 继 PRISMA 2020 之后，对 PubMed 和 Embase 进行了检索（2014 年 1 月-2024 年 1 月）。两名评审员独立筛选记录、提取数据并应用 RoB 2、ROBINS-I 或改编的纽卡斯尔-渥太华量表。预先设定的结果是技术成功、临床成功（出血评分下降≥2分或同等水平）、不良事件和复发。显着的异质性阻碍了荟萃分析；结果是叙述性综合的。\n\n**结果：** 涵盖 810 项程序的 22 项研究合格。技术成功率达到93-100%。临床成功率为 63% 至 94%，显着控制出血并缓解症状。报告的并发症轻微且具有自限性（骨盆不适、恶心和低烧）；没有发生缺血性损伤、失禁障碍或死亡。需要重复治疗的复发影响了 8-20% 的患者，通常是在侧支动脉供应持续存在的情况下。每个系列中患者报告的满意度均超过 80%。只有两项小型、异质性与橡皮筋结扎或硬化疗法的比较研究可用，排除了汇总分析。\n\n**结论：** 目前的证据表明，Emborroid 是办公室程序和手术之间的安全、有效的桥梁，对于体弱或接受抗凝治疗的患者尤其有价值。然而，小型单中心队列、不同的技术和稀缺的头对头试验限制了外部有效性。需要具有一致结果的多中心随机研究和≥24个月的随访来确认长期疗效、成本效益和最佳患者选择。", "keywords_zh": "栓塞材料、痔疮栓塞、微创治疗、患者满意度、复发率、直肠上动脉、系统评价", "keywords_en": "Embolic materials, Hemorrhoidal embolization, Minimally invasive therapy, Patient satisfaction, Recurrence rates, Superior rectal artery, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40877526/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 28 Aug 2025"}, {"id": "40876363", "title_en": "Local excision versus total mesorectal excision following neoadjuvant chemoradiotherapy for rectal cancer: A systematic review and meta-analysis", "title_zh": "直肠癌新辅助放化疗后局部切除与全直肠系膜切除：系统评价和荟萃分析", "authors": "Neary Peter", "abstract_en": "**Background:** Total mesorectal excision (TME) with or without neoadjuvant chemoradiotherapy remains the gold standard treatment for rectal cancer. However, newer organ sparing methods, including Local Excision (LE) have been introduced in conjunction with neoadjuvant therapy to improve morbidity and functional outcomes while not impacting on oncological outcomes.\n\n**Methods:** A systematic review and meta-analysis was performed using the PRISMA guidelines. All studies comparing neoadjuvant chemoradiotherapy and local excision versus TME were included from 2000 to 2024. Primary endpoint included local recurrence rates. Secondary outcomes included distant recurrence, disease free survival (DFS), overall survival (OS), and morbidity. Subgroup analysis was performed on randomised control trials (RCT).\n\n**Results:** Sixteen studies (n = 2121; LE = 616, TME = 1505) were included. LE was associated with higher local recurrence (8.3 % vs 5.5 %; OR 1.82, 95 % CI 1.19-2.77, p = 0.006). However, in RCTs (n = 245), this difference was not significant (7.3 % vs 6.6 %; OR 1.10, 95 % CI 0.41-2.97, p = 0.84). No significant differences were observed in distant recurrence, DFS, or OS. LE was associated with significantly reduced morbidity (OR 0.30, 95 % CI 0.18-0.50, p < 0.0001).\n\n**Conclusion:** Local recurrence was not statistically significant in the RCT subgroup analysis. Despite, higher local recurrence rates in the overall pooled analysis, no significant differences were observed for secondary outcomes. Neoadjuvant chemoradiotherapy and local excision appears oncologically safe, defined by DFS and OS, in select patient cohorts with a clinical complete or near-complete response to neoadjuvant therapy.", "abstract_zh": "**背景：** 全直肠系膜切除术（TME）联合或不联合新辅助放化疗仍然是直肠癌的金标准治疗。然而，新的器官保留方法，包括局部切除（LE），已与新辅助治疗结合使用，以改善发病率和功能结果，同时不影响肿瘤结果。\n\n**方法：** 使用 PRISMA 指南进行系统评价和荟萃分析。 2000 年至 2024 年期间所有比较新辅助放化疗和局部切除与 TME 的研究均纳入其中。主要终点包括局部复发率。次要结局包括远处复发、无病生存期（DFS）、总生存期（OS）和发病率。在随机对照试验（RCT）中进行亚组分析。\n\n**结果：** 纳入了 16 项研究（n = 2121；LE = 616，TME = 1505）。 LE 与较高的局部复发率相关（8.3% vs 5.5%；OR 1.82，95% CI 1.19-2.77，p = 0.006）。然而，在随机对照试验 (n = 245) 中，这种差异并不显着（7.3% vs 6.6%；OR 1.10，95% CI 0.41-2.97，p = 0.84）。在远处复发、DFS 或 OS 方面未观察到显着差异。 LE 与发病率显着降低相关（OR 0.30，95% CI 0.18-0.50，p < 0.0001）。\n\n**结论：** 在 RCT 亚组分析中，局部复发没有统计学意义。尽管在总体汇总分析中局部复发率较高，但次要结局没有观察到显着差异。在对新辅助治疗具有临床完全或接近完全反应的选定患者队列中，新辅助放化疗和局部切除似乎在肿瘤学上是安全的（由 DFS 和 OS 定义）。", "keywords_zh": "局部切除、根治性手术、直肠癌、全直肠系膜切除", "keywords_en": "Local excision, Radical surgery, Rectal cancer, Total mesorectal excision", "link": "https://pubmed.ncbi.nlm.nih.gov/40876363/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 28 Aug 2025"}, {"id": "40845608", "title_en": "Transparency in Externally Validated Models: A systematic review of machine learning vs. logistic regression for predicting colorectal anastomotic leakage", "title_zh": "外部验证模型的透明度：对机器学习与逻辑回归预测结直肠吻合口漏的系统评价", "authors": "Freek Daams", "abstract_en": "**Introduction:** Colorectal resection carries a 2.8 %-30 % risk of anastomotic leakage. Machine learning can estimate risks and guide decisions, but clinical implementation remains inadequate due to transparency issues. This review assesses the performance and transparency of machine learning models compared to logistic regression.\n\n**Methods:** A systematic review followed PRISMA guidelines. Medline, Embase, Web of Science, and Cochrane databases were searched for studies using Logistic Regression or Machine Learning with external validation for colorectal anastomotic leakage prediction. Data were extracted using CHARMS, risk of bias assessed with PROBAST, and transparency with TRIPOD + AI.\n\n**Results:** Ten studies were included. Machine learning models were validated on smaller cohorts than logistic regression. Transparency scores ranged from 29 % to 63 %, averaging 45 % for logistic regression and 43 % for machine learning. Reporting of missing data was inconsistent, and external validation was limited. Most studies had a high risk of bias due to small sample sizes and low event counts.\n\n**Conclusion:** In comparison to Logistic regression studies, machine learning studies are limited by small cohorts, low outcome numbers, and a lower level of transparency. Future research should prioritise transparency, adhere to TRIPOD + AI standards, and develop LR and ML models in parallel using the same datasets while ensuring separate models for colon and rectal surgery. Currently, these models are not yet suitable for clinical implementation; more robust and transparent models must be developed based on these recommendations before they can be applied in clinical practice.", "abstract_zh": "**介绍：** 结直肠切除术有 2.8%-30% 的吻合口瘘风险。机器学习可以估计风险并指导决策，但由于透明度问题，临床实施仍然不足。这篇综述评估了机器学习模型与逻辑回归相比的性能和透明度。\n\n**方法：** 系统评价遵循 PRISMA 指南。在 Medline、Embase、Web of Science 和 Cochrane 数据库中搜索了使用 Logistic 回归或机器学习并进行结直肠吻合口漏预测外部验证的研究。使用 CHARMS 提取数据，使用 PROBAST 评估偏倚风险，并使用 TRIPOD + AI 评估透明度。\n\n**结果：** 其中包括十项研究。机器学习模型在比逻辑回归更小的队列上进行了验证。透明度分数范围为 29% 到 63%，逻辑回归平均为 45%，机器学习平均为 43%。缺失数据的报告不一致，外部验证也有限。由于样本量小和事件计数低，大多数研究存在较高的偏倚风险。\n\n**结论：** 与逻辑回归研究相比，机器学习研究受到小群体、低结果数量和较低透明度的限制。未来的研究应优先考虑透明度，遵守 TRIPOD + AI 标准，并使用相同的数据集并行开发 LR 和 ML 模型，同时确保结肠和直肠手术的模型不同。目前，这些模型尚不适合临床实施；必须根据这些建议开发更稳健和透明的模型，然后才能应用于临床实践。", "keywords_zh": "吻合口漏、结直肠手术、Logistic 回归、机器学习、预测", "keywords_en": "Anastomotic leakage, Colorectal surgery, Logistic regression, Machine learning, Prediction", "link": "https://pubmed.ncbi.nlm.nih.gov/40845608/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 22 Aug 2025"}, {"id": "40824311", "title_en": "Abdominoperineal pull-through with delayed coloanal anastomosis for pelvic anastomotic failure-a systematic review", "title_zh": "腹会阴牵引延迟结肠肛管吻合术治疗盆腔吻合失败的系统评价", "authors": "I Seow-En", "abstract_en": "**Aim:** Despite the potential benefits of abdominoperineal pull-through with delayed coloanal anastomosis (DCAA), it is still infrequently performed as a salvage procedure for pelvic anastomotic failure. We aimed to perform a systematic review on the subject to guide practice.\n\n**Method:** PubMed, Embase and Cochrane were used to identify studies evaluating DCAA for salvage after pelvic surgery from inception to August 2024. Risk of bias assessment was performed using the Newcastle-Ottawa scale. The primary outcome was overall stoma-free survival. Secondary outcomes included hospital length of stay, high-grade postoperative complication rates, 30-day postoperative mortality rates, incidence of redo surgical intervention after DCAA, and postoperative anorectal function.\n\n**Results:** Five retrospective cohort studies evaluating a total of 97 patients who underwent salvage abdominoperineal pull-through and DCAA were included in this review. All patients had previous pelvic surgery, predominantly proctectomy (n = 84, 86.6%). The most common indication for redo surgery was chronic fistula (n = 62, 63.9%) followed by anastomotic leak or chronic pelvic sepsis (n = 34, 35.1%). The pooled overall stoma-free survival rate across all five studies was 81.4% over a mean 24-month postoperative follow-up duration. The overall incidence of high-grade complications after DCAA was 39.1% (n = 38). Pooled mean length of stay was 17 days. There were no cases of early postoperative death. Pooled rate of repeat surgery across four studies was 11.6% (n = 8). Pooled mean functional scores across three studies indicated minor low anterior resection syndrome at 26 months.\n\n**Conclusion:** Abdominoperineal pull-through with delayed coloanal anastomosis is a viable option for salvage surgery following pelvic anastomotic complications, with low rates of permanent stoma and acceptable long-term anorectal function.", "abstract_zh": "**Aim：** 尽管腹会阴拉穿延迟结肠肛门吻合术 (DCAA) 具有潜在益处，但它仍然很少作为骨盆吻合失败的挽救手术进行。我们的目的是对该主题进行系统回顾以指导实践。\n\n**Method：** PubMed、Embase 和 Cochrane 被用来识别从开始到 2024 年 8 月评估 DCAA 在盆腔手术后挽救效果的研究。使用纽卡斯尔-渥太华量表进行偏倚风险评估。主要结果是总体无造口生存率。次要结局包括住院时间、术后高级并发症发生率、术后 30 天死亡率、DCAA 后重做手术干预的发生率以及术后肛门直肠功能。\n\n**结果：** 本综述纳入了五项回顾性队列研究，评估了总共 97 名接受挽救性腹会阴牵引术和 DCAA 的患者。所有患者均曾接受过盆腔手术，主要是直肠切除术（n = 84，86.6%）。重做手术最常见的适应症是慢性瘘（n = 62，63.9%），其次是吻合口瘘或慢性盆腔脓毒症（n = 34，35.1%）。在平均 24 个月的术后随访期间，所有五项研究的汇总总体无造口生存率为 81.4%。 DCAA 后高级并发症的总体发生率为 39.1% (n = 38)。合并平均住院时间为 17 天。无术后早期死亡病例。四项研究的重复手术汇总率为 11.6% (n = 8)。三项研究的汇总平均功能评分表明 26 个月时有轻微的低位前切除综合征。\n\n**结论：** 腹会阴牵引联合延迟结肠肛管吻合术是盆腔吻合并发症后挽救手术的可行选择，具有较低的永久性造口率和可接受的长期肛门直肠功能。", "keywords_zh": "腹会阴牵引、结直肠手术、延迟结肠肛门吻合术、重做手术", "keywords_en": "Abdominoperineal pull-through, Colorectal surgery, Delayed coloanal anastomosis, Redo surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40824311/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 18 Aug 2025"}, {"id": "40819153", "title_en": "Comprehensive evaluation of reinforcement strategies for anastomotic leak prevention in rectal cancer surgery: an umbrella review of meta-analyses", "title_zh": "直肠癌手术中预防吻合口瘘的强化策略的综合评价：荟萃分析的总体综述", "authors": "Leonardo Vincenti", "abstract_en": "Anastomotic leakage remains a serious complication following colorectal surgery. Various reinforcement techniques have been explored in literature, with multiple systematic reviews and meta-analyses addressing their effectiveness. However, no umbrella review has yet comprehensively synthesized this evidence. We aimed to summarize and critically appraise the available systematic reviews and meta-analyses investigating the effectiveness of anastomotic reinforcement techniques in colorectal surgery. A comprehensive literature search was conducted in PubMed, Embase, Scopus, and Cochrane Library up to June 2025. Eligible studies were systematic reviews or meta-analyses evaluating any reinforcement technique (biological, mechanical, or chemical) in colorectal anastomoses. Data extraction included review characteristics, reinforcement strategies, primary outcomes (anastomotic leak), and methodological quality assessed using AMSTAR 2. Twenty-one systematic reviews and meta-analyses were included. The reinforcement strategies evaluated comprised transanal tube (TAT) placement, suture reinforcement, and omentoplasty. Most reviews showed a reduction in anastomotic leak rates, particularly with TAT (43-70%) and sutures (59-75%), with the most pronounced effect observed in patients without a diverting stoma. TAT was also associated with a reduction in reintervention rates (62-84%). Findings on hospital stay were inconsistent, while no significant effects were reported for anastomotic bleeding, infections, stenosis, or mortality. The overall methodological quality of the included studies was rated as critically low. TAT and reinforcement sutures show potential in reducing anastomotic leakage in colorectal surgery. However, significant heterogeneity and variable methodological quality across reviews limit definitive conclusions. High-quality, targeted studies and standardized outcome definitions are warranted.", "abstract_zh": "吻合口漏仍然是结直肠手术后的严重并发症。文献中已经探讨了各种强化技术，并进行了多项系统评价和荟萃分析来探讨其有效性。然而，还没有总体审查全面综合这些证据。我们的目的是总结和批判性评价现有的系统评价和荟萃分析，研究结直肠手术中吻合加固技术的有效性。截至 2025 年 6 月，在 PubMed、Embase、Scopus 和 Cochrane 图书馆进行了全面的文献检索。符合条件的研究是评估结直肠吻合术中任何强化技术（生物、机械或化学）的系统评价或荟萃分析。数据提取包括综述特征、强化策略、主要结局（吻合口瘘）以及使用 AMSTAR 2 评估的方法学质量。其中包括 21 项系统综述和荟萃分析。评估的加固策略包括经肛管（TAT）放置、缝合加固和网膜成形术。大多数评论显示吻合口漏率降低，特别是 TAT（43-70%）和缝合（59-75%），在没有分流造口的患者中观察到最明显的效果。 TAT 还与再干预率的降低有关 (62-84%)。关于住院时间的研究结果不一致，而对于吻合口出血、感染、狭窄或死亡率没有显着影响。纳入研究的总体方法学质量被评为极低。 TAT 和加固缝合线显示出减少结直肠手术中吻合口渗漏的潜力。然而，不同评论间显着的异质性和可变的方法学质量限制了明确的结论。高质量、有针对性的研究和标准化的结果定义是必要的。", "keywords_zh": "吻合口漏、吻合口加固、直肠癌、经肛管", "keywords_en": "Anastomotic leak, Anastomotic reinforcement, Rectal cancer, Transanal tube", "link": "https://pubmed.ncbi.nlm.nih.gov/40819153/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 16 Aug 2025"}, {"id": "40808658", "title_en": "Association between anastomotic leak after rectal resection and bowel dysfunction, a systematic review, meta-analysis and meta-regression", "title_zh": "直肠切除术后吻合口瘘与肠功能障碍之间的关联、系统评价、荟萃分析和荟萃回归", "authors": "Marylise Boutros", "abstract_en": "**Background:** Anastomotic leak (AL) after colorectal anastomosis can be a risk factor for bowel dysfunction, namely low anterior resection syndrome (LARS). The present study aimed to assess bowel dysfunction in patients who developed AL after anterior resection compared to patients without AL.\n\n**Methods:** We conducted a PRISMA-compliant systematic review of PubMed, Scopus and Cochrane Library for randomized and observational studies investigating the association between AL after anterior resection and bowel dysfunction. The main outcomes were LARS, faecal incontinence and urgency. Pairwise meta-analyses were conducted to calculate the relative risk (RR) of the study outcomes and their 95% confidence intervals (CI).\n\n**Results:** This review included 20 retrospective studies comprising 4764 patients (61.6% male, median age 63 years). AL was detected in 14% of patients and those who experienced AL had a higher risk of LARS (six studies; 1329 patients, RR: 1.27 95%CI: 1.02, 1.58, p = 0.035), major LARS (seven studies; 1395 patients, RR: 1.38, 95%CI: 1.07, 1.79, p = 0.012), urgency (five studies; 955 patients, RR: 1.15, 95%CI: 1.04, 1.27, p = 0.005) and had higher LARS scores (seven studies; 1450 patients, WMD: 6.64, 95%CI: 3.76, 9.52, p < 0.001) and Wexner incontinence scores (seven studies; 1045 patients, WMD: 1.72, 95%CI: 0.16, 3.28, p = 0.031).\n\n**Conclusion:** Based on low to moderate certainty evidence, AL after colorectal and coloanal anastomoses was significantly associated with an increased risk of LARS, particularly major LARS, urgency and higher LARS and Wexner/Cleveland Clinic Florida-Fecal Incontinence Scores.", "abstract_zh": "**背景：** 结直肠吻合术后吻合口漏（AL）可能是肠功能障碍的危险因素，即低位前切除综合征（LARS）。本研究旨在评估前切除术后发生 AL 的患者与未发生 AL 的患者相比的肠功能障碍。\n\n**方法：** 我们对 PubMed、Scopus 和 Cochrane 图书馆进行了符合 PRISMA 标准的系统评价，以进行随机和观察性研究，调查前切除术后 AL 与肠功能障碍之间的关联。主要结局是 LARS、大便失禁和尿急。进行配对荟萃分析以计算研究结果的相对风险（RR）及其95%置信区间（CI）。\n\n**结果：** 该综述包括 20 项回顾性研究，涉及 4764 名患者（61.6% 为男性，中位年龄 63 岁）。 14% 的患者检测到 AL，经历过 AL 的患者发生 LARS 的风险较高（六项研究；1329 名患者，RR：1.27 95%CI：1.02、1.58，p = 0.035）、主要 LARS（七项研究；1395 名患者，RR：1.38，95%CI：1.07， 1.79，p = 0.012），紧迫性（五项研究；955 名患者，RR：1.15，95%CI：1.04，1.27，p = 0.005）并且具有较高的 LARS 评分（七项研究；1450 名患者，WMD：6.64，95%CI：3.76， 9.52，p< 0.001）和 Wexner 失禁评分（七项研究；1045 名患者，WMD：1.72，95%CI：0.16、3.28，p= 0.031）。\n\n**结论：** 根据低至中度确定性证据，结直肠和结肠肛管吻合术后的 AL 与 LARS 风险增加显着相关，特别是主要 LARS、尿急和较高的 LARS 以及 Wexner/Cleveland Clinic 佛罗里达大便失禁评分。", "keywords_zh": "LARS，吻合口瘘，前切除，肠功能障碍，结直肠，系统评价", "keywords_en": "LARS, anastomotic leak, anterior resection, bowel dysfunction, colorectal, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40808658/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 14 Aug 2025"}, {"id": "40793873", "title_en": "Systematic Review: The Relationship Between the Faecal Microbiome and Colorectal Neoplasia in Shotgun Metagenomic Studies", "title_zh": "系统综述：鸟枪法宏基因组研究中粪便微生物组与结直肠肿瘤之间的关系", "authors": "Colin Rees", "abstract_en": "**Background:** The human gut microbiome is of academic and clinical interest. Associations between certain organisms and colorectal neoplasia have been reported, but findings have limited reproducibility in different populations.\n\n**Methods:** We performed a systematic review of whole metagenome shotgun sequencing studies using faecal samples from patients with colorectal neoplasia and control populations. Searches were performed on 30th June 2023. We identified 26 studies, reporting on 22 study populations (13 from Asia, five from Europe and four from North America). Study size ranged from 14 to 971 individuals (mean 170).\n\n**Results:** Some reproducible data were identified, such as the significant enrichment of Fusobacterium nucleatum and Parvimonas micra in colorectal cancer patients compared to controls (in 10 and nine studies, respectively). However, 21 out of 26 studies scored poorly on quality appraisal, specifically surrounding selection of cases and controls. Definitions of controls varied; some studies used individuals with normal endoscopic investigations, some used 'healthy' individuals where no colonoscopy was performed, and one used those with non-neoplastic findings (haemorrhoids). There was even less reproducibility of data in studies where individuals with colorectal polyps were compared to controls, possibly because of heterogeneity in these patient groupings as a variety of definitions for 'polyp cases' were used.\n\n**Conclusions:** Heterogeneity and potential for bias indicates that findings should be interpreted with caution. Standardised protocols to ensure robust methodology and allow pooling of large-scale data are required before these findings can be used in clinical practice (PROSPERO: CRD42023431977).", "abstract_zh": "**背景：** 人类肠道微生物组具有学术和临床意义。某些微生物与结直肠肿瘤之间的关联已有报道，但研究结果在不同人群中的重复性有限。\n\n**方法：** 我们使用结直肠肿瘤患者和对照人群的粪便样本对整个宏基因组鸟枪法测序研究进行了系统回顾。检索于 2023 年 6 月 30 日进行。我们确定了 26 项研究，报告了 22 个研究人群（13 项来自亚洲，5 项来自欧洲，4 项来自北美）。研究规模从 14 人到 971 人不等（平均 170 人）。\n\n**结果：** 确定了一些可重复的数据，例如与对照组相比，结直肠癌患者中具核梭杆菌和微小单胞菌显着富集（分别在 10 项和 9 项研究中）。然而，26 项研究中有 21 项在质量评估方面得分较低，特别是在病例和对照的选择方面。控制的定义各不相同；一些研究使用了正常内窥镜检查的个体，一些研究使用了未进行结肠镜检查的“健康”个体，还有一项研究使用了非肿瘤发现（痔疮）的个体。在将结直肠息肉患者与对照组进行比较的研究中，数据的重复性甚至更低，这可能是因为这些患者分组的异质性，因为使用了多种“息肉病例”定义。\n\n**结论：** 异质性和潜在偏差表明应谨慎解释研究结果。在将这些发现用于临床实践之前，需要制定标准化方案以确保稳健的方法并允许汇集大规模数据（PROSPERO：CRD42023431977）。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40793873/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 12 Aug 2025"}, {"id": "40788642", "title_en": "Role of Neoadjuvant Immune Checkpoint Inhibitors in Locally Advanced Rectal Cancer: A Systematic Review of Currently Available Studies", "title_zh": "新辅助免疫检查点抑制剂在局部晚期直肠癌中的作用：对现有研究的系统回顾", "authors": "Alexander G Heriot", "abstract_en": "**Background:** During the past few decades, the standard of care for locally advanced rectal cancer, involving neoadjuvant chemoradiation followed by surgery, has been associated with a pathological complete response rate of only 10% to 20%. Combination therapy with immune checkpoint inhibitors may improve treatment response.\n\n**Objective:** This systematic review examines the current evidence regarding neoadjuvant immune checkpoint inhibitors in locally advanced rectal cancer in terms of treatment efficacy, impact on surgical outcomes, and potential adverse events.\n\n**Data Sources:** A literature search was conducted using the Ovid MEDLINE, Embase, Web of Science, and Cochrane Library databases from the start of database records to October 31, 2024.\n\n**Study Selection:** All studies that reported outcomes in patients with locally advanced rectal cancer who received immune checkpoint inhibitors as part of their neoadjuvant treatment were included for examination.\n\n**Main Outcome Measures:** Primary outcome was pathological complete response rate. Secondary outcomes were major pathological response rate, clinical complete response rate, complete response rate, R0 resection rate, and sphincter preservation rate. Safety data were included where available. Potential biomarkers of treatment response were identified.\n\n**Results:** Twelve studies were reviewed. All were prospective phase I/II clinical trials. The overall pathological complete response rate ranged from 25% to 62.5% (50% for deficient mismatch repair/high microsatellite instability; 25%-62.5% for proficient mismatch repair/microsatellite stable). The clinical complete response rate ranged from 10.9% to 100% (56%-100% for deficient mismatch repair/high microsatellite instability; 16.4%-48% for proficient mismatch repair/microsatellite stable). The complete response rate ranged from 44% to 75% (75% for deficient mismatch repair/high microsatellite instability; 44%-56.5% for proficient mismatch repair/microsatellite stable). The R0 resection rate ranged from 94% to 100% and the sphincter preservation rate ranged from 59.4% to 100%. The majority of adverse events were of grades 1 and 2.\n\n**Limitations:** Our review was limited by a small number of mostly single-arm studies with a lack of long-term survival outcomes, as well as marked clinical and methodological heterogeneity among included studies.\n\n**Conclusions:** Combination therapy with immune checkpoint inhibitors in locally advanced rectal cancer appears to improve treatment response, but high-level evidence and long-term data are still lacking.", "abstract_zh": "**背景：** 在过去的几十年里，局部晚期直肠癌的护理标准（包括新辅助放化疗和手术）的病理完全缓解率仅为 10% 至 20%。与免疫检查点抑制剂的联合治疗可能会改善治疗反应。\n\n**目的：** 本系统综述从治疗效果、对手术结果的影响和潜在不良事件方面探讨了有关新辅助免疫检查点抑制剂治疗局部晚期直肠癌的当前证据。\n\n**Data sources：** 使用 Ovid MEDLINE、Embase、Web of Science 和 Cochrane 图书馆数据库进行了从数据库记录开始到 2024 年 10 月 31 日的文献检索。\n\n**Study selection：** 所有报告接受免疫检查点抑制剂作为新辅助治疗一部分的局部晚期直肠癌患者结局的研究均被纳入检查。\n\n**Main outcome measures：** 主要结果是病理完全缓解率。次要结局为主要病理缓解率、临床完全缓解率、完全缓解率、R0切除率和括约肌保留率。如有可用的安全数据也包括在内。确定了治疗反应的潜在生物标志物。\n\n**结果：** 审查了十二项研究。所有均为前瞻性 I/II 期临床试验。总体病理完全缓解率范围为 25% 至 62.5%（错配修复缺陷/微卫星高度不稳定为 50%；错配修复熟练/微卫星稳定为 25%-62.5%）。临床完全缓解率为10.9%至100%（错配修复缺陷/微卫星高度不稳定性为56%-100%；错配修复熟练/微卫星稳定为16.4%-48%）。完全缓解率范围为 44% 至 75%（错配修复缺陷/微卫星不稳定性高为 75%；错配修复熟练/微卫星稳定为 44%-56.5%）。 R0切除率为94%～100%，括约肌保留率为59.4%～100%。大多数不良事件为 1 级和 2 级。\n\n**Limitations：** 我们的综述受到少数主要是单臂研究的限制，缺乏长期生存结果，以及纳入的研究之间存在明显的临床和方法学异质性。\n\n**结论：** 局部晚期直肠癌与免疫检查点抑制剂的联合治疗似乎可以改善治疗反应，但仍缺乏高水平的证据和长期数据。", "keywords_zh": "免疫检查点抑制剂、免疫治疗、病理完全缓解、直肠癌", "keywords_en": "Immune checkpoint inhibitors, Immunotherapy, Pathologic complete response, Rectal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/40788642/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Aug 2025"}, {"id": "40788606", "title_en": "Research Perspective on Role of Neoadjuvant Immune Checkpoint Inhibitors in Locally Advanced Rectal Cancer: A Systematic Review of Currently Available Studies", "title_zh": "新辅助免疫检查点抑制剂在局部晚期直肠癌中作用的研究视角：对现有研究的系统回顾", "authors": "William C Chapman", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40788606/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Aug 2025"}, {"id": "40760310", "title_en": "Correction: Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "纠正：聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Gianpiero Gravante", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40760310/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 05 Aug 2025"}, {"id": "40723194", "title_en": "Quality of Life in Rectal Cancer Treatments: An Updated Systematic Review of Randomized Controlled Trials (2013-2023)", "title_zh": "直肠癌治疗的生活质量：随机对照试验的最新系统评价（2013-2023）", "authors": "Emanuele Damiano Luca Urso", "abstract_en": "**Background:** Rectal cancer management involves surgery, chemotherapy (CT), radiotherapy (RT), and patient care strategies, all of which significantly affect health-related quality of life (HRQoL). Understanding these effects is critical for optimizing treatment protocols. This review aimed to systematically analyze the impact of rectal cancer treatment on HRQoL.\n\n**Methods:** Four databases, Scopus, EMBASE, MEDLINE, and the Cochrane Central Register of Controlled Trials, were searched for randomized controlled trials (RCTs) published between January 2013 and December 2023. RCTs specifically focusing on rectal cancer treatments (surgical interventions, pre- and/or post-CT and/or RT, and patient care strategies) were included. An abstract review, data extraction, and a risk-of-bias assessment were independently conducted by two reviewers.\n\n**Results:** The 41 included studies comprised 9240 patients: 16 evaluated surgical interventions (3507 patients), 15 evaluated pre- and/or post-CT and/or RT protocols (5114 patients), and 10 focused on patient-care strategies (619 patients). Sphincter-sparing procedures were associated with better HRQoL than abdominoperineal resection, and rectal-sparing techniques were associated with better overall HRQoL than rectal resection. RT was associated with a poorer HRQoL. Continuity-of-care interventions improved HRQoL in ostomy patients, whereas transanal irrigation improved HRQoL after ostomy closure.\n\n**Conclusions:** This systematic review of RCTs underscores the importance of organ-sparing strategies, such as rectum-sparing approaches and continuity-of-care packages, in improving HRQoL in patients with rectal cancer. Although RT negatively affects HRQoL, treatment regimens should be individualized. Tailored organ-preservation approaches and structured follow-up care are essential for optimizing HRQoL in patients with rectal cancer.", "abstract_zh": "**背景：** 直肠癌管理涉及手术、化疗 (CT)、放疗 (RT) 和患者护理策略，所有这些都会显着影响健康相关的生活质量 (HRQoL)。了解这些影响对于优化治疗方案至关重要。本综述旨在系统分析直肠癌治疗对 HRQoL 的影响。\n\n**方法：** 检索了 Scopus、EMBASE、MEDLINE 和 Cochrane 对照试验中央注册库这四个数据库，以查找 2013 年 1 月至 2023 年 12 月期间发表的随机对照试验 (RCT)。其中包括专门针对直肠癌治疗（手术干预、CT 和/或 RT 前后和/或术后以及患者护理策略）的 RCT。摘要审查、数据提取和偏倚风险评估由两名审查员独立进行。\n\n**结果：** 这 41 项研究涉及 9240 名患者：16 项评估手术干预（3507 名患者），15 项评估 CT 和/或 RT 方案之前和/或之后（5114 名患者），10 项重点关注患者护理策略（619 名患者）。与腹会阴切除术相比，保留括约肌的手术与更好的 HRQoL 相关，而与直肠切除术相比，直肠保留技术与更好的总体 HRQoL 相关。 RT 与较差的 HRQoL 相关。连续护理干预措施改善了造口患者的 HRQoL，而经肛门冲洗则改善了造口闭合后的 HRQoL。\n\n**结论：** 这项随机对照试验的系统评价强调了器官保留策略（例如保留直肠方法和连续性护理包）在改善直肠癌患者 HRQoL 方面的重要性。尽管放疗会对 HRQoL 产生负面影响，但治疗方案应个体化。定制的器官保存方法和结构化的后续护理对于优化直肠癌患者的 HRQoL 至关重要。", "keywords_zh": "健康相关的生活质量、器官保存策略、放射治疗、直肠癌", "keywords_en": "health-related quality of life, organ-preserving strategies, radiotherapy, rectal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/40723194/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 29 Jul 2025"}, {"id": "40719429", "title_en": "Mechanical bowel preparation to prevent infective complications after colon and rectal surgery: a systematic review and meta-analysis of randomized controlled trials", "title_zh": "机械肠道准备预防结肠和直肠手术后感染并发症：随机对照试验的系统评价和荟萃分析", "authors": "Eloy Espín-Basany", "abstract_en": "**Introduction:** Surgical site infections (SSI) represent a global health challenge, particularly in colorectal surgery, when rates can reach up to 20%. The role of mechanical bowel preparation (MBP) is still debated. A systematic review is proposed to evaluate MBP effectiveness in reducing SSI and complications after colorectal surgery.\n\n**Evidence Acquisition:** This systematic review and meta-analysis was conducted following the PRISMA guidelines. Only randomized studies comparing two or more methods for preventing infectious complications in patients undergoing colorectal surgery were included. The primary endpoint was the occurrence of SSIs, while secondary endpoints included anastomotic leak (AL) and intra-abdominal septic complications (IASC) other than AL.\n\n**Evidence Synthesis:** Eighteen studies met the inclusion criteria, including a total of 6,302 patients in the analysis. The meta-analysis showed similar SSI rates between the MBP and no-treatment groups (OR 1.015, 95% CI 0.855-1.206, I<sup>2</sup>=22.33%, P=0.863) as well as between the MBP and enema groups (OR 1.100, 95% CI 0.616-1.965, I<sup>2</sup>=35.96%, P=0.748). The risk of anastomotic leak (AL) was also similar when comparing no treatment to MBP (OR 0.904, 95% CI 0.661-1.237, I<sup>2</sup>=0%, P=0.528), and MBP to enema (OR 0.727, 95% CI 0.286-1.845, I<sup>2</sup>=25.98%, P=0.502). IASC rates were lower with MBP compared to no treatment (OR 0.526, 95% CI 0.326-0.848, I<sup>2</sup>=3.50%, P=0.008).\n\n**Conclusions:** This meta-analysis found no significant reduction in SSI or AL rates with MBP alone compared to no preparation or enema use. However, MBP significantly lowered IASC. Further research is warranted to evaluate the effectiveness of MBP combined with antibiotics in reducing postoperative complications.", "abstract_zh": "**介绍：** 手术部位感染 (SSI) 是一项全球健康挑战，特别是在结直肠手术中，感染率高达 20%。机械肠道准备（MBP）的作用仍然存在争议。建议进行系统评价来评估 MBP 在减少结直肠手术后 SSI 和并发症方面的有效性。\n\n**Evidence acquisition：** 本系统评价和荟萃分析是按照 PRISMA 指南进行的。仅纳入比较两种或多种预防结直肠手术患者感染并发症的方法的随机研究。主要终点是 SSI 的发生，次要终点包括 AL 以外的吻合口瘘 (AL) 和腹腔内脓毒症并发症 (IASC)。\n\n**Evidence synthesis：** 18 项研究符合纳入标准，分析中共有 6,302 名患者。荟萃分析显示，MBP 组和未治疗组之间（OR 1.015，95% CI 0.855-1.206，I<sup>2</sup>=22.33%，P=0.863）以及 MBP 和灌肠组之间（OR 1.100，95% CI 0.616-1.965， I<sup>2</sup>=35.96%，P=0.748）。将不治疗与 MBP 进行比较（OR 0.904，95% CI 0.661-1.237，I<sup>2</sup>=0%，P=0.528），以及将 MBP 与灌肠进行比较（OR 0.727，95% CI 0.286-1.845， I<sup>2</sup>=25.98%，P=0.502）。与未治疗相比，MBP 治疗组的 IASC 率较低（OR 0.526，95% CI 0.326-0.848，I<sup>2</sup>=3.50%，P=0.008）。\n\n**结论：** 这项荟萃分析发现，与不使用制剂或灌肠剂相比，单独使用 MBP 的 SSI 或 AL 率没有显着降低。然而，MBP 显着降低了 IASC。需要进一步的研究来评估 MBP 联合抗生素在减少术后并发症方面的有效性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40719429/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 28 Jul 2025"}, {"id": "40714623", "title_en": "Closing the gap: addressing delayed healthcare-seeking and improving quality of life for Ethiopian women with pelvic organ prolapse", "title_zh": "缩小差距：解决患有盆腔器官脱垂的埃塞俄比亚妇女延迟就医的问题并提高生活质量", "authors": "Lencho Kajela", "abstract_en": "**Background:** Pelvic organs prolapse (POP) involves the herniation of pelvic organs, such as the uterus, cervix, vaginal wall, bladder, and rectum, into the vagina. While it is a common gynecologic problem, its impact on quality of life and timely healthcare-seeking remains poorly understood in developing countries. This systematic review and meta-analysis aimed to assess the quality of life, delays in healthcare-seeking, and associated factors among women diagnosed with POP in Ethiopia.\n\n**Methods:** A systematic review and meta-analysis were conducted following PRISMA guidelines. Extensive literature searches were performed in PubMed, CINAHL, Google Scholar, ScienceDirect, and Scopus. A restricted maximum likelihood random-effects model was used to estimate pooled proportions. Heterogeneity among studies was assessed using the Cochrane Q-test and I2 statistics. Publication bias was evaluated using funnel plots and Egger's test. Stata 17 software was used for all analyses.\n\n**Results:** From an initial pool of 421 articles, 10 met the inclusion criteria, encompassing data from 1489 women diagnosed with POP. The pooled proportion of poor quality of life among women with POP in Ethiopia was 52.07 % [95 % C.I.: 48.04 %, 56.09 %]. Moderate heterogeneity was observed across studies. The mean delay between symptom onset and seeking medical care was 50.64 months [95 % C.I: 32.50, 68.79], with an estimated 78.22 % [95 % C.I.: 70.72 %, 85.72 %] of women experiencing delays in seeking healthcare. Postmenopausal status (OR = 2.05, 95 % CI: 1.22-3.45), living with POP for more than 2 years (OR = 4.17, 95 % CI: 1.23-14.10), and having Stage III/IV POP (OR = 4.48, 95 % CI: 1.61-12.44) associated with poor quality of life. In addition, factors associated with delayed healthcare seeking include: fear of disclosure (OR = 4.60, 95 % CI: 4.65-45.71), lack of social support (OR = 4.09, 95 % CI: 1.91-8.74), low income (OR = 4.80, 95 % CI: 2.12-10.86), and experiencing stigma (OR = 5.78, 95 % CI: 1.07-31.36).\n\n**Conclusion:** This review highlights a high prevalence of poor quality of life and significant delays in healthcare-seeking among Ethiopian women with POP, with an average delay of over four years after symptom onset. Stigma, fear of disclosure, low income, and lack of social support were significantly associated with delays in seeking health care. Additionally, longer prolapse duration, menopause, and stage III or IV pelvic organ prolapse (POP) were significantly associated with a reduced quality of life.", "abstract_zh": "**背景：** 盆腔器官脱垂（POP）涉及盆腔器官（如子宫、子宫颈、阴道壁、膀胱和直肠）疝入阴道。虽然这是一个常见的妇科问题，但在发展中国家，它对生活质量和及时就医的影响仍然知之甚少。这项系统回顾和荟萃分析旨在评估埃塞俄比亚诊断患有 POP 的女性的生活质量、就医延迟以及相关因素。\n\n**方法：** 按照 PRISMA 指南进行了系统评价和荟萃分析。在 PubMed、CINAHL、Google Scholar、ScienceDirect 和 Scopus 中进行了广泛的文献检索。使用限制最大似然随机效应模型来估计合并比例。使用 Cochrane Q 检验和 I2 统计来评估研究之间的异质性。使用漏斗图和艾格检验评估发表偏倚。 Stata 17 软件用于所有分析。\n\n**结果：** 从最初的 421 篇文章中，有 10 篇符合纳入标准，涵盖了 1489 名被诊断患有 POP 的女性的数据。埃塞俄比亚 POP 女性中生活质量较差的总体比例为 52.07% [95% C.I.: 48.04%, 56.09%]。各项研究中观察到中等程度的异质性。症状出现和就医之间的平均延迟时间为 50.64 个月 [95% C.I.: 32.50, 68.79]，估计有 78.22% [95% C.I.: 70.72%, 85.72%] 的女性在寻求医疗保健方面出现延迟。绝经后状态（OR = 2.05，95% CI：1.22-3.45）、患有 POP 超过 2 年（OR = 4.17，95% CI：1.23-14.10）以及患有 III/IV 期 POP（OR = 4.48，95% CI：1.61-12.44）与不良质量相关生活。此外，与延迟就医相关的因素包括：害怕披露（OR = 4.60，95% CI：4.65-45.71）、缺乏社会支持（OR = 4.09，95% CI：1.91-8.74）、低收入（OR = 4.80，95% CI：2.12-10.86）和经历耻辱（OR = 5.78，95% CI：1.07-31.36）。\n\n**结论：** 这篇综述强调了患有 POP 的埃塞俄比亚女性普遍存在生活质量差和就医严重延迟的情况，症状出现后平均延迟四年以上。耻辱、害怕披露、低收入和缺乏社会支持与延迟寻求医疗保健密切相关。此外，较长的脱垂持续时间、更年期和 III 期或 IV 期盆腔器官脱垂 (POP) 与生活质量下降显着相关。", "keywords_zh": "埃塞俄比亚, 寻求医疗保健, 盆底功能障碍, 盆腔器官脱垂, 生活质量", "keywords_en": "Ethiopia, Healthcare-seeking, Pelvic floor dysfunction, Pelvic organs prolapse, Quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/40714623/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sun, 27 Jul 2025"}, {"id": "40703667", "title_en": "Radiotherapy boost to the primary tumour in locally advanced rectal cancer: Systematic review of practices and meta-analysis", "title_zh": "放射治疗对局部晚期直肠癌原发肿瘤的增强作用：实践和荟萃分析的系统回顾", "authors": "Geneviève Van Ooteghem", "abstract_en": "**Introduction:** In locally advanced rectal cancer (LARC), increasing the complete response (CR) rate after total neo-adjuvant treatment may increase the patient eligibility for non-operative management (\"watch and wait\", W&W). Although a radiotherapy (RT) boost to the primary tumour may enhance CR rates, clear guidelines are currently lacking. This systematic review and <i>meta</i>-analysis investigate the technical parameters used for rectal boost RT and assess their impact on oncological outcomes.\n\n**Methods:** Following PRISMA guidelines, the terms \"rectum,\" \"radiotherapy,\" and \"boost\" were searched in PubMed and EMBASE (PROSPERO: CRD42023444685). Studies reporting on external beam RT boost to the primary tumour in LARC and meeting quality criteria were included. Descriptive analyses extracted data on RT technique, preparation, boost delineation, dose, chemotherapy, and follow-up. A mixed-effects <i>meta</i>-analysis model evaluated the impact of selected parameters on CR and local recurrence rate (LRR). Studies were analysed separately based on treatment intent: planned surgery or W&W.\n\n**Results:** Out of 3904 references, 83 were included in the descriptive analysis and 78 in the <i>meta</i>-analysis. Substantial variability in RT parameters was observed across studies. Pathologic CR rates were significantly higher with intensity-modulated/volumetric-modulated arc RT (IMRT/VMAT, p = 0.007), simultaneous boost (p = 0.020), dose escalation (Biological equivalent dose > 74 Gy, p = 0.035), and the combination of induction and consolidation chemotherapy (p = 0.023). No significant associations were found for clinical CR or LRR.\n\n**Conclusion:** While rectal RT boost is already part of real-world practices, the wide heterogeneity in techniques highlights the urgent need for standardisation. Our <i>meta</i>-analysis suggests that IMRT/VMAT, simultaneous boost, and dose escalation are associated with higher pathological CR rates and should be considered in future rectal boost guidelines. These findings, however, warrant careful interpretation due to the absence of adjustments for clinical, tumoral, or patient-related parameters that may also influence response rate and oncological outcomes.", "abstract_zh": "**介绍：** 在局部晚期直肠癌 (LARC) 中，提高新辅助治疗后的完全缓解 (CR) 率可能会增加患者接受非手术治疗的资格（“观察并等待”，W&W）。尽管对原发肿瘤进行放射治疗（RT）可能会提高 CR 率，但目前缺乏明确的指南。这项系统评价和荟萃分析调查了直肠增强放疗所用的技术参数，并评估了它们对肿瘤学结果的影响。\n\n**方法：** 根据 PRISMA 指南，在 PubMed 和 EMBASE 中检索了术语“直肠”、“放射治疗”和“增强”（PROSPERO：CRD42023444685）。报告了外照射放疗对 LARC 原发肿瘤的增强作用并符合质量标准的研究也被纳入其中。描述性分析提取了有关 RT 技术、准备、加强范围、剂量、化疗和随访的数据。混合效应元分析模型评估了所选参数对 CR 和局部复发率 (LRR) 的影响。根据治疗目的分别分析研究：计划手术或 W&W。\n\n**结果：** 在 3904 篇参考文献中，83 篇纳入描述性分析，78 篇纳入元分析。不同研究中观察到 RT 参数存在显着差异。强度调制/体积调制弧形放疗（IMRT/VMAT，p = 0.007）、同时加强化疗（p = 0.020）、剂量递增（生物等效剂量> 74 Gy，p = 0.035）以及诱导和巩固化疗相结合（p = 0.023）的病理 CR 率显着更高。未发现与临床 CR 或 LRR 显着相关。\n\n**结论：** 虽然直肠放疗增强已经成为现实世界实践的一部分，但技术上的广泛异质性凸显了标准化的迫切需要。我们的荟萃分析表明，IMRT/VMAT、同步加强和剂量递增与较高的病理 CR 率相关，应在未来的直肠加强指南中予以考虑。然而，由于没有对也可能影响缓解率和肿瘤学结果的临床、肿瘤或患者相关参数进行调整，这些发现需要仔细解释。", "keywords_zh": "完全缓解、剂量递增、局部晚期直肠癌、荟萃分析、新辅助治疗、直肠加强治疗", "keywords_en": "Complete response, Dose escalation, Locally advanced rectal cancer, Meta-analysis, Neo-adjuvant therapy, Rectal boost", "link": "https://pubmed.ncbi.nlm.nih.gov/40703667/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 24 Jul 2025"}, {"id": "40697442", "title_en": "Early-onset colorectal cancer in patients younger than 50 years: a systematic review of the literature", "title_zh": "50 岁以下患者的早发结直肠癌：文献的系统回顾", "authors": "Konstantinos Vlachos", "abstract_en": "Early-onset colorectal cancer (EO-CRC) refers to CRC diagnosed before the age of 50. Its incidence has risen in recent years, turning researchers' attention to its oncologic behavior and potentially modifiable risk factors. In this review, PubMed/MEDLINE database was searched for all original research articles concerning EO-CRC. The inclusion criteria were CRC patients under 50, without a known predisposing factor for malignancy or an inherited CRC syndrome, presenting oncological characteristics and outcomes. All studies were assessed for bias, based on the ROBINS-E 2022 tool, and were synthesized in a qualitative analysis. Twenty-nine articles, reporting on 64,376 EO-CRC patients, were included in the qualitative synthesis. Results were classified into 3 categories: a) demographics; b) histopathologic characteristics; and c) treatment outcomes. Of these publications, 21 studies agreed that rectum (45%) and left-sided (47.1%) cancers are most common in younger patients, and 5 indicated that the highest prevalence of CRC concerns the 40-49 years age group. Seventeen of 29 studies reported a higher stage (III and IV) on diagnosis, with lymphovascular and perineural invasion. Our review has some limitations: as it was based on a single database, not all studies provided information on the variables; and patients were not categorized in all studies in the same age groups, although all were under 50 years. As EO-CRC is on the rise, the need for closer monitoring and possibly earlier screening becomes apparent. Further research should focus on finding novel screening biomarkers and modifiable risk factors that would decrease mortality and improve patient outcomes.", "abstract_zh": "早发性结直肠癌（EO-CRC）是指50岁之前诊断出的结直肠癌。近年来其发病率有所上升，这使得研究人员开始关注其肿瘤行为和潜在可改变的危险因素。在这篇综述中，检索了 PubMed/MEDLINE 数据库中有关 EO-CRC 的所有原始研究文章。纳入标准是 50 岁以下的 CRC 患者，没有已知的恶性肿瘤诱发因素或遗传性 CRC 综合征，且具有肿瘤学特征和结果。所有研究均根据 ROBINS-E 2022 工具进行偏倚评估，并进行定性分析综合。定性综合中纳入了 29 篇文章，报告了 64,376 名 EO-CRC 患者。结果分为 3 类：a) 人口统计； b) 组织病理学特征； c) 治疗结果。在这些出版物中，21 项研究一致认为直肠癌 (45%) 和左侧癌症 (47.1%) 在年轻患者中最常见，5 项研究表明 CRC 患病率最高的是 40-49 岁年龄组。 29 项研究中有 17 项报告了较高的诊断阶段（III 和 IV），伴有淋巴血管和神经周围侵犯。我们的审查有一些局限性：由于它基于单一数据库，并非所有研究都提供有关变量的信息；尽管所有研究的患者年龄都在 50 岁以下，但并非所有研究中的患者都被归为同一年龄组。随着 EO-CRC 的增加，更密切的监测以及可能更早的筛查的必要性变得显而易见。进一步的研究应集中于寻找新的筛查生物标志物和可改变的风险因素，以降低死亡率并改善患者的治疗结果。", "keywords_zh": "50岁，早发性结直肠癌，指南，年轻人", "keywords_en": "50 years old, Early-onset colorectal cancer, guidelines, young adults", "link": "https://pubmed.ncbi.nlm.nih.gov/40697442/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 23 Jul 2025"}, {"id": "40672439", "title_en": "Diagnosis and treatment for anal fistula: a systematic review of clinical practice guidelines and consensus statements", "title_zh": "肛瘘的诊断和治疗：临床实践指南和共识声明的系统回顾", "authors": "Rong Shi", "abstract_en": "**Background:** Anal fistula constitutes a pathological channel originating either from the anal canal or rectum to the skin surrounding the anus, primarily characterized by recurrent pain, purulent discharge, and pruritus. This study aims to compare and standardize the recommendations for the diagnosis and treatment of anal fistula, drawing on contemporary clinical practice guidelines.\n\n**Methods:** A comprehensive search was conducted across multiple databases including PubMed, EMBASE, China National Knowledge Infrastructure, Wanfang Database, Chinese Science and Technology Periodical Database, and Chinese Biological Medicine Database, from their inception through April 1, 2024. The objective was to collate all published guidelines on anal fistula. The quality of the eligible guidelines was appraised by two reviewers using the Appraisal of Guidelines for Research and Evaluation II instrument.\n\n**Results:** The search yielded fifteen guidance documents -comprising nine guidelines and six consensus statements -each offering specific recommendations. Twelve of these documents address screening and diagnosis of anal fistula, while all fifteen discuss various treatment and management strategies. Document analysis highlighted MRI as the predominant diagnostic recommendation. Treatment and management strategies were categorized into four categories: preoperative management, surgical method selection, pharmacological interventions, and postoperative management. Regarding surgical interventions, all guidelines address incision and drainage of fistulas. Most guidelines offer a low recommendation for cutting setons, mainly attributed to the presence of incontinence. For high-positioned anal fistula, a push-pull flap procedure is recommended, whereas the LIFT procedure is advocated for newly identified, high, and sphincter-penetrating fistulas. Among the 15 guidelines and consensus statements evaluated in this study, more than half demonstrated methodological limitations, with particularly deficient performance in the applicability domain. As a critical determinant of implementation effectiveness, these deficiencies may undermine guidelines' capacity to optimize health outcomes.\n\n**Conclusion:** There is a pressing need for an updated search of potential evidence on the diagnosis and treatment of anal fistula. Effective diagnoses and therapeutic approaches, whether conventional or complementary and alternative medicine, should be thoroughly evaluated and incorporated based on robust evidence.", "abstract_zh": "**背景：** 肛瘘是从肛管或直肠到肛门周围皮肤的病理通道，主要表现为反复疼痛、脓性分泌物和瘙痒。本研究旨在借鉴当代临床实践指南，对肛瘘的诊断和治疗建议进行比较和标准化。\n\n**方法：** 对PubMed、EMBASE、中国国家知识基础设施、万方数据库、中国科技期刊数据库和中国生物医学数据库等多个数据库进行了全面检索，从建库到2024年4月1日。目的是整理所有已发布的肛瘘指南。合格指南的质量由两名评审员使用“研究和评估指南 II 评估”工具进行评估。\n\n**结果：** 搜索产生了十五份指导文件，其中包括九份指南和六份共识声明，每份文件都提供了具体建议。其中十二份文件涉及肛瘘的筛查和诊断，所有十五份文件都讨论了各种治疗和管理策略。文档分析强调 MRI 是主要的诊断建议。治疗和管理策略分为四类：术前管理、手术方法选择、药物干预和术后管理。关于手术干预，所有指南均涉及瘘管切开和引流。大多数指南对切挂线的建议较低，这主要是由于存在失禁。对于高位肛瘘，建议采用推拉皮瓣手术，而对于新发现的高位肛瘘和括约肌穿透性肛瘘则提倡采用 LIFT 手术。在本研究评估的 15 条指南和共识声明中，超过一半表现出方法学局限性，尤其是在适用性领域表现不足。作为实施有效性的关键决定因素，这些缺陷可能会削弱指南优化健康结果的能力。\n\n**结论：** 迫切需要更新有关肛瘘诊断和治疗的潜在证据。有效的诊断和治疗方法，无论是传统医学还是补充和替代医学，都应基于强有力的证据进行彻底评估和整合。", "keywords_zh": "肛瘘, 诊断, 指南, 系统评价, 治疗", "keywords_en": "anal fistula, diagnosis, guidelines, systematic review, therapeutic", "link": "https://pubmed.ncbi.nlm.nih.gov/40672439/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Jul 2025"}, {"id": "40670732", "title_en": "Robotic Beyond Total Mesorectal Excision (bTME) for locally advanced and recurrent anorectal cancer: a systematic review", "title_zh": "机器人超越全直肠系膜切除术（bTME）治疗局部晚期和复发性肛门直肠癌：系统评价", "authors": "Muhammad Rafaih Iqbal", "abstract_en": "Robotic surgery is increasingly utilized for rectal cancer resection, particularly in cases requiring beyond total mesorectal excision (bTME) to achieve oncological clearance. Despite longer operative times, robotic bTME has been associated with reduced morbidity and blood loss, making it an emerging approach in specialized centers. A systematic review following PRISMA guidelines was conducted in Web of Science, PubMed, and Scopus. Studies reporting robotic bTME for recurrent or locally advanced anorectal cancer were included. Outcomes assessed included study characteristics, demographics, operative outcomes, oncological data, and follow-up. Nineteen studies comprising 1027 patients met the inclusion criteria (13 case series-68% and 6 cohort studies-32%). The median patient age ranged from 51 to 68 years with 73.7% males. Most patients had an ASA score of 2 (53.1%), and BMI ranged from 21.1 to 28.6. Tumor locations were predominantly near the anal verge (median: 3-6 cm), and the most common clinical staging was cT3, cN1, and cM0. Surgical complications included urinary issues (22.6%), anastomotic leakage (11.4%), ileus (10.4%), and bleeding (5.3%). Follow-up data indicated a recurrence rate of 24.9%, and the 1-year survival rate was > 90%. These studies reported an overall complication rate of 49.7%, with a median follow-up of 12-36 months. Oncological outcomes were favorable, although there was significant variability in survival data between studies. The heterogenicity of the studies makes it challenging to conclusively establish robotic bTME as a feasible alternative to the gold standard. Further prospective studies, with measurable outcomes and consistent terminology, are needed to ensure homogeneity.", "abstract_zh": "机器人手术越来越多地用于直肠癌切除，特别是在需要完全直肠系膜切除（bTME）之外才能实现肿瘤清除的病例。尽管手术时间较长，但机器人 bTME 与降低发病率和失血量有关，使其成为专业中心的新兴方法。 Web of Science、PubMed 和 Scopus 遵循 PRISMA 指南进行了系统评价。报告机器人 bTME 用于治疗复发性或局部晚期肛门直肠癌的研究也被纳入其中。评估的结果包括研究特征、人口统计、手术结果、肿瘤数据和随访。包含 102
