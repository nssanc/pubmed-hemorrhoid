ose：** 肛门直肠畸形存在于一系列涉及直肠、远端肛门、生殖器和泌尿道的异常中，大约每 5,000 个活产儿中就有一个发生这种畸形。本研究的目的是调查出生时患有肛门直肠畸形的成年人的交叉报告、心理健康合并症和心理社会经历。\n\n**方法：** 利用系统的定量文献综述来收集和分析数据。文章需要讨论与成年期肛门直肠畸形相关的人口统计、心理健康合并症或心理社会经历。共找到 94 篇适合评审的文章。\n\n**结果：** 患者的种族、文化、性取向和灵性特征明显不足。人们讨论了焦虑和抑郁等心理健康并发症，但很少转变为干预措施。心理挑战包括性心理焦虑和专业知识有限。社会学挑战包括应对医疗服务和社会环境。文献优先考虑了减少社会心理复杂性的节制结果。\n\n**结论：** 出生时患有肛门直肠畸形的成年人的交叉性、心理健康问题和心理社会经历在很大程度上仍然未知。社会工作者等专职卫生专业人员可以通过增强心理社会功能和情绪健康的干预措施来改善持续的支持服务。", "keywords_zh": "肛门直肠畸形、心理社会功能、社会工作", "keywords_en": "Anorectal malformation, Psychosocial functioning, Social work", "link": "https://pubmed.ncbi.nlm.nih.gov/41721863/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 21 Feb 2026"}, {"id": "41717740", "title_en": "Robot-assisted multivisceral resections for locally advanced rectal cancer: a case series and systematic review", "title_zh": "机器人辅助局部晚期直肠癌多脏器切除术：病例系列和系统评价", "authors": "V N Galkin", "abstract_en": "**Objective:** To conduct a systematic review of literature data on robot-assisted multivisceral resections for locally advanced rectal cancer and to present own immediate results of these interventions.\n\n**Material And Methods:** Request \"robotic OR,\" \"robotic ORs,\" \"robot-assisted OR,\" \"robot-assisted\" and «(Robotic OR robot-assisted) AND rectal AND (T4 OR multivisceral)» in PubMed and E-library databases resulted in 268 publications. Of these, 12 articles were included. Surgery time, intraoperative complications, including blood loss, conversion rate, postoperative complications, and extent of resection (R0, R1) were studied. Meta-analysis enrolled the incidence of complications and R0 resections. In addition, own results of 5 robot-assisted combined rectal resections for the period August - December 2024 are presented. Rectal resections were combined with bladder resection in three cases, and left-sided adnexectomy was performed in one case. One surgery was combined with anterior abdominal wall resection.\n\n**Results:** Treatment outcomes were analyzed in 891 people. The conversion rate was 11%, incidence of R0 resections - 76.2-100%, overall morbidity - 20.7-78%. Locoregional recurrences occurred in 4-9.3% of cases. Own results of treating 5 patients with locally advanced rectal cancer are summarized. There were R0 resections in all cases. There were no intraoperative complications. Severe postoperative complications (Clavien-Dindo ³ III) were observed in one case. Mean surgery time was 5 hours.\n\n**Conclusion:** Our experience of robot-assisted combined rectal resections for locally advanced cancer demonstrates feasibility of such operations. Own data are comparable with results of previous studies. Systematization of available results is complicated by high heterogeneity of data. However, available data are favorable and confirm the need for prospective accumulation of experience.", "abstract_zh": "**目的：** 对机器人辅助局部晚期直肠癌多脏器切除术的文献数据进行系统回顾，并提出这些干预措施的直接结果。\n\n**Material and methods：** 在 PubMed 和电子图书馆数据库中请求“机器人 OR”、“机器人 OR”、“机器人辅助 OR”、“机器人辅助”和“（机器人 OR 机器人辅助）AND 直肠 AND（T4 OR 多内脏）”，结果产生了 268 篇出版物。其中，收录了 12 篇文章。研究了手术时间、术中并发症，包括失血量、中转率、术后并发症和切除范围（R0、R1）。荟萃分析纳入了并发症和 R0 切除的发生率。此外，还介绍了 2024 年 8 月至 12 月期间 5 例机器人辅助联合直肠切除术的结果。直肠切除联合膀胱切除3例，左侧附件切除1例。一项手术与前腹壁切除术相结合。\n\n**结果：** 对 891 人的治疗结果进行了分析。转化率为 11%，R0 切除发生率 - 76.2-100%，总体发病率 - 20.7-78%。 4-9.3% 的病例出现局部复发。现总结自己治疗5例局部晚期直肠癌的结果。所有病例均进行 R0 切除。无术中并发症。 1例出现严重术后并发症（Clavien-DindoⅢ）。平均手术时间为5小时。\n\n**结论：** 我们在机器人辅助联合直肠切除术治疗局部晚期癌症方面的经验证明了此类手术的可行性。自己的数据与之前的研究结果具有可比性。由于数据的高度异质性，可用结果的系统化变得复杂。然而，现有数据是有利的，并证实需要前瞻性积累经验。", "keywords_zh": "局部晚期直肠癌、肿瘤学、直肠癌、机器人辅助多脏器切除术、机器人手术", "keywords_en": "locally advanced rectal cancer, oncology, rectal cancer, robot-assisted multivisceral resection, robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/41717740/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 20 Feb 2026"}, {"id": "41689388", "title_en": "Efficacy of wound protectors in reducing surgical site infections in patients undergoing open colorectal surgery: A systematic review and meta-analysis", "title_zh": "伤口保护器在减少接受开放性结直肠手术的患者手术部位感染方面的功效：系统评价和荟萃分析", "authors": "Tejaswini Pisipati", "abstract_en": "**Background:** The incidence of surgical site infections (SSIs) has been reported to be significantly higher in colorectal surgeries compared to other surgical procedures. Wound protectors have been developed to help reduce the incidence of SSIs by creating a barrier between the incisional wound and the contaminated surgical field, but their efficacy remains uncertain.\n\n**Objective:** To assess whether the use of wound protectors reduces the incidence of SSIs in patients undergoing open colorectal surgery.\n\n**Data Sources:** A comprehensive literature review was conducted using PubMed, Embase, Web of Science and Cochrane databases from inception to January 2025.\n\n**Study Selection:** Randomised controlled trials (RCTs) assessing the efficacy of wound protectors for reducing the incidence of SSIs in patients undergoing open colorectal surgery.\n\n**Interventions:** The intervention consisted of wound protectors (e.g., Alexis O-ring wound retractors, plastic ring drape).\n\n**Main Outcomes Measures:** The main outcome was SSI. We pooled risk ratios (RRs) with a 95% confidence interval (CI) using a random effects model. Statistical analysis was performed using R software (version 4.4.2).\n\n**Results:** We included 6 RCTs comprising 666 patients, of whom 327 (49 %) were randomised to the wound protectors' group. The mean follow-up duration was 30 days post-operatively. The incidence of SSIs was significantly lower in the intervention group (RR 0.44; 95% CI 0.22-0.88; p = 0.021). Subgroup analysis of four RCTs evaluating Alexis-O ring wound retractors showed a significantly lower incidence of SSIs in the experimental group (RR 0.21; 95% CI 0.09-0.48; p < 0.001).\n\n**Conclusion:** Wound protectors were associated with a significantly lower incidence of SSIs in patients undergoing open colorectal surgery.", "abstract_zh": "**背景：** 据报道，结直肠手术中手术部位感染（SSI）的发生率明显高于其他手术。伤口保护器已被开发出来，通过在切口伤口和受污染的手术区域之间建立屏障来帮助减少 SSI 的发生率，但其功效仍不确定。\n\n**目的：** 评估伤口保护器的使用是否可以降低接受开放性结直肠手术的患者 SSI 的发生率。\n\n**Data sources：** 使用 PubMed、Embase、Web of Science 和 Cochrane 数据库对从成立到 2025 年 1 月的时间进行了全面的文献综述。\n\n**Study selection：** 随机对照试验 (RCT) 评估伤口保护器对于降低接受开放性结直肠手术的患者 SSI 发生率的功效。\n\n**Interventions：** 干预措施包括伤口保护器（例如 Alexis O 形环伤口牵开器、塑料环手术巾）。\n\n**Main outcomes measures：** 主要成果是 SSI。我们使用随机效应模型将风险比 (RR) 与 95% 置信区间 (CI) 合并。使用R软件（版本4.4.2）进行统计分析。\n\n**结果：** 我们纳入了 6 项随机对照试验，涉及 666 名患者，其中 327 名 (49%) 被随机分配到伤口保护剂组。平均随访时间为术后 30 天。干预组的 SSI 发生率显着较低（RR 0.44；95% CI 0.22-0.88；p = 0.021）。评估 Alexis-O 环伤口牵开器的四项随机对照试验的亚组分析显示，实验组 SSI 的发生率显着较低（RR 0.21；95% CI 0.09-0.48；p<0.001）。\n\n**结论：** 伤口保护装置与接受开放性结直肠手术的患者 SSI 发生率显着降低相关。", "keywords_zh": "结直肠手术、手术部位感染、伤口保护器", "keywords_en": "colorectal surgery, surgical site infections, wound protectors", "link": "https://pubmed.ncbi.nlm.nih.gov/41689388/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 14 Feb 2026"}, {"id": "41665757", "title_en": "Perioperative impact of enhanced recovery after surgery (ERAS) for minimally invasive colorectal resection: a systematic review and meta-analysis", "title_zh": "加速康复外科（ERAS）对微创结直肠切除术围手术期的影响：系统评价和荟萃分析", "authors": "Bo-Wen Wu", "abstract_en": "**Purpose:** The added value of Enhanced Recovery After Surgery protocols in minimally invasive colorectal surgery remains debated. This study synthesized available evidence to examine how ERAS performs in minimally invasive colorectal resection, with attention to both effectiveness and safety.\n\n**Methods:** We conducted a systematic review of these documents, covering key databases such as the Cochrane Library, PubMed, EMBASE, and Web of Science. The latest information was updated up to December 2025. Data analyses were conducted using STATA 18. Continuous outcomes were expressed as weighted mean differences, while categorical outcomes were summarized with odds ratios, each accompanied by 95% confidence intervals. The rigor of the included studies was appraised using the Newcastle-Ottawa Scale (NOS).\n\n**Results:** Five eligible studies encompassing 2324 patients were synthesized. Compared with conventional care, ERAS implementation was associated with a meaningful reduction in length of hospital stay (WMD = - 2.38 days; 95% CI: -4.16, - 0.61; P < 0.01), alongside fewer overall postoperative complications (OR = 0.55; 95% CI: 0.44, 0.68; P < 0.05) and a decreased occurrence of postoperative ileus (OR = 0.57; 95% CI: 0.38, 0.86; P < 0.05). Readmission rates were comparable between groups (OR = 0.99, 95% CI: 0.55, 1.79; P = 0.952), and no meaningful difference was observed in operative time (WMD = 3.53, 95% CI: -15.76, 22.81; P = 0.115).\n\n**Conclusions:** ERAS protocols act synergistically with minimally invasive colorectal surgery to accelerate recovery and reduce complications without compromising safety. Future investigations with prospective designs are needed to confirm the robustness of these results.", "abstract_zh": "**Purpose：** 加速康复外科方案在微创结直肠手术中的附加价值仍存在争议。这项研究综合了现有证据来检验 ERAS 在微创结直肠切除术中的表现，同时关注有效性和安全性。\n\n**方法：** 我们对这些文献进行了系统回顾，涵盖 Cochrane 图书馆、PubMed、EMBASE 和 Web of Science 等关键数据库。最新信息更新至2025年12月。使用STATA 18进行数据分析。连续结果表示为加权平均差，而分类结果则用比值比总结，每个结果都带有95%置信区间。使用纽卡斯尔-渥太华量表（NOS）评估纳入研究的严谨性。\n\n**结果：** 综合了涵盖 2324 名患者的五项合格研究。与传统护理相比，ERAS 的实施可显着缩短住院时间（WMD = - 2.38 天；95% CI：-4.16，- 0.61；P < 0.01），同时总体术后并发症较少（OR = 0.55；95% CI：0.44，0.68；P < 0.01）。 P < 0.05）和术后肠梗阻发生率降低（OR = 0.57；95% CI：0.38，0.86；P < 0.05）。各组之间的再入院率具有可比性（OR = 0.99，95% CI：0.55，1.79；P = 0.952），手术时间没有观察到有意义的差异（WMD = 3.53，95% CI：-15.76，22.81；P = 0.115）。\n\n**结论：** ERAS 方案与微创结直肠手术协同作用，可在不影响安全性的情况下加速康复并减少并发症。未来需要对前瞻性设计进行调查，以确认这些结果的稳健性。", "keywords_zh": "结直肠癌、ERAS、Meta分析、微创手术、机器人手术", "keywords_en": "Colorectal cancer, ERAS, Meta-analysis, Minimally invasive surgery, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/41665757/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 10 Feb 2026"}, {"id": "41659148", "title_en": "Efficacy and safety of bipolar energy-based therapy for hemorrhoids: a systematic review", "title_zh": "双极能量疗法治疗痔疮的疗效和安全性：系统评价", "authors": "Douglas G Adler", "abstract_en": "**Background:** Hemorrhoids arise from dilated vessels in the submucosal layer of the anorectal canal. Hemorrhoids are responsible for 4 million office and emergency visits annually in the US. Hemorrhoidal energy therapy (HET) is a novel nonsurgical, bipolar energy-based instrument for treating hemorrhoids. It has multiple benefits, such as requiring only a single session for resolution of symptoms, and minimizing heat-related collateral damage. However, there are limited data regarding the effectiveness and adverse events of HET. We performed the first systematic review to evaluate the efficacy and safety of HET in the treatment of internal hemorrhoids.\n\n**Methods:** A comprehensive search was performed from major databases to identify studies that investigated HET to treat hemorrhoids. The primary outcomes were technical success and clinical success. The secondary outcomes were total adverse events and individual adverse events, such as postprocedural bleeding and incontinence.\n\n**Results:** Eight studies with 512 patients were included in the meta-analysis. The average age was 55.6 years, and the majority of patients were female. Most patients presented with grade I and grade II hemorrhoids. The HET demonstrated technical and clinical success rates of 100% and 86.1%, respectively. All adverse events were determined to be mild, according to the ASGE lexicon, except for 1 case of perianal hematoma that required hospitalization.\n\n**Conclusion:** Our study demonstrates that HET is an effective and safe treatment for grade I and II internal hemorrhoids.", "abstract_zh": "**背景：** 痔疮由肛门直肠管粘膜下层扩张的血管引起。在美国，每年有 400 万人次因痔疮而到办公室就诊和急诊。痔疮能量疗法（HET）是一种新型非手术、双极能量治疗痔疮的仪器。它有多种好处，例如只需一次疗程即可解决症状，并最大限度地减少与热相关的附带损害。然而，关于 HET 的有效性和不良事件的数据有限。我们进行了首次系统评价，以评估 HET 治疗内痔的有效性和安全性。\n\n**方法：** 对主要数据库进行了全面检索，以确定研究 HET 治疗痔疮的研究。主要成果是技术成功和临床成功。次要结局是总体不良事件和个体不良事件，例如术后出血和失禁。\n\n**结果：** 荟萃分析中纳入了 8 项涉及 512 名患者的研究。平均年龄为55.6岁，大多数患者为女性。大多数患者患有 I 级和 II 级痔疮。 HET 的技术成功率和临床成功率分别为 100% 和 86.1%。根据 ASGE 词典，除 1 例需要住院治疗的肛周血肿外，所有不良事件均被确定为轻微。\n\n**结论：** 我们的研究表明，HET 是治疗 I 级和 II 级内痔的有效且安全的方法。", "keywords_zh": "双极能量疗法、痔疮能量疗法、内痔", "keywords_en": "Bipolar energy-based therapy, hemorrhoidal energy therapy, internal hemorrhoids", "link": "https://pubmed.ncbi.nlm.nih.gov/41659148/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 09 Feb 2026"}, {"id": "41640613", "title_en": "Is salvage treatment necessary after incomplete resection of rectal neuroendocrine tumors: A systematic review and meta-analysis", "title_zh": "直肠神经内分泌肿瘤不完全切除后是否需要挽救治疗：系统评价和荟萃分析", "authors": "Seun Ja Park", "abstract_en": "**Background:** Incomplete resection of rectal neuroendocrine tumors (NETs), defined by positive or indeterminate margins or lymphovascular invasion, raises concerns regarding residual disease and recurrence. However, the benefits of salvage treatment in these cases remain unclear.\n\n**Aim:** To evaluate the oncologic impact of salvage treatment compared with observation after incomplete endoscopic resection of rectal NETs through a systematic review and meta-analysis.\n\n**Methods:** We conducted a systematic review and meta-analysis in accordance with the preferred reporting items for systematic reviews and meta-analyses guidelines. MEDLINE, EMBASE, and the Cochrane Library were searched from their inception until May 2025. Eligible studies included patients with incompletely resected rectal NETs managed with salvage treatment or observation, reporting outcomes of residual tumors or recurrence. Pooled estimates were calculated using random-effects models with Hartung-Knapp adjustments.\n\n**Results:** Thirty-four studies with 2279 cases of incomplete endoscopic resection met the inclusion criteria. The incomplete resection rates differed markedly according to the initial resection method (17 studies): 73.1% for cold snare polypectomy, 29.8% for conventional endoscopic mucosal resection (EMR), 28.4% for modified EMR, and 14.7% for endoscopic submucosal dissection. Among the 19 studies that evaluated salvage treatment, the pooled residual tumor rate was 25.0% [95% confidence interval (CI): 12.0%-40.0%]. The crude recurrence rates from 31 studies favored salvage treatment over observation (0.96% <i>vs</i> 2.96%, <i>P</i> = 0.003). However, a meta-analysis of nine comparative studies found no statistically significant difference in recurrence risk (odds ratio = 0.89; 95%CI: 0.40-2.02).\n\n**Conclusion:** Given the relatively high residual tumor rate and low incidence of recurrence, salvage treatment may be justified as both a diagnostic and therapeutic approach after incomplete resection of rectal NETs. Although its benefits in preventing recurrence remain unclear, clinical decisions should be individualized, as these findings are based on low-certainty evidence.", "abstract_zh": "**背景：** 直肠神经内分泌肿瘤（NET）的不完全切除（定义为阳性或不确定的切缘或淋巴血管侵犯）引起了对残留疾病和复发的担忧。然而，在这些病例中挽救治疗的益处仍不清楚。\n\n**Aim：** 通过系统评价和荟萃分析，与直肠 NET 不完全内镜切除术后观察相比，评估挽救治疗的肿瘤学影响。\n\n**方法：** 我们根据系统评价和荟萃分析指南的首选报告项目进行了系统评价和荟萃分析。 MEDLINE、EMBASE 和 Cochrane 图书馆的检索时间从最初到 2025 年 5 月。符合条件的研究包括直肠 NET 切除不完全、接受挽救治疗或观察的​​患者，报告残留肿瘤或复发的结果。使用随机效应模型和 Hartung-Knapp 调整来计算汇总估计值。\n\n**结果：** 34 项研究涉及 2279 例不完全内镜切除病例，符合纳入标准。根据初始切除方法（17项研究），不完全切除率存在显着差异：冷圈套器息肉切除术为73.1%，传统内镜粘膜切除术（EMR）为29.8%，改良EMR为28.4%，内镜粘膜下剥离术为14.7%。在评估挽救治疗的 19 项研究中，汇总残留肿瘤率为 25.0% [95% 置信区间 (CI)：12.0%-40.0%]。 31 项研究的粗复发率倾向于挽救治疗而非观察（0.96% <i>vs</i> 2.96%，<i>P</i> = 0.003）。然而，对九项比较研究的荟萃分析发现，复发风险没有统计学上的显着差异（比值比 = 0.89；95% CI：0.40-2.02）。\n\n**结论：** 鉴于相对较高的残留肿瘤率和较低的复发率，挽救治疗可能是直肠 NET 不完全切除后的一种诊断和治疗方法。尽管其预防复发的益处尚不清楚，但临床决策应个体化，因为这些发现基于低质量证据。", "keywords_zh": "神经内分泌肿瘤，观察，直肠，残留肿瘤，抢救治疗", "keywords_en": "Neuroendocrine tumors, Observation, Rectum, Residual neoplasm, Salvage therapy", "link": "https://pubmed.ncbi.nlm.nih.gov/41640613/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 05 Feb 2026"}, {"id": "41629638", "title_en": "Fecal incontinence after prostate cancer irradiation: a systematic literature review", "title_zh": "前列腺癌照射后大便失禁：系统文献综述", "authors": "Jean-Michel Hannoun-Levi", "abstract_en": "**Goal:** Fecal incontinence (FI) is an underrecognized but clinically significant late gastrointestinal toxicity following radiotherapy (RT) for prostate cancer. This systematic review aimed to synthesize current knowledge on the definition and pathophysiology of post-radiation anal continence, as well as prevention strategies, technical considerations, and therapeutic approaches.\n\n**Method:** A systematic literature search was conducted according to PRISMA guidelines using the keywords: \"Fecal incontinence,\" \"Radiation therapy,\" and \"Prostatic neoplasms.\" Eligible studies included randomized phase III trials and prospective or retrospective series reporting on FI after definitive or adjuvant/salvage prostate RT. Fifty-four articles were included in the final analysis.\n\n**Results:** FI after prostate RT results from functional, morphological, and neurogenic alterations of the anorectal system. Reported incidence ranges from 1 to 12%, most often presenting as flatulence or liquid stool leakage, while severe forms requiring pads are uncommon. Variability is largely explained by heterogeneity in definitions and assessment tools, as no standardized scoring system is universally applied. Risk factors include advanced age, prior abdominal surgery, vascular comorbidities, chronic inflammatory bowel disease, hemorrhoids, and rectal urgency during RT. Dosimetric analyses indicate that low-to-intermediate doses to the anal canal and high doses to the rectum contribute differentially to FI. Based on current evidence, the mean dose to the anal canal should be kept below 37 Gy, though further studies are needed to define precise constraints for both structures. Preventive strategies such as MRI-based contouring and endorectal balloon placement, perirectal hydrogel spacers placement show promise. Management is multidisciplinary, including dietary measures, medications, pelvic floor therapy, neuromodulation, and, in severe cases, diversion procedures.\n\n**Conclusion:** FI after prostate RT is likely underestimated due to the absence of a standardized assessment. Developing a validated, universally applicable scoring system is a priority to improve evaluation, enable cross-study comparisons, refine preventive measures, and guide therapeutic strategies.", "abstract_zh": "**Goal：** 大便失禁（FI）是前列腺癌放疗（RT）后一种未被充分认识但具有临床意义的晚期胃肠道毒性。本系统综述旨在综合有关放射后肛门失禁的定义和病理生理学以及预防策略、技术考虑和治疗方法的最新知识。\n\n**Method：** 根据 PRISMA 指南，使用关键词“大便失禁”、“放射治疗”和“前列腺肿瘤”进行系统文献检索。符合条件的研究包括随机 III 期试验以及确定性或辅助/挽救性前列腺放疗后 FI 的前瞻性或回顾性系列报告。最终分析纳入54篇文章。\n\n**结果：** 前列腺放疗后的 FI 是由肛门直肠系统的功能、形态和神经源性改变引起的。报道的发病率从 1% 到 12% 不等，最常表现为胀气或粪便渗漏，而需要护垫的严重形式并不常见。变异性很大程度上是由定义和评估工具的异质性造成的，因为没有普遍应用的标准化评分系统。危险因素包括高龄、既往腹部手术、血管合并症、慢性炎症性肠病、痔疮和放疗期间的直肠紧迫感。剂量分析表明，肛管低至中剂量和直肠高剂量对 FI 的影响不同。根据目前的证据，肛管的平均剂量应保持在 37Gy 以下，尽管还需要进一步研究来确定这两种结构的精确限制。基于 MRI 的轮廓塑造和直肠内球囊放置、直肠周围水凝胶垫片放置等预防策略显示出希望。治疗是多学科的，包括饮食措施、药物、盆底治疗、神经调节，以及严重情况下的分流手术。\n\n**结论：** 由于缺乏标准化评估，前列腺放疗后的 FI 可能被低估。开发一个经过验证的、普遍适用的评分系统是改进评估、实现交叉研究比较、完善预防措施和指导治疗策略的首要任务。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41629638/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 02 Feb 2026"}, {"id": "41604561", "title_en": "Colitis cystica profunda: a systematic review", "title_zh": "深部囊性结肠炎：系统评价", "authors": "Priyanka Kanth", "abstract_en": "Colitis cystica profunda (CCP) is an uncommon, benign colorectal lesion that can mimic malignancy. We conducted a systematic review of histologically confirmed CCP case reports and series to define epidemiology, presentation, diagnostic yield, management, and outcomes. Following PRISMA 2020, Embase, PubMed/MEDLINE, Web of Science, and CINAHL were searched (1965-2025); two reviewers independently screened studies and extracted demographic, clinical, imaging, histologic, treatment, and outcome data. Sixty-five studies (92 patients) met criteria. Mean age was 40 ± 12 years (median 39), and 54% were male. Rectal bleeding (70%), mucus discharge (32%), diarrhea (24%), and abdominal/rectal pain (26%) were most common; 12% were asymptomatic. Lesions were predominantly distal (rectum 61%), and superficial biopsies reached the submucosa in only 32%, contributing to frequent sampling error; Endoscopic ultrasound (EUS) and cross-sectional imaging typically showed submucosal cystic lesions with intact muscularis propria. Conservative and medical therapy were each attempted in 16% of patients, endoscopic resection in 14%, and surgery in 67%, most commonly local transanal/perineal excision (40% of surgeries) or segmental/partial colectomy (32% of surgeries). Dysplasia was reported in 10% and coexisting invasive adenocarcinoma in 4% at diagnosis; no subsequent malignant transformation was reported over a median follow-up of 8.4 months. Post-operative morbidity occurred in 5% and recurrence in 4%. CCP is a rare but important mimic of colorectal cancer; diagnosis is optimized with deep tissue sampling and high-resolution imaging. When feasible, organ-preserving endoscopic or local excision can achieve durable symptom resolution with low morbidity while avoiding unnecessary radical surgery.", "abstract_zh": "深部囊性结肠炎 (CCP) 是一种罕见的良性结直肠病变，可能类似于恶性肿瘤。我们对组织学证实的 CCP 病例报告和系列进行了系统回顾，以确定流行病学、表现、诊断率、管理和结果。 PRISMA 2020 之后，检索了 Embase、PubMed/MEDLINE、Web of Science 和 CINAHL（1965-2025 年）；两名评审员独立筛选研究并提取人口统计、临床、影像、组织学、治疗和结果数据。 65 项研究（92 名患者）符合标准。平均年龄为 40±12 岁（中位数 39 岁），其中 54% 为男性。最常见的是直肠出血（70%）、粘液排出（32%）、腹泻（24%）和腹部/直肠疼痛（26%）； 12%无症状。病变主要位于远端（直肠 61%），浅表活检仅到达粘膜下层，仅 32%，导致频繁出现采样错误；超声内镜 (EUS) 和横截面成像通常显示粘膜下囊性病变，固有肌层完整。 16% 的患者尝试了保守治疗和药物治疗，14% 的患者尝试了内镜切除术，67% 的患者尝试了手术，最常见的是局部经肛门/会阴切除术（占手术的 40%）或节段/部分结肠切除术（占手术的 32%）。据报道，诊断时 10% 存在不典型增生，4% 存在共存浸润性腺癌；中位随访时间为 8.4 个月，未报告随后发生恶变。术后发病率为 5%，复发率为 4%。 CCP 是一种罕见但重要的结直肠癌类似物；通过深层组织采样和高分辨率成像优化诊断。在可行的情况下，保留器官的内窥镜或局部切除术可以以较低的发病率实现持久的症状缓解，同时避免不必要的根治性手术。", "keywords_zh": "深部囊性结肠炎、内窥镜切除术、粘液性结肠炎、直肠出血、粘膜下囊肿", "keywords_en": "colitis cystica profunda, endoscopic resection, mucous colitis, rectal bleeding, submucosal cysts", "link": "https://pubmed.ncbi.nlm.nih.gov/41604561/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 28 Jan 2026"}, {"id": "41586878", "title_en": "Metronidazole is an effective method of analgesia following haemorrhoidectomy: a systematic review and meta-analysis", "title_zh": "甲硝唑是痔切除术后镇痛的有效方法：系统评价和荟萃分析", "authors": "Christina A Fleming", "abstract_en": "**Background:** Haemorrhoids are one of the most frequently encountered benign anorectal conditions that negatively impact patients' quality of life. Excisional haemorrhoidectomy (closed or open) is a surgical procedure reserved for the treatment of third- and fourth-degree haemorrhoids, with considerable post-procedure pain reported. The aim of this study was to clarify the association between post operative metronidazole use (both oral and topical) and post-haemorrhoidectomy pain scores through systematic review and meta-analysis of randomised controlled trials (RCTs).\n\n**Methods:** This study was guided by the Preferred Reporting Items for Systematic Reviews and Meta-Analysis (PRISMA) guidelines. Prospective registration was performed on PROSPERO (CRD42024580928). A systematic review was performed for RCTs reporting post-haemorrhoidectomy pain scores between patients who received metronidazole and patients who received placebo. Meta-analysis was performed using RevMan version 5.4.\n\n**Results:** Seventeen RCTs including 1297 participants were eligible for inclusion. Metronidazole administration was associated with significantly lower post-operative visual analogue scores (VAS) on day 1 (-1.18, p < 0.00001), day 2 (-1.15, p = 0.003), day 3 (-0.86, p < 0.00001), and day 7 post-operatively with a mean pain score difference of -1.72 (95% CI -2.27 to -1.18) (p < 0.00001). A significant difference in pain scores was seen on day 3 favouring topical metronidazole in comparison to the oral route (1.38, 95% CI [0.44, 2.32], p = 0.004).\n\n**Conclusion:** This review synthesises the best available evidence to support the use of metronidazole to reduce pain after excisional haemorrhoidectomy. While both oral and topical forms appear to be beneficial, topical administration appears to have a more effective analgesic effect from post-operative day 3.", "abstract_zh": "**背景：** 痔疮是最常见的良性肛门直肠疾病之一，会对患者的生活质量产生负面影响。痔疮切除术（封闭式或开放式）是一种专为治疗三度和四度痔疮而保留的外科手术，据报道有相当大的术后疼痛。本研究的目的是通过随机对照试验 (RCT) 的系统回顾和荟萃分析，阐明术后使用甲硝唑（口服和局部）与痔疮切除术后疼痛评分之间的关​​联。\n\n**方法：** 本研究以系统评价和荟萃分析首选报告项目 (PRISMA) 指南为指导。在 PROSPERO (CRD42024580928) 上进行了前瞻性注册。对报告接受甲硝唑的患者和接受安慰剂的患者之间痔疮切除术后疼痛评分的随机对照试验进行了系统评价。使用 RevMan 5.4 版进行荟萃分析。\n\n**结果：** 包括 1297 名参与者在内的 17 项 RCT 有资格纳入。甲硝唑给药与术后第 1 天（-1.18，p < 0.00001）、第 2 天（-1.15，p = 0.003）、第 3 天（-0.86，p < 0.00001）和术后第 7 天显着降低的术后视觉模拟评分（VAS）相关，平均疼痛评分差异为-1.72（95% CI -2.27 至 -1.18）（p < 0.00001）。与口服途径相比，第 3 天局部使用甲硝唑的疼痛评分存在显着差异（1.38，95% CI [0.44，2.32]，p = 0.004）。\n\n**结论：** 本综述综合了现有的最佳证据，支持使用甲硝唑来减轻痔疮切除术后的疼痛。虽然口服和外用形式似乎都是有益的，但从术后第 3 天开始，局部给药似乎具有更有效的镇痛效果。", "keywords_zh": "痔疮，甲硝唑，RCT", "keywords_en": "Haemorrhoids, Metronidazole, RCT", "link": "https://pubmed.ncbi.nlm.nih.gov/41586878/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 26 Jan 2026"}, {"id": "41554450", "title_en": "Salvia plebeia R.Br.: A comprehensive review of its ethnopharmacology, phytochemistry, pharmacological activities, quality control, and current applications", "title_zh": "Salvia plebeia R.Br.：对其民族药理学、植物化学、药理活性、质量控制和当前应用的全面综述", "authors": "Wei Jiang", "abstract_en": "**Ethnopharmacological Relevance:** Salvia plebeia R.Br. (Lamiaceae), the dried aerial parts, has been traditionally used across China and East/South Asia to treat sore throat, bronchitis, nephritis edema, abscesses, mastitis, hemorrhoids, and bleeding disorders, consistent with traditional indications of heat-clearing, detoxifying, cooling blood, and promoting diuresis.\n\n**Aim Of The Review:** This study provides a systematic overview of the ethnopharmacology, phytochemistry, pharmacological activities, quality control, and current applications of S. plebeia, while highlighting current research gaps and future perspectives.\n\n**Materials And Methods:** A comprehensive literature search was conducted using multiple scientific databases, including Web of Science, PubMed, Elsevier, ACS, CNKI, and Google Scholar, covering publications from database inception to October 2025. Relevant information on the ethnopharmacology, phytochemistry, pharmacological activities, quality control, and applications of S. plebeia was systematically collected, screened, and synthesized according to predefined inclusion/exclusion criteria.\n\n**Results:** To date, 325 constituents have been identified, dominated by flavonoids, phenolic acids, terpenoids, volatile oils, sterols, lignans, and others. Extracts and purified compounds show tradition-relevant anti-inflammatory, antiviral, immunoregulatory, and antioxidant activities, while other reported effects (hepatoprotective, hypolipidemic, cardiovascular-protective, sedative/anticonvulsant, anticancer, and anti-photoaging) are presented as exploratory findings. Quality evaluation evolved from UV and HPLC to UPLC-MS fingerprinting using flavonoids and sesquiterpenes as markers. In practical applications, S. plebeia has been used in medicinal preparations for the management of pharyngitis, bronchitis, nephritis, dermatitis, and anorectal inflammation. In food sector, it has been developed into functional products, including health teas, chewable or effervescent tablets, composite beverages, and co-fermented vinegars.\n\n**Conclusion:** Although S. plebeia shows broad pharmacological potential, current investigations remain constrained by incomplete chemical space coverage, limited pharmacokinetic and toxicological characterization, and insufficient well-designed clinical evidence. Future research should focus on comprehensive constituent profiling, mechanism-oriented validation aligned with traditional indications, standardized quality markers/fingerprints, and rigorous PK-toxicology-clinical translation, to promote safe, effective, and evidence-based utilization of S. plebeia in medicine and functional food development.", "abstract_zh": "**Ethnopharmacological relevance：** 鼠尾草 (Salvia plebeia R.Br.) （唇形科）干燥的地上部分，在中国和东亚/南亚传统上用于治疗咽喉肿痛、支气管炎、肾炎水肿、脓肿、乳腺炎、痔疮和出血性疾病，符合清热解毒、凉血和利尿的传统功能。\n\n**Aim of the review：** 本研究系统概述了白花草的民族药理学、植物化学、药理活性、质量控制和当前应用，同时强调了当前的研究差距和未来前景。\n\n**材料与方法：** 利用Web of Science、PubMed、Elsevier、ACS、CNKI和Google Scholar等多个科学数据库进行了全面的文献检索，涵盖了从数据库建库到2025年10月的出版物。根据预先确定的纳入/排除标准，系统收集、筛选和合成了白花草的民族药理学、植物化学、药理活性、质量控制和应用的相关信息。\n\n**结果：** 迄今为止，已鉴定出325种成分，主要为黄酮类、酚酸类、萜类、挥发油类、甾醇类、木脂素类等。提取物和纯化的化合物显示出传统相关的抗炎、抗病毒、免疫调节和抗氧化活性，而其他报道的作用（保肝、降血脂、心血管保护、镇静/抗惊厥、抗癌和抗光老化）则作为探索性发现提出。质量评估从 UV 和 HPLC 发展到使用类黄酮和倍半萜作为标记物的 UPLC-MS 指纹分析。在实际应用中，S. plebeia已被用于治疗咽炎、支气管炎、肾炎、皮炎和肛门直肠炎症的药物制剂。在食品领域，已开发成功能性产品，包括保健茶、咀嚼片或泡腾片、复合饮料、共发酵醋等。\n\n**结论：** 尽管S. plebeia显示出广泛的药理学潜力，但目前的研究仍然受到化学空间覆盖不完整、药代动力学和毒理学特征有限以及精心设计的临床证据不足的限制。未来的研究应侧重于全面的成分分析、与传统适应症一致的机制导向验证、标准化的质量标记/指纹以及严格的PK-毒理学-临床转化，以促进平纹草在医学和功能性食品开发中安全、有效和循证的利用。", "keywords_zh": "当前应用、民族药理学、药理活性、植物化学、质量控制、Salvia plebeia R.Br。", "keywords_en": "Current applications, Ethnopharmacology, Pharmacological activity, Phytochemistry, Quality control, Salvia plebeia R.Br.", "link": "https://pubmed.ncbi.nlm.nih.gov/41554450/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 19 Jan 2026"}, {"id": "41535511", "title_en": "Long-term outcomes of stapled haemorrhoidopexy versus conventional haemorrhoidectomy: An updated systematic review, meta-analysis and trial-sequential analysis of randomized controlled trials", "title_zh": "吻合器痔疮固定术与传统痔疮切除术的长期结果：随机对照试验的最新系统评价、荟萃分析和试验序贯分析", "authors": "Roberto Cirocchi", "abstract_en": "**Purpose:** Stapled haemorrhoidopexy (SH) offers well-established short-term advantages over conventional haemorrhoidectomy (CH), but its long-term effectiveness remains controversial. This systematic review and meta-analysis aimed to compare long-term outcomes of SH versus CH in adult patients with grade II-IV haemorrhoids, incorporating Trial Sequential Analysis (TSA).\n\n**Methods:** MEDLINE, EMBASE and CENTRAL were searched from January 2001 to October 2025 for randomized controlled trials (RCTs) comparing SH and CH with a minimum follow-up of 12 months. Two reviewers independently performed study selection, data extraction and risk-of-bias assessment (RoB-2). Primary outcomes included recurrence, reintervention, anal function, and quality of life (QoL). Pooled risk ratios (RRs) with 95% confidence intervals (CIs) were calculated using random-effects models. TSA was applied to overall recurrence.\n\n**Results:** Seventeen RCTs including 1,041 SH and 1,031 CH patients were analysed. SH was associated with a higher risk of overall recurrence compared with CH (RR = 1.56,95%CI = 1.00-2.44;I<sup>2</sup> = 48%). TSA showed that the accrued information size (1,913 patients) did not reach the required information size (2,608 patients), indicating that current evidence remains underpowered. Prolapse-related recurrence was significantly more frequent after SH (RR = 3.28,95%CI = 1.49-7.25;I<sup>2</sup> = 12%), whereas bleeding-related recurrence did not differ between groups (RR = 1.20,95%CI = 0.63-2.26;I<sup>2</sup> = 23%). No significant differences were found for reintervention, persistent anal pain, functional impairment or QoL.\n\n**Conclusion:** SH is associated with a higher risk of long-term recurrence, particularly prolapse-related recurrence, compared with CH, while long-term pain, functional outcomes and QoL appear broadly comparable. These findings suggest that, although SH may remain an option for selected patients, CH provides more durable anatomical correction, and procedural choice should balance early recovery against long-term durability.", "abstract_zh": "**Purpose：** 与传统痔疮切除术 (CH) 相比，吻合器痔疮固定术 (SH) 具有明显的短期优势，但其长期有效性仍存在争议。这项系统评价和荟萃分析旨在比较 SH 与 CH 在 II-IV 级痔疮成年患者中的长期结局，并结合试验序贯分析 (TSA)。\n\n**方法：** 检索了 2001 年 1 月至 2025 年 10 月期间 MEDLINE、EMBASE 和 CENTRAL 中比较 SH 和 CH 的随机对照试验 (RCT)，随访时间至少为 12 个月。两名评审员独立进行研究选择、数据提取和偏倚风险评估（RoB-2）。主要结局包括复发、再次干预、肛门功能和生活质量 (QoL)。使用随机效应模型计算具有 95% 置信区间 (CI) 的合并风险比 (RR)。 TSA 应用于总体复发情况。\n\n**结果：** 分析了 17 项随机对照试验，包括 1,041 名 SH 和 1,031 名 CH 患者。与CH相比，SH与较高的总体复发风险相关（RR = 1.56，95%CI = 1.00-2.44；I<sup>2</sup> = 48%）。 TSA 显示，累积的信息量（1,913 名患者）未达到所需的信息量（2,608 名患者），表明当前证据仍然不足。 SH 后脱垂相关复发显着增加 (RR = 3.28,95%CI = 1.49-7.25;I<sup>2</sup> = 12%)，而出血相关复发在组间没有差异(RR = 1.20,95%CI = 0.63-2.26;I<sup>2</sup> = 23%)。在重新干预、持续性肛门疼痛、功能障碍或生活质量方面没有发现显着差异。\n\n**结论：** 与 CH 相比，SH 与较高的长期复发风险相关，特别是与脱垂相关的复发，而长期疼痛、功能结果和生活质量似乎大致相当。这些研究结果表明，尽管 SH 可能仍然是选定患者的一种选择，但 CH 提供了更持久的解剖矫正，并且手术选择应平衡早期恢复与长期耐久性。", "keywords_zh": "圆形吻合器、弗格森、痔切除术、痔疮、谐波手术刀、LigaSure、Milligan-Morgan、PPH、吻合器痔疮固定术", "keywords_en": "Circular stapler, Ferguson, Haemorrhoidectomy, Haemorrhoids, Harmonic scalpel, LigaSure, Milligan-Morgan, PPH, Stapled haemorrhoidopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/41535511/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 14 Jan 2026"}, {"id": "41503542", "title_en": "Arterial Embolization for the Internal Hemorrhoids Management: A Systematic Review", "title_zh": "动脉栓塞治疗内痔：系统评价", "authors": "Hadi Rokni Yazdi", "abstract_en": "**Background And Aims:** Hemorrhoids are common vascular structures that can become symptomatic when prolapsed, representing the most prevalent benign anorectal condition worldwide. Despite affecting up to 11% of the population with symptoms including pain, bleeding, and discomfort, hemorrhoids remain underdiagnosed and often inappropriately managed. This systematic review aimed to evaluate the efficacy, clinical outcomes, and morbidity of endovascular artery embolization in hemorrhoids.\n\n**Method:** Up to August 2022, PubMed, Scopus, Web of Science, and Embase were searched comprehensively. All studies had eligible criteria included, except review articles, articles published in a language other than English, and case reports or series of cases. Two independent reviewers performed a literature review and data extraction. Preferred Reporting Items for Systematic Reviews and Meta-Analysis (PRISMA) 2020 checklist was used for quality assessment.\n\n**Results:** The systematic review included 15 studies. The patient's age ranged from 40.5 ± 9.51 to 72.2 ± 10.9. Eleven studies mentioned the sample size as gender-specific, with 57.89% (<i>n</i> = 187/323) male patients. The embolic site involved in embolization, according to the frequency, was 424 patients for the superior rectal artery in all studies, and coils and micro coils were utilized as Embolic material in most cases. No major complication or death was noted in 12 studies. The most frequent complications were postoperative pain and tenesmus, bleeding, ulceration and fibrotic scars, and low-grade fever. In 11.79% (<i>n</i> = 27/229) of patients re-embolization and after-treatment surgery were due to surgical failure and symptom recurrence, such as bleeding.\n\n**Conclusion:** Rectal artery embolization using microcoils, embolic particles, or a combination is a new method for managing internal hemorrhoids with proper clinical efficacy without significant complications. QoL score has improved after emborrhoid, and most cases had a lower bleeding score.", "abstract_zh": "**Background and aims：** 痔疮是常见的血管结构，脱垂时会出现症状，是全世界最常见的良性肛门直肠疾病。尽管有多达 11% 的人口出现疼痛、出血和不适等症状，但痔疮的诊断率仍然较低，而且往往治疗不当。本系统评价旨在评估血管内动脉栓塞治疗痔疮的疗效、临床结果和发病率。\n\n**Method：** 截至2022年8月，PubMed、Scopus、Web of Science、Embase均被全面检索。所有研究均包含合格标准，但评论文章、以英语以外的语言发表的文章以及病例报告或系列病例除外。两名独立评审员进行了文献评审和数据提取。系统评价和荟萃分析的首选报告项目 (PRISMA) 2020 检查表用于质量评估。\n\n**结果：** 系统评价包括 15 项研究。患者年龄为40.5±9.51岁至72.2±10.9岁。 11 项研究提到样本量具有性别特异性，其中 57.89% (<i>n</i> = 187/323) 为男性患者。所有研究中涉及栓塞的部位为直肠上动脉424例，栓塞部位多采用弹簧圈和微弹簧圈作为栓塞材料。 12 项研究中未发现重大并发症或死亡。最常见的并发症是术后疼痛和里急后重、出血、溃疡和纤维化疤痕以及低烧。 11.79%（<i>n</i> = 27/229）的患者再次栓塞和治疗后手术是由于手术失败和出血等症状复发。\n\n**结论：** 使用微弹簧圈、栓塞颗粒或其组合进行直肠动脉栓塞是一种治疗内痔的新方法，具有良好的临床疗效，且无明显并发症。痔疮术后生活质量评分有所改善，大多数病例的出血评分较低。", "keywords_zh": "栓塞, 痔疮, 痔疮, 痔动脉, 直肠动脉", "keywords_en": "embolization, emborrhoid, hemorrhoid, hemorrhoidal artery, rectal artery", "link": "https://pubmed.ncbi.nlm.nih.gov/41503542/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 08 Jan 2026"}, {"id": "41450176", "title_en": "Worldwide prevalence of haemorrhoids: a systematic review and meta-analysis", "title_zh": "全球痔疮患病率：系统评价和荟萃分析", "authors": "Pouyan Ebrahimi", "abstract_en": "**Background:** Haemorrhoidal disease (HD) is one of the most common anorectal disorders globally, significantly impacting individuals' quality of life and productivity. Despite its importance, global prevalence remains unclear due to limited population-specific studies. This study aimed to systematically assess the global prevalence of HD through a systematic review and meta-analysis.\n\n**Methods:** We conducted a systematic review and meta-analysis by searching PubMed, Scopus, Embase, Web of Science, and Google Scholar up to March 31, 2025, without language restrictions. Studies reporting prevalence of haemorrhoids in general, clinical, or high-risk populations were included. Exclusion criteria comprised studies lacking total sample size, focusing on other anorectal conditions, or using duplicate or insufficient data. Four independent reviewers extracted and appraised study quality using the Joanna Briggs Institute tool. The primary outcome was pooled point prevalence of HD, analyzed using a random-effects model with 95% confidence intervals (CIs). The study was registered in PROSPERO (CRD420251045600).\n\n**Results:** From 6,312 records, 150 studies (210 datasets) comprising 8,960,338 individuals were included. The global pooled point prevalence was 25.92% (95% CI: 22.62-29.22). Lifetime prevalence was 27.19% (95% CI: 14.77-39.60), and one-year prevalence was 21.65% (95% CI: 14.33-28.97). Prevalence was higher in women (27.33%, 95% CI: 21.84-32.82) than in men, and highest in the African region 28.07% (95% CI: 15.34-40.79). Invasive diagnostic methods (28.05%, 95% CI: 23.86-32.26) yielded higher prevalence estimates than non-invasive methods. Also, factors showing associations with HD in unadjusted analyses include older age, obesity, pregnancy, diabetes, family history, constipation, and hypertension.\n\n**Conclusion:** HD remains a prevalent condition globally, with minor variation across regions. The burden is consistent regardless of socioeconomic context. Diagnostic method and population characteristics influence prevalence estimates. These findings underscore the importance of targeted prevention and early intervention strategies, especially for at-risk groups.", "abstract_zh": "**背景：** 痔疮疾病（HD）是全球最常见的肛门直肠疾病之一，显着影响个人的生活质量和生产力。尽管其重要性，但由于针对特定人群的研究有限，全球患病率仍不清楚。本研究旨在通过系统回顾和荟萃分析来系统评估 HD 的全球患病率。\n\n**方法：** 我们通过检索截至 2025 年 3 月 31 日的 PubMed、Scopus、Embase、Web of Science 和 Google Scholar，进行了系统综述和荟萃分析，没有语言限制。报告包括一般人群、临床人群或高危人群中痔疮患病率的研究。排除标准包括缺乏总样本量、关注其他肛门直肠疾病或使用重复或不足数据的研究。四位独立评审员使用乔安娜布里格斯研究所工具提取并评估研究质量。主要结果是 HD 的汇总点患病率，使用具有 95% 置信区间 (CI) 的随机效应模型进行分析。该研究已在 PROSPERO 中注册（CRD420251045600）。\n\n**结果：** 从 6,312 条记录中，纳入了 150 项研究（210 个数据集），涉及 8,960,338 名个体。全球汇总点患病率为 25.92%（95% CI：22.62-29.22）。终生患病率为 27.19%（95% CI：14.77-39.60），一年患病率为 21.65%（95% CI：14.33-28.97）。女性患病率（27.33%，95% CI：21.84-32.82）高于男性，非洲地区患病率最高，为 28.07%（95% CI：15.34-40.79）。侵入性诊断方法（28.05%，95% CI：23.86-32.26）比非侵入性方法产生更高的患病率估计值。此外，未经调整的分析显示与 HD 相关的因素包括年龄较大、肥胖、怀孕、糖尿病、家族史、便秘和高血压。\n\n**结论：** HD 在全球范围内仍然是一种流行病，各地区之间差异较小。无论社会经济背景如何，负担都是一致的。诊断方法和人群特征影响患病率估计。这些发现强调了有针对性的预防和早期干预策略的重要性，特别是对于高危人群。", "keywords_zh": "痔疮、流行病学、痔疮、荟萃分析、患病率", "keywords_en": "Haemorrhoids, epidemiology, haemorrhoid, meta-analysis, prevalence", "link": "https://pubmed.ncbi.nlm.nih.gov/41450176/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 26 Dec 2025"}, {"id": "41444098", "title_en": "Clinical factors affecting the therapeutic dose window in cervical cancer brachytherapy: A systematic review and meta-regression", "title_zh": "影响宫颈癌近距离放射治疗治疗剂量窗的临床因素：系统评价和荟萃回归", "authors": "Nick J van de Berg", "abstract_en": "**Background And Purpose:** Although dose planning aims in cervical cancer brachytherapy are well-defined, variability in clinical practices makes it difficult to draw generalizable conclusions on achievable dosimetry. This review and meta-regression aim to assess clinical practices in terms of their therapeutic dose window, that is, the balance between target and organs-at-risk (OAR) doses.\n\n**Materials And Methods:** A search of the literature was performed in Scopus, PubMed, and Web of Science databases. Peer-reviewed articles were included that described planning constraints and reported high-risk clinical target volume (CTV<sub>HR</sub>) D<sub>90%</sub> and OAR [Formula: see text] for intracavitary (IC) tandem and ring (T&R) / tandem and ovoid (T&O) / mold (M) applicators, possibly supplemented with interstitial (IS) needles (+N). To determine factors associated with target volume coverage (D<sub>90%</sub>) and OAR sparing ( [Formula: see text] ), multivariate meta-regressions were performed.\n\n**Results:** Out of 1590 articles, 34 met the full inclusion criteria. In most studies, the CTV<sub>HR</sub>D<sub>90%</sub> aimed at ≥84-86 Gy EQD2<sub>α/β = 10Gy</sub>, and constraints for the OARs were 80-90 Gy, 65-75 Gy and 70-75 Gy EQD2<sub>α/β = 3Gy</sub> for the bladder, rectum and sigmoid [Formula: see text] , respectively. Studies using IC/IS applicators were associated with a ∼4 Gy increase in CTV<sub>HR</sub>D<sub>90%</sub> compared to IC only, with no effect on OAR dose. T&R studies achieved improvements of 3.2 Gy and 2.8-3.4 Gy at typical planning aims in comparison with T&O applicators in target and OAR doses. In 100% (15/15) of patient groups treated with T&R + N both CTV<sub>HR</sub> and OAR objectives were met for the population average. For T&R, T&O, and T&O + N groups, this was the case in 89% (8/9), 43% (6/14), and 50% (4/8), respectively.\n\n**Conclusion:** Studies using interstitial needles with T&R applicators in MR-guided brachytherapy for cervical cancer seem to be associated with a favorable therapeutic target dose/OAR sparing ratio.", "abstract_zh": "**背景与目的：** 尽管宫颈癌近距离放射治疗的剂量计划目标是明确定义的，但临床实践的可变性使得很难就可实现的剂量测定得出普遍的结论。本综述和荟萃回归旨在评估临床实践的治疗剂量窗口，即目标剂量和危及器官（OAR）剂量之间的平衡。\n\n**材料与方法：** 在 Scopus、PubMed 和 Web of Science 数据库中进行了文献检索。其中包括同行评审的文章，描述了计划限制并报告了腔内 (IC) 串联和环形 (T&R) / 串联和卵形 (T&O) / 模具 (M) 施药器的高风险临床靶区 (CTV<sub>HR</sub>) D<sub>90%</sub> 和 OAR [公式：参见文本]，可能辅以间质 (IS) 针 (+N)。为了确定与目标体积覆盖 (D<sub>90%</sub>) 和 OAR 保留（[公式：见文本]）相关的因素，进行了多变量元回归。\n\n**结果：** 在 1590 篇文章中，有 34 篇符合完全纳入标准。在大多数研究中，CTV<sub>HR</sub>D<sub>90%</sub>的目标是≥84-86 Gy EQD2<sub>α/β=10Gy</sub>，OAR的限制为膀胱、直肠和乙状结肠80-90 Gy、65-75 Gy和70-75 Gy EQD2<sub>α/β=3Gy</sub> [式：见正文] 分别。与仅使用 IC 相比，使用 IC/IS 施药器的研究发现 CTV<sub>HR</sub>D<sub>90%</sub> 增加约 4 Gy，但对 OAR 剂量没有影响。与 T&O 施放器的目标剂量和 OAR 剂量相比，T&R 研究在典型计划目标下实现了 3.2 Gy 和 2.8-3.4 Gy 的改进。在 100% (15/15) 接受 T&R+N 治疗的患者组中，CTV<sub>HR</sub> 和 OAR 目标均达到总体平均水平。对于 T&R、T&O 和 T&O+N 组，这种情况的比例分别为 89% (8/9)、43% (6/14) 和 50% (4/8)。\n\n**结论：** 在 MR 引导的宫颈癌近距离放射治疗中使用间质针和 T&R 施源器的研究似乎与有利的治疗目标剂量/OAR 保留比相关。", "keywords_zh": "施源器使用、图像引导适应性近距离放射治疗、局部晚期宫颈癌、治疗剂量窗", "keywords_en": "Applicator use, Image-guided adaptive brachytherapy, Locally advanced cervical cancer, Therapeutic dose window", "link": "https://pubmed.ncbi.nlm.nih.gov/41444098/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 24 Dec 2025"}, {"id": "41413743", "title_en": "Altered molecular signature of the intestinal microbiota in irritable bowel syndrome patients versus healthy controls: An updated systematic review", "title_zh": "肠易激综合征患者与健康对照者肠道微生物群分子特征的改变：更新的系统评价", "authors": "Hui Zheng", "abstract_en": "**Background And Aims:** Irritable bowel syndrome (IBS), a prevalent functional gastrointestinal disorder, poses significant challenges for both patients and medical practitioners. Recent investigations have indicated the gut microbiome as a potential therapeutic target for IBS. Nevertheless, the exact association between these microorganisms and IBS symptoms remains incompletely elucidated. This updated systematic analysis aims to assess the extant research correlating the gut microbial community with IBS.\n\n**Methods:** A systematic search was performed in major electronic databases including PubMed, EMBASE and Web of Science, spanning from their inception to December 2024. The objective was to identify case-control studies that examined and compared the composition of the fecal or colonic microbiota in individuals diagnosed with IBS against healthy controls.\n\n**Results:** Our systematic search included 44 articles, which collectively revealed that IBS patients exhibit lower intestinal microbiome diversity compared to healthy controls. Fecal microbiome analysis demonstrated an imbalance in the phyla Firmicutes and Bacteroidetes among IBS patients. Specifically, IBS with diarrhea (IBS-D) patients showed reduced levels of Butyricimonas and Proteobacteria, while IBS with constipation (IBS-C) patients exhibited decreased Firmicutes and Actinobacteria, along with increased Verrucomicrobiota and Proteobacteria. Additionally, disruptions in the gut microbiome were noted, particularly in the duodenum and jejunum, as well as changes in key bacterial populations within the colon and rectum.\n\n**Conclusion:** Our review confirms significant gut microbiota dysbiosis in IBS patients, characterized by reduced microbial diversity and altered abundances of Firmicutes and Bacteroidetes. These findings support the potential for microbiota-targeted therapies in IBS management, though further research is needed to establish causal mechanisms and clinical applications.", "abstract_zh": "**Background and aims：** 肠易激综合症（IBS）是一种常见的功能性胃肠道疾病，给患者和医生带来了巨大的挑战。最近的研究表明肠道微生物组是 IBS 的潜在治疗靶点。然而，这些微生物与 IBS 症状之间的确切关联仍未完全阐明。这项更新的系统分析旨在评估现有的肠道微生物群落与肠易激综合症相关的研究。\n\n**方法：** 我们在包括 PubMed、EMBASE 和 Web of Science 在内的主要电子数据库中进行了系统检索，检索时间从数据库成立到 2024 年 12 月。目的是确定病例对照研究，这些研究检查并比较了诊断为 IBS 的个体与健康对照者的粪便或结肠微生物群的组成。\n\n**结果：** 我们的系统搜索包括 44 篇文章，这些文章共同揭示了与健康对照相比，IBS 患者的肠道微生物组多样性较低。粪便微生物组分析表明 IBS 患者的厚壁菌门和拟杆菌门不平衡。具体而言，腹泻型IBS（IBS-D）患者的丁酸单胞菌和变形菌水平降低，而便秘型IBS（IBS-C）患者的厚壁菌门和放线菌减少，疣微生物群和变形菌增加。此外，还注意到肠道微生物组的破坏，特别是在十二指肠和空肠中，以及结肠和直肠内关键细菌种群的变化。\n\n**结论：** 我们的综述证实了 IBS 患者存在显着的肠道微生物群失调，其特征是微生物多样性减少以及厚壁菌门和拟杆菌门的丰度改变。这些发现支持了微生物群靶向治疗在 IBS 治疗中的潜力，尽管还需要进一步研究来确定因果机制和临床应用。", "keywords_zh": "IBS 肠易激综合征、IBS-C IBS 便秘、IBS-D IBS 腹泻、菌群失调、肠道微生物群、肠易激综合征、微生物组、系统评价", "keywords_en": "IBS irritable bowel syndrome, IBS-C IBS with constipation, IBS-D IBS with diarrhea, Dysbiosis, Gut microbiota, Irritable bowel syndrome, Microbiome, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/41413743/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 18 Dec 2025"}, {"id": "41399305", "title_en": "Diagnostic accuracy and safety of image-guided transperineal versus transrectal prostate biopsy for clinically significant prostate cancer: a GRADE-assessed systematic review and meta-analysis", "title_zh": "图像引导经会阴前列腺活检与经直肠前列腺活检对有临床意义的前列腺癌的诊断准确性和安全性：GRADE 评估的系统评价和荟萃分析", "authors": "Muhammad Salih", "abstract_en": "**Introduction:** This systematic review and meta-analysis compared the diagnostic performance and complication profiles of transperineal biopsy (TPBx) versus transrectal biopsy (TRBx) for prostate cancer, incorporating recent randomized and large observational studies.\n\n**Methods:** Following PRISMA 2020 guidelines, PubMed, Scopus, Embase, and Cochrane Library were searched till April 2025. Studies directly comparing TPBx and TRBx were included. Risk of bias was assessed using RoB 2.0 for randomized trials and the Newcastle - Ottawa Scale for observational studies. Pooled relative risks (RRs) with 95% confidence intervals (CIs) were calculated using random-effects models. Subgroup analyses and a GRADE assessment were performed to evaluate the certainty of evidence.\n\n**Results:** Twenty-nine studies (<i>n</i> = 90,621) were included. TPBx showed higher PCa detection (RR 1.08; 95% CI 1.01-1.15; <i>p</i> = 0.02) and csPCa detection (RR 1.14; 95% CI 1.05-1.24; <i>p</i> = 0.001), though the certainty of evidence was low to moderate. Heterogeneity was moderate to high. TPBx also showed lower infection-related complications and comparable overall events, though procedure-related pain was slightly higher.\n\n**Conclusion:** TPBx offers improved diagnostic yield and lower infection risk compared with TRBx, with comparable safety. However, given the moderate heterogeneity and limited high-quality RCTs, further confirmatory trials are necessary.\n\n**Protocol Registration:** https://www.crd.york.ac.uk/PROSPERO identifier is CRD420251035763.", "abstract_zh": "**介绍：** 这项系统回顾和荟萃分析比较了前列腺癌经会阴活检 (TPBx) 与经直肠活检 (TRBx) 的诊断性能和并发症情况，纳入了最近的随机和大型观察性研究。\n\n**方法：** 根据 PRISMA 2020 指南，检索了 PubMed、Scopus、Embase 和 Cochrane 图书馆，直至 2025 年 4 月。其中包括直接比较 TPBx 和 TRBx 的研究。使用 RoB 2.0 进行随机试验评估偏倚风险，使用纽卡斯尔 - 渥太华量表进行观察性研究。使用随机效应模型计算具有 95% 置信区间 (CI) 的汇总相对风险 (RR)。进行亚组分析和 GRADE 评估以评估证据的确定性。\n\n**结果：** 纳入了 29 项研究 (<i>n</i> = 90,621)。 TPBx 显示出较高的 PCa 检出率（RR 1.08；95% CI 1.01-1.15；<i>p</i> = 0.02）和 csPCa 检出率（RR 1.14；95% CI 1.05-1.24；<i>p</i> = 0.001），但证据质量为低至中等。异质性为中度至高度。 TPBx 还表现出较低的感染相关并发症和可比较的总体事件，尽管手术相关的疼痛略高。\n\n**结论：** 与 TRBx 相比，TPBx 具有更高的诊断率和更低的感染风险，且安全性相当。然而，鉴于中等异质性和有限的高质量随机对照试验，进一步的验证性试验是必要的。\n\n**Protocol registration：** https://www.crd.york.ac.uk/PROSPERO 标识符为 CRD420251035763。", "keywords_zh": "前列腺活检、有临床意义的前列腺癌、前列腺癌、经会阴、经直肠", "keywords_en": "Prostate biopsy, clinically significant prostate cancer, prostate cancer, transperineal, transrectal", "link": "https://pubmed.ncbi.nlm.nih.gov/41399305/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 16 Dec 2025"}, {"id": "41385931", "title_en": "Transperineal versus Transrectal Prostate Biopsy: A Systematic Review and Meta-Analysis of Randomized Controlled Trials", "title_zh": "经会阴前列腺活检与经直肠前列腺活检：随机对照试验的系统回顾和荟萃分析", "authors": "Leopoldo Alves Ribeiro-Filho", "abstract_en": "To compare the safety and diagnostic performance of transperineal (TP) versus transrectal (TR) ultrasound-guided prostate biopsies using only data from randomized controlled trials (RCTs). A systematic search was performed in multiple databases up to May 2025. We included only RCTs comparing TP and TR approaches in men undergoing MRI-targeted prostate biopsies. Meta-analysis was conducted using odds ratios (OR) and 95% confidence intervals (CI) for categorical outcomes. The primary endpoints were cancer detection rate and postbiopsy infection rate. Secondary outcomes included urinary retention, bleeding, pain, and complications stratified by the Clavien-Dindo system. Study quality and certainty of evidence were assessed using the Cochrane ROB2 and GRADE tools. Four RCTs encompassing 2682 patients (TP: 1323; TR: 1359) were included. No significant differences were observed in overall prostate cancer detection rates (OR 1.03, 95% CI, 0.79-1.36) or detection of anterior lesions (OR 1.01, 95% CI, 0.41-2.45). Similarly, no differences were found in bleeding (OR 1.14, 95% CI, 0.66-1.95), urinary retention (OR 1.01, 95% CI, 0.50-2.04), total infections (OR 1.02, 95% CI, 0.77-1.35), or severe infections (OR 2.17, 95% CI, 0.97-4.88). Mild pain was more frequent in the TP group (OR 1.56, 95% CI, 1.20-2.03), while moderate to severe pain did not differ significantly (OR 0.65, 95% CI, 0.39-1.07). Transperineal and transrectal MRI-fusion-guided biopsy approaches demonstrated equivalent diagnostic accuracy and safety profiles. While the transperineal route was associated with slightly greater mild discomfort, cancer detection and complication rates were comparable. The selection of approach should be guided by principles of antimicrobial stewardship, patient preference, and institutional expertise.", "abstract_zh": "仅使用随机对照试验 (RCT) 的数据来比较经会阴 (TP) 与经直肠 (TR) 超声引导前列腺活检的安全性和诊断性能。截至 2025 年 5 月，我们在多个数据库中进行了系统性检索。我们仅纳入了比较 TP 和 TR 方法在接受 MRI 靶向前列腺活检的男性中的随机对照试验。使用优势比 (OR) 和 95% 置信区间 (CI) 进行分类结果的荟萃分析。主要终点是癌症检出率和活检后感染率。次要结局包括按 Clavien-Dindo 系统分层的尿潴留、出血、疼痛和并发症。使用 Cochrane ROB2 和 GRADE 工具评估研究质量和证据的确定性。纳入了四项随机对照试验，涉及 2682 名患者（TP：1323；TR：1359）。总体前列腺癌检出率（OR 1.03，95% CI，0.79-1.36）或前部病变检出率（OR 1.01，95% CI，0.41-2.45）没有观察到显着差异。同样，出血（OR 1.14，95% CI，0.66-1.95）、尿潴留（OR 1.01，95% CI，0.50-2.04）、总感染（OR 1.02，95% CI，0.77-1.35）或严重感染（OR 2.17，95% CI， 0.97-4.88）。 TP 组轻度疼痛更为常见（OR 1.56，95% CI，1.20-2.03），而中度至重度疼痛没有显着差异（OR 0.65，95% CI，0.39-1.07）。经会阴和经直肠 MRI 融合引导活检方法表现出相同的诊断准确性和安全性。虽然经会阴途径会带来稍大的轻微不适，但癌症检出率和并发症发生率相当。方法的选择应遵循抗菌药物管理、患者偏好和机构专业知识的原则。", "keywords_zh": "诊断, 前列腺癌, 随机试验, 经会阴活检, 经会阴前列腺活检", "keywords_en": "Diagnosis, Prostate cancer, Randomized trial, Transperineal Biopsy, Transperineal prostate biopsy", "link": "https://pubmed.ncbi.nlm.nih.gov/41385931/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 12 Dec 2025"}, {"id": "41372917", "title_en": "The impact of primary tumor location of colorectal cancer on the survival outcome of patients with brain metastasis: a systematic review and meta-analysis", "title_zh": "结直肠癌原发肿瘤部位对脑转移患者生存结局的影响：系统评价和荟萃分析", "authors": "Abhishek Kumar", "abstract_en": "**Objectives:** Several prior studies have shown that in metastasized colorectal cancer, the primary cancer's location influences patients' survival rates, with left-sided colorectal cancer being associated with longer survival than right-sided colorectal cancer. This study aimed to explore the influence of the primary location of colorectal cancer on survival following brain metastasis.\n\n**Methods:** To address this clinical question, we conducted a systematic review and meta-analysis. We included studies focused on patients diagnosed with brain metastasis from colorectal cancer. These studies reported survival outcomes based on different primary tumor sites (right versus left and colon versus rectum). The primary outcome was to aggregate the hazard ratio (HR) of left-sided colorectal cancer when metastasized to the brain compared with right-sided colorectal cancer. The secondary outcome was to aggregate the HR of rectal cancer when it metastasized to the brain compared with colon cancer.\n\n**Results:** Ten studies with a total of 1792 patients were included in the meta-analysis, and combined HR was calculated. Left-sided colon cancer showed higher overall survival compared with right-sided colon cancer when metastasized to the brain (HR: 0.71, 95% CI: 0.54-0.94, I<sup>2</sup> = 0%). Rectal cancer did not show a statistically significant difference in overall survival compared with colon cancer (HR: 0.75, 95% CI: 0.40-1.41, I<sup>2</sup> = 81%).\n\n**Conclusions:** Concordant with lung and liver metastases, the primary location of colorectal cancer influenced overall survival when metastasized to the brain. Left-sided colon cancer demonstrated higher overall survival than right-sided colon cancer.", "abstract_zh": "**Objectives：** 先前的几项研究表明，在转移性结直肠癌中，原发癌症的位置影响患者的生存率，左侧结直肠癌比右侧结直肠癌的生存期更长。本研究旨在探讨结直肠癌的原发部位对脑转移后生存的影响。\n\n**方法：** 为了解决这个临床问题，我们进行了系统回顾和荟萃分析。我们纳入的研究重点是诊断为结直肠癌脑转移的患者。这些研究报告了基于不同原发肿瘤部位（右与左、结肠与直肠）的生存结果。主要结果是汇总左侧结直肠癌与右侧结直肠癌转移至大脑时的风险比（HR）。次要结果是与结肠癌相比，汇总直肠癌转移至大脑时的 HR。\n\n**结果：** 荟萃分析纳入 10 项研究，共 1792 名患者，并计算了合并 HR。当转移至脑部时，左侧结肠癌比右侧结肠癌表现出更高的总生存率（HR：0.71，95% CI：0.54-0.94，I<sup>2</sup> = 0%）。与结肠癌相比，直肠癌的总生存率没有表现出统计学上的显着差异（HR：0.75，95% CI：0.40-1.41，I<sup>2</sup> = 81%）。\n\n**结论：** 与肺和肝转移一致，结直肠癌转移到大脑时的主要位置会影响总体生存率。左侧结肠癌的总体生存率高于右侧结肠癌。", "keywords_zh": "脑转移、结直肠癌、左结肠癌、直肠癌、右结肠癌", "keywords_en": "Brain metastasis, Colorectal cancer, Left colon cancer, Rectal cancer, Right colon cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/41372917/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 10 Dec 2025"}, {"id": "41359190", "title_en": "Anatomical and functional outcomes of combined ventral rectopexy and sacrocolpo/hysteropexy for multicompartment pelvic organ prolapse: a systematic review and meta-analysis", "title_zh": "腹侧直肠固定术和骶阴道/子宫固定术联合治疗多室盆腔器官脱垂的解剖和功能结果：系统评价和荟萃分析", "authors": "Marine Lallemant", "abstract_en": "**Introduction:** Limited data exists in literature regarding concomitant ventral rectopexy (VRP) and sacrocolpo/hysteropexy (SCP/SHP), with existing studies being predominantly retrospective. The aim of this meta-analysis is to assess the anatomical and functional outcomes of combined VRP and SCP/SHP for the treatment of multicompartmental pelvic organ prolapse (POP).\n\n**Methods:** We performed systematic research and meta-analysis from PubMed/MEDLINE and EMBASE, according to Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) 2020 guidelines, until 15 January 2025. Women submitted to VRP with SCP/SHP were included. Improvement of anorectal symptoms were evaluated. Postoperative anatomical relapse was reported. Re-operation rates were evaluated.\n\n**Results:** Six articles were included. Constipation/obstructed defecation syndrome (ODS) [odds ratio (OR) 0.26, 95% CI 0.10-0.68; p = 0.006 (I<sup>2</sup> test 81%, p = 0.56)] and of anal/fecal incontinence (AI/FI) rates [OR 0.09, 95% CI 0.03-0.30; p < 0.0001 (I<sup>2</sup> test 70%, p = 0.04)] significantly improved after combined VRP and SCP/SHP. The proportion metanalysis of four included studies reported a subjective POP recurrence rate of 7% (95% CI 1-13%; I<sup>2</sup> test 82.9%, p < 0.001). The proportion metanalysis of five included studies for objective POP recurrence was 5% (95% CI 1-9%; I<sup>2</sup> test 56.9%, p = 0.041). No serious adverse events were reported.\n\n**Conclusions:** VRP combined with SCP/SHP has been shown to be safe and effective for women with multicompartment POP, providing optimal anatomical and functional outcomes. Larger, long-term, prospective-controlled studies are needed to confirm these results.", "abstract_zh": "**介绍：** 文献中关于伴随腹侧直肠固定术（VRP）和骶阴道/子宫固定术（SCP/SHP）的数据有限，现有研究主要是回顾性的。本荟萃分析的目的是评估 VRP 和 SCP/SHP 联合治疗多室盆腔器官脱垂 (POP) 的解剖学和功能结果。\n\n**方法：** 截至 2025 年 1 月 15 日，我们根据系统评价和荟萃分析的首选报告项目 (PRISMA) 2020 指南，从 PubMed/MEDLINE 和 EMBASE 进行了系统研究和荟萃分析。纳入了通过 SCP/SHP 提交 VRP 的女性。评估肛门直肠症状的改善情况。据报道术后解剖学复发。评估了再手术率。\n\n**结果：** 收录了六篇文章。便秘/排便阻塞综合征 (ODS) [比值比 (OR) 0.26，95% CI 0.10-0.68； p = 0.006（I<sup>2</sup> 测试 81%，p = 0.56）] 和肛门/大便失禁 (AI/FI) 率 [OR 0.09，95% CI 0.03-0.30； p < 0.0001（I<sup>2</sup>测试70%，p = 0.04）]在VRP和SCP/SHP结合后显着改善。四项纳入研究的比例荟萃分析报告主观 POP 复发率为 7%（95% CI 1-13%；I<sup>2</sup> 检验 82.9%，p<0.001）。五项纳入客观 POP 复发研究的荟萃分析比例为 5%（95% CI 1-9%；I<sup>2</sup> 检验 56.9%，p = 0.041）。没有报告严重不良事件。\n\n**结论：** VRP 与 SCP/SHP 相结合已被证明对患有多室 POP 的女性安全有效，可提供最佳的解剖和功能结果。需要更大规模、长期、前瞻性对照研究来证实这些结果。", "keywords_zh": "肛门失禁、排便阻塞综合征、盆腔器官脱垂、直肠脱垂、骶骨阴道固定术、骶子宫固定术、腹侧直肠固定术", "keywords_en": "Anal incontinence, Obstructed defecation syndrome, Pelvic organ prolapse, Rectal prolapse, Sacrocolpopexy, Sacrohysteropexy, Ventral rectopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/41359190/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 08 Dec 2025"}, {"id": "41316735", "title_en": "Colorectal polyp distribution in relation to age: meta-analysis", "title_zh": "结直肠息肉分布与年龄的关系：荟萃分析", "authors": "Frank Frizelle", "abstract_en": "**Background:** An increase in early-onset colorectal cancer has been observed globally, despite a decline in colorectal cancer incidence rates in many Western countries. Screening strategies for younger individuals are particularly challenging, as there are limited data on polyps in young individuals to guide clinicians. This study aimed to systematically review the current evidence surrounding polyp distribution in different age groups.\n\n**Methods:** A literature search was performed in PubMed, Scopus, MEDLINE, Embase (OVID), Web of Science, and Cochrane Review databases using the keywords 'age' and 'polyp', and Medical Subject Heading terms 'age of onset', 'age factors', 'age distribution', and 'age groups', with no restrictions on publication year. Articles published in English that described the distribution of polyps (adenomatous, advanced adenomatous polyps, and sessile serrated lesions) or individuals with polyps according to different age groups were considered for inclusion. Younger patients were defined as those aged < 50 years. The outcomes of interest were the number of patients with polyps in the left and/or right colon, or the number of polyps per side of the colorectum in different age groups.\n\n**Results:** From 12 470 articles, 24 met the eligibility criteria for the systematic review, and 12 were suitable for meta-analysis. Among younger people, 46.5% had right-sided and 75.9% had left-sided polyps. In comparison, 70.8% of the older group had right-sided and 61.9% had left-sided polyps. Meta-analyses of studies showed a greater proportion of younger people than older people with at least one left-sided polyp (mean difference 0.06, 95% confidence interval (c.i.) 0.03 to 0.09; P < 0.001). There was also a greater proportion of left-sided polyps in younger people (odds ratio 0.77, 95% c.i. 0.59 to 1.01; P < 0.001).\n\n**Conclusion:** Patients aged < 50 years have a greater tendency towards having polyps in the left colon, compared with people ≥ 50 years of age, similar to the distribution of early-onset colorectal cancer. This has implications for the methodology of screening and investigation of symptoms in those aged < 50 years.", "abstract_zh": "**背景：** 尽管许多西方国家的结直肠癌发病率有所下降，但全球范围内早发性结直肠癌的发病率有所增加。针对年轻人的筛查策略尤其具有挑战性，因为指导临床医生的年轻人息肉数据有限。本研究旨在系统地回顾有关不同年龄组息肉分布的当前证据。\n\n**方法：** 使用关键词“年龄”和“息肉”以及医学主题词“发病年龄”、“年龄因素”、“年龄分布”和“年龄组”在 PubMed、Scopus、MEDLINE、Embase (OVID)、Web of Science 和 Cochrane Review 数据库中进行文献检索，对发表年份没有限制。以英文发表的描述息肉（腺瘤性、晚期腺瘤性息肉和无蒂锯齿状病变）或息肉个体根据不同年龄组的分布的文章被考虑纳入。年轻患者被定义为年龄 < 50 岁的患者。感兴趣的结果是左和/或右结肠息肉患者的数量，或不同年龄组中结肠直肠每侧息肉的数量。\n\n**结果：** 在 12 470 篇文章中，24 篇符合系统评价的资格标准，12 篇适合荟萃分析。在年轻人中，46.5% 患有右侧息肉，75.9% 患有左侧息肉。相比之下，70.8% 的老年人患有右侧息肉，61.9% 的老年人患有左侧息肉。研究荟萃分析显示，患有至少一颗左侧息肉的年轻人比例高于老年人（平均差 0.06，95% 置信区间 (c.i.) 0.03 至 0.09；P < 0.001）。年轻人中左侧息肉的比例也较高（比值比 0.77，95% c.i. 0.59 至 1.01；P < 0.001）。\n\n**结论：** 与年龄≥50岁的人相比，年龄<50岁的患者左半结肠息肉的倾向更大，与早发性结直肠癌的分布相似。这对于 50 岁以下人群的症状筛查和调查方法具有重要意义。", "keywords_zh": "腺瘤、结肠、直肠、无蒂锯齿状病变", "keywords_en": "adenoma, colon, rectum, sessile serrated lesions", "link": "https://pubmed.ncbi.nlm.nih.gov/41316735/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Nov 2025"}, {"id": "41290553", "title_en": "Preemptive Versus Postoperative Analgesia in Colorectal Surgery: A Systematic Review and Meta-Analysis", "title_zh": "结直肠手术中的先发性镇痛与术后镇痛：系统评价和荟萃分析", "authors": "Muhammed Elhadi", "abstract_en": "**Background:** Preemptive and preventative methods have been suggested to decrease pain by blocking nociceptive inputs to tissues. Preemptive analgesia has the potential to enhance postoperative recovery in patients undergoing colorectal surgery. This study aimed to evaluate the efficacy and safety of preemptive versus postoperative analgesia in this population.\n\n**Methods:** We systematically searched PubMed, Scopus, Web of Science, and the Cochrane Library from inception to December 2024, and updated the search in May 2025, to identify randomized controlled trials (RCTs) comparing preemptive analgesia with postoperative analgesia in adult patients undergoing colorectal surgery. The primary outcomes were opioid consumption within 24 h, visual analog scale (VAS) pain score at rest at 24 and 48 h postoperatively. Secondary outcomes included adverse events, length of hospital stay, surgery duration (minutes), and postoperative nausea and vomiting (PONV). The Cochrane Risk of Bias 2.0 tool was used to assess risk of bias, and the strength of evidence was graded using the GRADE approach.\n\n**Results:** We identified a total of 2739 records. Seven studies involving 625 patients (312 preemptive and 313 postoperative) met the inclusion criteria. Preemptive analgesia decreased VAS scores at 24 h compared to postoperative analgesia (MD -0.45, 95% CI: -0.89 to -0.01, p = 0.04). However, significant heterogeneity was observed among included studies. Additionally, there was no difference between the two groups regarding VAS at 48 h (MD -0.17, 95% CI -0.43 to 0.09, p = 0.21) and opioid consumption at 24 h (MD -21.17, 95% CI 48.18-5.85, p = 0.12).\n\n**Conclusion:** The findings indicate that preemptive analgesia did not decrease opioid consumption at 24 h; however, it decreased VAS score at 24 h without any difference in VAS at 48 h, length of hospital stay, incidence of PONV, or other adverse events when compared to postoperative analgesia alone in colorectal surgery.\n\n**Trial Registration:** The study is registered in PROSPERO under the registration number CRD420250636020.", "abstract_zh": "**背景：** 已提出先发制人和预防性方法，通过阻止对组织的伤害性输入来减轻疼痛。超前镇痛有可能促进结直肠手术患者的术后恢复。本研究旨在评估先发性镇痛与术后镇痛在这一人群中的有效性和安全性。\n\n**方法：** 我们系统地检索了 PubMed、Scopus、Web of Science 和 Cochrane 图书馆，从开始到 2024 年 12 月，并于 2025 年 5 月更新了检索，以识别在接受结直肠手术的成年患者中比较超前镇痛与术后镇痛的随机对照试验 (RCT)。主要结果是 24 小时内阿片类药物的消耗量、术后 24 小时和 48 小时的视觉模拟量表 (VAS) 静息疼痛评分。次要结局包括不良事件、住院时间、手术持续时间（分钟）和术后恶心和呕吐（PONV）。 Cochrane 偏倚风险 2.0 工具用于评估偏倚风险，并使用 GRADE 方法对证据强度进行分级。\n\n**结果：** 我们总共识别出 2739 条记录。涉及 625 名患者（312 名先发性患者和 313 名术后患者）的 7 项研究符合纳入标准。与术后镇痛相比，超前镇痛在 24 小时降低了 VAS 评分（MD -0.45，95% CI：-0.89 至 -0.01，p = 0.04）。然而，纳入的研究之间观察到显着的异质性。此外，两组之间 48 小时 VAS（MD -0.17，95% CI -0.43 至 0.09，p = 0.21）和 24 小时阿片类药物消耗量（MD -21.17，95% CI 48.18-5.85，p = 0.12）之间没有差异。\n\n**结论：** 研究结果表明，超前镇痛并没有减少 24 小时阿片类药物的消耗；然而，与结直肠手术中单独使用术后镇痛相比，它降低了 24 小时 VAS 评分，但 48 小时 VAS、住院时间、PONV 发生率或其他不良事件没有任何差异。\n\n**Trial registration：** 该研究已在 PROSPERO 中注册，注册号为 CRD420250636020。", "keywords_zh": "结直肠手术、术后镇痛、超前镇痛", "keywords_en": "colorectal surgery, postoperative analgesia, preemptive analgesia", "link": "https://pubmed.ncbi.nlm.nih.gov/41290553/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 25 Nov 2025"}, {"id": "41263625", "title_en": "Regarding: \"Efficacy and safety of methylene blue for postoperative pain of haemorrhoids: a systematic review and meta-analysis\"", "title_zh": "关于：“亚甲蓝治疗痔疮术后疼痛的功效和安全性：系统评价和荟萃分析”", "authors": "Fahmi H Kakamad", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41263625/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 20 Nov 2025"}, {"id": "41223393", "title_en": "Systematic Review of Hyperbaric Oxygen for Late Radiation Tissue Injury (Bowel, Bladder)", "title_zh": "高压氧治疗晚期放射性组织损伤（肠、膀胱）的系统评价", "authors": "Marissa Janine Carter", "abstract_en": "**Background:** This systematic review evaluated comparative studies to determine if hyperbaric oxygen therapy (HBO₂) is beneficial to late radiation tissue injury (LRTI) of the bowel/bladder.\n\n**Methods:** We included adequately powered, comparative studies evaluating the effect of HBO₂ on patients with LRTI (≥3 months duration and/or ≥6 months after radiation therapy) to the bowel/bladder compared to no HBO₂ or placebo/sham; complete outcomes data must have corresponded to the tools used to measure change in LRTI symptoms. Medline was searched through May 4, 2023, Embase through May 29, 2023, and Google Scholar through May 5, 2023. The Cochrane risk-of-bias tool and GRADE approach were used with a certainty of outcomes assessment.\n\n**Results:** Three RCTs were included with 273 subjects. Two double-blinded studies evaluated rectal symptoms; one open study evaluated cystitis. One study had a low risk of bias; two had some concerns. All had moderate certainty of outcomes. There is moderate certainty with a weak recommendation for using HBO₂ for rectal complications or cystitis, which (in context of GRADE terminology) means the decision to treat depends on a case-by-case basis.\n\n**Discussion:** The highly heterogeneous design of the trials made meta-analysis impossible, but moderate certainty of the beneficial effect of HBO₂ on LRTI to the rectum and bladder was confirmed. With the weak recommendation, a discussion should take place between the patient and their physician as to whether or not the patient is likely to benefit from HBO₂.", "abstract_zh": "**背景：** 本系统综述评估了比较研究，以确定高压氧治疗 (HBO 2) 是否有益于肠/膀胱的晚期放射性组织损伤 (LRTI)。\n\n**方法：** 我们纳入了充分有力的比较研究，评估与不使用 HBO 或安慰剂/假手术相比，HBO 2 对 LRTI（持续时间≥3 个月和/或放射治疗后≥6 个月）患者对肠/膀胱的影响；完整的结果数据必须与用于测量 LRTI 症状变化的工具相对应。 Medline 的检索截止日期为 2023 年 5 月 4 日，Embase 的检索截止日期为 2023 年 5 月 29 日，Google Scholar 的检索截止日期为 2023 年 5 月 5 日。使用 Cochrane 偏倚风险工具和 GRADE 方法对结果进行确定性评估。\n\n**结果：** 三项随机对照试验纳入了 273 名受试者。两项双盲研究评估了直肠症状；一项开放研究评估了膀胱炎。一项研究的偏倚风险较低；两个人有一些担忧。所有结果的确定性均为中等。对于使用 HBO 来治疗直肠并发症或膀胱炎有中等程度的确定性和弱推荐，这（在 GRADE 术语的背景下）意味着治疗决定取决于具体情况。\n\n**讨论：** 试验设计的高度异质性使得荟萃分析变得不可能，但 HBO2 对直肠和膀胱 LRTI 的有益作用的中等确定性得到了证实。对于弱建议，患者和医生应就患者是否可能从 HBO2 中受益进行讨论。", "keywords_zh": "LRTI、癌症、慢性伤口、比较研究、膀胱炎、高压氧治疗、直肠炎", "keywords_en": "LRTI, cancer, chronic wounds, comparative studies, cystitis, hyperbaric oxygen therapy, proctitis", "link": "https://pubmed.ncbi.nlm.nih.gov/41223393/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 12 Nov 2025"}, {"id": "41075390", "title_en": "Quality of Life and Functional Outcomes After Watch-and-Wait for Locally Advanced Rectal Cancer: A Meta-analysis", "title_zh": "局部晚期直肠癌观察等待后的生活质量和功能结果：荟萃分析", "authors": "Jonathan S Abelson", "abstract_en": "**Introduction:** Watch-and-wait (W&W), which involves total neoadjuvant therapy followed by close observation, has emerged as an alternative to total mesorectal excision for patients with locally advanced rectal cancer who achieve a clinical or near-complete response. This approach aims to preserve bowel function and avoid the morbidity associated with radical surgery.\n\n**Methods:** This systematic review and meta-analysis followed Preferred Reporting Items for Systematic Reviews and Meta-Analyses and Cochrane guidelines. Eligible studies included randomized trials and observational studies of patients with locally advanced rectal cancer treated with total neoadjuvant therapy, followed by either W&W or total mesorectal excision. The primary outcome was quality of life (QoL), assessed using validated instruments (European Organization for Research and Treatment of Cancer Quality of Life Questionnaire-C30, Quality of Life Questionnaire-CR29, Fecal Incontinence Quality of Life). Secondary outcomes included bowel function among patients without an ostomy, using validated measures such as Cleveland Clinic Florida Fecal Incontinence Scores, Vaizey, Memorial Sloan Kettering Cancer Center, and low anterior resection syndrome scores. A comprehensive search of PubMed, EMBASE, Medline, and Web of Science (Sept 2023-May 2025) was performed without language or date restrictions. Abstract/full-text screening, data extraction, and risk of bias assessments were conducted independently by two reviewers. Meta-analyses used inverse-variance weighting under a random-effects model. Data unsuitable for meta-analysis were synthesized narratively.\n\n**Results:** Of 617 screened studies, 28 were reviewed in full and 9 met inclusion criteria (total 923 patients). Meta-analysis of five studies (n = 601) with no statistically significant difference in overall QoL between groups (pooled mean difference = 0.10, 95% confidence interval: -0.19 to 0.39, P = 0.49). However, pooled analysis of fecal incontinence scores from four studies (n = 384) showed a significant advantage for W&W (pooled mean difference = -1.10, 95% confidence interval: -1.50 to -0.73, P < 0.001). Qualitative synthesis of low anterior resections syndrome scores outcomes favored W&W.\n\n**Conclusions:** W&W, offers a functional advantage without compromising QoL. The decision to pursue W&W should be individualized, considering both the potential functional benefits and the oncological risks.", "abstract_zh": "**介绍：** 观察等待（W＆W）涉及全面新辅助治疗，然后进行密切观察，已成为局部晚期直肠癌患者达到临床或接近完全缓解的全直肠系膜切除的替代方案。这种方法旨在保护肠道功能并避免与根治性手术相关的发病率。\n\n**方法：** 本系统评价和荟萃分析遵循系统评价和荟萃分析的首选报告项目以及 Cochrane 指南。符合条件的研究包括对接受全新辅助治疗、随后进行 W&W 或全直肠系膜切除的局部晚期直肠癌患者进行的随机试验和观察性研究。主要结局是生活质量（QoL），使用经过验证的仪器（欧洲癌症研究和治疗组织生活质量问卷-C30、生活质量问卷-CR29、大便失禁生活质量）进行评估。次要结局包括未进行造口术的患者的肠道功能，使用经过验证的措施，如克利夫兰诊所佛罗里达大便失禁评分、Vaizey、纪念斯隆凯特琳癌症中心和低前切除综合征评分。对 PubMed、EMBASE、Medline 和 Web of Science（2023 年 9 月至 2025 年 5 月）进行了全面检索，没有语言或日期限制。摘要/全文筛选、数据提取和偏倚风险评估由两名评审员独立进行。荟萃分析在随机效应模型下使用逆方差加权。不适合荟萃分析的数据以叙述方式合成。\n\n**结果：** 在 617 项筛选研究中，28 项经过全面审查，9 项符合纳入标准（总共 923 名患者）。对五项研究 (n = 601) 进行荟萃分析，组间总体生活质量无统计学显着差异（汇总平均差 = 0.10，95% 置信区间：-0.19 至 0.39，P = 0.49）。然而，四项研究 (n = 384) 的大便失禁评分汇总分析显示 W&W 具有显着优势（汇总平均差 = -1.10，95% 置信区间：-1.50 至 -0.73，P < 0.001）。低位前切除综合征评分结果的定性综合有利于 W&W。\n\n**结论：** W&W 在不影响生活质量的情况下提供功能优势。追求 W&W 的决定应该因人而异，同时考虑潜在的功能益处和肿瘤风险。", "keywords_zh": "局部晚期直肠癌，荟萃分析，生活质量，系统评价，观察等待", "keywords_en": "Locally advanced rectal cancer, Meta-analysis, Quality of life, Systematic review, Watch-and-wait", "link": "https://pubmed.ncbi.nlm.nih.gov/41075390/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 11 Oct 2025"}, {"id": "41023221", "title_en": "Single-incision laparoscopic endorectal pull-through for Hirschsprung disease: a prospective institutional study and systematic review with meta-analysis", "title_zh": "单切口腹腔镜直肠内牵引治疗先天性巨结肠：前瞻性机构研究和荟萃分析系统评价", "authors": "Quang Thanh Nguyen", "abstract_en": "**Background:** Single-incision laparoscopic endorectal pull-through (SILEP) has emerged as an alternative to conventional laparoscopic surgery for Hirschsprung disease (HSCR), offering improved cosmetic outcomes with comparable efficacy. However, its adoption remains limited, and evidence supporting its long-term safety and functional outcomes is sparse. This study presents our institutional experience with SILEP, alongside a systematic review and meta-analysis evaluating perioperative outcomes, postoperative complications, bowel function, and cosmesis.\n\n**Patients And Methods:** A prospective study was conducted at our institution involving 93 pediatric patients diagnosed with HSCR, who underwent SILEP between 2020 and 2021. Demographic data, perioperative details, and postoperative outcomes, including bowel function score (Rintala) and cosmetic results (Manchester Scar Scale), were prospectively collected and analyzed. Additionally, a systematic review and meta-analysis were performed following PRISMA guidelines, pooling data from nine studies comprising 420 patients.\n\n**Results:** The mean operative time was 70.0 ± 30.3 min, significantly shorter than the pooled estimate from the meta-analysis (166.44 min; 95% CI 137.74-195.14, p < 0.001). No intraoperative complications or conversions were recorded. The mean hospital stay was 5.23 ± 2.69 days, consistent with prior reports. Enterocolitis occurred in 16.1% of cases, comparable to the pooled estimate (12%; 95% CI 7-21%). Among patients aged ≥ 4 years (n = 64), 84% achieved good to excellent bowel function scores. The mean Manchester Scar Score was 5.73 ± 1.38.\n\n**Conclusion:** SILEP is a safe, effective, and cosmetically superior approach for HSCR, with favorable perioperative outcomes and functional results. Our findings, supported by meta-analysis data, reinforce the feasibility of SILEP as a viable alternative for HSCR management.", "abstract_zh": "**背景：** 单切口腹腔镜直肠内拉穿术 (SILEP) 已成为治疗先天性巨结肠 (HSCR) 的传统腹腔镜手术的替代方案，可提供改善的美容效果且疗效相当。然而，它的采用仍然有限，并且支持其长期安全性和功能结果的证据很少。本研究介绍了我们在 SILEP 方面的机构经验，以及评估围手术期结果、术后并发症、肠道功能和美容的系统回顾和荟萃分析。\n\n**Patients and methods：** 我们的机构进行了一项前瞻性研究，涉及 93 名诊断为 HSCR 的儿童患者，这些患者在 2020 年至 2021 年间接受了 SILEP。前瞻性收集和分析了人口统计数据、围手术期详细信息和术后结果，包括肠功能评分 (Rintala) 和美容结果（曼彻斯特疤痕量表）。此外，还按照 PRISMA 指南进行了系统回顾和荟萃分析，汇集了涉及 420 名患者的 9 项研究的数据。\n\n**结果：** 平均手术时间为 70.0±30.3 分钟，明显短于荟萃分析的汇总估计时间（166.44 分钟；95% CI 137.74-195.14，p<0.001）。没有记录术中并发症或转化。平均住院时间为 5.23±2.69 天，与之前的报告一致。 16.1% 的病例发生小肠结肠炎，与汇总估计值相当（12%；95% CI 7-21%）。在年龄 ≥ 4岁的患者中（n = 64），84%的人取得了良好至优秀的肠道功能评分。平均曼彻斯特疤痕评分为 5.73±1.38。\n\n**结论：** SILEP 是一种安全、有效且美观的 HSCR 方法，具有良好的围手术期结果和功能结果。我们的研究结果得到荟萃分析数据的支持，强化了 SILEP 作为 HSCR 管理的可行替代方案的可行性。", "keywords_zh": "肠道功能，先天性巨结肠，腹腔镜，荟萃分析，单切口，Soave 手术", "keywords_en": "Bowel function, Hirschsprung’s disease, Laparoscopic, Meta-analysis, Single-incision, Soave procedure", "link": "https://pubmed.ncbi.nlm.nih.gov/41023221/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 29 Sep 2025"}, {"id": "40972340", "title_en": "Postoperative physiotherapy in enhanced recovery pathways: A general surgery evidence update, dominated by colorectal studies", "title_zh": "加速康复路径中的术后物理治疗：以结直肠研究为主的普外科证据更新", "authors": "Thomas W Wainwright", "abstract_en": "**Introduction:** Physiotherapy is a pivotal component of enhanced recovery protocols, particularly in initiating early mobilisation and supporting the return to functional independence. Despite this, there is a lack of guidance on optimal post-mobilisation physiotherapy strategies. This systematic review aims to synthesise and critically appraise the most recent evidence on postoperative physiotherapy interventions within enhanced recovery pathways for general surgical patients. This review seeks to ad
