 MRI 对肛瘘诊断性能的比较：系统回顾和荟萃分析", "authors": "Jing Li", "abstract_en": "**Rationale And Objectives:** Anal fistula severely impacts patients' quality of life, and accurate preoperative Parks classification is critical for surgical planning and anal sphincter preservation. This systematic review and meta-analysis evaluated the diagnostic efficacy of 3D-endoanal ultrasound (3D-EAUS) and unenhanced/contrast-enhanced (CE) magnetic resonance imaging (MRI) for anal fistula classification.\n\n**Materials And Methods:** Following PRISMA guidelines, PubMed, Embase and Cochrane Library were searched for studies (2010-2025) comparing the two modalities, with diagnostic indices extracted and meta-analyzed via RevMan 5.3.\n\n**Results:** A total of 32 studies involving 4104 anal fistula cases were included. The summary receiver operating characteristic curves of 3D-EAUS, unenhanced MRI, and contrast-enhanced MRI (CE-MRI) showed that most points fell on or in the upper-left corner of the curves, indicating good diagnostic performance for all three modalities. 3D-EAUS exhibited high sensitivity and specificity for intersphincteric (SEN: 0.89, SPE: 0.94) and transsphincteric anal fistulas (SEN: 0.96, SPE: 0.86), but lower diagnostic sensitivity for suprasphincteric (SEN: 0.72) and extrasphincteric (SEN: 0.75) fistulas. unenhanced MRI demonstrated high specificity (>0.94) for all classifications and moderate sensitivity (>0.85), except for suprasphincteric fistulas (SEN: 0.71). CE-MRI showed the highest diagnostic accuracy, with both sensitivity and specificity exceeding 0.90 for most classifications.\n\n**Conclusion:** Both 3D-EAUS and MRI can effectively diagnose anal fistulas. 3D-EAUS is the preferred initial examination, and CE-MRI is recommended for complex or unclear cases, providing an evidence-based basis for clinical decision-making and improving patient prognosis.", "abstract_zh": "**Rationale and objectives：** 肛瘘严重影响患者的生活质量，术前准确的 Parks 分类对于手术计划和保留肛门括约肌至关重要。这项系统评价和荟萃分析评估了 3D 肛门内超声 (3D-EAUS) 和非增强/对比增强 (CE) 磁共振成像 (MRI) 对肛瘘分类的诊断功效。\n\n**材料与方法：** 遵循 PRISMA 指南，在 PubMed、Embase 和 Cochrane 图书馆中检索了比较这两种模式的研究（2010-2025），并通过 RevMan 5.3 提取诊断指标并进行荟萃分析。\n\n**结果：** 共纳入 32 项研究，涉及 4104 例肛瘘病例。 3D-EAUS、非增强 MRI 和对比增强 MRI (CE-MRI) 的受试者工作特征总结曲线显示，大多数点落在曲线的左上角或左上角，这表明所有三种模式均具有良好的诊断性能。 3D-EAUS 对括约肌间（SEN：0.89，SPE：0.94）和经括约肌肛瘘（SEN：0.96，SPE：0.86）表现出较高的敏感性和特异性，但对括约肌上（SEN：0.72）和括约肌外（SEN：0.75）瘘的诊断敏感性较低。未增强的 MRI 对所有分类均显示出高特异性 (>0.94)，敏感性中等 (>0.85)，但括约肌上瘘 (SEN：0.71) 除外。 CE-MRI 显示出最高的诊断准确性，大多数分类的敏感性和特异性均超过 0.90。\n\n**结论：** 3D-EAUS和MRI均可有效诊断肛瘘。初次检查首选3D-EAUS，对于复杂或不清楚的病例推荐CE-MRI，为临床决策提供循证依据，改善患者预后。", "keywords_zh": "3D-EAUS, 肛瘘, 诊断准确性, MRI, 荟萃分析", "keywords_en": "3D-EAUS, Anal fistula, Diagnostic accuracy, MRI, Meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/41714221/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 19 Feb 2026"}, {"id": "41693361", "title_en": "Systematic Review of Published Guidelines: Recommendations for Exams Under Anaesthesia, Seton Insertion and Timing of Seton Removal for Perianal and Rectovaginal Fistulising Crohn's Disease", "title_zh": "对已发布指南的系统审查：针对肛周和直肠阴道瘘性克罗恩病的麻醉检查、挂线插入和拔线时机的建议", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background And Aims:** Perianal fistulising Crohn's disease (pfCD) is a heterogeneous phenotype of Crohn's disease with marked variability in anatomical complexity, symptomatology, and disease trajectory. This often creates uncertainty in the optimal approach to management, particularly the surgical aspects of when to perform examination under anaesthesia (EUA) and when to insert or remove setons.\n\n**Methods:** We conducted a systematic review following PRISMA guidelines. Multiple databases were searched from inception through December 2025. Eligible publications included clinical guidelines on pfCD and/or rectovaginal fistulas that reported indications for EUA, seton insertion, and/or seton removal. We stratified recommendations by fistula complexity, the presence of abscesses, and clinical symptoms. Risk of bias was assessed using the AGREE II Instrument.\n\n**Results:** Twenty-four guidelines met inclusion criteria. EUA (and often seton placement) was universally recommended for perianal abscesses and frequently for symptomatic complex pfCD. For asymptomatic complex or symptomatic simple fistulas, recommendations were variable and often conditional on the presence of proctitis or plans for biologic therapy. In contrast, EUA and setons were not broadly endorsed for asymptomatic simple fistulas. Recommendations for seton removal varied widely, ranging from predefined intervals after anti-TNF therapy initiation to individualised criteria based on clinical or radiologic response. Most guidelines did not consider symptom type/severity, prior surgery, suitability for surgical closure, and asymptomatic abscesses detected by imaging.\n\n**Conclusion:** Substantial heterogeneity and limitations exist across guidelines on the surgical management of pfCD. This underscores the need for international consensus informed by multidisciplinary expertise to standardise care in this complex population.", "abstract_zh": "**Background and aims：** 肛周瘘管性克罗恩病 (pfCD) 是克罗恩病的一种异质表型，在解剖复杂性、症状学和疾病轨迹方面具有显着的变异性。这通常会给最佳管理方法带来不确定性，特别是何时进行麻醉下检查（EUA）以及何时插入或取出挂线的手术方面。\n\n**方法：** 我们按照 PRISMA 指南进行了系统审查。从开始到 2025 年 12 月检索了多个数据库。符合条件的出版物包括关于 pfCD 和/或直肠阴道瘘的临床指南，其中报告了 EUA、挂线插入和/或挂线移除的适应症。我们根据瘘管复杂性、脓肿的存在和临床症状对建议进行了分层。使用 AGREE II 仪器评估偏倚风险。\n\n**结果：** 有二十四条指南符合纳入标准。 EUA（通常是挂线放置）被普遍推荐用于肛周脓肿，并且经常用于症状复杂的 pfCD。对于无症状的复杂性或有症状的简单性瘘管，建议各不相同，并且通常以是否存在直肠炎或生物治疗计划为条件。相比之下，对于无症状的单纯性瘘管，EUA 和挂线并未得到广泛认可。挂线拔除的建议差异很大，从抗 TNF 治疗开始后的预定间隔到基于临床或放射学反应的个体化标准。大多数指南没有考虑症状类型/严重程度、既往手术、手术闭合的适合性以及通过影像学检测到的无症状脓肿。\n\n**结论：** pfCD 手术治疗指南之间存在很大的异质性和局限性。这强调需要在多学科专业知识的指导下达成国际共识，以标准化这一复杂人群的护理。", "keywords_zh": "克罗恩病、脓肿、结直肠手术、炎症性肠病、直肠瘘", "keywords_en": "Crohn's disease, abscess, colorectal surgery, inflammatory bowel diseases, rectal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/41693361/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 16 Feb 2026"}, {"id": "41537212", "title_en": "Transanal Opening of the Intersphincteric Space to Treat Anal Fistula: A Systematic Review and Meta-Analysis", "title_zh": "经肛门开放括约肌间间隙治疗肛瘘：系统评价和荟萃分析", "authors": "Zhen-Yi Wang", "abstract_en": "**Aim:** Transanal opening of the intersphincteric space (TROPIS) is a minimally invasive surgical treatment for anal fistula that not only eliminates the source of infection but also protects anal function to the greatest extent. This systematic review and meta-analysis aims to evaluate the efficacy of TROPIS in the treatment of anal fistula.\n\n**Methods:** We searched PubMed, EMBASE, Web of Science, and the Cochrane Library for information on TROPIS surgery for anal fistulas performed between the inception of each database and 1 November 2024. We used the single-arm studies for analysis, with a total of 918 subjects and a follow-up period ranging from 3 months to 36 months. The analysis focused on the cure rate of different types of anal fistula, postoperative bleeding, infection, and adverse reactions.\n\n**Results:** This systematic review included six single-arm studies involving a total of 918 patients with anal fistula who underwent TROPIS surgery, with follow-up durations ranging from 3 to 36 months. Among the included studies, all were classified as high quality (score ≥7). This study demonstrated an 80% success rate for the initial operation (95% confidence interval (CI): 0.77-0.83), as well as an 80% success rate specifically for high fistulas (95% CI: 0.77-0.83). The success rate for second operations was 73% (95% CI: 0.47-0.99). For patients with high fistulas who underwent a second procedure, the success rate was 78% (95% CI: 0.40-1.00). The cure rate for anal fistulas accompanied by abscesses was 88%, while the cure rate for anal fistulas without abscesses is the same. For horseshoe fistulas, the cure rate was 87%, whereas it was 88% for non-horseshoe fistulas. The overall cure rate in this study was 88% (95% CI: 0.86-0.90). The rate of intraoperative bleeding was 3%, the postoperative infection rate was 5%, and the overall incidence of adverse reactions was 3%.\n\n**Conclusions:** This study demonstrates that TROPIS holds significant potential in the treatment of anal fistulas, particularly for high fistulas, fistulas with associated abscesses, and horseshoe-shaped fistulas, whilst exhibiting a relatively low incidence of incontinence.", "abstract_zh": "**Aim：** 经肛门括约肌间开放术（TROPIS）是肛瘘的微创手术治疗方法，不仅消除了感染源，还能最大程度地保护肛门功能。本系统评价和荟萃分析旨在评估 TROPIS 治疗肛瘘的疗效。\n\n**方法：** 我们检索了 PubMed、EMBASE、Web of Science 和 Cochrane 图书馆，以获取各数据库建立之日至 2024 年 11 月 1 日之间进行的 TROPIS 肛瘘手术的信息。我们使用单臂研究进行分析，共有 918 名受试者，随访期从 3 个月到 36 个月不等。重点分析不同类型肛瘘的治愈率、术后出血、感染、不良反应等。\n\n**结果：** 这项系统评价包括六项单臂研究，共涉及 918 名接受 TROPIS 手术的肛瘘患者，随访时间为 3 至 36 个月。在纳入的研究中，所有研究均被评为高质量（得分≥7）。这项研究表明，初次手术的成功率为 80%（95% 置信区间 (CI)：0.77-0.83），特别针对高位瘘管的成功率为 80%（95% CI：0.77-0.83）。第二次手术的成功率为73%（95% CI：0.47-0.99）。对于接受第二次手术的高位瘘管患者，成功率为 78%（95% CI：0.40-1.00）。伴有脓肿的肛瘘治愈率为88%，无脓肿的肛瘘治愈率相同。马蹄瘘的治愈率为 87%，而非马蹄瘘的治愈率为 88%。本研究的总体治愈率为88%（95% CI：0.86-0.90）。术中出血率为3%，术后感染率为5%，不良反应总体发生率为3%。\n\n**结论：** 这项研究表明，TROPIS 在治疗肛瘘方面具有巨大潜力，特别是对于高位瘘管、伴有脓肿的瘘管和马蹄形瘘管，同时失禁发生率相对较低。", "keywords_zh": "肛瘘，荟萃分析，保留括约肌手术，经肛门括约肌间隙开放", "keywords_en": "anal fistula, meta-analysis, sphincter-preserving procedure, transanal opening of intersphincteric space", "link": "https://pubmed.ncbi.nlm.nih.gov/41537212/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 15 Jan 2026"}, {"id": "41359092", "title_en": "Systematic review: The management of unhealed wounds and persistent perineal sinuses following proctectomy in inflammatory bowel disease", "title_zh": "系统评价：炎症性肠病直肠切除术后未愈合伤口和持续性会阴窦的处理", "authors": "A Hart", "abstract_en": "**Introduction:** Unhealed wounds and persistent perineal sinuses (PPS) may occur in as many as one third of patients after proctectomy for Crohn's disease. The management of these conditions remains a significant challenge, particularly in the context of inflammatory bowel disease (IBD), with existing therapies plagued by high failure rates. This systematic review of the literature assessed the efficacy of medical and surgical therapy for PPS closure in IBD. Secondary aims included review of classification systems used for PPS.\n\n**Methods:** A literature search was conducted using Medline, Embase and Cochrane databases on 17 December 2024. The review was registered on PROSPERO (CRD42024622582). Inclusion criteria were adult patients with IBD and PPS or unhealed wounds following proctectomy. We excluded abstract-only publications, case reports, cancer and paediatric cohorts. Two reviewers independently screened abstracts and full texts and extracted data. The primary outcome was clinical healing rate. Secondary outcomes included classification systems used to describe PPS. Risk of bias was assessed.\n\n**Results:** Of 496 records identified, following removal of duplicates, 489 abstracts were screened, and 60 full text articles assessed for eligibility. Of 25 articles included in the final analysis, 23 were case series or retrospective cohort studies, and all were at high risk of bias. No randomised controlled trials were identified. Five articles (including two of the case series) described classification systems for PPS. Interventions included hyperbaric oxygen therapy, Karydakis flap, cleft closure, omentoplasty, skin grafting, gracilis and rectus abdominis flap, platelet-derived growth factor, curettage, lay open and excision of sinuses. Reported healing rates ranged from 30% to 100%. Heterogeneity in the reporting of outcomes, as well as the interventions performed precluded meta-analysis.\n\n**Conclusion:** The published evidence for treatment of PPS in IBD consists of low-quality evidence case series with high risk of bias. There is a need for standardised outcome reporting and high-quality, prospective studies to establish effective treatment algorithms.", "abstract_zh": "**介绍：** 克罗恩病直肠切除术后，多达三分之一的患者可能会出现未愈合的伤口和持续性会阴窦 (PPS)。这些疾病的治疗仍然是一个重大挑战，特别是在炎症性肠病（IBD）的背景下，现有的治疗方法受到高失败率的困扰。这项对文献的系统回顾评估了 IBD 中 PPS 闭合的药物和手术治疗的疗效。次要目标包括审查用于 PPS 的分类系统。\n\n**方法：** 于2024年12月17日使用Medline、Embase和Cochrane数据库进行了文献检索。该综述已在PROSPERO上注册（CRD42024622582）。纳入标准为患有 IBD 和 PPS 的成年患者或直肠切除术后伤口未愈合的患者。我们排除了仅摘要的出版物、病例报告、癌症和儿科队列。两名审稿人独立筛选摘要和全文并提取数据。主要结局是临床治愈率。次要结果包括用于描述 PPS 的分类系统。评估了偏倚风险。\n\n**结果：** 在删除重复项后，在确定的 496 条记录中，筛选了 489 条摘要，并评估了 60 篇全文文章的资格。最终分析纳入的 25 篇文章中，23 篇为病例系列或回顾性队列研究，且均存在高偏倚风险。没有发现随机对照试验。五篇文章（包括案例系列中的两篇）描述了 PPS 的分类系统。干预措施包括高压氧治疗、Karydakis 皮瓣、裂隙闭合、网膜成形术、植皮、股薄肌和腹直肌皮瓣、血小板衍生生长因子、刮宫术、切开和切除鼻窦。据报道，治愈率从 30% 到 100% 不等。结果报告以及所进行的干预措施的异质性排除了荟萃分析。\n\n**结论：** 已发表的 IBD PPS 治疗证据由具有高偏倚风险的低质量证据病例系列组成。需要标准化的结果报告和高质量的前瞻性研究来建立有效的治疗算法。", "keywords_zh": "肛周瘘管克罗恩病、肛周脓肿", "keywords_en": "Fistulizing perianal Crohn’s disease, Perianal abscess", "link": "https://pubmed.ncbi.nlm.nih.gov/41359092/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 08 Dec 2025"}, {"id": "41345764", "title_en": "The diagnostic value of faecal calprotectin levels in patients with perianal fistula: A systematic review", "title_zh": "粪便钙卫蛋白水平对肛周瘘患者的诊断价值：系统评价", "authors": "Dimitrios Chatziisaak", "abstract_en": "**Aim:** Perianal fistula (PAF) is a common condition encountered in surgical and gastroenterological practice. Distinguishing between cryptoglandular disease (CGD) and inflammatory bowel disease (IBD)-related perianal disease is critical to ensure appropriate management. Faecal calprotectin (FC) has emerged as a promising non-invasive biomarker for IBD; however, its role in acute perianal disease is not well established. This systematic review aimed to evaluate the diagnostic accuracy of FC in distinguishing IBD-related perianal disease from CGD.\n\n**Method:** A systematic literature search was conducted in PubMed, Embase and Cochrane databases following PRISMA guidelines. Studies were included if they assessed FC levels in patients with PAF and provided diagnostic accuracy metrics. Data extraction focused on study design, population characteristics, FC cut-off values, sensitivity, specificity and area under the curve (AUC) metrics.\n\n**Results:** Three studies met the inclusion criteria, all reporting significantly higher FC levels in IBD-related PAF compared to CGD-related fistulas. The proposed FC cut-off values varied, ranging from 110 μg/g to 344 μg/g, with corresponding sensitivities between 52% and 81%, as well as specificities between 77% and 93%. The AUC values indicated moderate to high diagnostic accuracy.\n\n**Conclusion:** FC shows potential as a diagnostic tool for differentiating IBD-related perianal disease from CGD. A cut-off of 110-150 μg/g appears most suitable for early screening, whereas a higher threshold may be appropriate for confirmatory diagnosis. Further prospective studies with standardized protocols are necessary to refine these thresholds and validate FC as a clinical decision-making tool.", "abstract_zh": "**Aim：** 肛周瘘（PAF）是外科和胃肠病学实践中遇到的常见病症。区分隐腺疾病（CGD）和炎症性肠病（IBD）相关的肛周疾病对于确保适当的治疗至关重要。粪便钙卫蛋白 (FC) 已成为一种有前途的 IBD 非侵入性生物标志物；然而，其在急性肛周疾病中的作用尚未明确。本系统评价旨在评估 FC 在区分 IBD 相关肛周疾病和 CGD 方面的诊断准确性。\n\n**Method：** 遵循 PRISMA 指南，在 PubMed、Embase 和 Cochrane 数据库中进行了系统的文献检索。如果研究评估了 PAF 患者的 FC 水平并提供了诊断准确性指标，则纳入研究。数据提取侧重于研究设计、群体特征、FC 截止值、敏感性、特异性和曲线下面积 (AUC) 指标。\n\n**结果：** 三项研究符合纳入标准，所有研究均报告 IBD 相关 PAF 的 FC 水平显着高于 CGD 相关瘘管。建议的 FC 截止值范围从 110μg/g 到 344μg/g，相应的敏感性在 52% 到 81% 之间，特异性在 77% 到 93% 之间。 AUC 值表明诊断准确性为中等到高。\n\n**结论：** FC 显示出作为区分 IBD 相关肛周疾病和 CGD 的诊断工具的潜力。 110-150μg/g 的临界值似乎最适合早期筛查，而更高的阈值可能适合确诊。有必要使用标准化方案进行进一步的前瞻性研究，以完善这些阈值并验证 FC 作为临床决策工具。", "keywords_zh": "克罗恩病、隐腺疾病、粪便钙卫蛋白、炎症性肠病、肛周瘘", "keywords_en": "Crohn's disease, cryptoglandular disease, faecal calprotectin, inflammatory bowel disease, perianal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/41345764/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Dec 2025"}, {"id": "41342583", "title_en": "Letter to the Editor: commentary on \"Transanal opening of intersphincteric space (TROPIS) treatment for high complex anal fistula: a systematic review and meta-analysis\"", "title_zh": "致编辑的信：对“经肛门括约肌间间隙开放（TROPIS）治疗高位复杂性肛瘘：系统评价和荟萃分析”的评论", "authors": "Jingen Lu", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41342583/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Dec 2025"}, {"id": "41267606", "title_en": "Efficacy of Adalimumab Biosimilars in Managing Perianal Fistula in Moderate to Severe Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "阿达木单抗生物仿制药治疗中度至重度克罗恩病肛周瘘的疗效：系统评价和荟萃分析", "authors": "M R Bakry", "abstract_en": "**Background:** Perianal fistulas represent a severe complication of Crohn's disease (CD), leading to significant morbidity and a decline in patients' quality of life. Adalimumab, a tumor necrosis factor (TNF) inhibitor, has been widely used for managing CD-related fistulas. However, with the introduction of adalimumab biosimilars, their comparative efficacy in fistula closure remains unclear. This systematic review and meta-analysis assessed the effectiveness and safety of adalimumab biosimilars in achieving complete fistula closure in moderate to severe CD.\n\n**Objective:** To evaluate the efficacy of adalimumab biosimilars in achieving complete fistula closure in patients with moderate to severe Crohn's disease, compared to placebo or standard therapies.\n\n**Methods:** A systematic review and meta-analysis were conducted following PRISMA guidelines. Studies published between 2007 and 2024 were retrieved from PubMed, Web of Science, Embase, Google Scholar, and the Cochrane Library. The included studies consisted of randomized controlled trials (RCTs), non-RCTs, case-control studies, and cohort studies that evaluated the efficacy of adalimumab biosimilars in fistula closure. Data extraction and quality assessment were independently performed using the MINORS evaluation tool. Heterogeneity was assessed using Q and I² statistics, and sensitivity analyses were conducted to explore potential sources of heterogeneity. Funnel plots were used to assess publication bias.\n\n**Results:** Ten studies met the inclusion criteria. The analysis demonstrated that adalimumab biosimilars significantly improved the complete fistula closure rate compared to placebo or conventional treatments. The pooled results indicated a moderate to high efficacy, with a statistically significant improvement in clinical remission rates (P < 0.05). Safety analysis revealed that adverse events were comparable between biosimilars and the original adalimumab, with no significant increase in serious adverse reactions. Sensitivity analysis confirmed the robustness of the findings, and publication bias assessment did not indicate significant bias.\n\n**Conclusions:** This meta-analysis supports the efficacy and safety of adalimumab biosimilars in managing perianal fistulas in moderate to severe CD. The findings suggest that adalimumab biosimilars are effective and safe in managing perianal fistulas in Crohn's disease, but further direct comparative studies with originator adalimumab are needed to establish equivalence. Further large-scale RCTs are recommended to confirm these results and establish long-term safety data.", "abstract_zh": "**背景：** 肛周瘘管是克罗恩病 (CD) 的严重并发症，会导致患者发病率显着下降并导致生活质量下降。阿达木单抗是一种肿瘤坏死因子 (TNF) 抑制剂，已广泛用于治疗 CD 相关瘘管。然而，随着阿达木单抗生物仿制药的推出，它们在瘘管闭合方面的比较功效仍不清楚。这项系统评价和荟萃分析评估了阿达木单抗生物仿制药在中度至重度 CD 中实现瘘管完全闭合的有效性和安全性。\n\n**目的：** 与安慰剂或标准疗法相比，评估阿达木单抗生物仿制药在中度至重度克罗恩病患者实现瘘管完全闭合方面的疗效。\n\n**方法：** 按照 PRISMA 指南进行了系统评价和荟萃分析。 2007 年至 2024 年间发表的研究是从 PubMed、Web of Science、Embase、Google Scholar 和 Cochrane 图书馆检索的。纳入的研究包括随机对照试验 (RCT)、非 RCT、病例对照研究和队列研究，评估阿达木单抗生物仿制药在瘘管闭合中的疗效。使用 MINORS 评估工具独立进行数据提取和质量评估。使用 Q 和 I² 统计数据评估异质性，并进行敏感性分析以探索异质性的潜在来源。漏斗图用于评估发表偏倚。\n\n**结果：** 十项研究符合纳入标准。分析表明，与安慰剂或常规治疗相比，阿达木单抗生物仿制药显着提高了瘘管完全闭合率。汇总结果表明疗效中等至较高，临床缓解率有统计学显着改善（P < 0.05）。安全性分析显示，生物仿制药和原研阿达木单抗的不良事件相当，严重不良反应没有显着增加。敏感性分析证实了研究结果的稳健性，发表偏倚评估并未表明存在显着偏倚。\n\n**结论：** 该荟萃分析支持阿达木单抗生物仿制药治疗中度至重度 CD 肛周瘘的有效性和安全性。研究结果表明，阿达木单抗生物仿制药在治疗克罗恩病肛周瘘方面有效且安全，但需要与原研药阿达木单抗进行进一步的直接比较研究以确定等效性。建议进一步进行大规模随机对照试验来证实这些结果并建立长期安全性数据。", "keywords_zh": "阿达木单抗、克罗恩病、阿达木单抗生物仿制药、抗 TNF 药物、生物疗法、生物仿制药、瘘管闭合、肛周瘘、肿瘤坏死因子抑制剂", "keywords_en": "Adalimumab, Crohn’s disease, adalimumab biosimilars, anti-TNF agents., biologic therapy, biosimilars, fistula closure, perianal fistula, tumor necrosis factor inhibitors", "link": "https://pubmed.ncbi.nlm.nih.gov/41267606/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 21 Nov 2025"}, {"id": "41219674", "title_en": "Fistula Outcomes After Seton Removal in Patients with Perianal Fistulizing Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "肛周瘘管性克罗恩病患者挂线拔除后的瘘管结果：系统评价和荟萃分析", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background:** While setons are commonly used in the multidisciplinary care of patients with perianal fistulizing Crohn's disease (PFCD), fistula outcomes after their removal are poorly understood. We performed a systematic review with meta-analysis to evaluate fistula outcomes after seton removal in patients with PFCD.\n\n**Methods:** MEDLINE, EMBASE, Web of Science, and Cochrane databases were systematically searched until December 2023. We included studies reporting fistula outcomes after seton removal in PFCD. We used a hierarchy to stratify patients into one of three treatment categories: medical therapy alone, surgical closure, or cell/plasma-based therapy. Fistula outcomes were reported as weighted proportions with 95% confidence intervals (CI).\n\n**Results:** Eighty-two studies (n = 2441 patients) were analyzed. Mean/median seton duration varied widely (2 to 70 weeks). Pooled estimates (95% CI) of fistula outcomes after seton removal for patients treated in the medical therapy alone, surgical closure, or cell/plasma-based therapy categories were, respectively, 64% (54-75), 65% (52-78), and 71% (65-77) for fistula remission; 30% (22-38), 29% (16-42), and 20% (15-25) for recurrence; 15% (8-22), 11% (4-20), and 14% (8-21) for abscess formation; and 26% (18-35), 23% (17-29), and 13% (2-26) for surgical re-intervention. Fistula outcome estimates remained stable in multiple sensitivity analyses. Limited studies directly compared fistula outcomes based on seton duration, yielding inconsistent results.\n\n**Conclusions:** This systematic review provides comprehensive estimates of fistula outcomes after seton removal and demonstrates substantial variability in seton duration. Future research is required to determine the optimal duration of setons.", "abstract_zh": "**背景：** 虽然挂线常用于肛周瘘管克罗恩病 (PFCD) 患者的多学科护理，但人们对挂线移除后的瘘管结局知之甚少。我们通过荟萃分析进行了系统回顾，以评估 PFCD 患者挂线拔除后的瘘管结局。\n\n**方法：** 截至 2023 年 12 月，我们对 MEDLINE、EMBASE、Web of Science 和 Cochrane 数据库进行了系统检索。我们纳入了报告 PFCD 挂线拔除后瘘管结果的研究。我们使用层次结构将患者分为三种治疗类别之一：单纯药物治疗、手术闭合或基于细胞/血浆的治疗。瘘管结果报告为具有 95% 置信区间 (CI) 的加权比例。\n\n**结果：** 分析了 82 项研究（n=2441 名患者）。平均/中位挂线持续时间差异很大（2 至 70 周）。对于仅接受药物治疗、手术闭合或基于细胞/血浆的治疗类别的患者，挂线拔除后瘘管结局的汇总估计 (95% CI) 瘘管缓解率分别为 64% (54-75)、65% (52-78) 和 71% (65-77)； 30% (22-38)、29% (16-42) 和 20% (15-25) 复发； 15% (8-22)、11% (4-20) 和 14% (8-21) 脓肿形成； 26% (18-35)、23% (17-29) 和 13% (2-26) 需要再次手术干预。在多项敏感性分析中，瘘管结果估计值保持稳定。有限的研究根据挂线持续时间直接比较瘘管结局，产生不一致的结果。\n\n**结论：** 该系统评价提供了挂线移除后瘘管结果的全面估计，并证明了挂线持续时间的显着差异。需要进一步的研究来确定挂线的最佳持续时间。", "keywords_zh": "肛瘘、生物疗法、克罗恩病、引流、间充质干细胞", "keywords_en": "Anal fistula, Biologic therapy, Crohn’s disease, Drainage, Mesenchymal stem cells", "link": "https://pubmed.ncbi.nlm.nih.gov/41219674/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 11 Nov 2025"}, {"id": "41133388", "title_en": "Letter to the Editor: insights into \"Transanal Opening of Intersphincteric Space (TROPIS) treatment for high complex anal fistula: a systematic review and meta-analysis\"", "title_zh": "致编辑的信：对“经肛门括约肌间间隙开放（TROPIS）治疗高位复杂性肛瘘的见解：系统评价和荟萃分析”", "authors": "Jing Wang", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41133388/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 24 Oct 2025"}, {"id": "40983150", "title_en": "Management of Perianal Abscesses in Infants: A Systematic Review From the APSA Outcomes and Evidence-Based Practice Committee", "title_zh": "婴儿肛周脓肿的治疗：APSA 结果和循证实践委员会的系统审查", "authors": "American Pediatric Surgical Association Outcomes and Evidence-Based Practice Committee", "abstract_en": "**Background:** Management of infant perianal disease, including perianal abscess and fistula-in- ano (FIA), remains controversial. There is lack of consensus regarding the risks and benefits of operative and non-operative approaches.\n\n**Methods:** The American Pediatric Surgical Association Outcomes and Evidence Based Practice Committee created a priori consensus-based questions regarding the various approaches to management of perianal abscess and FIA in infants. A comprehensive search strategy was created, and the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines were used to identify and review relevant articles and answer the established questions.\n\n**Results:** Over 2460 titles and abstracts were screened to identify 31 manuscripts describing the expected course of perianal disease when managed with nonoperative management (NOM) strategies (such as hygiene, sitz baths, and systemic antibiotics), operative intervention for abscess only (incision and drainage (I&D)) or direct surgical management of the FIA (e.g. upfront fistulotomy). Initial failure of NOM is approximately 37.5 %. Recurrence rate after initial success with NOM or I&D is approximately 21 % and 24 %, respectively. The rate of FIA development is approximately 21 % after NOM and 20 % after I&D. Recurrence after operative management of FIA, regardless of approach, is 7 %. Time to complete resolution varies widely and does not appear to differ based on treatment strategy.\n\n**Conclusions:** Both operative and non-operative approaches can be safely used in the management of perianal abscess and FIA but recurrence is common regardless of approach. Risks and benefits of each approach should be considered on a case-by-case basis.\n\n**Type Of Study:** Systematic Review of level 3-4 studies.\n\n**Level Of Evidence:** Level 4.", "abstract_zh": "**背景：** 婴儿肛周疾病的治疗，包括肛周脓肿和肛瘘（FIA），仍然存在争议。关于手术和非手术方法的风险和益处缺乏共识。\n\n**方法：** 美国儿科外科协会成果和循证实践委员会针对婴儿肛周脓肿和 FIA 的各种治疗方法提出了基于先验共识的问题。创建了全面的搜索策略，并使用系统评价和荟萃分析的首选报告项目 (PRISMA) 指南来识别和审查相关文章并回答既定问题。\n\n**结果：** 筛选了 2460 多个标题和摘要，确定了 31 篇手稿，描述了采用非手术治疗 (NOM) 策略（例如卫生、坐浴和全身抗生素）、仅针对脓肿进行手术干预（切开引流 (I&D)）或 FIA 直接手术治疗（例如前期瘘管切开术）时肛周疾病的预期病程。 NOM 的初始故障约为 37.5%。 NOM 或 I&D 初次成功后的复发率分别约为 21% 和 24%。 NOM 后的 FIA 开发率约为 21%，I&D 后的 FIA 开发率约为 20%。无论采取何种方法，FIA 手术治疗后的复发率为 7%。完成缓解的时间差异很大，并且根据治疗策略似乎没有差异。\n\n**结论：** 手术和非手术方法都可以安全地用于肛周脓肿和 FIA 的治疗，但无论采用哪种方法，复发都很常见。应根据具体情况考虑每种方法的风险和收益。\n\n**Type of study：** 3-4 级研究的系统审查。\n\n**Level of evidence：** 4 级。", "keywords_zh": "肛瘘、瘘管切开术、婴儿、肛周脓肿、直肠周围脓肿", "keywords_en": "Fistula-in-ano, Fistulotomy, Infants, Perianal abscess, Perirectal abscess", "link": "https://pubmed.ncbi.nlm.nih.gov/40983150/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 22 Sep 2025"}, {"id": "40936062", "title_en": "Effectiveness of Laser-Based Fistula Therapies with and without Adjunctive Measures in Anal Fistulas Management: A Systematic Review and Single-Arm Meta-Analysis", "title_zh": "激光瘘管治疗在肛瘘治疗中联合或不联合辅助措施的有效性：系统评价和单臂荟萃分析", "authors": "Stefano Baraldo", "abstract_en": "**Purpose:** Fistula Laser Closure (FiLaC®) is a sphincter-preserving technique for anal fistulas, but its efficacy and safety remain under discussion. Therefore, we aim to evaluate the efficacy and safety of FiLaC® in the management of patients with cryptoglandular fistulas.\n\n**Methods:** A systematic review was performed in MEDLINE, Embase, and Cochrane databases in January 2025, following PRISMA guidelines. We included randomized controlled trials (RCTs) and observational studies assessing FiLaC® for cryptoglandular fistulas, with or without surgical adjunctive measures. The main outcome was the primary healing rate. Secondary outcomes included fistula recurrence, incontinence, reoperation rates, and postoperative complications. Subgroup analyses explored variables related to the primary healing rate. Data are presented as percentages (95% confidence interval). Statistical analyses were performed using R (version 4.4.1 (2024-06-14 (ucrt)).\n\n**Results:** We included 24 studies with 1,503 patients. The pooled primary healing rate was 57.46% (49.40-65.33). Recurrence occurred in 18.48% of patients (10.14-28.47), while new-onset incontinence was rare (0.57%; 0.00-2.15). The reoperation rate was 36.49% (28.95-44.36), and anal abscesses or infections affected 6.54% (1.93-13.09) of patients. Subgroup analysis showed no statistically significant differences in the primary healing rate based on fistula type, adjunctive measures, or sex. Sensitivity analysis confirmed the robustness of our findings.\n\n**Conclusions:** FiLaC® seems to be a safe option with an intermediate healing rate in patients with cryptoglandular fistulas, although it is associated with a considerable recurrence rate. While its sphincter preservation advantage is evident, further RCTs standardizing the technique and adjunctive approaches are needed to optimize outcomes and refine its application in fistula management.", "abstract_zh": "**Purpose：** 瘘管激光闭合术 (FiLaC®) 是一种治疗肛瘘的括约肌保留技术，但其有效性和安全性仍在讨论中。因此，我们的目的是评估 FiLaC® 在隐窝腺瘘患者治疗中的有效性和安全性。\n\n**方法：** 2025 年 1 月，按照 PRISMA 指南在 MEDLINE、Embase 和 Cochrane 数据库中进行了系统评价。我们纳入了随机对照试验 (RCT) 和观察性研究，评估 FiLaC® 在有或没有手术辅助措施的情况下治疗隐窝腺瘘。主要结果是初次治愈率。次要结局包括瘘管复发、失禁、再次手术率和术后并发症。亚组分析探讨了与初次治愈率相关的变量。数据以百分比形式呈现（95% 置信区间）。 使用 R（版本 4.4.1 (2024-06-14 (ucrt)）进行统计分析。\n\n**结果：** 我们纳入了 24 项研究，涉及 1,503 名患者。合并一期愈合率为 57.46% (49.40-65.33)。 18.48% 的患者（10.14-28.47）复发，而新发尿失禁很少见（0.57%；0.00-2.15）。再次手术率为36.49%（28.95-44.36），肛门脓肿或感染占6.54%（1.93-13.09）。亚组分析显示，基于瘘管类型、辅助措施或性别的初次愈合率没有统计学上的显着差异。敏感性分析证实了我们研究结果的稳健性。\n\n**结论：** FiLaC® 似乎是隐窝腺瘘患者的一种安全选择，具有中等的治愈率，尽管它与相当大的复发率相关。虽然其保留括约肌的优势显而易见，但仍需要进一步的随机对照试验来标准化该技术和辅助方法，以优化结果并完善其在瘘管治疗中的应用。", "keywords_zh": "隐腺瘘管，FiLaC，愈合率，荟萃分析，直肠瘘", "keywords_en": "Cryptoglandular fistulas, FiLaC, Healing rate, Meta-analysis, Rectal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/40936062/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 11 Sep 2025"}, {"id": "40933558", "title_en": "Adipose-derived stem cell therapies for complex anal fistula: a systematic review and meta-analysis of randomized controlled trials", "title_zh": "脂肪干细胞治疗复杂肛瘘：随机对照试验的系统评价和荟萃分析", "authors": "Wenjiang Wu", "abstract_en": "**Purpose:** This study aimed to systematically investigate the efficacy of adipose-derived stem cells (ASCs) in complex anal fistula treatment.\n\n**Methods:** This study systematically searched randomized controlled studies on the efficacy of ASCs in treating complex anal fistula published before June 2024 in PubMed, EMBASE, Web of Science, and Cochrane Library. Further, relevant journals were manually searched for relevant references, and two researchers independently performed literature search and screening, data extraction, and bias assessment. Stata version 12.0 was utilized to statistically analyze the healing rate of the anal fistula and the incidence of adverse events.\n\n**Results:** This study involved 1,056 patients from five randomized controlled trials, including 561 patients in the treatment group (ASCs/ASCs + fibrin glue) and 495 patients in the control group (fibrin glue/placebo). Meta-analysis revealed better short- and long-term efficacy of adipose mesenchymal stem cell treatment for complex perianal fistulas than in conventional treatment. However, no statistical difference was observed between mid-term and ultra-long-term treatments. Subgroup meta-analysis demonstrated a difference in efficacy between various cell doses. Further, all treatments with different sources of ASCs were superior to conventional quality.\n\n**Conclusion:** This study confirms that Adipose-derived Stem Cells can effectively improve short-term and long-term (1-year) clinical outcomes in patients with complex perianal fistulas, supporting their potential as a novel therapeutic strategy.\n\n**Systematic Review Registration:** https://www.crd.york.ac.uk/PROSPERO/view/CRD42024602327.", "abstract_zh": "**Purpose：** 本研究旨在系统研究脂肪干细胞（ASC）在复杂肛瘘治疗中的功效。\n\n**方法：** 本研究系统检索了 2024 年 6 月之前发表在 PubMed、EMBASE、Web of Science 和 Cochrane Library 上的关于 ASC 治疗复杂肛瘘疗效的随机对照研究。此外，人工检索相关期刊相关参考文献，由两名研究人员独立进行文献检索和筛选、数据提取和偏倚评估。采用Stata 12.0版本对肛瘘愈合率及不良事件发生率进行统计分析。\n\n**结果：** 这项研究涉及来自五项随机对照试验的 1,056 名患者，其中治疗组（ASCs/ASCs + 纤维蛋白胶）561 名患者，对照组（纤维蛋白胶/安慰剂）495 名患者。荟萃分析显示，脂肪间充质干细胞治疗复杂肛周瘘的短期和长期疗效优于传统治疗。然而，中期和超长期治疗之间没有观察到统计学差异。亚组荟萃分析证明不同细胞剂量之间的功效存在差异。此外，使用不同来源的 ASC 进行的所有治疗均优于常规质量。\n\n**结论：** 这项研究证实，脂肪干细胞可以有效改善复杂肛周瘘患者的短期和长期（1 年）临床结果，支持其作为一种新型治疗策略的潜力。\n\n**Systematic review registration：** https://www.crd.york.ac.uk/PROSPERO/view/CRD42024602327。", "keywords_zh": "脂肪干细胞，脂肪间充质干细胞，肛周瘘，随机对照试验，系统评价和荟萃分析", "keywords_en": "adipose stem cells, adipose-derived mesenchymal stem cell, perianal fistula, randomized controlled trial, systematic review and meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/40933558/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 11 Sep 2025"}, {"id": "40929949", "title_en": "A systematic review and meta-analysis of the outcomes of anal fistula clips in the treatment of anal fistulas", "title_zh": "肛瘘夹治疗肛瘘疗效的系统评价和荟萃分析", "authors": "Giovanna DaSilva", "abstract_en": "**Introduction:** One recent novel method for the treatment of anal fistulas is the over-the-scope clip. This meta-analysis aimed to examine the success of anal fistula clips.\n\n**Methods:** This Preferred Reporting Items for Systematic Reviews and Meta-Analyses-compliant systematic review searched PubMed, Scopus, and Cochrane Library from January 2000 through March 2025 for observational and randomized controlled trials that used over-the-scope clips in treating cryptoglandular and inflammatory bowel disease-related anal fistulas. Main outcomes were pooled healing and complication rates, and length of stay.\n\n**Results:** 12 studies (2 randomized controlled trials) incorporating a total of 438 patients were included; 293 patients underwent anal fistula clip placement. The median age of the patients was 45.5 years. The pooled healing rate was 67.7% (95% confidence interval: 54.7%-80.7%) with a median follow-up of 11.3 months. Pooled healing was 78.7% (95% confidence interval: 62.3%-95.1%) in cryptoglandular fistulas and 59.5% (95% confidence interval: 41.8%-77.2%) in studies that included both cryptoglandular and inflammatory bowel disease fistulas. The medical hospital stay across 3 studies was 4.9 days. Pooled complication rate was 30.9% (95% confidence interval: 14.6%-47.2%). The most common complications were spontaneous migration or unscheduled removal of a clip (17.3%, 95% confidence interval: 8.3%-26.4%) and clinically significant pain (3.8%, 95% confidence interval: 0.9%-6.7%). Seven studies assessed continence after over-the-scope clip placement, and no cases of fecal incontinence were reported.\n\n**Conclusions:** The over-the-scope clip is a promising and novel minimally invasive treatment for anal fistulas. The pooled healing rate was 67.7% overall and >75% for cryptoglandular fistulas. Despite its encouraging success, the over-the-scope clip's complication rate of 30.9% highlights the need for further refinement of this technique and patient selection.", "abstract_zh": "**介绍：** 最近治疗肛瘘的一种新方法是超镜夹。这项荟萃分析旨在检查肛瘘夹的成功率。\n\n**方法：** 本系统评价和符合荟萃分析的系统评价的首选报告项目检索了 2000 年 1 月至 2025 年 3 月期间的 PubMed、Scopus 和 Cochrane 图书馆，以查找使用超范围夹子治疗隐腺和炎症性肠病相关肛瘘的观察性和随机对照试验。主要结果是汇总治愈率、并发症发生率以及住院时间。\n\n**结果：** 纳入 12 项研究（2 项随机对照试验），共纳入 438 名患者； 293 名患者接受了肛瘘夹置入术。患者的中位年龄为 45.5 岁。汇总治愈率为 67.7%（95% 置信区间：54.7%-80.7%），中位随访时间为 11.3 个月。隐腺瘘的合并愈合率为 78.7%（95% 置信区间：62.3%-95.1%），而包括隐腺瘘和炎症性肠病瘘的研究中的合并愈合率为 59.5%（95% 置信区间：41.8%-77.2%）。 3 项研究的住院时间为 4.9 天。合并并发症率为 30.9%（95% 置信区间：14.6%-47.2%）。最常见的并发症是夹子自发移位或意外移除（17.3%，95% 置信区间：8.3%-26.4%）和临床显着疼痛（3.8%，95% 置信区间：0.9%-6.7%）。七项研究评估了超范围夹子放置后的失禁情况，没有报告大便失禁的病例。\n\n**结论：** 超镜夹是一种有前景的新型微创治疗肛瘘的方法。总体愈合率为 67.7%，隐窝瘘的合并愈合率为 >75%。尽管取得了令人鼓舞的成功，但超范围夹子的并发症率为 30.9%，这凸显了进一步完善该技术和患者选择的必要性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40929949/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 10 Sep 2025"}, {"id": "40844884", "title_en": "A commentary on \"Transanal Opening of Intersphincteric Space (TROPIS) treatment for high complex anal fistula: a systematic review and meta-analysis\"", "title_zh": "“经肛门括约肌间间隙开放（TROPIS）治疗高位复杂性肛瘘：系统评价和荟萃分析”的评论", "authors": "Chunxue Li", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40844884/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 22 Aug 2025"}, {"id": "40833840", "title_en": "Bacteriology of Anorectal Abscess and Anal Fistula: A Systematic Review of the Literature", "title_zh": "肛门直肠脓肿和肛瘘的细菌学：文献的系统回顾", "authors": "David Parés", "abstract_en": "<b><i>Aim:</i></b> A cryptoglandular anorectal abscess is a collection of purulent material around the anus, often leading to the development of an anal fistula after drainage. Although <i>Escherichia coli</i> and <i>Bacteroides fragilis</i> have been considered key bacteria in these conditions, recent evidence suggests the need to revisit this assumption. This work aimed to analyze the presence and role of bacteria in the development of anal fistulas following anorectal abscesses. <b><i>Patients and Methods:</i></b> A search was conducted using MEDLINE via PubMed, EMBASE, Cochrane Library, and Google Scholar. Articles reporting the microbiology of cryptoglandular anorectal abscesses and the resulting anal fistulas in human beings were included. The main outcome was to evaluate the presence of bacteria in cultures of anorectal abscesses or in patients who developed anal fistulas. Additional goals included identifying patient characteristics and assessing clinical outcomes on the basis of the isolated bacteria. <b><i>Results:</i></b> In total, 22 articles on anorectal abscesses and seven on anal fistulas met the inclusion criteria. Men were the most prevalent in both cases. <i>Escherichia coli</i> and the <i>Bacteroides</i> genus were the most isolated microorganisms in abscesses and fistulas, though inconsistently in the latter. <i>Bilophila wadsworthia</i> was newly isolated in abscesses, and <i>Rothia</i> sp. was notable in fistulas using new molecular techniques. <b><i>Conclusions:</i></b> <i>Escherichia coli</i> and <i>Bacteroides</i> sp. are involved in anorectal abscesses and anal fistula formation. Recently, using new technology non-well-known bacteria had been isolated involved in this clinical problem.", "abstract_zh": "<b><i>目的：</i></b>隐窝腺肛门直肠脓肿是肛门周围化脓性物质的聚集，通常在引流后导致肛瘘的发展。尽管大肠杆菌和脆弱拟杆菌被认为是这些情况下的关键细菌，但最近的证据表明有必要重新审视这一假设。这项工作旨在分析细菌在肛门直肠脓肿后肛瘘发展中的存在和作用。 <b><i>患者和方法：</i></b>使用 MEDLINE 通过 PubMed、EMBASE、Cochrane 图书馆和 Google Scholar 进行搜索。报告人类隐腺肛门直肠脓肿和由此产生的肛瘘的微生物学的文章也被纳入其中。主要结果是评估肛门直肠脓肿培养物或发生肛瘘的患者中细菌的存在。其他目标包括识别患者特征并根据分离的细菌评估临床结果。 <b><i>结果：</i></b>总共有 22 篇关于肛门直肠脓肿的文章和 7 篇关于肛瘘的文章符合纳入标准。在这两种情况下，男性最为常见。大肠杆菌和拟杆菌属是脓肿和瘘管中分离度最高的微生物，尽管后者的情况不一致。 <i>Bilophila wadsworthia</i>是新在脓肿中分离出来的，而<i>Rothia</i> sp。在使用新分子技术的瘘管治疗中值得注意。 <b><i>结论：</i></b> <i>大肠杆菌</i>和<i>拟杆菌</i> sp。参与肛门直肠脓肿和肛瘘的形成。最近，利用新技术分离出了与这一临床问题有关的非知名细菌。", "keywords_zh": "肛瘘、肛门直肠脓肿、细菌学、培养", "keywords_en": "anal fistula, anorectal abscess, bacteriology, cultures", "link": "https://pubmed.ncbi.nlm.nih.gov/40833840/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 20 Aug 2025"}, {"id": "40824311", "title_en": "Abdominoperineal pull-through with delayed coloanal anastomosis for pelvic anastomotic failure-a systematic review", "title_zh": "腹会阴牵引延迟结肠肛管吻合术治疗盆腔吻合失败的系统评价", "authors": "I Seow-En", "abstract_en": "**Aim:** Despite the potential benefits of abdominoperineal pull-through with delayed coloanal anastomosis (DCAA), it is still infrequently performed as a salvage procedure for pelvic anastomotic failure. We aimed to perform a systematic review on the subject to guide practice.\n\n**Method:** PubMed, Embase and Cochrane were used to identify studies evaluating DCAA for salvage after pelvic surgery from inception to August 2024. Risk of bias assessment was performed using the Newcastle-Ottawa scale. The primary outcome was overall stoma-free survival. Secondary outcomes included hospital length of stay, high-grade postoperative complication rates, 30-day postoperative mortality rates, incidence of redo surgical intervention after DCAA, and postoperative anorectal function.\n\n**Results:** Five retrospective cohort studies evaluating a total of 97 patients who underwent salvage abdominoperineal pull-through and DCAA were included in this review. All patients had previous pelvic surgery, predominantly proctectomy (n = 84, 86.6%). The most common indication for redo surgery was chronic fistula (n = 62, 63.9%) followed by anastomotic leak or chronic pelvic sepsis (n = 34, 35.1%). The pooled overall stoma-free survival rate across all five studies was 81.4% over a mean 24-month postoperative follow-up duration. The overall incidence of high-grade complications after DCAA was 39.1% (n = 38). Pooled mean length of stay was 17 days. There were no cases of early postoperative death. Pooled rate of repeat surgery across four studies was 11.6% (n = 8). Pooled mean functional scores across three studies indicated minor low anterior resection syndrome at 26 months.\n\n**Conclusion:** Abdominoperineal pull-through with delayed coloanal anastomosis is a viable option for salvage surgery following pelvic anastomotic complications, with low rates of permanent stoma and acceptable long-term anorectal function.", "abstract_zh": "**Aim：** 尽管腹会阴拉穿延迟结肠肛门吻合术 (DCAA) 具有潜在益处，但它仍然很少作为骨盆吻合失败的挽救手术进行。我们的目的是对该主题进行系统回顾以指导实践。\n\n**Method：** PubMed、Embase 和 Cochrane 被用来识别从开始到 2024 年 8 月评估 DCAA 在盆腔手术后挽救效果的研究。使用纽卡斯尔-渥太华量表进行偏倚风险评估。主要结果是总体无造口生存率。次要结局包括住院时间、术后高级并发症发生率、术后 30 天死亡率、DCAA 后重做手术干预的发生率以及术后肛门直肠功能。\n\n**结果：** 本综述纳入了五项回顾性队列研究，评估了总共 97 名接受挽救性腹会阴牵引术和 DCAA 的患者。所有患者均曾接受过盆腔手术，主要是直肠切除术（n = 84，86.6%）。重做手术最常见的适应症是慢性瘘（n = 62，63.9%），其次是吻合口瘘或慢性盆腔脓毒症（n = 34，35.1%）。在平均 24 个月的术后随访期间，所有五项研究的汇总总体无造口生存率为 81.4%。 DCAA 后高级并发症的总体发生率为 39.1% (n = 38)。合并平均住院时间为 17 天。无术后早期死亡病例。四项研究的重复手术汇总率为 11.6% (n = 8)。三项研究的汇总平均功能评分表明 26 个月时有轻微的低位前切除综合征。\n\n**结论：** 腹会阴牵引联合延迟结肠肛管吻合术是盆腔吻合并发症后挽救手术的可行选择，具有较低的永久性造口率和可接受的长期肛门直肠功能。", "keywords_zh": "腹会阴牵引、结直肠手术、延迟结肠肛门吻合术、重做手术", "keywords_en": "Abdominoperineal pull-through, Colorectal surgery, Delayed coloanal anastomosis, Redo surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40824311/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 18 Aug 2025"}, {"id": "40780867", "title_en": "PAVFCOS: The development of a core outcome set for pouch anal and vaginal fistula", "title_zh": "PAVFCOS：针对储袋肛瘘和阴道瘘制定核心结果集", "authors": "Phil Tozer", "abstract_en": "**Aims:** The primary aim was to develop a patient-centred core outcome set (COS) for interventional studies in patients with pouch anal and vaginal fistula (PAVF).\n\n**Method:** PAVFCOS was developed using the methodology outlined by the Core Outcome Measures in Effectiveness Trials (COMET). Systematic review and qualitative patient interviews produced a long list of candidate outcomes. An online Delphi exercise was conducted with stakeholders to prioritise and shortlist outcomes. A consensus meeting of patients and clinicians ratified the final core outcome set.\n\n**Results:** A systematic review of the literature and 14 qualitative patient interviews produced a long list of 99 outcomes. These were reduced to 46 outcomes and subjected to two rounds of a Delphi exercise with 70 participants, including patients (45%), colorectal surgeons (31%), radiologists (6%), gastroenterologists (11%) and pouch specialist nurses (7%). Thirty-six outcomes were discussed in a consensus meeting of seven clinicians and seven patients. Seven core outcomes were selected for inclusion: global assessment of continence, pain related to fistula and surrounding area, impact on quality of life of fistula discharge, fistula healing (clinical and radiological), new fistula or abscess, need for rescue intervention (minor or major) and global quality-of-life assessment.\n\n**Conclusion:** PAVFCOS is the first to establish outcomes that are important to patients with pouch anal and vaginal fistula. PAVFCOS should be used in interventional studies to introduce much-needed standardisation of outcome reporting in this challenging condition.", "abstract_zh": "**Aims：** 主要目的是开发一个以患者为中心的核心结果集（COS），用于储袋肛瘘和阴道瘘（PAVF）患者的介入研究。\n\n**Method：** PAVFCOS 是使用有效性试验核心结果衡量标准 (COMET) 概述的方法开发的。系统审查和定性患者访谈产生了一长串候选结果。与利益相关者一起进行了在线德尔菲练习，以确定结果的优先顺序和最终名单。患者和临床医生的共识会议批准了最终的核心结果集。\n\n**结果：** 对文献的系统回顾和 14 次定性患者访谈产生了 99 项结果的长列表。这些结果被减少到 46 种，并接受了两轮德尔菲演习，共有 70 名参与者，包括患者 (45%)、结直肠外科医生 (31%)、放射科医生 (6%)、胃肠科医生 (11%) 和造口袋专科护士 (7%)。七名临床医生和七名患者参加的共识会议讨论了 36 项结果。选择纳入七个核心结局：失禁的总体评估、与瘘管及周围区域相关的疼痛、瘘管排出对生活质量的影响、瘘管愈合（临床和放射学）、新的瘘管或脓肿、救援干预的需要（轻微或严重）以及总体生活质量评估。\n\n**结论：** PAVFCOS 首次确立了对储袋肛瘘和阴道瘘患者重要的结果。 PAVFCOS 应该用于介入研究，以在这种具有挑战性的情况下引入急需的结果报告标准化。", "keywords_zh": "核心结果集、回肠肛袋、炎症性肠病、患者报告的结果", "keywords_en": "core outcome set, ileoanal pouch, inflammatory bowel disease, patient‐reported outcomes", "link": "https://pubmed.ncbi.nlm.nih.gov/40780867/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 08 Aug 2025"}, {"id": "40693967", "title_en": "Transanal opening of intersphincteric space (TROPIS) treatment for high complex anal fistula: a systematic review and meta-analysis", "title_zh": "经肛门括约肌间间隙开放（TROPIS）治疗高位复杂性肛瘘：系统评价和荟萃分析", "authors": "Jiawen Wang", "abstract_en": "**Background:** The transanal opening of intersphincteric space (TROPIS) is a new surgical modality for treating anal fistulas. This procedure involves a transanal incision between the sphincters to promote drainage, excision of the infected areas, and maintenance of sphincter patency. In this meta-analysis, we evaluated the efficacy and safety of TROPIS in treating high complex anal fistula.\n\n**Methods:** We searched the PubMed (NLM), LISTA (EBSCO), and Web of Science Core Collection (Clarivate) databases for all related clinical research literature on highly complex anal fistulas treated with TROPIS from the time of database creation to 31 December 2024, with inclusion restricted to studies published in English. All included articles follow the PICO principle. Data on surgical one-time cure rate, recurrence rate after the first surgery, final cure rate, and occurrence of adverse events were extracted for further analysis.\n\n**Results:** Six studies involving 499 patients were included. The heterogeneity test revealed no heterogeneity, and results for one-time cure rate showed I 2  = 0.00% < 50%, and Q test P = 0.81 > 0.1 (effect size [ES] = 0.80, 95% confidence interval [CI] (0.77, 0.84), Z = 45.96, P = 0.00), where the one-time cure rate was 80%; recurrence rate after first surgery I 2  = 0.00% < 50%, and Q test P = 0.81 > 0.1 (ES = 0.20, 95% CI (0.16, 0.23), Z = 17.49, P = 0.00), and the recurrence rate is 20%; final cure rate I 2  = 0.00% < 50%, and Q test P = 0.82 > 0.1 (ES = 0.89, 95% CI (0.86, 0.92), Z = 51.21, P = 0.00), and the final cure rate was 89%. No adverse events were reported in any of the patients. Sensitivity analyses showed excellent stability of the surgical cure results in all studies. No publication bias was detected in any of the included studies.\n\n**Conclusions:** The TROPIS procedure for highly complex anal fistulas exhibits a high one-time cure rate, low recurrence rate, and high overall cure rate and is not associated with any adverse events.", "abstract_zh": "**背景：** 经肛门括约肌间隙开放术（TROPIS）是治疗肛瘘的一种新手术方式。该手术涉及在括约肌之间进行经肛门切口以促进引流、切除感染区域并保持括约肌通畅。在这项荟萃分析中，我们评估了 TROPIS 治疗高位复杂性肛瘘的有效性和安全性。\n\n**方法：** 我们检索了 PubMed (NLM)、LISTA (EBSCO) 和 Web of Science Core Collection (Clarivate) 数据库，查找从数据库创建之时到 2024 年 12 月 31 日期间所有关于 TROPIS 治疗高度复杂肛瘘的相关临床研究文献，仅限于以英文发表的研究。所有包含的文章都遵循 PICO 原则。提取手术一次性治愈率、首次手术后复发率、最终治愈率以及不良事件发生情况的数据进行进一步分析。\n\n**结果：** 纳入了涉及 499 名患者的六项研究。异质性检验未发现异质性，一次性治愈率结果显示 I 2 = 0.00% < 50%，Q 检验 P = 0.81 > 0.1（效应量 [ES] = 0.80，95% 置信区间 [CI] (0.77, 0.84)，Z = 45.96，P = 0.00），其中一次性治愈率为80%；首次手术后复发率 I 2 = 0.00% < 50%，Q 检验 P = 0.81 > 0.1 (ES = 0.20, 95% CI (0.16, 0.23), Z = 17.49, P = 0.00)，复发率为 20%；最终治愈率 I 2 = 0.00% < 50%，Q 检验 P = 0.82 > 0.1（ES = 0.89，95% CI（0.86，0.92），Z = 51.21，P = 0.00），最终治愈率为 89%。所有患者均未报告不良事件。敏感性分析显示所有研究中手术治愈结果均具有出色的稳定性。在所有纳入的研究中均未发现发表偏倚。\n\n**结论：** TROPIS手术治疗高度复杂的肛瘘具有一次性治愈率高、复发率低、总体治愈率高的特点，且不产生任何不良事件。", "keywords_zh": "肛瘘，高位复杂性肛瘘，荟萃分析，系统评价，经肛门括约肌间间隙开放（TROPIS）", "keywords_en": "anal fistula, high complex anal fistula, meta-analysis, systematic review, transanal opening of intersphincteric space (TROPIS)", "link": "https://pubmed.ncbi.nlm.nih.gov/40693967/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 22 Jul 2025"}, {"id": "40672439", "title_en": "Diagnosis and treatment for anal fistula: a systematic review of clinical practice guidelines and consensus statements", "title_zh": "肛瘘的诊断和治疗：临床实践指南和共识声明的系统回顾", "authors": "Rong Shi", "abstract_en": "**Background:** Anal fistula constitutes a pathological channel originating either from the anal canal or rectum to the skin surrounding the anus, primarily characterized by recurrent pain, purulent discharge, and pruritus. This study aims to compare and standardize the recommendations for the diagnosis and treatment of anal fistula, drawing on contemporary clinical practice guidelines.\n\n**Methods:** A comprehensive search was conducted across multiple databases including PubMed, EMBASE, China National Knowledge Infrastructure, Wanfang Database, Chinese Science and Technology Periodical Database, and Chinese Biological Medicine Database, from their inception through April 1, 2024. The objective was to collate all published guidelines on anal fistula. The quality of the eligible guidelines was appraised by two reviewers using the Appraisal of Guidelines for Research and Evaluation II instrument.\n\n**Results:** The search yielded fifteen guidance documents -comprising nine guidelines and six consensus statements -each offering specific recommendations. Twelve of these documents address screening and diagnosis of anal fistula, while all fifteen discuss various treatment and management strategies. Document analysis highlighted MRI as the predominant diagnostic recommendation. Treatment and management strategies were categorized into four categories: preoperative management, surgical method selection, pharmacological interventions, and postoperative management. Regarding surgical interventions, all guidelines address incision and drainage of fistulas. Most guidelines offer a low recommendation for cutting setons, mainly attributed to the presence of incontinence. For high-positioned anal fistula, a push-pull flap procedure is recommended, whereas the LIFT procedure is advocated for newly identified, high, and sphincter-penetrating fistulas. Among the 15 guidelines and consensus statements evaluated in this study, more than half demonstrated methodological limitations, with particularly deficient performance in the applicability domain. As a critical determinant of implementation effectiveness, these deficiencies may undermine guidelines' capacity to optimize health outcomes.\n\n**Conclusion:** There is a pressing need for an updated search of potential evidence on the diagnosis and treatment of anal fistula. Effective diagnoses and therapeutic approaches, whether conventional or complementary and alternative medicine, should be thoroughly evaluated and incorporated based on robust evidence.", "abstract_zh": "**背景：** 肛瘘是从肛管或直肠到肛门周围皮肤的病理通道，主要表现为反复疼痛、脓性分泌物和瘙痒。本研究旨在借鉴当代临床实践指南，对肛瘘的诊断和治疗建议进行比较和标准化。\n\n**方法：** 对PubMed、EMBASE、中国国家知识基础设施、万方数据库、中国科技期刊数据库和中国生物医学数据库等多个数据库进行了全面检索，从建库到2024年4月1日。目的是整理所有已发布的肛瘘指南。合格指南的质量由两名评审员使用“研究和评估指南 II 评估”工具进行评估。\n\n**结果：** 搜索产生了十五份指导文件，其中包括九份指南和六份共识声明，每份文件都提供了具体建议。其中十二份文件涉及肛瘘的筛查和诊断，所有十五份文件都讨论了各种治疗和管理策略。文档分析强调 MRI 是主要的诊断建议。治疗和管理策略分为四类：术前管理、手术方法选择、药物干预和术后管理。关于手术干预，所有指南均涉及瘘管切开和引流。大多数指南对切挂线的建议较低，这主要是由于存在失禁。对于高位肛瘘，建议采用推拉皮瓣手术，而对于新发现的高位肛瘘和括约肌穿透性肛瘘则提倡采用 LIFT 手术。在本研究评估的 15 条指南和共识声明中，超过一半表现出方法学局限性，尤其是在适用性领域表现不足。作为实施有效性的关键决定因素，这些缺陷可能会削弱指南优化健康结果的能力。\n\n**结论：** 迫切需要更新有关肛瘘诊断和治疗的潜在证据。有效的诊断和治疗方法，无论是传统医学还是补充和替代医学，都应基于强有力的证据进行彻底评估和整合。", "keywords_zh": "肛瘘, 诊断, 指南, 系统评价, 治疗", "keywords_en": "anal fistula, diagnosis, guidelines, systematic review, therapeutic", "link": "https://pubmed.ncbi.nlm.nih.gov/40672439/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Jul 2025"}, {"id": "40607121", "title_en": "Systematic review and meta-analysis of Transanal Opening of Intersphincteric Space (TROPIS) versus conventional treatments for anal fistula", "title_zh": "经肛门括约肌间间隙开放 (TROPIS) 与肛瘘常规治疗的系统回顾和荟萃分析", "authors": "Jing Wang", "abstract_en": "Transanal Opening of Intersphincteric Space (TROPIS) has emerged as a promising surgical approach for anal fistula management over recent years. This meta-analysis comprehensively evaluates the comparative efficacy and safety of TROPIS versus conventional treatments through systematic analysis of 24 clinical studies involving 2813 patients. Through systematic searches across 7 major biomedical databases (including PubMed, EMBASE, and Chinese repositories) from inception to March 2024, we identified comparative studies assessing TROPIS against six established interventions: incision-thread-drawing, seton placement, LIFT, EAFR, fistulotomy, and incision-suture techniques. Pooled analysis demonstrated TROPIS achieved superior clinical outcomes, with a 3.15-fold higher total efficacy rate (95 % CI 1.22-8.13, <i>p</i> = 0.02) and 64 % lower complication risk compared to conventional methods (OR 0.28, 95 % CI 0.18-0.42, <i>p</i> < 0.00001). Sensitivity analyses confirmed result stability across study designs, while publication bias assessment via funnel plots and Egger's test revealed no significant distortion. Importantly, TROPIS maintained its advantage across various complication subtypes including incontinence (OR 0.31), infection (OR 0.27), and recurrence (OR 0.19). These findings establish TROPIS as a clinically superior alternative that significantly improves therapeutic outcomes while reducing procedure-related risks, suggesting its potential to become the new reference standard in anal fistula management. The consistent results across diverse patient populations and comparator procedures underscore the robustness of this evidence synthesis.", "abstract_zh": "近年来，经肛门括约肌间开放术（TROPIS）已成为治疗肛瘘的一种有前途的手术方法。这项荟萃分析通过对涉及 2813 名患者的 24 项临床研究进行系统分析，全面评估了 TROPIS 与传统治疗的疗效和安全性比较。通过从成立到 2024 年 3 月对 7 个主要生物医学数据库（包括 PubMed、EMBASE 和中国存储库）的系统搜索，我们发现了评估 TROPIS 与六种既定干预措施的比较研究：切口挂线、挂线放置、LIFT、EAFR、瘘管切开术和切口缝合技术。汇总分析表明，TROPIS 取得了优异的临床结果，与传统方法相比，总有效率提高了 3.15 倍（95% CI 1.22-8.13，<i>p</i>=0.02），并发症风险降低了 64%（OR 0.28，95% CI 0.18-0.42，<i>p</i><0.00001）。敏感性分析证实了整个研究设计的结果稳定性，而通过漏斗图和艾格检验进行的发表偏倚评估显示没有明显的失真。重要的是，TROPIS 在各种并发症亚型中保持了其优势，包括失禁 (OR 0.31)、感染 (OR 0.27) 和复发 (OR 0.19)。这些研究结果表明 TROPIS 是一种临床上优越的替代方案，可显着改善治疗结果，同时降低手术相关风险，表明其有可能成为肛瘘治疗的新参考标准。不同患者群体和比较程序的一致结果强调了这一证据综合的稳健性。", "keywords_zh": "肛瘘，荟萃分析，TROPIS，经肛门括约肌间间隙开放", "keywords_en": "Anal fistula, Meta-analysis, TROPIS, Transanal Opening of Intersphincteric Space", "link": "https://pubmed.ncbi.nlm.nih.gov/40607121/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 03 Jul 2025"}, {"id": "40590873", "title_en": "Endoscopic Submucosal Dissection and Transanal Endoscopic Microsurgery in the Treatment of Rectal Neuroendocrine Tumors: Systematic Review and Meta-Analysis of the Observational Studies", "title_zh": "内镜粘膜下剥离术和经肛门内镜显微手术治疗直肠神经内分泌肿瘤：观察性研究的系统回顾和荟萃分析", "authors": "Andrzej Białek", "abstract_en": "**Introduction:** Rectal neuroendocrine tumors (rNETs) are subepithelial lesions with potential of malignancy. Despite the guidelines recommending that rNETs measuring 10-20 mm should be removed either endoscopic submucosal dissection (ESD) or transanal endoscopic microsurgery (TEM), the management with these entities is still a clinical dilemma. We performed a meta-analysis to compare ESD and TEM regarding method effectiveness and safety in the treatment of rNETs.\n\n**Methods:** PubMed/MEDLINE/Embase/EBSCO/CINAHL was searched up for observational studies analyzing the efficacy and safety of both methods in the treatment of rNETs.\n\n**Results:** A total of 59 observational studies with a total of n = 2,804 participants were included. In a subgroup analysis, we demonstrated that the R0 resection rate was significantly ( P = 0.002) lower for ESD (rate: 0.854) than for TEM (0.924). The recurrence rate differed significantly ( P = 0.008); the lowest (event rate [ER] = 0.015) was found for ESD and the highest for TEM (ER = 0.035). The overall bleeding rate was 0.046 and perforation rate was 0.023 and no significant differences ( P = 0.274 for bleeding, P = 0.808 for perforation) were found by intervention type. The rate of other complications (wound dehiscence, soilage, incontinence, rectovaginal fistula, pelvic pain, retroperitoneal emphysema, coagulation syndrome) was significantly ( P = 0.000) higher for TEM (ER = 0.107) than ESD (ER = 0.013). We also included 4 comparative studies with 490 patients. Using random-effects analysis, we found that the risk ratio for R0 resection was approximately 10% lower for ESD. Our analysis showed significantly greater size ( P = 0.01) and follow-up ( P = 0.03) in the group treated with TEM.\n\n**Discussion:** The efficacy of TEM is higher than ESD with a higher risk of complications in this method. Lesions with a greater size are treated with TEM, and recurrence rate is greater for this procedure. Long follow-up is needed after the treatment of rNETs to detect the recurrence early.", "abstract_zh": "**介绍：** 直肠神经内分泌肿瘤（rNET）是具有恶性潜力的上皮下病变。尽管指南建议应通过内镜粘膜下剥离术 (ESD) 或经肛门内镜显微手术 (TEM) 切除 10-20 毫米的 rNET，但这些实体的治疗仍然是一个临床困境。我们进行了一项荟萃分析，以比较 ESD 和 TEM 治疗 rNET 的方法有效性和安全性。\n\n**方法：** 检索了 PubMed/MEDLINE/Embase/EBSCO/CINAHL 的观察性研究，分析这两种方法治疗 rNET 的有效性和安全性。\n\n**结果：** 共纳入 59 项观察性研究，共有 2,804 名参与者。在亚组分析中，我们证明 ESD 的 R0 切除率（比率：0.854）显着低于 TEM（0.924）（P = 0.002）。复发率差异显着（P=0.008）； ESD 最低（事件率 [ER] = 0.015），TEM 最高（ER = 0.035）。总出血率为0.046，穿孔率为0.023，不同干预类型差异无统计学意义（出血P=0.274，穿孔P=0.808）。 TEM (ER = 0.107) 的其他并发症（伤口裂开、污渍、失禁、直肠阴道瘘、骨盆疼痛、腹膜后气肿、凝血综合征）发生率显着高于 ESD (ER = 0.013) (P = 0.000)。我们还纳入了 4 项比较研究，涉及 490 名患者。通过随机效应分析，我们发现 R0 切除的风险比 ESD 大约低 10%。我们的分析显示，TEM 治疗组的体型显着增大 (P = 0.01)，随访时间也明显增大 (P = 0.03)。\n\n**讨论：** TEM 的疗效高于 ESD，但该方法出现并发症的风险较高。病变尺寸越大，则采用 TEM 治疗，复发率越高。 rNET 治疗后需要长期随访，以便及早发现复发情况。", "keywords_zh": "ESD、TEM、rNET、直肠神经内分泌肿瘤、治疗", "keywords_en": "ESD, TEM, rNETs, rectal neuroendocrine tumors, treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40590873/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 01 Jul 2025"}, {"id": "40585484", "title_en": "Treatment of perianal abscess and anal fistula in infants: a systematic review", "title_zh": "婴儿肛周脓肿和肛瘘的治疗：系统评价", "authors": "Li Xu", "abstract_en": "**Introduction:** The optimal treatment approach for perianal abscess (PA) and fistula-in-ano (FIA) in infants remains a subject of debate.\n\n**Material And Methods:** A thorough literature search was conducted across multiple databases, including Embase, PubMed, Web of Science, Cochrane Library, ClinicalTrials.gov, and Google Scholar.\n\n**Results:** A total of eighteen retrospective studies, encompassing 1,770 patients, were analyzed. Of the 702 cases (38.7%) that underwent conservative treatment, 528 cases (75.2%) achieved a cure, while 174 cases (24.8%) were unsuccessful, with 93 experiencing PA recurrence and 81 developing FIA. In contrast, among the 1,068 cases (61.3%) that received surgical interventions, 784 cases (73.4%) were cured, whereas 284 cases (26.6%) were not, with 151 experiencing PA recurrence and 133 developing FIA.\n\n**Conclusion:** The available studies indicate minimal differences in the cure and recurrence rates of PA and FIA between the conservative and surgical treatment groups.\n\n**Systematic Review Registration:** https://www.crd.york.ac.uk/PROSPERO/, PROSPERO (CRD42023472249).", "abstract_zh": "**介绍：** 婴儿肛周脓肿（PA）和肛瘘（FIA）的最佳治疗方法仍然是一个争论的话题。\n\n**Material and methods：** 对多个数据库进行了彻底的文献检索，包括 Embase、PubMed、Web of Science、Cochrane Library、ClinicalTrials.gov 和 Google Scholar。\n\n**结果：** 总共分析了 18 项回顾性研究，涵盖 1,770 名患者。接受保守治疗的702例（38.7%）中，治愈528例（75.2%），未治愈174例（24.8%），其中93例出现PA复发，81例出现FIA。相比之下，在接受手术干预的1,068例（61.3%）中，784例（73.4%）治愈，284例（26.6%）未治愈，其中151例出现PA复发，133例出现FIA。\n\n**结论：** 现有研究表明，保守治疗组和手术治疗组之间 PA 和 FIA 的治愈率和复发率差异很小。\n\n**Systematic review registration：** https://www.crd.york.ac.uk/PROSPERO/，PROSPERO (CRD42023472249)。", "keywords_zh": "保守治疗, 肛瘘, 婴儿, 肛周脓肿, 手术治疗", "keywords_en": "conservative treatment, fistula-in-ano, infants, perianal abscess, surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40585484/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 30 Jun 2025"}, {"id": "40518593", "title_en": "Outcomes of Fecal Diversion in Perianal Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "肛周克罗恩病粪便改道的结果：系统评价和荟萃分析", "authors": "Nik Sheng Ding", "abstract_en": "**Objectives:** Perianal fistulizing Crohn's disease (pfCD) is a severe type of inflammatory bowel disease resulting in significant patient morbidity. Despite advancements in treatments, pfCD remains challenging to manage with low healing rates. Fecal diversion (FD) has previously demonstrated clinical improvement for patients with refractory disease. Our meta-analysis aimed to explore the clinical response to FD, rates of successful restoration of bowel continuity after FD, rates of re-diversion, and factors affecting the success of FD in pfCD.\n\n**Methods:** A systematic review and meta-analysis was carried out of adult patients who had undergone FD for pfCD, with detailed patient outcome data. Studies were identified through a literature search of six bibliographic databases and one trial register, all run on February 28, 2025, including MEDLINE ALL, EMBASE, Emcare, APA PsycInfo, CINAHL, Cochrane Library, and Clinicaltrials.gov.\n\n**Results:** Seventeen studies encompassing 714 adult pfCD patients were included. FD resulted in a 65% clinical improvement rate, yet considerable heterogeneity existed in study methodologies and outcome definitions. While 29% of patients achieved bowel restoration within a median follow-up of 58.2 months, challenges in sustaining the effects were evident, with 10% requiring repeat diversion and a 37% overall proctectomy/proctocolectomy rate. Factors associated with diversion success included the absence of rectal involvement and quiescent luminal disease, with biologic use showing no impact on outcomes.\n\n**Conclusions:** FD offers symptom control in pfCD, although restoration rates remain low. These findings emphasize the need for individualized patient counseling. Future research should strive for uniform measures and refined approaches to enhance pfCD management.", "abstract_zh": "**Objectives：** 肛周瘘管克罗恩病 (pfCD) 是一种严重的炎症性肠病，可导致患者严重发病。尽管治疗方法取得了进步，但 pfCD 的治疗仍然具有挑战性，且治愈率较低。粪便改道（FD）先前已证明对难治性疾病患者有临床改善。我们的荟萃分析旨在探讨 pfCD 中 FD 的临床反应、FD 后肠道连续性成功恢复率、再改道率以及影响 FD 成功的因素。\n\n**方法：** 对因 pfCD 接受 FD 的成年患者进行了系统回顾和荟萃分析，并提供了详细的患者结果数据。研究是通过对 2025 年 2 月 28 日运行的 6 个书目数据库和 1 个试验注册库进行文献检索而确定的，其中包括 MEDLINE ALL、EMBASE、Emcare、APA PsycInfo、CINAHL、Cochrane Library 和 ClinicalTrials.gov。\n\n**结果：** 纳入了 17 项研究，涉及 714 名成年 pfCD 患者。 FD 的临床改善率为 65%，但研究方法和结果定义存在相当大的异质性。虽然 29% 的患者在中位随访时间 58.2 个月内实现了肠道恢复，但维持效果的挑战是显而易见的，其中 10% 需要重复改道，总体直肠切除术/直肠结肠切除术率为 37%。与改道成功相关的因素包括没有直肠受累和静止性管腔疾病，生物制剂的使用对结果没有影响。\n\n**结论：** FD 可以控制 pfCD 的症状，但恢复率仍然很低。这些发现强调了个性化患者咨询的必要性。未来的研究应努力寻求统一的措施和精细的方法来加强 pfCD 管理。", "keywords_zh": "粪便改道、炎症性肠病、肛周瘘管克罗恩病", "keywords_en": "fecal diversion, inflammatory bowel diseases, perianal fistulizing Crohn's disease", "link": "https://pubmed.ncbi.nlm.nih.gov/40518593/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 16 Jun 2025"}, {"id": "40474832", "title_en": "Comment on \"Efficacy and safety of 13 surgical techniques for the treatment of complex anal fistula, non-Crohn CAF: a systematic review and network meta-analysis\"", "title_zh": "评论《13种手术技术治疗复杂性肛瘘、非克罗恩CAF的有效性和安全性：系统评价和网络荟萃分析》", "authors": "Libo Zhou", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40474832/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 06 Jun 2025"}, {"id": "40442569", "title_en": "Systematic review and network meta-analysis of cryptoglandular complex anal fistula treatment: evaluation of surgical strategies", "title_zh": "隐腺复杂性肛瘘治疗的系统回顾和网络荟萃分析：手术策略评估", "authors": "Natalia Uribe Quintana", "abstract_en": "**Background:** Several surgical approaches are available for managing complex cryptoglandular perianal fistulas. However, a gold standard surgical technique has not yet been established. This network meta-analysis aims to assess and compare postoperative failure and anal incontinence pooled rates for different available surgical techniques for complex cryptoglandular anal fistulas.\n\n**Methods:** Systematic searches were carried out on Pubmed, Ovid, the Cochrane Library database and ClinicalTrials.gov up to June 2023. All randomized comparative trials of nine surgical techniques for cryptoglandular complex perianal fistulas in adult patients were included. A systematic review and network meta-analysis was conducted using the PRISMA-NMA methodology. The endorectal advancement flap was used as the control technique, and the odds ratios (ORs) were calculated through pairwise and network meta-analysis with random effects.\n\n**Results:** 16 randomized trials were included in this study. Network meta-analysis was conducted for each outcome. Techniques, such as cutting seton, fistulotomy with sphincter reconstruction, LIFT, and VAAFT, obtained similar results in terms of technique failure to the transanal advancement flap with no statistically significant differences. PLUG (OR = 3.6 [95%CI 1.1-11.5]), fibrin glue (OR = 7.5 [95%CI 2.2-25], and platelet-rich plasma (PRP) (OR = 11.5[95%CI 1.3-99]) demonstrated a statistically significant increase in the pooled failure rate. For anal incontinence, only the cutting seton technique exhibited a higher risk of postoperative incontinence (OR = 8.6 [95%CI 1-72.5]).\n\n**Conclusion:** Our research highlights effective therapeutic approaches for complex anal fistulas, stressing the need to customize treatment based on location, anatomy, patient characteristics, and preferences. However, it advises against using plugs, fibrin glue, PRP therapy due to lower healing rates, and the seton technique because of its potential impact on anal continence. PROSPERO number CRD42022304345.", "abstract_zh": "**背景：** 有几种手术方法可用于治疗复杂的隐窝腺周瘘。然而，金标准手术技术尚未建立。该网络荟萃分析旨在评估和比较复杂隐腺肛瘘的不同可用手术技术的术后失败和肛门失禁汇总率。\n\n**方法：** 截至 2023 年 6 月，我们在 Pubmed、Ovid、Cochrane 图书馆数据库和 ClinicalTrials.gov 上进行了系统检索。纳入了针对成人患者隐腺复杂性肛瘘的九种手术技术的所有随机比较试验。使用 PRISMA-NMA 方法进行系统评价和网络荟萃分析。使用直肠内推进皮瓣作为对照技术，通过具有随机效应的成对和网络荟萃分析计算优势比（OR）。\n\n**结果：** 本研究纳入了 16 项随机试验。对每个结果进行网络荟萃分析。诸如切割挂线、瘘管切开术伴括约肌重建、LIFT 和 VAAFT 等技术在经肛门推进皮瓣的技术失败方面获得了相似的结果，但没有统计学上的显着差异。 PLUG (OR = 3.6 [95%CI 1.1-11.5])、纤维蛋白胶 (OR = 7.5 [95%CI 2.2-25]) 和富血小板血浆 (PRP) (OR = 11.5[95%CI 1.3-99]) 表现出合并失败率具有统计显着性增加。术后尿失禁，仅切割挂线技术表现出较高的术后尿失禁风险（OR = 8.6 [95%CI 1-72.5]）。\n\n**结论：** 我们的研究强调了复杂肛瘘的有效治疗方法，强调需要根据位置、解剖结构、患者特征和偏好定制治疗。然而，它建议不要使用塞子、纤维蛋白胶、PRP 治疗（因为治愈率较低）和挂线技术（因为它对肛门失禁有潜在影响）。普洛斯彼罗编号 CRD42022304345。", "keywords_zh": "肛门失禁，复杂性肛瘘，网络荟萃分析，持续性，复发，手术治疗", "keywords_en": "Anal incontinence, Complex anal fistula, Network meta-analysis, Persistence, Recurrence, Surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40442569/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 29 May 2025"}, {"id": "40392371", "title_en": "Failure rates and complications of four sphincter-sparing techniques for the treatment of fistula-in-ano: a systematic review and network meta-analysis", "title_zh": "四种保留括约肌技术治疗肛瘘的失败率和并发症：系统评价和网络荟萃分析", "authors": "G Pellino", "abstract_en": "**Background:** Several techniques are available to reduce the risk of sphincter injury when treating anal fistula, such as ligation of the intersphincteric fistula tract (LIFT), video-assisted anal fistula treatment (VAAFT), fistula laser closure (FiLaC) and endoanal flap (EAF). The aim of this meta-analysis is to provide data on the safety, complications and failure of these techniques.\n\n**Methods:** Studies published after 2017, with patients undergoing at least one among LIFT, VAAFT, FiLaC and EAF for perianal fistula and providing data regarding failure, were retrieved from PubMed and EMBASE. Primary outcome was failure; other outcomes included continence disturbance and complications.\n\n**Results:** Forty-nine articles with 3520 patients were included. The failure rates were 28.6% (range 3.8-75) for LIFT, 22.3% (6.2-65.2) for VAAFT, 43.9% (11.1-80) for FiLaC and 25.9% (4.7-100) for EAF, with a mean follow-up of 35.4 (6-80.4), 32.4 (6-48), 31.6(6.3-60) and 42.4 (12-155) months. The available network meta-analysis on failure showed RD of -0.08 (95% CI - 0.58 to 0.42) comparing LIFT vs VAAFT and 0.30 (95% CI 0.03 to 0.58) comparing LIFT vs EAF. No patients undergoing VAAFT or FiLaC reported worsening continence, while for LIFT and EAF, the continence disturbance rate was 1.5% and 7.3%, respectively. No major complications were observed. The most common minor complications were pain (1.4%), bleeding (1.1%) and wound infection (1.2%). Overall, minor complication rates were 4.3% for LIFT, 7.2% for VAAFT, 10.2% for FiLaC and 6.2% for EAF. Crohn's disease was associated with a higher failure rate (39.5% vs 31.4%).\n\n**Conclusions:** FiLaC, VAAFT, LIFT and EAF may represent a valid option in the treatment of anal fistula. VAAFT showed the lowest rate of failure but with no differences from network metanalysis. Wider homogeneous studies with long-term follow-up are necessary to obtain more robust data.\n\n**Prospero Number:** CRD42022375600.", "abstract_zh": "**背景：** 有几种技术可以降低治疗肛瘘时括约肌损伤的风险，例如括约肌间瘘道结扎（LIFT）、视频辅助肛瘘治疗（VAAFT）、瘘管激光闭合（FiLaC）和肛内皮瓣（EAF）。这项荟萃分析的目的是提供有关这些技术的安全性、并发症和失败的数据。\n\n**方法：** 从 PubMed 和 EMBASE 检索 2017 年之后发表的研究，其中患者接受了 LIFT、VAAFT、FiLaC 和 EAF 中至少一种治疗肛周瘘并提供了有关失败的数据。主要结果是失败；其他结果包括失禁障碍和并发症。\n\n**结果：** 纳入 49 篇文章，涉及 3520 名患者。 LIFT 的失败率为 28.6%（范围 3.8-75），VAAFT 为 22.3%（6.2-65.2），FiLaC 为 43.9%（11.1-80），EAF 为 25.9%（4.7-100），平均随访次数为 35.4（6-80.4），32.4 (6-48)、31.6(6.3-60) 和 42.4 (12-155) 个月。可用的失败网络荟萃分析显示，比较 LIFT 与 VAAFT 的 RD 为 -0.08（95% CI - 0.58 至 0.42），比较 LIFT 与 EAF 的 RD 为 0.30（95% CI 0.03 至 0.58）。接受 VAAFT 或 FiLaC 的患者均未报告失禁情况恶化，而接受 LIFT 和 EAF 的患者失禁率分别为 1.5% 和 7.3%。没有观察到重大并发症。最常见的轻微并发症是疼痛（1.4%）、出血（1.1%）和伤口感染（1.2%）。总体而言，LIFT 的轻微并发症发生率为 4.3%，VAAFT 为 7.2%，FiLaC 为 10.2%，EAF 为 6.2%。克罗恩病与较高的失败率相关（39.5% vs 31.4%）。\n\n**结论：** FiLaC、VAAFT、LIFT 和 EAF 可能是治疗肛瘘的有效选择。 VAAFT 显示失败率最低，但与网络荟萃分析没有差异。为了获得更可靠的数据，需要进行更广泛的同质研究和长期随访。\n\n**Prospero number：** CRD42022375600。", "keywords_zh": "肛瘘、并发症、肛内皮瓣、FILAC、LIFT、复发、VAAFT", "keywords_en": "Anal fistula, Complications, Endoanal flap, FILAC, LIFT, Recurrence, VAAFT", "link": "https://pubmed.ncbi.nlm.nih.gov/40392371/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 20 May 2025"}, {"id": "40353830", "title_en": "Early Resuturing versus expectant Management for Perineal Wound Dehiscence: A systematic review", "title_zh": "会阴伤口裂开的早期缝合与期待治疗：系统评价", "authors": "Debjyoti Karmakar", "abstract_en": "**Background And Objective:** Perineal wound dehiscence is a common complication of vaginal birth that impacts maternal well-being and quality of life. This systematic review compares early resuturing with expectant management in the treatment of perineal wound dehiscence.\n\n**Methods:** We searched Ovid MEDLINE, CINAHL, and PubMed databases, and hand-searched recent reviews and relevant studies. Human prospective and retrospective studies, randomized controlled trials (RCTs), and case series evaluating early resuturing within the postnatal period were included. Two reviewers independently assessed the studies for outcomes and risk of bias. The primary outcome was healing time; secondary outcomes included dyspareunia, long-term symptoms, functional outcomes, infection rates, and anal sphincter injury.\n\n**Results:** Thirteen studies (1987-2022) were included: three RCTs, four prospective cohort studies or case series, and six retrospective studies-heterogeneity in study designs and outcomes limited data synthesis. Early resuturing was associated with reduced healing time, particularly for wounds not involving the anal sphincter, but increased the risk of complications such as fistula formation. Many studies emphasized meticulous preoperative wound care.\n\n**Conclusions:** Limited evidence suggests that early resuturing may reduce healing time without increasing wound infection risk. However, the increased risk of complications necessitates cautious application and highlights the importance of preoperative wound care. Further robust research is needed, although challenging to conduct. Alternative analytical methods, such as data mining and decision tree algorithms, should be explored. Based on current evidence, clinicians should carefully individualize recommendations on the benefits and risks of early resuturing.", "abstract_zh": "**Background and objective：** 会阴伤口裂开是阴道分娩的常见并发症，影响产妇的健康和生活质量。本系统综述比较了会阴伤口裂开治疗中的早期缝合与期待治疗。\n\n**方法：** 我们检索了 Ovid MEDLINE、CINAHL 和 PubMed 数据库，并手动检索了最近的评论和相关研究。包括人类前瞻性和回顾性研究、随机对照试验（RCT）以及评估产后早期再缝合的病例系列。两名评审员独立评估了研究的结果和偏倚风险。主要结果是愈合时间；次要结局包括性交困难、长期症状、功能结局、感染率和肛门括约肌损伤。\n\n**结果：** 纳入了十三项研究（1987-2022）：三项随机对照试验、四项前瞻性队列研究或病例系列以及六项回顾性研究——研究设计和结果的异质性限制了数据合成。早期重新缝合会缩短愈合时间，特别是对于不涉及肛门括约肌的伤口，但会增加瘘管形成等并发症的风险。许多研究强调术前细致的伤口护理。\n\n**结论：** 有限的证据表明，早期重新缝合可能会缩短愈合时间，而不会增加伤口感染的风险。然而，并发症风险的增加需要谨慎使用，并凸显了术前伤口护理的重要性。尽管进行起来具有挑战性，但仍需要进一步强有力的研究。应探索替代分析方法，例如数据挖掘和决策树算法。根据目前的证据，临床医生应仔细针对早期再缝合的益处和风险提出个性化建议。", "keywords_zh": "早期缝合、会阴裂开、会阴伤口破裂、产后", "keywords_en": "early resuturing, perineal dehiscence, perineal wound breakdown, postpartum", "link": "https://pubmed.ncbi.nlm.nih.gov/40353830/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 12 May 2025"}, {"id": "40325545", "title_en": "The Current Applications in Surgery of Three-Dimensional Modelling Technology for Complex Fistula-In-Ano: A Systematic Review", "title_zh": "复杂肛瘘三维建模技术在外科手术中的应用现状：系统评价", "authors": "Roland Shannon", "abstract_en": "**Background:** Complex fistula-in-ano (FIA) poses significant clinical challenges due to its intricate anatomy and high recurrence rates. Traditional imaging techniques like MRI are limited by their two-dimensional (2D) nature, prompting the use of three-dimensional (3D) modeling for enhanced visualization.\n\n**Methods:** This systematic review, adhering to PRISMA guidelines, analysed 17 studies using 3D models for surgical planning, education, and patient engagement in managing complex FIA. A risk of bias assessment was conducted using the Cochrane Risk of Bias Tool for randomized studies and ROBINS-I for non-randomized studies, revealing that all included studies had at least a moderate risk of bias.\n\n**Results:** Three-dimensional models improved anatomical visualization compared to 2D MRI, potentially enhancing surgical planning accuracy and reducing recurrence rates. They also offered educational benefits for surgeons and patients. However, the evidence is limited by methodological weaknesses such as small sample sizes and subjective outcome measures.\n\n**Conclusion:** Three-dimensional modelling technology shows promise in improving surgical precision and patient outcomes for complex FIA, but further high-quality research is needed to validate its clinical utility due to methodological weaknesses in current studies.", "abstract_zh": "**背景：** 复杂性肛瘘（FIA）由于其复杂的解剖结构和高复发率而带来了重大的临床挑战。 MRI 等传统成像技术受到二维 (2D) 性质的限制，促使使用三维 (3D) 建模来增强可视化。\n\n**方法：** 这项系统综述遵循 PRISMA 指南，分析了 17 项使用 3D 模型进行手术规划、教育和患者参与管理复杂 FIA 的研究。使用 Cochrane 偏倚风险工具进行随机研究，使用 ROBINS-I 进行非随机研究进行偏倚风险评估，结果显示所有纳入的研究至少具有中等偏倚风险。\n\n**结果：** 与 2D MRI 相比，三维模型改善了解剖可视化，有可能提高手术计划的准确性并降低复发率。他们还为外科医生和患者提供教育福利。然而，证据受到方法论缺陷的限制，例如样本量小和主观结果测量。\n\n**结论：** 三维建模技术有望提高复杂 FIA 的手术精度和患者预后，但由于当前研究方法学上的缺陷，需要进一步高质量的研究来验证其临床实用性。", "keywords_zh": "肛瘘、患者教育、手术教育、手术计划、三维建模", "keywords_en": "fistula‐in‐ano, patient education, surgical education, surgical planning, three‐dimensional modelling", "link": "https://pubmed.ncbi.nlm.nih.gov/40325545/?utm_sourc
