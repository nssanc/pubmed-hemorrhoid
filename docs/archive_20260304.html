            function app() {
                return {
                    feeds: {"肛周脓肿": [{"id": "41693361", "title_en": "Systematic Review of Published Guidelines: Recommendations for Exams Under Anaesthesia, Seton Insertion and Timing of Seton Removal for Perianal and Rectovaginal Fistulising Crohn's Disease", "title_zh": "对已发布指南的系统审查：针对肛周和直肠阴道瘘性克罗恩病的麻醉检查、挂线插入和拔线时机的建议", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background And Aims:** Perianal fistulising Crohn's disease (pfCD) is a heterogeneous phenotype of Crohn's disease with marked variability in anatomical complexity, symptomatology, and disease trajectory. This often creates uncertainty in the optimal approach to management, particularly the surgical aspects of when to perform examination under anaesthesia (EUA) and when to insert or remove setons.\n\n**Methods:** We conducted a systematic review following PRISMA guidelines. Multiple databases were searched from inception through December 2025. Eligible publications included clinical guidelines on pfCD and/or rectovaginal fistulas that reported indications for EUA, seton insertion, and/or seton removal. We stratified recommendations by fistula complexity, the presence of abscesses, and clinical symptoms. Risk of bias was assessed using the AGREE II Instrument.\n\n**Results:** Twenty-four guidelines met inclusion criteria. EUA (and often seton placement) was universally recommended for perianal abscesses and frequently for symptomatic complex pfCD. For asymptomatic complex or symptomatic simple fistulas, recommendations were variable and often conditional on the presence of proctitis or plans for biologic therapy. In contrast, EUA and setons were not broadly endorsed for asymptomatic simple fistulas. Recommendations for seton removal varied widely, ranging from predefined intervals after anti-TNF therapy initiation to individualised criteria based on clinical or radiologic response. Most guidelines did not consider symptom type/severity, prior surgery, suitability for surgical closure, and asymptomatic abscesses detected by imaging.\n\n**Conclusion:** Substantial heterogeneity and limitations exist across guidelines on the surgical management of pfCD. This underscores the need for international consensus informed by multidisciplinary expertise to standardise care in this complex population.", "abstract_zh": "**Background and aims：** 肛周瘘管性克罗恩病 (pfCD) 是克罗恩病的一种异质表型，在解剖复杂性、症状学和疾病轨迹方面具有显着的变异性。这通常会给最佳管理方法带来不确定性，特别是何时进行麻醉下检查（EUA）以及何时插入或取出挂线的手术方面。\n\n**方法：** 我们按照 PRISMA 指南进行了系统审查。从开始到 2025 年 12 月检索了多个数据库。符合条件的出版物包括关于 pfCD 和/或直肠阴道瘘的临床指南，其中报告了 EUA、挂线插入和/或挂线移除的适应症。我们根据瘘管复杂性、脓肿的存在和临床症状对建议进行了分层。使用 AGREE II 仪器评估偏倚风险。\n\n**结果：** 有二十四条指南符合纳入标准。 EUA（通常是挂线放置）被普遍推荐用于肛周脓肿，并且经常用于症状复杂的 pfCD。对于无症状的复杂性或有症状的简单性瘘管，建议各不相同，并且通常以是否存在直肠炎或生物治疗计划为条件。相比之下，对于无症状的单纯性瘘管，EUA 和挂线并未得到广泛认可。挂线拔除的建议差异很大，从抗 TNF 治疗开始后的预定间隔到基于临床或放射学反应的个体化标准。大多数指南没有考虑症状类型/严重程度、既往手术、手术闭合的适合性以及通过影像学检测到的无症状脓肿。\n\n**结论：** pfCD 手术治疗指南之间存在很大的异质性和局限性。这强调需要在多学科专业知识的指导下达成国际共识，以标准化这一复杂人群的护理。", "keywords_zh": "克罗恩病、脓肿、结直肠手术、炎症性肠病、直肠瘘", "keywords_en": "Crohn's disease, abscess, colorectal surgery, inflammatory bowel diseases, rectal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/41693361/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 16 Feb 2026"}, {"id": "41359092", "title_en": "Systematic review: The management of unhealed wounds and persistent perineal sinuses following proctectomy in inflammatory bowel disease", "title_zh": "系统评价：炎症性肠病直肠切除术后未愈合伤口和持续性会阴窦的处理", "authors": "A Hart", "abstract_en": "**Introduction:** Unhealed wounds and persistent perineal sinuses (PPS) may occur in as many as one third of patients after proctectomy for Crohn's disease. The management of these conditions remains a significant challenge, particularly in the context of inflammatory bowel disease (IBD), with existing therapies plagued by high failure rates. This systematic review of the literature assessed the efficacy of medical and surgical therapy for PPS closure in IBD. Secondary aims included review of classification systems used for PPS.\n\n**Methods:** A literature search was conducted using Medline, Embase and Cochrane databases on 17 December 2024. The review was registered on PROSPERO (CRD42024622582). Inclusion criteria were adult patients with IBD and PPS or unhealed wounds following proctectomy. We excluded abstract-only publications, case reports, cancer and paediatric cohorts. Two reviewers independently screened abstracts and full texts and extracted data. The primary outcome was clinical healing rate. Secondary outcomes included classification systems used to describe PPS. Risk of bias was assessed.\n\n**Results:** Of 496 records identified, following removal of duplicates, 489 abstracts were screened, and 60 full text articles assessed for eligibility. Of 25 articles included in the final analysis, 23 were case series or retrospective cohort studies, and all were at high risk of bias. No randomised controlled trials were identified. Five articles (including two of the case series) described classification systems for PPS. Interventions included hyperbaric oxygen therapy, Karydakis flap, cleft closure, omentoplasty, skin grafting, gracilis and rectus abdominis flap, platelet-derived growth factor, curettage, lay open and excision of sinuses. Reported healing rates ranged from 30% to 100%. Heterogeneity in the reporting of outcomes, as well as the interventions performed precluded meta-analysis.\n\n**Conclusion:** The published evidence for treatment of PPS in IBD consists of low-quality evidence case series with high risk of bias. There is a need for standardised outcome reporting and high-quality, prospective studies to establish effective treatment algorithms.", "abstract_zh": "**介绍：** 克罗恩病直肠切除术后，多达三分之一的患者可能会出现未愈合的伤口和持续性会阴窦 (PPS)。这些疾病的治疗仍然是一个重大挑战，特别是在炎症性肠病（IBD）的背景下，现有的治疗方法受到高失败率的困扰。这项对文献的系统回顾评估了 IBD 中 PPS 闭合的药物和手术治疗的疗效。次要目标包括审查用于 PPS 的分类系统。\n\n**方法：** 于2024年12月17日使用Medline、Embase和Cochrane数据库进行了文献检索。该综述已在PROSPERO上注册（CRD42024622582）。纳入标准为患有 IBD 和 PPS 的成年患者或直肠切除术后伤口未愈合的患者。我们排除了仅摘要的出版物、病例报告、癌症和儿科队列。两名审稿人独立筛选摘要和全文并提取数据。主要结局是临床治愈率。次要结果包括用于描述 PPS 的分类系统。评估了偏倚风险。\n\n**结果：** 在删除重复项后，在确定的 496 条记录中，筛选了 489 条摘要，并评估了 60 篇全文文章的资格。最终分析纳入的 25 篇文章中，23 篇为病例系列或回顾性队列研究，且均存在高偏倚风险。没有发现随机对照试验。五篇文章（包括案例系列中的两篇）描述了 PPS 的分类系统。干预措施包括高压氧治疗、Karydakis 皮瓣、裂隙闭合、网膜成形术、植皮、股薄肌和腹直肌皮瓣、血小板衍生生长因子、刮宫术、切开和切除鼻窦。据报道，治愈率从 30% 到 100% 不等。结果报告以及所进行的干预措施的异质性排除了荟萃分析。\n\n**结论：** 已发表的 IBD PPS 治疗证据由具有高偏倚风险的低质量证据病例系列组成。需要标准化的结果报告和高质量的前瞻性研究来建立有效的治疗算法。", "keywords_zh": "肛周瘘管克罗恩病、肛周脓肿", "keywords_en": "Fistulizing perianal Crohn’s disease, Perianal abscess", "link": "https://pubmed.ncbi.nlm.nih.gov/41359092/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 08 Dec 2025"}, {"id": "41219674", "title_en": "Fistula Outcomes After Seton Removal in Patients with Perianal Fistulizing Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "肛周瘘管性克罗恩病患者挂线拔除后的瘘管结果：系统评价和荟萃分析", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background:** While setons are commonly used in the multidisciplinary care of patients with perianal fistulizing Crohn's disease (PFCD), fistula outcomes after their removal are poorly understood. We performed a systematic review with meta-analysis to evaluate fistula outcomes after seton removal in patients with PFCD.\n\n**Methods:** MEDLINE, EMBASE, Web of Science, and Cochrane databases were systematically searched until December 2023. We included studies reporting fistula outcomes after seton removal in PFCD. We used a hierarchy to stratify patients into one of three treatment categories: medical therapy alone, surgical closure, or cell/plasma-based therapy. Fistula outcomes were reported as weighted proportions with 95% confidence intervals (CI).\n\n**Results:** Eighty-two studies (n = 2441 patients) were analyzed. Mean/median seton duration varied widely (2 to 70 weeks). Pooled estimates (95% CI) of fistula outcomes after seton removal for patients treated in the medical therapy alone, surgical closure, or cell/plasma-based therapy categories were, respectively, 64% (54-75), 65% (52-78), and 71% (65-77) for fistula remission; 30% (22-38), 29% (16-42), and 20% (15-25) for recurrence; 15% (8-22), 11% (4-20), and 14% (8-21) for abscess formation; and 26% (18-35), 23% (17-29), and 13% (2-26) for surgical re-intervention. Fistula outcome estimates remained stable in multiple sensitivity analyses. Limited studies directly compared fistula outcomes based on seton duration, yielding inconsistent results.\n\n**Conclusions:** This systematic review provides comprehensive estimates of fistula outcomes after seton removal and demonstrates substantial variability in seton duration. Future research is required to determine the optimal duration of setons.", "abstract_zh": "**背景：** 虽然挂线常用于肛周瘘管克罗恩病 (PFCD) 患者的多学科护理，但人们对挂线移除后的瘘管结局知之甚少。我们通过荟萃分析进行了系统回顾，以评估 PFCD 患者挂线拔除后的瘘管结局。\n\n**方法：** 截至 2023 年 12 月，我们对 MEDLINE、EMBASE、Web of Science 和 Cochrane 数据库进行了系统检索。我们纳入了报告 PFCD 挂线拔除后瘘管结果的研究。我们使用层次结构将患者分为三种治疗类别之一：单纯药物治疗、手术闭合或基于细胞/血浆的治疗。瘘管结果报告为具有 95% 置信区间 (CI) 的加权比例。\n\n**结果：** 分析了 82 项研究（n=2441 名患者）。平均/中位挂线持续时间差异很大（2 至 70 周）。对于仅接受药物治疗、手术闭合或基于细胞/血浆的治疗类别的患者，挂线拔除后瘘管结局的汇总估计 (95% CI) 瘘管缓解率分别为 64% (54-75)、65% (52-78) 和 71% (65-77)； 30% (22-38)、29% (16-42) 和 20% (15-25) 复发； 15% (8-22)、11% (4-20) 和 14% (8-21) 脓肿形成； 26% (18-35)、23% (17-29) 和 13% (2-26) 需要再次手术干预。在多项敏感性分析中，瘘管结果估计值保持稳定。有限的研究根据挂线持续时间直接比较瘘管结局，产生不一致的结果。\n\n**结论：** 该系统评价提供了挂线移除后瘘管结果的全面估计，并证明了挂线持续时间的显着差异。需要进一步的研究来确定挂线的最佳持续时间。", "keywords_zh": "肛瘘、生物疗法、克罗恩病、引流、间充质干细胞", "keywords_en": "Anal fistula, Biologic therapy, Crohn’s disease, Drainage, Mesenchymal stem cells", "link": "https://pubmed.ncbi.nlm.nih.gov/41219674/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Tue, 11 Nov 2025"}, {"id": "41159400", "title_en": "Management of Perianal Sepsis in Neutropenic Patients With Haematological Malignancies-A Systematic Review", "title_zh": "血液系统恶性肿瘤中性粒细胞减少症患者肛周脓毒症的治疗——系统评价", "authors": "Zi Qin Ng", "abstract_en": "**Introduction:** Despite neutropenia being considered a significant risk factor for acute perianal sepsis, there is a lack of consensus on treatment guidelines for perianal abscess in the immunocompromised patient, specifically in patients with neutropenia secondary to a haematological malignancy. The aim of the article is to review the available literature on. Whether surgical intervention produces better outcomes than a non-surgical approach for perianal sepsis in the immunocompromised patient with a haematological malignancy.\n\n**Methods:** Relevant papers were identified through electronic databases including PubMed, Medline and Scopus. Data were extracted independently by two authors on a Microsoft Excel spreadsheet up to July 2024.\n\n**Results:** A total of eight studies were included in the final analysis (124 cases). Perianal or rectal pain (n = 81, 65.3%) was the most reported complaint, followed by fever (n = 72, 58.1%), swelling and induration (n = 54, 43.5%) and erythema was reported in 26 (21.0%) cases. The most common organisms cultured from blood and anorectum were Escherichia coli and Pseudomonas aeruginosa. A total of 12 deaths (18.8%) were reported out of the 64 patients who underwent conservative management, while 10 (16.7%) deaths were reported out of 60 patients who underwent surgical management. Complete wound healing or good wound granulation was achieved for 35 (54.7%) patients in the conservative group and 35 (58.3%) patients in the surgical group.\n\n**Conclusion:** Our review suggests that conservative management is an acceptable treatment in carefully selected patients without an obvious perianal abscess on cross-sectional radiological imaging.", "abstract_zh": "**介绍：** 尽管中性粒细胞减少症被认为是急性肛周脓毒症的重要危险因素，但对于免疫功能低下患者的肛周脓肿的治疗指南缺乏共识，特别是继发于血液恶性肿瘤的中性粒细胞减少症患者。本文的目的是回顾现有的文献。对于患有血液系统恶性肿瘤的免疫功能低下患者的肛周脓毒症，手术干预是否比非手术方法能产生更好的结果。\n\n**方法：** 相关论文通过 PubMed、Medline 和 Scopus 等电子数据库找到。截至 2024 年 7 月，两位作者在 Microsoft Excel 电子表格上独立提取数据。\n\n**结果：** 最终分析共纳入8项研究（124例）。肛周或直肠疼痛 (n = 81, 65.3%) 是报告最多的主诉，其次是发热 (n = 72, 58.1%)、肿胀和硬结 (n = 54, 43.5%)，有 26 例 (21.0%) 报告有红斑。从血液和肛门直肠培养的最常见的微生物是大肠杆菌和铜绿假单胞菌。在接受保守治疗的 64 例患者中，共有 12 例死亡（18.8%），而在接受手术治疗的 60 例患者中，共有 10 例（16.7%）死亡。保守组有35名（54.7%）患者伤口完全愈合或伤口肉芽良好，手术组有35名（58.3%）患者。\n\n**结论：** 我们的综述表明，对于精心挑选的横断面放射影像学上没有明显肛周脓肿的患者，保守治疗是一种可接受的治疗方法。", "keywords_zh": "脓肿中性粒细胞减少症、肛门直肠、免疫功能低下、肛周", "keywords_en": "abscess neutropenia, anorectal, immunocompromised, perianal", "link": "https://pubmed.ncbi.nlm.nih.gov/41159400/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Wed, 29 Oct 2025"}, {"id": "40983150", "title_en": "Management of Perianal Abscesses in Infants: A Systematic Review From the APSA Outcomes and Evidence-Based Practice Committee", "title_zh": "婴儿肛周脓肿的治疗：APSA 结果和循证实践委员会的系统审查", "authors": "American Pediatric Surgical Association Outcomes and Evidence-Based Practice Committee", "abstract_en": "**Background:** Management of infant perianal disease, including perianal abscess and fistula-in- ano (FIA), remains controversial. There is lack of consensus regarding the risks and benefits of operative and non-operative approaches.\n\n**Methods:** The American Pediatric Surgical Association Outcomes and Evidence Based Practice Committee created a priori consensus-based questions regarding the various approaches to management of perianal abscess and FIA in infants. A comprehensive search strategy was created, and the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines were used to identify and review relevant articles and answer the established questions.\n\n**Results:** Over 2460 titles and abstracts were screened to identify 31 manuscripts describing the expected course of perianal disease when managed with nonoperative management (NOM) strategies (such as hygiene, sitz baths, and systemic antibiotics), operative intervention for abscess only (incision and drainage (I&D)) or direct surgical management of the FIA (e.g. upfront fistulotomy). Initial failure of NOM is approximately 37.5 %. Recurrence rate after initial success with NOM or I&D is approximately 21 % and 24 %, respectively. The rate of FIA development is approximately 21 % after NOM and 20 % after I&D. Recurrence after operative management of FIA, regardless of approach, is 7 %. Time to complete resolution varies widely and does not appear to differ based on treatment strategy.\n\n**Conclusions:** Both operative and non-operative approaches can be safely used in the management of perianal abscess and FIA but recurrence is common regardless of approach. Risks and benefits of each approach should be considered on a case-by-case basis.\n\n**Type Of Study:** Systematic Review of level 3-4 studies.\n\n**Level Of Evidence:** Level 4.", "abstract_zh": "**背景：** 婴儿肛周疾病的治疗，包括肛周脓肿和肛瘘（FIA），仍然存在争议。关于手术和非手术方法的风险和益处缺乏共识。\n\n**方法：** 美国儿科外科协会成果和循证实践委员会针对婴儿肛周脓肿和 FIA 的各种治疗方法提出了基于先验共识的问题。创建了全面的搜索策略，并使用系统评价和荟萃分析的首选报告项目 (PRISMA) 指南来识别和审查相关文章并回答既定问题。\n\n**结果：** 筛选了 2460 多个标题和摘要，确定了 31 篇手稿，描述了采用非手术治疗 (NOM) 策略（例如卫生、坐浴和全身抗生素）、仅针对脓肿进行手术干预（切开引流 (I&D)）或 FIA 直接手术治疗（例如前期瘘管切开术）时肛周疾病的预期病程。 NOM 的初始故障约为 37.5%。 NOM 或 I&D 初次成功后的复发率分别约为 21% 和 24%。 NOM 后的 FIA 开发率约为 21%，I&D 后的 FIA 开发率约为 20%。无论采取何种方法，FIA 手术治疗后的复发率为 7%。完成缓解的时间差异很大，并且根据治疗策略似乎没有差异。\n\n**结论：** 手术和非手术方法都可以安全地用于肛周脓肿和 FIA 的治疗，但无论采用哪种方法，复发都很常见。应根据具体情况考虑每种方法的风险和收益。\n\n**Type of study：** 3-4 级研究的系统审查。\n\n**Level of evidence：** 4 级。", "keywords_zh": "肛瘘、瘘管切开术、婴儿、肛周脓肿、直肠周围脓肿", "keywords_en": "Fistula-in-ano, Fistulotomy, Infants, Perianal abscess, Perirectal abscess", "link": "https://pubmed.ncbi.nlm.nih.gov/40983150/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 22 Sep 2025"}, {"id": "40740890", "title_en": "Epidemiology, treatment patterns, and associated risk factors in perianal fistulizing Crohn's disease: A systematic literature review", "title_zh": "肛周瘘管克罗恩病的流行病学、治疗模式和相关危险因素：系统文献综述", "authors": "Julian Panés", "abstract_en": "**Background:** Data regarding complex Crohn's perianal fistulas (CPF) epidemiology are limited, and optimal treatment strategies are elusive. An improved understanding of how CPF treatment options are used in the real-world setting and factors associated with CPF development, treatment failure, and reasons for undergoing multiple surgeries may help to inform optimal patient management strategies, reduce treatment burden, and improve outcomes in patients with CPF.\n\n**Aim:** To describe the epidemiology, treatments, outcomes, and associated risk/protective factors for complex CPF.\n\n**Methods:** Electronic databases (MEDLINE, EMBASE, EBM Reviews, EconLit) were searched. Two reviewers independently used populations, interventions, comparators, outcomes, study designs, and time criteria to identify relevant studies. Observational studies published in English from January 1, 2015 to February 17, 2022 with > 50 patients were included, even if complex CPF was not defined. Items of interest included complex CPF definitions, epidemiology, treatment patterns, morbidity, mortality, and risk factors associated with complex CPF development, treatment failure, and undergoing multiple surgeries. Data were reported using descriptive statistics.\n\n**Results:** Overall, 140 studies were included. Complex CPF definitions were heterogeneous and rarely reported (24 studies). Hence, data mostly related to CPF in general. CPF prevalence was variable (range: 1.5%-81.0%). Incidence was wide-ranging and mostly reported cumulatively at 1-year post-Crohn's disease diagnosis (range: 3.5%-50.1%). Overall healing and failure rates after treatment were in the range of 10.5%-80.2% and 3.6%-83.0%, respectively. Abscesses were the most frequently reported morbidity (<i>n =</i> 18). No CPF-related deaths were reported. No consistent risk or protective factors were identified.\n\n**Conclusion:** Epidemiology, treatment patterns, and risk factors for CPF vary, likely due to inconsistent CPF and clinical outcome definitions. Standardization would facilitate comparability, which may inform optimal complex CPF treatment strategies.", "abstract_zh": "**背景：** 有关复杂克罗恩病肛周瘘 (CPF) 流行病学的数据有限，且最佳治疗策略难以捉摸。更好地了解如何在现实环境中使用 CPF 治疗方案，以及与 CPF 发展、治疗失败和接受多次手术的原因相关的因素，可能有助于为 CPF 患者提供最佳的患者管理策略、减轻治疗负担并改善预后。\n\n**Aim：** 描述复杂 CPF 的流行病学、治疗、结果和相关风险/保护因素。\n\n**方法：** 检索了电子数据库（MEDLINE、EMBASE、EBM Reviews、EconLit）。两名评审员独立使用人群、干预措施、比较器、结果、研究设计和时间标准来确定相关研究。即使未定义复杂 CPF，也纳入了 2015 年 1 月 1 日至 2022 年 2 月 17 日期间以英文发表的、涉及超过 50 名患者的观察性研究。感兴趣的项目包括复杂的 CPF 定义、流行病学、治疗模式、发病率、死亡率以及与复杂 CPF 发展、治疗失败和接受多次手术相关的风险因素。使用描述性统计报告数据。\n\n**结果：** 总体而言，纳入了 140 项研究。复杂的 CPF 定义多种多样且很少报道（24 项研究）。因此，数据主要与一般公积金相关。 CPF 患病率各不相同（范围：1.5%-81.0%）。发病率范围广泛，大多数是在克罗恩病诊断后 1 年累积报告的（范围：3.5%-50.1%）。治疗后总体治愈率和失败率分别为10.5%-80.2%和3.6%-83.0%。脓肿是最常报告的发病率（<i>n =</i> 18）。没有与公积金相关的死亡报告。没有发现一致的风险或保护因素。\n\n**结论：** CPF 的流行病学、治疗模式和危险因素各不相同，这可能是由于 CPF 和临床结果定义不一致所致。标准化将促进可比性，这可能为最佳的复杂 CPF 治疗策略提供信息。", "keywords_zh": "复杂肛周瘘、克罗恩病、流行病学、发病率、危险因素、治疗模式", "keywords_en": "Complex perianal fistula, Crohn’s disease, Epidemiology, Morbidity, Risk factors, Treatment patterns", "link": "https://pubmed.ncbi.nlm.nih.gov/40740890/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 31 Jul 2025"}, {"id": "40585484", "title_en": "Treatment of perianal abscess and anal fistula in infants: a systematic review", "title_zh": "婴儿肛周脓肿和肛瘘的治疗：系统评价", "authors": "Li Xu", "abstract_en": "**Introduction:** The optimal treatment approach for perianal abscess (PA) and fistula-in-ano (FIA) in infants remains a subject of debate.\n\n**Material And Methods:** A thorough literature search was conducted across multiple databases, including Embase, PubMed, Web of Science, Cochrane Library, ClinicalTrials.gov, and Google Scholar.\n\n**Results:** A total of eighteen retrospective studies, encompassing 1,770 patients, were analyzed. Of the 702 cases (38.7%) that underwent conservative treatment, 528 cases (75.2%) achieved a cure, while 174 cases (24.8%) were unsuccessful, with 93 experiencing PA recurrence and 81 developing FIA. In contrast, among the 1,068 cases (61.3%) that received surgical interventions, 784 cases (73.4%) were cured, whereas 284 cases (26.6%) were not, with 151 experiencing PA recurrence and 133 developing FIA.\n\n**Conclusion:** The available studies indicate minimal differences in the cure and recurrence rates of PA and FIA between the conservative and surgical treatment groups.\n\n**Systematic Review Registration:** https://www.crd.york.ac.uk/PROSPERO/, PROSPERO (CRD42023472249).", "abstract_zh": "**介绍：** 婴儿肛周脓肿（PA）和肛瘘（FIA）的最佳治疗方法仍然是一个争论的话题。\n\n**Material and methods：** 对多个数据库进行了彻底的文献检索，包括 Embase、PubMed、Web of Science、Cochrane Library、ClinicalTrials.gov 和 Google Scholar。\n\n**结果：** 总共分析了 18 项回顾性研究，涵盖 1,770 名患者。接受保守治疗的702例（38.7%）中，治愈528例（75.2%），未治愈174例（24.8%），其中93例出现PA复发，81例出现FIA。相比之下，在接受手术干预的1,068例（61.3%）中，784例（73.4%）治愈，284例（26.6%）未治愈，其中151例出现PA复发，133例出现FIA。\n\n**结论：** 现有研究表明，保守治疗组和手术治疗组之间 PA 和 FIA 的治愈率和复发率差异很小。\n\n**Systematic review registration：** https://www.crd.york.ac.uk/PROSPERO/，PROSPERO (CRD42023472249)。", "keywords_zh": "保守治疗, 肛瘘, 婴儿, 肛周脓肿, 手术治疗", "keywords_en": "conservative treatment, fistula-in-ano, infants, perianal abscess, surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40585484/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 30 Jun 2025"}, {"id": "40538531", "title_en": "The Correlation between Hidradenitis Suppurativa and Irritable Bowel Diseases: A Systematic Review", "title_zh": "化脓性汗腺炎与肠易激疾病之间的相关性：系统评价", "authors": "Ayezel Munoz Gonzalez", "abstract_en": "**Background:** Hidradenitis suppurativa (HS) is an inflammatory skin condition that presents with nodules or abscesses associated with sinus tracts. Inflammatory bowel diseases (IBD) are inflammatory gastrointestinal (GI) conditions presenting with irregular bowel movements. Although HS and IBDs may have similarities in their clinical presentation and pathophysiology, they can differ in their cutaneous manifestations. Both conditions are potentially caused by genetic changes in the human leukocyte antigen (HLA), cause skin inflammation, and are characterized by abscesses in the GI and sinus tracts.\n\n**Objective:** We sought to determine the extent of coincident IBD and HS and the associated risk factors.\n\n**Methods:** The Ovid Medline database was searched for all current literature on the correlations between HS and IBD. Articles were then included and removed according to specific inclusion and exclusion criteria, and a systematic review was performed on the remaining articles.\n\n**Results:** Thirteen papers that met the inclusion and the exclusion criteria were selected, and after data collection, a significant correlation was found between the development of HS and IBD. Most of the articles reviewed stated that the corresponding association was a causal link between the two diseases. Furthermore, there were various risk factors and comorbidities associated with HS and the development of IBD, including smoking, obesity, perianal disease, and genetic predispositions such as HLA-B27 mutations.\n\n**Discussion:** Studies show that there is a potential correlation with HS and IBDs. Additional research should to determine the genetic correlations between HS and IBDs and the underlying pathophysiological mechanism.", "abstract_zh": "**背景：** 化脓性汗腺炎 (HS) 是一种炎症性皮肤病，表现为与窦道相关的结节或脓肿。炎症性肠病 (IBD) 是一种炎症性胃肠道 (GI) 疾病，表现为排便不规则。尽管 HS 和 IBD 在临床表现和病理生理学方面可能有相似之处，但它们的皮肤表现可能有所不同。这两种情况都可能是由人类白细胞抗原（HLA）的基因变化引起的，会引起皮肤炎症，并以胃肠道和窦道脓肿为特征。\n\n**目的：** 我们试图确定 IBD 和 HS 的重合程度以及相关的风险因素。\n\n**方法：** 在 Ovid Medline 数据库中检索了有关 HS 和 IBD 之间相关性的所有当前文献。然后根据特定的纳入和排除标准纳入和删除文章，并对剩余文章进行系统评价。\n\n**结果：** 筛选出13篇符合纳入和排除标准的论文，经过数据收集，发现HS和IBD的发展之间存在显着相关性。大多数审查的文章都指出，相应的关联是两种疾病之间的因果关系。此外，存在与 HS 和 IBD 发展相关的各种危险因素和合并症，包括吸烟、肥胖、肛周疾病和 HLA-B27 突变等遗传倾向。\n\n**讨论：** 研究表明，HS 和 IBD 存在潜在相关性。还应开展更多研究来确定 HS 和 IBD 之间的遗传相关性以及潜在的病理生理机制。", "keywords_zh": "化脓性汗腺炎、自身免疫、皮肤科、胃肠科、肠易激病", "keywords_en": "Hidradenitis suppurativa, autoimmunity, dermatology, gastroenterology, irritable bowel diseases", "link": "https://pubmed.ncbi.nlm.nih.gov/40538531/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Fri, 20 Jun 2025"}, {"id": "40210078", "title_en": "Defining Radiological Healing in Perianal Fistulizing Crohn's Disease: A TOpClass Global Expert Delphi Consensus", "title_zh": "定义肛周瘘管性克罗恩病的放射治疗：顶级全球专家德尔菲共识", "authors": "TOpClass collaborative authors", "abstract_en": "**Background & Aims:** Perianal fistulising Crohn's disease (pfCD) affects one-fifth of patients with Crohn's disease (CD), significantly affecting their quality of life. Magnetic resonance imaging is the gold standard for evaluating fistula healing in pfCD, but variability in radiological definitions hampers meaningful clinical interpretation and consistent trial design. This study aimed to establish an international consensus on the definition of radiological healing in pfCD.\n\n**Methods:** The study was conducted in 2 phases. Phase 1 involved a systematic review to identify magnetic resonance imaging-based variables and indices used to define healing in pfCD, assessing methodological quality using the COnsensus-based Standards for the selection of health Measurement INstruments (COSMIN) framework. Phase 2 utilized a 2-round online Delphi consensus process with 84 international experts, followed by a stakeholder meeting to achieve consensus (agreement threshold >80%). Results were reported as per Accurate Consensus Reporting Document (ACCORD) guidelines.\n\n**Results:** A radiologically healed fistula can be defined by the absence of T2-weighted hyperintensity, a completely fibrotic fistula tract and, when contrast is used, the absence of contrast enhancement on post-contrast T1-weighted images (95% consensus). Radiological improvement of a fistula can be defined (80% consensus) by the presence of a least one essential criterion: an increasingly fibrotic fistula tract, an unequivocal reduction in one or more of the following: T2-weighted hyperintensity, fistula diameter, fistula length, abscess size, or contrast enhancement of the fistula tract.\n\n**Conclusions:** This international Delphi consensus standardizes radiological endpoints in pfCD, improving consistency in clinical and research settings. Future studies will validate this definition and assess how radiological changes predict long-term clinical outcomes and quality of life improvements.", "abstract_zh": "**Background & aims：** 肛周瘘管克罗恩病 (pfCD) 影响五分之一的克罗恩病 (CD) 患者，显着影响他们的生活质量。磁共振成像是评估 pfCD 瘘管愈合的黄金标准，但放射学定义的可变性妨碍了有意义的临床解释和一致的试验设计。本研究旨在就 pfCD 放射治疗的定义建立国际共识。\n\n**方法：** 该研究分两个阶段进行。第一阶段涉及系统审查，以确定用于定义 pfCD 愈合的基于磁共振成像的变量和指数，使用基于共识的健康测量仪器选择标准 (COSMIN) 框架评估方法学质量。第二阶段采用了由84位国际专家参与的两轮在线德尔菲共识流程，随后召开利益相关者会议以达成共识（同意阈值>80%）。结果按照准确共识报告文件 (ACCORD) 指南进行报告。\n\n**结果：** 放射学愈合的瘘管可以定义为不存在 T2 加权高信号、完全纤维化的瘘管，以及使用造影剂时，造影后 T1 加权图像上不存在造影剂增强（95% 共识）。瘘管的放射学改善可以通过至少一个基本标准的存在来定义（80%共识）：瘘管纤维化程度不断增加，以下一项或多项指标明确减少：T2加权高信号、瘘管直径、瘘管长度、脓肿大小或瘘管造影增强。\n\n**结论：** 这一国际德尔菲共识标准化了 pfCD 的放射学终点，提高了临床和研究环境的一致性。未来的研究将验证这一定义，并评估放射学变化如何预测长期临床结果和生活质量的改善。", "keywords_zh": "终点、瘘管、愈合、MRI、肛周瘘管克罗恩病", "keywords_en": "Endpoints, Fistula, Healing, MRI, Perianal Fistulising Crohn’s Disease", "link": "https://pubmed.ncbi.nlm.nih.gov/40210078/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 10 Apr 2025"}, {"id": "40155532", "title_en": "Early diagnosis of Crohn's disease in patients presenting with a perianal fistula: systematic review and development of a perianal red flags index", "title_zh": "肛周瘘患者克罗恩病的早期诊断：系统回顾和肛周危险信号指数的制定", "authors": "J D W van der Bilt", "abstract_en": "**Background:** Delay in diagnosing Crohn's disease (CD) in patients presenting with perianal abscess (PAA) and/or fistula (PAF) is common. The aim of this study was to identify red flags suggestive of CD.\n\n**Methods:** A systematic literature review was conducted to identify symptoms associated with CD in patients presenting with PAA/PAF. A questionnaire including those symptoms, supplemented with items from the International Organization for the Study of Inflammatory Bowel Diseases (IO-IBD) red flags index for luminal CD, was administered to all adult patients presenting with a PAF and eventually diagnosed with CD and matched patients (1:3) from the same study period with a cryptoglandular PAF (2012-2023) at a single non-academic teaching hospital. All patients were asked to recall symptoms/signs experienced during their first PAF.\n\n**Results:** The systematic review identified 8 articles reporting on 15 clinical characteristics in patients presenting with PAA (n = 2)/PAF (n = 6), supplemented with 13 items from the IO-IBD red flags index (28 items in total). A total of 25 patients with CD and 75 patients with PAF without CD answered the questionnaire. Univariate analysis identified seven items associated with CD (age, family history, > 2 perianal interventions, weight loss, abdominal pain, diarrhoea and fatigue), and four items remained significant in multivariate analysis: age (OR 3.4 [1.0-11.5]), > 2 previous perianal interventions (OR 3.4 [1.0-10.1]), weight loss (OR 14.4 [3.7-55.6]) and abdominal pain (OR 9.8 [1.9-49.8]). Receiver-operating characteristic curve (ROC) analysis showed that a combination of these red flags was associated with good discrimination of CD versus non-CD (AUC 0.83 [0.72-0.94]).\n\n**Conclusions:** The perianal red flags index has a good predictive value for early identification of patients with PAF at risk for underlying CD.", "abstract_zh": "**背景：** 对于患有肛周脓肿 (PAA) 和/或瘘管 (PAF) 的患者，克罗恩病 (CD) 的诊断延迟很常见。本研究的目的是识别提示 CD 的危险信号。\n\n**方法：** 我们进行了系统性文献综述，以确定 PAA/PAF 患者中与 CD 相关的症状。对所有出现 PAF 并最终诊断为 CD 的成年患者进行了一份包含这些症状的调查问卷，并补充了国际炎症性肠病研究组织 (IO-IBD) 管腔 CD 危险信号指数的项目，并与来自同一研究时期 (2012-2023) 在一家非学术性教学医院的隐腺 PAF 的匹配患者 (1:3) 进行了比较。所有患者都被要求回忆第一次 PAF 期间经历的症状/体征。\n\n**结果：** 系统评价确定了 8 篇文章，报告了 PAA (n = 2)/PAF (n = 6) 患者的 15 项临床特征，并补充了 IO-IBD 危险信号指数中的 13 项（总共 28 项）。共有 25 名患有 CD 的患者和 75 名没有 CD 的 PAF 患者回答了问卷。单变量分析确定了与 CD 相关的 7 个项目（年龄、家族史、 > 2 次肛周干预、体重减轻、腹痛、腹泻和疲劳），4 个项目在多变量分析中仍然显着：年龄 (OR 3.4 [1.0-11.5])、 > 2 次既往肛周干预 (OR 3.4 [1.0-10.1])、体重减轻 (OR 14.4) [3.7-55.6]）和腹痛（OR 9.8 [1.9-49.8]）。受试者工作特征曲线 (ROC) 分析表明，这些危险信号的组合与 CD 与非 CD 的良好区分相关（AUC 0.83 [0.72-0.94]）。\n\n**结论：** 肛周危险信号指数对于早期识别有潜在 CD 风险的 PAF 患者具有良好的预测价值。", "keywords_zh": "克罗恩病、延迟、炎症性肠病、肛周瘘", "keywords_en": "Crohn’s disease, Delay, Inflammatory bowel disease, Perianal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/40155532/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Mar 2025"}, {"id": "39946821", "title_en": "A systematic review and meta-analysis of the diagnostic test accuracy of diffusion weighted imaging and apparent diffusion coefficient in differentiating active from inactive perianal fistula", "title_zh": "对弥散加权成像和表观弥散系数区分活动性和非活动性肛周瘘的诊断测试准确性的系统回顾和荟萃分析", "authors": "G S Octavius", "abstract_en": "**Introduction:** This systematic review and meta-analysis evaluated the diagnostic accuracy of MRI-based apparent diffusion coefficient (ADC) and diffusion-weighted imaging (DWI) for differentiating active from inactive perianal fistulas.\n\n**Methods:** The protocol was registered with the International Prospective Register of Systematic Reviews (PROSPERO) (CRD42024596604). The review included five databases (MEDLINE, Cochrane Library, PubMed, Science Direct, and Google Scholar). Meta-analyses were performed on studies reporting ADC values and other sequences using STATA software with the \"Midas\" command.\n\n**Results:** Of 21 studies included in the review, 12 were meta-analyzed, encompassing 1007 patients (77.5 % male) with 1092 fistulas and 321 abscesses. Six studies reported ADC values for active vs. inactive fistulas, with a pooled sensitivity of 83 % (95%CI 68-92), specificity of 75 % (95%CI 60-85), and AUC of 0.85 (95%CI 0.81-0.87). Pooled ADC cut-offs ranged from 1.105 to 1.109 × 10⁻³ mm<sup>2</sup>/s. The T2WI + DWI sequence demonstrated the highest diagnostic accuracy, with a pooled sensitivity of 99 % (95%CI 90-100), specificity of 97 % (95%CI 79-100), and an AUC of 1.\n\n**Conclusion:** ADC alone is inadequate for reliably distinguishing active from inactive fistulas. T2WI combined with DWI offers superior diagnostic performance, surpassing contrast-enhanced T1WI, and is promising for non-invasive evaluation of perianal fistulas. However, several limitations, such as moderate to high risk of bias and heterogeneity, may bias this conclusion.\n\n**Implications For Practice:** T2WI + DWI could become the standard for assessing perianal fistulas, avoiding contrast agents, and benefiting patients contraindicated for Gadolinium-based contrast media. Variability and potential bias across studies warrant further research.", "abstract_zh": "**介绍：** 这项系统回顾和荟萃分析评估了基于 MRI 的表观扩散系数 (ADC) 和扩散加权成像 (DWI) 区分活动性和非活动性肛周瘘的诊断准确性。\n\n**方法：** 该方案已在国际系统评价前瞻性登记册 (PROSPERO) 中注册 (CRD42024596604)。该综述包括五个数据库（MEDLINE、Cochrane Library、PubMed、Science Direct 和 Google Scholar）。使用带有“Midas”命令的 STATA 软件对报告 ADC 值和其他序列的研究进行荟萃分析。\n\n**结果：** 在该评价纳入的 21 项研究中，有 12 项进行了荟萃分析，涉及 1007 名患者（77.5% 男性），有 1092 个瘘管和 321 个脓肿。六项研究报告了活动性瘘管与非活动性瘘管的 ADC 值，汇总敏感性为 83% (95%CI 68-92)，特异性为 75% (95%CI 60-85)，AUC 为 0.85 (95%CI 0.81-0.87)。汇集的 ADC 截止范围为 1.105 至 1.109 × 10⁻3 mm<sup>2</sup>/s。 T2WI + DWI 序列显示出最高的诊断准确性，汇总敏感性为 99% (95%CI 90-100)，特异性为 97% (95%CI 79-100)，AUC 为 1。\n\n**结论：** 单独使用 ADC 不足以可靠地区分活动性瘘管和非活动性瘘管。 T2WI 与 DWI 相结合提供了优于对比增强 T1WI 的诊断性能，并且有望用于肛周瘘的无创评估。然而，一些限制，例如中度至高风险的偏倚和异质性，可能会导致这一结论产生偏差。\n\n**Implications for practice：** T2WI + DWI 可以成为评估肛周瘘管、避免使用造影剂以及使钆造影剂禁忌患者受益的标准。研究之间的变异性和潜在偏差值得进一步研究。", "keywords_zh": "表观扩散系数、诊断测试准确性、扩散加权成像、磁共振成像、肛周瘘", "keywords_en": "Apparent diffusion coefficient, Diagnostic test accuracy, Diffusion weighted imaging, Magnetic resonance imaging, Perianal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/39946821/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 13 Feb 2025"}, {"id": "39422801", "title_en": "Perianal Mucinous Adenocarcinoma: A Case Report and a Systematic Review of the Literature", "title_zh": "肛周粘液性腺癌：一例报告和文献系统回顾", "authors": "Apostolos P Stamatiadis", "abstract_en": "**Background:** Mucinous adenocarcinoma of anus is an uncommon neoplasm of the gastrointestinal tract. In most of the cases, early diagnosis of this disease is difficult since its symptoms frequently mimic benign inflammatory conditions.\n\n**Methods:** A systematic PubMed and Scopus search was conducted, a propos of a case report.\n\n**Results:** One hundred fifty patients from 93 case reports were included. The mean age of the patients was 60.5 years (range: 18-81). The majority of them were males (124 out of 150, 82.7%), while the main known risk factor was the history of chronic fistula (109 out of 150, 72.7%). Recurrent perianal sepsis and perianal pain were the principal symptoms at the time of presentation. No symptoms have been reported only in three patients (3 out of 150, 2%). Regarding the prior surgical history of the patients, multiple abscess drainage and perianal fistula's related interventions were present in 62 (41.3%) and 19 (12.7%) patients, respectively. Neoadjuvant chemoradiotherapy was administered in 53 out of 150 patients (35.3%), while the majority of them have been treated with combined treatment of chemotherapy and radiotherapy. APR and its variations were the most applied surgical treatment (68%). Adjuvant chemoradiotherapy was administered almost up to one-third of the included patients (34%). Recurrence of the disease was reported in 41 out of 150 patients (27.3%). Death was reported in 44 out of 150 patients (29.3%).\n\n**Conclusion:** Review of the available published literature suggests that perianal mucinous adenocarcinoma is an extremely rare neoplasia. Τhere is no consensus as far as the diagnosis and the treatment strategies, due to the rarity of this neoplasm. High degree of clinical suspicion as well as histopathological confirmation is the principal requisites for the diagnosis of mucinous adenocarcinoma, especially in the ground of chronic ulcero-proliferative perianal lesions.", "abstract_zh": "**背景：** 肛门粘液性腺癌是一种罕见的胃肠道肿瘤。在大多数情况下，这种疾病的早期诊断很困难，因为它的症状经常模仿良性炎症。\n\n**方法：** 根据病例报告的建议，进行了系统的 PubMed 和 Scopus 检索。\n\n**结果：** 纳入 93 份病例报告中的 150 名患者。患者的平均年龄为 60.5 岁（范围：18-81 岁）。其中大多数为男性（150 人中的 124 人，82.7%），而已知的主要危险因素是慢性瘘管病史（150 人中的 109 人，72.7%）。复发性肛周败血症和肛周疼痛是就诊时的主要症状。仅 3 名患者没有报告任何症状（150 名患者中有 3 名，2%）。关于患者既往手术史，分别有62例（41.3%）和19例（12.7%）患者接受过多处脓肿引流和肛周瘘相关干预。 150例患者中，有53例（35.3%）接受了新辅助放化疗，其中大多数患者接受了化疗和放疗的联合治疗。 APR 及其变体是最常用的手术治疗方法 (68%)。几乎三分之一的纳入患者（34%）接受了辅助放化疗。 150 名患者中有 41 名（27.3%）报告疾病复发。 150 名患者中有 44 名死亡（29.3%）。\n\n**结论：** 对现有已发表文献的回顾表明，肛周粘液性腺癌是一种极其罕见的肿瘤。由于这种肿瘤的罕见性，在诊断和治疗策略方面尚未达成共识。高度的临床怀疑和组织病理学证实是诊断粘液腺癌的主要必要条件，特别是在慢性溃疡增殖性肛周病变的情况下。", "keywords_zh": "肛门、肛门、肛门内超声检查、粘液性腺癌、肛周", "keywords_en": "Anal, Anus, Endoanal ultrasonography, Mucinous adenocarcinoma, Perianal", "link": "https://pubmed.ncbi.nlm.nih.gov/39422801/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Fri, 18 Oct 2024"}, {"id": "39360706", "title_en": "Darvadstrocel for complex perianal fistulas in Crohn's disease: A systematic review and meta-analysis", "title_zh": "Darvadstrocel 治疗克罗恩病复杂肛周瘘：系统评价和荟萃分析", "authors": "Cristina Alba", "abstract_en": "**Background:** Local injection of darvadstrocel, a suspension of expanded adipose-derived allogenic mesenchymal stem cells, has been used for treatment-refractory perianal fistulas in Crohn's disease (CD).\n\n**Objective:** This study aimed to investigate efficacy and safety of darvadstrocel for complex perianal fistulas in CD.\n\n**Methods:** A systematic search was conducted through April 2024 in relevant databases for observational studies evaluating darvadstrocel. A random-effects meta-analysis model was used to calculate the pooled effect sizes (proportions or incidence rates [IRs]) with 95% confidence intervals (CIs) of effectiveness and safety outcomes. The risk of bias was evaluated using the Joanna Briggs Institute Critical Appraisal Tool. The I<sup>2</sup> value assessed heterogeneity. Sensitivity and subgroup analyses were also conducted.\n\n**Results:** Twelve studies were included with 595 patients. The pooled rate of patients achieving clinical remission, defined as fistula healing, was 68.1% at month 6 (95% CI 63.4-72.7) and 77.2% (95% CI 70.1-83.8) at month 12. Combined remission, defined as clinical remission and absence of collections >2 cm confirmed by magnetic resonance imaging, was reported in 60.6% and in 69.7% of patients at months 6 and 12, respectively. The rate of patients with treatment failure, defined as no clinical remission at the last follow-up (mean 18.7 months; SD 9.9), was 34.5%. Failure rate was independent of follow-up time (p = 0.85). For effectiveness outcomes, between-study heterogeneity was negligible. Subgroup analysis indicated that none of the covariates modified the treatment effect. Pooled IRs per 100 patient-years of adverse events (AE), serious AEs, perianal abscesses, and reoperations were 19.6, 3.2, 16.9 and 7.1, respectively.\n\n**Conclusion:** Evidence from observational studies supports the efficacy and safety of darvadstrocel for complex perianal fistulas in CD. Studies have reported high fistula healing rates that can be sustained long-term in most patients, with negligible between-study heterogeneity, as well as a favorable safety profile.", "abstract_zh": "**背景：** 局部注射darvadstrocel（一种扩增的脂肪来源同种异体间充质干细胞悬浮液）已用于治疗克罗恩病（CD）难治性肛周瘘。\n\n**目的：** 本研究旨在探讨 darvadstrocel 治疗 CD 复杂肛周瘘的疗效和安全性。\n\n**方法：** 截至 2024 年 4 月，我们在相关数据库中进行了系统性检索，以评估 darvadstrocel 的观察性研究。使用随机效应荟萃分析模型来计算汇总效应大小（比例或发生率 [IR]），有效性和安全性结果的置信区间 (CI) 为 95%。使用乔安娜·布里格斯研究所批判性评估工具评估偏倚风险。 I<sup>2</sup> 值评估异质性。还进行了敏感性和亚组分析。\n\n**结果：** 12 项研究纳入了 595 名患者。第 6 个月时达到临床缓解（定义为瘘管愈合）的患者的汇总率为 68.1%（95% CI 63.4-72.7），第 12 个月时为 77.2%（95% CI 70.1-83.8）。综合缓解（定义为临床缓解且经磁共振成像证实没有 >2 cm 的积液）的患者比例为 60.6% 和 69.7%分别在第 6 个月和第 12 个月。治疗失败（定义为最后一次随访时无临床缓解）的患者比例（平均 18.7 个月；SD 9.9）为 34.5%。失败率与随访时间无关 (p = 0.85)。对于有效性结果，研究间的异质性可以忽略不计。亚组分析表明没有任何协变量改变治疗效果。每 100 患者年不良事件 (AE)、严重 AE、肛周脓肿和再次手术的汇总 IR 分别为 19.6、3.2、16.9 和 7.1。\n\n**结论：** 观察性研究的证据支持 darvadstrocel 对于 CD 复杂肛周瘘的疗效和安全性。研究表明，大多数患者的瘘管愈合率较高，可以长期维持，研究间的异质性可以忽略不计，并且安全性良好。", "keywords_zh": "克罗恩病、脂肪来源的同种异体间充质干细胞、alofisel、darvadstrocel、炎症性肠病、荟萃分析、肛周瘘", "keywords_en": "Crohn's disease, adipose‐derived allogenic mesenchymal stem cells, alofisel, darvadstrocel, inflammatory bowel disease, meta‐analysis, perianal fistulas", "link": "https://pubmed.ncbi.nlm.nih.gov/39360706/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 03 Oct 2024"}, {"id": "39298676", "title_en": "Impact of Seton Use on Clinical, Patient-Reported, and Healthcare Resource Utilization Outcomes in Complex Crohn's Perianal Fistulas: A Systematic Literature Review", "title_zh": "使用挂线对复杂克罗恩病肛周瘘的临床、患者报告和医疗资源利用结果的影响：系统文献综述", "authors": "Phillip Fleshner", "abstract_en": "**Background:** Optimal treatment strategies for seton use in patients with Crohn's perianal fistulas (CPF) remain elusive. This systematic literature review aimed to summarize clinical, patient-reported, and healthcare resource utilization (HCRU) outcomes associated with seton use for symptomatic relief and treatment of complex CPF.\n\n**Methods:** Electronic databases (MEDLINE, Embase, EBM Reviews, EconLit) were searched. Titles, abstracts, and relevant full texts were screened by 2 reviewers for inclusion using prespecified PICOS-T criteria. Articles published in English between January 1, 1980 and September 6, 2021 were included; animal/in vitro studies and case reports with <5 patients were excluded. Outcomes of interest included rates of complete response/remission and fistula recurrence in patients receiving seton with/without infliximab or biologics. Data were summarized using descriptive statistics.\n\n**Results:** Overall, 56 studies were included (full texts: n = 43; congress abstracts: n = 13). CPF and clinical outcome definitions were heterogeneous. Rates (range) of complete response/remission varied widely (seton: 13%-75%; seton + infliximab: 23%-100%; seton + biologics: 23%-59%) as did rates for fistula recurrence (seton: 4%-68%; seton + infliximab: 0%-50%; seton + biologics: 0%-17%). Rates of fistula-related reintervention, new fistula or abscess formation, and abscess recurrence were also varied; more consistency was observed regarding the use of patient-reported outcomes. Few studies reported outcomes from pediatric/adolescent patients or HCRU.\n\n**Conclusions:** Optimal use of seton in patients with CPF remains unclear. International standardization of definitions for CPF and related clinical outcomes are required to permit data comparability and identify the most effective treatment strategies involving seton use in CPF.", "abstract_zh": "**背景：** 克罗恩病肛周瘘（CPF）患者挂线的最佳治疗策略仍然难以捉摸。本系统文献综述旨在总结与使用挂线缓解症状和治疗复杂 CPF 相关的临床、患者报告和医疗资源利用 (HCRU) 结果。\n\n**方法：** 检索了电子数据库（MEDLINE、Embase、EBM Reviews、EconLit）。标题、摘要和相关全文由 2 名审稿人筛选，以使用预先指定的 PICOS-T 标准进行纳入。收录了1980年1月1日至2021年9月6日期间以英文发表的文章；动物/体外研究和病例报告<5名患者被排除在外。感兴趣的结果包括接受挂线并使用/不使用英夫利昔单抗或生物制剂的患者的完全缓解/缓解率和瘘管复发率。使用描述性统计总结数据。\n\n**结果：** 总体而言，纳入了 56 项研究（全文：n = 43；会议摘要：n = 13）。 CPF 和临床结果的定义是不同的。完全缓解/缓解率（范围）差异很大（挂线：13%-75%；挂线 + 英夫利昔单抗：23%-100%；挂线 + 生物制剂：23%-59%），瘘管复发率也有很大差异（挂线：4%-68%；挂线 + 英夫利昔单抗：0%-50%；挂线 + 英夫利昔单抗：0%-50%）。挂线 + 生物制剂：0%-17%）。与瘘管相关的再干预、新瘘管或脓肿形成以及脓肿复发率也各不相同；在使用患者报告的结果方面观察到更加一致。很少有研究报告儿科/青少年患者或 HCRU 的结果。\n\n**结论：** CPF 患者挂线的最佳使用方式仍不清楚。需要对 CPF 定义和相关临床结果进行国际标准化，以实现数据可比性并确定涉及 CPF 挂线使用的最有效治疗策略。", "keywords_zh": "克罗恩病、肛周瘘、挂线", "keywords_en": "Crohn’s disease, perianal fistula, seton", "link": "https://pubmed.ncbi.nlm.nih.gov/39298676/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 19 Sep 2024"}, {"id": "38813942", "title_en": "Vaccine-associated paralytic poliomyelitis in oral polio vaccine recipients: disproportionality analysis using VAERS and systematic review", "title_zh": "口服脊髓灰质炎疫苗接种者中与疫苗相关的麻痹性脊髓灰质炎：使用 VAERS 和系统评价进行不成比例分析", "authors": "Girish Thunga", "abstract_en": "**Background:** Vaccine-associated paralytic poliomyelitis (VAPP) is a rare adverse event of oral poliovirus vaccines (OPV), particularly affecting immunodeficient individuals.\n\n**Research Design And Methods:** This study aimed to (1) Assess the association between OPV and VAPP using Vaccine Adverse Event Reporting System (VAERS) database (2) Outline patient characteristics and risk factors associated with the occurrence of VAPP in OPV recipients through a systematic review of case reports and case series. A disproportionality analysis was conducted using the data from VAERS, encompassing adverse events reported from 1990 till February 2023. Additionally, we conducted a systematic review of case reports and case series using PubMed, Scopus, and Embase databases.\n\n**Results:** The VAERS data revealed 130 VAPP reports among 1,739,903 OPV linked adverse events, with year 2010 reporting the strongest association. The systematic review of 37 studies highlighted VAPP occurrence within 2 months to 4 years post-vaccination, typically with acute flaccid paralysis. Immunodeficiency and perianal abscess emerged as major risk factors. Out of the 37 included studies, 27 showed consistent causal association of VAPP with OPV using WHO-AEFI causality assessment tool.\n\n**Conclusion:** The study emphasized the seriousness of VAPP and highlights its association with OPV, identifying immunodeficiency as a prominent contributor to VAPP manifestation.", "abstract_zh": "**背景：** 疫苗相关麻痹性脊髓灰质炎 (VAPP) 是口服脊髓灰质炎病毒疫苗 (OPV) 的一种罕见不良事件，尤其影响免疫缺陷个体。\n\n**Research design and methods：** 本研究旨在 (1) 使用疫苗不良事件报告系统 (VAERS) 数据库评估 OPV 和 VAPP 之间的关联 (2) 通过对病例报告和病例系列进行系统回顾，概述与 OPV 接受者发生 VAPP 相关的患者特征和危险因素。使用 VAERS 的数据进行了不成比例分析，涵盖 1990 年至 2023 年 2 月报告的不良事件。此外，我们使用 PubMed、Scopus 和 Embase 数据库对病例报告和病例系列进行了系统回顾。\n\n**结果：** VAERS 数据显示，1,739,903 起 OPV 相关不良事件中有 130 份 VAPP 报告，其中 2010 年报告的关联性最强。对 37 项研究的系统回顾强调了 VAPP 在疫苗接种后 2 个月至 4 年内发生，通常伴有急性弛缓性麻痹。免疫缺陷和肛周脓肿成为主要危险因素。在纳入的 37 项研究中，27 项使用 WHO-AEFI 因果关系评估工具显示 VAPP 与 OPV 之间存在一致的因果关系。\n\n**结论：** 该研究强调了 VAPP 的严重性，并强调了其与 OPV 的关联，确定免疫缺陷是导致 VAPP 表现的一个重要因素。", "keywords_zh": "病例报告、OPV、VAPP、因果关系、免疫缺陷、脊髓灰质炎", "keywords_en": "Case report, OPV, VAPP, causality, immunodeficiency, polio", "link": "https://pubmed.ncbi.nlm.nih.gov/38813942/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 30 May 2024"}, {"id": "38563064", "title_en": "A systematic review and meta-analysis of the use of packing in the management of perianal abscesses", "title_zh": "肛周脓肿治疗中填塞使用的系统回顾和荟萃分析", "authors": "Ome Padfield", "abstract_en": "**Background:** Perianal abscesses are common presentations and reasons for emergency general surgery admissions. Management involves incision and drainage of the abscess and packing the cavity with internal wound dressings. This meta-analysis aimed to assess in adults if packing an abscess or leaving it unpacked leads to a significant difference in the outcomes of pain on wound dressing, time to healing, rate of fistulation and abscess recurrence.\n\n**Methods:** Randomised controlled trials (RCTs) with participants aged 18 years or older that compared packing of perianal abscess cavities with no packing between 2002 and 2022 were searched for in December 2022 on OVID Medline and Embase, the CENTRAL register of trials, PubMed and Google Scholar. Risk of bias was assessed using the Cochrane Risk of Bias tool. Random effects meta-analysis was conducted on the data extracted.\n\n**Results:** Three RCTs involving 490 patients were analysed for the outcomes of abscess recurrence and postoperative fistula formation; the data were not adequate to assess pain on dressing and time to healing. For unpacked versus packed, the pooled relative risk of abscess recurrence was 1.57 (95% confidence interval (CI) 0.764, 3.29, <i>p</i>=0.219) and for fistula formation 0.686 (95% CI 0.430, 1.09, <i>p</i>=0.114). These results suggest there is no significant benefit to packing abscess cavities.\n\n**Conclusions:** Analysis of the outcomes suggests there is no significant difference with regards to rates of abscess recurrence or fistula formation between the packed and unpacked groups; however, appropriately powered RCTs are required in this area to provide more primary evidence to inform best practice and clinical management.", "abstract_zh": "**背景：** 肛周脓肿是急诊普通外科手术的常见表现和原因。治疗包括切开脓肿并引流，并用内部伤口敷料填塞空腔。这项荟萃分析旨在评估成人包扎脓肿或不包扎脓肿是否会导致伤口敷料疼痛、愈合时间、瘘管发生率和脓肿复发的显着差异。\n\n**方法：** 2022 年 12 月，在 OVID Medline 和 Embase、中央试验注册库、PubMed 和 Google Scholar 上检索了 18 岁或以上参与者的随机对照试验 (RCT)，这些试验比较了 2002 年至 2022 年期间肛周脓肿腔填塞与不填塞的情况。使用 Cochrane 偏倚风险工具评估偏倚风险。对提取的数据进行随机效应荟萃分析。\n\n**结果：** 对涉及 490 名患者的三项随机对照试验分析了脓肿复发和术后瘘管形成的结果；这些数据不足以评估敷料时的疼痛和愈合时间。对于未填塞与填塞的情况，脓肿复发的汇总相对风险为 1.57（95% 置信区间 (CI) 0.764, 3.29, <i>p</i>=0.219），瘘管形成的汇总相对风险为 0.686（95% CI 0.430, 1.09，<i>p</i>=0.114）。这些结果表明，填塞脓肿空腔没有显着的好处。\n\n**结论：** 结果分析表明，填塞组和未填塞组之间脓肿复发或瘘管形成率没有显着差异；然而，该领域需要适当的随机对照试验来提供更多主要证据，为最佳实践和临床管理提供信息。", "keywords_zh": "脓肿填塞、肛周脓肿、复发", "keywords_en": "Abscess packing, Perianal abscesses, Recurrence", "link": "https://pubmed.ncbi.nlm.nih.gov/38563064/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Tue, 02 Apr 2024"}, {"id": "38428446", "title_en": "Aluminum potassium sulfate and tannic acid (ALTA) sclerotherapy for hemorrhoidal disease: a systematic review and meta-analysis", "title_zh": "硫酸铝钾和单宁酸（ALTA）硬化疗法治疗痔疮：系统评价和荟萃分析", "authors": "Kiriakos Ktenidis", "abstract_en": "**Background:** We conducted a systematic review to assess the safety and efficacy of Aluminum potassium sulfate and tannic acid (ALTA) sclerotherapy for the treatment of hemorrhoidal disease.\n\n**Methods:** Our study was conducted in accordance with the PRISMA statement (Preferred Reporting Items for Systematic Reviews and Meta-analyses) 2020. Primary endpoints included overall recurrence and type of recurrence while secondary endpoints included postoperative complications, reintervention, presence of rectal ulcer, rectal stricture, defecation abnormalities and perianal abscess. Α regression analysis, where the percentage of patients with grade II, III and IV hemorrhoidal disease was used as a covariate, was also performed.\n\n**Results:** Twelve studies with 4249 patients met all the inclusion criteria and were eventually included. The crude and pooled estimates of the overall recurrence and complications by the end of follow-up were 10% (95% CI, 6.52%-14.08%) and 5.20% (95% CI, 2.59%-8.52%), respectively. Regression analysis displayed no correlation between recurrence and the grade of hemorrhoid disease II, β= -0.0012 (95% CI, -0.0074 to 0.0049) (<i>p</i> = .64), grade III β= -0.0006 (95% CI, -0.0056 to 0.0045) (<i>p</i> = .79) and grade IV β = 0.0025 (95% CI, -0.0075 to 0.0124). However, a trend suggestive of increased recurrence was observed in patient populations with a higher proportion of grade IV disease.\n\n**Conclusion:** ALTA sclerotherapy may be a safe and viable alternative for patients with hemorrhoidal disease. Long-term follow-up and high-quality randomized controlled trials will help define the place of ALTA sclerotherapy in the armamentarium of treatment of hemorrhoids.", "abstract_zh": "**背景：** 我们进行了系统评价，以评估硫酸铝钾和单宁酸 (ALTA) 硬化疗法治疗痔疮疾病的安全性和有效性。\n\n**方法：** 我们的研究是根据 2020 年 PRISMA 声明（系统评价和荟萃分析的首选报告项目）进行的。主要终点包括总体复发和复发类型，次要终点包括术后并发症、再次干预、是否存在直肠溃疡、直肠狭窄、排便异常和肛周脓肿。还进行了α回归分析，其中患有II级、III级和IV级痔疮疾病的患者的百分比被用作协变量。\n\n**结果：** 涉及 4249 名患者的 12 项研究符合所有纳入标准并最终被纳入。随访结束时总体复发和并发症的粗略估计和汇总估计分别为 10% (95% CI, 6.52%-14.08%) 和 5.20% (95% CI, 2.59%-8.52%)。回归分析显示复发率与痔疮疾病分级之间无相关性，II 级，β= -0.0012（95% CI，-0.0074 至 0.0049）（<i>p</i> = .64），III 级 β= -0.0006（95% CI，-0.0056 至 0.0045） (<i>p</i> = .79) 和 IV 级 β = 0.0025 (95% CI，-0.0075 至 0.0124)。然而，在 IV 级疾病比例较高的患者群体中观察到了复发率增加的趋势。\n\n**结论：** 对于痔疮患者来说，ALTA 硬化疗法可能是一种安全可行的替代方案。长期随访和高质量随机对照试验将有助于确定 ALTA 硬化疗法在痔疮治疗设备中的地位。", "keywords_zh": "ALTA，硫酸铝钾，痔疮疾病，痔疮，硬化疗法", "keywords_en": "ALTA, aluminum potassium sulfate, hemorrhoidal disease, hemorrhoids, sclerotherapy", "link": "https://pubmed.ncbi.nlm.nih.gov/38428446/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Fri, 01 Mar 2024"}, {"id": "38223244", "title_en": "Effectiveness and safety of darvadstrocel in patients with complex perianal fistulizing Crohn's disease: a systematic review", "title_zh": "darvadstrocel 对复杂性肛周瘘管克罗恩病患者的有效性和安全性：系统评价", "authors": "Konstantinos H Katsanos", "abstract_en": "**Background:** Managing complex perianal fistulizing Crohn's disease (CD) remains challenging, despite current medical and surgical treatment approaches. Darvadstrocel, a therapy utilizing adipose-derived stem cells, shows promise in promoting tissue regeneration and healing, offering a novel and effective treatment for fistula management.\n\n**Method:** A systematic literature search was conducted on PubMed and Scopus to identify studies involving patients with complex perianal fistulizing CD treated with darvadstrocel.\n\n**Results:** In total, 2 randomized controlled trials (RCT), 5 observational studies with retrospective data collection and 2 observational studies with prospective design were included in the final review. Data from the European ADMIRE-CD RCT demonstrated that darvadstrocel is superior to placebo in terms of clinical and imaging improvement over both the short and long term. These findings align with the prospective studies analyzed in this systematic review. The rate of treatment-emergent adverse events in the ADMIRE-CD trial's RCTs was similar in both the darvadstrocel and control groups, with perianal abscess being the most common adverse event up to 52 weeks after drug administration. Retrospective studies indicated no side-effects beyond 52 weeks.\n\n**Conclusions:** Darvadstrocel appears to be a new, potentially effective and safe treatment option for the management of complex perianal fistulas. However, more randomized clinical trials are needed to evaluate the efficacy and safety profile of the drug.", "abstract_zh": "**背景：** 尽管目前有药物和手术治疗方法，但治疗复杂的肛周瘘管克罗恩病 (CD) 仍然具有挑战性。 Darvadstrocel 是一种利用脂肪干细胞的疗法，在促进组织再生和愈合方面显示出前景，为瘘管治疗提供了一种新颖有效的治疗方法。\n\n**Method：** 在 PubMed 和 Scopus 上进行了系统文献检索，以确定涉及接受 darvadstrocel 治疗的复杂肛周瘘管性 CD 患者的研究。\n\n**结果：** 最终评价总共纳入了 2 项随机对照试验 (RCT)、5 项回顾性数据收集观察性研究和 2 项前瞻性设计观察性研究。来自欧洲 ADMIRE-CD RCT 的数据表明，darvadstrocel 在短期和长期的临床和影像学改善方面均优于安慰剂。这些发现与本系统综述中分析的前瞻性研究一致。在 ADMIRE-CD 试验的随机对照试验中，darvadstrocel 组和对照组中治疗引起的不良事件发生率相似，其中肛周脓肿是给药后 52 周内最常见的不良事件。回顾性研究表明超过 52 周没有副作用。\n\n**结论：** Darvadstrocel 似乎是治疗复杂肛周瘘的一种新的、潜在有效且安全的治疗选择。然而，需要更多的随机临床试验来评估该药物的功效和安全性。", "keywords_zh": "瘘管性克罗恩病、脂肪干细胞、darvadstrocel、治疗", "keywords_en": "Fistulizing Crohn’s disease, adipose-derived stem-cells, darvadstrocel, treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/38223244/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 15 Jan 2024"}, {"id": "37545826", "title_en": "Hidradenitis suppurativa and squamous cell carcinoma: a systematic review of the literature", "title_zh": "化脓性汗腺炎和鳞状细胞癌：文献的系统回顾", "authors": "Beata Bergler-Czop", "abstract_en": "Hidradenitis suppurativa (HS) is a chronic disease which is often recurrent and occurs as abscesses of the apocrine gland. The most common locations of HS are gluteal/perianal, axillary or inguinal. It is reasonable to assume that squamous cell carcinoma may arise from HS. As researchers in the field of dermatology, HS surgery and conventional surgical oncology, we studied whether there is any correlation between HS and neoplasms. Evidence shows a correlation between HS and squamous cell carcinoma. The aim of the study was to find literature about HS and SCC and analyse potential risk factors. This is a systemic review concerning squamous cell carcinoma and hidradenitis suppurativa.", "abstract_zh": "化脓性汗腺炎（HS）是一种慢性疾病，经常复发，并以顶浆腺脓肿的形式出现。 HS 最常见的位置是臀肌/肛周、腋窝或腹股沟。鳞状细胞癌可能由 HS 引起的假设是合理的。作为皮肤科、热射病外科和传统肿瘤外科领域的研究人员，我们研究了热射病和肿瘤之间是否存在相关性。有证据表明 HS 与鳞状细胞癌之间存在相关性。该研究的目的是查找有关 HS 和 SCC 的文献并分析潜在的危险因素。这是关于鳞状细胞癌和化脓性汗腺炎的系统综述。", "keywords_zh": "化脓性汗腺炎，鳞状细胞癌，手术治疗", "keywords_en": "hidradenitis suppurativa, squamous cell carcinoma, surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/37545826/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Aug 2023"}, {"id": "37023788", "title_en": "A Systematic Review and Meta-Analysis of Comparing Drainage Alone versus Drainage with Primary Fistula Treatment for the Perianal Abscess in Children", "title_zh": "单独引流与引流联合瘘管治疗儿童肛周脓肿的系统回顾和荟萃分析", "authors": "Chen Wang", "abstract_en": "This systematic review and meta-analysis of nonrandomized studies (NRSs) aimed to evaluate the clinical efficacy and safety of two types of surgical interventions (respectively drainage alone and drainage with primary fistula treatment) for perianal abscesses (PAs) in children. Studies from 1992 to July 2022 were searched in 10 electronic databases. All relevant NRSs with available data which compared surgical drainage with or without primary fistula treatment were included. Patients with underlying diseases which led to abscess formation were excluded. The Newcastle-Ottawa Scale was used to assess the risk of bias and quality of the included studies. The outcomes were the healing rate, fistula formation rate, fecal incontinence, and wound healing duration. A total of 16 articles with 1,262 patients were considered suitable for the final meta-analysis. Primary fistula treatment was associated with a significantly higher healing rate when compared with incision and drainage alone (odds ratio [OR]: 5.76, 95% confidence interval [CI]: 4.04-8.22). This aggressive procedure for PA resulted in an 86% reduction in the fistula formation rate (OR: 0.14, 95% CI: 0.06-0.32). Limited data showed patients who underwent primary fistula treatment have a minor effect on postoperative fecal incontinence. Primary fistula treatment demonstrates a better clinical efficacy in promoting the healing rate and decreasing the formation of fistulas in PAs in children. The available evidence for a minor impact on anal function after this intervention is less strong.", "abstract_zh": "这项非随机研究（NRS）的系统回顾和荟萃分析旨在评估两种类型的手术干预（分别单独引流和引流联合初次瘘管治疗）治疗儿童肛周脓肿（PA）的临床疗效和安全性。在 10 个电子数据库中检索了 1992 年至 2022 年 7 月的研究。包括所有具有可用数据的相关 NRS，这些 NRS 比较了手术引流与或不进行初次瘘管治疗的情况。排除患有导致脓肿形成的基础疾病的患者。纽卡斯尔-渥太华量表用于评估纳入研究的偏倚风险和质量。结果是愈合率、瘘管形成率、大便失禁和伤口愈合持续时间。共有 16 篇文章、1,262 名患者被认为适合最终的荟萃分析。与单独切开引流相比，原发性瘘管治疗具有显着更高的治愈率（比值比 [OR]：5.76，95% 置信区间 [CI]：4.04-8.22）。这种积极的 PA 手术使瘘管形成率降低了 86%（OR：0.14，95% CI：0.06-0.32）。有限的数据显示，接受原发性瘘管治疗的患者对术后大便失禁的影响较小。原发性瘘管治疗在促进儿童PAs的愈合率和减少瘘管形成方面显示出更好的临床疗效。现有证据表明这种干预后对肛门功能有轻微影响。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/37023788/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 06 Apr 2023"}, {"id": "36894443", "title_en": "The Optimal Primary Treatment for Pediatric Perianal Abscess and Anal Fistula: A Systemic Review and Meta-Analysis", "title_zh": "小儿肛周脓肿和肛瘘的最佳初步治疗：系统评价和荟萃分析", "authors": "Hou-Chuan Chen", "abstract_en": "**Background:** Perianal abscesses and anal fistulas are common. The principle of intention-to-treat has not been considered in previous systemic reviews. Thus, the comparison between primary and post-recurrence management was confused, and the recommendation of primary treatment is obscure. The current study aims to identify the optimal initial treatment for pediatric patients.\n\n**Methods:** Using PRISMA guidelines, studies were identified from MEDLINE, EMBASE, PubMed, Cochrane Library, and Google Scholar without any language or study design restriction. The inclusion criteria include original articles or articles with original data, studies of management for a perianal abscess with or without anal fistula, and patient age of <18 years. Patients with local malignancy, Crohn's disease, or other underlying predisposing conditions were excluded. Studies without analyzing recurrence, case series of <5, and irrelevant articles were excluded in the screening stage. Of the 124 screened articles, 14 articles had no full texts or detailed information. Articles written in a language other than English or Mandarin were translated by Google Translation first and confirmed with native speakers. After the eligibility process, studies that compared identified primary managements were then included in the qualitative synthesis.\n\n**Results:** Thirty-one studies involving 2507 pediatric patients met the inclusion criteria. The study design consisted of two prospective case series of 47 patients and retrospective cohort studies. No randomized control trials were identified. Meta-analyses for recurrence after initial management were performed with a random-effects model. Conservative treatment and drainage revealed no difference (Odds ratio [OR], 1.222; 95% Confidential interval [CI]: 0.615-2.427, p = 0.567). Conservative management had a higher risk of recurrence than surgery without statistical significance (OR 0.278, 95% CI: 0.109-0.707, p = 0.007). Compared with incision/drainage, surgery can prevent recurrence remarkably (OR 4.360, 95% CI: 1.761-10.792, p = 0.001). Subgroup analysis of different approaches within conservative treatment and operation was not performed for lacking information.\n\n**Conclusion:** Strong recommendations cannot be made due to the lack of prospective or randomized controlled studies. However, the current study based on real primary management supports initial surgical intervention for pediatric patients with perianal abscesses and anal fistula to prevent recurrence.\n\n**Level Of Evidence:** Type of study: Systemic review; Evidence level: Level II.", "abstract_zh": "**背景：** 肛周脓肿和肛瘘很常见。以往的系统评价并未考虑意向治疗原则。因此，初级治疗和复发后治疗之间的比较是混乱的，初级治疗的建议也含糊不清。目前的研究旨在确定儿科患者的最佳初始治疗。\n\n**方法：** 使用 PRISMA 指南，从 MEDLINE、EMBASE、PubMed、Cochrane 图书馆和 Google Scholar 中识别研究，没有任何语言或研究设计限制。纳入标准包括原创文章或带有原始数据的文章、伴或不伴肛瘘的肛周脓肿的治疗研究以及患者年龄<18岁。患有局部恶性肿瘤、克罗恩病或其他潜在诱发因素的患者被排除在外。未分析复发的研究、病例系列<5和不相关的文章在筛选阶段被排除。在筛选的 124 篇文章中，有 14 篇文章没有全文或详细信息。用英语或普通话以外的语言撰写的文章首先通过谷歌翻译进行翻译，并与母语人士确认。资格审查结束后，对已确定的主要管理措施进行比较的研究随后被纳入定性综合。\n\n**结果：** 涉及 2507 名儿科患者的 31 项研究符合纳入标准。研究设计包括两个包含 47 名患者的前瞻性病例系列和回顾性队列研究。没有发现随机对照试验。使用随机效应模型对初始治疗后的复发进行荟萃分析。保守治疗和引流显示没有差异（优势比 [OR]，1.222；95% 置信区间 [CI]：0.615-2.427，p = 0.567）。保守治疗的复发风险高于手术，但无统计学意义（OR 0.278，95% CI：0.109-0.707，p = 0.007）。与切开/引流相比，手术可以显着预防复发（OR 4.360，95% CI：1.761-10.792，p = 0.001）。由于缺乏信息，未对保守治疗和手术中的不同方法进行亚组分析。\n\n**结论：** 由于缺乏前瞻性或随机对照研究，无法提出强烈建议。然而，目前基于真实初级管理的研究支持对肛周脓肿和肛瘘的儿科患者进行初步手术干预以预防复发。\n\n**Level of evidence：** 研究类型：系统评价；证据级别：II级。", "keywords_zh": "肛瘘，儿科，肛周脓肿，初级治疗", "keywords_en": "Anal fistula, Pediatric, Perianal abscess, Primary management", "link": "https://pubmed.ncbi.nlm.nih.gov/36894443/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 09 Mar 2023"}, {"id": "36794974", "title_en": "Mesenchymal Stem Cells Versus Placebo for Perianal Fistulizing Crohn's Disease: A Systemic Review and Meta-Analysis", "title_zh": "间充质干细胞与安慰剂治疗肛周瘘管性克罗恩病：系统评价和荟萃分析", "authors": "Minhao Yu", "abstract_en": "**Background:** Mesenchymal stem cells (MSCs)-based therapy for perianal fistulizing Crohn's disease (pfCD) has been extensively studies in the past decade. Its efficacy and safety had been preliminarily confirmed in some phase 2 or phase 3 clinical trials. This meta-analysis is performed to evaluate the efficacy and safety of MSCs-based therapy for pfCD.\n\n**Methods:** Electronic databases (Pubmed, Cochrane Library, Embase) were searched for studies that reported the efficacy and safety of MSCs. And RevMan were used to assess the efficacy and safety.\n\n**Results:** After screening, 5 randomized controlled trials (RCTs) were included in this meta-analysis. RevMan 5.4 for meta-analysis showed that: [Efficacy] Patients had definite remission after MSCs treatment, with an odds ratio (OR) of 2.06 (<i>P</i> < .0001, 95%CI 1.46, 2.89) vs controls. [Safety] The incidence of the most frequently reported TEAEs (treatment-emergent adverse events, TEAEs), perianal abscess and proctalgia, did not significantly increase due to the use of MSCs, with an OR of 1.07 in perianal abscess (<i>P</i> = .87, 95%CI 0.67, 1.72) vs controls, and an OR of 1.10 in proctalgia (<i>P</i> = .47, 95%CI 0.63, 1.92) vs controls.\n\n**Conclusions:** MSCs seem to be an effective and safe therapy for pfCD. MSCs based therapy has the potential to be used in combination with traditional therapies.", "abstract_zh": "**背景：** 在过去的十年中，基于间充质干细胞（MSC）的肛周瘘管克罗恩病（pfCD）疗法得到了广泛的研究。其有效性和安全性已在一些2期或3期临床试验中得到初步证实。进行这项荟萃分析是为了评估基于 MSC 的 pfCD 疗法的有效性和安全性。\n\n**方法：** 在电子数据库（Pubmed、Cochrane Library、Embase）中检索了报告 MSC 功效和安全性的研究。并用RevMan评估疗效和安全性。\n\n**结果：** 筛选后，5 项随机对照试验 (RCT) 纳入本荟萃分析。 RevMan 5.4荟萃分析显示：【疗效】MSCs治疗后患者获得明确缓解，与对照组相比，优势比（OR）为2.06（<i>P</i> < .0001，95%CI 1.46，2.89）。 [安全性] 最常报告的 TEAE（治疗引起的不良事件，TEAE）、肛周脓肿和直肠痛的发生率并未因使用 MSC 而显着增加，与对照组相比，肛周脓肿的 OR 为 1.07（<i>P</i> = .87, 95%CI 0.67, 1.72），直肠痛的 OR 为 1.10 (<i>P</i> = .47, 95%CI 0.63, 1.92) 与对照组相比。\n\n**结论：** MSC 似乎是治疗 pfCD 的有效且安全的疗法。基于间充质干细胞的疗法有可能与传统疗法结合使用。", "keywords_zh": "间充质干细胞，荟萃分析，肛周瘘管克罗恩病", "keywords_en": "mesenchymal stem cells, meta-analysis, perianal fistulizing Crohn’s disease", "link": "https://pubmed.ncbi.nlm.nih.gov/36794974/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 16 Feb 2023"}, {"id": "34792604", "title_en": "Epidemiology and Natural History of Perianal Crohn's Disease: A Systematic Review and Meta-Analysis of Population-Based Cohorts", "title_zh": "肛周克罗恩病的流行病学和自然史：基于人群的系统回顾和荟萃分析", "authors": "Siddharth Singh", "abstract_en": "**Background And Aims:** Perianal Crohn's disease (pCD) is a potentially severe phenotype of CD. We conducted a systematic review with meta-analysis to estimate cumulative incidence, risk factors, and outcomes of pCD in population-based cohort studies.\n\n**Methods:** Through a systematic literature review through March 1, 2021, we identified population-based inception cohort studies reporting cumulative incidence of perianal disease (primarily abscess and/or fistula) in patients with CD. We estimated the cumulative incidence of pCD at presentation and 1-, 5-, and 10-year follow-up, and risk factors for perianal disease and outcomes including risk of major (bowel resection, proctectomy, ostomy) and minor perianal (incision and drainage, seton placement, etc.) surgery.\n\n**Results:** In 12 population-based studies, prevalence of pCD was 18.7% (95% confidence interval [CI], 12.5%-27.0%) with 1-, 5-, and 10-year risk of perianal disease being 14.3% (95% CI, 7.9%-24.6%), 17.6% (95% CI, 11.3%-26.5%), and 18.9% (95% CI, 15.0%-23.4%), respectively. Approximately 11.5% of patients (95% CI, 6.7%-19.0%) had perianal disease at or before CD diagnosis. Colonic disease location and rectal involvement were associated with higher risk of pCD. Overall, 63.3% of patients (95% CI, 53.3-72.3) required minor perianal surgery and 6.4% of patients (95% CI, 1.8%-20.6%) required major abdominal surgery for pCD. Use of biologic therapy for pCD is common and has steadily increased throughout the years.\n\n**Conclusions:** Approximately 1 in 5 patients with CD develops perianal disease within 10 years of CD diagnosis, including 11.5% who have perianal disease at presentation. Approximately two-thirds of patients require perianal surgery, with a smaller fraction requiring major abdominal surgery.", "abstract_zh": "**Background and aims：** 肛周克罗恩病 (pCD) 是一种潜在的严重克罗恩病表型。我们通过荟萃分析进行了系统回顾，以估计基于人群的队列研究中 pCD 的累积发病率、危险因素和结果。\n\n**方法：** 通过截至 2021 年 3 月 1 日的系统文献回顾，我们确定了基于人群的初始队列研究，报告了 CD 患者肛周疾病（主要是脓肿和/或瘘管）的累积发病率。我们估计了就诊时以及 1 年、5 年和 10 年随访时的 pCD 累积发生率，以及肛周疾病和结局的危险因素，包括大手术（肠切除、直肠切除术、造口术）和小肛周手术（切开引流、挂线放置等）的风险。\n\n**结果：** 在 12 项基于人群的研究中，pCD 的患病率为 18.7%（95% 置信区间 [CI]，12.5%-27.0%），肛周疾病的 1 年、5 年和 10 年风险分别为 14.3%（95% CI，7.9%-24.6%）、17.6%（95% CI，11.3%-26.5%）和分别为 18.9%（95% CI，15.0%-23.4%）。大约 11.5% 的患者 (95% CI, 6.7%-19.0%) 在 CD 诊断时或之前患有肛周疾病。结肠疾病部位和直肠受累与较高的 pCD 风险相关。总体而言，63.3% 的患者 (95% CI, 53.3-72.3) 需要进行小型肛周手术，6.4% 的患者 (95% CI, 1.8%-20.6%) 需要针对 pCD 进行腹部大手术。使用生物疗法治疗 pCD 很常见，并且多年来一直在稳步增加。\n\n**结论：** 大约五分之一的 CD 患者在 CD 诊断后 10 年内出现肛周疾病，其中 11.5% 就诊时患有肛周疾病。大约三分之二的患者需要进行肛周手术，一小部分患者需要进行腹部大手术。", "keywords_zh": "蒙特利尔分类，抗 TNF，流行病学，瘘管，自然史", "keywords_en": "Montreal classification, anti-TNF, epidemiology, fistula, natural history", "link": "https://pubmed.ncbi.nlm.nih.gov/34792604/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 18 Nov 2021"}, {"id": "34792583", "title_en": "Strategies to Distinguish Perianal Fistulas Related to Crohn's Disease From Cryptoglandular Disease: Systematic Review With Meta-Analysis", "title_zh": "区分与克罗恩病相关的肛周瘘和隐腺疾病的策略：荟萃分析的系统评价", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background:** Management of perianal fistulas differs based on fistula type. We aimed to assess the ability of diagnostic strategies to differentiate between Crohn's disease (CD) and cryptoglandular disease (CGD) in patients with perianal fistulas.\n\n**Methods:** We performed a diagnostic accuracy systematic review and meta-analysis. A systematic search of electronic databases was performed from inception through February 2021 for studies assessing a diagnostic test's ability to distinguish fistula types. We calculated weighted summary estimates with 95% confidence intervals for sensitivity and specificity by bivariate analysis, using fixed effects models when data were available from 2 or more studies. The Quality Assessment of Diagnostic Accuracy Studies tool was used to assess study quality.\n\n**Results:** Twenty-one studies were identified and included clinical symptoms (2 studies; n=154), magnetic resonance imaging (MRI) characteristics (3 studies; n=296), ultrasound characteristics (7 studies; n=1003), video capsule endoscopy (2 studies; n=44), fecal calprotectin (1 study; n=56), and various biomarkers (8 studies; n=440). MRI and ultrasound characteristics had the most robust data. Rectal inflammation, multiple-branched fistula tracts, and abscesses on pelvic MRI and the Crohn's ultrasound fistula sign, fistula debris, and bifurcated fistulas on pelvic ultrasonography had high specificity (range, 80%-95% vs 89%-96%) but poor sensitivity (range, 17%-37% vs 31%-63%), respectively. Fourteen of 21 studies had risk of bias on at least 1 of the Quality Assessment of Diagnostic Accuracy Studies domains.\n\n**Conclusions:** Limited high-quality evidence suggest that imaging characteristics may help discriminate CD from CGD in patients with perianal fistulas. Larger, prospective studies are needed to confirm these findings and to evaluate if combining multiple diagnostic tests can improve diagnostic sensitivity.", "abstract_zh": "**背景：** 肛周瘘的治疗根据瘘管类型的不同而有所不同。我们的目的是评估诊断策略区分肛周瘘患者克罗恩病（CD）和隐腺病（CGD）的能力。\n\n**方法：** 我们进行了诊断准确性系统评价和荟萃分析。从一开始到 2021 年 2 月，我们对电子数据库进行了系统搜索，以评估诊断测试区分瘘管类型的能力。当数据来自 2 项或更多研究时，我们使用固定效应模型，通过双变量分析计算了灵敏度和特异性的 95% 置信区间的加权汇总估计值。诊断准确性研究质量评估工具用于评估研究质量。\n\n**结果：** 确定了 21 项研究，包括临床症状（2 项研究；n=154）、磁共振成像 (MRI) 特征（3 项研究；n=296）、超声特征（7 项研究；n=1003）、视频胶囊内窥镜检查（2 项研究；n=44）、粪便钙卫蛋白（1 项研究；n=56）和各种生物标志物（8 项研究；n=440）。 MRI 和超声特征拥有最可靠的数据。盆腔 MRI 上的直肠炎症、多分支瘘管和脓肿以及盆腔超声检查上的克罗恩氏超声瘘征、瘘管碎片和分叉瘘的特异性较高（范围，80%-95% vs 89%-96%），但敏感性较差（范围，17%-37% vs 31%-63%）。 21 项研究中有 14 项在至少 1 个诊断准确性研究质量评估领域存在偏倚风险。\n\n**结论：** 有限的高质量证据表明，影像学特征可能有助于区分肛周瘘患者的 CD 和 CGD。需要更大规模的前瞻性研究来证实这些发现，并评估结合多种诊断测试是否可以提高诊断灵敏度。", "keywords_zh": "隐腺疾病、肛瘘、肛周疾病", "keywords_en": "cryptoglandular disease, fistula-in-ano, perianal disease", "link": "https://pubmed.ncbi.nlm.nih.gov/34792583/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Thu, 18 Nov 2021"}, {"id": "34628909", "title_en": "A systematic review and meta-analysis of incision and seton drainage in the treatment of high perianal abscess", "title_zh": "切开挂线引流治疗高位肛周脓肿的系统评价和荟萃分析", "authors": "Lihua Zheng", "abstract_en": "**Background:** Surgery is the clinically preferred treatment for high perianal abscesses. Incision and seton drainage improve the cure rate and reduce recurrence. We aimed to systematically evaluate the clinical effect and safety of incision and seton drainage in the treatment of high perianal abscess.\n\n**Methods:** China Knowledge Network (CNKI), WanFang database, VIP database, PubMed, and Cochrane Library were searched and all relevant Chinese and English language documents until July 2021were retrieved. All records that described randomized clinical trials (RCTs) of incision and seton drainage for the treatment of high perianal abscess were eligible. Documents that met the inclusion criteria were evaluated for bias using the Cochrane Collaboration Risk Evaluation Standard, and Revman5.4 software was used to analyze the data.\n\n**Results:** Fourteen RCTs were included. The results of nine studies showed that the clinical cure rate of the incision-seton group was higher than that of the incision-drainage group (P<0.05). Seven studies showed that the wound healing time of the incision-seton group was shorter than that of the incision-drainage group (P<0.05). Four studies showed that the visual analogue scale (VAS) score of the incision-seton group was lower than that of the incision-drainage group (P<0.05). Five studies showed that the Wexner score of the incision-seton group was lower than that of the incision-drainage group (P<0.05). Six studies showed that the formation rate of anal fistula in the incision-seton group was lower than that in the incision-drainage group (P<0.05). Six studies demonstrated that the recurrence rate of abscess in the incision-seton group was lower than that in the incision-drainage group (P<0.05). Seven studies showed that the incidence of adverse events in the incision-seton group was lower than that in the incision-drainage group (P<0.05). Five studies demonstrated that the length of stay in the incision-seton group was shorter than that of the incision-drainage group (P<0.05).\n\n**Discussion:** The choice of surgical methods in clinical research has always been controversial. The incision-seton method can effectively and safely treat high perianal abscess. However, the results of this meta-analysis still leave some gaps in the evidence. More large-sample, high-quality, and multi-center RCTs are needed.", "abstract_zh": "**背景：** 手术是临床上治疗高位肛周脓肿的首选治疗方法。切开挂线引流提高治愈率，减少复发。我们的目的是系统评价切开挂线引流治疗高位肛周脓肿的临床效果和安全性。\n\n**方法：** 检索中国知网（CNKI）、万方数据库、维普数据库、PubMed、Cochrane图书馆，检索到2021年7月为止的所有相关中英文文献。所有描述切开挂线引流治疗高位肛周脓肿的随机临床试验 (RCT) 的记录均符合资格。使用Cochrane协作风险评估标准对符合纳入标准的文献进行偏倚评估，并使用Revman5.4软件对数据进行分析。\n\n**结果：** 其中包括 14 项随机对照试验。 9项研究结果显示切开挂线组临床治愈率高于切开引流组（P<0.05）。 7项研究显示切开挂线组伤口愈合时间短于切开引流组（P<0.05）。 4项研究显示切开挂线组视觉模拟评分（VAS）低于切开引流组（P<0.05）。 5项研究显示切开挂线组Wexner评分低于切开引流组（P<0.05）。 6项研究显示切开挂线组肛瘘形成率低于切开引流组（P<0.05）。 6项研究显示切开挂线组脓肿复发率低于切开引流组（P<0.05）。 7项研究显示切开挂线组不良事件发生率低于切开引流组（P<0.05）。 5项研究显示切开挂线组的住院时间短于切开引流组（P<0.05）。\n\n**讨论：** 临床研究中手术方式的选择一直存在争议。切开挂线法可以有效、安全地治疗高位肛周脓肿。然而，这项荟萃分析的结果仍然在证据上留下了一些空白。需要更多大样本、高质量、多中心的随机对照试验。", "keywords_zh": "切开挂线治疗，高位肛周脓肿，切开引流治疗，Meta分析", "keywords_en": "Incision-seton therapy, high perianal abscess, incision-drainage therapy, meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/34628909/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260303212611&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Oct 2021"}], "肛瘘": [{"id": "41714221", "title_en": "Diagnostic Performance of Three-Dimensional Endoanal Ultrasound Compared with MRI in Anal Fistula: A Systematic Review and Meta-analysis", "title_zh": "三维肛门内超声与
