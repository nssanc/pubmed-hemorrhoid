20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 16 Mar 2024"}, {"id": "38475976", "title_en": "Martius flaps for low rectovaginal fistulae: a systematic review and proportional meta-analysis", "title_zh": "Martius 皮瓣治疗低位直肠阴道瘘：系统评价和比例荟萃分析", "authors": "Shaheel Mohammad Sahebally", "abstract_en": "**Background:** Rectovaginal fistulae (RVF) are notoriously challenging to treat. Martius flap (MF) is a technique employed to manage RVF, among various others, with none being universally successful. We aimed to assess the outcomes of RVF managed with MF interposition.\n\n**Methods:** A PRISMA-compliant meta-analysis searching for all studies specifically reporting on the outcomes of MF for RVF was performed. The primary objective was the mean success rate, whilst secondary objectives included complications and recurrence. The MedCalc software (version 20.118) was used to conduct proportional meta-analyses of data. Weighted mean values with 95% CI are presented and stratified according to aetiology where possible.\n\n**Results:** Twelve non-randomized (11 retrospective, 1 prospective) studies, assessing 137 MF were included. The mean age of the study population was 42.4 (±15.7), years. There were 44 primary and 93 recurrent RVF. The weighted mean success rate for MF when performed for primary RVF was 91.4% (95% CI: 79.45-98.46; I<sup>2</sup> = 32.1%; P = 0.183) and that for recurrent RVF was 77.5% (95% CI: 62.24-89.67; I<sup>2</sup> = 58.1%; P = 0.008). The weighted mean complication rate was 29% (95% CI: 8.98-54.68; I<sup>2</sup> = 85.4%; P < 0.0001) and the overall recurrence rate was 12.0% (95% CI: 5.03-21.93; I<sup>2</sup> = 52.3%; P = 0.021). When purely radiotherapy-induced RVF were evaluated, the mean overall success rate was 94.6% (95% CI: 83.33-99.75; I<sup>2</sup> = 0%; P = 0.350).\n\n**Conclusions:** MF interposition appears to be more effective for primary than recurrent RVF. However, the poor quality of the data limits definitive conclusions being drawn and demands further assessment with randomized studies.", "abstract_zh": "**背景：** 众所周知，直肠阴道瘘（RVF）的治疗具有挑战性。 Martius 皮瓣 (MF) 是一种用于治疗 RVF 的技术，但没有一种技术能够普遍成功。我们的目的是评估 MF 干预治疗 RVF 的结果。\n\n**方法：** 进行了符合 PRISMA 标准的荟萃分析，搜索了专门报告 MF 治疗 RVF 结果的所有研究。主要目标是平均成功率，次要目标包括并发症和复发。 MedCalc 软件（版本 20.118）用于对数据进行比例荟萃分析。呈现 95% CI 的加权平均值，并尽可能根据病因进行分层。\n\n**结果：** 纳入了 12 项非随机研究（11 项回顾性研究，1 项前瞻性研究），评估了 137 例 MF。研究人群的平均年龄为 42.4 (±15.7) 岁。其中 44 例为原发性 RVF，93 例为复发性 RVF。原发性 RVF 的 MF 加权平均成功率为 91.4%（95% CI：79.45-98.46；I<sup>2</sup> = 32.1%；P = 0.183），复发性 RVF 的加权平均成功率为 77.5%（95% CI：62.24-89.67；I<sup>2</sup> = 32.1%；P = 0.183）。 I<sup>2</sup> = 58.1%；P = 0.008)。加权平均并发症率为29%（95% CI：8.98-54.68；I<sup>2</sup> = 85.4%；P < 0.0001），总复发率为12.0%（95% CI：5.03-21.93；I<sup>2</sup> = 85.4%；P < 0.0001）。 I<sup>2</sup> = 52.3%；P = 0.021）。当评估单纯放疗引起的RVF时，平均总体成功率为94.6%（95% CI：83.33-99.75；I<sup>2</sup> = 0%；P = 0.350）。\n\n**结论：** MF 干预对于原发性 RVF 似乎比复发性 RVF 更有效。然而，数据质量差限制了得出明确的结论，需要通过随机研究进行进一步评估。", "keywords_zh": "并发症、瘘管、原发性、直肠阴道、复发、成功", "keywords_en": "complication, fistula, primary, rectovaginal, recurrence, success", "link": "https://pubmed.ncbi.nlm.nih.gov/38475976/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 13 Mar 2024"}, {"id": "38315695", "title_en": "Obstetric fistula repair failure and its associated factors among women who underwent repair in sub-Saharan Africa. A systematic review and meta-analysis", "title_zh": "撒哈拉以南非洲接受修复的妇女产科瘘修复失败及其相关因素。系统回顾和荟萃分析", "authors": "Mesfin Abebe", "abstract_en": "**Background:** Obstetric fistula repair failure can result in increased depression, social isolation, financial burden for the woman, and fistula care programs. However, there is limited, comprehensive evidence on obstetric fistula repair failure in Sub-Saharan African countries. This systematic review and meta-analysis aimed to determine the pooled prevalence of obstetric fistula repair failure and associated factors among women who underwent surgical repair in Sub-Saharan African countries.\n\n**Methods:** To identify potential articles, a systematic search was done utilizing online databases (PubMed, Hinari, and Google Scholar). The Preferred Reporting Items for Systematic Review and Meta-Analysis Statement (PRISMA) guideline was used to report the review's findings. I2 test statistics were employed to examine study heterogeneity. A random-effects model was used to assess the pooled prevalence of obstetric fistula repair failure, and the association was determined using the log odds ratio. Publication bias was investigated using the funnel plot and Egger's statistical test at the 5% level of significance. Meta-regression and subgroup analysis were done to identify potential sources of heterogeneity. The data were analyzed using STATA version 17 statistical software.\n\n**Results:** A total of 24 articles with 9866 study participants from 13 Sub-Saharan African countries were included in this meta-analysis. The pooled prevalence of obstetric fistula repair failure in sub-Saharan Africa was 24.92% [95% CI: 20.34-29.50%]. The sub-group analysis by country revealed that the highest prevalence was in Angola (58%, 95% CI: 53.20-62.80%) and the lowest in Rwanda (13.9, 95% CI: 9.79-18.01%). Total urethral damage [OR  =  3.50, 95% CI: 2.09, 4.91], large fistula [OR = 3.09, 95% CI: (2.00, 4.10)], duration of labor [OR = 0.45, 95% CI: 0.27, 0.76], and previous fistula repair [OR = 2.70, 95% CI: 1.94, 3.45] were factors associated with obstetric fistula repair failure.\n\n**Conclusion:** Women who received surgical treatment for obstetric fistulas in Sub-Saharan African countries experienced more repair failures than the WHO standards. Obstetric fistula repair failure was affected by urethral damage, fistula size, duration of labor, types of fistula, and history of previous repairs. Therefore, we suggest policy measures specific to each country to provide special attention to the prevention of all risk factors, including poor nutrition, multiparty, obstructed labor, and maternal age, which can result in conditions like large fistulas, urethral damage, and repeat repair, in order to reduce obstetric fistula repair failure.", "abstract_zh": "**背景：** 产科瘘管修复失败可能会导致抑郁、社会孤立、女性经济负担以及瘘管护理计划的增加。然而，关于撒哈拉以南非洲国家产科瘘修复失败的全面证据有限。这项系统回顾和荟萃分析旨在确定撒哈拉以南非洲国家接受手术修复的妇女中产科瘘管修复失败的汇总患病率和相关因素。\n\n**方法：** 为了识别潜在的文章，利用在线数据库（PubMed、Hinari 和 Google Scholar）进行了系统搜索。系统评价和荟萃分析声明的首选报告项目 (PRISMA) 指南用于报告评价结果。 I2 检验统计数据用于检查研究异质性。使用随机效应模型评估产科瘘修复失败的汇总患病率，并使用对数比值比确定相关性。使用漏斗图和 Egger 统计检验在 5% 显着性水平上调查发表偏倚。进行荟萃回归和亚组分析以确定异质性的潜在来源。使用STATA 17版统计软件对数据进行分析。\n\n**结果：** 本次荟萃分析共纳入 24 篇文章，涉及来自 13 个撒哈拉以南非洲国家的 9866 名研究参与者。撒哈拉以南非洲地区产科瘘管修复失败的汇总患病率为 24.92% [95% CI: 20.34-29.50%]。按国家进行的亚组分析显示，患病率最高的是安哥拉（58%，95% CI：53.20-62.80%），最低的是卢旺达（13.9，95% CI：9.79-18.01%）。尿道总损伤 [OR  =  3.50, 95% CI: 2.09, 4.91]、大瘘管 [OR = 3.09, 95% CI: (2.00, 4.10)]、产程持续时间 [OR = 0.45, 95% CI: 0.27, 0.76] 和既往瘘管修复术 [OR = 2.70, 95% CI: 1.94, 3.45] 是与产科瘘修复失败相关的因素。\n\n**结论：** 在撒哈拉以南非洲国家接受产科瘘手术治疗的妇女经历的修复失败率高于世界卫生组织的标准。产科瘘管修复失败受尿道损伤、瘘管大小、产程持续时间、瘘管类型和既往修复史的影响。因此，我们建议针对每个国家采取具体的政策措施，特别关注预防所有风险因素，包括营养不良、多方、难产和产妇年龄，这些因素可能导致瘘管大、尿道损伤和重复修复等情况，以减少产科瘘管修复失败。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/38315695/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 05 Feb 2024"}, {"id": "38296841", "title_en": "The use of core descriptors from the ENiGMA code study in recent literature: a systematic review", "title_zh": "最近文献中 ENiGMA 代码研究的核心描述符的使用：系统回顾", "authors": "Sharon L Stein", "abstract_en": "**Aim:** The heterogeneity in data quality presented in studies regarding Crohn's anal fistula (CAF) limit extrapolation into clinical practice. The ENiGMA collaborators established a core descriptor set to standardize reporting of CAF. The aim of this work was to quantify the use of these descriptors in recent literature.\n\n**Method:** We completed a systematic review of PubMed and the Cochrane Library, extracting publications from the past 10 years specific to the clinical interventions and outcomes of CAF, and reported in line with PRISMA guidance. Each article was assessed for inclusion of ENiGMA descriptors. The median number of descriptors per publication was evaluated along with the overall frequency of each individual descriptor. Use of ENiGMA descriptors was compared between medical and procedural publications.\n\n**Results:** Ninety publications were included. The median number of descriptors was 15 of 37; 16 descriptors were used in over half of the publications while 17 were used in fewer than a third. Descriptors were more frequently used in procedural (n = 16) than medical publications (n = 14) (p = 0.031). In procedural publications, eight descriptors were more frequently used including Faecal incontinence, Number of previous fistula interventions, Presence and severity of anorectal stenosis and Current proctitis. Medical publications were more likely to include Previous response to biological therapy and Duration and type of current course of biological therapy.\n\n**Conclusion:** With many descriptors being used infrequently and variations between medical and procedural literature, the colorectal community should assess the need for all 37 descriptors.", "abstract_zh": "**Aim：** 有关克罗恩病肛瘘 (CAF) 的研究中数据质量的异质性限制了外推到临床实践。 ENiGMA 合作者建立了一个核心描述符集来标准化 CAF 报告。这项工作的目的是量化这些描述符在最近文献中的使用。\n\n**Method：** 我们完成了对 PubMed 和 Cochrane 图书馆的系统回顾，提取了过去 10 年针对 CAF 临床干预和结果的出版物，并根据 PRISMA 指南进行报告。每篇文章都经过评估以包含 ENiGMA 描述符。每个出版物的描述符中位数以及每个单独描述符的总体频率进行了评估。对医学出版物和程序出版物中 ENiGMA 描述符的使用进行了比较。\n\n**结果：** 其中包括九十种出版物。描述符数量中位数为 37 个中的 15 个；超过一半的出版物使用了 16 个描述符，而不到三分之一的出版物使用了 17 个描述符。描述符在程序性出版物 (n = 16) 中的使用频率高于医学出版物 (n = 14) (p = 0.031)。在程序性出版物中，八个描述词被更频繁地使用，包括大便失禁、既往瘘管干预次数、肛门直肠狭窄的存在和严重程度以及当前直肠炎。医学出版物更有可能包括以前对生物治疗的反应以及当前生物治疗过程的持续时间和类型。\n\n**结论：** 由于许多描述符很少使用，并且医学和程序文献之间存在差异，结直肠社区应评估所有 37 个描述符的需求。", "keywords_zh": "核心描述符集、克罗恩病肛周瘘、多学科护理、生活质量", "keywords_en": "core descriptor set, crohn’s perianal fistulae, multidisciplinary care, quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/38296841/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 31 Jan 2024"}, {"id": "38197847", "title_en": "Efficacy and safety of video-assisted anal fistula treatment in anorectal fistula: a meta-analysis", "title_zh": "视频辅助肛瘘治疗肛肠瘘的疗效和安全性：荟萃分析", "authors": "Xuebing Wang", "abstract_en": "**Introduction:** By searching relevant literature, the recurrence rate, complication rate after video-assisted anal fistula treatment (VAAFT), and efficacy and safety of the treatment were analyzed.\n\n**Evidence Acquisition:** Articles that reported the outcomes of VAAFT up to December 2020 were searched in PubMed (Medline) and Cochrane Library, in accordance with the preferred reporting items for systematic review and meta-analysis (PRISMA) screening guidelines. Two researchers independently completed the whole process from screening and inclusion to quality evaluation and bias risk assessment, and the data was included in the RevMan 5.3 software for analysis. The main outcomes were demographic data of patients, detection rate, classification of internal opening of anorectal fistula, postoperative recurrence rate, and incidence of complications.\n\n**Evidence Synthesis:** A total of 10 articles were included (779 patients). The average age of the patients was 44 years old, average operation time was 60 min, and the average follow-up time was 22 months. The ratio of male to female was 2.4:1, the ratio of high anorectal fistula to low anorectal fistula was 6.6:1, the detection rate of internal openings was 98%, the weighted recurrence rate was 24%, and the weighted complication rate was 1%.\n\n**Conclusions:** VAAFT is effective and safe in the treatment of anorectal fistulas.", "abstract_zh": "**介绍：** 通过检索相关文献，分析视频辅助肛瘘治疗（VAAFT）后的复发率、并发症发生率以及治疗的有效性和安全性。\n\n**Evidence acquisition：** 根据系统评价和荟萃分析 (PRISMA) 筛选指南的首选报告项目，在 PubMed (Medline) 和 Cochrane 图书馆中检索了报告截至 2020 年 12 月 VAAFT 结果的文章。两名研究人员独立完成了从筛选、纳入到质量评价和偏倚风险评估的全过程，数据纳入RevMan 5.3软件进行分析。主要结局指标为患者人口学资料、检出率、肛直肠瘘内口分类、术后复发率及并发症发生率。\n\n**Evidence synthesis：** 总共纳入 10 篇文章（779 名患者）。患者平均年龄44岁，平均手术时间60分钟，平均随访时间22个月。男女比例为2.4:1，高位肛瘘与低位肛瘘比例为6.6:1，内口检出率为98%，加权复发率为24%，加权并发症率为1%。\n\n**结论：** VAAFT治疗肛门直肠瘘有效且安全。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/38197847/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 10 Jan 2024"}, {"id": "38126903", "title_en": "Scoring Indices for Perianal Fistulising Crohn's Disease: A Systematic Review", "title_zh": "肛周瘘管克罗恩病评分指数：系统评价", "authors": "Vipul Jairath", "abstract_en": "**Background And Aims:** In this systematic review we summarise existing scoring indices for assessing disease activity and quality of life in perianal fistulising Crohn's disease [PFCD], and highlight gaps in the literature.\n\n**Methods:** MEDLINE, EMBASE, and CENTRAL were searched from August 24, 2022, to identify studies evaluating clinical, radiological, or patient-reported outcome measures [PROMS] in PFCD. The primary objective was to identify all available scoring indices and describe the operating properties of these indices.\n\n**Results:** A total of 53 studies reported on the use of one clinical index [Perianal Disease Activity Index: PDAI], three PROMs, and 10 radiological indices; 25 studies evaluated the operating properties of these indices. The PDAI demonstrated content validity, construct validity, and responsiveness but criterion validity or reliability were not assessed. The Van Assche Index [VAI], modified VAI, and the Magnetic Resonance Index for Assessing Fistulas in Patients with CD [MAGNIFI-CD] were the most studied radiological indices. These indices demonstrated responsiveness and reliability. The VAI and MAGNIFI-CD demonstrated construct validity; criterion and content validity and feasibility have not been assessed. Among the three PROMs, the Crohn's Anal Fistula Quality of Life index demonstrated content and construct validity, inter-observer reliability, and responsiveness; criterion validity, intra-observer reliability, and feasibility have not been assessed for this index.\n\n**Conclusions:** There are no fully valid, reliable, and responsive clinical disease or radiological indices for PFCD. Although the radiological indices demonstrated responsiveness and reliability, well-defined cut-offs for response and remission are lacking. Future research should focus on establishing standardised definitions and thresholds for outcomes.", "abstract_zh": "**Background and aims：** 在这篇系统综述中，我们总结了评估肛周瘘管克罗恩病 [PFCD] 疾病活动性和生活质量的现有评分指数，并强调了文献中的空白。\n\n**方法：** 自 2022 年 8 月 24 日起对 MEDLINE、EMBASE 和 CENTRAL 进行检索，以确定评估 PFCD 临床、放射学或患者报告结果测量 [PROMS] 的研究。主要目标是确定所有可用的评分指数并描述这些指数的操作属性。\n\n**结果：** 共有 53 项研究报告了一项临床指标[肛周疾病活动指数：PDAI]、三项 PROM 和 10 项放射学指标的使用； 25 项研究评估了这些指数的操作特性。 PDAI 证明了内容有效性、结构有效性和响应性，但未评估标准有效性或可靠性。 Van Assche 指数 [VAI]、改良 VAI 和评估 CD 患者瘘管的磁共振指数 [MAGNIFI-CD] 是研究最多的放射学指数。这些指数显示了响应性和可靠性。 VAI 和 MAGNIFI-CD 证明了结构有效性；标准和内容的有效性和可行性尚未评估。在三个 PROM 中，克罗恩病肛瘘生活质量指数展示了内容和结构的有效性、观察者间的可靠性和响应性；尚未评估该指数的标准有效性、观察者内部可靠性和可行性。\n\n**结论：** PFCD 尚无完全有效、可靠且有反应的临床疾病或放射学指标。尽管放射学指标显示出反应性和可靠性，但缺乏明确的反应和缓解界限。未来的研究应侧重于建立结果的标准化定义和阈值。", "keywords_zh": "结果、疾病活动指数、操作特性、生活质量", "keywords_en": "Outcomes, disease activity indices, operating properties, quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/38126903/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 21 Dec 2023"}, {"id": "38091125", "title_en": "Cutting seton for the treatment of cryptoglandular fistula-in-ano: a systematic review and meta-analysis", "title_zh": "切割挂线治疗肛门隐窝瘘：系统评价和荟萃分析", "authors": "C Eskicioglu", "abstract_en": "**Background:** The use of cutting seton (CS) for the management of cryptoglandular fistula-in-ano has remained controversial because of reports of fecal incontinence, postoperative pain, and extended healing time. The aim of this review was to provide the first synthesis of studies investigating the use of CS for the treatment of cryptoglandular fistula-in-ano.\n\n**Methods:** MEDLINE, Embase, and CENTRAL were searched up to October 2022. Randomized controlled trials and observational studies comparing CS with alternative interventions were included, along with single-arm studies evaluating CS alone. The primary outcome was fistula-in-ano recurrence, and secondary outcomes included incontinence, healing time, proportion with complete healing, and postoperative pain. Inverse variance random-effects meta-analyses were used to pool effect estimates.\n\n**Results:** After screening 661 citations, 29 studies were included. Overall, 1513 patients undergoing CS (18.8% female, mean age: 43.1 years) were included. Patients with CS had a 6% (95% CI: 3-12%) risk of recurrence and a 16% (95% CI: 5-38%) risk of incontinence at 6 months. CS patients had an average healing time of 14.6 weeks (95% CI: 10-19 weeks) with 73% (95% CI: 48-89%) of patients achieving complete healing at 6 months postoperatively. There was no difference in recurrence between CS and fistulotomy, advancement flap, two-stage seton fistulotomy, or draining seton.\n\n**Conclusions:** Overall, this analysis shows that CS has comparable recurrence and incontinence rates to other modalities. However, this may be at the expense of more postoperative pain and extended healing time. Further comparative studies between CS and other modalities are warranted.", "abstract_zh": "**背景：** 由于大便失禁、术后疼痛和愈合时间延长的报道，使用切割挂线（CS）治疗肛门隐窝瘘仍存在争议。本综述的目的是首次综合研究使用 CS 治疗隐窝腺瘘的研究。\n\n**方法：** MEDLINE、Embase 和 CENTRAL 的检索截止日期为 2022 年 10 月。其中包括比较 CS 与替代干预措施的随机对照试验和观察性研究，以及单独评估 CS 的单臂研究。主要结局是肛瘘复发，次要结局包括失禁、愈合时间、完全愈合比例和术后疼痛。使用逆方差随机效应荟萃分析来汇总效应估计。\n\n**结果：** 筛选了 661 条引用后，纳入了 29 项研究。总体而言，纳入了 1513 名接受 CS 的患者（18.8% 为女性，平均年龄：43.1 岁）。 CS 患者在 6 个月时复发风险为 6%（95% CI：3-12%），失禁风险为 16%（95% CI：5-38%）。 CS 患者的平均愈合时间为 14.6 周（95% CI：10-19 周），其中 73%（95% CI：48-89%）的患者在术后 6 个月时实现完全愈合。 CS与瘘管切开术、推进皮瓣、两阶段挂线瘘管切开术或引流挂线之间的复发率没有差异。\n\n**结论：** 总体而言，该分析表明，CS 的复发率和失禁率与其他治疗方式相当。然而，这可能会以更多的术后疼痛和更长的愈合时间为代价。需要对 CS 和其他方式进行进一步的比较研究。", "keywords_zh": "肛肠瘘、结直肠手术、隐腺瘘、切割挂线、肛瘘", "keywords_en": "Anorectal fistula, Colorectal surgery, Cryptoglandular fistula, Cutting seton, Fistula-in-ano", "link": "https://pubmed.ncbi.nlm.nih.gov/38091125/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 13 Dec 2023"}, {"id": "38018554", "title_en": "FISTULIZING PERIANAL CROHN'S DISEASE: IS THE PATIENT'S SEX A BURDEN? A SYSTEMATIC REVIEW", "title_zh": "肛周瘘管克罗恩病：患者的性别是一种负担吗？系统回顾", "authors": "Odery Ramos Júnior", "abstract_en": "**Background:** Fistulizing perianal Crohn's disease poses a treatment challenge, and researchers postulate that this phenotype in young male patients could have a worst outcome.\n\n**Objective:** Thus, the aim of this study was to assess whether sex influences the response to treatment for these patients.\n\n**Methods:** This systematic review (PROSPERO CRD42022319629) was conducted in accordance with the Preferred Reporting Items for Systematic Reviews and Meta-Analyses protocol. We selected articles published in English, Spanish, Portuguese, and Italian between 2010 and 2020 in the PubMed and Science Direct databases. According to the PICO acronym, prospective studies in patients older than 18 years with the objective of treating fistulizing perianal Crohn's disease were selected. Studies in pediatric populations, retrospective, without treatment objectives, and that included only rectovaginal fistulas or a single sex were excluded. Study quality was assessed using the Cochrane risk of bias tool and Newcastle-Ottawa scale.\n\n**Results:** Of the 1887 articles found, 33 were included. Most studies used anti-TNF drugs as treatment (n=11). Ten studies had subgroup analyses; of them, the two studies reporting sex differences used infliximab and adalimumab as treatment and showed that women had a longer fistula closure time than men.\n\n**Conclusion:** This systematic review showed that few data corroborate the difference between sexes in the treatment of fistulizing perianal Crohn's disease, possibly having a greater relationship with the phenotype. However, considering the lack of results, further studies with this objective and with standardization of fistulas and response assessment methods are needed.", "abstract_zh": "**背景：** 肛周瘘管克罗恩病给治疗带来了挑战，研究人员推测，年轻男性患者的这种表型可能会产生最糟糕的结果。\n\n**目的：** 因此，本研究的目的是评估性别是否影响这些患者对治疗的反应。\n\n**方法：** 本系统评价（PROSPERO CRD42022319629）是根据系统评价和荟萃分析协议的首选报告项目进行的。我们选择了 2010 年至 2020 年间在 PubMed 和 Science Direct 数据库中以英语、西班牙语、葡萄牙语和意大利语发表的文章。根据 PICO 缩写，选择了针对 18 岁以上患者的前瞻性研究，目的是治疗肛周瘘管克罗恩病。对儿科人群进行的回顾性研究、无治疗目标且仅包括直肠阴道瘘或单一性别的研究被排除在外。使用 Cochrane 偏倚风险工具和纽卡斯尔-渥太华量表评估研究质量。\n\n**结果：** 在找到的 1887 篇文章中，收录了 33 篇。大多数研究使用抗 TNF 药物作为治疗（n=11）。十项研究进行了亚组分析；其中，报告性别差异的两项研究使用英夫利昔单抗和阿达木单抗作为治疗，并表明女性的瘘管闭合时间比男性更长。\n\n**结论：** 这项系统评价表明，很少有数据证实肛周克罗恩病治疗中的性别差异，可能与表型有更大的关系。然而，考虑到缺乏结果，需要为此目标以及瘘管标准化和反应评估方法进行进一步研究。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/38018554/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 29 Nov 2023"}, {"id": "37933849", "title_en": "Pharmacological Therapies for the Management of Fistulizing Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "治疗瘘管性克罗恩病的药物疗法：系统评价和荟萃分析", "authors": "Vipul Jairath", "abstract_en": "**Background:** Fistulas are a debilitating complication of Crohn's disease [CD]. We conducted a systematic review to assess the efficacy of medical therapies for fistulizing CD.\n\n**Methods:** MEDLINE, Embase, and CENTRAL were searched on May 26, 2022, for randomized controlled trials [RCTs] of pharmacological therapy in adults with fistulizing CD. The primary outcome was induction and maintenance of fistula response. Pooled risk ratios [RRs] and 95% confidence intervals [CIs] were calculated. GRADE was used to assess the certainty of evidence.\n\n**Results:** Thirty-eight RCTs were included. Nineteen trials [50%] exclusively involved perianal fistula. The remaining studies included some participants with non-perianal fistula. Pooled RRs for anti-tumour necrosis factor [TNF] agents were not statistically significant for induction [RR 1.36, 95% CI 0.97-1.91] or maintenance of fistula response [RR 1.48, 95% CI 0.97-2.27]. However, in a sensitivity analysis of studies with fistula response as the primary outcome, anti-TNFs were superior to placebo for induction [RR 1.94, 95% CI 1.10-3.41] and maintenance [RR 1.88, 95% CI 1.23-2.88] of fistula response. Oral small molecules [RR 2.56, 95% CI 1.18-5.53] and mesenchymal stem cell [MSC] therapy [RR 1.26, 95% CI 1.01-1.57] were effective for induction of fistula response. Ustekinumab was associated with maintenance of fistula response [RR 1.80, 95% CI 1.04-3.11]. Vedolizumab was not superior to placebo. The certainty of evidence ranged from very low to moderate.\n\n**Conclusion:** Very low- to moderate-certainty evidence suggests that anti-TNF therapy, oral small molecules, ustekinumab, and MSCs are effective for perianal fistulizing CD. Dedicated fistula studies evaluating biologics and small molecules are needed.", "abstract_zh": "**背景：** 瘘管是克罗恩病 [CD] 的一种使人衰弱的并发症。我们进行了系统评价，以评估内科治疗对瘘管性克罗恩病的疗效。\n\n**方法：** MEDLINE、Embase 和 CENTRAL 于 2022 年 5 月 26 日检索了成人瘘管性 CD 药物治疗的随机对照试验 [RCT]。主要结果是瘘管反应的诱导和维持。计算汇总风险比 [RRs] 和 95% 置信区间 [CIs]。 GRADE 用于评估证据的确定性。\n\n**结果：** 其中包括 38 项随机对照试验。十九项试验 [50%] 专门涉及肛周瘘。其余的研究包括一些患有非肛周瘘的参与者。抗肿瘤坏死因子 [TNF] 药物的汇总 RR 对于诱导 [RR 1.36，95% CI 0.97-1.91] 或维持瘘管反应 [RR 1.48，95% CI 0.97-2.27] 没有统计学意义。然而，在以瘘管反应作为主要结局的研究的敏感性分析中，抗-TNF 在诱导 [RR 1.94，95% CI 1.10-3.41] 和维持 [RR 1.88，95% CI 1.23-2.88] 瘘管反应方面优于安慰剂。口服小分子[RR 2.56，95% CI 1.18-5.53]和间充质干细胞[MSC]治疗[RR 1.26，95% CI 1.01-1.57]可有效诱导瘘管反应。乌司奴单抗与维持瘘管反应相关[RR 1.80，95% CI 1.04-3.11]。维多珠单抗并不优于安慰剂。证据的质量从极低到中等。\n\n**结论：** 极低到中等质量的证据表明，抗 TNF 疗法、口服小分子、优特克单抗和 MSC 对肛周瘘管性 CD 有效。需要专门评估生物制剂和小分子的瘘管研究。", "keywords_zh": "生物、瘘管、干细胞", "keywords_en": "Biologic, fistula, stem cells", "link": "https://pubmed.ncbi.nlm.nih.gov/37933849/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 07 Nov 2023"}, {"id": "37882975", "title_en": "Comparison of clinical outcomes of anal fistula plug and endoanal advancement flap repair treating the complex anal fistula: a systematic review and meta-analysis", "title_zh": "肛瘘塞与肛内推进皮瓣修复术治疗复杂性肛瘘的临床效果比较：系统评价和荟萃分析", "authors": "Jihua Gao", "abstract_en": "Anal fistula (AF) is a common disease with high prevalence and surgical operations are effective treatments in clinical work. There exist many well-known surgical techniques treating complex anal fistula (CAF), however, none is ideal. To compare the superiority of Anal fistula plug (AFP) and Endoanal advancement flap repair (EAFR) for complex anal fistula. We searched worldwide databases including Pubmed, Embase, Cochrane Library, Web of Science, CNKI, WanFang, VIP, and SinoMed from their inception to March 2023. Studies comparing the outcomes of AFP and EAFR were included according to the PICO principles. The indicators of the healing rate, recurrence rate, wound infection rate, and complication rate, et al. were extracted and compared between different surgical methods. 5 RCTS and 7 non-RCTs were included in the meta-analysis with a total of 847 patients (341 patients conducted with AFP and 506 patients with EAFR). By combining the total effect of the 12 articles, we found that there was a statistical difference reporting the healing rate of AFP 48.3% and EAFR 64.4% treating the CAF (OR 0.68, 95% CI 0.30,1.55, P = 0.03), and EAFR has a better healing rate. However, there was no significant difference in terms of the recurrence rate (OR 1.68, 95% CI 0.80,3.54, P = 0.17), the wound infection rate (OR 1.82, 95% CI 0.95,3.52, P = 0.07), and the complication rate (OR 1.06, 95% CI 0.70,1.61, P = 0.77) either in the 12 articles or in the subgroup. The meta-analysis indicated that the EAFR was superior to AFP in terms of the healing rate treating the CAF, however, there were no significant differences between the two groups when it came to the recurrence rate, the wound infection rate, and the complication rate. EAFR might be one initial treatment for the complex cryptoglandular anal fistulas compared with AFP.", "abstract_zh": "肛瘘（AF）是一种发病率较高的常见病，外科手术是临床上有效的治疗方法。存在许多治疗复杂性肛瘘（CAF）的众所周知的手术技术，但没有一种是理想的。比较肛瘘塞（AFP）和肛内推进皮瓣修复术（EAFR）治疗复杂肛瘘的优越性。我们检索了包括 Pubmed、Embase、Cochrane Library、Web of Science、CNKI、万方、VIP 和 SinMed 在内的全球数据库，从建库到 2023 年 3 月。根据 PICO 原则纳入了比较 AFP 和 EAFR 结果的研究。愈合率、复发率、伤口感染率、并发症率等指标。提取并比较不同手术方法之间的差异。荟萃分析中纳入了 5 项随机对照试验和 7 项非随机对照试验，共纳入 847 名患者（其中 341 名患者接受 AFP 治疗，506 名患者接受 EAFR）。综合12篇文章的总效果，我们发现AFP 48.3%和EAFR 64.4%治疗CAF的治愈率存在统计学差异（OR 0.68，95% CI 0.30，1.55，P = 0.03），且EAFR的治愈率更好。然而，复发率（OR 1.68，95% CI 0.80,3.54，P = 0.17）、伤口感染率（OR 1.82，95% CI 0.95,3.52，P = 0.07）和并发症发生率（OR 1.06，95% CI）之间无显着差异。 0.70,1.61, P = 0.77) 在 12 篇文章或子组中。 Meta分析显示，EAFR治疗CAF的愈合率优于AFP，但在复发率、伤口感染率和并发症发生率方面，两组之间无显着差异。与 AFP 相比，EAFR 可能是复杂隐腺肛瘘的初始治疗方法之一。", "keywords_zh": "肛瘘塞、复杂肛瘘、肛门内推进皮瓣修复、Meta 分析", "keywords_en": "Anal fistula plug, Complex anal fistula, Endoanal advancement flap repair, Meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/37882975/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 26 Oct 2023"}, {"id": "37737881", "title_en": "Efficacy and safety of 13 surgical techniques for the treatment of complex anal fistula, non-Crohn CAF: a systematic review and network meta-analysis", "title_zh": "13种手术技术治疗复杂性肛瘘、非克罗恩CAF的有效性和安全性：系统评价和网络荟萃分析", "authors": "Maosheng Tian", "abstract_en": "**Background:** Considering the difficulty of treating complex anal fistula (CAF), various surgical techniques exist in clinical work. However, none are ideal. Evidence on the efficacy and safety of different surgical treatments is scarce. The authors aimed to compare the outcomes of the 13 surgical techniques and tried to find the best surgical method for treating CAF.\n\n**Materials And Methods:** The authors searched worldwide databases, including Pubmed, Embase, Cochrane Library, Web of Science, CNKI, WanFang, VIP, and SinoMed, from inception to March 2023. All randomized controlled trials comparing the outcomes of 13 surgical techniques were included according to the PICO principles. The indicators of the cure rate, the recurrence rate, the complication rate, the operating time, the postoperative pain on day 1 (VAS), and the postoperative incontinence in month 1 (Wexner) were extracted and analyzed using STATA software 15.1, Review Manager 5.4, and GeMTC14.3.\n\n**Results:** Twenty-eight randomized controlled trials with a total of 2274 patients were included in the network meta-analysis. There was no statistically significant difference in the comparison among any surgical interventions in terms of the cure rate ( P >0.05 Table 2) and recurrence rate ( P >0.05 Table 3). However, in terms of complication rate, fistulectomy was lower than FPS (Median: 0.14; 95% CI: 0.02-0.70) or fistulotomy (Median: 0.09; 95% CI: 0.01-0.55), and fistulotomy was lower than EAFR (Median: 0.24; 95% CI: 0.05-0.84), LIFT (Median: 0.17; 95% CI: 0.02-0.66) or LIFT-EAFR (Median: 0.11; 95% CI: 0.01-0.69) ( P >0.05 Table 4). The surface estimated the advantages and disadvantages under the cumulative ranking (SUCRA). The ranking results indicated that fistulectomy might have the lowest complication rate (SUCRA=7.9%). Because the network results of the operating time, the postoperative pain, and the postoperative incontinence contained no closed loops, the results of their probability ranking could only be referenced, demonstrating that fistulectomy might have the shortest operating time (SUCRA=23.4%), video-assisted modified ligation of the intersphincteric fistula tract (VAMLIFT) might have the lowest postoperative pain on day 1 (VAS) (SUCRA=0.4%) and LIFT might have the lowest postoperative incontinence in month 1(Wexner) (SUCRA=16.2%).\n\n**Conclusion:** Fistulectomy might have the lowest complication rate, which might be the relatively superior surgical technique for treating CAF.", "abstract_zh": "**背景：** 考虑到复杂性肛瘘（CAF）治疗的难度，临床工作中存在多种手术技术。然而，没有一个是理想的。关于不同手术治疗的有效性和安全性的证据很少。作者旨在比较 13 种手术技术的结果，并试图找到治疗 CAF 的最佳手术方法。\n\n**材料与方法：** 作者检索了全球数据库，包括Pubmed、Embase、Cochrane Library、Web of Science、CNKI、万方、维普和SinoMed，从建库到2023年3月。根据PICO原则纳入了所有比较13种手术技术结果的随机对照试验。采用STATA软件15.1、Review Manager 5.4、GeMTC14.3提取治愈率、复发率、并发症率、手术时间、术后第1天疼痛（VAS）、术后第1个月失禁（Wexner）等指标并进行分析。\n\n**结果：** 网络荟萃分析纳入了 28 项随机对照试验，共计 2274 名患者。各手术干预措施的治愈率（P>0.05，表2）和复发率（P>0.05，表3）比较，差异无统计学意义。然而，就并发症发生率而言，瘘管切除术低于FPS（中位数：0.14；95% CI：0.02-0.70）或瘘管切开术（中位数：0.09；95% CI：0.01-0.55），瘘管切开术低于EAFR（中位数：0.24；95% CI：0.05-0.84）， LIFT（中位数：0.17；95% CI：0.02-0.66）或 LIFT-EAFR（中位数：0.11；95% CI：0.01-0.69）（P > 0.05 表 4）。表面估计了累积排名（SUCRA）下的优缺点。排名结果表明，瘘管切除术的并发症发生率可能最低（SUCRA=7.9%）。由于手术时间、术后疼痛和术后失禁的网络结果不包含闭环，因此它们的概率排序结果只能作为参考，证明瘘管切除术可能具有最短的手术时间（SUCRA=23.4%），视频辅助括约肌间瘘道结扎术（VAMLIFT）可能具有最低的术后第1天疼痛（VAS）（SUCRA=0.4%），LIFT可能具有最低的术后第1天疼痛（VAS）（SUCRA=0.4%），而LIFT可能具有最低的手术时间。第 1 个月术后失禁 (Wexner) (SUCRA=16.2%)。\n\n**结论：** 瘘管切除术的并发症发生率可能最低，可能是治疗 CAF 相对较好的手术技术。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/37737881/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 22 Sep 2023"}, {"id": "37707561", "title_en": "Comparing the efficacy and safety of different thread-drawing surgery method for treating high complex anal fistula: a systematic review and network meta-analysis", "title_zh": "不同拔线手术方法治疗高位复杂性肛瘘的疗效和安全性比较：系统评价和网络荟萃分析", "authors": "Guofeng Li", "abstract_en": "**Purpose:** To evaluate the effect of different surgical methods in the treatment of high complex anal fistula by systematic review and network meta-analysis.\n\n**Methods:** Randomized controlled trials that met the inclusion criteria in PubMed, Cochrane Library, Embase, Web of Science, CBM, CNKI, WANFANG DATA, VIP were searched from the date of database construction to May 23, 2023.\n\n**Results:** Among the 48 randomized controlled trials (RCTs), 4205 patients were included in the network meta-analysis. Incision thread-drawing counter-drainage procedure (ITCP) in improving the effective rate, the cure rate; reduce the recurrence rate, reduce the anal canal damage has a huge advantage. Directional line-hanging method (DLM) is optimal for safety and postoperative pain relief. Directional line-hanging method (ITSS) protect the optimal anal function after surgery. Sphincter preserving thread-hanging method (SPTM) has a significant advantage in accelerating wound healing time. Main tube incision combined with thread-hanging branch tube drainage (MIBD) is second only to incision thread-drawing counter-drainage procedure (ITCP) in improving effective rate, cure rate, reducing recurrence rate and reduce complication rate.\n\n**Conclusion:** In general, different thread-drawing surgery methods have good clinical effect for the treatment of high complex anal fistula. In general, these methods provide evidence-based medical evidence for early treatment in terms of improving clinical efficacy, relieving anal pain and reducing wound healing time. However, there are differences in the number of included literature studies, and further verification by large-sample, high-quality, multicenter RCTS is still needed in the next stage.", "abstract_zh": "**Purpose：** 通过系统评价和网络荟萃分析评价不同手术方法治疗高位复杂性肛瘘的效果。\n\n**方法：** 检索建库之日至2023年5月23日期间在PubMed、Cochrane图书馆、Embase、Web of Science、CBM、CNKI、万方数据、VIP中符合纳入标准的随机对照试验。\n\n**结果：** 在 48 项随机对照试验 (RCT) 中，网络荟萃分析纳入了 4205 名患者。切开拉线反引流手术（ITCP）在提高有效率、治愈率方面；对降低复发率、减少肛管损伤有着巨大的优势。定向挂线法 (DLM) 是安全性和术后疼痛缓解的最佳选择。定向挂线法（ITSS）可保护术后最佳肛门功能。保肛挂线法（SPTM）在加快伤口愈合时间方面具有显着优势。主管切开联合挂线支管引流术（MIBD）在提高有效率、治愈率、降低复发率、降低并发症率方面仅次于切开挂线反引流术（ITCP）。\n\n**结论：** 总的来说，不同的拔线手术方法对于治疗高位复杂性肛瘘都有良好的临床效果。总的来说，这些方法在提高临床疗效、缓解肛门疼痛、缩短伤口愈合时间等方面为早期治疗提供了循证医学证据。但纳入文献研究数量存在差异，下一阶段仍需大样本、高质量、多中心RCTS进一步验证。", "keywords_zh": "高位复杂性肛瘘 网络荟萃分析 系统评价 挂线手术方法", "keywords_en": "High complex anal fistula, Network meta-analysis, Systematic review, Thread-drawing surgery method", "link": "https://pubmed.ncbi.nlm.nih.gov/37707561/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 14 Sep 2023"}, {"id": "37704476", "title_en": "Risk factors for anastomotic stenosis after radical resection of rectal cancer: A systematic review and meta-analysis", "title_zh": "直肠癌根治术后吻合口狭窄的危险因素：系统评价和荟萃分析", "authors": "Kun Qian", "abstract_en": "Radical resection of rectal cancer is a safe and effective treatment, but there remain several complications related to anastomosis. We aimed to assess the risk factors and incidence of rectal anastomotic stenosis (AS) after rectal cancer resection. We conducted a systematic review and meta-analysis after searching PubMed, Embase, Web of Science, and Medline databases from inception until May 2023. Data are reported as the combined odds ratio (OR) for categorical variables and the weighted mean difference (WMD) for continuous variables. Six hundred and fifty-nine studies were retrieved, nine (3031 patients) of which were included in the meta-analysis. Young age (WMD = -3.09, P = 0.0002), male sex (OR = 1.53, P = 0.0002), smoking (OR = 1.54, P = 0.009), radiotherapy (OR = 2.34, P = 0.0002), protective stoma (OR = 2.88, P = 0.007), intersphincteric resection surgery (OR = 6.28, P = 0.05), anastomotic fistula (OR = 3.72, P = 0.003), and anastomotic distance (WMD = -3.11, P = 0.0006) were identified as factors that increased the risk of AS, while staple (OR = 0.39, P < 0.001) was a protective factor. The incidence of AS after rectal cancer resection was approximately 17% (95% CI: 13%-21%). We identified eight risk factors and one protective factor associated with AS after rectal cancer resection. These factors may be combined in future studies to develop a more comprehensive and accurate prediction model related to AS after rectal cancer resection.", "abstract_zh": "直肠癌根治性切除术是一种安全有效的治疗方法，但仍然存在一些与吻合相关的并发症。我们的目的是评估直肠癌切除术后直肠吻合口狭窄（AS）的危险因素和发生率。我们在搜索 PubMed、Embase、Web of Science 和 Medline 数据库（从成立到 2023 年 5 月）后进行了系统回顾和荟萃分析。数据报告为分类变量的组合比值比 (OR) 和连续变量的加权平均差 (WMD)。检索到 659 项研究，其中 9 项（3031 名患者）纳入荟萃分析。年轻（WMD=-3.09，P=0.0002），男性（OR=1.53，P=0.0002），吸烟（OR=1.54，P=0.009），放疗（OR=2.34，P=0.0002），保护性造口（OR=2.88， P = 0.007）、括约肌间切除手术（OR = 6.28，P = 0.05）、吻合口瘘（OR = 3.72，P = 0.003）和吻合距离（WMD = -3.11，P = 0.0006）被确定为增加 AS 风险的因素，而吻合钉（OR = 0.39，P < 0.001）是一个保护因素。直肠癌切除术后 AS 的发生率约为 17%（95% CI：13%-21%）。我们确定了直肠癌切除术后与 AS 相关的 8 个危险因素和 1 个保护因素。在未来的研究中可能会结合这些因素，开发出与直肠癌切除术后AS相关的更全面、更准确的预测模型。", "keywords_zh": "吻合口狭窄，Meta分析，直肠癌根治术", "keywords_en": "Anastomotic stenosis, Meta-analysis, Radical resection of rectal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/37704476/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 13 Sep 2023"}, {"id": "37608385", "title_en": "Comparative efficacy of oral drugs for chronic radiation proctitis - a systematic review", "title_zh": "口服药物治疗慢性放射性直肠炎的疗效比较——系统评价", "authors": "Jinjun Liang", "abstract_en": "**Background:** Chronic radiation proctitis (CRP) is a long-term complication of pelvic radiotherapy that manifests as rectal bleeding, diarrhoea, fistula formation and obstruction. Treatments such as endoscopic argon plasma coagulation, hyperbaric oxygen therapy and rectal topical formalin have imposed a significant medical burden on CRP patients. In contrast, oral therapies offer a more accessible and acceptable option for managing CRP. Here, we conducted a systematic review of the efficacy of oral treatments for CRP to assess their potential as an effective and convenient treatment option for this condition.\n\n**Methods:** We searched the Cochrane Central Register of Controlled Trials, PubMed, Web of Science, China National Knowledge Infrastructure and Chinese VIP in February 2021. We included post-radiotherapy participants with CRP that compared oral medicine alone or in combination with other treatments versus control treatments. The primary outcomes were bleeding, diarrhoea and symptom score. Heterogeneity between studies was checked using Cochrane Q test statistics and I<sup>2</sup> test statistics. The Cochrane risk-of-bias tool was used to assess the quality of the included studies.\n\n**Results:** We included 10 randomised controlled trials (RCTs) and 1 retrospective study with 898 participants. Three placebo-controlled trials evaluated the effects of oral sucralfate on CRP, with meta-analysis showing no significant different with placebo arm. Four trials on TCM demonstrated significant improvement of symptoms, especially for the 3 trials on oral TCM drinks. Retinyl palmitate and high-fibre diet were found to reduce rectal bleeding. The combination of oral pentoxifylline and tocopherol did not significantly change the process of CRP.\n\n**Conclusions:** Our study implies that oral TCM drinks, retinyl palmitate and a high-fiber diet showed significant improvement in CRP symptoms, but not with the combination of oral pentoxifylline and tocopherol. Further multicentre, larger-scale RCTs are needed to confirm the efficacy and safety of these treatments and optimize treatment strategies, ultimately improving the quality of life for patients with CRP.", "abstract_zh": "**背景：** 慢性放射性直肠炎（CRP）是盆腔放疗的长期并发症，表现为直肠出血、腹泻、瘘管形成和梗阻。内镜下氩气等离子凝固、高压氧治疗和直肠局部福尔马林等治疗给CRP患者带来了沉重的医疗负担。相比之下，口服疗法为控制 CRP 提供了更容易获得和接受的选择。在这里，我们对口服治疗 CRP 的疗效进行了系统评价，以评估其作为这种疾病有效且方便的治疗选择的潜力。\n\n**方法：** 我们于 2021 年 2 月检索了 Cochrane 对照试验中央注册库、PubMed、Web of Science、中国国家知识基础设施和中国 VIP。我们纳入了接受 CRP 的放射治疗后参与者，将单独口服药物或联合其他治疗与对照治疗进行比较。主要结局是出血、腹泻和症状评分。使用 Cochrane Q 检验统计数据和 I<sup>2</sup> 检验统计数据检查研究之间的异质性。 Cochrane 偏倚风险工具用于评估纳入研究的质量。\n\n**结果：** 我们纳入了 10 项随机对照试验 (RCT) 和 1 项回顾性研究，共有 898 名参与者参与。三项安慰剂对照试验评估了口服硫糖铝对 CRP 的影响，荟萃分析显示与安慰剂组没有显着差异。 4项中药试验显示症状有显着改善，尤其是3项口服中药饮料试验。研究发现棕榈酸视黄酯和高纤维饮食可以减少直肠出血。口服己酮可可碱和生育酚的组合并没有显着改变CRP的过程。\n\n**结论：** 我们的研究表明，口服中药饮料、棕榈酸视黄酯和高纤维饮食可以显着改善 CRP 症状，但口服己酮可可碱和生育酚的组合却没有显着改善。需要进一步的多中心、更大规模的随机对照试验来确认这些治疗的有效性和安全性，并优化治疗策略，最终改善 CRP 患者的生活质量。", "keywords_zh": "慢性放射性直肠炎、腹泻、口服治疗、放射毒性、直肠出血", "keywords_en": "Chronic radiation proctitis, Diarrhoea, Oral treatments, Radiation toxicity, Rectal bleeding", "link": "https://pubmed.ncbi.nlm.nih.gov/37608385/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 23 Aug 2023"}, {"id": "37359408", "title_en": "Predictors of outcome in cryptoglandular anal fistula according to magnetic resonance imaging: A systematic review", "title_zh": "根据磁共振成像预测隐腺肛瘘的结果：系统评价", "authors": "Amirhosein Naseri", "abstract_en": "**Background And Aims:** Anal fistula (AF) with cryptoglandular origin tends to recur, and multiple risk factors are implicated. Recently, some magnetic resonance imaging (MRI) findings with predictive value for disease outcomes have been proposed. These intrinsic anatomic features include those of the AF and its surrounding structures. This study aims to clarify the prognostic role of MRI in AF.\n\n**Methods:** We performed a systematic search of PubMed, Embase, and EBSCO databases. Two independent reviewers conducted the search and screened the articles. We selected studies that used MRI to assess AF and reported its relationship to disease outcome. We extracted data regarding the study design, type of intervention, outcome, MRI-measured items, and their significance.\n\n**Results:** Out of 1230 retrieved articles, 18 were eligible for final inclusion, and a total of 4026 patients were enrolled in the selected studies. For preoperative MRI, the significant items affecting the outcome were the length of the fistula, horseshoe type, presence of multiple tracts, supralevator extension, and apparent diffusion coefficient (ADC) value. Other studies investigated the healing process using postoperative MRI.\n\n**Conclusion:** This review found that MRI can be useful in the management of AF, both preoperatively and postoperatively. Factors, such as fistula length, horseshoe type, presence of multiple tracts, supralevator extension, and ADC value were found to be significantly associated with treatment outcomes. The presence of the fistula tract and the development of new abscesses on postoperative MRI was found to hinder the healing process. Further studies are needed to confirm these findings.", "abstract_zh": "**Background and aims：** 隐腺起源的肛瘘（AF）容易复发，并且涉及多种危险因素。最近，有人提出了一些对疾病结果具有预测价值的磁共振成像（MRI）结果。这些内在的解剖学特征包括 AF 及其周围结构的解剖学特征。本研究旨在阐明 MRI 在 AF 中的预后作用。\n\n**方法：** 我们对 PubMed、Embase 和 EBSCO 数据库进行了系统检索。两名独立审稿人进行了检索并筛选了文章。我们选择了使用 MRI 评估 AF 的研究，并报告了其与疾病结果的关系。我们提取了有关研究设计、干预类型、结果、MRI 测量项目及其意义的数据。\n\n**结果：** 在 1230 篇检索到的文章中，有 18 篇符合最终纳入条件，共有 4026 名患者纳入所选研究。对于术前MRI，影响结果的重要项目是瘘管长度、马蹄形、是否存在多束、提肌上延伸和表观扩散系数（ADC）值。其他研究使用术后 MRI 来研究愈合过程。\n\n**结论：** 本综述发现 MRI 可用于术前和术后房颤的治疗。研究发现，瘘管长度、马蹄形类型、多束瘘管的存在、提肌上延伸和 ADC 值等因素与治疗结果显着相关。术后 MRI 发现瘘道的存在和新脓肿的形成阻碍了愈合过程。需要进一步的研究来证实这些发现。", "keywords_zh": "肛瘘，磁共振成像，复发，治疗结果", "keywords_en": "Anal fistula, magnetic resonance imaging, recurrence, treatment outcomes", "link": "https://pubmed.ncbi.nlm.nih.gov/37359408/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 26 Jun 2023"}, {"id": "37277090", "title_en": "Neonatal head circumference as a risk factor for obstetric anal sphincter injuries: a systematic review and meta-analysis", "title_zh": "新生儿头围作为产科肛门括约肌损伤的危险因素：系统评价和荟萃分析", "authors": "Ahmad Azmi Nasution", "abstract_en": "**Objective:** Between 53% and 79% of women will sustain some degree of perineal laceration during vaginal delivery. Third- and fourth-degree perineal lacerations are known as obstetric anal sphincter injuries. Timely diagnosis and prompt treatment of obstetric anal sphincter injuries can help to prevent the development of severe consequences like fecal incontinence, urinary incontinence, and rectovaginal fistula. Neonatal head circumference is routinely measured postpartum but is often not mentioned as a risk factor for obstetric anal sphincter injuries in clinical guidelines. Thus far, no review article on the risk factors for obstetric anal sphincter injuries has discussed the role of neonatal head circumference. This study aimed to review and analyze the relationship between head circumference and the occurrence of obstetric anal sphincter injuries among previous studies to conclude whether head circumference should be recognized as an important risk factor.\n\n**Data Sources:** Through study screening on Google Scholar, PubMed, Scopus, and Science Direct for articles published between 2013 to 2023, followed by assessment of eligibility, this study ended up reviewing 25 studies, 17 of which were included in the meta-analysis.\n\n**Study Eligibility Criteria:** Only studies that reported both the neonatal head circumference and the occurrence of obstetric anal sphincter injuries were included in this review.\n\n**Methods:** The included studies were appraised using the Dartmouth Library risk of bias assessment checklist. Qualitative synthesis was based on the study population, findings, adjusted confounding factors, and suggested causative links in each study. Quantitative synthesis was conducted using calculation and pooling of odds ratios and inverse variance using Review Manager 5.4.1.\n\n**Results:** A statistically significant association between head circumference and obstetric anal sphincter injuries was reported in 21 of 25 studies; 4 studies reported that head circumference was a true independent risk factor. A meta-analysis of the studies that reported neonatal head circumference as a dichotomous categorical variable with a cutoff point of 35±1 cm yielded statistically significant pooled results (odds ratio, 1.92; 95% confidence interval, 1.80-2.04).\n\n**Conclusion:** The risk for obstetric anal sphincter injuries increased as the neonatal head circumference increased-this should be considered in decision-making during labor and postpartum management to attain the best outcome.", "abstract_zh": "**目的：** 53% 至 79% 的女性在阴道分娩期间会出现一定程度的会阴撕裂伤。三度和四度会阴撕裂伤被称为产科肛门括约肌损伤。产科肛门括约肌损伤的及时诊断和及时治疗有助于防止大便失禁、尿失禁和直肠阴道瘘等严重后果的发生。产后常规测量新生儿头围，但临床指南中通常没有将其作为产科肛门括约肌损伤的危险因素提及。迄今为止，还没有关于产科肛门括约肌损伤危险因素的综述文章讨论了新生儿头围的作用。本研究旨在回顾和分析以往研究中头围与产科肛门括约肌损伤发生的关系，以得出头围是否应被视为重要危险因素的结论。\n\n**Data sources：** 通过在 Google Scholar、PubMed、Scopus 和 Science Direct 上筛选 2013 年至 2023 年期间发表的文章，然后评估资格，本研究最终审查了 25 项研究，其中 17 项纳入荟萃分析。\n\n**Study eligibility criteria：** 本综述仅纳入报告新生儿头围和产科肛门括约肌损伤发生率的研究。\n\n**方法：** 使用达特茅斯图书馆偏倚风险评估清单对纳入的研究进行评估。定性综合基于研究人群、研究结果、调整后的混杂因素以及每项研究中建议的因果关系。使用 Review Manager 5.4.1 计算并合并优势比和逆方差，进行定量综合。\n\n**结果：** 25 项研究中有 21 项报告称头围与产科肛门括约肌损伤之间存在统计学显着关联； 4 项研究报告称头围是一个真正的独立危险因素。对将新生儿头围作为二分分类变量（截止点为 35±1 厘米）的研究进行荟萃分析，得出了统计显着的汇总结果（比值比，1.92；95% 置信区间，1.80-2.04）。\n\n**结论：** 随着新生儿头围的增加，产科肛门括约肌损伤的风险也会增加——在分娩和产后管理过程中的决策中应考虑这一点，以获得最佳结果。", "keywords_zh": "分娩、新生儿头围、产科肛门括约肌损伤", "keywords_en": "delivery, neonatal head circumference, obstetric anal sphincter injuries", "link": "https://pubmed.ncbi.nlm.nih.gov/37277090/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 05 Jun 2023"}, {"id": "37213241", "title_en": "Incidence of Rectal Injury After Radical Prostatectomy: A Systematic Review and Meta-analysis", "title_zh": "根治性前列腺切除术后直肠损伤的发生率：系统评价和荟萃分析", "authors": "Vincenzo Ficarra", "abstract_en": "**Context:** Rectal injury (RI) is a dreaded complication after radical prostatectomy (RP), increasing the risk of early postoperative complications, such as bleeding and severe infection/sepsis, and late sequelae, such as a rectourethral fistula (RUF). Considering its traditionally low incidence, uncertainty remains as to predisposing risk factors and management.\n\n**Objective:** To examine the incidence of RI after RP in contemporary series and to propose a pragmatic algorithm for its management.\n\n**Evidence Acquisition:** A systematic literature search was performed using the Medline and Scopus databases. Studies reporting data on RI incidence were selected. Subgroup analyses were conducted to assess the differential incidence by age, surgical approach, salvage RP after radiation therapy, and previous benign prostatic hyperplasia (BPH)-related surgery.\n\n**Evidence Synthesis:** Eighty-eight, mostly retrospective noncomparative, studies were selected. The meta-analysis obtained a pooled RI incidence of 0.58% (95% confidence interval [CI] 0.46-0.73) in contemporary series with significant across-study heterogeneity (I<sup>2</sup> = 100%, <i>p</i> < 0.00001). The highest RI incidence was found in patients undergoing open RP (1.25%; 95% CI 0.66-2.38) and laparoscopic RP (1.25%; 95% CI 0.75-2.08) followed by perineal RP (0.19%; 95% CI 0-276.95) and robotic RP (0.08%; 95% CI 0.02-0.31). Age ≥60 yr (0.56%; 95% CI 0.37-06) and salvage RP after radiation therapy (6.01%; 95% CI 3.99-9.05), but not previous BPH-related surgery (4.08%, 95% CI 0.92-18.20), were also associated with an increased RI incidence. Intraoperative versus postoperative RI detection was associated with a significantly decreased risk of severe postoperative complications (such as sepsis and bleeding) and subsequent formation of a RUF.\n\n**Conclusions:** RI is a rare, but potentially devastating, complication following RP. RI incidence was higher in patients ≥60 yr of age, and in those who underwent open/laparoscopic approach or salvage RP after radiation therapy. Intraoperative RI detection and repair apparently constitute the single most critical step to significantly decrease the risk of major postoperative complications and subsequent RUF formation. Conversely, intraoperatively undetected RI can lead more often to severe infective complications and RUF, the management of which remains poorly standardised and requires complex procedures.\n\n**Patient Summary:** Accidental rectum tear is a rare, but potentially devastating, complication in men undergoing prostate removal for cancer. It occurs more often in patients aged 60 yr or older as well as in those who underwent prostate removal via an open/laparoscopic approach and/or prostate removal after radiation therapy for recurrent disease. Prompt identification and repair of this condition during the initial operation are the key to reduce further complications such as the formation of an abnormal opening between the rectum and the urinary tract.", "abstract_zh": "**Context：** 直肠损伤（RI）是根治性前列腺切除术（RP）后的一种可怕并发症，增加了术后早期并发症（例如出血和严重感染/败血症）以及晚期后遗症（例如直肠尿道瘘（RUF））的风险。考虑到其传统上发病率较低，诱发风险因素和管理仍存在不确定性。\n\n**目的：** 检查当代系列中 RP 之后 RI 的发生率，并提出一种实用的管理算法。\n\n**Evidence acquisition：** 使用 Medline 和 Scopus 数据库进行系统文献检索。选择报告 RI 发生率数据的研究。进行亚组分析以评估不同年龄、手术方式、放射治疗后的挽救性 RP 以及既往良性前列腺增生 (BPH) 相关手术的发病率差异。\n\n**Evidence synthesis：** 选择了 88 项研究，其中大部分是回顾性非比较性研究。荟萃分析得出当代系列中 RI 的汇总发生率为 0.58%（95% 置信区间 [CI] 0.46-0.73），具有显着的跨研究异质性（I<sup>2</sup> = 100%，<i>p</i> < 0.00001）。 RI 发生率最高的是接受开放式 RP（1.25%；95% CI 0.66-2.38）和腹腔镜 RP（1.25%；95% CI 0.75-2.08）的患者，其次是会阴 RP（0.19%；95% CI 0-276.95）和机器人 RP（0.08%；95% CI） 0.02-0.31）。年龄≥60岁（0.56%；95% CI 0.37-06）和放射治疗后的挽救性RP（6.01%；95% CI 3.99-9.05），但与既往BPH相关手术无关（4.08%，95% CI 0.92-18.20）也与RI发生率增加相关。术中与术后 RI 检测与严重术后并发症（如脓毒症和出血）以及随后 RUF 形成的风险显着降低相关。\n\n**结论：** RI 是 RP 后一种罕见但具有潜在破坏性的并发症。年龄≥60 岁的患者以及放射治疗后接受开腹/腹腔镜手术或挽救性 RP 的患者中 RI 发生率较高。术中 RI 检测和修复显然是显着降低主要术后并发症和随后 RUF 形成风险的最关键步骤。相反，术中未检测到的 RI 更容易导致严重的感染并发症和 RUF，其管理标准化程度较低，且需要复杂的程序。\n\n**Patient summary：** 对于因癌症而接受前列腺切除术的男性来说，意外直肠撕裂是一种罕见但可能具有毁灭性的并发症。它更常发生在 60 岁或以上的患者以及通过开放/腹腔镜方法接受前列腺切除术和/或因复发性疾病进行放射治疗后前列腺切除术的患者中。在初次手术期间及时识别和修复这种情况是减少进一步并发症的关键，例如直肠和尿路之间形成异常开口。", "keywords_zh": "并发症、前列腺癌、根治性前列腺切除术、直肠损伤、系统评价", "keywords_en": "Complications, Prostate cancer, Radical prostatectomy, Rectal injury, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/37213241/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 22 May 2023"}, {"id": "37198039", "title_en": "Endorectal advancement flap compared to ligation of inter-sphincteric fistula tract in the treatment of complex anal fistulas: A meta-analysis of randomized clinical trials", "title_zh": "直肠内推进皮瓣与括约肌间瘘管结扎治疗复杂性肛瘘的比较：随机临床试验的荟萃分析", "authors": "Steven D Wexner", "abstract_en": "**Background:** Rectal advancement flap and ligation of intersphincteric fistula tract are common procedures for treating complex anal fistula. The present meta-analysis aimed to compare the surgical outcomes of advancement flap and ligation of intersphincteric fistula tract.\n\n**Methods:** A Preferred Reporting Items for Systematic Reviews and Meta-Analyses-compliant systematic review of randomized clinical trials comparing the ligation of intersphincteric fistula tract and advancement flap was conducted. PubMed, Scopus, and Web of Science were searched through January 2023. The risk of bias was assessed using the Risk of Bias 2 tool and certainty of evidence with the Grading of Recommendations Assessment, Development and Evaluation approach. The primary outcomes were healing and recurrence of anal fistulas, and secondary outcomes were operative time, complications, fecal incontinence, and early pain.\n\n**Results:** Three randomized clinical trials (193 patients, 74.6% male) were included. The median follow-up was 19.2 months. Two trials had a low risk of bias, and 1 had some risk of bias. The odds of healing (odds ratio: 1.363, 95% confidence interval: 0.373-4.972, P = .639), recurrence (odds ratio: 0.525, 95% confidence interval: 0.263-1.047, P = .067), and complications (odds ratio: 0.356, 95% confidence interval: 0.085-1.487, P = .157) were similar between the 2 procedures. Ligation of intersphincteric fistula tract was associated with a significantly shorter operation time (weighted mean difference: -4.876, 95% confidence interval: -7.988 to -1.764, P = .002) and less postoperative pain (weighted mean difference: -1.030, 95% confidence interval: -1.418 to -0.641, 0.198, P < .001, I<sup>2</sup> = 3.85%) than advancement flap. Ligation of intersphincteric fistula tract was associated with marginally lower odds of fecal incontinence than advancement flap (odds ratio: 0.27, 95% confidence interval: 0.069-1.06, P = .06).\n\n**Conclusion:** Ligation of intersphincteric fistula tract and advancement flap had similar odds of healing, recurrence, and complications. The odds of fecal incontinence and extent of pain after ligation of intersphincteric fistula tract were lower than after advancement flap.", "abstract_zh": "**背景：** 直肠推进皮瓣和括约肌间瘘道结扎是治疗复杂性肛瘘的常用手术。本荟萃分析旨在比较推进皮瓣和括约肌间瘘管结扎的手术结果。\n\n**方法：** 对比较括约肌间瘘道结扎和推进皮瓣的随机临床试验进行了系统评价和符合荟萃分析的系统评价的首选报告项目。 PubMed、Scopus 和 Web of Science 的检索时间截至 2023 年 1 月。使用偏倚风险 2 工具评估偏倚风险，并使用建议评估、制定和评估分级方法评估证据的确定性。主要结局是肛瘘的愈合和复发，次要结局是手术时间、并发症、大便失禁和早期疼痛。\n\n**结果：** 纳入了三项随机临床试验（193 名患者，74.6% 男性）。中位随访时间为 19.2 个月。两项试验的偏倚风险较低，一项试验存在一定的偏倚风险。治愈几率（比值比：1.363，95% 置信区间：0.373-4.972，P = .639）、复发（比值比：0.525，95% 置信区间：0.263-1.047，P = .067）和并发症（比值比：0.356，95% 置信区间： 0.085-1.487，P = .157) 两个程序之间相似。括约肌间瘘道结扎与手术时间显着缩短（加权平均差：-4.876，95%置信区间：-7.988至-1.764，P = .002）和较少的术后疼痛（加权平均差：-1.030，95%置信区间：-1.418至-0.641、0.198，P < .001， I<sup>2</sup> = 3.85%）比进步襟翼。括约肌间瘘管结扎与推进皮瓣相比，大便失禁的几率略低（优势比：0.27，95% 置信区间：0.069-1.06，P = .06）。\n\n**结论：** 括约肌间瘘管结扎和推进皮瓣的愈合、复发和并发症的几率相似。括约肌间瘘管结扎术后大便失禁的几率和疼痛程度均低于推进皮瓣术后。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/37198039/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 17 May 2023"}, {"id": "37101285", "title_en": "Mesenchymal stem cells transplantation for perianal fistulas: a systematic review and meta-analysis of clinical trials", "title_zh": "间充质干细胞移植治疗肛周瘘：临床试验的系统评价和荟萃分析", "authors": "J L Jiang", "abstract_en": "**Background:** Perianal fistulas, characterised as granulomatous inflammation of fistulas around the anal canal, are associated with significant morbidity resulting in a negative impact on quality of life and a tremendous burden to the healthcare system. Treatment of anal fistulas usually consists of anal surgery; however, results of closure rates are not satisfactory especially with complex perianal fistulas, after which many patients may suffer from anal incontinence. Recently, the administration of mesenchymal stem cells (MSCs) has shown promising efficacy. Herein, we aim to explore whether MSCs are effective for complex perianal fistulas and if they have either short-term, medium-term, long-term or over-long-term efficacy. Additionally, we want to elucidate whether factors such as drug dosage, MSC source, cell type, and disease aetiology influence treatment efficacy. We searched four online databases and analysed data based on information within the clinical trials registry. The outcomes of eligible trials were analysed with Review Manager 5.4.1. Relative risk and related 95% confidence interval were calculated to compare the effect between the MSCs and control groups. In addition, the Cochrane risk of bias tool was applied to evaluate the bias risk of eligible studies. Meta-analyses showed that therapy with MSCs was superior to conventional treatment for complex perianal fistulas in short-, long- and over-long-term follow-up phases. However, there was no statistical difference in treatment efficacy in the medium term between the two methods. Subgroup meta-analyses showed factors including cell type, cell source and cell dosage were superior compared to the control, but there was no significant difference between different experimental groups of those factors. Besides, local MSCs therapy has shown more promising results for fistulas as a result of Crohn's Disease (CD). Although we tend to maintain that MSCs therapy is effective for cryptoglandular fistulas equally, more studies are needed to confirm this conclusion in the future.\n\n**Short Conclusion:** MSCs Transplantation could be a new therapeutic method for complex perianal fistulas of both cryptoglandular and CD origin showing high efficacy in the short-term to over-long-term phases, as well as high efficacy in sustained healing. The difference in cell types, cell sources and cell dosages did not influence MSCs' efficacy.", "abstract_zh": "**背景：** 肛周瘘管的特征是肛管周围瘘管的肉芽肿性炎症，其发病率很高，会对生活质量产生负面影响，并给医疗保健系统带来巨大负担。肛瘘的治疗通常包括肛门手术；然而，闭合率的结果并不令人满意，尤其是对于复杂的肛周瘘，术后许多患者可能会出现肛门失禁。最近，间充质干细胞（MSC）的施用显示出有希望的功效。在此，我们的目的是探讨间充质干细胞治疗复杂性肛周瘘是否有效，以及是否具有短期、中期、长期或超长期疗效。此外，我们希望阐明药物剂量、MSC 来源、细胞类型和疾病病因等因素是否影响治疗效果。我们搜索了四个在线数据库，并根据临床试验登记处的信息分析了数据。使用 Review Manager 5.4.1 分析合格试验的结果。计算相对风险和相关的 95% 置信区间，以比较 MSC 和对照组之间的效果。此外，应用Cochrane偏倚风险工具来评估合格研究的偏倚风险。荟萃分析表明，在短期、长期和超长期随访阶段，间充质干细胞治疗复杂肛周瘘的效果优于传统治疗。然而，两种方法的中期治疗效果没有统计学差异。亚组荟萃分析显示，细胞类型、细胞来源和细胞剂量等因素均优于对照组，但不同实验组之间这些因素没有显着差异。此外，局部间充质干细胞治疗对于克罗恩病（CD）引起的瘘管显示出更有希望的效果。尽管我们倾向于认为间充质干细胞治疗对隐腺瘘同样有效，但未来还需要更多的研究来证实这一结论。\n\n**Short conclusion：** 间充质干细胞移植可能是治疗隐腺和 CD 起源的复杂肛周瘘的新方法，在短期至超长期阶段显示出高效能，并且在持续愈合方面也具有高效能。细胞类型、细胞来源和细胞剂量的差异并不影响MSC的功效。", "keywords_zh": "临床试验, 疗效与安全性, 治愈率, 间充质干细胞移植, 肛周瘘, 随机对照试验, 系统评价和荟萃分析", "keywords_en": "Clinical trials, Efficacy and safety, Healing rate, Mesenchymal stem cells transplantation, Perianal fistulas, Randomised controlled trial, Systematic review and meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/37101285/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 26 Apr 2023"}, {"id": "37023788", "title_en": "A Systematic Review and Meta-Analysis of Comparing Drainage Alone versus Drainage with Primary Fistula Treatment for the Perianal Abscess in Children", "title_zh": "单独引流与引流联合瘘管治疗儿童肛周脓肿的系统回顾和荟萃分析", "authors": "Chen Wang", "abstract_en": "This systematic review and meta-analysis of nonrandomized studies (NRSs) aimed to evaluate the clinical efficacy and safety of two types of surgical interventions (respectively drainage alone and drainage with primary fistula treatment) for perianal abscesses (PAs) in children. Studies from 1992 to July 2022 were searched in 10 electronic databases. All relevant NRSs with available data which compared surgical drainage with or without primary fistula treatment were included. Patients with underlying diseases which led to abscess formation were excluded. The Newcastle-Ottawa Scale was used to assess the risk of bias and quality of the included studies. The outcomes were the healing rate, fistula formation rate, fecal incontinence, and wound healing duration. A total of 16 articles with 1,262 patients were considered suitable for the final meta-analysis. Primary fistula treatment was associated with a significantly higher healing rate when compared with incision and drainage alone (odds ratio [OR]: 5.76, 95% confidence interval [CI]: 4.04-8.22). This aggressive procedure for PA resulted in an 86% reduction in the fistula formation rate (OR: 0.14, 95% CI: 0.06-0.32). Limited data showed patients who underwent primary fistula treatment have a minor effect on postoperative fecal incontinence. Primary fistula treatment demonstrates a better clinical efficacy in promoting the healing rate and decreasing the formation of fistulas in PAs in children. The available evidence for a minor impact on anal function after this intervention is less strong.", "abstract_zh": "这项非随机研究（NRS）的系统回顾和荟萃分析旨在评估两种类型的手术干预（分别单独引流和引流联合初次瘘管治疗）治疗儿童肛周脓肿（PA）的临床疗效和安全性。在 10 个电子数据库中检索了 1992 年至 2022 年 7 月的研究。包括所有具有可用数据的相关 NRS，这些 NRS 比较了手术引流与或不进行初次瘘管治疗的情况。排除患有导致脓肿形成的基础疾病的患者。纽卡斯尔-渥太华量表用于评估纳入研究的偏倚风险和质量。结果是愈合率、瘘管形成率、大便失禁和伤口愈合持续时间。共有 16 篇文章、1,262 名患者被认为适合最终的荟萃分析。与单独切开引流相比，原发性瘘管治疗具有显着更高的治愈率（比值比 [OR]：5.76，95% 置信区间 [CI]：4.04-8.22）。这种积极的 PA 手术使瘘管形成率降低了 86%（OR：0.14，95% CI：0.06-0.32）。有限的数据显示，接受原发性瘘管治疗的患者对术后大便失禁的影响较小。原发性瘘管治疗在促进儿童PAs的愈合率和减少瘘管形成方面显示出更好的临床疗效。现有证据表明这种干预后对肛门功能有轻微影响。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/37023788/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 06 Apr 2023"}, {"id": "36905499", "title_en": "A Systematic Review of Epidemiology and Outcomes Associated with Local Surgical and Intersphincteric Ligation Procedures for Complex Cryptoglandular Fistulas", "title_zh": "与复杂隐腺瘘的局部手术和括约肌间结扎手术相关的流行病学和结果的系统评价", "authors": "Suzanne F Cook", "abstract_en": "**Introduction:** This systematic literature review (SLR) assessed incidence/prevalence of cryptoglandular fistulas (CCF) and outcomes associated with local surgical and intersphincteric ligation procedures for CCFs.\n\n**Methods:** Two trained reviewers searched PubMed and Embase for observational studies evaluating the incidence/prevalence of cryptoglandular fistula and clinical outcomes of treatments for CCF after local surgical and intersphincteric ligation procedures for CCF.\n\n**Results:** In total 148 studies met a priori eligibility criteria for all cryptoglandular fistulas and all intervention types. Of those, two assessed incidence/prevalence of cryptoglandular fistulas. Eighteen reported clinical outcomes of surgeries of interest in CCF and were published in the past 5 years. Prevalence was reported as 1.35/10,000 non-Crohn's patients, and 52.6% of non-IBD patients were found to progress from anorectal abscess to fistula over 12 months. Primary healing rates ranged from 57.1% to 100%; recurrence occurred in a range of 4.9-60.7% and failure in 2.8-18.0% of patients. Limited published evidence suggests postoperative fecal incontinence and long-term postoperative pain were rare. Several of the studies were limited by single-center design with small sample sizes and short follow-up durations.\n\n**Discussion:** This SLR summarizes outcomes from specific surgical procedures for the treatment of CCF. Healing rates vary according to procedure and clinical factors. Differences in study design, outcome definition, and length of follow-up prevent direct comparison. Overall, published studies offer a wide range of findings with respect to recurrence. Postsurgical incontinence and long-term postoperative pain were rare in the included studies, but more research is needed to confirm rates of these conditions following CCF treatments.\n\n**Conclusion:** Published studies on the epidemiology of CCF are rare and limited. Outcomes of local surgical and intersphincteric ligation procedures show differing success and failure rates, and more research is needed to compare outcomes across various procedures. (PROSPERO; registration number CRD42020177732).", "abstract_zh": "**介绍：** 本系统文献综述 (SLR) 评估了隐腺瘘 (CCF) 的发病率/患病率以及与 CCF 局部手术和括约肌间结扎手术相关的结果。\n\n**方法：** 两名训练有素的审稿人在 PubMed 和 Embase 中检索了观察性研究，评估隐腺瘘的发生率/患病率以及 CCF 局部手术和括约肌间结扎手术后 CCF 治疗的临床结果。\n\n**结果：** 总共 148 项研究符合所有隐腺瘘和所有干预类型的先验资格标准。其中，有两项评估了隐腺瘘管的发病率/患病率。过去 5 年发表了 18 份报告，其中涉及 CCF 手术的临床结果。据报道，非克罗恩病患者的患病率为 1.35/10,000，并且发现 52.6% 的非 IBD 患者在 12 个月内从肛门直肠脓肿进展为瘘管。一期愈合率从57.1%到100%；复发率为 4.9-60.7%，失败率为 2.8-18.0%。有限的已发表证据表明术后大便失禁和长期术后疼痛很少见。一些研究受到单中心设计的限制，样本量小，随访时间短。\n\n**讨论：** 本 SLR 总结了治疗 CCF 的特定外科手术的结果。治愈率根据手术和临床因素而有所不同。研究设计、结果定义和随访时间长度的差异阻碍了直接比较。总体而言，已发表的研究提供了有关复发的广泛发现。在纳入的研究中，术后失禁和长期术后疼痛很少见，但需要更多的研究来确认 CCF 治疗后这些情况的发生率。\n\n**结论：** 已发表的 CCF 流行病学研究很少且有限。局部手术和括约肌间结扎手术的结果显示出不同的成功率和失败率，需要更多的研究来比较不同手术的结果。 （PROSPERO；注册号 CRD42020177732）。", "keywords_zh": "肛瘘、复杂隐腺瘘、愈合、失禁、疼痛、复发", "keywords_en": "Anal fistula, Complex cryptoglandular fistula, Healing, Incontinence, Pain, Recurrence", "link": "https://pubmed.ncbi.nlm.nih.gov/36905499/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 11 Mar 2023"}, {"id": "36905475", "title_en": "Platelet-rich plasma in the treatment of anal fistula: a systematic review and meta-analysis", "title_zh": "富含血小板血浆治疗肛瘘：系统评价和荟萃分析", "authors": "Xiaofei Li", "abstract_en": "**Objective:** To analyse the safety and effectiveness of platelet-rich plasma (PRP) in anal fistula patients.\n\n**Methods:** Online databases including PubMed, Embase, Cochrane Library, and Web of Science were searched from inception to December 5, 2022, for eligible studies about evaluating the efficacy of platelet-rich plasma (PRP) in treating anal fistula. Literature search, screening, data extraction, and quality assessment were carried out by two independent investigators. The overall cure rate, the complete cure rate, the recurrence rate, and the adverse event rate with their 95% confidence intervals (95% CI) were the primary calculation indexes. Subgroup analyses were conducted primarily according to whether PRP was combined with other treatments. Softwares of MedCalc 18.2 and Review Manager 5.3 were used for meta-analysis.\n\n**Results:** A total of 14 studies with 514 patients were included in the meta-analysis. The overall cure rate of 14 studies was 72.11% (95% CI 0.64-0.79). The cure rate of PRP alone was 62.39% (95% CI 0.55-0.69). The combined cure rate of PRP with other treatments was 83.12% (95% CI 0.77-0.88). The cure rate of interventions involving PRP were superior to the cure rate of surgery methods without using PRP significantly in the 4 randomized controlled studies (RR = 1.30, 95% CI 1.10-1.54, p = 0.002). The complete cure rate of the 8 studies was 66.37% (95% CI 0.52-0.79). The recurrence rate of the 12 studies was 14.84% (95% CI 0.08-0.24). The adverse event rate of the 12 studies was 6.31% (95% CI 0.02-0.12).\n\n**Conclusion:** PRP showed favorable safety and effectiveness in the treatment of anal fistula, especially combined with other treatment procedures.", "abstract_zh": "**目的：** 分析富血小板血浆（PRP）对肛瘘患者的安全性和有效性。\n\n**方法：** 从成立到 2022 年 12 月 5 日，我们对包括 PubMed、Embase、Cochrane Library 和 Web of Science 在内的在线数据库进行了检索，查找有关评估富血小板血浆 (PRP) 治疗肛瘘疗效的合格研究。文献检索、筛选、数据提取和质量评估由两名独立研究者进行。主要计算指标为总治愈率、完全治愈率、复发率、不良事件率及其95%置信区间（95% CI）。主要根据PRP是否与其他治疗联合进行亚组分析。使用MedCalc 18.2和Review Manager 5.3软件进行荟萃分析。\n\n**结果：** 荟萃分析共纳入 14 项研究，涉及 514 名患者。 14项研究的总体治愈率为72.11%（95% CI 0.64-0.79）。单独 PRP 的治愈率为 62.39% (95% CI 0.55-0.69)。 PRP与其他治疗的综合治愈率为83.12%（95% CI 0.77-0.88）。在4项随机对照研究中，涉及PRP的干预措施的治愈率显着优于不使用PRP的手术方法的治愈率（RR = 1.30，95% CI 1.10-1.54，p = 0.002）。 8项研究的完全治愈率为66.37%（95% CI 0.52-0.79）。 12项研究的复发率为14.84%（95% CI 0.08-0.24）。 12项研究的不良事件发生率为6.31%（95% CI 0.02-0.12）。\n\n**结论：** PRP 在治疗肛瘘方面显示出良好的安全性和有效性，特别是与其他治疗方法联合使用。", "keywords_zh": "不良事件、肛瘘、治愈率、荟萃分析、PRP、复发率", "keywords_en": "Adverse events, Anal fistula, Cure rate, Meta-analysis, PRP, Recurrence rate", "link": "https://pubmed.ncbi.nlm.nih.gov/36905475/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 11 Mar 2023"}, {"id": "36894443", "title_en": "The Optimal Primary Treatment for Pediatric Perianal Abscess and Anal Fistula: A Systemic Review and Meta-Analysis", "title_zh": "小儿肛周脓肿和肛瘘的最佳初步治疗：系统评价和荟萃分析", "authors": "Hou-Chuan Chen", "abstract_en": "**Background:** Perianal abscesses and anal fistulas are common. The principle of intention-to-treat has not been considered in previous systemic reviews. Thus, the comparison between primary and post-recurrence management was confused, and the recommendation of primary treatment is obscure. The current study aims to identify the optimal initial treatment for pediatric patients.\n\n**Methods:** Using PRISMA guidelines, studies were identified from MEDLINE, EMBASE, PubMed, Cochrane Library, and Google Scholar without any language or study design restriction. The inclusion criteria include original articles or articles with original data, studies of management for a perianal abscess with or without anal fistula, and patient age of <18 years. Patients with local malignancy, Crohn's disease, or other underlying predisposing conditions were excluded. Studies without analyzing recurrence, case series of <5, and irrelevant articles were excluded in the screening stage. Of the 124 screened articles, 14 articles had no full texts or detailed information. Articles written in a language other than English or Mandarin were translated by Google Translation first and confirmed with native speakers. After the eligibility process, studies that compared identified primary managements were then included in the qualitative synthesis.\n\n**Results:** Thirty-one studies involving 2507 pediatric patients met the inclusion criteria. The study design consisted of two prospective case series of 47 patients and retrospective cohort studies. No randomized control trials were identified. Meta-analyses for recurrence after initial management were performed with a random-effects model. Conservative treatment and drainage revealed no difference (Odds ratio [OR], 1.222; 95% Confidential interval [CI]: 0.615-2.427, p = 0.567). Conservative management had a higher risk of recurrence than surgery without statistical significance (OR 0.278, 95% CI: 0.109-0.707, p = 0.007). Compared with incision/drainage, surgery can prevent recurrence remarkably (OR 4.360, 95% CI: 1.761-10.792, p = 0.001). Subgroup analysis of different approaches within conservative treatment and operation was not performed for lacking information.\n\n**Conclusion:** Strong recommendations cannot be made due to the lack of prospective or randomized controlled studies. However, the current study based on real primary management supports initial surgical intervention for pediatric patients with perianal abscesses and anal fistula to prevent recurrence.\n\n**Level Of Evidence:** Type of study: Systemic review; Evidence level: Level II.", "abstract_zh": "**背景：** 肛周脓肿和肛瘘很常见。以往的系统评价并未考虑意向治疗原则。因此，初级治疗和复发后治疗之间的比较是混乱的，初级治疗的建议也含糊不清。目前的研究旨在确定儿科患者的最佳初始治疗。\n\n**方法：** 使用 PRISMA 指南，从 MEDLINE、EMBASE、PubMed、Cochrane 图书馆和 Google Scholar 中识别研究，没有任何语言或研究设计限制。纳入标准包括原创文章或带有原始数据的文章、伴或不伴肛瘘的肛周脓肿的治疗研究以及患者年龄<18岁。患有局部恶性肿瘤、克罗恩病或其他潜在诱发因素的患者被排除在外。未分析复发的研究、病例系列<5和不相关的文章在筛选阶段被排除。在筛选的 124 篇文章中，有 14 篇文章没有全文或详细信息。用英语或普通话以外的语言撰写的文章首先通过谷歌翻译进行翻译，并与母语人士确认。资格审查结束后，对已确定的主要管理措施进行比较的研究随后被纳入定性综合。\n\n**结果：** 涉及 2507 名儿科患者的 31 项研究符合纳入标准。研究设计包括两个包含 47 名患者的前瞻性病例系列和回顾性队列研究。没有发现随机对照试验。使用随机效应模型对初始治疗后的复发进行荟萃分析。保守治疗和引流显示没有差异（优势比 [OR]，1.222；95% 置信区间 [CI]：0.615-2.427，p = 0.567）。保守治疗的复发风险高于手术，但无统计学意义（OR 0.278，95% CI：0.109-0.707，p = 0.007）。与切开/引流相比，手术可以显着预防复发（OR 4.360，95% CI：1.761-10.792，p = 0.001）。由于缺乏信息，未对保守治疗和手术中的不同方法进行亚组分析。\n\n**结论：** 由于缺乏前瞻性或随机对照研究，无法提出强烈建议。然而，目前基于真实初级管理的研究支持对肛周脓肿和肛瘘的儿科患者进行初步手术干预以预防复发。\n\n**Level of evidence：** 研究类型：系统评价；证据级别：II级。", "keywords_zh": "肛瘘，儿科，肛周脓肿，初级治疗", "keywords_en": "Anal fistula, Pediatric, Perianal abscess, Primary management", "link": "https://pubmed.ncbi.nlm.nih.gov/36894443/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 09 Mar 2023"}, {"id": "36847868", "title_en": "Conservative surgery versus colorectal resection for endometriosis with rectal involvement: a systematic review and meta-analysis of surgical and long-term outcomes", "title_zh": "保守手术与结直肠切除术治疗直肠受累子宫内膜异位症：手术和长期结果的系统评价和荟萃分析", "authors": "Cillian Clancy", "abstract_en": "**Purpose:** The optimal surgical approach for removal of colorectal endometrial deposits is unclear. Shaving and discoid excision of colorectal deposits allow organ preservation but risk recurrence with associated functional issues and re-operation. Formal resection risks potential higher complications but may be associated with lower recurrence rates. This meta-analysis compares peri-operative and long-term outcomes between conservative surgery (shaving and disc excision) versus formal colorectal resection.\n\n**Methods:** The study was registered with PROSPERO. A systematic search was performed on PubMed and EMBASE databases. All comparative studies examining surgical outcomes in patients that underwent conservative surgery versus colorectal resection for rectal endometrial deposits were included. The two main groups (conservative versus resection) were compared in three main blocks of variables including group comparability, operative outcomes and long-term outcomes.\n\n**Results:** Seventeen studies including 2861 patients were analysed with patients subdivided by procedure: colorectal resection (n = 1389), shaving (n = 703) and discoid excision (n = 742). When formal colorectal resection was compared to conservative surgery there was lower risk of recurrence (p = 0.002), comparable functional outcomes (minor LARS, p = 0.30, major LARS, p = 0.54), similar rates of postoperative leaks (p = 0.22), pelvic abscesses (p = 0.18) and rectovaginal fistula (p = 0.92). On subgroup analysis, shaving had the highest recurrence rate (p = 0.0007), however a lower rate of stoma formation (p < 0.00001) and rectal stenosis (p = 0.01). Discoid excision and formal resection were comparable.\n\n**Conclusion:** Colorectal resection has a significantly lower recurrence rate compared to shaving. There is no difference in complications or functional outcomes between discoid excision and formal resection and both have similar recurrence rates.", "abstract_zh": "**Purpose：** 去除结直肠子宫内膜沉积物的最佳手术方法尚不清楚。结直肠沉积物的剃除和盘状切除可以保留器官，但存在相关功能问题和再次手术复发的风险。正式切除可能会带来更高并发症的风险，但可能会降低复发率。这项荟萃分析比较了保守手术（剃毛和椎间盘切除）与正式结直肠切除术的围手术期和长期结果。\n\n**方法：** 该研究已在 PROSPERO 注册。对 PubMed 和 EMBASE 数据库进行了系统检索。所有比较研究均纳入了针对直肠子宫内膜沉积物接受保守手术与结直肠切除术的患者的手术结果。两个主要组（保守组与切除组）在三个主要变量方面进行比较，包括组可比性、手术结果和长期结果。\n\n**结果：** 对包括 2861 名患者的 17 项研究进行了分析，患者按手术细分为：结直肠切除术 (n = 1389)、剃须术 (n = 703) 和盘状切除术 (n = 742)。当正式结直肠切除术与保守手术相比时，复发风险较低（p = 0.002），功能结果相当（轻微 LARS，p = 0.30，严重 LARS，p = 0.54），术后漏尿率相似（p = 0.22），盆腔脓肿（p = 0.18）和直肠阴道瘘 (p = 0.92)。在亚组分析中，剃毛的复发率最高（p = 0.0007），但造口形成率（p < 0.00001）和直肠狭窄率较低（p = 0.01）。盘状切除和正式切除具有可比性。\n\n**结论：** 与剃除相比，结直肠切除术的复发率显着降低。盘状切除和正式切除之间的并发症或功能结果没有差异，并且两者的复发率相似。", "keywords_zh": "结直肠手术、子宫内膜异位症、荟萃分析、手术、手术结果", "keywords_en": "Colorectal surgery, Endometriosis, Meta-analysis, Surgery, Surgery outcomes", "link": "https://pubmed.ncbi.nlm.nih.gov/36847868/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 27 Feb 2023"}, {"id": "36740680", "title_en": "Surgical management of complex perianal fistula revisited in a systematic review: a critical view of available scientific evidence", "title_zh": "系统评价重新审视复杂肛周瘘的手术治疗：对现有科学证据的批判性观点", "authors": "F de la Portilla", "abstract_en": "**Background:** Treating complex perianal fistulas in Crohn's disease patients remains a challenge. Classical surgical treatments for Crohn's disease fistulas have been extrapolated from cryptoglandular fistulas treatment, which have different etiology, and this might interfere with its effectiveness, in addition, they increase fecal incontinence risk. Recently, new surgical techniques with support from biological approaches, like stem cells, have been developed to preserve the function of the sphincter. We have performed a systematic literature review to compare the results of these different techniques in the treatment of Crohn's or Cryptoglandular fistula.\n\n**Methods:** PubMed, EMBASE, Database of Abstracts of Reviews of Effectiveness, Cochrane Central Register of Controlled Trials were searched systematically for relevant articles. We included randomized controlled trials and observational studies that referred to humans, were written in English, included adults 18+ years old, and were published during the 10-year period from 2/01/2010 to 2/29/2020. Evidence level was assigned as designated by the Scottish Intercollegiate Guidelines Network.\n\n**Results:** Of the 577 citations screened, a total of 79 were ultimately included in our review. In Crohn's disease patients, classical techniques such as primarily seton, Ligation of Intersphincteric Fistula Tracks, or lay open, healing rates were approximately 50-60%, while in cryptoglandular fistula were around, 70-80% for setons or flaps. In Crohn's disease patients, new surgical techniques using derivatives of adipose tissue reported healing rates exceeding 70%, stem cells-treated patients achieved higher combined remission versus controls (56.3% vs 38.6%, p = 0.010), mesenchymal cells reported a healing rate of 80% at week 12. In patients with cryptoglandular fistulas, a healing rate of 70% using derivatives of adipose tissue or platelets was achieved, and a healing rate of 80% was achieved using laser technology. Fecal incontinence was improved after the use of autologous platelet growth factors and Nitinol Clips.\n\n**Conclusion:** New surgical techniques showed better healing rates in Crohn'
