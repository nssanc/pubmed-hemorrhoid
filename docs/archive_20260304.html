on Ion Radiotherapy Reirradiation for Recurrent Malignancy: A Systematic Assessment", "title_zh": "碳离子放射治疗再照射治疗复发性恶性肿瘤：系统评估", "authors": "S Chen", "abstract_en": "Reirradiation presents a significant challenge despite recent advances in modern radiation therapy. Carbon ion radiotherapy has garnered increasing attention among radiation oncologists due to its potentially superior physical dosimetric distribution and radiobiological advantages. This systematic review comprehensively evaluated clinical outcomes from 27 original studies on the use of carbon ion reirradiation for locoregional recurrent malignancies, including those affecting the central nervous system, lung, head and neck, pancreas, liver, rectum, and gynecological sites. The findings suggest that carbon ion reirradiation for locoregional recurrent malignancies yields favorable clinical outcomes with a relatively low incidence of high-grade toxicities. For recurrent nasopharyngeal carcinoma, the reported 2-year overall survival, local control, regional control, and metastasis-free survival rates were 83.7%, 58.0%, 87.3%, and 94.7%, respectively. Grade ≥3 late nasopharyngeal necrosis occurred in 16% (33/206) of cases. In the case of recurrent glioblastoma, median overall survival and local control survival were reported at 13 and 7 months, respectively, with minimal high-grade complications; observed low-grade toxicities included acute involuntary movements, incomplete hemiparesis, and late-onset dysphasia. For recurrent lung cancer, 2-year local control and overall survival rates were reported as 54.0% and 61.9%, respectively. Grade ≥3 toxicities included two cases of radiation pneumonitis and one case of bronchopleural fistula. In recurrent pancreatic cancer, 1-year local control, progression-free survival, and overall survival rates were 53.5%, 24.5%, and 48.7%, respectively. A high-grade complication of Grade 3 acute duodenal stenosis was observed in one patient. Additionally, concurrent chemotherapy with carbon ion reirradiation was associated with minimal high-grade additive toxicities. Overall, carbon ion reirradiation appears to be a potentially safe and effective reirradiation modality for treating locoregional recurrent malignancies, though data remains limited.", "abstract_zh": "尽管现代放射治疗取得了最新进展，但再放射仍然是一个重大挑战。碳离子放射治疗由于其潜在的优越的物理剂量分布和放射生物学优势而越来越受到放射肿瘤学家的关注。本系统综述全面评估了 27 项关于使用碳离子再照射治疗局部复发性恶性肿瘤的原始研究的临床结果，包括影响中枢神经系统、肺、头颈、胰腺、肝脏、直肠和妇科部位的恶性肿瘤。研究结果表明，碳离子再照射治疗局部复发性恶性肿瘤可产生良好的临床结果，且高级别毒性的发生率相对较低。对于复发鼻咽癌，报告的2年总生存率、局部控制率、区域控制率和无转移生存率分别为83.7%、58.0%、87.3%和94.7%。 16%（33/206）的病例发生≥3级晚期鼻咽坏死。对于复发性胶质母细胞瘤，中位总生存期和局部对照生存期分别报告为 13 个月和 7 个月，且高度并发症极少；观察到的低度毒性包括急性不自主运动、不完全性偏瘫和迟发性语言障碍。对于复发性肺癌，2 年局部控制率和总生存率分别为 54.0% 和 61.9%。 ≥3级毒性包括2例放射性肺炎和1例支气管胸膜瘘。在复发性胰腺癌中，1 年局部控制率、无进展生存率和总生存率分别为 53.5%、24.5% 和 48.7%。在一名患者中观察到 3 级急性十二指肠狭窄的高级并发症。此外，同步化疗与碳离子再照射与最小的高级附加毒性相关。总体而言，碳离子再照射似乎是治疗局部复发性恶性肿瘤的一种潜在安全有效的再照射方式，尽管数据仍然有限。", "keywords_zh": "碳离子、临床结果、局部复发、恶性肿瘤、再照射、毒性", "keywords_en": "Carbon ion, Clinical outcomes, Locoregional recurrence, Malignancy, Reirradiation, Toxicities", "link": "https://pubmed.ncbi.nlm.nih.gov/40246613/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Apr 2025"}, {"id": "40246071", "title_en": "Implantable Rectal Spacers in Prostate Cancer Radiation Therapy: A Systematic Review", "title_zh": "前列腺癌放射治疗中植入式直肠间隔器：系统评价", "authors": "Ben G L Vanneste", "abstract_en": "**Purpose:** This systematic review provides an overview of the available literature regarding the efficacy and safety of implantable rectal spacers (IRSs) in reducing rectal dose and gastrointestinal toxicity during prostate cancer radiation therapy.\n\n**Methods And Materials:** A comprehensive literature search was conducted in December 2024. Results included prospective research in humans and were limited to the English language. The 30 included studies, all published between 2007 and 2024, were randomized controlled trials or clinical trials that focused on adverse events, rectal dose reduction, gastrointestinal toxicity, or bowel quality of life. Next, IRS implantation technique, safety, and spacing distance were assessed.\n\n**Results:** Randomized controlled trial data were available for hydrogel, hyaluronic acid, and rectal balloon implant spacers, whereas only one pilot study is available for human collagen. Prospective clinical research on IRS in brachytherapy is limited. One centimeter of spacing between the rectum and prostate sufficed to spare the rectum, the primary dose-limiting organ. Findings indicate a favorable safety profile, with an overall complication rate of 0,96% when using hydrogel spacers. There was no grade 4 to 5 gastrointestinal toxicity reported in clinical trials. The use of an IRS was associated with improved long-term bowel quality of life.\n\n**Conclusions:** The integration of IRS into clinical practice offers the potential to enhance the therapeutic landscape for patients with prostate cancer. However, its use should be guided by careful consideration of individual patient needs to determine those who benefit most from the IRS because not all patients may benefit equally.", "abstract_zh": "**Purpose：** 本系统综述概述了有关植入式直肠间隔器 (IRS) 在减少前列腺癌放射治疗期间直肠剂量和胃肠道毒性方面的功效和安全性的现有文献。\n\n**Methods and materials：** 2024 年 12 月进行了全面的文献检索。结果包括针对人类的前瞻性研究，且仅限于英语。这 30 项纳入研究均于 2007 年至 2024 年期间发表，均为随机对照试验或临床试验，重点关注不良事件、直肠剂量减少、胃肠道毒性或肠道生活质量。接下来，评估了 IRS 植入技术、安全性和间距。\n\n**结果：** 水凝胶、透明质酸和直肠球囊植入垫片有随机对照试验数据，而人类胶原蛋白只有一项初步研究。 IRS 在近距离放射治疗中的前瞻性临床研究有限。直肠和前列腺之间一厘米的间距足以保护直肠，即主要的剂量限制器官。研究结果表明，使用水凝胶垫片时的总体并发症率为 0.96%，具有良好的安全性。临床试验中未报告4至5级胃肠道毒性。 IRS 的使用与长期肠道生活质量的改善相关。\n\n**结论：** IRS 融入临床实践有可能改善前列腺癌患者的治疗前景。然而，其使用应仔细考虑个体患者的需求，以确定哪些人从 IRS 中受益最大，因为并非所有患者都可以平等受益。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40246071/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Apr 2025"}, {"id": "40234278", "title_en": "Inflammatory myofibroblastic tumors of the colon in pediatrics: clinical presentation, management, and outcomes-A case report and systematic review of literature", "title_zh": "儿科结肠炎性肌纤维母细胞肿瘤：临床表现、治疗和结果——病例报告和文献系统回顾", "authors": "Essam Elhalaby", "abstract_en": "**Purpose:** Inflammatory myofibroblastic tumors (IMTs) of the colon represent an exceptionally rare entity in the pediatric population. This systematic review aims to comprehensively analyze the clinical presentation, diagnostic workup, management strategies, and outcomes of colorectal IMTs in children.\n\n**Methods:** A systematic literature review was conducted across multiple electronic databases (inception to January 2025), including MEDLINE (via PubMed), Embase, Cochrane, Web of Science, and Google Scholar. Two independent reviewers screened abstracts, reviewed studies, and extracted data on all reported cases of colorectal IMTs in the pediatric population, including one previously unreported case from our institution.\n\n**Results:** Including our case, 53 pediatric patients with colorectal IMTs were identified from 39 studies. The mean age at diagnosis was 7 years (range: 5 months-17 years) with a slight female preponderance. The IMTs comprised a wide range of anatomic locations with rectum (27%) and ascending colon (24%) being the most common. Abdominal pain (54%), gastrointestinal bleeding (29%), and fever (21%) were the predominant symptoms. Anemia was the most common laboratory abnormality (62%). Surgical resection was the primary treatment modality in 98% of cases. After a mean follow-up of 38 months ( range: 3-181 months), the local recurrence rate was 11%, with no distant metastases reported.\n\n**Conclusion:** Colorectal IMTs in children present diagnostic and therapeutic challenges. While complete surgical resection remains the gold standard treatment, emerging therapies such as ALK inhibitors and NSAIDs warrant further investigation. The potential for late recurrence mandates long term follow-up.", "abstract_zh": "**Purpose：** 结肠炎性肌纤维母细胞肿瘤（IMT）在儿科人群中是一种极其罕见的实体。本系统综述旨在全面分析儿童结直肠 IMT 的临床表现、诊断检查、管理策略和结果。\n\n**方法：** 对多个电子数据库（成立至 2025 年 1 月）进行了系统文献综述，包括 MEDLINE（通过 PubMed）、Embase、Cochrane、Web of Science 和 Google Scholar。两名独立评审员筛选了摘要、评审了研究并提取了儿科人群中所有报告的结直肠 IMT 病例的数据，其中包括我们机构以前未报告的一例病例。\n\n**结果：** 包括我们的病例在内，我们从 39 项研究中鉴定出 53 名患有结直肠 IMT 的儿童患者。诊断时的平均年龄为 7 岁（范围：5 个月至 17 岁），其中女性略多。 IMT 包括广泛的解剖位置，其中最常见的是直肠 (27%) 和升结肠 (24%)。腹痛（54%）、胃肠道出血（29%）和发烧（21%）是主要症状。贫血是最常见的实验室异常（62%）。手术切除是 98% 病例的主要治疗方式。平均随访38个月（范围：3-181个月）后，局部复发率为11%，无远处转移报道。\n\n**结论：** 儿童结直肠 IMT 提出了诊断和治疗挑战。虽然完全手术切除仍然是金标准治疗，但 ALK 抑制剂和 NSAID 等新兴疗法值得进一步研究。晚期复发的可能性需要长期随访。", "keywords_zh": "病例报告、结直肠、IMT、炎性肌纤维母细胞肿瘤、肿瘤、儿科", "keywords_en": "Case report, Colorectal, IMT, Inflammatory myofibroblastic tumor, Neoplasm, Pediatric", "link": "https://pubmed.ncbi.nlm.nih.gov/40234278/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Tue, 15 Apr 2025"}, {"id": "40229635", "title_en": "Microbiome landscapes of the bladder, intestine, and vagina in bladder cancer: a systematic review", "title_zh": "膀胱癌中膀胱、肠道和阴道的微生物组景观：系统评价", "authors": "Uwe Bieri", "abstract_en": "**Background:** Microbiomes have been linked to oncogenesis, e.g. the intestinal microbiome and colon cancer or HPV-associated cervical cancer. A connection between microbiomes of different body cavities and tumor oncogenesis was shown. The gut microbiome's influence on bladder cancer was established, raising the question whether nearby microbiomes (rectum, vagina) also influence bladder cancer due to their proximity.\n\n**Objective:** Considering the influence of various body cavities and the broader microbial components, this systematic review aims to investigate differences in the bladder, vaginal, and intestinal microbiota-including bacterial, viral, fungal and archaea-between patients with bladder cancer and healthy controls.\n\n**Methods:** Databases (PubMed, Scopus, Embase) were searched until April 2022. Three types of studies were included: \"(1) studies using bladder cancer and control groups (case-controlled studies) (2) studies that provided information on the presence or abundance of microbial taxa (3) studies that provided information on increased or decreased taxa in bladder cancer and/or control groups.\". Risk of bias was assessed using the Newcastle Ottawa Scale.\n\n**Results:** Fourteen studies (695 samples: 403 bladder cancer, 292 controls) were analyzed. Bacterial taxa that have been detected in at least two studies, the genera Geobacillus and Rubrobacter were more frequently in bladder cancer patients; while Streptococcus and Roseomonas were more prevalent in controls. No consistent taxa were identified across stool or bladder tissue samples.\n\n**Conclusion:** The microbiota in bladder cancer patients show significant variation across studies. Standardized methods and expanded investigations into viral and fungal components are needed to clarify the role of microbiota in bladder cancer.", "abstract_zh": "**背景：** 微生物组与肿瘤发生有关，例如肠道微生物群与结肠癌或 HPV 相关宫颈癌。显示了不同体腔的微生物组与肿瘤发生之间的联系。肠道微生物组对膀胱癌的影响已经确定，这就提出了一个问题：附近的微生物组（直肠、阴道）是否也会因为距离较近而影响膀胱癌。\n\n**目的：** 考虑到各种体腔和更广泛的微生物成分的影响，本系统综述旨在研究膀胱癌患者和健康对照者之间膀胱、阴道和肠道微生物群（包括细菌、病毒、真菌和古细菌）的差异。\n\n**方法：** 检索数据库（PubMed、Scopus、Embase）直至 2022 年 4 月。其中包括三种类型的研究：“(1) 使用膀胱癌和对照组的研究（病例对照研究）(2) 提供有关微生物类群存在或丰度的信息的研究 (3) 提供有关膀胱癌和/或对照组中类群增加或减少的信息的研究。”。使用纽卡斯尔渥太华量表评估偏倚风险。\n\n**结果：** 分析了 14 项研究（695 个样本：403 个膀胱癌，292 个对照）。至少在两项研究中检测到的细菌类群，土芽孢杆菌属和红杆菌属在膀胱癌患者中更为常见；而链球菌和玫瑰单胞菌在对照组中更为普遍。在粪便或膀胱组织样本中没有发现一致的分类群。\n\n**结论：** 膀胱癌患者的微生物群在不同研究中显​​示出显着差异。需要标准化方法和对病毒和真菌成分的扩展研究来阐明微生物群在膀胱癌中的作用。", "keywords_zh": "细菌、膀胱癌、膀胱微生物群、真菌、肠道微生物群、微生物群、阴道微生物群、病毒", "keywords_en": "Bacteria, Bladder cancer, Bladder microbiota, Fungi, Intestinal microbiota, Microbiome, Vaginal microbiota, Viruses", "link": "https://pubmed.ncbi.nlm.nih.gov/40229635/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 14 Apr 2025"}, {"id": "40225020", "title_en": "Gastrointestinal Tract Perineuriomas and Benign Fibroblastic Polyps: Case Report and Comprehensive Systematic Review", "title_zh": "胃肠道神经束膜瘤和良性纤维母细胞息肉：病例报告和综合系统评价", "authors": "Talat Bessissow", "abstract_en": "<b>Background:</b> Perineurioma is a rare benign peripheral nerve sheath tumor that can arise in various body locations. In the gastrointestinal (GI) tract, perineuriomas are uncommon and have only been reported in case reports and case series. In addition, a new classification suggests reclassifying benign fibroblastic polyps as perineurioma when they show positive markers of perineurial differentiation. <b>Objective:</b> This study aims to enhance understanding of GI tract perineuriomas by presenting a new case and conducting a systematic literature review. <b>Methods:</b> We described a new case of colonic perineurioma and systematically reviewed all case reports and case series on GI perineuriomas and benign fibroblastic polyps with perineurial markers. We searched ScienceDirect, PubMed/MEDLINE, and Web of Science up to May 2024. <b>Results:</b> A total of 148 cases were analyzed, and most of the cases were published in the last decade (2014-2024). The majority were females (59.46%), with a mean age of 51 years (standard deviation [SD] ±14.87). Most GI perineuriomas (87.5%) were in the distal colon, predominantly in the sigmoid/rectosigmoid (56%) and rectum (14%). Outside the colon, the stomach was the most affected site (7 of 10 cases), with fewer cases in the small intestine and esophagus. The two most commonly performed stains were for epithelial membrane antigen (EMA) and glucose transporter 1 (GLUT-1), at 75% and 56% of cases, respectively. Noncolonic perineuriomas were generally larger and more symptomatic than colonic ones. Submucosal polyps were more likely symptomatic than mucosal polyps. <b>Conclusion:</b> Perineurioma in the GI tract is a rare benign polyp mainly identified in the distal colon. Its rarity and limited follow-up data restrict our understanding of recurrence rates. We recommend reporting uncommon polyp locations, detailing polyp morphologies, and using at least two markers for classification.", "abstract_zh": "<b>背景：</b>神经束膜瘤是一种罕见的良性周围神经鞘肿瘤，可发生在身体的各个部位。在胃肠道（GI）中，神经束膜瘤并不常见，仅在病例报告和病例系列中报道过。此外，一种新的分类建议，当良性成纤维细胞息肉显示出神经束膜分化的阳性标记时，将其重新分类为神经束膜瘤。 <b>目的：</b>本研究旨在通过提出新病例并进行系统文献综述来增强对胃肠道神经束膜瘤的了解。 <b>方法：</b>我们描述了一个新的结肠神经束膜病例，并系统地回顾了有关胃肠道神经束膜瘤和具有神经束膜标记的良性成纤维细胞息肉的所有病例报告和病例系列。我们检索了截至 2024 年 5 月的 ScienceDirect、PubMed/MEDLINE 和 Web of Science。<b>结果：</b>共分析了 148 个病例，大多数病例发表于过去十年（2014-2024 年）。大多数为女性 (59.46%)，平均年龄为 51 岁（标准差 [SD] ±14.87）。大多数胃肠道神经束膜瘤（87.5%）位于远端结肠，主要位于乙状结肠/直肠乙状结肠（56%）和直肠（14%）。在结肠以外，胃是受影响最严重的部位（10例中有7例），小肠和食道的病例较少。最常进行的两种染色是上皮膜抗原 (EMA) 和葡萄糖转运蛋白 1 (GLUT-1)，分别占 75% 和 56% 的病例。非结肠神经束膜瘤通常比结肠神经束膜瘤更大且症状更严重。粘膜下息肉比粘膜息肉更有可能出现症状。 <b>结论：</b> 胃肠道神经束膜瘤是一种罕见的良性息肉，主要发生在远端结肠。它的稀有性和有限的随访数据限制了我们对复发率的理解。我们建议报告不常见的息肉位置，详细说明息肉形态，并使用至少两个标记进行分类。", "keywords_zh": "良性成纤维细胞息肉, 病例报告, 病例系列, 胃肠道, 神经束膜瘤, 系统评价", "keywords_en": "benign fibroblastic polyps, case report, case series, gastrointestinal tract, perineurioma, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40225020/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 14 Apr 2025"}, {"id": "40192825", "title_en": "Botulinum toxin injection for management of post-haemorrhoidectomy pain: an updated systematic review and meta-analysis of randomised clinical trials", "title_zh": "肉毒毒素注射治疗痔疮切除术后疼痛：随机临床试验的最新系统评价和荟萃分析", "authors": "S Albayati", "abstract_en": "**Introduction:** Excisional haemorrhoidectomy remains the gold-standard treatment for grade III-IV haemorrhoids owing to the high success rate. However, post-operative pain management is an ongoing challenge. Botulinum toxin injection is thought to improve pain by targeting the internal anal sphincter spasm which occurs following haemorrhoidectomy. This systematic review and meta-analysis examines the effects of concurrent botulinum toxin injection on post-haemorrhoidectomy pain.\n\n**Methods:** A search of MEDLINE, EMBASE and Cochrane Databases for randomised controlled trials (RCTs) of botulinum toxin injection compared with placebo for management of post-haemorrhoidectomy pain was conducted following Preferred Reporting Items for Systematic Reviews and Meta-analyses (PRISMA) guidelines. Outcomes assessed included daily post-operative pain scores assessed using an analogue scale (0-10), pain at first defecation, analgesia use, complication rates and time to return to work.\n\n**Results:** A total of seven RCTs assessing 340 patients who underwent an excisional haemorrhoidectomy were included. In total, seven studies (n = 340) found significant reduction in pain post-procedure with botulinum toxin use on day 1 (mean difference, MD -1.53; 95% confidence intervals, CI -2.12, -0.94; p < 0.00001), with similar findings on day 2 and 4 (MD -1.84, 95% CI -3.28, -0.41; p = 0.01 and MD -1.63, 95% CI -2.15, -1.09; p < 0.00001, respectively). However, the analgesic effects were not seen on subsequent analyses up to day 14. Botulinum toxin was seen to be safe, with no significant difference in faecal incontinence (MD 1.05, 95% CI 0.40, 2.75; p = 0.93) or urinary retention (MD 0.37, 95% CI 0.09, 1.53; p = 0.17).\n\n**Conclusions:** Botulinum toxin use for pain relief post-excisional haemorrhoidectomy is safe and effective in the initial peri-operative period; however, the results were short-lived. Further, more robust randomised controlled trials are needed to strengthen these findings and determine the utility of botulinum toxin in this setting.\n\n**Trial Registration:** PROSPERO Register for Systematic Reviews Registration Number - CRD42024541351 on April 29 2024.", "abstract_zh": "**介绍：** 由于成功率高，痔切除术仍然是治疗 III-IV 级痔疮的金标准。然而，术后疼痛管理是一个持续的挑战。肉毒杆菌毒素注射被认为可以通过针对痔疮切除术后发生的肛门内括约肌痉挛来改善疼痛。这项系统评价和荟萃分析研究了同时注射肉毒毒素对痔疮切除术后疼痛的影响。\n\n**方法：** 根据系统评价和荟萃分析的首选报告项目 (PRISMA) 指南，在 MEDLINE、EMBASE 和 Cochrane 数据库中检索了肉毒毒素注射与安慰剂治疗痔疮切除术后疼痛的随机对照试验 (RCT)。评估的结果包括使用模拟量表（0-10）评估的每日术后疼痛评分、第一次排便时的疼痛、镇痛剂的使用、并发症发生率和重返工作岗位的时间。\n\n**结果：** 总共纳入了 7 项随机对照试验，评估了 340 名接受痔切除术的患者。总共有七项研究 (n = 340) 发现，在第 1 天使用肉毒杆菌毒素可显着减轻术后疼痛（平均差，MD -1.53；95% 置信区间，CI -2.12, -0.94；p< 0.00001），第 2 天和第 4 天也有类似的结果（MD -1.84，95% CI -3.28， -0.41；p = 0.01，MD -1.63，95% CI -2.15，-1.09；p < 0.00001）。然而，在随后的第 14 天分析中并未发现镇痛作用。肉毒杆菌毒素被认为是安全的，在大便失禁（MD 1.05，95% CI 0.40，2.75；p = 0.93）或尿潴留（MD 0.37，95% CI 0.09，1.53；p = 0.93）方面没有显着差异。 p = 0.17）。\n\n**结论：** 在围手术期初期，使用肉毒杆菌毒素缓解痔疮切除术后的疼痛是安全有效的；然而，结果是短暂的。此外，需要更强有力的随机对照试验来加强这些发现并确定肉毒杆菌毒素在这种情况下的效用。\n\n**Trial registration：** PROSPERO 于 2024 年 4 月 29 日注册系统评价注册号 - CRD42024541351。", "keywords_zh": "镇痛、肉毒杆菌毒素、痔疮切除术、疼痛、术后", "keywords_en": "Analgesia, Botulinum Toxins, Hemorrhoidectomy, Pain, Post-operative", "link": "https://pubmed.ncbi.nlm.nih.gov/40192825/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Apr 2025"}, {"id": "40186734", "title_en": "A systematic review of preoperative radiological factors associated with the development of low anterior resection syndrome (LARS)", "title_zh": "与低位前切除综合征（LARS）发生相关的术前放射学因素的系统评价", "authors": "Giuseppe Currò", "abstract_en": "The aim of this systematic review is to summarise the available evidence for radiological changes associated with postoperative low anterior resection syndrome (LARS). A literature search was undertaken for all studies focusing on preoperative radiological predictors of postoperative LARS. Articles were selected from MEDLINE, EMBASE and the Cochrane Central Register of Controlled Trials (CENTRAL) databases up to October 2024. Eighty-four articles were screened: eighty-one were excluded and three were included in the analysis. All included studies focused on preoperative Magnetic Resonance Imaging (MRI) already performed as part of the oncological assessments, no study examined ultrasound or defecography. Authors retrospectively selected patients that underwent LAR, screened them with the LARS score, and reviewed preoperative MRI images with specific softwares in order to find radiological characteristics associated with LARS. Results showed that particular anatomical characteristics were present in patients that subsequently developed major LARS: the volume of the pubococcygeal + iliococcygeus muscles in 27 LARS patients out of 46 LAR (odds ratio-OR 14.7, 95% CI 1.7-128.3; p = 0.02), the thickness of the anorectal joint in 136 LARS out of 255 LAR preceded by neoadjuvant chemoradiotherapy (OR 0.653, 95% CI 0.565-0.756; p = 0.001) and the mesorectal/pelvic volumes in 135 LARS out of 236 LAR (Cox Regression analysis, p = 0.0017 and p = 0.0001 respectively). Pelvic floor musculature is a factor, among the others, that contributes to LARS. Future prospective studies need to validate these retrospective results, further delineate its influence, and investigate the potential contribution of other radiologic investigations (ultrasound and defecography) in this setting.", "abstract_zh": "本系统评价的目的是总结与术后低位前切除综合征（LARS）相关的放射学变化的现有证据。对所有关注术后 LARS 术前放射学预测因素的研究进行了文献检索。截至 2024 年 10 月，文章选自 MEDLINE、EMBASE 和 Cochrane 对照试验中央注册库 (CENTRAL) 数据库。筛选了 84 篇文章：81 篇被排除，3 篇纳入分析。所有纳入的研究都集中在作为肿瘤学评估一部分进行的术前磁共振成像 (MRI)，没有研究检查超声或排粪造影。作者回顾性选择接受 LAR 的患者，通过 LARS 评分对其进行筛查，并使用特定软件查看术前 MRI 图像，以发现与 LARS 相关的放射学特征。结果显示，随后发生严重 LARS 的患者存在特定的解剖学特征：46 例 LAR 患者中，27 例患者的耻骨尾骨 + 髂尾骨肌肉体积（比值比 OR 14.7，95% CI 1.7-128.3；p = 0.02），136 例 LARS 中肛门直肠关节的厚度255 例 LAR 中先行新辅助放化疗（OR 0.653，95% CI 0.565-0.756；p = 0.001），236 例 LAR 中 135 例 LARS 的直肠系膜/盆腔体积（Cox 回归分析，p = 0.0017 和p = 0.0001）。盆底肌肉组织是导致 LARS 的一个因素。未来的前瞻性研究需要验证这些回顾性结果，进一步描述其影响，并调查其他放射学检查（超声和排粪造影）在此情况下的潜在贡献。", "keywords_zh": "低位前切除综合征、磁共振成像、盆底疾病、放射学、超声", "keywords_en": "Low anterior resection syndrome, Magnetic resonance imaging, Pelvic floor diseases, Radiology, Ultrasound", "link": "https://pubmed.ncbi.nlm.nih.gov/40186734/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Sat, 05 Apr 2025"}, {"id": "40171091", "title_en": "Treatment of Hemorrhoidal Disease in Patients with Liver Cirrhosis: A Systematic Review", "title_zh": "肝硬化患者痔疮的治疗：系统评价", "authors": "Paulo Salgueiro", "abstract_en": "**Introduction:** The incidence of hemorrhoidal disease (HD) in cirrhotic patients is similar to that of general population, varying between 21% and 79%. Managing this clinical condition in these patients is challenging, due to the need to differentiate between bleeding originating from hemorrhoids or anorectal varices, and the unique hemostatic balance of each patient, which can lead to a decompensation of liver function and subsequently increase the anesthetic risk. To date, there are no systematic reviews specifically addressing this topic.\n\n**Methods:** This was a systematic review following the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines. Studies were retrieved from three electronic databases. Efficacy (symptomatic improvement, patient satisfaction, quality of life improvement, disease recurrence/need for surgery and/or hemorrhoidal prolapse reduction in anoscopy) and safety (reported adverse events) outcomes were evaluated. Data from each study were initially described individually, followed by a comparative analysis for procedures applied in multiple studies.\n\n**Results:** Six studies were included - 1 randomized clinical trial (RCT), 2 prospective cohort studies, 1 retrospective cohort study, and 2 case series. The considered techniques encompassed rubber band ligation (RBL), injection sclerotherapy (IS) using 3 agents - aluminum potassium sulfate and tannic acid (ALTA), ethanolamine oleate 5% (EAO), or N-butyl-cyanoacrylate, hemorrhoidopexy, and emborrhoid technique. RBL showed great symptomatic improvement and patient satisfaction in 63% and 73% of patients, respectively, and in 90% was associated with one-grade prolapse reduction after only one session. The most frequently reported adverse events included pain (16%) and ulceration/fissure (1-17%). Concerning IS, symptomatic improvement was observed in all patients. Recurrence rates varied with the agent used (EAO: 13% at 12 months; N-butyl-cyanoacrylate: 40% at 12 months; ALTA: 18% at 5 years), and 86.7% of patients exhibited more than one-grade reduction after the initial session. The most frequent adverse event was pain (EAO: 63%; N-butyl-cyanoacrylate: 60%). Stapled hemorrhoidopexy resulted in symptomatic improvement in all patients, although associated with a recurrence rate of 25% within 4 months. With an emborrhoid technique, 80% of the patients showed clinical improvement at a 3-month follow-up, without significant adverse events, at the cost of a 40% recurrence rate.\n\n**Conclusions:** All the treatment methods assessed in the included studies appear to be effective and safe in cirrhotic patients. This assumption challenges previous concerns regarding significant bleeding after office-based procedures like RBL in this population. Future research should prioritize RCT to thoroughly assess the management of HD in these patients, particularly addressing polidocanol foam sclerotherapy, a minimally invasive technique that has previously been shown to be more effective than RBL in the general population and in patients with bleeding disorders.", "abstract_zh": "**介绍：** 肝硬化患者中痔疮疾病 (HD) 的发病率与一般人群相似，在 21% 至 79% 之间变化。处理这些患者的这种临床状况具有挑战性，因为需要区分源自痔疮或肛门直肠静脉曲张的出血，以及每个患者独特的止血平衡，这可能导致肝功能失代偿，从而增加麻醉风险。迄今为止，还没有专门针对该主题的系统综述。\n\n**方法：** 这是遵循系统评价和荟萃分析首选报告项目 (PRISMA) 指南的系统评价。研究是从三个电子数据库中检索的。评估疗效（症状改善、患者满意度、生活质量改善、疾病复发/手术需要和/或肛门镜检查中痔脱垂减少）和安全性（报告的不良事件）结果。每项研究的数据最初都是单独描述的，然后对多项研究中应用的程序进行比较分析。\n\n**结果：** 纳入六项研究 - 1 项随机临床试验 (RCT)、2 项前瞻性队列研究、1 项回顾性队列研究和 2 项病例系列研究。考虑的技术包括橡皮筋结扎 (RBL)、使用 3 种药物的注射硬化疗法 (IS) - 硫酸铝钾和单宁酸 (ALTA)、油酸乙醇胺 5% (EAO) 或氰基丙烯酸正丁酯、痔疮固定术和痔疮技术。 RBL 分别在 63% 和 73% 的患者中显示出极大的症状改善和患者满意度，并且 90% 的患者仅在一次疗程后就实现了一级脱垂减少。最常报告的不良事件包括疼痛（16%）和溃疡/裂隙（1-17%）。关于 IS，所有患者均观察到症状改善。复发率随所用药物的不同而变化（EAO：12 个月时为 13%；氰基丙烯酸正丁酯：12 个月时为 40%；ALTA：5 年时为 18%），86.7% 的患者在初次治疗后表现出超过一级的复发率。最常见的不良事件是疼痛（EAO：63%；氰基丙烯酸正丁酯：60%）。吻合器痔疮固定术使所有患者的症状得到改善，但 4 个月内复发率高达 25%。使用痔疮技术，80% 的患者在 3 个月的随访中表现出临床改善，没有明显的不良事件，但代价是 40% 的复发率。\n\n**结论：** 纳入研究中评估的所有治疗方法似乎对肝硬化患者有效且安全。这一假设挑战了之前对该人群进行 RBL 等办公室手术后出现大量出血的担忧。未来的研究应优先考虑随机对照试验，以彻底评估这些患者的 HD 治疗，特别是解决聚多卡醇泡沫硬化疗法，这是一种微创技术，此前已被证明在普通人群和出血性疾病患者中比 RBL 更有效。", "keywords_zh": "痔疮疾病，肝硬化，系统评价", "keywords_en": "Hemorrhoidal disease, Liver cirrhosis, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40171091/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 02 Apr 2025"}, {"id": "40161159", "title_en": "Hemorrhoidal Artery Ligation (HAL) vs. Rubber Band Ligation (RBL) for Second- and Third-Degree Hemorrhoids: A Systematic Review and Meta-Analysis", "title_zh": "二度和三度痔疮的痔动脉结扎 (HAL) 与橡皮筋结扎 (RBL)：系统评价和荟萃分析", "authors": "Ali Yasen Mohamedahmed", "abstract_en": "This systematic review investigates the outcomes of rubber band ligation (RBL) vs. hemorrhoidal artery ligation (HAL) for second and third-degree hemorrhoids. This review was designed, performed, and reported as per the recommendations of the Cochrane Handbook for Systematic Reviews of Interventions and Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines. Literature databases, including PubMed, Cochrane, Science Direct, and Google Scholar, were searched for studies comparing rubber band ligation vs. hemorrhoidal artery ligation for second- and third-degree hemorrhoids. The primary outcome was the recurrence of hemorrhoids, while post-operative bleeding, post-operative pain, surgical site infection, and success rate were the secondary outcomes. The literature search and inclusion criteria identified five studies (n=953) comparing HAL (n=548) vs. RBL (n=405). The recurrence rate was higher in the RBL group (28.4%) compared to the HAL group (19.3%) (odds ratio {OR}: 0.57, p=0.001). The two groups showed comparable results regarding post-operative pain (OR: 0.77, p=0.77), post-operative bleeding (OR: 1.48, p=0.44), and surgical site infection (risk difference: 0.00, p=0.67). Moreover, the short-term success rate was 85% in HAL compared to 86% in RBL (p=0.71). Rubber band ligation and hemorrhoidal artery ligation showed comparable short-term outcomes regarding symptom treatment, post-operative bleeding, and pain. However, HAL was superior in terms of recurrence rate.", "abstract_zh": "本系统综述研究了橡皮筋结扎 (RBL) 与痔动脉结扎 (HAL) 对于二度和三度痔疮的疗效。本次评价是根据干预系统评价 Cochrane 手册以及系统评价和荟萃分析首选报告项目 (PRISMA) 指南的建议进行设计、执行和报告的。检索了包括 PubMed、Cochrane、Science Direct 和 Google Scholar 在内的文献数据库，查找比较橡皮筋结扎与痔动脉结扎治疗二度和三度痔疮的研究。主要结局是痔疮复发，次要结局是术后出血、术后疼痛、手术部位感染和成功率。文献检索和纳入标准确定了五项研究 (n=953)，比较 HAL (n=548) 与 RBL (n=405)。 RBL 组的复发率 (28.4%) 高于 HAL 组 (19.3%)（比值比 {OR}：0.57，p=0.001）。两组在术后疼痛（OR：0.77，p=0.77）、术后出血（OR：1.48，p=0.44）和手术部位感染（风险差异：0.00，p=0.67）方面显示出可比的结果。此外，HAL 的短期成功率为 85%，而 RBL 的短期成功率为 86% (p=0.71)。橡皮筋结扎和痔动脉结扎在症状治疗、术后出血和疼痛方面显示出相当的短期结果。然而，HAL 在复发率方面更胜一筹。", "keywords_zh": "二度、三度痔疮，二度，三度痔疮，痔动脉结扎手术（晕），痔疮手术，直肠科，橡皮筋结扎手术", "keywords_en": "2nd and 3rd degree hemorrhoids, 2nd degree and 3rd degree haemorrhoids, hemorrhoidal artery ligation operation (halo), hemorrhoids surgery, proctology, rubber band ligation procedure", "link": "https://pubmed.ncbi.nlm.nih.gov/40161159/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 31 Mar 2025"}, {"id": "40148836", "title_en": "Rectal prolapse as an initial presentation of colorectal cancer: a systematic review", "title_zh": "直肠脱垂作为结直肠癌的首发表现：系统评价", "authors": "Esmat Davoudi-Monfared", "abstract_en": "**Background:** Colorectal cancer rising incidence still pose a public health challenge. In the present systematic review, we aimed to study the colorectal cancer patients with initial presentation of rectal prolapse.\n\n**Method:** The study protocol was developed (PROSPERO CRD42017060473). We searched Web of Science, PubMed and Scopus to identify case reports of rectal Prolapse as a chief compliant of colorectal cancer. The Preferred Reporting Items for Systematic Reviews and Meta- Analysis (PRISMA) guidelines were used for screening and data extraction.\n\n**Results:** Thirty-one case reports were included in this review. More than half of the patients were females over 65 years old and mean ± SD age of the cases were 64 ± 17.9 years and, the female gender were mentioned in 17 (56%) case reports. The majority (64.5%) of the identified cancer belong to rectum and recto-sigmoid origin's location. In the history retained from the cases, rectal bleeding and constipation were the most frequent reported accompanied symptoms in colorectal cancer cases with initial presentation of rectal prolapse. 67.7% of all identified cases in this review published at 2015 and later.\n\n**Conclusion:** Rectal prolapse can be an initial presentation of colorectal cancer, which is more prevalent in female more than 65 years old. The most common symptoms accompanied rectal prolapse were rectal bleeding and constipation. According to rising published case reports on colorectal cancer patients with initial presentation of rectal prolapse in recent years, further work-up is recommended for patients without predisposing factors for a concomitant tumor.", "abstract_zh": "**背景：** 结直肠癌发病率上升仍然构成公共卫生挑战。在本系统评价中，我们旨在研究以直肠脱垂为首发症状的结直肠癌患者。\n\n**Method：** 制定了研究方案（PROSPERO CRD42017060473）。我们搜索了 Web of Science、PubMed 和 Scopus，以确定直肠脱垂作为结直肠癌主要症状的病例报告。系统评价和荟萃分析的首选报告项目 (PRISMA) 指南用于筛选和数据提取。\n\n**结果：** 本次审查纳入了 31 份病例报告。超过一半的患者为65岁以上的女性，病例的平均±SD年龄为64±17.9岁，17例（56%）病例报告中提到了女性。大多数（64.5%）已发现的癌症属于直肠和直肠乙状结肠起源位置。在病例保留的病史中，直肠出血和便秘是最初表现为直肠脱垂的结直肠癌病例中最常见的伴随症状。本次审查中发现的所有案例中，67.7% 是在 2015 年及之后发布的。\n\n**结论：** 直肠脱垂可能是结直肠癌的首发表现，结直肠癌在 65 岁以上的女性中更为常见。直肠脱垂最常见的症状是直肠出血和便秘。近年来，关于初次出现直肠脱垂的结直肠癌患者的病例报告不断增加，建议对没有伴随肿瘤诱发因素的患者进行进一步检查。", "keywords_zh": "结直肠癌, 初次表现, 直肠脱垂, 系统评价", "keywords_en": "Colorectal cancer, Initial presentation, Rectal prolapse, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40148836/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 28 Mar 2025"}, {"id": "40148672", "title_en": "Does biodegradable peri-rectal spacer mitigate treatment toxicities in radiation therapy for localised prostate cancer-a systematic review and meta-analysis", "title_zh": "可生物降解的直肠周围间隔物是否可以减轻局限性前列腺癌放射治疗的治疗毒性——系统评价和荟萃分析", "authors": "Jeremy Yuen-Chun Teoh", "abstract_en": "**Introduction:** There is an increasing use of biodegradable peri-rectal spacer prior to radiation therapy for prostate cancer to reduce treatment-associated rectal toxicity. While data from individual trials and cohorts is maturing, there is a lack of an updated quantitative analysis that includes outcomes following peri-rectal spacer. We aim to delineate the clinical impact of peri-rectal spacer in localised prostate cancer patients treated with radiotherapy.\n\n**Methods:** In March 2024, a systematic search was performed on MEDLINE, Embase, and Cochrane Central Register of controlled trials for publications since the year 2010. Prospective and retrospective studies reporting comparative outcomes of patients with and without peri-rectal spacer prior to radiotherapy were considered. Outcomes are reported in binary fashion. Random effect meta-analysis with the use of weighted mean difference was adopted. Early (≤3 months) and late rectal toxicity stratified according to the Common Terminology Criteria for Adverse Events (CTCAE) criteria, early and late genitourinary toxicity, quality of life in bowel, sexual and urinary domains (in terms of minimal clinically important difference) were assessed.\n\n**Results:** The systematic review included 17 studies. There are 3 RCTs, 3 prospective cohorts, and 11 retrospective cohorts. Three thousand two hundred patients were included, with 1471 patients who received peri-rectal spacer and 1729 without. The use of spacer is associated with lower likelihood of late (1.62% vs. 9.35%, RR = 0.25, 95% CI = 0.15-0.42, P < 0.001) and early grade 2 or above late rectal toxicity (3.07% vs. 6.05%, RR = 0.53, 95% CI = 0.33-0.86, P < 0.001). No difference is observed in significant grade 3 or above GI (acute or late) events. There is no statistical difference in bowel-related bowel QoL (risk difference = -0.16, 95% CI = -0.38-0.06, P = 0.15). The perirectal spacer is not associated with negative impact to urinary or sexual domains of QoL either.\n\n**Conclusion:** In localised prostate cancer patients treated with radiation therapy, the use of peri-rectal spacer is associated with reduced rectal toxicities.", "abstract_zh": "**介绍：** 在前列腺癌放射治疗之前，越来越多地使用可生物降解的直肠周围间隔物，以减少治疗相关的直肠毒性。虽然来自个别试验和队列的数据正在成熟，但缺乏包括直肠周围间隔器后结果的更新的定量分析。我们的目的是描述直肠周围间隔物对接受放射治疗的局限性前列腺癌患者的临床影响。\n\n**方法：** 2024 年 3 月，对 MEDLINE、Embase 和 Cochrane Central Register 上自 2010 年以来发表的对照试验进行了系统检索。考虑了报告放疗前使用和不使用直肠周围间隔物的患者的比较结果的前瞻性和回顾性研究。结果以二进制方式报告。采用加权平均差的随机效应荟萃分析。根据不良事件通用术语标准 (CTCAE) 标准分层的早期（≤3 个月）和晚期直肠毒性、早期和晚期泌尿生殖毒性、肠道、性和泌尿领域的生活质量（就最小临床重要差异而言）进行了评估。\n\n**结果：** 系统评价包括 17 项研究。有 3 个随机对照试验、3 个前瞻性队列和 11 个回顾性队列。研究纳入了 3200 名患者，其中 1471 名患者接受了直肠周围间隔器，1729 名患者未接受直肠周围间隔器。使用垫片与晚期（1.62% vs. 9.35%，RR = 0.25，95% CI = 0.15-0.42，P < 0.001）和早期2级或以上晚期直肠毒性的可能性较低（3.07% vs. 6.05%，RR = 0.53， 95% CI = 0.33-0.86，P < 0.001）。在显着的 3 级或以上 GI（急性或晚期）事件中没有观察到差异。肠道相关的肠道QoL没有统计学差异（风险差 = -0.16，95% CI = -0.38-0.06，P = 0.15）。直肠周围间隔物也不会对泌尿或性领域的生活质量产生负面影响。\n\n**结论：** 在接受放射治疗的局限性前列腺癌患者中，使用直肠周围间隔物可减少直肠毒性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40148672/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 28 Mar 2025"}, {"id": "40135757", "title_en": "Author's Reply to Letter About: How to Write a Systematic Review and Meta-Analysis", "title_zh": "作者对关于以下内容的信的回复：如何撰写系统评价和荟萃分析", "authors": "Richard L Nelson", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40135757/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 26 Mar 2025"}, {"id": "40135742", "title_en": "Striking A Balance: The Risks of Oversimplifying Systematic Review Methodology", "title_zh": "取得平衡：过度简化系统审查方法的风险", "authors": "Rachel Riera", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40135742/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 26 Mar 2025"}, {"id": "40102483", "title_en": "Comparative pregnancy rate after colorectal resection versus other surgical procedures for deep infiltrating rectal endometriosis: a systematic review and meta-analysis", "title_zh": "结直肠切除术与其他深部浸润直肠子宫内膜异位症手术后妊娠率的比较：系统评价和荟萃分析", "authors": "Jean-Marc Ayoubi", "abstract_en": "The debate around colorectal surgery for endometriosis has been ongoing, but to date no meta-analysis has investigated the impact of the different surgical approaches on the pregnancy rate. The aim of this meta-analysis study was to determine in women with deep infiltrating rectal endometriosis, how does colorectal resection surgery compare to other surgical techniques (e.g., rectal shaving, disc excision) in terms of pregnancy rates. We searched PubMed, Web of Science, Cochrane library and Clinical Trials for relevant studies published from inception to December 2024. We performed a systematic review and meta-analysis of all English language full-text articles addressing colorectal resection compared with other management of deep infiltrating rectal endometriosis and presenting pregnancy outcomes. We included a study when it (i) provided data on surgical management (shaving, disc excision, and/or colorectal resection) and (ii) detailed the pregnancy outcomes in each subgroup. Four authors independently performed the initial search to evaluate the eligibility criteria. Four authors extracted the data and a fifth author checked this extraction. Of the 113 full-text articles assessed for eligibility, we included 13 in the meta-analysis. These studies represented a total of 3,248 patients. Pregnancy information was available for 2,131 patients: 1073 colorectal resection, 502 shaving, 172 disc excisions, and 384 other practices (expectant management). Colorectal resection was associated with a lower pregnancy rate compared with the other techniques (N = 2,131, odds ratio [OR] = 0.64 [95% confidence interval 0.52-0.79], p < 0.001, I2 = 35%). There were similar results when comparing colorectal resection with rectal shaving (N = 952, OR = 0.51 [95% confidence interval 0.36-0.73], p < 0.001, I2 = 0%), but not when comparing colorectal resection with disc excision (N = 432, OR = 0.65 [95% confidence interval 0.37-1.13], p = 0.13). Conclusions Rectal resection for endometriosis is associated with a lower pregnancy rate compared with other type of surgery, such as shaving. Trial registration: PROSPERO registration number CRD42024512328.", "abstract_zh": "关于子宫内膜异位症的结直肠手术的争论一直在持续，但迄今为止还没有荟萃分析调查不同手术方法对妊娠率的影响。这项荟萃分析研究的目的是确定对于患有深部浸润直肠子宫内膜异位症的女性，结直肠切除手术与其他手术技术（例如直肠剃除术、椎间盘切除术）相比，其妊娠率如何。我们检索了 PubMed、Web of Science、Cochrane 图书馆和临床试验，查找从开始到 2024 年 12 月发表的相关研究。我们对所有涉及结直肠切除术与深部浸润直肠子宫内膜异位症的其他治疗方法和妊娠结局的英文全文文章进行了系统回顾和荟萃分析。我们纳入了一项研究，它（i）提供了手术治疗（剃毛、椎间盘切除和/或结直肠切除）的数据，并且（ii）详细说明了每个亚组的妊娠结局。四位作者独立进行了初步检索以评估资格标准。四位作者提取了数据，第五位作者检查了此提取。在评估资格的 113 篇全文文章中，我们将 13 篇纳入荟萃分析。这些研究总共涉及 3,248 名患者。提供了 2,131 名患者的怀孕信息：1073 例结直肠切除术、502 例剃毛术、172 例椎间盘切除术和 384 例其他手术（期待治疗）。与其他技术相比，结直肠切除术与较低的妊娠率相关（N = 2,131，比值比[OR] = 0.64 [95%置信区间0.52-0.79]，p < 0.001，I2 = 35%）。比较结直肠切除术与直肠剃除术时有相似的结果（N = 952，OR = 0.51 [95%置信区间0.36-0.73]，p < 0.001，I2 = 0%），但比较结直肠切除术与椎间盘切除术时则不然（N = 432， OR = 0.65 [95% 置信区间 0.37-1.13]，p = 0.13）。结论 与其他类型的手术（例如剃毛）相比，直肠切除术治疗子宫内膜异位症的妊娠率较低。试用注册：PROSPERO注册号CRD42024512328。", "keywords_zh": "结直肠切除术、椎间盘切除术、子宫内膜异位症、怀孕、剃毛", "keywords_en": "Colorectal resection, Disc excision, Endometriosis, Pregnancy, Shaving", "link": "https://pubmed.ncbi.nlm.nih.gov/40102483/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 19 Mar 2025"}, {"id": "40072118", "title_en": "Key Factors to Consider for Candida auris Screening in Healthcare Settings: A Systematic Review", "title_zh": "医疗机构中耳念珠菌筛查要考虑的关键因素：系统评价", "authors": "Mari Molvik", "abstract_en": "**Background:** Candida auris is an emerging fungal pathogen that is often multidrug-resistant. It can persist on skin and in hospital environments, leading to outbreaks and severe infections for patients at risk. Several countries and institutions are working on establishing guidelines and recommendations for prevention. This review aims to assess the evidence on factors associated with C. auris colonisation or infection, the duration of such colonisation, possible colonisation sites, and the risk of secondary cases to inform screening recommendations.\n\n**Methods:** We systematically searched five databases for primary studies and systematic reviews of our four outcomes. We excluded studies on treatment, management, laboratory methods, drug resistance, and environmental screening. From each paper, we extracted relevant data and summarised them in tables. Main findings were described narratively.\n\n**Findings:** We selected 117 studies for inclusion. Most of the studies were observational studies. Without taking the method of testing into account, the duration of C. auris colonisation varied, with up to and beyond a year being common. The predominant sites of colonisation were the axillae and groin, with the nares and rectum being less common sites. The risk of secondary cases saw considerable variation across the studies, and the secondary cases primarily involved patients and not healthcare workers. Critical care settings, invasive medical devices, recent antimicrobial use, and comorbidities were often associated with C. auris colonisation and infection.\n\n**Conclusion:** Our review highlights that, despite relevant findings on factors influencing C. auris colonisation and infection, substantial gaps remain in the evidence supporting screening practices. Most studies were conducted reactively, in outbreak settings, and lack systematic protocols. Given these limitations, screening guidelines are likely to be more successful if grounded in medical theory and yeast microbiology rather than relying solely on current studies. Rigorous, well-designed research is urgently needed to inform future C. auris screening and control efforts.", "abstract_zh": "**背景：** 耳念珠菌是一种新兴的真菌病原体，通常具有多重耐药性。它可以持续存在于皮肤和医院环境中，导致高危患者爆发和严重感染。一些国家和机构正在努力制定预防指南和建议。本综述旨在评估与耳念珠菌定植或感染相关的因素、定植持续时间、可能的定植位点以及继发病例的风险的证据，以提供筛查建议。\n\n**方法：** 我们系统地检索了五个数据库进行初步研究并对我们的四个结果进行系统评价。我们排除了有关治疗、管理、实验室方法、耐药性和环境筛查的研究。我们从每篇论文中提取了相关数据并将其总结在表格中。对主要发现进行了叙述性描述。\n\n**Findings：** 我们选择了 117 项研究纳入其中。大多数研究都是观察性研究。如果不考虑测试方法，耳念珠菌定殖的持续时间各不相同，最长或超过一年的情况很常见。定植的主要部位是腋窝和腹股沟，鼻孔和直肠是不太常见的部位。各个研究中继发病例的风险存在很大差异，并且继发病例主要涉及患者而不是医护人员。重症监护环境、侵入性医疗设备、近期抗菌药物的使用以及合并症通常与耳念珠菌定植和感染有关。\n\n**结论：** 我们的综述强调，尽管对影响耳念珠菌定植和感染的因素有相关发现，但支持筛查实践的证据仍然存在很大差距。大多数研究都是在疫情爆发的情况下被动进行的，缺乏系统的方案。鉴于这些限制，如果基于医学理论和酵母微生物学而不是仅仅依赖当前的研究，筛查指南可能会更成功。迫切需要严谨、精心设计的研究来为未来的耳念珠菌筛查和控制工作提供信息。", "keywords_zh": "耳念珠菌、真菌感染、医疗保健相关感染、感染控制、筛查", "keywords_en": "Candida auris, fungal infections, healthcare‐associated infections, infection control, screening", "link": "https://pubmed.ncbi.nlm.nih.gov/40072118/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 12 Mar 2025"}, {"id": "40063683", "title_en": "Evaluating the Impact of Induction and Consolidation Total Neoadjuvant Therapies Compared to Conventional Chemoradiotherapy for Locally Advanced Rectal Cancer: A Systematic Review and Network Meta-analysis", "title_zh": "评估诱导和巩固总体新辅助治疗与传统放化疗对局部晚期直肠癌的影响：系统评价和网络荟萃分析", "authors": "Jeonghyun Kang", "abstract_en": "**Background:** Total neoadjuvant therapy has been introduced to enhance oncological outcomes and minimize toxicity in locally advanced rectal cancer, but the superiority between the induction and consolidation of therapy remain unclear.\n\n**Objective:** To evaluate oncological and postoperative outcomes by comparing induction chemotherapy and consolidation chemotherapy with conventional chemoradiotherapy in patients with locally advanced rectal cancer.\n\n**Data Sources:** Systematic searches of PubMed, Embase, and Cochrane databases wereperformed for studies published from the database's inception until June 2023.\n\n**Study Selection:** The inclusion criteria were patients diagnosed with rectal cancer. Interventions included induction chemotherapy and consolidation chemotherapy, and comparisons were specified as conventional neoadjuvant chemoradiotherapy.\n\n**Main Outcome Measures:** Primary outcomes were the rates of pathologic or clinical complete response, postoperative results, chemoradiotherapy-related toxicity, and survival outcomes.\n\n**Results:** Thirty-three studies, encompassing patients from 1991 to 2021, were eligible for analysis. In network meta-analysis, a significantly increased OR for a pathologic complete response was observed in both the induction therapy group at 1.65 (95% credible interval, 1.18-2.30) and the consolidation therapy group at 1.87 (95% credible interval, 1.40-2.47) compared to conventional chemoradiotherapy. However, no difference was observed in complete response rates, postoperative results, or chemoradiotherapy-related toxicity grade 3 or higher between the groups. There were no differences among the groups in local recurrence, distant metastasis, or disease-free survival, whereas the induction group showed a nonsignificant improvement in overall survival.\n\n**Limitations:** There was significant heterogeneity among the studies, and the short follow-up period in most studies limited the assessment of long-term survival outcomes.\n\n**Conclusions:** Both induction and consolidation total neoadjuvant therapy increase the pathologic complete response rate in locally advanced rectal cancer without compromising safety or postoperative outcomes. However, total neoadjuvant therapy was not associated with a significant improvement in survival outcomes. Although total neoadjuvant therapy strategies for locally advanced rectal cancer are considered safe, additional long-term studies are needed.\n\n**Trial Registration No:** CRD42023445348.", "abstract_zh": "**背景：** 已引入全新辅助治疗来增强局部晚期直肠癌的肿瘤学结果并最大程度地减少毒性，但诱导治疗和巩固治疗之间的优越性仍不清楚。\n\n**目的：** 通过比较局部晚期直肠癌患者的诱导化疗和巩固化疗与常规放化疗，评估肿瘤学和术后结果。\n\n**Data sources：** 对 PubMed、Embase 和 Cochrane 数据库进行了系统检索，查找从数据库成立到 2023 年 6 月期间发表的研究。\n\n**Study selection：** 纳入标准是诊断患有直肠癌的患者。干预措施包括诱导化疗和巩固化疗，比较指定为常规新辅助放化疗。\n\n**Main outcome measures：** 主要结局是病理或临床完全缓解率、术后结果、放化疗相关毒性和生存结果。\n\n**结果：** 涵盖 1991 年至 2021 年患者的 33 项研究符合分析条件。在网络荟萃分析中，与传统放化疗相比，诱导治疗组的病理完全缓解 OR 显着增加为 1.65（95% 可信区间，1.18-2.30），巩固治疗组为 1.87（95% 可信区间，1.40-2.47）。然而，两组间在完全缓解率、术后结果或放化疗相关毒性 3 级或以上方面没有观察到差异。各组之间的局部复发、远处转移或无病生存率没​​有差异，而诱导组的总生存率没有显着改善。\n\n**Limitations：** 研究之间存在显着的异质性，并且大多数研究的短期随访限制了长期生存结果的评估。\n\n**结论：** 诱导和巩固全新辅助治疗均可提高局部晚期直肠癌的病理完全缓解率，且不影响安全性或术后结果。然而，总体新辅助治疗与生存结果的显着改善无关。尽管局部晚期直肠癌的总体新辅助治疗策略被认为是安全的，但仍需要额外的长期研究。\n\n**Trial registration no：** CRD42023445348。", "keywords_zh": "巩固化疗、诱导化疗、直肠癌、全面新辅助治疗", "keywords_en": "Consolidation chemotherapy, Induction chemotherapy, Rectal cancer, Total neoadjuvant therapy", "link": "https://pubmed.ncbi.nlm.nih.gov/40063683/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 10 Mar 2025"}, {"id": "40019566", "title_en": "Quantification of indocyanine green fluorescence angiography in colorectal surgery: a systematic review of the literature", "title_zh": "结直肠手术中吲哚菁绿荧光血管造影的量化：文献的系统回顾", "authors": "Ronan A Cahill", "abstract_en": "**Background:** Indocyanine green fluorescence angiography (ICGFA) during colorectal surgery associates with reduced post-operative anastomotic complication rates. Because its interpretation is subjective, quantification has been proposed to address inter-user variability. This study reviews the published literature regarding ICGFA quantification during colorectal surgery with a focus on impactful clinical deployment.\n\n**Methods:** A systematic review was performed of English language publications regarding clinical studies of ICGFA quantification in colorectal surgery in PubMed, Scopus, Web of Science and Cochrane Library on 29th August 2024, updated to 18th November 2024, following PRISMA guidelines. Newcastle Ottawa scale (NOS) was used to assess quality.\n\n**Results:** A total of 1428 studies were screened with 22 studies (1469 patients) selected. There was significant heterogeneity of ICGFA methodology, quantification methods and parameter selection and only three studies were NOS \"high\" quality. Extracorporeal application was most common. Four studies (154 patients) conducted real-time ICGFA analyses (others were post hoc) and four utilised artificial intelligence methods. Eleven studies only included patients undergoing left-sided resection (six focusing specifically on rectal resections). Only one study employed the quantification method to guide intra-operative decision-making regarding colonic transection. Twenty-six different perfusion parameters were assessed, with time from injection to visible fluorescence and maximum intensity the most commonly (but not only) correlated parameters regarding anastomotic complication (n = 18). Other grounding correlates were tissue oxygenation (n = 3, two with hyperspectral imagery), metabolites (n = 2) and surgeon interpretation (n = 5).\n\n**Conclusion:** Quantification of the ICGFA signal for colorectal surgery is feasible but has so far seen limited academic advancement beyond feasibility.", "abstract_zh": "**背景：** 结直肠手术期间的吲哚菁绿荧光血管造影（ICGFA）与降低术后吻合口并发症发生率相关。由于其解释是主观的，因此提出了量化来解决用户间的可变性。本研究回顾了有关结直肠手术期间 ICGFA 定量的已发表文献，重点关注有影响力的临床部署。\n\n**方法：** 根据 PRISMA 指南，于 2024 年 8 月 29 日对 PubMed、Scopus、Web of Science 和 Cochrane 图书馆中有关结直肠手术中 ICGFA 定量临床研究的英文出版物进行了系统回顾，更新至 2024 年 11 月 18 日。纽卡斯尔渥太华量表（NOS）用于评估质量。\n\n**结果：** 总共筛选了 1428 项研究，选出了 22 项研究（1469 名患者）。 ICGFA 方法、量化方法和参数选择存在显着异质性，只有三项研究达到 NOS“高”质量。体外应用最为常见。四项研究（154 名患者）进行了实时 ICGFA 分析（其他研究是事后分析），四项研究利用了人工智能方法。十一项研究仅纳入接受左侧切除术的患者（其中六项研究专门针对直肠切除术）。只有一项研究采用量化方法来指导结肠横断术的术中决策。评估了二十六个不同的灌注参数，从注射到可见荧光的时间和最大强度是与吻合并发症最常见（但不仅仅是）相关的参数（n = 18）。其他基础相关因素包括组织氧合（n = 3，其中两个具有高光谱图像）、代谢物（n = 2）和外科医生解释（n = 5）。\n\n**结论：** 结直肠手术中 ICGFA 信号的量化是可行的，但迄今为止学术进展有限，超出了可行性。", "keywords_zh": "结直肠手术、荧光血管造影、吲哚菁绿、近红外腹腔镜检查、定量", "keywords_en": "Colorectal surgery, Fluorescence angiography, Indocyanine green, Near infrared laparoscopy, Quantification", "link": "https://pubmed.ncbi.nlm.nih.gov/40019566/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 28 Feb 2025"}, {"id": "39982791", "title_en": "Research Perspective on Outcome Following Surgical Treatment for Chronic Pilonidal Sinus Disease: A Systematic Review of Common Surgical Techniques", "title_zh": "慢性藏毛窦疾病手术治疗结果的研究视角：常用手术技术的系统回顾", "authors": "Arielle E Kanters", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39982791/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 21 Feb 2025"}, {"id": "39982788", "title_en": "Outcome After Surgical Treatment for Chronic Pilonidal Sinus Disease: A Systematic Review of Common Surgical Techniques", "title_zh": "慢性藏毛窦疾病手术治疗后的结果：常见手术技术的系统回顾", "authors": "Birgitte Brandstrup", "abstract_en": "**Background:** The choice of operation for chronic pilonidal sinus disease remains controversial.\n\n**Objective:** To compare the outcomes of common operations for chronic pilonidal disease.\n\n**Data Sources:** We searched PubMed, Embase, and the Cochrane Library.\n\n**Study Selection:** We included randomized trials in English or Danish language, published 2002 to 2024 that compared outcomes of operations to treat chronic pilonidal disease in adults and teenagers.\n\n**Interventions:** We compared the outcomes of secondary healing, primary midline closure, Bascom, Limberg, and Karydakis flap operations.\n\n**Main Outcome Measures:** The primary outcome was recurrence; secondary outcomes were infection, healing time, and length of stay. We compared recurrence and infection rates in meta-analyses for all techniques. We assessed the risk of bias and the quality of all trials.\n\n**Results:** Fifty trials included a total of 5762 participants. In a meta-analysis, the flap operations had fewer recurrences than primary midline closure (OR 0.31; 95% CI, 0.19-0.51; p < 0.01). The trials comparing flap operations with secondary healing were heterogeneous and did not reach significance (OR 0.38; 95% CI, 0.13-1.13; p = 0.08). Recurrence was similar between Limberg and Karydakis operations. Infection rates were lower for the flap operations compared with primary closure (OR 0.33; 95% CI, 0.23-0.48; p < 0.01) and with secondary healing (OR 0.48; 95% CI, 0.30-0.77; p < 0.01). Two trials tested Bascom procedure against Limberg operation without significant differences. All trials found secondary healing to have significantly longer healing times than any other operation.\n\n**Limitations:** Most studies had a high or medium risk of bias, resulting in very low to low certainty of evidence. The trials generally had small numbers, short follow-ups, and no reported primary outcomes or power calculations.\n\n**Conclusions:** Primary closure and secondary healing performed poorly compared with the flap techniques. Most trials tested Limberg operation; only 2 tested Bascom operation. The literature suggests the surgeon's expertise determines the choice of flap technique.", "abstract_zh": "**背景：** 慢性藏毛窦疾病的手术选择仍存在争议。\n\n**目的：** 比较慢性藏毛病常见手术的结果。\n\n**Data sources：** 我们检索了 PubMed、Embase 和 Cochrane 图书馆。\n\n**Study selection：** 我们纳入了 2002 年至 2024 年发表的英语或丹麦语随机试验，比较了治疗成人和青少年慢性藏毛病的手术结果。\n\n**Interventions：** 我们比较了二次愈合、初次中线闭合、Bascom、Limberg 和 Karydakis 皮瓣手术的结果。\n\n**Main outcome measures：** 主要结局是复发；次要结局是感染、愈合时间和住院时间。我们在荟萃分析中比较了所有技术的复发率和感染率。我们评估了所有试验的偏倚风险和质量。\n\n**结果：** 50 项试验共有 5762 名参与者。在荟萃分析中，皮瓣手术的复发率低于初次中线闭合术（OR 0.31；95% CI，0.19-0.51；p < 0.01）。比较皮瓣手术与二次愈合的试验存在异质性，未达到显着性（OR 0.38；95% CI，0.13-1.13；p = 0.08）。 Limberg 和 Karydakis 手术的复发率相似。与初次闭合（OR 0.33；95% CI，0.23-0.48；p < 0.01）和二次愈合（OR 0.48；95% CI，0.30-0.77；p < 0.01）相比，皮瓣手术的感染率较低。两项试验针对 Limberg 手术测试了 Bascom 程序，没有显着差异。所有试验都发现二次愈合的愈合时间比任何其他手术都要长得多。\n\n**Limitations：** 大多数研究都存在高或中等偏倚风险，导致证据质量极低至低。这些试验通常数量少，随访时间短，并且没有报告主要结果或功效计算。\n\n**结论：** 与皮瓣技术相比，初次闭合和二次愈合效果较差。大多数试验测试了林伯格操作；仅 2 个测试了 Bascom 操作。文献表明外科医生的专业知识决定了皮瓣技术的选择。", "keywords_zh": "Bascom 裂口提升手术、慢性藏毛窦疾病、藏毛疾病并发症、林伯格手术、藏毛疾病复发、手术治疗藏毛疾病", "keywords_en": "Bascom cleft-lift operation, Chronic pilonidal sinus disease, Complications pilonidal disease, Limberg operation, Pilonidal disease recurrence, Surgical treatment pilonidal disease", "link": "https://pubmed.ncbi.nlm.nih.gov/39982788/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 21 Feb 2025"}, {"id": "39980238", "title_en": "A quality-of-life meta-analysis comparing pre- and postoperative symptoms in women undergoing colorectal resection for deep infiltrating endometriosis", "title_zh": "比较因深部浸润子宫内膜异位症接受结直肠切除术的女性术前和术后症状的生活质量荟萃分析", "authors": "Cillian Clancy", "abstract_en": "**Aim:** Deep infiltrating endometriosis (DIE) may involve the rectum or colon and is associated with pain, gastrointestinal dysfunction and reduced quality of life (QoL). While hormonal treatment may be effective, surgical intervention including colorectal resection can be required. Colorectal resection can result in functional changes and complications, which can also impair QoL. The aim of this study is to examine all available comparative pre- and postoperative data on QoL and symptom outcomes following colorectal resection for DIE.\n\n**Method:** An electronic database search was conducted for studies reporting pre- and postoperative QoL and symptom outcomes following colorectal resection for DIE. The study was registered with PROSPERO and followed PRISMA (Preferred Reporting Items in Systematic Reviews and Meta-analyses) guidelines. Data were combined using random-effects models.\n\n**Results:** Fourteen studies including 1142 patients were included. Colorectal resection was associated with improved outcomes for all items in the SF-36 QoL questionnaire as well as symptom outcomes including dysmenorrhoea, chronic pelvic pain and deep dyspareunia. Importantly, the gastrointestinal QoL index was significantly improved (mean difference 24.50, 95% CI 15.93-33.08, p < 0.0001) as was dyschezia (mean difference -4.1, 95% CI -4.77 to -3.42, p < 0.0001). There was no change in low anterior resection syndrome scores (mean difference -5.28, 95% CI -11.65 to 1.10, p = 0.1046).\n\n**Conclusion:** This study demonstrates a significant postoperative improvement in patient-reported QoL, pain symptoms and gastrointestinal function following colorectal resection for endometriosis.", "abstract_zh": "**Aim：** 深部浸润性子宫内膜异位症 (DIE) 可能累及直肠或结肠，并与疼痛、胃肠功能障碍和生活质量 (QoL) 下降有关。虽然激素治疗可能有效，但可能需要手术干预，包括结直肠切除术。结直肠切除术可能导致功能改变和并发症，这也会损害生活质量。本研究的目的是检查所有可用的 DIE 结直肠切除术后生活质量和症状结果的术前和术后比较数据。\n\n**Method：** 对报告 DIE 结直肠切除术后术前和术后 QoL 以及症状结果的研究进行了电子数据库搜索。该研究已在 PROSPERO 注册并遵循 PRISMA（系统评价和荟萃分析中的首选报告项目）指南。使用随机效应模型组合数据。\n\n**结果：** 纳入了 14 项研究，包括 1142 名患者。结直肠切除术与 SF-36 生活质量问卷中所有项目的改善结果以及痛经、慢性盆腔疼痛和深度性交疼痛等症状结果相关。重要的是，胃肠道 QoL 指数显着改善（平均差 24.50，95% CI 15.93-33.08，p< 0.0001），排便困难也显着改善（平均差 -4.1，95% CI -4.77 至 -3.42，p< 0.0001）。低前切除综合征评分没有变化（平均差 -5.28，95% CI -11.65 至 1.10，p = 0.1046）。\n\n**结论：** 这项研究表明，子宫内膜异位症结直肠切除术后患者报告的生活质量、疼痛症状和胃肠功能显着改善。", "keywords_zh": "结直肠切除术, 子宫内膜异位症, 生活质量", "keywords_en": "colorectal resection, endometriosis, quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/39980238/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 21 Feb 2025"}, {"id": "39974280", "title_en": "Impact of dipeptidyl peptidase-4 inhibitors on incidence of colorectal cancer in patients with type 2 diabetes mellitus: a systematic review and meta-analysis", "title_zh": "二肽基肽酶 4 抑制剂对 2 型糖尿病患者结直肠癌发病率的影响：系统评价和荟萃分析", "authors": "Zhiyan Wang", "abstract_en": "**Background:** The association between dipeptidyl peptidase-4 inhibitors (DPP-4i) exposure and the risk of colorectal cancer (CRC) in patients with type 2 diabetes mellitus (T2DM) is unclear.\n\n**Objectives:** This meta-analysis aims to investigate the relationship between DPP-4i exposure and the incidence of CRC in patients with T2DM.\n\n**Design:** A systematic review and meta-analysis.\n\n**Methods:** A comprehensive search of electronic databases, including PubMed, Web of Science, EMBASE, and ScienceDirect, was conducted up to March 2024. The studies including randomized clinical trials (RCTs), cohort studies, and case-control studies were retrieved. The odds ratio (OR) was calculated using Stata 12.0 statistical software. The primary outcome assessed was the incidence of CRC.\n\n**Results:** This meta-analysis incorporated six retrospective cohort studies and two case-control studies. The findings indicate that the incidence of CRC in the DPP-4i exposure group was significantly higher than that in the control group (OR = 1.11, 95% CI: 1.02-1.21, <i>p</i> = 0.013). Subgroup analysis revealed that both male (OR = 2.07, <i>p</i> < 0.001) and female participants (OR = 1.49, <i>p</i> = 0.05) in the DPP-4i exposure group exhibited a significantly higher incidence of CRC compared to the control group. Among participants younger than 65 years, the incidence of CRC was markedly elevated in the exposure group (OR = 2.81, <i>p</i> < 0.001). Furthermore, when the exposure duration was less than 1 year, the CRC incidence in the exposure group surpassed that of the control group (OR = 1.24, <i>p</i> = 0.005). When sulfonylureas (SU) were used as control drugs, the incidence of CRC was higher in the exposure group (OR = 1.10, <i>p</i> = 0.017).\n\n**Conclusion:** There is a potential correlation between DPP-4i exposure and increased incidence of CRC in T2DM patients. This association appears to be influenced by gender, age, duration of exposure, and the choice of control medications. Therefore, attention should be paid to colorectal diseases when DPP-4i is employed in the clinic.\n\n**Trial Registration:** The meta-analysis has been registered with the International Prospective Register of Systematic Reviews (PROSPERO). The registration number is CRD42024535292.", "abstract_zh": "**背景：** 二肽基肽酶 4 抑制剂 (DPP-4i) 暴露与 2 型糖尿病 (T2DM) 患者患结直肠癌 (CRC) 风险之间的关系尚不清楚。\n\n**Objectives：** 本荟萃分析旨在探讨 T2DM 患者 DPP-4i 暴露与 CRC 发病率之间的关系。\n\n**Design：** 系统评价和荟萃分析。\n\n**方法：** 截至2024年3月，对PubMed、Web of Science、EMBASE和ScienceDirect等电子数据库进行了全面检索，检索了包括随机临床试验（RCT）、队列研究和病例对照研究在内的研究。使用Stata 12.0统计软件计算优势比（OR）。评估的主要结果是 CRC 的发生率。\n\n**结果：** 这项荟萃分析纳入了六项回顾性队列研究和两项病例对照研究。研究结果表明，DPP-4i暴露组CRC的发生率显着高于对照组（OR = 1.11，95% CI：1.02-1.21，<i>p</i> = 0.013）。亚组分析显示，与对照组相比，DPP-4i暴露组中男性（OR = 2.07，<i>p</i> < 0.001）和女性参与者（OR = 1.49，<i>p</i> = 0.05）的CRC发病率均显着高于对照组。在65岁以下的参与者中，暴露组的CRC发病率显着升高（OR = 2.81，<i>p</i> < 0.001）。此外，当暴露时间小于1年时，暴露组的CRC发病率超过对照组（OR = 1.24，<i>p</i> = 0.005）。当使用磺脲类药物（SU）作为对照药物时，暴露组CRC的发生率较高（OR = 1.10，<i>p</i> = 0.017）。\n\n**结论：** T2DM 患者中 DPP-4i 暴露与 CRC 发病率增加之间存在潜在相关性。这种关联似乎受到性别、年龄、暴露时间和对照药物选择的影响。因此，临床应用DPP-4i时应注意结直肠疾病。\n\n**Trial registration：** 该荟萃分析已在国际前瞻性系统评价登记册（PROSPERO）注册。注册号为CRD42024535292。", "keywords_zh": "DPP-4i、结直肠癌、发病率、荟萃分析、风险、2 型糖尿病", "keywords_en": "DPP-4i, colorectal cancer, incidence, meta-analysis, risk, type 2 diabetes mellitus", "link": "https://pubmed.ncbi.nlm.nih.gov/39974280/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Thu, 20 Feb 2025"}, {"id": "39960767", "title_en": "Is colonic J-pouch superior to other reconstructive techniques after total mesorectal excision? A systematic review with meta-analysis", "title_zh": "全直肠系膜切除后结肠 J 袋是否优于其他重建技术？荟萃分析的系统评价", "authors": "Mario Morino", "abstract_en": "**Background:** Different reconstruction techniques after total mesorectal excision have been described, such as straight coloanal anastomosis, colonic J-pouch, side-to-end anastomosis and transverse coloplasty pouch. Establishing which technique is the best in functional terms is essential to improving a patient's quality of life.\n\n**Methods:** We compared benefits and harms of different reconstructive techniques. The primary outcome was to compare functional results at 18 months after surgery (long-term). Secondary outcomes were the same as primary but at different time intervals (short-term and medium-term) and perioperative morbidity and mortality.\n\n**Results:** Forty-one reports of 36 trials were included in the analysis. According to primary outcome, no significant difference was observed in terms of bowel frequency, while colonic J-pouch resulted in a lower incidence of faecal urgency only compared to side-to-end. Only up to 18 months after bowel restoration bowel frequency, fecal urgency and the number of individuals using anti-diarrheal medications were reduced in the colonic J-pouch group. No difference in mortality/morbidity could be assessed among the techniques, but a lower rate of anastomotic leak after side-to-end compared to straight coloanal anastomosis was observed.\n\n**Conclusions:** Evidence suggests that reconstruction with colonic J-pouch offers similar long-term benefits to straight coloanal anastomosis and Transverse coloplasty pouch, while superior to side-to-end.", "abstract_zh": "**背景：** 全直肠系膜切除后的不同重建技术已有描述，如结肠直肠吻合术、结肠J形袋、侧端吻合术和横向结肠成形术袋。确定哪种技术在功能上是最好的对于改善患者的生活质量至关重要。\n\n**方法：** 我们比较了不同重建技术的好处和坏处。主要结果是比较术后 18 个月（长期）的功能结果。次要结局与主要结局相同，但时间间隔（短期和中期）以及围手术期发病率和死亡率不同。\n\n**结果：** 分析中纳入了 36 项试验的 41 份报告。根据主要结果，在排便频率方面没有观察到显着差异，而结肠 J 型袋仅与侧对端相比导致排便紧迫感的发生率较低。仅在肠道恢复后 18 个月内，结肠 J 袋组的排便频率、排便紧迫感和使用止泻药物的人数均有所减少。无法评估这些技术之间死亡率/发病率的差异，但与直接结肠肛门吻合相比，观察到侧端吻合术后吻合口瘘的发生率较低。\n\n**结论：** 有证据表明，结肠 J 形袋重建与直肠结肠吻合术和横向结肠成形术袋具有相似的长期益处，同时优于侧端结肠成形术。", "keywords_zh": "直肠癌、功能结果、荟萃分析、重建技术、直肠手术", "keywords_en": "Rectal cancer, functional outcomes, meta-analysis, reconstructive techniques, rectal surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/39960767/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Mon, 17 Feb 2025"}, {"id": "39920437", "title_en": "Voiding dysfunction after surgery for colorectal deep infiltrating endometriosis: an updated systematic review and meta-analysis", "title_zh": "结直肠深部浸润子宫内膜异位症手术后排尿功能障碍：更新的系统评价和荟萃分析", "authors": "Sofiane Bendifallah", "abstract_en": "To define the risk factors of post-operative voiding dysfunction according to the type of surgical procedure performed. A systematic review through PubMed, the Cochrane Library, and Web of Science databases was performed. The Medical Subject Headings terms aimed for English articles about colorectal endometriosis surgery and voiding dysfunction published until December 26, 2022 were used. The primary outcome was the occurrence of post-operative voiding dysfunction. Secondary outcome was the presence of a persistent voiding dysfunction at 1 month. MeSH terms included ''deep endometriosis'', ''surgery'', or ''voiding dysfunction''. Two reviewers (AM, PE) assessed the quality of each article independently. A Study Quality Assessment Tool was used to provide rating of the quality of the included studies. 22 studies were included in the final analysis. Rectal shaving was associated with less voiding dysfunction than segmental resection (OR 0.33; 95%CI [0.20: 0.54]; I<sup>2</sup> = 0%; p < 10<sup>-3</sup>). No difference was found between rectal shaving and discoid excision (OR 0.44; 95%CI [0.07: 2.84]; I<sup>2</sup> = 55%; p = 0.39), nor between discoid excision and segmental resection (OR 0.44; 95%CI [0.18: 1.09]; I<sup>2</sup> = 49%; p = 0.08). Conservative surgery (i.e., shaving and discoid) was associated with less voiding dysfunction than radical surgery (i.e., segmental resection) (OR 0.37; 95%CI [0.25: 0.55]; I<sup>2</sup> = 0%; p < 10<sup>-3</sup>). Regarding persistent voiding dysfunction, rectal shaving and discoid excision were less associated with voiding dysfunction than segmental resection (respectively, OR 0.30; 95%CI [0.14: 0.66]; I<sup>2</sup> = 0%; p = 0.003 and OR 0.13; 95%CI [0.03: 0.57]; I<sup>2</sup> = 0%; p = 0.007). Conservative bowel procedures are associated with lower rates of persistent post-operative voiding dysfunction and should be considered first when possible.Trial registration: Our meta-analysis was registered under the PROSPERO number: CRD42023395356.", "abstract_zh": "根据所进行的手术类型确定术后排尿功能障碍的危险因素。通过 PubMed、Cochrane 图书馆和 Web of Science 数据库进行了系统评价。使用的医学主题标题术语针对的是截至 2022 年 12 月 26 日发表的有关结直肠子宫内膜异位症手术和排尿功能障碍的英文文章。主要结局是术后排尿功能障碍的发生。次要结果是 1 个月时出现持续性排尿功能障碍。 MeSH 术语包括“深部子宫内膜异位症”、“手术”或“排尿功能障碍”。两位审稿人（AM、PE）独立评估每篇文章的质量。研究质量评估工具用于对纳入研究的质量进行评级。最终分析纳入22项研究。直肠剃毛与节段切除相比，排尿功能障碍较少（OR 0.33；95%CI [0.20: 0.54]；I<sup>2</sup> = 0%；p < 10<sup>-3</sup>）。直肠剃除和盘状切除之间没有发现差异（OR 0.44; 95%CI [0.07: 2.84]; I<sup>2</sup> = 55%; p = 0.39），盘状切除和节段切除之间也没有发现差异（OR 0.44; 95%CI [0.18: 1.09]; I<sup>2</sup> = 55%; p = 0.39）。 I<sup>2</sup> = 49%；p = 0.08)。与根治性手术（即节段切除）相比，保守手术（即剃毛和盘状手术）与较少的排尿功能障碍相关（OR 0.37；95%CI [0.25: 0.55]；I<sup>2</sup> = 0%；p < 10<sup>-3</sup>）。关于持续性排尿功能障碍，直肠剃除和盘状切除与节段性切除相比，与排尿功能障碍的相关性较小（分别为 OR 0.30；95%CI [0.14: 0.66]；I<sup>2</sup> = 0%；p = 0.003 和 OR 0.13；95%CI [0.03: 0.57]； I<sup>2</sup> = 0%；p = 0.007)。保守性肠道手术与术后持续排尿功能障碍的发生率较低有关，如有可能，应首先考虑。试验注册：我们的荟萃分析已在 PROSPERO 编号下注册：CRD42023395356。", "keywords_zh": "结直肠子宫内膜异位症、结直肠切除术、盘状切除术、剃毛、手术、排尿功能障碍", "keywords_en": "Colorectal endometriosis, Colorectal resection, Discoid excision, Shaving, Surgery, Voiding dysfunction", "link": "https://pubmed.ncbi.nlm.nih.gov/39920437/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Fri, 07 Feb 2025"}, {"id": "39908072", "title_en": "Endovascular rectal artery embolisation (RAE) for symptomatic haemorrhoids", "title_zh": "血管内直肠动脉栓塞术（RAE）治疗有症状的痔疮", "authors": "Ian Chetter", "abstract_en": "This is a protocol for a Cochrane Review (intervention). The objectives are as follows: To assess the safety and clinical effectiveness of endovascular rectal artery embolisation (RAE) for symptomatic haemorrhoids.", "abstract_zh": "这是 Cochrane 综述（干预）的方案。目标如下：评估血管内直肠动脉栓塞术（RAE）治疗有症状的痔疮的安全性和临床有效性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39908072/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 05 Feb 2025"}]}, currentFeed: '', currentPapers: [], currentPaper: null,
