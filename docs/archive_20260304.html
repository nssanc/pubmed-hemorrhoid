e=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 06 May 2025"}, {"id": "40315877", "title_en": "Isolated perianal Crohn's disease: a systematic review and expert consensus proposing novel diagnostic criteria and management advice", "title_zh": "孤立性肛周克罗恩病：提出新诊断标准和管理建议的系统评价和专家共识", "authors": "TOpClass Collaborators", "abstract_en": "Perianal fistulae can present a diagnostic challenge when distinguishing perianal Crohn's disease from idiopathic perianal fistulae. This distinction is key, as perianal Crohn's disease requires inflammatory bowel disease (IBD) therapy, whereas idiopathic perianal fistulae are primarily managed surgically. When luminal inflammation is absent, but Crohn's disease is suspected, the term isolated perianal Crohn's disease is sometimes applied. However, no formal guidance exists for diagnosing or managing isolated perianal Crohn's disease. Furthermore, whereas fistula granuloma might provide specific evidence of Crohn's disease, they are rarely detected in perianal fistulae, so are unlikely to sensitively delineate aetiology. This project aimed to develop an opinion-based framework for isolated perianal Crohn's disease. A systematic review evaluated clinical features suggestive of isolated perianal Crohn's disease and evidence for IBD therapies in patients with perianal fistulae without luminal IBD. The findings of this systematic review informed a multidisciplinary consensus process with IBD specialists, resulting in the formulation of diagnostic criteria and management recommendations for isolated perianal Crohn's disease. We then tested this diagnostic approach in a prospective cohort of 50 patients treated as having idiopathic perianal fistulae at a proctology referral centre, identifying six (12%) individuals as meeting the diagnostic criteria. Our findings underscore the scarcity of evidence guiding isolated perianal Crohn's disease diagnosis and the need for a composite risk-based assessment. The proposed framework provides a tool for clinical practice and research but requires validation and refinement. Clear communication with patients is essential, given the diagnostic and therapeutic uncertainties. Future studies should refine these criteria, explore biological markers for isolated perianal Crohn's disease, and establish evidence-based methods to differentiate isolated perianal Crohn's disease within the perianal fistulae spectrum.", "abstract_zh": "在区分肛周克罗恩病和特发性肛周瘘时，肛周瘘可能带来诊断挑战。这种区别很关键，因为肛周克罗恩病需要炎症性肠病 (IBD) 治疗，而特发性肛周瘘主要通过手术治疗。当不存在管腔炎症但怀疑克罗恩病时，有时使用术语“孤立性肛周克罗恩病”。然而，目前尚无诊断或治疗孤立性肛周克罗恩病的正式指南。此外，虽然瘘管肉芽肿可能提供克罗恩病的具体证据，但在肛周瘘管中很少检测到它们，因此不太可能敏感地描述病因。该项目旨在为孤立性肛周克罗恩病开发一个基于意见的框架。一项系统评价评估了提示孤立性肛周克罗恩病的临床特征以及无管腔 IBD 的肛周瘘患者的 IBD 治疗证据。这项系统评价的结果为 IBD 专家的多学科共识过程提供了信息，从而制定了孤立性肛周克罗恩病的诊断标准和治疗建议。然后，我们在直肠科转诊中心治疗的 50 名特发性肛周瘘患者的前瞻性队列中测试了这种诊断方法，确定 6 名 (12%) 患者符合诊断标准。我们的研究结果强调了指导孤立性肛周克罗恩病诊断的证据的缺乏以及基于风险的综合评估的必要性。拟议的框架为临床实践和研究提供了工具，但需要验证和完善。鉴于诊断和治疗的不确定性，与患者的清晰沟通至关重要。未来的研究应完善这些标准，探索孤立性肛周克罗恩病的生物标志物，并建立基于证据的方法来区分肛周瘘谱中的孤立性肛周克罗恩病。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40315877/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 02 May 2025"}, {"id": "40269939", "title_en": "Fish bone migration: complications, diagnostic challenges, and treatment strategies", "title_zh": "鱼骨迁移：并发症、诊断挑战和治疗策略", "authors": "Jichuan Chen", "abstract_en": "**Background:** Fish bone impaction in the pharynx is a common otolaryngological emergency. However, if the fish bone perforates the pharyngeal wall or the gastrointestinal wall and migrates to the neck tissues or organs, entering the lungs, mediastinum, heart, liver, biliary tract, spleen, pancreas, or other structures, or damages major blood vessels in the thoracic or abdominal cavities, it can lead to severe complications. This condition is rare and dangerous, potentially resulting in a series of serious complications, including neck abscess, thyroid abscess, thrombosis or air embolism of the cervical vessels, esophageal perforation, rupture of major mediastinal vessels, mediastinitis, aorto-esophageal fistula, lung abscess, spinal injury, sepsis, splenic abscess, hepatic abscess, anal fistula, and it may even be misdiagnosed as a tumor.\n\n**Objective:** This narrative review synthesizes evidence on fish bone translocation complications to (1) identify high-risk clinical presentations, (2) guide site-specific imaging selection, and (3) inform multidisciplinary management strategies.\n\n**Methods:** Use the keyword \"fishbone\" to systematically search articles from PubMed、CNKI and Embase databases from 1972 to 2024. Review all original articles and include them in this review where appropriate. This narrative review synthesizes evidence from case reports and observational studies to explore complications and management of fish bone translocation in uncommon sites. Given the predominance of heterogeneous case reports, a formal systematic review with meta-analysis was not feasible; however, we employed systematic search strategies to minimize selection bias.\n\n**Conclusion:** To avoid severe complications, it is crucial to provide comprehensive information on the management of fish bone impaction. When fish bone removal cannot be achieved using laryngoscopy, prompt and decisive surgical intervention is required to extract the foreign body.", "abstract_zh": "**背景：** 咽部鱼骨嵌塞是常见的耳鼻喉急症。但如果鱼刺穿透咽壁或胃肠壁，迁移到颈部组织或器官，进入肺、纵隔、心脏、肝脏、胆道、脾脏、胰腺等结构，或损伤胸腔或腹腔的主要血管，就会导致严重的并发症。这种情况罕见且危险，可能导致一系列严重并发症，包括颈部脓肿、甲状腺脓肿、颈部血管血栓或空气栓塞、食管穿孔、纵隔大血管破裂、纵隔炎、主食管瘘、肺脓肿、脊柱损伤、败血症、脾脓肿、肝脓肿、肛瘘，甚至可能被误诊为肿瘤。\n\n**目的：** 这篇叙述性综述综合了鱼骨易位并发症的证据，以（1）识别高风险的临床表现，（2）指导特定部位的影像学选择，以及（3）为多学科管理策略提供信息。\n\n**方法：** 使用关键词“fishbone”从PubMed、CNKI和Embase数据库中系统检索1972年至2024年的文章。审阅所有原始文章，并在适当的情况下将其纳入本综述。这篇叙述性综述综合了病例报告和观察性研究的证据，以探讨罕见部位鱼骨易位的并发症和处理。鉴于异质病例报告占主导地位，采用荟萃分析进行正式的系统评价是不可行的；然而，我们采用系统搜索策略来尽量减少选择偏差。\n\n**结论：** 为了避免严重的并发症，提供有关鱼骨嵌塞处理的全面信息至关重要。当喉镜无法取出鱼骨时，需要及时、果断的手术干预以取出异物。", "keywords_zh": "并发症、鱼刺、胃肠道异物、咽部异物", "keywords_en": "Complications, Fishbone, Gastrointestinal foreign body, Pharyngeal foreign body", "link": "https://pubmed.ncbi.nlm.nih.gov/40269939/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 24 Apr 2025"}, {"id": "40210078", "title_en": "Defining Radiological Healing in Perianal Fistulizing Crohn's Disease: A TOpClass Global Expert Delphi Consensus", "title_zh": "定义肛周瘘管性克罗恩病的放射治疗：顶级全球专家德尔菲共识", "authors": "TOpClass collaborative authors", "abstract_en": "**Background & Aims:** Perianal fistulising Crohn's disease (pfCD) affects one-fifth of patients with Crohn's disease (CD), significantly affecting their quality of life. Magnetic resonance imaging is the gold standard for evaluating fistula healing in pfCD, but variability in radiological definitions hampers meaningful clinical interpretation and consistent trial design. This study aimed to establish an international consensus on the definition of radiological healing in pfCD.\n\n**Methods:** The study was conducted in 2 phases. Phase 1 involved a systematic review to identify magnetic resonance imaging-based variables and indices used to define healing in pfCD, assessing methodological quality using the COnsensus-based Standards for the selection of health Measurement INstruments (COSMIN) framework. Phase 2 utilized a 2-round online Delphi consensus process with 84 international experts, followed by a stakeholder meeting to achieve consensus (agreement threshold >80%). Results were reported as per Accurate Consensus Reporting Document (ACCORD) guidelines.\n\n**Results:** A radiologically healed fistula can be defined by the absence of T2-weighted hyperintensity, a completely fibrotic fistula tract and, when contrast is used, the absence of contrast enhancement on post-contrast T1-weighted images (95% consensus). Radiological improvement of a fistula can be defined (80% consensus) by the presence of a least one essential criterion: an increasingly fibrotic fistula tract, an unequivocal reduction in one or more of the following: T2-weighted hyperintensity, fistula diameter, fistula length, abscess size, or contrast enhancement of the fistula tract.\n\n**Conclusions:** This international Delphi consensus standardizes radiological endpoints in pfCD, improving consistency in clinical and research settings. Future studies will validate this definition and assess how radiological changes predict long-term clinical outcomes and quality of life improvements.", "abstract_zh": "**Background & aims：** 肛周瘘管克罗恩病 (pfCD) 影响五分之一的克罗恩病 (CD) 患者，显着影响他们的生活质量。磁共振成像是评估 pfCD 瘘管愈合的黄金标准，但放射学定义的可变性妨碍了有意义的临床解释和一致的试验设计。本研究旨在就 pfCD 放射治疗的定义建立国际共识。\n\n**方法：** 该研究分两个阶段进行。第一阶段涉及系统审查，以确定用于定义 pfCD 愈合的基于磁共振成像的变量和指数，使用基于共识的健康测量仪器选择标准 (COSMIN) 框架评估方法学质量。第二阶段采用了由84位国际专家参与的两轮在线德尔菲共识流程，随后召开利益相关者会议以达成共识（同意阈值>80%）。结果按照准确共识报告文件 (ACCORD) 指南进行报告。\n\n**结果：** 放射学愈合的瘘管可以定义为不存在 T2 加权高信号、完全纤维化的瘘管，以及使用造影剂时，造影后 T1 加权图像上不存在造影剂增强（95% 共识）。瘘管的放射学改善可以通过至少一个基本标准的存在来定义（80%共识）：瘘管纤维化程度不断增加，以下一项或多项指标明确减少：T2加权高信号、瘘管直径、瘘管长度、脓肿大小或瘘管造影增强。\n\n**结论：** 这一国际德尔菲共识标准化了 pfCD 的放射学终点，提高了临床和研究环境的一致性。未来的研究将验证这一定义，并评估放射学变化如何预测长期临床结果和生活质量的改善。", "keywords_zh": "终点、瘘管、愈合、MRI、肛周瘘管克罗恩病", "keywords_en": "Endpoints, Fistula, Healing, MRI, Perianal Fistulising Crohn’s Disease", "link": "https://pubmed.ncbi.nlm.nih.gov/40210078/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 10 Apr 2025"}, {"id": "40205247", "title_en": "Systematic review and meta-analysis of the efficacy and safety of stem cell treatment of anal fistulas", "title_zh": "干细胞治疗肛瘘疗效和安全性的系统评价和荟萃分析", "authors": "S D Wexner", "abstract_en": "**Background:** Since anal fistulas can be challenging to treat; numerous innovative treatments have been proposed, including stem cell therapy. This systematic review aimed to assess pooled rates of fistula healing and adverse events associated with stem cell treatment.\n\n**Methods:** In this PRISMA-compliant systematic review we searched PubMed and Scopus for observational and randomized studies reporting outcomes of stem cell treatment for anal fistulas. The main outcome measures were successful healing and adverse effects of stem cell therapy.\n\n**Results:** In total, 43 studies incorporating 1160 patients (53.6% male) were included. Underlying fistula etiologies were Crohn's disease (30 studies) and cryptoglandular disease (12 studies). The main origin of stem cells was from adipose tissue (34 studies) or bone marrow (6 studies). The median follow-up duration was 12 months. The combined overall pooled healing rate was 58.1% (95% confidence interval (CI) 51.5-64.7%). The pooled healing rate for Crohn's fistulas was 60.4% (95% CI 54.7-66.2%) with adipose-derived stem cells and 63.6% (95% CI 49.4-77.7%) with bone-marrow-derived cells. The pooled healing rate for cryptoglandular fistulas was 53.8% (95% CI 35.5-72.2%) with adipose-derived stem cells. The pooled complication rate was 37.3% (95% CI 27.1-47.5%). Stem cells were associated with higher odds of anal fistula healing (odds ratio (OR): 1.81, p = 0.003) and similar odds of complications (OR: 1, p = 0.986) compared with controls.\n\n**Conclusions:** Stem cell treatment of anal fistulas was associated with promising results. The healing rate in Crohn's anal fistulas was higher than in cryptoglandular fistulas. Bone-marrow-derived stem cells were associated with marginally better outcomes than were adipose-derived cells. This finding suggests that the autoimmune inflammatory etiology of Crohn's disease may respond better to autologous myoblasts than does the infectious etiology of cryptoglandular fistulas.", "abstract_zh": "**背景：** 由于肛瘘很难治疗；已经提出了许多创新疗法，包括干细胞疗法。本系统评价旨在评估与干细胞治疗相关的瘘管愈合和不良事件的汇总率。\n\n**方法：** 在这篇符合 PRISMA 标准的系统评价中，我们检索了 PubMed 和 Scopus 中报告干细胞治疗肛瘘结果的观察性和随机研究。主要结果指标是干细胞治疗的成功治愈和不良反应。\n\n**结果：** 总共纳入了 43 项研究，纳入了 1160 名患者（53.6% 为男性）。瘘管的潜在病因是克罗恩病（30 项研究）和隐腺疾病（12 项研究）。干细胞的主要来源是脂肪组织（34 项研究）或骨髓（6 项研究）。中位随访时间为 12 个月。合并后的总体治愈率为 58.1%（95% 置信区间 (CI) 51.5-64.7%）。脂肪源性干细胞克罗恩瘘管的综合治愈率为 60.4% (95% CI 54.7-66.2%)，骨髓源性细胞为 63.6% (95% CI 49.4-77.7%)。使用脂肪干细胞治疗隐窝腺瘘的综合治愈率为 53.8% (95% CI 35.5-72.2%)。合并并发症率为 37.3%（95% CI 27.1-47.5%）。与对照组相比，干细胞与肛瘘愈合的几率较高（比值比（OR）：1.81，p = 0.003）和相似的并发症几率（OR：1，p = 0.986）相关。\n\n**结论：** 肛瘘的干细胞治疗具有良好的效果。克罗恩病肛瘘的治愈率高于隐窝肛瘘。骨髓来源的干细胞比脂肪来源的细胞具有稍微更好的结果。这一发现表明，克罗恩病的自身免疫炎症病因可能比隐腺瘘的感染病因对自体成肌细胞的反应更好。", "keywords_zh": "不良反应, 肛瘘, 愈合, 干细胞, 系统评价", "keywords_en": "Adverse effects, Anal fistulas, Healing, Stem cells, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40205247/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 09 Apr 2025"}, {"id": "40192869", "title_en": "Sphincter repair procedures may be favored in the treatment of obstetrical recto-vaginal fistula: a systematic review of the literature and meta-analysis", "title_zh": "括约肌修复手术可能有利于产科直肠阴道瘘的治疗：文献和荟萃分析的系统回顾", "authors": "J F Hamel", "abstract_en": "**Background:** The management of obstetric rectovaginal fistula (RVF) is challenging for the surgeon. The best surgical procedure to repair RVFs, specifically after obstetric anal sphincter injury, has not been extensively studied. The objective was to compare the success of the different procedures performed to repair obstetric RVF.\n\n**Methods:** The literature search was carried out on PubMed<sup>®</sup> and Web of Science<sup>®</sup> from database inception until 31 December 2022. Selection criteria were: (1) patients with a diagnosis of obstetric-related RVF; (2) patients treated surgically with no restriction concerning the considered surgery; (3) clinical trials or epidemiological studies. Meta-analysis was conducted considering the network meta-analysis framework to allow studying the relative value of each treatment mentioned in the selected articles.\n\n**Results:** The quantitative synthesis included 32 studies (18 retrospective and 14 prospective) accounting for 595 patients. The quality of these studies was low because of the lack of prospective randomization. Nineteen procedure types were described and assessed. Most patients (n = 180) underwent endorectal advancement flap (ERAF) followed by excision and layered closure (ELC) (n = 213) and Musset procedure (n = 65). A diverting stoma was performed in 66/132 patients. Only 13 studies reported the functional results of the procedure. In the meta-analysis, the Musset procedure (OR = 4.29; 95% CI: 1.18-16.14), transvaginal ELC (OR = 11.84; 95% CI: 2.18-91.80) and transperineal ELC (OR = 3.56; 95% CI: 1.26-10) significantly improved the anatomical results compared to ERAF.\n\n**Conclusions:** A further randomized controlled trial in the literature assessing ERAF and sphincteroplasty to compare the anatomical results, functional results and morbidity of this treatment is needed.\n\n**Registration:** PROSPERO CRD42023447875.", "abstract_zh": "**背景：** 产科直肠阴道瘘（RVF）的治疗对于外科医生来说是一项挑战。修复 RVF 的最佳手术方法，特别是在产科肛门括约肌损伤后，尚未得到广泛研究。目的是比较修复产科 RVF 的不同手术的成功率。\n\n**方法：** 文献检索在 PubMed<sup>®</sup> 和 Web of Science<sup>®</sup> 上进行，从数据库建立到 2022 年 12 月 31 日。选择标准为： (1) 诊断为产科相关 RVF 的患者； (2) 接受手术治疗且对所考虑手术没有限制的患者； (3)临床试验或流行病学研究。考虑网络荟萃分析框架进行荟萃分析，以研究所选文章中提到的每种治疗方法的相对价值。\n\n**结果：** 定量综合包括 32 项研究（18 项回顾性研究和 14 项前瞻性研究），涉及 595 名患者。由于缺乏前瞻性随机化，这些研究的质量较低。描述并评估了十九种手术类型。大多数患者 (n = 180) 接受直肠内推进皮瓣 (ERAF)，然后进行切除和分层闭合 (ELC) (n = 213) 和 Musset 手术 (n = 65)。 66/132 名患者进行了改道造口。只有 13 项研究报告了该手术的功能结果。在荟萃分析中，Musset手术（OR = 4.29；95% CI：1.18-16.14）、经阴道ELC（OR = 11.84；95% CI：2.18-91.80）和经会阴ELC（OR = 3.56；95% CI： 1.26-10) 与 ERAF 相比，显着改善了解剖结果。\n\n**结论：** 需要在文献中进行进一步的随机对照试验来评估 ERAF 和括约肌成形术，以比较这种治疗的解剖结果、功能结果和发病率。\n\n**Registration：** 普洛斯彼罗 CRD42023447875。", "keywords_zh": "肛门阴道瘘、产科、直肠阴道瘘、修复", "keywords_en": "Anovaginal fistula, Obstetric, Rectovaginal fistula, Repair", "link": "https://pubmed.ncbi.nlm.nih.gov/40192869/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Apr 2025"}, {"id": "40185644", "title_en": "Oncological and functional outcomes after sacrectomy for colorectal cancer: A systematic review", "title_zh": "结直肠癌骶骨切除术后的肿瘤学和功能结果：系统评价", "authors": "Gabriëlle H van Ramshorst", "abstract_en": "**Aim:** Worldwide, of all cancers, colorectal cancer has the fourth highest rate of mortality. Curative treatment for locally advanced or recurrent rectal cancer can require extended resections with sacrectomy, but this sugery can have major consequences for patients. The aim of this study was to investigate the oncological and functional outcomes after sacrectomy in patients with colorectal cancer.\n\n**Method:** The protocol was registered in (PROSPERO), the international prospective register of systematic reviews. PubMed, Embase, The Cochrane Library, Scopus and Google Scholar were searched using a predetermined search strategy. Article selection, quality of evidence [Grading of Recommendation, Assessment, Development and Evaluation (GRADE)] and risk of bias [The Risk Of Bias In Non-randomized Studies-of Interventions (ROBINS-I)] were assessed by two independent reviewers. Studies reporting on sacrectomy for colorectal cancer were included. Oncological and functional outcomes after sacrectomy for colorectal cancer were the primary outcomes.\n\n**Results:** Forty-six articles with 1687 patients (1115 men; 506 women) were included. Median follow-up was 31.4 months. Mean 30-day mortality was 1.1%. After R0 resection, overall survival was achieved in 86.2%, 68.0% and 42.1% patients, and disease-free survival was achieved in 75.0%, 51.0% and 43.0% patients, respectively, after 1, 3 and 5 years. Survival rates were lower after R1 or R2 resection. Most patients reported elimination of or significantly reduced pain after surgery, and 82.2% were able to walk independently, without the use of assistive devices. More patients were dependent on walking-assist devices after high sacrectomy than after low sacrectomy. The most commonly reported bowel dysfunctions were bowel obstruction (22.3%) and fistula (4.6%). Bladder dysfunction was mainly reported as incontinence (8.3%) and neurogenic bladder (23.3%). No study included quality of life as an outcome.\n\n**Conclusions:** The mortality was limited, and the morbidity rates were in concordance with published literature. The results suggest that R0 resection has higher survival rates than R1/R2 resections. Both short- and long-term functional outcomes could have major impact on a patient's quality of life. Heterogeneity was high, and neither comparative analyses nor meta-analysis could be performed.", "abstract_zh": "**Aim：** 在世界范围内，在所有癌症中，结直肠癌的死亡率排名第四。局部晚期或复发性直肠癌的治愈性治疗可能需要通过骶骨切除术进行扩大切除，但这种手术可能会给患者带来重大后果。本研究的目的是调查结直肠癌患者骶骨切除术后的肿瘤学和功能结果。\n\n**Method：** 该方案已在国际前瞻性系统评价登记册（PROSPERO）中注册。使用预定的搜索策略对 PubMed、Embase、Cochrane 图书馆、Scopus 和 Google Scholar 进行搜索。文章选择、证据质量[推荐、评估、开发和评价分级(GRADE)]和偏倚风险[非随机干预研究中的偏倚风险(ROBINS-I)]由两名独立审稿人进行评估。报告包括结直肠癌骶骨切除术的研究。结直肠癌骶骨切除术后的肿瘤学和功能结果是主要结果。\n\n**结果：** 纳入 46 篇文章，涉及 1687 名患者（1115 名男性；506 名女性）。中位随访时间为 31.4 个月。平均 30 天死亡率为 1.1%。 R0切除后，1年、3年和5年后，总生存率分别为86.2%、68.0%和42.1%，无病生存率分别为75.0%、51.0%和43.0%。 R1 或 R2 切除后存活率较低。大多数患者报告术后疼痛消除或显着减轻，82.2% 的患者能够独立行走，无需使用辅助设备。高位骶骨切除术后比低位骶骨切除术后更多的患者依赖步行辅助装置。最常见的肠功能障碍是肠梗阻（22.3%）和瘘管（4.6%）。膀胱功能障碍主要为失禁（8.3%）和神经源性膀胱（23.3%）。没有研究将生活质量作为结果。\n\n**结论：** 死亡率有限，发病率与已发表的文献一致。结果表明，R0 切除比 R1/R2 切除具有更高的生存率。短期和长期功能结果都可能对患者的生活质量产生重大影响。异质性较高，无法进行比较分析和荟萃分析。", "keywords_zh": "结直肠癌, 功能结果, 肿瘤学结果, 骶骨切除术", "keywords_en": "colorectal cancer, functional outcomes, oncological outcomes, sacrectomy", "link": "https://pubmed.ncbi.nlm.nih.gov/40185644/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 04 Apr 2025"}, {"id": "40156066", "title_en": "Efficacy of mesenchymal stem cell-based therapies in the treatment of perianal fistulizing Crohn's disease: a systematic review and meta-analysis", "title_zh": "基于间充质干细胞的疗法治疗肛周瘘管克罗恩病的疗效：系统评价和荟萃分析", "authors": "Jérémy Magalon", "abstract_en": "**Background:** Perianal lesions of Crohn's disease (CD) are complex and disabling conditions. Mesenchymal stem cell (MSC)-based therapies have emerged as an innovative approach in managing refractory perianal fistulizing CD. We conducted a systematic review and meta-analysis to describe and compare combined remission and clinical outcomes of MSC-based therapies, and then whether one approach stands out from the rest.\n\n**Methods:** We searched in MEDLINE, EMBASE and CENTRAL (up to December 31, 2023) all prospective studies assessing a local injection of MSC-based therapy in perianal fistulas of CD. The primary outcome was achievement of combined remission. MSC-based therapy strategies were compared.\n\n**Results:** Twenty-five studies were included in the meta-analysis, enrolling 596 patients with perianal fistulizing CD. The combined remission rate at 3, 6 and 12 months were 36.2% (95% confidence interval (CI), 24.5-49.7), 57.9% (95% CI 51.3-64.2) and 52% (95% CI 38.8-64.8), respectively. MSC-based therapies demonstrated a significant effect in achieving combined remission compared to placebo at 3 months (relative risk (RR) = 1.6; 95% CI 1.0-2.8) and at 6 months (RR = 1.5; 95% CI 1.1-1.9). At 6 months, the combined remission rate was 57.2% (95% CI 47.2-66.6) for adipose-derived stem cells (ASCs) and 55.7% (95% CI 26.4-81.5) for bone marrow-derived stem cells (BMSCs). In the network meta-analysis, allogeneic ASCs and BMSCs did not demonstrate superiority over each other (RR = 0.74; 95% CI 0.31-1.77).\n\n**Conclusion:** MSC-based therapies are effective for achieving combined remission of refractory and/or complex perianal fistulizing CD. The optimal efficacy effect is reached after 6 months of treatment. No superiority has yet been demonstrated between ASCs and BMSCs therapies.", "abstract_zh": "**背景：** 克罗恩病 (CD) 的肛周病变是复杂且致残的病症。基于间充质干细胞 (MSC) 的疗法已成为治疗难治性肛周瘘管 CD 的创新方法。我们进行了系统回顾和荟萃分析，以描述和比较基于 MSC 的疗法的综合缓解和临床结果，以及一种方法是否脱颖而出。\n\n**方法：** 我们在 MEDLINE、EMBASE 和 CENTRAL（截至 2023 年 12 月 31 日）中检索了所有评估局部注射 MSC 治疗 CD 肛周瘘的前瞻性研究。主要结局是实现综合缓解。比较了基于 MSC 的治疗策略。\n\n**结果：** 荟萃分析纳入了 25 项研究，纳入了 596 名肛周瘘管性 CD 患者。 3、6 和 12 个月时的综合缓解率分别为 36.2%（95% 置信区间 (CI)，24.5-49.7）、57.9%（95% CI 51.3-64.2）和 52%（95% CI 38.8-64.8）。与安慰剂相比，基于 MSC 的疗法在 3 个月（相对风险 (RR) = 1.6；95% CI 1.0-2.8）和 6 个月（RR = 1.5；95% CI 1.1-1.9）时显示出在实现联合缓解方面具有显着效果。 6 个月时，脂肪源性干细胞 (ASC) 的综合缓解率为 57.2% (95% CI 47.2-66.6)，骨髓源性干细胞 (BMSC) 的综合缓解率为 55.7% (95% CI 26.4-81.5)。在网络荟萃分析中，同种异体 ASC 和 BMSC 并未表现出彼此之间的优越性（RR = 0.74；95% CI 0.31-1.77）。\n\n**结论：** 基于 MSC 的疗法可有效实现难治性和/或复杂性肛周瘘管 CD 的联合缓解。治疗6个月后达到最佳疗效。 ASC 和 BMSC 疗法之间尚未证明其优越性。", "keywords_zh": "克罗恩病、瘘管、间充质干细胞、荟萃分析、基质血管分数", "keywords_en": "Crohn’s disease, Fistula, Mesenchymal stem cells, Meta-analysis, Stromal vascular fraction", "link": "https://pubmed.ncbi.nlm.nih.gov/40156066/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Mar 2025"}, {"id": "40155532", "title_en": "Early diagnosis of Crohn's disease in patients presenting with a perianal fistula: systematic review and development of a perianal red flags index", "title_zh": "肛周瘘患者克罗恩病的早期诊断：系统回顾和肛周危险信号指数的制定", "authors": "J D W van der Bilt", "abstract_en": "**Background:** Delay in diagnosing Crohn's disease (CD) in patients presenting with perianal abscess (PAA) and/or fistula (PAF) is common. The aim of this study was to identify red flags suggestive of CD.\n\n**Methods:** A systematic literature review was conducted to identify symptoms associated with CD in patients presenting with PAA/PAF. A questionnaire including those symptoms, supplemented with items from the International Organization for the Study of Inflammatory Bowel Diseases (IO-IBD) red flags index for luminal CD, was administered to all adult patients presenting with a PAF and eventually diagnosed with CD and matched patients (1:3) from the same study period with a cryptoglandular PAF (2012-2023) at a single non-academic teaching hospital. All patients were asked to recall symptoms/signs experienced during their first PAF.\n\n**Results:** The systematic review identified 8 articles reporting on 15 clinical characteristics in patients presenting with PAA (n = 2)/PAF (n = 6), supplemented with 13 items from the IO-IBD red flags index (28 items in total). A total of 25 patients with CD and 75 patients with PAF without CD answered the questionnaire. Univariate analysis identified seven items associated with CD (age, family history, > 2 perianal interventions, weight loss, abdominal pain, diarrhoea and fatigue), and four items remained significant in multivariate analysis: age (OR 3.4 [1.0-11.5]), > 2 previous perianal interventions (OR 3.4 [1.0-10.1]), weight loss (OR 14.4 [3.7-55.6]) and abdominal pain (OR 9.8 [1.9-49.8]). Receiver-operating characteristic curve (ROC) analysis showed that a combination of these red flags was associated with good discrimination of CD versus non-CD (AUC 0.83 [0.72-0.94]).\n\n**Conclusions:** The perianal red flags index has a good predictive value for early identification of patients with PAF at risk for underlying CD.", "abstract_zh": "**背景：** 对于患有肛周脓肿 (PAA) 和/或瘘管 (PAF) 的患者，克罗恩病 (CD) 的诊断延迟很常见。本研究的目的是识别提示 CD 的危险信号。\n\n**方法：** 我们进行了系统性文献综述，以确定 PAA/PAF 患者中与 CD 相关的症状。对所有出现 PAF 并最终诊断为 CD 的成年患者进行了一份包含这些症状的调查问卷，并补充了国际炎症性肠病研究组织 (IO-IBD) 管腔 CD 危险信号指数的项目，并与来自同一研究时期 (2012-2023) 在一家非学术性教学医院的隐腺 PAF 的匹配患者 (1:3) 进行了比较。所有患者都被要求回忆第一次 PAF 期间经历的症状/体征。\n\n**结果：** 系统评价确定了 8 篇文章，报告了 PAA (n = 2)/PAF (n = 6) 患者的 15 项临床特征，并补充了 IO-IBD 危险信号指数中的 13 项（总共 28 项）。共有 25 名患有 CD 的患者和 75 名没有 CD 的 PAF 患者回答了问卷。单变量分析确定了与 CD 相关的 7 个项目（年龄、家族史、 > 2 次肛周干预、体重减轻、腹痛、腹泻和疲劳），4 个项目在多变量分析中仍然显着：年龄 (OR 3.4 [1.0-11.5])、 > 2 次既往肛周干预 (OR 3.4 [1.0-10.1])、体重减轻 (OR 14.4) [3.7-55.6]）和腹痛（OR 9.8 [1.9-49.8]）。受试者工作特征曲线 (ROC) 分析表明，这些危险信号的组合与 CD 与非 CD 的良好区分相关（AUC 0.83 [0.72-0.94]）。\n\n**结论：** 肛周危险信号指数对于早期识别有潜在 CD 风险的 PAF 患者具有良好的预测价值。", "keywords_zh": "克罗恩病、延迟、炎症性肠病、肛周瘘", "keywords_en": "Crohn’s disease, Delay, Inflammatory bowel disease, Perianal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/40155532/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Mar 2025"}, {"id": "40125894", "title_en": "Fistulotomy versus fistulectomy for simple fistula-in-ano: a systematic review and meta-analysis of randomized controlled trials", "title_zh": "单纯性肛瘘的瘘管切开术与瘘管切除术：随机对照试验的系统评价和荟萃分析", "authors": "Rebecca J Lendzion", "abstract_en": "**Background:** Perianal fistulas are a common anorectal pathology. The sphincter-cutting techniques of fistulectomy and fistulotomy are associated with high cure rates for low or simple fistula-in-ano, with negligible risk of incontinence. However, the superiority of either technique has not previously been conclusively demonstrated. The aim of this systematic review is to compare the outcomes of the two surgical techniques for the management of simple fistula-in-ano.\n\n**Methods:** A search of MEDLINE, EMBASE and Cochrane Databases for randomized controlled trials (RCT) comparing fistulotomy to fistulectomy for simple fistula-in-ano was conducted. The primary outcome was healing time; secondary outcomes included operative time, length of hospital stay, post-operative pain score, post-operative complications and fistula recurrence.\n\n**Results:** Thirteen RCTs meet inclusion criteria, comprising a total of 685 fistulectomy and 688 fistulotomy patients. There was no significant difference between the techniques for healing time (P = 0.15), operative time (P = 0.13), length of stay (P = 0.05), wound infection (P = 0.97), flatus or faecal incontinence (P = 0.35 and P = 0.70, respectively) or recurrence (P = 0.19). Post-operative pain at 24 h, assessed using a visual analogue scale, was significantly lower in the fistulectomy group (MD-0.49, 95% CI: -0.90, -0.08; P = 0.02), and we found significantly fewer post-operative bleeding complications in the fistulotomy group (OR: 3.81, 95% CI: 1.23, 11.80; P = 0.02).\n\n**Conclusion:** This systematic review did not find conclusive evidence of the superiority of either fistulectomy or fistulotomy in terms of healing time. The two statistically significant findings were lower post-operative pain scores with fistulectomy and reduced post-operative bleeding with fistulotomy.", "abstract_zh": "**背景：** 肛周瘘是一种常见的肛肠疾病。瘘管切除术和瘘管切开术的括约肌切割技术与低度或单纯性肛门瘘的治愈率较高，并且失禁的风险可以忽略不计。然而，这两种技术的优越性之前都没有得到最终证明。本系统评价的目的是比较两种手术技术治疗单纯性肛瘘的结果。\n\n**方法：** 对 MEDLINE、EMBASE 和 Cochrane 数据库进行了随机对照试验 (RCT) 的检索，比较了单纯性肛瘘的瘘管切开术和瘘管切除术。主要结果是愈合时间；次要结局包括手术时间、住院时间、术后疼痛评分、术后并发症和瘘管复发。\n\n**结果：** 13 项随机对照试验符合纳入标准，总共包括 685 例瘘管切除术患者和 688 例瘘管切开术患者。愈合时间（P = 0.15）、手术时间（P = 0.13）、住院时间（P = 0.05）、伤口感染（P = 0.97）、排气或大便失禁（P = 0.35和P = 0.70）之间没有显着差异。分别）或复发（P = 0.19）。使用视觉模拟量表评估，瘘管切除组的术后 24 小时疼痛明显较低（MD-0.49，95% CI：-0.90，-0.08；P = 0.02），并且我们发现瘘管切开组的术后出血并发症明显较少（OR：3.81，95% CI：1.23，11.80； P = 0.02）。\n\n**结论：** 这项系统评价没有找到确凿的证据证明瘘管切除术或瘘管切开术在愈合时间方面具有优越性。两项具有统计学意义的发现是瘘管切除术术后疼痛评分较低，以及瘘管切开术减少术后出血。", "keywords_zh": "肛瘘, 瘘管切除术, 瘘管切开术, 随机对照试验", "keywords_en": "anal fistula, fistulectomy, fistulotomy, randomized controlled trials", "link": "https://pubmed.ncbi.nlm.nih.gov/40125894/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 24 Mar 2025"}, {"id": "40024986", "title_en": "A systematic review of outcome measurement instruments used in pouch anal and vaginal fistulae: a COSMIN-based analysis", "title_zh": "对储袋肛瘘和阴道瘘使用的结果测量仪器进行系统评价：基于 COSMIN 的分析", "authors": "Phil Tozer", "abstract_en": "**Purpose:** Pouch-related fistulae are devastating complications of ileoanal pouch surgery, which is performed to improve the quality of life (QoL) for patients who have had a proctocolectomy. Their management is limited by inconsistent evidence, including using poorly and heterogeneously defined outcomes. This study aims to identify all Outcome Measurement Instruments (OMIs) used in pouch fistula research, including Patient-Reported Outcome Measures (PROMs) and Clinician-Reported Outcome Measures (ClinROMs) and evaluate their quality using COSMIN guidelines to help select the best tool for a standardised core outcome measurement set in a future consensus study.\n\n**Methods:** A systematic review was conducted to identify all OMIs used in ileo-anal pouch fistulae studies, from MEDLINE, Embase, and the Cochrane Library. We evaluated existing OMIs based on COSMIN guidelines and used the GRADE approach to assess evidence quality. Results were synthesized narratively.\n\n**Results:** Among 91 studies, 13 OMIs were reviewed. Pouch-specific instruments performed poorly in key domains of reliability, validity, and responsiveness. Only 17.6% of studies assessed QoL using PROMs. The best-performing instruments were the SF-36 and IBDQ. The Ileoanal Pouch Syndrome Severity Score was the only pouch-specific instrument that involved patients in its development and although useful for pouch dysfunction, it lacks specific QoL assessment and was not validated in pouch-fistulae patients.\n\n**Conclusion:** Existing OMIs for pouch-related fistulae lack adequate measurement properties, with no PROMs specifically validated for QoL in this population and very few instruments involving patients in their development. There is an unmet need for a validated PROM specifically for QoL in pouch-related fistulae.", "abstract_zh": "**Purpose：** 储袋相关瘘管是回肠肛管储袋手术的严重并发症，该手术的目的是提高直肠结肠切除术患者的生活质量 (QoL)。他们的管理受到不一致的证据的限制，包括使用不明确且异质定义的结果。本研究旨在确定储袋瘘研究中使用的所有结果测量仪器 (OMIs)，包括患者报告的结果测量 (PROM) 和临床医生报告的结果测量 (ClinROM)，并使用 COSMIN 指南评估其质量，以帮助在未来的共识研究中选择标准化核心结果测量集的最佳工具。\n\n**方法：** 我们对 MEDLINE、Embase 和 Cochrane 图书馆进行了系统评价，以确定回肠肛袋瘘研究中使用的所有 OMI。我们根据 COSMIN 指南评估了现有的 OMI，并使用 GRADE 方法来评估证据质量。结果以叙述方式综合。\n\n**结果：** 在 91 项研究中，审查了 13 项 OMI。造口袋专用仪器在可靠性、有效性和响应性等关键领域表现不佳。只有 17.6% 的研究使用 PROM 评估生活质量。性能最好的仪器是 SF-36 和 IBDQ。回肠储袋综合征严重程度评分是唯一让患者参与其发展的储袋特异性工具，虽然对于储袋功能障碍有用，但缺乏具体的生活质量评估，并且未在储袋瘘患者中进行验证。\n\n**结论：** 现有的用于与造口袋相关的瘘管的 OMI 缺乏足够的测量特性，没有专门针对该人群的 QoL 进行验证的 PROM，并且涉及患者开发的仪器也很少。对于专为造口袋相关瘘管的生活质量而设计的经过验证的 PROM 的需求尚未得到满足。", "keywords_zh": "COSMIN，患者报告的结果测量，储袋瘘，储袋肛瘘，储袋阴道瘘", "keywords_en": "COSMIN, Patient reported outcome measures, Pouch Fistula, Pouch anal fistula, Pouch vaginal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/40024986/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sun, 02 Mar 2025"}, {"id": "39946821", "title_en": "A systematic review and meta-analysis of the diagnostic test accuracy of diffusion weighted imaging and apparent diffusion coefficient in differentiating active from inactive perianal fistula", "title_zh": "对弥散加权成像和表观弥散系数区分活动性和非活动性肛周瘘的诊断测试准确性的系统回顾和荟萃分析", "authors": "G S Octavius", "abstract_en": "**Introduction:** This systematic review and meta-analysis evaluated the diagnostic accuracy of MRI-based apparent diffusion coefficient (ADC) and diffusion-weighted imaging (DWI) for differentiating active from inactive perianal fistulas.\n\n**Methods:** The protocol was registered with the International Prospective Register of Systematic Reviews (PROSPERO) (CRD42024596604). The review included five databases (MEDLINE, Cochrane Library, PubMed, Science Direct, and Google Scholar). Meta-analyses were performed on studies reporting ADC values and other sequences using STATA software with the \"Midas\" command.\n\n**Results:** Of 21 studies included in the review, 12 were meta-analyzed, encompassing 1007 patients (77.5 % male) with 1092 fistulas and 321 abscesses. Six studies reported ADC values for active vs. inactive fistulas, with a pooled sensitivity of 83 % (95%CI 68-92), specificity of 75 % (95%CI 60-85), and AUC of 0.85 (95%CI 0.81-0.87). Pooled ADC cut-offs ranged from 1.105 to 1.109 × 10⁻³ mm<sup>2</sup>/s. The T2WI + DWI sequence demonstrated the highest diagnostic accuracy, with a pooled sensitivity of 99 % (95%CI 90-100), specificity of 97 % (95%CI 79-100), and an AUC of 1.\n\n**Conclusion:** ADC alone is inadequate for reliably distinguishing active from inactive fistulas. T2WI combined with DWI offers superior diagnostic performance, surpassing contrast-enhanced T1WI, and is promising for non-invasive evaluation of perianal fistulas. However, several limitations, such as moderate to high risk of bias and heterogeneity, may bias this conclusion.\n\n**Implications For Practice:** T2WI + DWI could become the standard for assessing perianal fistulas, avoiding contrast agents, and benefiting patients contraindicated for Gadolinium-based contrast media. Variability and potential bias across studies warrant further research.", "abstract_zh": "**介绍：** 这项系统回顾和荟萃分析评估了基于 MRI 的表观扩散系数 (ADC) 和扩散加权成像 (DWI) 区分活动性和非活动性肛周瘘的诊断准确性。\n\n**方法：** 该方案已在国际系统评价前瞻性登记册 (PROSPERO) 中注册 (CRD42024596604)。该综述包括五个数据库（MEDLINE、Cochrane Library、PubMed、Science Direct 和 Google Scholar）。使用带有“Midas”命令的 STATA 软件对报告 ADC 值和其他序列的研究进行荟萃分析。\n\n**结果：** 在该评价纳入的 21 项研究中，有 12 项进行了荟萃分析，涉及 1007 名患者（77.5% 男性），有 1092 个瘘管和 321 个脓肿。六项研究报告了活动性瘘管与非活动性瘘管的 ADC 值，汇总敏感性为 83% (95%CI 68-92)，特异性为 75% (95%CI 60-85)，AUC 为 0.85 (95%CI 0.81-0.87)。汇集的 ADC 截止范围为 1.105 至 1.109 × 10⁻3 mm<sup>2</sup>/s。 T2WI + DWI 序列显示出最高的诊断准确性，汇总敏感性为 99% (95%CI 90-100)，特异性为 97% (95%CI 79-100)，AUC 为 1。\n\n**结论：** 单独使用 ADC 不足以可靠地区分活动性瘘管和非活动性瘘管。 T2WI 与 DWI 相结合提供了优于对比增强 T1WI 的诊断性能，并且有望用于肛周瘘的无创评估。然而，一些限制，例如中度至高风险的偏倚和异质性，可能会导致这一结论产生偏差。\n\n**Implications for practice：** T2WI + DWI 可以成为评估肛周瘘管、避免使用造影剂以及使钆造影剂禁忌患者受益的标准。研究之间的变异性和潜在偏差值得进一步研究。", "keywords_zh": "表观扩散系数、诊断测试准确性、扩散加权成像、磁共振成像、肛周瘘", "keywords_en": "Apparent diffusion coefficient, Diagnostic test accuracy, Diffusion weighted imaging, Magnetic resonance imaging, Perianal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/39946821/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 13 Feb 2025"}, {"id": "39876853", "title_en": "Rectovaginal Fistula Repair Following Vaginoplasty in Transgender Females: A Systematic Review of Surgical Techniques", "title_zh": "变性女性阴道成形术后直肠阴道瘘修复：手术技术的系统回顾", "authors": "Gabriel A Del Corral", "abstract_en": "<b>Background:</b> Rectovaginal fistula (RVF) remains a complex complication following gender-affirming vaginoplasty. This review aims to evaluate RVF repair techniques and outcomes following vaginoplasty. <b>Methods:</b> A systematic review was performed per PRISMA guidelines. Ovid MEDLINE, Ovid EMBASE, Cochrane, and Web of Science were queried for records pertaining to RVF repair following vaginoplasty. Study characteristics, operative details, and demographics were collected. Outcomes included RVF repair method, recurrence rate, and complications. <b>Results:</b> Among 282 screened citations, 17 articles representing 41 patients were included. Rectovaginal fistula repair methods identified included 4 conservative management approaches (n = 12 patients), primary closure with or without fistulectomy and ostomy (n = 22), 10 reconstructive surgical techniques (n = 18). The most common reconstructive techniques were V-Y full-thickness advancement with rectal flap (n = 5) and infragluteal fasciocutaneous flap (n = 4). Median time to recurrence was 6 months (interquartile range 7.5). Reported RVF repair complications included RVF recurrence (n = 5, 14.7%) and wound complication or dehiscence (n = 2, 5.88%). Three cases of RVF recurred after primary closure with or without fistulectomy and ostomy, while 2 cases of recurrence followed reconstruction. <b>Conclusion:</b> There remains a high level of variability in the approach to RVF repair following vaginoplasty. Reconstructive surgical techniques may be a more optimal solution without necessitating ostomies, but this decision must be considered in the context of RVF location, individual patient expectations, and clinical presentation.", "abstract_zh": "<b>背景：</b>直肠阴道瘘（RVF）仍然是性别肯定阴道成形术后的复杂并发症。本综述旨在评估阴道成形术后的 RVF 修复技术和结果。 <b>方法：</b>根据 PRISMA 指南进行系统评价。向 Ovid MEDLINE、Ovid EMBASE、Cochrane 和 Web of Science 查询了有关阴道成形术后 RVF 修复的记录。收集研究特征、手术细节和人口统计数据。结果包括 RVF 修复方法、复发率和并发症。 <b>结果：</b> 在 282 篇筛选的引文中，纳入了代表 41 名患者的 17 篇文章。确定的直肠阴道瘘修复方法包括 4 种保守治疗方法（n = 12 名患者）、一期闭合（带或不带瘘管切除术和造口术）（n = 22）、10 种重建手术技术（n = 18）。最常见的重建技术是直肠皮瓣 V-Y 全层推进 (n = 5) 和臀下筋膜皮瓣 (n = 4)。复发的中位时间为 6 个月（四分位数间距 7.5）。报告的 RVF 修复并发症包括 RVF 复发（n = 5，14.7%）和伤口并发症或裂开（n = 2，5.88%）。 3 例 RVF 在初次闭合（无论是否行瘘管切除和造口）后复发，2 例在重建后复发。 <b>结论：</b>阴道成形术后 RVF 修复方法仍然存在很大差异。重建手术技术可能是一种更优化的解决方案，无需造口，但必须根据 RVF 位置、患者个体期望和临床表现来考虑这一决定。", "keywords_zh": "新阴道, 直肠阴道瘘, 手术技术, 变性人, 阴道成形术", "keywords_en": "neovagina, rectovaginal fistula, surgical technique, transgender, vaginoplasty", "link": "https://pubmed.ncbi.nlm.nih.gov/39876853/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 29 Jan 2025"}, {"id": "39833536", "title_en": "Fistulae Secondary to Vaginal Pessary Use for Pelvic Organ Prolapse: A Systematic Review", "title_zh": "使用阴道子宫托治疗盆腔器官脱垂继发瘘管：系统评价", "authors": "Thomas Giles Gray", "abstract_en": "**Introduction And Hypothesis:** Urogenital and rectovaginal fistulae are rare complications of pessary use for pelvic organ prolapse (POP). This systematic review investigates the prevalence of these complications in patients using pessary for POP, potential risk factors and approaches to their investigation and management.\n\n**Methods:** All studies in English reporting urogenital or rectovaginal fistulae secondary to pessaries for POP were eligible for inclusion. AMED, CINAHL, MedLine, Scopus and Web of Science databases were searched from inception to March 2024. Risk of bias was assessed using validated tools: Murad et al.'s tool for case series/reports and ROBINS-I for non-randomised studies. Quantitative synthesis of descriptive statistics and narrative summary were performed.\n\n**Results:** Two retrospective studies and 60 case series/reports were included, describing 76 fistulae (34 urogenital, 42 rectovaginal). The retrospective studies estimated the prevalence of fistulae to be 3%. Of reported fistulae, 45% occurred with Gellhorn, 16% with ring, 11% with shelf and 9% with cube pessaries. Fifty percent were associated with neglected pessary care. Conservative management resulted in size reduction or resolution in 69% of fistulae: this approach should be considered. Vaginal (88%) and abdominal (100%) vesicovaginal fistula repairs were successful. Diverting ostomies were popular for rectovaginal fistulae but often resulted in permanent stoma without reducing mortality, recurrence or repair failure. Colpocleisis represents an effective procedure for managing co-existing POP.\n\n**Conclusions:** The prevalence of fistulae from pessary use is likely < 1% but may rise to 3% with risk factors present, including Gellhorn pessaries and neglected care. Both conservative and surgical management are viable treatment options.", "abstract_zh": "**Introduction and hypothesis：** 泌尿生殖道和直肠阴道瘘是使用子宫托治疗盆腔器官脱垂 (POP) 的罕见并发症。本系统综述调查了使用子宫托治疗 POP 的患者中这些并发症的发生率、潜在危险因素及其调查和管理方法。\n\n**方法：** 所有报告继发于 POP 子宫托的泌尿生殖道或直肠阴道瘘的英文研究均符合纳入条件。 AMED、CINAHL、MedLine、Scopus 和 Web of Science 数据库的检索时间从开始到 2024 年 3 月。使用经过验证的工具评估偏倚风险：Murad 等人用于病例系列/报告的工具和用于非随机研究的 ROBINS-I 工具。进行了描述性统计和叙述性总结的定量综合。\n\n**结果：** 纳入两项回顾性研究和 60 个病例系列/报告，描述 76 个瘘管（34 个泌尿生殖瘘管，42 个直肠阴道瘘）。回顾性研究估计瘘管的患病率为 3%。在报告的瘘管中，45% 发生在 Gellhorn 上，16% 发生在环上，11% 发生在架子上，9% 发生在立方体子宫托上。百分之五十与忽视子宫托护理有关。保守治疗使 69% 的瘘管尺寸减小或消退：应考虑这种方法。阴道（88%）和腹部（100%）膀胱阴道瘘修复成功。改道造口术在直肠阴道瘘治疗中很流行，但通常会导致永久性造口，而不会降低死亡率、复发或修复失败。阴道封闭术是治疗共存 POP 的有效方法。\n\n**结论：** 使用子宫托引起的瘘管患病率可能<<1%，但如果存在危险因素，包括盖尔霍恩子宫托和忽视护理，则可能上升至 3%。保守治疗和手术治疗都是可行的治疗选择。", "keywords_zh": "盆腔器官脱垂、子宫托、直肠阴道瘘、系统回顾、膀胱阴道瘘", "keywords_en": "Pelvic organ prolapse, Pessaries, Rectovaginal fistula, Systematic review, Vesicovaginal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/39833536/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 20 Jan 2025"}, {"id": "39623055", "title_en": "Salvage irreversible electroporation for locally recurrent prostate cancer after definitive radiotherapy: a systematic review", "title_zh": "根治性放射治疗后局部复发性前列腺癌的挽救性不可逆电穿孔：系统评价", "authors": "Gencay Hatiboglu", "abstract_en": "**Background:** To systematically evaluate the available evidence regarding the effect of salvage irreversible electroporation (IRE) in patients with local recurrent prostate cancer (PCa) after definitive radiotherapy (RT).\n\n**Methods:** A systematic search was conducted in the electronic databases PubMed-MEDLINE and the Web of Science. The following search terms were used: \"irreversible electroporation AND recurrent prostate cancer\", ''salvage irreversible electroporation AND prostate cancer AND radiation\", \"nanoknife AND recurrent prostate cancer\", and ''salvage irreversible electroporation AND prostate cancer\" by combining PICO (population, intervention, comparison, and outcome) terms.\n\n**Results:** We identified 5 eligible studies. Following IRE, local oncological control was ranging from 67 to 78%. In-field and out-field lesion recurrences after IRE were ranging from 3 to 10% and from 8 to 14%, respectively. Only one study reported an overall metastasis-free survival rate of 91% and a 5-year progression-free survival rate of 60%. The post-IRE continence status ranged 73-100%. Two studies reported a decline in the proportion of patients maintaining erections sufficient for sexual intercourse and two studies reported 50% preservation of erection. The majority of complications were of a low-to-mild nature, classified as Clavien-Dindo grade I-II, with the exception of the development of a rectal fistula in a single case.\n\n**Conclusions:** IRE represents an alternative salvage treatment option for patients with localised recurrent PCa following RT. The procedure offers a favourable safety profile and effective preservation of urinary function. The oncological results are promising, but further investigation is required.", "abstract_zh": "**背景：** 系统评估关于挽救性不可逆电穿孔 (IRE) 对根治性放射治疗 (RT) 后局部复发性前列腺癌 (PCa) 患者效果的现有证据。\n\n**方法：** 在电子数据库 PubMed-MEDLINE 和 Web of Science 中进行了系统检索。使用以下搜索术语：“不可逆电穿孔和复发性前列腺癌”、“挽救不可逆电穿孔和前列腺癌和辐射”、“纳米刀和复发性前列腺癌”和“挽救不可逆电穿孔和前列腺癌”，通过组合 PICO（群体、干预、比较和结果）术语。\n\n**结果：** 我们确定了 5 项符合条件的研究。 IRE 后，局部肿瘤控制范围为 67% 至 78%。 IRE 后视野内和视野外病变复发率分别为 3% 至 10% 和 8% 至 14%。只有一项研究报告总体无转移生存率为 91%，5 年无进展生存率为 60%。 IRE 后的失禁状态范围为 73-100%。两项研究报告称，维持足以进行性交的勃起的患者比例有所下降，另外两项研究报告称，50% 的患者保留了勃起。大多数并发症的性质为低至轻度，分类为 Clavien-Dindo I-II 级，但单个病例出现直肠瘘除外。\n\n**结论：** IRE 代表了放疗后局部复发 PCa 患者的另一种挽救治疗选择。该手术具有良好的安全性并能有效保留泌尿功能。肿瘤学结果令人鼓舞，但还需要进一步研究。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39623055/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 02 Dec 2024"}, {"id": "39422801", "title_en": "Perianal Mucinous Adenocarcinoma: A Case Report and a Systematic Review of the Literature", "title_zh": "肛周粘液性腺癌：一例报告和文献系统回顾", "authors": "Apostolos P Stamatiadis", "abstract_en": "**Background:** Mucinous adenocarcinoma of anus is an uncommon neoplasm of the gastrointestinal tract. In most of the cases, early diagnosis of this disease is difficult since its symptoms frequently mimic benign inflammatory conditions.\n\n**Methods:** A systematic PubMed and Scopus search was conducted, a propos of a case report.\n\n**Results:** One hundred fifty patients from 93 case reports were included. The mean age of the patients was 60.5 years (range: 18-81). The majority of them were males (124 out of 150, 82.7%), while the main known risk factor was the history of chronic fistula (109 out of 150, 72.7%). Recurrent perianal sepsis and perianal pain were the principal symptoms at the time of presentation. No symptoms have been reported only in three patients (3 out of 150, 2%). Regarding the prior surgical history of the patients, multiple abscess drainage and perianal fistula's related interventions were present in 62 (41.3%) and 19 (12.7%) patients, respectively. Neoadjuvant chemoradiotherapy was administered in 53 out of 150 patients (35.3%), while the majority of them have been treated with combined treatment of chemotherapy and radiotherapy. APR and its variations were the most applied surgical treatment (68%). Adjuvant chemoradiotherapy was administered almost up to one-third of the included patients (34%). Recurrence of the disease was reported in 41 out of 150 patients (27.3%). Death was reported in 44 out of 150 patients (29.3%).\n\n**Conclusion:** Review of the available published literature suggests that perianal mucinous adenocarcinoma is an extremely rare neoplasia. Τhere is no consensus as far as the diagnosis and the treatment strategies, due to the rarity of this neoplasm. High degree of clinical suspicion as well as histopathological confirmation is the principal requisites for the diagnosis of mucinous adenocarcinoma, especially in the ground of chronic ulcero-proliferative perianal lesions.", "abstract_zh": "**背景：** 肛门粘液性腺癌是一种罕见的胃肠道肿瘤。在大多数情况下，这种疾病的早期诊断很困难，因为它的症状经常模仿良性炎症。\n\n**方法：** 根据病例报告的建议，进行了系统的 PubMed 和 Scopus 检索。\n\n**结果：** 纳入 93 份病例报告中的 150 名患者。患者的平均年龄为 60.5 岁（范围：18-81 岁）。其中大多数为男性（150 人中的 124 人，82.7%），而已知的主要危险因素是慢性瘘管病史（150 人中的 109 人，72.7%）。复发性肛周败血症和肛周疼痛是就诊时的主要症状。仅 3 名患者没有报告任何症状（150 名患者中有 3 名，2%）。关于患者既往手术史，分别有62例（41.3%）和19例（12.7%）患者接受过多处脓肿引流和肛周瘘相关干预。 150例患者中，有53例（35.3%）接受了新辅助放化疗，其中大多数患者接受了化疗和放疗的联合治疗。 APR 及其变体是最常用的手术治疗方法 (68%)。几乎三分之一的纳入患者（34%）接受了辅助放化疗。 150 名患者中有 41 名（27.3%）报告疾病复发。 150 名患者中有 44 名死亡（29.3%）。\n\n**结论：** 对现有已发表文献的回顾表明，肛周粘液性腺癌是一种极其罕见的肿瘤。由于这种肿瘤的罕见性，在诊断和治疗策略方面尚未达成共识。高度的临床怀疑和组织病理学证实是诊断粘液腺癌的主要必要条件，特别是在慢性溃疡增殖性肛周病变的情况下。", "keywords_zh": "肛门、肛门、肛门内超声检查、粘液性腺癌、肛周", "keywords_en": "Anal, Anus, Endoanal ultrasonography, Mucinous adenocarcinoma, Perianal", "link": "https://pubmed.ncbi.nlm.nih.gov/39422801/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 18 Oct 2024"}, {"id": "39360706", "title_en": "Darvadstrocel for complex perianal fistulas in Crohn's disease: A systematic review and meta-analysis", "title_zh": "Darvadstrocel 治疗克罗恩病复杂肛周瘘：系统评价和荟萃分析", "authors": "Cristina Alba", "abstract_en": "**Background:** Local injection of darvadstrocel, a suspension of expanded adipose-derived allogenic mesenchymal stem cells, has been used for treatment-refractory perianal fistulas in Crohn's disease (CD).\n\n**Objective:** This study aimed to investigate efficacy and safety of darvadstrocel for complex perianal fistulas in CD.\n\n**Methods:** A systematic search was conducted through April 2024 in relevant databases for observational studies evaluating darvadstrocel. A random-effects meta-analysis model was used to calculate the pooled effect sizes (proportions or incidence rates [IRs]) with 95% confidence intervals (CIs) of effectiveness and safety outcomes. The risk of bias was evaluated using the Joanna Briggs Institute Critical Appraisal Tool. The I<sup>2</sup> value assessed heterogeneity. Sensitivity and subgroup analyses were also conducted.\n\n**Results:** Twelve studies were included with 595 patients. The pooled rate of patients achieving clinical remission, defined as fistula healing, was 68.1% at month 6 (95% CI 63.4-72.7) and 77.2% (95% CI 70.1-83.8) at month 12. Combined remission, defined as clinical remission and absence of collections >2 cm confirmed by magnetic resonance imaging, was reported in 60.6% and in 69.7% of patients at months 6 and 12, respectively. The rate of patients with treatment failure, defined as no clinical remission at the last follow-up (mean 18.7 months; SD 9.9), was 34.5%. Failure rate was independent of follow-up time (p = 0.85). For effectiveness outcomes, between-study heterogeneity was negligible. Subgroup analysis indicated that none of the covariates modified the treatment effect. Pooled IRs per 100 patient-years of adverse events (AE), serious AEs, perianal abscesses, and reoperations were 19.6, 3.2, 16.9 and 7.1, respectively.\n\n**Conclusion:** Evidence from observational studies supports the efficacy and safety of darvadstrocel for complex perianal fistulas in CD. Studies have reported high fistula healing rates that can be sustained long-term in most patients, with negligible between-study heterogeneity, as well as a favorable safety profile.", "abstract_zh": "**背景：** 局部注射darvadstrocel（一种扩增的脂肪来源同种异体间充质干细胞悬浮液）已用于治疗克罗恩病（CD）难治性肛周瘘。\n\n**目的：** 本研究旨在探讨 darvadstrocel 治疗 CD 复杂肛周瘘的疗效和安全性。\n\n**方法：** 截至 2024 年 4 月，我们在相关数据库中进行了系统性检索，以评估 darvadstrocel 的观察性研究。使用随机效应荟萃分析模型来计算汇总效应大小（比例或发生率 [IR]），有效性和安全性结果的置信区间 (CI) 为 95%。使用乔安娜·布里格斯研究所批判性评估工具评估偏倚风险。 I<sup>2</sup> 值评估异质性。还进行了敏感性和亚组分析。\n\n**结果：** 12 项研究纳入了 595 名患者。第 6 个月时达到临床缓解（定义为瘘管愈合）的患者的汇总率为 68.1%（95% CI 63.4-72.7），第 12 个月时为 77.2%（95% CI 70.1-83.8）。综合缓解（定义为临床缓解且经磁共振成像证实没有 >2 cm 的积液）的患者比例为 60.6% 和 69.7%分别在第 6 个月和第 12 个月。治疗失败（定义为最后一次随访时无临床缓解）的患者比例（平均 18.7 个月；SD 9.9）为 34.5%。失败率与随访时间无关 (p = 0.85)。对于有效性结果，研究间的异质性可以忽略不计。亚组分析表明没有任何协变量改变治疗效果。每 100 患者年不良事件 (AE)、严重 AE、肛周脓肿和再次手术的汇总 IR 分别为 19.6、3.2、16.9 和 7.1。\n\n**结论：** 观察性研究的证据支持 darvadstrocel 对于 CD 复杂肛周瘘的疗效和安全性。研究表明，大多数患者的瘘管愈合率较高，可以长期维持，研究间的异质性可以忽略不计，并且安全性良好。", "keywords_zh": "克罗恩病、脂肪来源的同种异体间充质干细胞、alofisel、darvadstrocel、炎症性肠病、荟萃分析、肛周瘘", "keywords_en": "Crohn's disease, adipose‐derived allogenic mesenchymal stem cells, alofisel, darvadstrocel, inflammatory bowel disease, meta‐analysis, perianal fistulas", "link": "https://pubmed.ncbi.nlm.nih.gov/39360706/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 03 Oct 2024"}, {"id": "39332832", "title_en": "Role of prolonged packing in postoperative anorectal abscess management: a systematic review and meta-analysis", "title_zh": "长时间填塞在术后肛门直肠脓肿处理中的作用：系统评价和荟萃分析", "authors": "Valentin Mocanu", "abstract_en": "**Background:** Prolonged packing of anorectal abscess cavities with internal dressings after incision and drainage is frequently used, but the efficacy of this practice remains controversial. Some studies highlight its use in hemostasis and preventing fistula and abscess recurrence, whereas others describe its economic burden and increase in pain. In this systematic review, we examine current evidence on the impact of packing after incision and drainage for anorectal abscesses.\n\n**Methods:** The medical librarian conducted a comprehensive literature search on January 5, 2023. We conducted the meta-analysis using RevMan 5.4.1 software with a Mantel-Haenszel random-effects model.\n\n**Results:** We identified 3 randomized controlled trials, comprising 490 patients. Of those, 241 patients (49%) received postoperative packing; most patients were male (<i>n</i> = 158, 65.6%), with a median age of 40.5 years and a follow-up of 6 months. Meta-analysis showed that prolonged wound packing was associated with delayed wound healing and increased pain, but no difference in abscess recurrence or fistula formation.\n\n**Conclusion:** In this systematic review of current evidence highlighting the impact of packing after incision and drainage for anorectal abscesses, we found that the practice is not associated with significant differences in abscess recurrence and fistula formation, but is associated with increased postoperative pain and delayed wound healing.", "abstract_zh": "**背景：** 切开引流后，经常使用内部敷料长时间填塞肛门直肠脓腔，但这种做法的疗效仍存在争议。一些研究强调其在止血和预防瘘管和脓肿复发方面的用途，而其他研究则描述了其经济负担和疼痛增加。在这篇系统评价中，我们研究了有关肛门直肠脓肿切开引流后填塞影响的现有证据。\n\n**方法：** 医学图书馆员于 2023 年 1 月 5 日进行了全面的文献检索。我们使用 RevMan 5.4.1 软件和 Mantel-Haenszel 随机效应模型进行了荟萃分析。\n\n**结果：** 我们确定了 3 项随机对照试验，涉及 490 名患者。其中，241 名患者（49%）接受了术后填塞；大多数患者为男性（<i>n</i> = 158，65.6%），中位年龄为 40.5 岁，随访时间为 6 个月。荟萃分析显示，长时间包扎伤口与伤口愈合延迟和疼痛增加有关，但脓肿复发或瘘管形成没有差异。\n\n**结论：** 在对当前证据的系统回顾中，强调了肛门直肠脓肿切开引流后填塞的影响，我们发现这种做法与脓肿复发和瘘管形成的显着差异无关，但与术后疼痛增加和伤口愈合延迟有关。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39332832/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 27 Sep 2024"}, {"id": "39298676", "title_en": "Impact of Seton Use on Clinical, Patient-Reported, and Healthcare Resource Utilization Outcomes in Complex Crohn's Perianal Fistulas: A Systematic Literature Review", "title_zh": "使用挂线对复杂克罗恩病肛周瘘的临床、患者报告和医疗资源利用结果的影响：系统文献综述", "authors": "Phillip Fleshner", "abstract_en": "**Background:** Optimal treatment strategies for seton use in patients with Crohn's perianal fistulas (CPF) remain elusive. This systematic literature review aimed to summarize clinical, patient-reported, and healthcare resource utilization (HCRU) outcomes associated with seton use for symptomatic relief and treatment of complex CPF.\n\n**Methods:** Electronic databases (MEDLINE, Embase, EBM Reviews, EconLit) were searched. Titles, abstracts, and relevant full texts were screened by 2 reviewers for inclusion using prespecified PICOS-T criteria. Articles published in English between January 1, 1980 and September 6, 2021 were included; animal/in vitro studies and case reports with <5 patients were excluded. Outcomes of interest included rates of complete response/remission and fistula recurrence in patients receiving seton with/without infliximab or biologics. Data were summarized using descriptive statistics.\n\n**Results:** Overall, 56 studies were included (full texts: n = 43; congress abstracts: n = 13). CPF and clinical outcome definitions were heterogeneous. Rates (range) of complete response/remission varied widely (seton: 13%-75%; seton + infliximab: 23%-100%; seton + biologics: 23%-59%) as did rates for fistula recurrence (seton: 4%-68%; seton + infliximab: 0%-50%; seton + biologics: 0%-17%). Rates of fistula-related reintervention, new fistula or abscess formation, and abscess recurrence were also varied; more consistency was observed regarding the use of patient-reported outcomes. Few studies reported outcomes from pediatric/adolescent patients or HCRU.\n\n**Conclusions:** Optimal use of seton in patients with CPF remains unclear. International standardization of definitions for CPF and related clinical outcomes are required to permit data comparability and identify the most effective treatment strategies involving seton use in CPF.", "abstract_zh": "**背景：** 克罗恩病肛周瘘（CPF）患者挂线的最佳治疗策略仍然难以捉摸。本系统文献综述旨在总结与使用挂线缓解症状和治疗复杂 CPF 相关的临床、患者报告和医疗资源利用 (HCRU) 结果。\n\n**方法：** 检索了电子数据库（MEDLINE、Embase、EBM Reviews、EconLit）。标题、摘要和相关全文由 2 名审稿人筛选，以使用预先指定的 PICOS-T 标准进行纳入。收录了1980年1月1日至2021年9月6日期间以英文发表的文章；动物/体外研究和病例报告<5名患者被排除在外。感兴趣的结果包括接受挂线并使用/不使用英夫利昔单抗或生物制剂的患者的完全缓解/缓解率和瘘管复发率。使用描述性统计总结数据。\n\n**结果：** 总体而言，纳入了 56 项研究（全文：n = 43；会议摘要：n = 13）。 CPF 和临床结果的定义是不同的。完全缓解/缓解率（范围）差异很大（挂线：13%-75%；挂线 + 英夫利昔单抗：23%-100%；挂线 + 生物制剂：23%-59%），瘘管复发率也有很大差异（挂线：4%-68%；挂线 + 英夫利昔单抗：0%-50%；挂线 + 英夫利昔单抗：0%-50%）。挂线 + 生物制剂：0%-17%）。与瘘管相关的再干预、新瘘管或脓肿形成以及脓肿复发率也各不相同；在使用患者报告的结果方面观察到更加一致。很少有研究报告儿科/青少年患者或 HCRU 的结果。\n\n**结论：** CPF 患者挂线的最佳使用方式仍不清楚。需要对 CPF 定义和相关临床结果进行国际标准化，以实现数据可比性并确定涉及 CPF 挂线使用的最有效治疗策略。", "keywords_zh": "克罗恩病、肛周瘘、挂线", "keywords_en": "Crohn’s disease, perianal fistula, seton", "link": "https://pubmed.ncbi.nlm.nih.gov/39298676/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 19 Sep 2024"}, {"id": "39186335", "title_en": "Efficacy and Safety of Endorectal Advancement Flap for the Treatment of Anal Fistula: A Systematic Review and Meta-Analysis", "title_zh": "直肠内推进皮瓣治疗肛瘘的疗效和安全性：系统评价和荟萃分析", "authors": "Wencong Xu", "abstract_en": "**Aim:** Complex anal fistula poses a significant challenge for anorectal surgeons due to its high risks of recurrence and incontinence. A sphincter-preserving procedure named endorectal advancement flap (ERAF) is gradually being applied to clinical practice. Therefore, this meta-analysis aims to evaluate the efficacy and safety of ERAF in managing anal fistula.\n\n**Methods:** We searched PubMed, Embase, Cochrane, and Web of Science databases for relevant manuscripts published from 29 August 2003 to 29 August 2023. Among these studies, outcomes included healing rate, recurrence rate, incontinence rate, and complications. Furthermore, the quality of the included studies was assessed using the Newcastle-Ottawa Scale (NOS) and the Cochrane risk-of-bias tool. The heterogeneity was determined using the chi-squared test and I2 statistic. A random effects model was applied if significant heterogeneity (p < 0.05 and I2 > 50%) was observed. Sensitivity analysis was conducted by excluding studies with a high risk of bias.\n\n**Results:** Thirty-eight studies were included in the present analysis, involving 1559 participants. The pooled healing rate and recurrence rate of ERAF were 65.5% (95% confidence intervals (CI): 57.6%-73.4%) and 19.6% (95% CI: 14.8%-24.4%), respectively. The pooled incontinence rate was 10.6% (95% CI: 6.0%-15.1%). According to the subgroup analysis, the healing rate, recurrence rate, and incontinence rate of ERAF for fistula associated with inflammatory bowel disease (IBD) were 53.9% (95% CI: 38.1%-69.7%), 32.6% (95% CI: 21.3%-43.8%), and 2.8% (95% CI: 0%-10.6%), respectively. For patients without IBD, the healing rate, recurrence rate, and incontinence rate of ERAF were 70.6% (95% CI: 63.9%-77.4%), 15.7% (95% CI: 9.9%-21.5%), and 16.5% (95% CI: 8.1%-24.9%), respectively. We observed that bleeding, local infection or abscess, flap dehiscence, and haematomas were the common complications, with incidences of 2.2% (95% CI: 0%-4.5%), 9.5% (95% CI: 4.7%-14.4%), 10.4% (95% CI: 0.0%-21.6%), and 12.4% (95% CI: 0%-27.6%), respectively.\n\n**Conclusions:** ERAF may be an optional treatment for anal fistula from the perspective of effectiveness and safety.\n\n**Systematic Review Registration:** PROSPERO: CRD42023451451.", "abstract_zh": "**Aim：** 复杂肛瘘由于其复发和失禁的高风险，给肛肠外科医生带来了重大挑战。直肠内推进皮瓣（ERAF）的保留括约肌手术正逐渐应用于临床。因此，本荟萃分析旨在评估 ERAF 治疗肛瘘的有效性和安全性。\n\n**方法：** 我们检索了 PubMed、Embase、Cochrane 和 Web of Science 数据库，查找 2003 年 8 月 29 日至 2023 年 8 月 29 日发表的相关手稿。在这些研究中，结果包括治愈率、复发率、失禁率和并发症。此外，使用纽卡斯尔-渥太华量表（NOS）和 Cochrane 偏倚风险工具评估了纳入研究的质量。使用卡方检验和 I2 统计量确定异质性。如果观察到显着的异质性（p < 0.05 且 I2 > 50%），则应用随机效应模型。通过排除具有高偏倚风险的研究来进行敏感性分析。\n\n**结果：** 本分析纳入 38 项研究，涉及 1559 名参与者。 ERAF 的合并治愈率和复发率分别为 65.5%（95% 置信区间 (CI)：57.6%-73.4%）和 19.6%（95% CI：14.8%-24.4%）。合并失禁率为 10.6%（95% CI：6.0%-15.1%）。根据亚组分析，ERAF治疗炎症性肠病（IBD）相关瘘管的治愈率、复发率和失禁率分别为53.9%（95% CI：38.1%-69.7%）、32.6%（95% CI：21.3%-43.8%）和2.8%（95% CI：0%-10.6%）。对于无IBD的患者，ERAF的治愈率、复发率和失禁率分别为70.6%（95% CI：63.9%-77.4%）、15.7%（95% CI：9.9%-21.5%）和16.5%（95% CI：8.1%-24.9%）。我们观察到出血、局部感染或脓肿、皮瓣裂开和血肿是常见的并发症，发生率分别为2.2%（95% CI：0%-4.5%）、9.5%（95% CI：4.7%-14.4%）、10.4%（95% CI：0.0%-21.6%）和12.4%（95% CI： 0%-27.6%），分别。\n\n**结论：** 从有效性和安全性的角度来看，ERAF可能是肛瘘的一种可选治疗方法。\n\n**Systematic review registration：** 普洛斯彼罗：CRD42023451451。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39186335/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 26 Aug 2024"}, {"id": "39175475", "title_en": "Efficacy and safety evaluation of mixed nutrition for postoperative esophageal cancer patients in China: a meta-analysis", "title_zh": "中国食管癌术后患者混合营养的疗效和安全性评价：荟萃分析", "authors": "Xiaochuan Liu", "abstract_en": "**Objective:** The purpose of this study was to evaluate the clinical effect of mixed nutrition and parenteral nutrition support on postoperative patients with esophageal cancer.\n\n**Method:** By searching PubMed, Web of Science, Cochrane, CNKI, Wanfang and other databases, all the literatures until March 2024 about the comparison of randomized controlled Trial (RCT) of mixed nutrition and parenteral nutrition support in postoperative patients with esophageal cancer were screened. The inclusion criteria were that the patients were from randomized controlled trials or clinical trials in China, and the patients were all diagnosed with esophageal cancer by pathological biopsy. The exclusion criteria were the literature other than the above, including repeated published literature, non-Chinese and English literature, incomplete or missing analysis data, etc. After two researchers independently screened the literature, extracted the data and evaluated the risk of bias according to the criteria, Meta-analysis was carried out with RevMan 5.4 software.\n\n**Results:** A total of 11 studies were included, including 1216 patients. Meta-analysis showed that, compared with parenteral nutrition, mixed nutrition can improve the levels of transferrin, serum albumin, prealbumin and lymphocyte counts in patients with esophageal cancer after surgery, shorten the time of anal recovery of exhaust, defecation and hospital stay after surgery, and reduce the incidence of pulmonary infection, abdominal distension, incision infection and anastomotic fistula, with statistical significance between the two groups (<i>P</i> < 0.05). The heterogeneity of individual results in this study is relatively high, the analysis comes from clinical heterogeneity, and the publication bias is analyzed through Funnel plot. Taking the incidence of lung infection as an example, the results are evenly distributed on both sides of the Funnel plot, and the publication bias has little impact on the results of the study.\n\n**Conclusion:** Compared with parenteral nutrition, mixed nutrition can improve the prognosis of postoperative patients with esophageal cancer and reduce the incidence of related adverse events.", "abstract_zh": "**目的：** 本研究旨在评价混合营养与肠外营养支持对食管癌术后患者的临床效果。\n\n**Method：** 通过检索PubMed、Web of Science、Cochrane、CNKI、万方等数据库，筛选截至2024年3月关于食管癌术后患者混合营养与肠外营养支持随机对照试验（RCT）比较的文献。纳入标准为患者来自中国的随机对照试验或临床试验，且患者均经病理活检确诊为食管癌。排除标准为上述以外的文献，包括重复发表的文献、非中英文文献、分析数据不完整或缺失等。两名研究者根据标准独立筛选文献、提取数据并评估偏倚风险后，采用RevMan 5.4软件进行Meta分析。\n\n**结果：** 总共纳入 11 项研究，包括 1216 名患者。 Meta分析显示，与肠外营养相比，混合营养可提高食管癌术后患者转铁蛋白、血清白蛋白、前白蛋白和淋巴细胞计数水平，缩短术后肛门恢复排气、排便和住院时间，减少肺部感染、腹胀、切口感染和吻合口瘘的发生率，两组比较差异有统计学意义（<i>P</i> < 0.05）。本研究个体结果异质性较高，分析来自临床异质性，通过漏斗图分析发表偏倚。以肺部感染的发生率为例，结果均匀分布在漏斗图两侧，发表偏倚对研究结果影响不大。\n\n**结论：** 与肠外营养相比，混合营养可以改善食管癌术后患者的预后，减少相关不良事件的发生。", "keywords_zh": "疗效与安全性、荟萃分析、混合营养、肠外营养、食管癌术后", "keywords_en": "efficacy and safety, meta-analysis, mixed nutrition, parenteral nutrition, postoperative esophageal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/39175475/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 23 Aug 2024"}, {"id": "39127896", "title_en": "Efficacy and safety of autologous platelet-rich plasma in anal fistula: a systematic review and meta-analysis", "title_zh": "自体富血小板血浆治疗肛瘘的疗效和安全性：系统评价和荟萃分析", "authors": "Chang Ge", "abstract_en": "**Introduction:** This study aimed to determine the efficacy and safety of autologous PRP in anal fistula.\n\n**Methods:** The search was done in electronic databases such as; PubMed, Scopus, Google Scholar, Embase, and Cochrane Library. The outcomes investigated in this study were the rate of improvement, the rate of recurrence, and the rate of fecal incontinence.\n\n**Results:** Cure, incontinence, and recurrence rates were 68% (95% CI, .60-.76), 27% (95% CI, .12-.46), and 18% (95% CI, .12-.26), respectively. The pooled improvement ratio in patients treated with PRP compared to control group was 1.35 times, which was statistically significant (pooled OR=1.35, 95% CI, 1.14-1.60, <i>P</i><001). The pooled recurrence ratio in patients treated with PRP compared to control group was 1.17, which was not statistically significant (pooled OR=1.17, 95% CI, 0.44-3.11).\n\n**Discussion:** Platelet-rich plasma is an effective method of healing people with anal fistula.", "abstract_zh": "**介绍：** 本研究旨在确定自体 PRP 治疗肛瘘的有效性和安全性。\n\n**方法：** 搜索是在电子数据库中完成的，例如： PubMed、Scopus、Google Scholar、Embase 和 Cochrane 图书馆。本研究调查的结果是改善率、复发率和大便失禁率。\n\n**结果：** 治愈率、失禁率和复发率分别为 68% (95% CI, .60-.76)、27% (95% CI, .12-.46) 和 18% (95% CI, .12-.26)。与对照组相比，PRP治疗组患者的汇总改善率为1.35倍，具有统计学意义（汇总OR=1.35，95% CI，1.14-1.60，<i>P</i><001）。与对照组相比，接受 PRP 治疗的患者的汇总复发率为 1.17，无统计学意义（汇总 OR=1.17，95% CI，0.44-3.11）。\n\n**讨论：** 富含血小板的血浆是治疗肛瘘患者的有效方法。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/39127896/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sun, 11 Aug 2024"}, {"id": "39118327", "title_en": "The prevalence of pouch fistulas in ulcerative colitis following restorative proctocolectomy: a systematic review and meta-analysis", "title_zh": "恢复性直肠结肠切除术后溃疡性结肠炎储袋瘘的患病率：系统评价和荟萃分析", "authors": "Jonathan P Segal", "abstract_en": "**Background/Aims:** One complication of restorative proctocolectomy with ileo-anal pouch anastomosis is fistula formation in the pouch. Fistulas can be associated with significant morbidity and pouch failure. We conducted a systematic review with meta- analysis to try and understand the prevalence of pouch fistulas in patients with ulcerative colitis following restorative proctocolectomy.\n\n**Methods:** The Embase, Embase Classic, and PubMed databases were searched between January 1979 and April 2022. Studies were included if there were cross-sectional, case-controlled, population-based or cohort studies reporting on prevalence of pouch fistulas in ulcerative colitis. Studies had to report the number of patients with pouch fistulas using either clinical, endoscopic, or radiological diagnosis in an adult population.\n\n**Results:** Thirty-three studies screened met the inclusion criteria. The pooled prevalence of developing at least 1 fistula was 0.05 (95% confidence interval [CI], 0.04-0.07). The pooled prevalence of pouch failure in patients with pouch fistula was found to be 0.24 (95% CI, 0.19-0.30). The pooled prevalence of developing a pouch fistula at 3 years, 5 years and more than 5 years was 0.04 (95% CI, 0.02-0.07), 0.05 (95% CI, 0.02-0.07), and 0.05 (95% CI, 0.02-0.10), respectively.\n\n**Conclusions:** This is the first systematic review and meta-analysis to report the prevalence of pouch fistula. It also provides a pooled prevalence of pouch failure in these patients. These results can help to shape future guidelines, power future studies, and help counsel patients.", "abstract_zh": "**Background/aims：** 恢复性直肠结肠切除术联合回肠肛管储袋吻合术的并发症之一是储袋内形成瘘管。瘘管可能与显着的发病率和造口袋失败有关。我们进行了一项系统回顾和荟萃分析，试图了解恢复性直肠结肠切除术后溃疡性结肠炎患者储袋瘘的患病率。\n\n**方法：** 检索了 1979 年 1 月至 2022 年 4 月期间的 Embase、Embase Classic 和 PubMed 数据库。如果存在报告溃疡性结肠炎中储袋瘘患病率的横断面、病例对照、基于人群或队列研究，则纳入研究。研究必须报告成年人群中使用临床、内窥镜或放射学诊断的储袋瘘患者的数量。\n\n**结果：** 筛选的 33 项研究符合纳入标准。至少发生 1 个瘘管的汇总患病率为 0.05（95% 置信区间 [CI]，0.04-0.07）。储袋瘘患者储袋失败的汇总患病率为 0.24（95% CI，0.19-0.30）。 3年、5年和5年以上发生储袋瘘的汇总患病率分别为0.04（95% CI，0.02-0.07）、0.05（95% CI，0.02-0.07）和0.05（95% CI，0.02-0.10）。\n\n**结论：** 这是第一个报告储袋瘘患病率的系统评价和荟萃分析。它还提供了这些患者储袋失败的汇总患病率。这些结果可以帮助制定未来的指导方针，为未来的研究提供动力，并帮助为患者提供咨询。", "keywords_zh": "瘘管、储袋、恢复性直肠结肠切除术、溃疡性结肠炎", "keywords_en": "Fistula, Pouch, Restorative proctocolectomy, Ulcerative colitis", "link": "https://pubmed.ncbi.nlm.nih.gov/39118327/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 09 Aug 2024"}, {"id": "38910957", "title_en": "Current Status and Role of Artificial Intelligence in Anorectal Diseases and Pelvic Floor Disorders", "title_zh": "人工智能在肛肠疾病和盆底疾病中的现状和作用", "authors": "Jasneet Bhullar", "abstract_en": "**Background:** Anorectal diseases and pelvic floor disorders are prevalent among the general population. Patients may present with overlapping symptoms, delaying diagnosis, and lowering quality of life. Treating physicians encounter numerous challenges attributed to the complex nature of pelvic anatomy, limitations of diagnostic techniques, and lack of available resources. This article is an overview of the current state of artificial intelligence (AI) in tackling the difficulties of managing benign anorectal disorders and pelvic floor disorders.\n\n**Methods:** A systematic literature review was performed according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. We searched the PubMed database to identify all potentially relevant studies published from January 2000 to August 2023. Search queries were built using the following terms: AI, machine learning, deep learning, benign anorectal disease, pelvic floor disorder, fecal incontinence, obstructive defecation, anal fistula, rectal prolapse, and anorectal manometry. Malignant anorectal articles and abstracts were excluded. Data from selected articles were analyzed.\n\n**Results:** 139 articles were found, 15 of which met our inclusion and exclusion criteria. The most common AI module was convolutional neural network. researchers were able to develop AI modules to optimize imaging studies for pelvis, fistula, and abscess anatomy, facilitated anorectal manometry interpretation, and improved high-definition anoscope use. None of the modules were validated in an external cohort.\n\n**Conclusion:** There is potential for AI to enhance the management of pelvic floor and benign anorectal diseases. Ongoing research necessitates the use of multidisciplinary approaches and collaboration between physicians and AI programmers to tackle pressing challenges.", "abstract_zh": "**背景：** 肛门直肠疾病和盆底疾病在普通人群中普遍存在。患者可能会出现重叠的症状，从而延误诊断并降低生活质量。由于盆腔解剖结构的复杂性、诊断技术的局限性以及可用资源的缺乏，治疗医生面临着许多挑战。本文概述了人工智能 (AI) 在解决良性肛门直肠疾病和盆底疾病管理难题方面的现状。\n\n**方法：** 根据系统评价和荟萃分析指南的首选报告项目进行了系统文献综述。我们搜索了 PubMed 数据库，以确定从 2000 年 1 月到 2023 年 8 月发表的所有潜在相关研究。搜索查询是使用以下术语构建的：人工智能、机器学习、深度学习、良性肛门直肠疾病、盆底疾病、大便失禁、阻塞性排便、肛瘘、直肠脱垂和肛门直肠测压。恶性肛门直肠文章和摘要被排除在外。对选定文章的数据进行了分析。\n\n**结果：** 共找到 139 篇文章，其中 15 篇符合我们的纳入和排除标准。最常见的人工智能模块是卷积神经网络。研究人员能够开发人工智能模块来优化骨盆、瘘管和脓肿解剖的成像研究，促进肛门直肠测压解释，并改进高清肛门镜的使用。所有模块均未在外部队列中得到验证。\n\n**结论：** 人工智能有潜力加强盆底和良性肛门直肠疾病的管理。正在进行的研究需要使用多学科方法以及医生和人工智能程序员之间的合作来应对紧迫的挑战。", "keywords_zh": "肛肠疾病、人工智能、深度学习、盆底疾病", "keywords_en": "Anorectal disease, Artificial intelligence, Deep learning, Pelvic floor disorder", "link": "https://pubmed.ncbi.nlm.nih.gov/38910957/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 24 Jun 2024"}, {"id": "38871152", "title_en": "Perianal Fistulizing Crohn's Disease-Associated Anorectal and Fistula Cancers: Systematic Review and Expert Consensus", "title_zh": "肛周瘘管克罗恩病相关的肛门直肠癌和瘘管癌：系统评价和专家共识", "authors": "Jean-Frederic Colombel", "abstract_en": "**Background & Aims:** Perianal fistulizing Crohn's disease (PFCD)-associated anorectal and fistula cancers are rare but often devastating diagnoses. However, given the low incidence and consequent lack of data and clinical trials in the field, there is little to no guidance on screening and management of these cancers. To inform clinical practice, we developed consensus guidelines on PFCD-associated anorectal and fistula cancers by multidisciplinary experts from the international TOpClass consortium.\n\n**Methods:** We conducted a systematic review by standard methodology, using the Newcastle-Ottawa Scale quality assessment tool. We subsequently developed consensus statements using a Delphi consensus approach.\n\n**Results:** Of 561 articles identified, 110 were eligible, and 76 articles were included. The overall quality of evidence was low. The TOpClass consortium reached consensus on 6 structured statements addressing screening, risk assessment, and management of PFCD-associated anorectal and fistula cancers. Patients with long-standing (>10 years) PFCD should be considered at small but increased risk of developing perianal cancer, including squamous cell carcinoma of the anus and anorectal carcinoma. Risk factors for squamous cell carcinoma of the anus, notably human papilloma virus, should be considered. New, refractory, or progressive perianal symptoms should prompt evaluation for fistula cancer. There was no consensus on timing or frequency of screening in patients with asymptomatic perianal fistula. Multiple modalities may be required for diagnosis, including an examination under anesthesia with biopsy. Multidisciplinary team efforts were deemed central to the management of fistula cancers.\n\n**Conclusions:** Inflammatory bowel disease clinicians should be aware of the risk of PFCD-associated anorectal and fistula cancers in all patients with PFCD. The TOpClass consortium consensus statements outlined herein offer guidance in managing this challenging scenario.", "abstract_zh": "**Background & aims：** 肛周瘘管克罗恩病 (PFCD) 相关的肛门直肠癌和瘘管癌很少见，但诊断结果往往是毁灭性的。然而，由于发病率低以及因此缺乏该领域的数据和临床试验，因此对这些癌症的筛查和管理几乎没有指导。为了指导临床实践，我们由国际 TOpClass 联盟的多学科专家制定了有关 PFCD 相关肛门直肠癌和瘘管癌的共识指南。\n\n**方法：** 我们使用纽卡斯尔-渥太华量表质量评估工具，通过标准方法进行了系统审查。我们随后使用德尔菲共识方法制定了共识声明。\n\n**结果：** 在确定的 561 篇文章中，110 篇符合条件，76 篇文章被纳入。证据的总体质量较低。 TOpClass 联盟就 6 项结构化声明达成共识，涉及 PFCD 相关肛门直肠癌和瘘管癌的筛查、风险评估和管理。患有长期（> 10 年）PFCD 的患者应考虑患肛周癌的风险虽小但增加，包括肛门鳞状细胞癌和肛门直肠癌。应考虑肛门鳞状细胞癌的危险因素，特别是人乳头瘤病毒。新出现的、难治性的或进行性的肛周症状应促使评估瘘管癌。对于无症状肛周瘘患者的筛查时间或频率尚未达成共识。诊断可能需要多种方式，包括麻醉下进行活检。多学科团队的努力被认为是瘘管癌治疗的核心。\n\n**结论：** 炎症性肠病临床医生应了解所有 PFCD 患者患 PFCD 相关肛门直肠癌和瘘管癌的风险。本文概述的 TOpClass 联盟共识声明为管理这一具有挑战性的场景提供了指导。", "keywords_zh": "肛门直肠癌、炎症性肠病、肛周瘘管克罗恩病", "keywords_en": "Anorectal Cancer, Inflammatory Bowel Disease, Perianal Fistulizing Crohn’s Disease", "link": "https://pubmed.ncbi.nlm.nih.gov/38871152/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 13 Jun 2024"}, {"id": "38491943", "title_en": "Does Combined Medical and Surgical Treatment Improve Perianal Fistula Outcomes in Patients With Crohn's Disease? A Systematic Review and Meta-Analysis", "title_zh": "药物和手术联合治疗能否改善克罗恩病患者肛周瘘的治疗效果？系统回顾和荟萃分析", "authors": "Jeffrey D McCurdy", "abstract_en": "**Background:** The optimal treatment of perianal fistulizing Crohn's disease [PFCD] is unknown. We performed a systematic review with meta-analysis to compare combined surgical intervention and anti-tumour necrosis factor [anti-TNF] therapy [combined therapy] vs either therapy alone.\n\n**Methods:** MEDLINE, EMBASE, and Cochrane databases were searched systematically up to end December 2023. Surgical intervention was defined as an exam under anaesthesia ± setons. We calculated weighted risk ratios [RRs] with 95% confidence intervals [CIs] for our co-primary outcomes: fistula response and healing, defined clinically as a reduction in fistula drainage or number of draining fistulas and fistula closure respectively.\n\n**Results:** Thirteen studies were analysed: 515 patients treated with combined therapy, 330 patients with surgical intervention, and 406 patients with anti-TNF therapy with follow-up between 10 weeks and 3 years. Fistula response [RR 1.10; 95% CI 0.93-1.30, p = 0.28] and healing [RR 1.06; 95% CI 0.86-1.31, p = 0.58] was not significantly different when comparing combined therapy with anti-TNF therapy alone. In contrast, combined therapy was associated with significantly higher rates of fistula response [RR 1.25; 95% CI 1.10-1.41, p < 0.001] and healing [RR 1.17; 95% CI 1.00-1.36, p = 0.05] compared with surgical intervention alone. Our results remained stable when limiting to studies that assessed outcomes within 1 year and studies where <10% of patients underwent fistula closure procedures.\n\n**Conclusion:** Combined surgery and anti-TNF therapy was not associated with improved PFCD outcomes compared with anti-TNF therapy alone. Due to an inability to control for confounding and small study sizes, future, controlled trials are warranted to confirm these findings.", "abstract_zh": "**背景：** 肛周瘘管克罗恩病 [PFCD] 的最佳治疗方法尚不清楚。我们通过荟萃分析进行了系统回顾，以比较联合手术干预和抗肿瘤坏死因子 [抗 TNF] 疗法 [联合疗法] 与单独疗法的比较。\n\n**方法：** 截至 2023 年 12 月，系统检索了 MEDLINE、EMBASE 和 Cochrane 数据库。手术干预被定义为麻醉下的检查。我们计算了具有 95% 置信区间 [CI] 的加权风险比 [RR]，用于我们的共同主要结果：瘘管反应和愈合，临床上分别定义为瘘管引流或引流瘘管数量减少以及瘘管闭合。\n\n**结果：** 分析了 13 项研究：515 名患者接受联合治疗，330 名患者接受手术干预，406 名患者接受抗 TNF 治疗，随访时间为 10 周至 3 年。瘘反应[RR 1.10； 95% CI 0.93-1.30，p = 0.28] 和治愈 [RR 1.06；联合治疗与单独抗 TNF 治疗比较时，95% CI 0.86-1.31，p = 0.58] 没有显着差异。相反，联合治疗与显着较高的瘘管反应率相关[RR 1.25；RR 1.25；RR 1.25]。 95% CI 1.10-1.41，p < 0.001] 和愈合 [RR 1.17；RR 1.17；与单独手术干预相比，95% CI 1.00-1.36，p = 0.05]。当仅限于评估 1 年内结果的研究以及 <10% 的患者接受瘘管闭合手术的研究时，我们的结果保持稳定。\n\n**结论：** 与单独的抗 TNF 治疗相比，联合手术和抗 TNF 治疗与改善 PFCD 结局无关。由于无法控制混杂因素和小研究规模，未来有必要进行对照试验来证实这些发现。", "keywords_zh": "肛周瘘，抗TNF，药物和手术相结合", "keywords_en": "Perianal fistula, anti-TNF, combined medical and surgical", "link": "https://pubmed.ncbi.nlm.nih.gov/38491943/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=
