s disease patients than classical techniques, which have better results in cryptoglandular fistula than in Crohn's disease. Healing rates for complex cryptoglandular fistulas were similar between the classic and new techniques, being the new techniques less invasive; the incontinence rate improved with the current techniques.", "abstract_zh": "**背景：** 治疗克罗恩病患者的复杂肛周瘘仍然是一个挑战。克罗恩病瘘管的经典手术治疗是从隐腺瘘管治疗中推断出来的，其病因不同，这可能会干扰其有效性，此外，还会增加大便失禁的风险。最近，在生物方法（如干细胞）支持下的新手术技术已被开发出来，以保留括约肌的功能。我们进行了系统的文献综述，以比较这些不同技术治疗克罗恩病或隐窝瘘的结果。\n\n**方法：** 系统地检索了 PubMed、EMBASE、有效性评价摘要数据库、Cochrane 对照试验中心注册库中的相关文章。我们纳入了涉及人类的随机对照试验和观察性研究，以英文撰写，包括 18 岁以上的成年人，并在 2010 年 2 月 1 日至 2020 年 2 月 29 日的 10 年间发表。证据级别由苏格兰校际指南网络指定。\n\n**结果：** 在筛选的 577 条引用中，最终共有 79 条被纳入我们的审查中。在克罗恩病患者中，经典技术，如主要挂线、括约肌间瘘管结扎或切开，愈合率约为 50-60%，而隐窝瘘的愈合率约为 70-80%，采用挂线或皮瓣治疗。在克罗恩病患者中，使用脂肪组织衍生物的新手术技术报告治愈率超过 70%，与对照组相比，干细胞治疗的患者实现了更高的综合缓解率（56.3% vs 38.6%，p = 0.010），间充质细胞报告第 12 周时的治愈率为 80%。在隐腺瘘患者中，使用脂肪组织或血小板衍生物的治愈率为 70%并利用激光技术实现了80%的治愈率。使用自体血小板生长因子和镍钛诺夹后，大便失禁得到改善。\n\n**结论：** 新的手术技术在克罗恩病患者中显示出比传统技术更好的治愈率，而传统技术在隐窝腺瘘方面的效果优于克罗恩病。复杂的隐腺瘘的愈合率在经典技术和新技术之间相似，因为新技术侵入性较小；使用当前技术，失禁率有所改善。", "keywords_zh": "复杂肛周瘘、克罗恩病、隐腺瘘、手术", "keywords_en": "Complex perianal fistula, Crohn’s disease, Cryptoglandular fistula, Surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/36740680/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sun, 05 Feb 2023"}, {"id": "36735766", "title_en": "Gracilis Muscle Interposition for the Treatment of Rectovaginal Fistula: A Systematic Review and Pooled Analysis", "title_zh": "股薄肌介入治疗直肠阴道瘘：系统评价和汇总分析", "authors": "Tracy L Hull", "abstract_en": "**Background:** A rectovaginal fistula is a debilitating condition that often severely impacts quality of life. Despite many treatment options available, the best surgical treatment is far from being established, and many patients will undergo several procedures before fistula closure is achieved. Gracilis muscle interposition, which is the transposition of the gracilis muscle into the rectovaginal septum, is an option for complex and persistent fistulas, but literature on the subject is scarce, mainly consisting of small case series.\n\n**Objective:** This study aimed to assess the success rate of gracilis muscle interposition for the surgical treatment of rectovaginal fistula.\n\n**Data Sources:** MEDLINE, Embase, Cochrane Library, and Web of Science.\n\n**Study Selection:** Studies comprising at least 5 patients who underwent gracilis muscle interposition for rectovaginal fistula were included. No date or language restrictions was applied.\n\n**Intervention:** Gracilis muscle interposition.\n\n**Main Outcome Measures:** The primary outcome is the fistula closure rate (%). Other domains analyzed are stoma closure rate, postoperative complications, quality of life, fecal continence, and sexual function.\n\n**Results:** Twenty studies were included for a total of 384 patients. The pooled fistula closure rate for gracilis muscle interposition was 64% (95% CI, 53%-74%; range, 33%-100%). Risk factors for failure were smoking, underlying Crohn's disease, and more than 2 previous repairs, whereas stoma formation was associated with improved outcomes. Postoperative complications ranged from 0% to 37%, mostly related to surgical site occurrences at the harvest site and perineal area. No deaths occurred. Gracilis muscle interposition improved quality of life and fecal continence, but impairment of sexual function was common.\n\n**Limitations:** Most of the included studies were small case series.\n\n**Conclusions:** Gracilis muscle interposition is a safe and moderately effective treatment that could be taken into consideration as second- or third-line therapy for recurrent rectovaginal fistula.\n\n**Registration No:** CRD42022319621.", "abstract_zh": "**背景：** 直肠阴道瘘是一种使人衰弱的疾病，常常严重影响生活质量。尽管有许多治疗选择，但最佳的手术治疗还远未确定，许多患者在实现瘘管闭合之前将接受多次手术。股薄肌介入术，即将股薄肌转位至直肠阴道隔膜，是复杂且持续性瘘管的一种选择，但有关该主题的文献很少，主要由小病例系列组成。\n\n**目的：** 本研究旨在评估股薄肌介入手术治疗直肠阴道瘘的成功率。\n\n**Data sources：** MEDLINE、Embase、Cochrane 图书馆和 Web of Science。\n\n**Study selection：** 研究纳入了至少 5 名接受股薄肌介入治疗直肠阴道瘘的患者。没有日期或语言限制。\n\n**Intervention：** 股薄肌介入。\n\n**Main outcome measures：** 主要结果是瘘管闭合率（%）。其他分析领域包括造口闭合率、术后并发症、生活质量、大便失禁和性功能。\n\n**结果：** 共纳入 20 项研究，涉及 384 名患者。股薄肌介入的合并瘘管闭合率为 64%（95% CI，53%-74%；范围，33%-100%）。失败的危险因素包括吸烟、潜在的克罗恩病以及两次以上的修复手术，而造口形成与预后改善相关。术后并发症的发生率从 0% 到 37% 不等，主要与采集部位和会阴区域的手术部位发生有关。没有发生死亡事件。股薄肌介入改善了生活质量和大便失禁，但性功能受损很常见。\n\n**Limitations：** 大多数纳入的研究都是小病例系列。\n\n**结论：** 股薄肌介入治疗是一种安全且中等有效的治疗方法，可考虑作为复发性直肠阴道瘘的二线或三线治疗。\n\n**Registration no：** CRD42022319621。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/36735766/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 03 Feb 2023"}, {"id": "36658773", "title_en": "Autologous fat graft injections for the treatment of perianal fistulas in Crohn's disease: a systematic review and single-arm meta-analysis", "title_zh": "自体脂肪移植注射治疗克罗恩病肛周瘘：系统评价和单臂荟萃分析", "authors": "SVHM IBD Collaborative Group", "abstract_en": "**Background:** Crohn's perianal fistulas are often refractory to standard management. Fat graft injections are hypothesised to improve fistula healing rates. We evaluated the treatment efficacy of fat graft injections for Crohn's perianal fistulas in a systematic review (PRISMA).\n\n**Methods:** We completed database searches of MEDLINE (Ovid), Embase, and PubMed. All studies published in English in full text or abstract, from January 2001 to August 2021, evaluating fat graft injections for Crohn's perianal fistulas were selected. Included randomized controlled trials, single-arm intervention trials, cohort studies, and case series; excluded single case reports. Primary outcome was pooled clinical healing, defined as non-draining treated fistulas, or closure, defined as closure of treated fistulas. Secondary outcomes were clinical healing, clinical closure, radiologic response, and adverse events.\n\n**Results:** Of 1258 publications identified, 891 articles were assessed for eligibility, and 107 relevant for manuscript review. Forty-nine patients received fat graft injections for Crohn's perianal fistulas across four single-arm intervention trials. Clinical healing or closure was achieved in 74% in a pooled single-arm meta-analysis (95% confidence interval: 57%, 85%), with moderate heterogeneity between studies. Clinical healing was achieved in 20% and 60% at 3 and 12 months, respectively. Clinical closure was achieved in 83% at 6 months. Variable parameters were used to define radiologic response, with success rates from 20% to 67%. Minimal adverse events were reported.\n\n**Conclusion:** Fat graft injections show promise as a novel treatment for Crohn's perianal fistulas in this systematic review and meta-analysis. Assessment in controlled matched studies is warranted.", "abstract_zh": "**背景：** 克罗恩病肛周瘘通常难以通过标准治疗治疗。假设脂肪移植注射可以提高瘘管愈合率。我们在系统评价（PRISMA）中评估了脂肪移植注射治疗克罗恩病肛周瘘的治疗效果。\n\n**方法：** 我们完成了 MEDLINE (Ovid)、Embase 和 PubMed 的数据库检索。选择2001年1月至2021年8月以英文全文或摘要发表的所有评估脂肪移植注射治疗克罗恩病肛周瘘的研究。包括随机对照试验、单臂干预试验、队列研究和病例系列；排除单例报告。主要结果是汇总临床愈合（定义为未引流治疗的瘘管）或闭合（定义为经治疗的瘘管闭合）。次要结局是临床治愈、临床结束、放射学反应和不良事件。\n\n**结果：** 在确定的 1258 篇出版物中，有 891 篇文章进行了资格评估，107 篇文章进行了手稿审查。在四项单臂干预试验中，49 名患者接受了脂肪移植注射治疗克罗恩病肛周瘘。在一项汇总的单臂荟萃分析中，74% 的患者实现了临床治愈或闭合（95% 置信区间：57%、85%），研究之间存在中等异质性。 3 个月和 12 个月时，临床治愈率分别为 20% 和 60%。 83% 的患者在 6 个月内实现了临床封闭。使用可变参数来定义放射学反应，成功率从 20% 到 67%。报告的不良事件极少。\n\n**结论：** 在本次系统评价和荟萃分析中，脂肪移植注射显示出作为克罗恩病肛周瘘的新型治疗方法的前景。对照匹配研究中的评估是有必要的。", "keywords_zh": "克罗恩病，脂肪移植，荟萃分析，肛周瘘，系统评价", "keywords_en": "Crohn's disease, fat graft, metaanalysis, perianal fistula, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/36658773/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 20 Jan 2023"}, {"id": "36474515", "title_en": "Postoperative complications of colectomy and J-pouch with ileostomy versus without ileostomy in children with inflammatory bowel diseases: a systematic review and meta-analysis", "title_zh": "炎症性肠病儿童结肠切除术和 J 型袋回肠造口与不回肠造口的术后并发症：系统评价和荟萃分析", "authors": "Ahmed Nasr", "abstract_en": "**Background:** The efficacy of performing a restorative proctocolectomy and J-pouch ileoanal anastomosis without diverting ileostomy in children with inflammatory bowel disease has been a longstanding debate. A systematic review and meta-analysis is presented comparing the occurrence of postoperative complications in children who underwent either the pouch-anal anastomosis (IPAA) with ileostomy (diverted) versus the undiverted procedure.\n\n**Methods:** Records were sourced from CINAHL, CENTRAL, EMBASE and MEDLINE databases. Studies followed the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines and compared postoperative complications in pediatric patients diagnosed with inflammatory diseases aged less than 18 years who underwent J-pouch with ileostomy versus without ileostomy. The primary outcome was the occurrence of postoperative leaks, and the secondary outcomes were presence of postoperative small bowel obstruction (SBO), pouchitis, stricture and fistula complications. A random-effects meta-analysis was used.\n\n**Results:** Twenty-three observational studies in the systematic review were included with 658 patients (83% diverted, 17% undiverted). Pooled estimates showed no difference in occurrence of leaks in children who underwent J-pouch/IPAA with ileostomy versus without (odds ratio (OR) 0.54, 95% confidence interval (CI) 0.17 to 1.64, I<sup>2</sup>=16%). There was no difference in the occurrence of SBO, pouchitis or strictures in children who underwent J-pouch/IPAA with ileostomy versus without (SBO: OR 2.27, 95% CI 0.52 to 9.92, I<sup>2</sup>=0%, pouchitis: OR 1.76, 95% CI 0.95 to 3.24, I<sup>2</sup>=0%, strictures: OR 2.72, 95% CI 0.44 to 16.69, I<sup>2</sup>=66%).\n\n**Conclusion:** The meta-analysis did not find differences in the occurrence of complications in pediatric patients who underwent the IPAA with ileostomy procedure versus without ileostomy.", "abstract_zh": "**背景：** 对于患有炎症性肠病的儿童，在不改道回肠造口的情况下进行恢复性直肠结肠切除术和 J 型袋回肠肛门吻合术的疗效一直存在争议。系统回顾和荟萃分析比较了接受回肠造口术（转行）的储袋肛门吻合术（IPAA）与未转行手术的儿童术后并发症的发生率。\n\n**方法：** 记录来源于 CINAHL、CENTRAL、EMBASE 和 MEDLINE 数据库。研究遵循系统评价和荟萃分析指南的首选报告项目，并比较了 18 岁以下被诊断患有炎症性疾病的儿科患者接受回肠造口术与未接受回肠造口术的 J 型袋的术后并发症。主要结局是术后漏的发生，次要结局是术后小肠梗阻（SBO）、储袋炎、狭窄和瘘管并发症的存在。使用随机效应荟萃分析。\n\n**结果：** 系统评价中纳入了 23 项观察性研究，涉及 658 名患者（83% 转移，17% 未转移）。汇总估计显示，接受 J-pouch/IPAA 并进行回肠造口术的儿童与未进行回肠造口术的儿童在漏气发生率上没有差异（比值比 (OR) 0.54，95% 置信区间 (CI) 0.17 至 1.64，I<sup>2</sup>=16%）。接受 J-储袋/IPAA 回肠造口术的儿童与未接受回肠造口术的儿童相比，SBO、储袋炎或狭窄的发生率没有差异（SBO：OR 2.27，95% CI 0.52 至 9.92，I<sup>2</sup>=0%，储袋炎：OR 1.76，95% CI 0.95 至 3.24， I<sup>2</sup>=0%，狭窄：OR 2.72，95% CI 0.44 至 16.69，I<sup>2</sup>=66%）。\n\n**结论：** 荟萃分析未发现接受 IPAA 并进行回肠造口术的儿科患者与未进行回肠造口术的儿科患者的并发症发生率存在差异。", "keywords_zh": "青少年健康、教育、循证医学、医学、统计", "keywords_en": "adolescent health, education, evidence-based medicine, medical, statistics", "link": "https://pubmed.ncbi.nlm.nih.gov/36474515/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 07 Dec 2022"}, {"id": "36413086", "title_en": "Gracilis muscle interposition for complex perineal fistulas: A systematic review and meta-analysis of the literature", "title_zh": "股薄肌介入治疗复杂会阴瘘：文献的系统回顾和荟萃分析", "authors": "Steven D Wexner", "abstract_en": "**Aim:** Complex perineal fistulas (CPFs) are among the most challenging problems in colorectal practice. Various procedures have been used to treat CPFs, with none being a panacea. Our study aimed to assess the overall success and complication rates after gracilis muscle interposition in patients with CPF.\n\n**Method:** PubMed, Scopus and Google Scholar databases were systematically searched until January 2022 according to PRISMA 2020 guidelines. Studies including children <18 years or <10 patients were excluded, as well as reviews, duplicate or animal studies, studies with poor documentation (no report of success rate) and non-English text. An open-source, cross-platform software for advanced meta-analysis openMeta [Analyst]™ version 12.11.14 and Cochrane Review Manager 5.4® were used to conduct the meta-analysis of data.\n\n**Results:** Twenty-five studies published between 2002 and 2021 were identified. The studies included 658 patients (409 women). Most patients had rectovaginal (50.7%) or rectourethral fistulas (33.7%). The most common causes of CPF were pelvic surgery (29.4%) and inflammatory bowel disease (25.2%). A history of radiotherapy was reported in approximately 18% of the patients. 498 (75.7%) patients with CPF achieved complete healing after gracilis muscle interposition. The weighted mean rate of success of the gracilis interposition procedure was 79.4% (95% CI 73.8%-85%, I<sup>2</sup>  = 75.3%), the weighted mean short-term complication rate was 25.7% (95% CI 18.1-33.2, I<sup>2</sup>  = 84.1%) and the weighted mean rate for 30-day reoperation was 3.6% (95% CI 1.6-5.6, I<sup>2</sup>  = 42%). The weighted mean rate of fistula recurrence was 16.7% (95% CI 11%-22.3%, I<sup>2</sup>  = 61%).\n\n**Conclusion:** The gracilis muscle interposition technique is a viable treatment option for CPF. Surgeons should be familiar with indications and techniques to offer it as an option for patients. Given the relatively infrequent use of the operation, referral rather than performance of graciloplasty is an acceptable option.", "abstract_zh": "**Aim：** 复杂的会阴瘘（CPF）是结直肠实践中最具挑战性的问题之一。人们已经使用了多种方法来治疗 CPF，但没有一种方法是万能的。我们的研究旨在评估 CPF 患者股薄肌介入治疗后的总体成功率和并发症发生率。\n\n**Method：** 根据 PRISMA 2020 指南，对 PubMed、Scopus 和 Google Scholar 数据库进行了系统检索，直至 2022 年 1 月。排除了包括 <18 岁儿童或 <10 名患者的研究，以及综述、重复研究或动物研究、记录较差的研究（没有成功率报告）和非英文文本。用于高级荟萃分析的开源跨平台软件 openMeta [Analyst]™ 12.11.14 版和 Cochrane Review Manager 5.4® 用于进行数据荟萃分析。\n\n**结果：** 确定了 2002 年至 2021 年间发表的 25 项研究。该研究包括 658 名患者（409 名女性）。大多数患者有直肠阴道瘘（50.7%）或直肠尿道瘘（33.7%）。 CPF 最常见的原因是盆腔手术（29.4%）和炎症性肠病（25.2%）。大约 18% 的患者报告有放射治疗史。 498 名（75.7%）CPF 患者在股薄肌介入治疗后实现完全愈合。股薄肌介入手术的加权平均成功率为 79.4%（95% CI 73.8%-85%，I<sup>2</sup> = 75.3%），加权平均短期并发症率为 25.7%（95% CI 18.1-33.2，I<sup>2</sup> = 84.1%），30 天再手术的加权平均率为 3.6%（95% CI 1.6-5.6，I<sup>2</sup> = 42%）。瘘管复发的加权平均率为 16.7%（95% CI 11%-22.3%，I<sup>2</sup> = 61%）。\n\n**结论：** 股薄肌介入技术是 CPF 的可行治疗选择。外科医生应该熟悉适应症和技术，为患者提供它作为一种选择。鉴于该手术的使用相对较少，转诊而不是进行股薄成形术是可以接受的选择。", "keywords_zh": "肛门、复杂会阴、瘘管、股薄肌、股薄肌介入、股薄成形术、直肠尿道、直肠阴道", "keywords_en": "anal, complex perineal, fistula, gracilis, gracilis muscle interposition, graciloplasty, rectourethral, rectovaginal", "link": "https://pubmed.ncbi.nlm.nih.gov/36413086/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 22 Nov 2022"}, {"id": "36294834", "title_en": "Negative Pressure Wound Therapy for the Treatment of Fournier's Gangrene: A Rare Case with Rectal Fistula and Systematic Review of the Literature", "title_zh": "负压创面疗法治疗福尼尔坏疽：一例罕见的直肠瘘病例及文献系统回顾", "authors": "Stefania Cimbanassi", "abstract_en": "Fournier's gangrene (FG) is a Necrotizing Soft Tissue Infection (NSTI) of the perineal region characterized by high morbidity and mortality even if appropriately treated. The main treatment strategies are surgical debridement, broad-spectrum antibiotics, hyperbaric oxygen therapy, NPWT (Negative Pressure Wound Therapy), and plastic surgery reconstruction. We present the case of a 50-year-old woman with an NSTI of the abdomen, pelvis, and perineal region associated with a rectal fistula referred to our department. After surgical debridement and a diverting blow-out colostomy, an NPWT system composed of two sponges connected by a bridge through a rectal fistula was performed. Our target was to obtain healing in a lateral-to-medial direction instead of depth-to-surface to prevent the enlargement of the rectal fistula, promoting granulation tissue growth towards the rectum. This eso-endo-NPWT technique allowed for the primary suture of the perineal wounds bilaterally, simultaneously treating the rectal fistula and the perineum lesions. A systematic review of the literature underlines the spreading of NPWT and its effects.", "abstract_zh": "福尼尔坏疽 (FG) 是一种会阴区域坏死性软组织感染 (NSTI)，即使治疗得当，其发病率和死亡率也很高。主要治疗策略是手术清创、广谱抗生素、高压氧治疗、NPWT（负压伤口治疗）和整形外科重建。我们介绍了一名 50 岁女性的病例，她患有腹部、骨盆和会阴区域的 NSTI，并伴有直肠瘘，转至我们科室。经过手术清创和转向吹出结肠造口术后，进行了 NPWT 系统，该系统由两个海绵组成，通过直肠瘘通过桥连接。我们的目标是在横向到内侧方向而不是从深度到表面获得愈合，以防止直肠瘘扩大，促进肉芽组织向直肠生长。这种eso-endo-NPWT技术可以对双侧会阴伤口进行一期缝合，同时治疗直肠瘘和会阴病变。对文献的系统回顾强调了 NPWT 的传播及其影响。", "keywords_zh": "福尼尔坏疽，负压伤口治疗（NPWT），病例报告，高压氧治疗，直肠瘘，手术技术", "keywords_en": "Fournier’s gangrene, Negative Pressure Wound Therapy (NPWT), case report, hyperbaric oxygen therapy, rectal fistula, surgical technique", "link": "https://pubmed.ncbi.nlm.nih.gov/36294834/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 27 Oct 2022"}, {"id": "36271904", "title_en": "Placebo Response Rates in Randomized Controlled Trials for Perianal Crohn's Disease: A Systematic Review and Meta-Analysis", "title_zh": "肛周克罗恩病随机对照试验中的安慰剂反应率：系统评价和荟萃分析", "authors": "Vipul Jairath", "abstract_en": "**Background And Aims:** Perianal fistulizing disease is a common complication of Crohn's disease [CD], for which new therapies are urgently needed. To assist the design of clinical trials for novel therapeutics, we conducted a systematic review and meta-analysis of randomised controlled trials [RCTs] to quantify placebo rates and identify factors influencing them in perianal CD [pCD].\n\n**Methods:** We searched MEDLINE, Embase and CENTRAL from inception to June 2021. Eligible studies were placebo-controlled trials of pharmacological interventions for pCD. Placebo fistula response and remission rates for induction and maintenance trials were extracted and pooled using a random-effects model. Mixed-effects meta-regression was used to evaluate the impact of patient and study-level characteristics on point estimates.\n\n**Results:** In 17 RCTs [13 induction, five maintenance] the pooled placebo fistula response and remission rate for induction trials was 25% (95% confidence interval [CI] 17-36%) and 17% [95% CI 11-25%], respectively. For maintenance trials, the pooled placebo fistula response and remission rate was 23% [95% CI 17-32%] and 19% [95% CI 14-25%], respectively. Trials enrolling patients with less disease activity and a higher proportion with ileal predominant disease were associated with significantly higher placebo response rates. Trials originating in Europe [compared to North America], therapies requiring perianal injection and a longer timepoint to measure remission were associated with higher placebo remission rates.\n\n**Conclusions:** Placebo response and remission rates in pCD trials are influenced by patient and disease-related factors, as well as the type of intervention being studied. These contemporary rates will inform trial design for novel therapeutics.", "abstract_zh": "**Background and aims：** 肛周瘘管病是克罗恩病[CD]的常见并发症，迫切需要新的治疗方法。为了协助设计新疗法的临床试验，我们对随机对照试验 [RCT] 进行了系统回顾和荟萃分析，以量化肛周 CD [pCD] 中的安慰剂率并确定影响安慰剂率的因素。\n\n**方法：** 我们检索了从开始到 2021 年 6 月的 MEDLINE、Embase 和 CENTRAL。符合条件的研究是 pCD 药物干预的安慰剂对照试验。使用随机效应模型提取并汇总诱导和维持试验的安慰剂瘘管反应和缓解率。混合效应元回归用于评估患者和研究水平特征对点估计的影响。\n\n**结果：** 在 17 项随机对照试验（13 项诱导，5 项维持）中，诱导试验的汇总安慰剂瘘反应和缓解率分别为 25%（95% 置信区间 [CI] 17-36%）和 17% [95% CI 11-25%]。对于维持试验，合并安慰剂瘘管反应和缓解率分别为 23% [95% CI 17-32%] 和 19% [95% CI 14-25%]。招募疾病活动性较低且回肠主要疾病比例较高的患者的试验与显着较高的安慰剂反应率相关。源自欧洲的试验[与北美相比]，需要肛周注射和较长时间点来测量缓解的治疗与较高的安慰剂缓解率相关。\n\n**结论：** pCD 试验中的安慰剂反应和缓解率受到患者和疾病相关因素以及正在研究的干预类型的影响。这些当代的比率将为新疗法的试验设计提供信息。", "keywords_zh": "肛周克罗恩病，临床试验，安慰剂", "keywords_en": "Peri-anal Crohn’s disease, clinical trials, placebo", "link": "https://pubmed.ncbi.nlm.nih.gov/36271904/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 22 Oct 2022"}, {"id": "36267197", "title_en": "Rare complications of pessary use: A systematic review of case reports", "title_zh": "使用子宫托的罕见并发症：病例报告的系统回顾", "authors": "Bilal Chughtai", "abstract_en": "**Introduction:** Pessaries are desirable for its overall safety profiles. Serious complications have been reported; however, there is little summative evidence. This systematic review aimed to consolidate all reported serious outcomes from pessaries usage to better identify and counsel patients who might be at higher risk of developing these adverse events.\n\n**Methods:** We performed a systematic literature review using search terms such as 'prolapse', 'stress urinary incontinence' and 'pessary or pessaries or pessarium' on PubMed, Embase and CINAHL. A total of 36 articles were identified. Patient-level data were extracted from case reports to further describe complications on an individual level.\n\n**Results:** Overall median age of the patients was 82 years (range 62-98). The most frequent complications were vesicovaginal fistula (25%, <i>n</i> = 9/36), rectovaginal fistula (19%, <i>n</i> = 7/36), vaginal impaction (11%, <i>n</i> = 4/36) and vaginal evisceration of small bowel through vaginal vault (8%, <i>n</i> = 3/36). In the vesicovaginal fistula cohort, none of the patients had a history of radiation, and two had histories of total abdominal hysterectomy (22%). In the rectovaginal fistula cohort, one patient had a history of pelvic radiation for rectal squamous cell carcinoma, and another had a history of chronic steroid use for rheumatoid arthritis. No other risk factors were reported in the other groups. Ring and Gellhorn were the most represented pessary types among the studies, 16 (44%) and 12 (33%), respectively. No complications were reported with surgical and non-surgical treatment of the complications.\n\n**Conclusion:** Pessaries are a reasonable and durable treatment for POP with exceedingly rare reports of severe adverse complications. The ideal candidate for pessary should have a good self-care index. Studies to determine causative factors of the more serious adverse events are needed; however, this may be difficult given the long follow-up that is required.", "abstract_zh": "**介绍：** 子宫托因其整体安全性而备受青睐。据报道存在严重并发症；然而，几乎没有总结性证据。这项系统评价旨在整合所有报告的子宫托使用造成的严重后果，以更好地识别和建议可能面临更高风险发生这些不良事件的患者。\n\n**方法：** 我们使用“脱垂”、“压力性尿失禁”和“子宫托或子宫托或子宫托”等搜索术语在 PubMed、Embase 和 CINAHL 上进行了系统的文献综述。共鉴定出36篇文章。从病例报告中提取患者层面的数据，以进一步描述个体层面的并发症。\n\n**结果：** 患者的总体中位年龄为 82 岁（范围 62-98 岁）。最常见的并发症是膀胱阴道瘘（25%，<i>n</i> = 9/36）、直肠阴道瘘（19%，<i>n</i> = 7/36）、阴道嵌塞（11%，<i>n</i> = 4/36）和通过阴道穹窿阴道取出小肠内脏（8%， <i>n</i> = 3/36)。在膀胱阴道瘘队列中，没有患者有放射史，两名患者有全腹部子宫切除史（22%）。在直肠阴道瘘队列中，一名患者有因直肠鳞状细胞癌接受盆腔放射治疗的病史，另一名患者有因类风湿性关节炎而长期使用类固醇的病史。其他组中没有报告其他危险因素。 Ring 和 Gellhorn 是研究中最具代表性的子宫托类型，分别为 16 个 (44%) 和 12 个 (33%)。手术和非手术治疗并发症均未报告并发症。\n\n**结论：** 子宫托是 POP 的合理且持久的治疗方法，严重不良并发症的报告极为罕见。理想的子宫托候选人应该具有良好的自我护理指数。需要进行研究以确定更严重不良事件的致病因素；然而，鉴于需要长期的后续行动，这可能很困难。", "keywords_zh": "不良反应、瘘管、失禁、子宫托、脱垂、罕见并发症", "keywords_en": "adverse effects, fistula, incontinence, pessary, prolapse, rare complications", "link": "https://pubmed.ncbi.nlm.nih.gov/36267197/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 21 Oct 2022"}, {"id": "36176822", "title_en": "A Comparison of Different Surgical Treatments for Complex Anal Fistula: A Systematic Review", "title_zh": "复杂肛瘘不同手术治疗的比较：系统评价", "authors": "Pousette Hamid", "abstract_en": "Fistula-in-ano is a common proctological condition that primarily affects younger people and leads to chronic morbidity. An anal fistula is divided into simple and complex fistulas. A complex fistula is a challenging problem due to higher recurrence rates and incontinence associated with surgery. Many new methods have been developed for the closure of complex fistula-in-ano, but there is no single best method. The aim of this study is to identify a superior surgical technique for treating complex/high cryptoglandular perianal fistulas (HCPFs). A literature search was done using PubMed and Google Scholar for the period of 2012-2021. Articles that contain surgical treatment for complex anal fistula in the English language published in the last 10 years were included. The types of studies included were randomized controlled trials (RCTs), meta-analyses, systematic reviews, cohort studies, and traditional reviews. Articles excluded were those done more than 10 years ago, in other languages, and containing simple fistula management only. Nine studies were included in the review; a systematic review and meta-analysis concluded that no single method is effective. The ligation of the intersphincteric fistula tract (LIFT) procedure seems to be a promising and effective technique as it has a low rate of fecal incontinence as compared to other methods. Biological techniques give variable success rates so does fistula plug (FP). Mucosal advancement flap (MAF) and rerouting seton give good results according to one study. Fistula plug gives variable results and is not a preferred method. Ligation of the intersphincteric fistula tract (LIFT) seems to be a promising new technique for complex anal fistulas, but the data available is not enough to determine the best method. More randomized trials are required to compare traditional techniques and emerging new biological methods to see the best technique available.", "abstract_zh": "肛瘘是一种常见的直肠疾病，主要影响年轻人并导致慢性发病。肛瘘分为单纯性肛瘘和复杂性肛瘘。由于较高的复发率和与手术相关的失禁，复杂的瘘管是一个具有挑战性的问题。人们已经开发出许多新方法来闭合复杂的肛瘘，但没有单一的最佳方法。本研究的目的是确定一种治疗复杂/高位隐窝肛瘘（HCPF）的优越手术技术。使用 PubMed 和 Google Scholar 进行了 2012-2021 年期间的文献检索。包含过去 10 年发表的英文版复杂肛瘘手术治疗的文章。纳入的研究类型包括随机对照试验 (RCT)、荟萃分析、系统评价、队列研究和传统评价。排除的文章是 10 多年前以其他语言发表的文章，并且仅包含简单的瘘管治疗。审查中纳入了九项研究；系统评价和荟萃分析得出的结论是，没有任何单一方法是有效的。括约肌间瘘管结扎术（LIFT）似乎是一种有前途且有效的技术，因为与其他方法相比，它的大便失禁率较低。生物技术的成功率各不相同，瘘管塞 (FP) 也是如此。一项研究表明，粘膜推进瓣 (MAF) 和改道挂线可取得良好效果。瘘管塞会产生不同的结果，不是首选方法。括约肌间瘘管结扎术（LIFT）似乎是治疗复杂肛瘘的一种有前景的新技术，但现有数据不足以确定最佳方法。需要更多的随机试验来比较传统技术和新兴的生物方法，以确定可用的最佳技术。", "keywords_zh": "引流挂线、直肠内推进皮瓣、大便失禁、高位隐腺肛周瘘、直肠瘘", "keywords_en": "draining seton, endorectal advancement flap, fecal incontinence, high cryptoglandular perianal fistula, rectal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/36176822/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 30 Sep 2022"}, {"id": "36130090", "title_en": "Perianal Crohn's Disease and the Development of Colorectal and Anal Cancer: A Systematic Review and Meta-analysis", "title_zh": "肛周克罗恩病与结直肠癌和肛门癌的发展：系统评价和荟萃分析", "authors": "Johan Burisch", "abstract_en": "**Background And Aims:** The aim of this systematic review was to assess the literature on the incidence and risk factors for colorectal cancer and anal cancer in patients with perianal Crohn's disease.\n\n**Method:** A systematic review of the literature was performed using PubMed, Embase and Google Scholar. A meta-analysis was then conducted using a random-effects model.\n\n**Results:** Five studies were included in the systematic review. Of the total patients, 26.5% had perianal Crohn's disease. The median follow-up was 6 years. In total, 127 cases of colorectal cancer were found [0.43% of the included Crohn's disease patients]. Perianal involvement was present in 50% of colorectal cancer patients [0.89% of the population]. Three of the studies specified the cancer to be rectal or anal, which were present in 68 and 24 cases [0.3% and 0.1% of patients], respectively. In a subgroup analysis of rectal and anal cancer, perianal involvement was most frequent in anal cancer, accounting for 46% of the cases. In the rectal cancer group, 37% had perianal involvement. The higher incidence of colorectal cancer in patients with perianal Crohn's disease was confirmed in a meta-analysis.\n\n**Conclusion:** Half of the patients with colorectal cancer and anal cancer were found to have perianal Crohn's disease. In patients with perianal involvement, there was a higher percentage of anal cancer compared with rectal cancer. These results support the theory that patients with perianal Crohn's disease are at increased risk for developing colorectal and anal cancer. Studies collecting more detailed data regarding patients and their cancers are needed to further specify the disease course.", "abstract_zh": "**Background and aims：** 本系统评价的目的是评估有关肛周克罗恩病患者结直肠癌和肛门癌的发病率和危险因素的文献。\n\n**Method：** 使用 PubMed、Embase 和 Google Scholar 对文献进行了系统回顾。然后使用随机效应模型进行荟萃分析。\n\n**结果：** 系统评价中纳入了五项研究。在所有患者中，26.5%患有肛周克罗恩病。中位随访时间为 6 年。总共发现了 127 例结直肠癌病例[占克罗恩病患者的 0.43%]。 50% 的结直肠癌患者（占人口的 0.89%）存在肛周受累。其中三项研究指定癌症为直肠癌或肛门癌，分别有 68 例和 24 例病例[占患者的 0.3% 和 0.1%]。在直肠癌和肛门癌的亚组分析中，肛门癌中肛周受累最常见，占病例的 46%。在直肠癌组中，37% 有肛周受累。一项荟萃分析证实，肛周克罗恩病患者结直肠癌的发病率较高。\n\n**结论：** 一半的结直肠癌和肛门癌患者被发现患有肛周克罗恩病。在肛周受累的患者中，与直肠癌相比，肛门癌的比例更高。这些结果支持这样的理论：肛周克罗恩病患者患结直肠癌和肛门癌的风险增加。需要收集有关患者及其癌症的更详细数据的研究来进一步明确疾病进程。", "keywords_zh": "肛周克罗恩病、结直肠癌、荟萃分析", "keywords_en": "Perianal Crohn’s disease, colorectal cancer, meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/36130090/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 21 Sep 2022"}, {"id": "36005069", "title_en": "Do Patient-Reported Quality-of-Life (QoL) Scales Provide an Adequate Assessment of Patients with Cryptoglandular Anal Fistulae? A Systematic Review of Measurement Instruments and Their Content Validity", "title_zh": "患者报告的生活质量 (QoL) 量表是否可以对隐腺肛瘘患者进行充分的评估？测量仪器及其内容有效性的系统审查", "authors": "Phil Tozer", "abstract_en": "**Background:** Cryptoglandular anal fistulae can significantly affect patient quality of life (QoL), making it essential to ensure that any study of fistula treatment assesses the impact on QoL. The aim of this systematic review was to evaluate the content validity of Patient-Reported Outcome Measures (PROMs) that assess QoL in patients with a fistula.\n\n**Methods:** MEDLINE, EMBASE, PsycINFO, and Scopus were searched and studies assessing the content validity of patient-reported QoL measurement instruments, or PROM development studies in patients with cryptoglandular anal fistulae, were included. Data were extracted from eligible studies to determine the instruments' relevance, comprehensiveness, and comprehensibility, and their quality was assessed according to COnsensus-based Standards for the Selection of health Measurement Instruments (COSMIN).\n\n**Results:** Two PROM development studies were identified, both of which described the development of a disease-specific QoL measurement instrument for patients with cryptoglandular anal fistulae. The overall content validity of these instruments was inconsistent and supported by very low-quality evidence. There were no studies assessing the content validity of established QoL measurement instruments in patients with fistulae.\n\n**Conclusions:** This systematic review could not establish the content validity of the available QoL PROMs for patients with anal fistulae, due either to the absence of designated content validity studies or a lack of comprehensiveness of the available PROMs. This highlights an important gap in the literature that needs to be addressed to ensure high-quality outcome assessment in patients with fistulae.", "abstract_zh": "**背景：** 隐腺肛瘘可显着影响患者的生活质量 (QoL)，因此必须确保任何瘘管治疗研究都能评估其对生活质量的影响。本系统评价的目的是评估评估瘘管患者生活质量的患者报告结果测量 (PROM) 的内容有效性。\n\n**方法：** 检索了 MEDLINE、EMBASE、PsycINFO 和 Scopus，纳入了评估患者报告的 QoL 测量仪器内容有效性的研究，或隐窝腺肛瘘患者的 PROM 发展研究。从符合条件的研究中提取数据，以确定工具的相关性、全面性和可理解性，并根据基于共识的健康测量工具选择标准 (COSMIN) 评估其质量。\n\n**结果：** 确定了两项 PROM 开发研究，两项研究均描述了针对隐腺肛瘘患者的疾病特异性 QoL 测量仪器的开发。这些工具的整体内容有效性不一致，并且得到的证据质量非常低。尚无研究评估已建立的瘘管患者生活质量测量工具的内容有效性。\n\n**结论：** 由于缺乏指定的内容有效性研究或现有 PROM 缺乏全面性，本系统评价无法确定肛瘘患者可用 QoL PROM 的内容有效性。这凸显了文献中的一个重要空白，需要加以解决，以确保对瘘管患者进行高质量的结果评估。", "keywords_zh": "COSMIN、PROM、QoL、肛瘘、结果测量、患者报告的结果测量、生活质量", "keywords_en": "COSMIN, PROMs, QoL, anal fistula, outcome measures, patient-reported outcome measures, quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/36005069/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 25 Aug 2022"}, {"id": "35962294", "title_en": "Efficacy and safety of FiLaC for perianal fistulizing Crohn's disease: a systematic review and meta-analysis", "title_zh": "FiLaC 治疗肛周瘘管克罗恩病的疗效和安全性：系统评价和荟萃分析", "authors": "Z Cui", "abstract_en": "**Background:** Most patients with perianal fistulizing Crohn's disease (pfCD) present with complex types of perianal fistulas and need repetitive repair operations, resulting in a high risk of sphincter injury. Fistula-tract Laser Closure (FiLaC™) is a novel sphincter-saving technique that obliterates the fistula tract with a photothermal effect. The aim of the present systematic review and meta-analysis was to evaluate the efficacy and safety of FiLaC in pfCD.\n\n**Methods:** This study was conducted according to Preferred Reporting Items for Systematic reviews and Meta-Analyses (PRISMA) guidelines. Electronic databases, including PubMed, Embase, Cochrane Library and Wanfang Data were searched for published articles from January 2000 to June 2021. The clinicaltrials.gov website was searched for completed or ongoing trials on pfCD and FiLaC™. The references of each article were also searched for eligible data. The main outcome was the primary healing rate of the FiLaC™ procedure. Additionally, fecal incontinence was analyzed as the secondary outcome to evaluate the safety of FiLaC™.\n\n**Results:** Six studies met the eligibility criteria and were included in the final analysis. All studies were published within the past 6 years and came from European countries. There were 50 pfCD patients recruited, and 31 patients' fistulas were healed after FiLaC™. The pooled primary healing rate was 68% (95% CI 53.0-84.0%, I<sup>2</sup> = 27%, p = 0.23). There was no major fecal incontinence after surgery.\n\n**Conclusions:** These data suggest that FiLaC™ may be an effective and safe procedure for pfCD patients. However, the evidence is poor and there is a need for more high-quality prospective controlled studies with long-term follow-up before this minimally invasive technique is recommended for surgical treatment of pfCD.", "abstract_zh": "**背景：** 大多数肛周瘘管克罗恩病（pfCD）患者的肛周瘘管类型复杂，需要重复修复手术，导致括约肌损伤的风险很高。瘘管激光闭合术 (FiLaC™) 是一种新颖的保留括约肌的技术，通过光热效应消除瘘管。本系统评价和荟萃分析的目的是评估 FiLaC 在 pfCD 中的有效性和安全性。\n\n**方法：** 这项研究是根据系统评价和荟萃分析的首选报告项目 (PRISMA) 指南进行的。检索了包括 PubMed、Embase、Cochrane Library 和万方数据在内的电子数据库，查找 2000 年 1 月至 2021 年 6 月期间发表的文章。检索 ClinicalTrials.gov 网站，查找已完成或正在进行的 pfCD 和 FiLaC™ 试验。还搜索了每篇文章的参考文献以获取符合条件的数据。主要结果是 FiLaC™ 手术的初次愈合率。此外，将大便失禁作为次要结果进行分析，以评估 FiLaC™ 的安全性。\n\n**结果：** 六项研究符合资格标准并纳入最终分析。所有研究都是在过去 6 年内发表的，并且来自欧洲国家。招募了 50 名 pfCD 患者，其中 31 名患者的瘘管在 FiLaC™ 治疗后愈合。汇总的一期愈合率为 68%（95% CI 53.0-84.0%，I<sup>2</sup> = 27%，p = 0.23）。术后未出现严重大便失禁。\n\n**结论：** 这些数据表明 FiLaC™ 对于 pfCD 患者可能是一种有效且安全的手术。然而，证据不足，在推荐这种微创技术用于 pfCD 的手术治疗之前，需要进行更多高质量的前瞻性对照研究和长期随访。", "keywords_zh": "大便失禁、FiLaC™、治愈率、荟萃分析、肛周瘘管克罗恩病", "keywords_en": "Fecal incontinence, FiLaC™, Healing rate, Meta-analysis, Perianal fistulizing Crohn’s disease", "link": "https://pubmed.ncbi.nlm.nih.gov/35962294/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 12 Aug 2022"}, {"id": "35688686", "title_en": "Ileoanal pouch-related fistulae: A systematic review with meta-analysis on incidence, treatment options and outcomes", "title_zh": "回肠肛管相关瘘管：对发病率、治疗方案和结果进行荟萃分析的系统评价", "authors": "Guido Sciaudone", "abstract_en": "**Background:** Ileoanal pouch related fistulae (PRF) are a complication of restorative proctocolectomy often requiring repeated surgical interventions and with a high risk of long-term recurrence and pouch failure.\n\n**Aims:** To assess the incidence of PRF and to report on the outcomes of available surgical treatments.\n\n**Methods:** A PRISMA-compliant systematic literature search for articles reporting on PRF in patients with inflammatory bowel diseases (IBD) or familial adenomatous polyposis (FAP) from 1985 to 2020.\n\n**Results:** 34 studies comprising 770 patients with PRF after ileal-pouch anal anastomosis (IPAA) were included. Incidence of PRF was 1.5-12%. In IBD patients Crohn's Disease (CD) was responsible for one every four pouch-vaginal fistulae (PVF) (OR 24.7; p=0.001). The overall fistula recurrence was 49.4%; procedure-specific recurrence was: repeat IPAA (OR 42.1; GRADE +); transvaginal repair (OR 52.3; GRADE ++) and transanal ileal pouch advancement flap (OR 56.9; GRADE ++). The overall failure rate was 19%: pouch excision (OR 0.20; GRADE ++); persistence of diverting stoma (OR 0.13; GRADE +) and persistent fistula (OR 0.18; GRADE +).\n\n**Conclusion:** PVFs are more frequent compared to other types of PRF and are often associated to CD; surgical treatment has a risk of 50% recurrence. Repeat IPAA is the best surgical approach with a 42.1% recurrence rate.", "abstract_zh": "**背景：** 回肠储袋相关瘘管（PRF）是恢复性直肠结肠切除术的并发症，通常需要重复手术干预，并且长期复发和储袋失败的风险很高。\n\n**Aims：** 评估 PRF 的发生率并报告可用手术治疗的结果。\n\n**方法：** 符合 PRISMA 标准的系统文献检索，检索报告 1985 年至 2020 年炎症性肠病 (IBD) 或家族性腺瘤性息肉病 (FAP) 患者 PRF 的文章。\n\n**结果：** 纳入了 34 项研究，其中包括 770 名回肠袋肛管吻合术 (IPAA) 后出现 PRF 的患者。 PRF 的发生率为 1.5-12%。在 IBD 患者中，每 4 个储袋阴道瘘 (PVF) 中就有 1 个是由克罗恩病 (CD) 引起的（OR 24.7；p=0.001）。总的瘘管复发率为49.4%；手术特异性复发为：重复 IPAA（OR 42.1；GRADE +）；经阴道修复术（OR 52.3；GRADE ++）和经肛门回肠袋推进皮瓣（OR 56.9；GRADE ++）。总体失败率为 19%：储袋切除术（OR 0.20；GRADE ++）；持续存在分流造口（OR 0.13；GRADE +）和持续性瘘管（OR 0.18；GRADE +）。\n\n**结论：** 与其他类型的 PRF 相比，PVF 更为常见，并且通常与 CD 相关；手术治疗有50%的复发风险。重复 IPAA 是最好的手术方法，复发率为 42.1%。", "keywords_zh": "恢复性直肠结肠切除术、回肠储袋瘘的治疗、储袋阴道瘘的治疗", "keywords_en": "Restorative proctocolectomy, Treatment of ileal pouch fistula, Treatment of pouch-vaginal fistula", "link": "https://pubmed.ncbi.nlm.nih.gov/35688686/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 10 Jun 2022"}, {"id": "35661342", "title_en": "Different segmental resection techniques and postoperative complications in patients with colorectal endometriosis: A systematic review", "title_zh": "结直肠子宫内膜异位症患者不同节段切除技术与术后并发症的系统评价", "authors": "Gernot Hudelist", "abstract_en": "**Introduction:** The aim of this study was to analyze the available literature by conducting a systematic review to assess the possible effects of nerve-sparing segmental resection and conventional bowel resection on postoperative complications for the treatment of colorectal endometriosis.\n\n**Material And Methods:** Pubmed, Clinical Trials.gov, Cochrane Library, and Web of Science were comprehensively searched from 1997 to 2021 in order to perform a systematic review. Studies including patients undergoing segmental resection for colorectal endometriosis including adequate follow-up, data on postoperative complications and postoperative sequelae were enrolled in this review. Selected articles were evaluated and divided in two groups: Nerve-sparing resection (NSR), and conventional segmental resection not otherwise specified (SRNOS). Within the NSRs, studies mentioning preservation of the rectal artery supply (artery and nerve-sparing SR - ANSR) and not reporting preservation of the artery supply (NSR not otherwise specified - NSRNOS) were further analyzed.\n\n**Prospero Id:** CRD42021250974.\n\n**Results:** A total of 7549 patients from 63 studies were included in the data analysis. Forty-three of these publications did not mention the preservation or the removal of the hypogastric nerve plexus, or main rectal artery supply and were summarized as SRNOS. The remaining 22 studies were listed under the NSR group. The mean size of the resected deep endometriosis lesions and patients' body mass index were comparable between SRNOS and NSR. A mean of 3.6% (0-16.6) and 2.3% (0-10.5%) of rectovaginal fistula development was reported in patients who underwent SRNOS and NSR, respectively. Anastomotic leakage rates varied from 0% to 8.6% (mean 1.7 ± 2%) in SRNOS compared with 0% to 8% (mean 1.7 ± 2%) in patients undergoing NSR. Urinary retention (4.5% and 4.9%) and long-term bladder catheterization (4.9% and 5.6%) were frequently reported in SRNOS and NSR. There was insufficient information about pain or the recurrence rates for women undergoing SRNOS and NSR.\n\n**Conclusions:** Current data describe the outcomes of different segmental resection techniques. However, the data are inhomogeneous and not sufficient to reach a conclusion regarding a possible advantage of one technique over the other.", "abstract_zh": "**介绍：** 本研究的目的是通过系统评价来分析现有文献，以评估保留神经的节段切除术和常规肠切除术对结直肠子宫内膜异位症治疗术后并发症的可能影响。\n\n**Material and methods：** 从 1997 年到 2021 年，对 Pubmed、Clinical Trials.gov、Cochrane Library 和 Web of Science 进行了全面检索，以进行系统评价。本次综述纳入了包括因结直肠子宫内膜异位症接受节段切除术的患者在内的研究，包括充分的随访、术后并发症和术后后遗症的数据。对选定的文章进行评估并分为两组：保留神经切除术（NSR）和未另行指定的常规节段切除术（SRNOS）。在 NSR 中，进一步分析了提及保留直肠动脉供应（动脉和神经保留 SR - ANSR）和未报告动脉供应保留（NSR 未另行指定 - NSRNOS）的研究。\n\n**Prospero id：** CRD42021250974。\n\n**结果：** 数据分析共纳入 63 项研究的 7549 名患者。其中 43 篇出版物没有提及保留或去除腹下神经丛或主要直肠动脉供应，并被总结为 SRNOS。其余 22 项研究列在 NSR 组下。 SRNOS 和 NSR 切除的深部子宫内膜异位病灶的平均大小和患者的体重指数相当。据报道，接受 SRNOS 和 NSR 的患者平均发生直肠阴道瘘的比例分别为 3.6% (0-16.6) 和 2.3% (0-10.5%)。 SRNOS 患者的吻合口漏率从 0% 到 8.6%（平均 1.7±±2%）不等，而接受 NSR 的患者吻合口漏率为 0% 到 8%（平均 1.7±±2%）。 SRNOS 和 NSR 中经常报告尿潴留（4.5% 和 4.9%）和长期膀胱导尿（4.9% 和 5.6%）。关于接受 SRNOS 和 NSR 的女性的疼痛或复发率的信息不足。\n\n**结论：** 目前的数据描述了不同节段切除技术的结果。然而，数据不均匀，不足以得出关于一种技术相对于另一种技术的可能优势的结论。", "keywords_zh": "子宫内膜异位症、内窥镜手术、腹腔镜检查、发病率、手术技术", "keywords_en": "endometriosis, endoscopic surgery, laparoscopy, morbidity, surgical techniques", "link": "https://pubmed.ncbi.nlm.nih.gov/35661342/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Mon, 06 Jun 2022"}, {"id": "35611255", "title_en": "Prevalence of anal fistulas: a systematic review and meta-analysis", "title_zh": "肛瘘的患病率：系统评价和荟萃分析", "authors": "Mahmoud Yousefifard", "abstract_en": "Anal fistula refers to a clinical condition with local pain and inflammation associated with purulent discharge that affects the quality of life. Due to the lack of studies, the presence of bias, and high heterogeneity in the studies, the present systematic review is the first to be performed on the population-based database in this field. The present systematic review and meta-analysis was performed according to MOOSE guidelines. After systematic searching in electronic databases, only four articles met the inclusion criteria. After preparing a checklist and extracting data from the relevant articles, a meta-analysis was performed. All studies on the prevalence of anal fistula are related to Europe, and so far, no study has been conducted on other continents. The overall prevalence of anal fistula in European countries was 18.37 (95% CI: 18.20-18.55%) per 100,000 individuals, and the highest prevalence was reported for Italy (23.20 (95% CI: 22.82 to 23.59) per 100,000 people). From the present population-based (224,097,362) study results, it can be concluded that there is a prominent knowledge gap in this context. Because all the studies included in the current study relate only to Europe, the need for further research in this field in other countries is inevitably sensible.", "abstract_zh": "肛瘘是指一种伴有局部疼痛和炎症、伴有脓性分泌物、影响生活质量的临床病症。由于研究缺乏、存在偏倚、异质性高，本系统评价是该领域首次针对人群数据库进行的系统评价。本系统评价和荟萃分析是根据 MOOSE 指南进行的。经过系统检索电子数据库，只有四篇文章符合纳入标准。在准备清单并从相关文章中提取数据后，进行了荟萃分析。所有关于肛瘘患病率的研究都与欧洲有关，到目前为止，还没有在其他大陆进行过研究。欧洲国家肛瘘的总体患病率为每 10 万人 18.37 例（95% CI：18.20-18.55%），其中意大利患病率最高（每 10 万人 23.20 例（95% CI：22.82 至 23.59））。从目前基于人群（224,097,362）的研究结果可以得出结论，在这方面存在着显着的知识差距。由于当前研究中包含的所有研究仅与欧洲有关，因此在其他国家进行该领域的进一步研究的必要性不可避免地是合理的。", "keywords_zh": "肛瘘，患病率，系统评价。", "keywords_en": "Anal Fistulas, Prevalence, Systematic Review.", "link": "https://pubmed.ncbi.nlm.nih.gov/35611255/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 25 May 2022"}, {"id": "35442833", "title_en": "Role of fluorescence imaging for intraoperative intestinal assessment in gynecological surgery: a systematic review", "title_zh": "荧光成像在妇科手术中肠道评估中的作用：系统评价", "authors": "Mikel Gorostidi", "abstract_en": "**Background:** Our aim was to review the current knowledge of the role of fluorescence imaging for intraoperative intestinal assessment in gynecological surgery.\n\n**Material And Methods:** A computer-based systematic review was performed from 2000 to 2020. All articles describing the use of indocyanine green (ICG) applied to bowel assessments in gynecology or endometriosis surgery were considered for review.\n\n**Results:** ICG is an effective tool for assessing bowel vascularization, potentially preventing anastomotic leakage and recto-vaginal fistula and can therefore be useful for endometriosis surgery or bowel assessment in gynecological oncology procedures. Real-time characterization of the hypovascular pattern of endometriotic nodules has been associated with a larger nodule size and lower microvessel density, helping surgeons choose the best transecting line and the most appropriate technique. ICG angiography allows for a laparoscopic and intrarectal bowel assessment, which can act as a double check of bowel perfusion, enabling the assessment of mucosa vascularization. ICG fluorescence can guide intraoperative decision-making after intestinal anastomosis, discoid resection, and rectal shaving, preventing anastomotic leakage and postoperative recto-vaginal fistula in low anterior resections.\n\n**Conclusions:** ICG angiography provides a better intestinal assessment. Larger, prospective, randomized controlled studies are needed to validate the technique and confirm these encouraging results.", "abstract_zh": "**背景：** 我们的目的是回顾目前荧光成像在妇科手术中肠道评估中的作用的知识。\n\n**Material and methods：** 2000年至2020年进行了一项基于计算机的系统评价。所有描述吲哚菁绿（ICG）应用于妇科或子宫内膜异位症手术肠道评估的文章均被考虑进行审查。\n\n**结果：** ICG 是评估肠道血管化的有效工具，有可能预防吻合口瘘和直肠阴道瘘，因此可用于子宫内膜异位症手术或妇科肿瘤手术中的肠道评估。子宫内膜异位结节缺血管模式的实时表征与较大的结节尺寸和较低的微血管密度相关，有助于外科医生选择最佳横断线和最合适的技术。 ICG 血管造影可以进行腹腔镜和直肠内肠道评估，可以作为肠道灌注的双重检查，从而能够评估粘膜血管化。 ICG荧光可以指导肠吻合、盘状切除和直肠剃除后的术中决策，防止低位前切除术中的吻合口瘘和术后直肠阴道瘘。\n\n**结论：** ICG 血管造影可提供更好的肠道评估。需要更大规模的前瞻性随机对照研究来验证该技术并确认这些令人鼓舞的结果。", "keywords_zh": "微创手术、肠道并发症、妇科手术、吲哚菁绿", "keywords_en": "Minimally invasive surgery, bowel complication, gynecological surgery, indocyanine green", "link": "https://pubmed.ncbi.nlm.nih.gov/35442833/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Wed, 20 Apr 2022"}, {"id": "35357610", "title_en": "A systematic review and meta-analysis of the outcome of ileal pouch-anal anastomosis in patients with ulcerative colitis versus patients with familial adenomatous polyposis", "title_zh": "溃疡性结肠炎患者与家族性腺瘤性息肉病患者回肠储袋肛门吻合术结果的系统回顾和荟萃分析", "authors": "S D Wexner", "abstract_en": "**Background:** Ileal pouch-anal anastomosis (IPAA) is commonly used to restore gastrointestinal continuity after surgical treatment of mucosal ulcerative colitis (MUC) and familial adenomatous polyposis (FAP). The aim of the present systematic review was to compare the outcomes of patients with MUC and patients with FAP who underwent IPAA.\n\n**Methods:** A Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA)-compliant systematic review was performed. PubMed, Scopus, and Web of Science were searched through December 2021. Cohort and randomized studies were eligible for inclusion if they directly compared patients with MUC and FAP who underwent IPAA. The main outcome measures were pouch failure, complications, and need for pouch excision or revision. ROBINS-I tool was used to assess the risk of bias across the studies. A random-effect meta-analysis was conducted.\n\n**Results:** Twenty-three studies (9200 patients) were included in this meta-analysis. Seven thousand nine hundred fifty (86.4%) had MUC and 1250 (13.6%) had FAP. The median age of patients was 33.1 years. The male to female ratio was 1.4:1. MUC had higher odds of pouchitis (OR 3.9, 95% CI 2.8-5.4, p < 0.001), stricture (OR 1.82, 95% CI 1.25-2.65, p = 0.002), fistula (OR 1.74, 95% CI 1.18-2.54, p = 0.004), and total complications (OR 1.89, 95% CI 1.3-2.77, p < 0.001) as compared to FAP. Both groups had similar odds of pelvic sepsis, leakage, pouch failure, excision, revision, and fecal incontinence.\n\n**Conclusions:** Although patients with MUC undergoing IPAA may be at a higher risk of developing complications, particularly pouchitis, stricture, and fistula; the ultimate and functional outcome of the pouch is similar to patients with FAP. Pouch failure, excision and revision were similar in the two groups.", "abstract_zh": "**背景：** 回肠储袋肛门吻合术（IPAA）通常用于在粘膜溃疡性结肠炎（MUC）和家族性腺瘤性息肉病（FAP）的手术治疗后恢复胃肠道连续性。本系统评价的目的是比较接受 IPAA 的 MUC 患者和 FAP 患者的结果。\n\n**方法：** 进行了符合系统评价和荟萃分析 (PRISMA) 的首选报告项目的系统评价。 PubMed、Scopus 和 Web of Science 的检索截止时间为 2021 年 12 月。队列研究和随机研究如果直接比较接受 IPAA 的 MUC 和 FAP 患者，则符合纳入条件。主要结果指标是造口袋失败、并发症以及造口袋切除或翻修的需要。 ROBINS-I 工具用于评估研究中的偏倚风险。进行了随机效应荟萃分析。\n\n**结果：** 本荟萃分析纳入了 23 项研究（9200 名患者）。 7950 人 (86.4%) 患有 MUC，1250 人 (13.6%) 患有 FAP。患者的中位年龄为 33.1 岁。男女比例为1.4：1。 MUC 发生储袋炎 (OR 3.9, 95% CI 2.8-5.4, p<0.001)、狭窄 (OR 1.82, 95% CI 1.25-2.65, p = 0.002)、瘘管 (OR 1.74, 95% CI 1.18-2.54,与 FAP 相比，p = 0.004）和总并发症（OR 1.89，95% CI 1.3-2.77，p< 0.001）。两组发生盆腔败血症、渗漏、造口袋失败、切除、翻修和大便失禁的几率相似。\n\n**结论：** 尽管接受 IPAA 的 MUC 患者出现并发症的风险可能更高，特别是储袋炎、狭窄和瘘管；造口袋的最终功能结果与 FAP 患者相似。两组的储袋失败、切除和翻修相似。", "keywords_zh": "家族性腺瘤性息肉病, 回肠贮袋-肛门吻合术, 荟萃分析, 结果, 系统评价, 溃疡性结肠炎", "keywords_en": "Familial adenomatous polyposis, Ileal pouch-anal anastomosis, Meta-analysis, Outcome, Systematic review, Ulcerative colitis", "link": "https://pubmed.ncbi.nlm.nih.gov/35357610/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 31 Mar 2022"}, {"id": "35347492", "title_en": "Video-assisted anal fistula treatment for complex anorectal fistulas in adults: a systematic review and meta-analysis", "title_zh": "成人复杂性肛肠瘘的视频辅助肛瘘治疗：系统评价和荟萃分析", "authors": "Y Q Wang", "abstract_en": "**Background:** Video-assisted anal fistula treatment (VAAFT) has gained increasing acceptance as a sphincter-sparing procedure for treating complex anorectal fistulas (CAF), but no unequivocal conclusions can yet be drawn regarding its ultimate effectiveness. We reviewed the literature and performed a meta-analysis to evaluate the efficacy and safety of VAAFT in CAF patients.\n\n**Methods:** The study protocol was registered with the PROSPERO database (CRD42021279085). A systematic literature search was performed in the PubMed, Embase, and Cochrane Library databases up to June 2021 with no restriction on language based on the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. We used the keywords video-assisted surgery, video-assisted anal fistula treatment, and complex anorectal fistula to identify relevant studies.\n\n**Results:** Fourteen trials (7 prospective and 7 retrospective) with a total of 1201 patients (mean age 43.5 years) were included. The median follow-up duration was 16.5(8-48) months. Pooled analysis showed that the rates of success, recurrence and postoperative complication across the studies were 83% (95% CI 81-85%, I<sup>2</sup> = 37.9%), 16% (95% CI 14-18%, I<sup>2</sup> = 4.8%), 11% (95% CI 7-15%, I<sup>2</sup> = 72.1%), respectively. The postoperative Jorge-Wexner score used to assess the level of anal incontinence was 1.09 (95% CI, 0.9-1.27, I<sup>2</sup> = 74.6%). The internal opening detection rate was 97.6% (95% CI 96.1-99.6%, I<sup>2</sup> = 48.2%). Recurrence rates varied according to the closure method of internal opening from 21.4% after using staplers, 18.7% after suturing, to 23.5% after advancement flap. The hospital stay was 3.15 days (95% CI 2.96-3.35, I<sup>2</sup> = 49.7%). Subgroup analysis indicated that the risk of heterogeneity in the urine retention group was higher  compared with that of the overall group and that retrospective studies may be the source of heterogeneity for postoperative anal incontinence. r . Sensitivity analysis confirmed the stability of the pooled results. Begg's and Egger's tests showed no evidence of publication bias.\n\n**Conclusions:** According to the available evidence, VAAFT may be a valuable alternative to fistulotomy or seton in treating CAF and has the additional long-term benefits of reducing anal incontinence and surgical morbidity, permitting earlier healing and accelerated rehabilitation.", "abstract_zh": "**背景：** 视频辅助肛瘘治疗（VAAFT）作为一种治疗复杂性肛肠瘘（CAF）的保留括约肌的手术已获得越来越多的认可，但关于其最终效果尚无明确的结论。我们回顾了文献并进行了荟萃分析，以评估 VAAFT 在 CAF 患者中的疗效和安全性。\n\n**方法：** 研究方案已在 PROSPERO 数据库中注册 (CRD42021279085)。根据系统评价和荟萃分析指南的首选报告项目，在 PubMed、Embase 和 Cochrane 图书馆数据库中进行了截至 2021 年 6 月的系统文献检索，对语言没有限制。我们使用关键词视频辅助手术、视频辅助肛瘘治疗和复杂性肛肠瘘来识别相关研究。\n\n**结果：** 纳入了 14 项试验（7 项前瞻性试验和 7 项回顾性试验），共有 1201 名患者（平均年龄 43.5 岁）。中位随访时间为16.5（8-48）个月。汇总分析显示，所有研究的成功率、复发率和术后并发症分别为 83% (95% CI 81-85%，I<sup>2</sup> = 37.9%)、16% (95% CI 14-18%，I<sup>2</sup> = 4.8%)、11% (95% CI 7-15%， I<sup>2</sup> = 72.1%）。术后用于评估肛门失禁程度的 Jorge-Wexner 评分为 1.09（95% CI，0.9-1.27，I<sup>2</sup> = 74.6%）。内部开口检出率为97.6%（95% CI 96.1-99.6%，I<sup>2</sup> = 48.2%）。根据内部开口的闭合方法，复发率有所不同，从使用吻合器后的 21.4%、缝合后的 18.7% 到推进皮瓣后的 23.5%。住院时间为 3.15 天（95% CI 2.96-3.35，I<sup>2</sup> = 49.7%）。亚组分析表明，尿潴留组的异质性风险高于整体组，回顾性研究可能是术后肛门失禁异质性的根源。 河。敏感性分析证实了汇总结果的稳定性。贝格和艾格的测试没有显示发表偏见的证据。\n\n**结论：** 根据现有证据，VAAFT 可能是治疗 CAF 时瘘管切开术或挂线的有价值的替代方案，并且具有减少肛门失禁和手术发病率、允许早期愈合和加速康复的额外长期益处。", "keywords_zh": "复杂性肛肠瘘，Meta分析，VAAFT，视频辅助肛瘘治疗", "keywords_en": "Complex anorectal fistula, Meta-analysis, VAAFT, Video-assisted anal fistula treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/35347492/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Tue, 29 Mar 2022"}, {"id": "35211503", "title_en": "Efficacy and Safety of Sphincter-Preserving Surgery in the Treatment of Complex Anal Fistula: A Network Meta-Analysis", "title_zh": "保留括约肌手术治疗复杂肛瘘的疗效和安全性：网络荟萃分析", "authors": "Shanshan Xu", "abstract_en": "**Background:** There are many surgical methods of sphincter preservation in treating complex anal fistula, but the therapeutic effects of each operation are different. Therefore, this study aimed to compare the impact of other treatment methods through a network meta-analysis to evaluate the best sphincter preservation method for treating complex anal fistula.\n\n**Methods:** We searched PubMed, Embase, Cochrane Library, China National Knowledge Infrastructure, Chinese Biomedical Literature Database, VIP Journal Database, and the Wanfang Database to collate randomized controlled trials on sphincter-preserving surgery for complex anal fistula.\n\n**Results:** A total of 29 articles were included in this meta-analysis. The cure rates showed no statistically significant differences between any two interventions (<i>P</i> > 0.05). The recurrence rate results showed that the rate of patients after Fistulectomy was higher than others (<i>P</i> < 0.05). The incidence rate of complications showed that the incidence rate after fistulectomy treatment was higher than that of others (<i>P</i> < 0.05). The surface under the cumulative ranking (SUCRA) was used to arrange their advantages and disadvantages, and a larger SUCRA value indicates that the intervention may be more effective. The results showed that TROPIS may have the highest cure rate (SUCRA = 78.6%), stem cell transplantation (SCT) may have the lowest recurrence rate (SUCRA = 85.5%), and imLIFT may have the least complications (SUCRA = 88.2%).\n\n**Conclusion:** According to the existing literature data, for patients with complex anal fistula, TROPIS may be the surgical method with the highest cure rate, SCT may be the treatment method with the lowest recurrence rate, and imLIFT may be the surgical method with the lowest incidence of postoperative complications.\n\n**Systematic Review Registration:** PROSPERO, identifier: CRD42020221907.", "abstract_zh": "**背景：** 保留括约肌治疗复杂性肛瘘的手术方法有多种，但每种手术的治疗效果各不相同。因此，本研究旨在通过网络荟萃分析比较其他治疗方法的影响，以评估治疗复杂性肛瘘的最佳保留括约肌方法。\n\n**方法：** 我们检索了PubMed、Embase、Cochrane图书馆、中国知识基础设施、中国生物医学文献数据库、维普期刊数据库和万方数据库，整理复杂性肛瘘保留括约肌手术的随机对照试验。\n\n**结果：** 本次荟萃分析共纳入 29 篇文章。任意两种干预措施的治愈率均无统计学差异（<i>P</i> > 0.05）。复发率结果显示，瘘管切除术后患者的复发率高于其他患者（<i>P</i><0.05）。并发症发生率显示，瘘管切除治疗后的发生率高于其他组（<i>P</i><0.05）。采用累积排序曲面（SUCRA）来排列其优劣势，SUCRA值越大表明干预可能越有效。结果显示，TROPIS 的治愈率可能最高（SUCRA = 78.6%），干细胞移植（SCT）的复发率可能最低（SUCRA = 85.5%），而 imLIFT 的并发症可能最少（SUCRA = 88.2%）。\n\n**结论：** 根据现有文献数据，对于复杂性肛瘘患者，TROPIS可能是治愈率最高的手术方法，SCT可能是复发率最低的治疗方法，imLIFT可能是术后并发症发生率最低的手术方法。\n\n**Systematic review registration：** PROSPERO，标识符：CRD42020221907。", "keywords_zh": "复杂性肛瘘, 治愈率, 元, 括约肌, 治疗", "keywords_en": "complex anal fistula, cure rate, meta, sphincter, treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/35211503/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 25 Feb 2022"}, {"id": "35090384", "title_en": "A systematic review of the patient burden of Crohn's disease-related rectovaginal and anovaginal fistulas", "title_zh": "克罗恩病相关直肠阴道和肛门阴道瘘患者负担的系统评价", "authors": "Suzanne F Cook", "abstract_en": "**Background:** Crohn's disease (CD)-related rectovaginal fistulas (RVFs) and anovaginal fistulas (AVFs) are rare, debilitating conditions that present a substantial disease and treatment burden for women. This systematic literature review (SLR) assessed the burden of Crohn's-related RVF and AVF, summarizing evidence from observational studies and highlighting knowledge gaps.\n\n**Methods:** This SLR identified articles in PubMed and Embase that provide data and insight into the patient experience and disease burden of Crohn's-related RVF and AVF. Two trained reviewers used pre-specified eligibility criteria to identify studies for inclusion and evaluate risk of bias using the Risk Of Bias In Non-randomized Studies of Interventions (ROBINS-I) tool for observational studies.\n\n**Results:** Of the 582 records identified, 316 full-text articles were assessed, and 16 studies met a priori eligibility criteria and were included. Few epidemiology studies were identified, with one study estimating the prevalence of RVF to be 2.3% in females with Crohn's disease. Seven of 12 treatment pattern studies reported that patients had or required additional procedures before and/or after the intervention of interest, demonstrating a substantial treatment burden. Seven of 11 studies assessing clinical outcomes reported fistula healing rates between 50 and 75%, with varying estimates based on population and intervention.\n\n**Conclusions:** This SLR reports the high disease and treatment burden of Crohn's-related RVF and AVF and identifies multiple evidence gaps in this field. The literature lacks robust, generalizable data, and demonstrates a compelling need for substantial, novel research into these rare and debilitating sequelae of CD. Registration The PROSPERO registration number for the protocol for this systematic literature review is CRD42020177732.", "abstract_zh": "**背景：** 克罗恩病 (CD) 相关的直肠阴道瘘 (RVF) 和肛门阴道瘘 (AVF) 是罕见的、使人衰弱的疾病，给女性带来沉重的疾病和治疗负担。这篇系统文献综述 (SLR) 评估了克罗恩病相关的 RVF 和 AVF 的负担，总结了观察性研究的证据并强调了知识差距。\n\n**方法：** 此 SLR 识别了 PubMed 和 Embase 中的文章，这些文章提供了有关克罗恩病相关 RVF 和 AVF 患者经历和疾病负担的数据和见解。两名训练有素的评审员使用预先指定的资格标准来确定纳入的研究，并使用观察性研究的非随机干预研究中的偏倚风险 (ROBINS-I) 工具来评估偏倚风险。\n\n**结果：** 在确定的 582 条记录中，评估了 316 篇全文文章，其中 16 项研究符合先验资格标准并被纳入。很少有流行病学研究发现，一项研究估计患有克罗恩病的女性中裂谷热的患病率为 2.3%。 12 项治疗模式研究中有 7 项报告称，患者在感兴趣的干预之前和/或之后接受了或需要额外的手术，这表明治疗负担相当大。评估临床结果的 11 项研究中有 7 项报告称，瘘管愈合率在 50% 至 75% 之间，根据人群和干预措施的不同，得出不同的估计值。\n\n**结论：** 该 SLR 报告了克罗恩病相关的 RVF 和 AVF 的高疾病和治疗负担，并确定了该领域的多个证据差距。文献缺乏可靠、可概括的数据，并且表明迫切需要对 CD 的这些罕见且令人衰弱的后遗症进行大量、新颖的研究。注册 本系统文献综述方案的 PROSPERO 注册号是 CRD42020177732。", "keywords_zh": "肛门阴道瘘、克罗恩病、疾病负担、流行病学、直肠阴道瘘、治疗模式", "keywords_en": "Anovaginal fistula, Crohn’s disease, Disease burden, Epidemiology, Rectovaginal fistula, Treatment patterns", "link": "https://pubmed.ncbi.nlm.nih.gov/35090384/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Jan 2022"}, {"id": "35063254", "title_en": "Single-stage procedures for anorectal malformations: A systematic review and meta-analysis", "title_zh": "肛门直肠畸形的单阶段手术：系统评价和荟萃分析", "authors": "Chris Westgarth-Taylor", "abstract_en": "**Background:** The purpose of this study is to describe all published studies of single-stage procedures for anorectal malformations and to perform a meta-analysis of studies that compared single-stage to staged procedures.\n\n**Methods:** Searches were conducted in Pubmed, Medline, Embase and CENTRAL. Meta-analysis was performed in RevMan and expressed as forest plots with odds ratios (OR) and 95% confidence intervals (CI).\n\n**Results:** Thirty-eight studies were included in the narrative synthesis. Nine studies were included in the meta-analysis, representing 537 patients. The majority (70%) of patients included in this meta-analysis had either perineal or vestibular fistulas. Surgical site infection (SSI) was defined as any reported infection involving the neoanus (both superficial infection and dehiscence) and occurred in 51 of the 291 patients who underwent single-stage procedures, and 26 of the 244 patients who underwent staged procedure. Meta-analysis showed a 2.2 times higher risk of surgical site infection (SSI) amongst patients who undergo single-stage procedures (OR 2.22, 95% CI 1.26, 3.92). Six of the 293 patients (2%) who underwent single-stage procedures required a rescue ostomy for wound dehiscence. In LMIC the risk of wound dehiscence was three-fold higher in single-stage (36/202) compared to staged procedures (12/126) (OR 3.07, 95% CI 1.42, 6.63). In HIC there was no evidence of an increased risk of wound dehiscence in patients who underwent a single-stage (15/91) compared to a staged procedure (14/118) (OR 1.51, 95% CI 0.65, 3.51). There is no evidence of a difference between single-stage versus staged procedures with regards to functional outcomes including voluntary bowel movements (79/90 versus 111/128), soiling (24/165 versus 20/203) or constipation (27/90 versus 36/128).\n\n**Conclusion:** This systematic review provides further evidence that single-stage procedures for selected patients with anorectal malformations are safe. Whilst there is evidence of an increased risk of SSI, this did not translate to a significant difference in long-term functional outcomes.\n\n**Levels Of Evidence:** Level II.", "abstract_zh": "**背景：** 本研究的目的是描述所有已发表的肛门直肠畸形单阶段手术的研究，并对单阶段手术与分阶段手术进行比较的研究进行荟萃分析。\n\n**方法：** 检索在 Pubmed、Medline、Embase 和 CENTRAL 上进行。在 RevMan 中进行荟萃分析，并表示为具有比值比 (OR) 和 95% 置信区间 (CI) 的森林图。\n\n**结果：** 叙述综合中纳入了三十八项研究。荟萃分析中纳入了 9 项研究，代表 537 名患者。本荟萃分析中纳入的大多数患者（70%）患有会阴瘘或前庭瘘。手术部位感染 (SSI) 被定义为任何报告的涉及新肛门的感染（包括浅表感染和裂开），发生在接受单阶段手术的 291 名患者中的 51 名，以及接受分期手术的 244 名患者中的 26 名。荟萃分析显示，接受单阶段手术的患者手术部位感染 (SSI) 的风险高出 2.2 倍（OR 2.22，95% CI 1.26，3.92）。 293 名接受单阶段手术的患者中，有 6 名 (2%) 因伤口裂开而需要进行挽救性造口术。在中低收入国家中，单期手术 (36/202) 伤口裂开的风险是分期手术 (12/126) 的三倍（OR 3.07，95% CI 1.42，6.63）。在 HIC 中，没有证据表明接受单期手术 (15/91) 的患者与分期手术 (14/118) 相比伤口裂开的风险增加（OR 1.51，95% CI 0.65，3.51）。没有证据表明单阶段手术与分阶段手术在功能结果方面存在差异，包括随意排便（79/90 与 111/128）、排便（24/165 与 20/203）或便秘（27/90 与 36/128）。\n\n**结论：** 这项系统评价提供了进一步的证据，证明对选定的肛门直肠畸形患者进行单阶段手术是安全的。虽然有证据表明 SSI 风险增加，但这并没有转化为长期功能结果的显着差异。\n\n**Levels of evidence：** 二级。", "keywords_zh": "肛门直肠畸形、结肠造口术、原发性 PSARP、单阶段", "keywords_en": "Anorectal malformations, Colostomy, Primary PSARP, Single-stage", "link": "https://pubmed.ncbi.nlm.nih.gov/35063254/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 22 Jan 2022"}, {"id": "35049123", "title_en": "Meta-analysis of platelet-rich plasma therapy for anal fistula", "title_zh": "富血小板血浆治疗肛瘘的Meta分析", "authors": "Shuangqing Chang", "abstract_en": "**Objective:** To systematically evaluate the efficacy of platelet-rich plasma (PRP) in treating anal fistula.\n\n**Methods:** PubMed, EMBASE, and Cochrane Library databases were systematically searched for randomized controlled studies (RCTs) and case-control studies published before June 2021 on evaluating the efficacy of platelet-rich plasma (PRP) in treating anal fistula. References of the journals were manually searched for relevant studies. Literature search, screening, data extraction, and bias assessment were carried out by two researcher independently. Stata13.0 and RevMan 5.3 software were used for statistical analysis of the cure rate and recurrence rate of anal fistula.\n\n**Results:** A total of 6 case-control studies and 3 RCTs involving 289 patients were included. Meta-analysis showed that the pooled cure rate of all studies was 65% (95% CI 0.53-0.77), p = 0.000, and the pooled recurrence rate of all studies was 12% (95% CI 0.08-0.17).\n\n**Conclusion:** Platelet-rich plasma is safe and effective in treating anal fistula and should be promoted and further studied in clinical practice.", "abstract_zh": "**目的：** 系统评价富血小板血浆（PRP）治疗肛瘘的疗效。\n\n**方法：** 系统地检索了 PubMed、EMBASE 和 Cochrane 图书馆数据库中 2021 年 6 月之前发表的关于评估富血小板血浆 (PRP) 治疗肛瘘疗效的随机对照研究 (RCT) 和病例对照研究。手动检索期刊参考文献以查找相关研究。文献检索、筛选、数据提取和偏倚评估由两名研究者独立完成。采用Stata13.0和RevMan 5.3软件对肛瘘治愈率和复发率进行统计分析。\n\n**结果：** 共纳入 6 项病例对照研究和 3 项随机对照试验，涉及 289 名患者。荟萃分析显示，所有研究的汇总治愈率为 65%（95% CI 0.53-0.77），p = 0.000，所有研究的汇总复发率为 12%（95% CI 0.08-0.17）。\n\n**结论：** 富血小板血浆治疗肛瘘安全有效，值得在临床上推广和进一步研究。", "keywords_zh": "肛瘘, 疗效, 荟萃分析, 富血小板血浆, 随机对照试验", "keywords_en": "anal fistula, efficacy, meta-analysis, platelet-rich plasma, randomized controlled trial", "link": "https://pubmed.ncbi.nlm.nih.gov/35049123/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Thu, 20 Jan 2022"}, {"id": "35029127", "title_en": "Magnetic Resonance Imaging-Guided Transurethral Ultrasound Ablation of Prostate Cancer: A Systematic Review", "title_zh": "磁共振成像引导经尿道超声消融治疗前列腺癌：系统评价", "authors": "David Sella", "abstract_en": "<b><i>Purpose:</i></b> MRI-guided transurethral ultrasound ablation (TULSA) uses real-time MR thermometry feedback to target prostate disease. We systematically review the literature to synthesize efficacy, functional, and safety outcomes and assess the influence of planned ablation fraction on outcome. <b><i>Materials and Methods:</i></b> PubMed, Embase, and the Cochrane Library were searched from inception to June 2021 following Preferred Reporting Items for Systematic Reviews and Meta-analyses (PRISMA) guidelines. Studies reporting at least one efficacy, functional, or safety outcome after a single TULSA treatment were included. The relationship of freedom from salvage treatment and potency preservation with planned ablation volume was modeled. <b><i>Results:</i></b> Two hundred twenty-four patients were treated in 10 studies with up to a 5-year follow-up, mainly for primary localized prostate cancer (PCa) plus smaller cohorts with recurrent PCa, and locally advanced PCa (LAPC). The prostate-specific antigen decline from baseline up to 2 years, including focal to whole-gland ablation plans, was 54% to 97%. The rate of salvage treatment after one TULSA treatment for primary PCa was 7% to 17%. Continence and potency preservation were from 92% to 100% and from 75% to 98%. Urinary symptoms were stable in men with good voiding function at baseline, and 85% of men with concurrent PCa and lower urinary tract symptoms met the criteria for improvement. Symptom relief in a small cohort of men with LAPC was observed. Grade III adverse events were incurred by 13/224 men (6%), with no rectal injury/fistula or Grade IV complication. The planned ablation fraction was linearly related to salvage-free survival. The relationship between potency preservation and planned ablation fraction followed a sigmoid curve. <b><i>Conclusions:</i></b> As an alternative to conventional treatments, TULSA is safe and effective for prostate tissue ablation in men with primary PCa. There is also evidence that TULSA delivers effective relief of urinary symptoms while treating PCa in a single, low-morbidity procedure. The likelihood of freedom from additional treatment or potency preservation is associated with the planned ablation fraction.", "abstract_zh": "<b><i>目的：</i></b> MRI 引导的经尿道超声消融 (TULSA) 使用实时 MR 测温反馈来治疗前列腺疾病。我们系统地回顾文献，综合疗效、功能和安全性结果，并评估计划消融分数对结果的影响。 <b><i>材料和方法：</i></b>从一开始到 2021 年 6 月，按照系统评价和荟萃分析的首选报告项目 (PRISMA) 指南对 PubMed、Embase 和 Cochrane 图书馆进行了检索。报告了单次 TULSA 治疗后至少一项功效、功能或安全性结果的研究被纳入其中。对免于挽救治疗和效力保留与计划消融体积的关系进行了建模。 <b><i>结果：</i></b> 10 项研究对 224 名患者进行了长达 5 年的随访，主要针对原发性局限性前列腺癌 (PCa) 以及较小规模的复发性 PCa 和局部晚期 PCa (LAPC) 患者。前列腺特异性抗原从基线到 2 年的下降（包括局灶性到全腺体消融计划）为 54% 至 97%。一次 TULSA 治疗原发性 PCa 后的挽救治疗率为 7% 至 17%。自制力和效力保留分别为 92% 至 100% 和 75% 至 98%。基线时排尿功能良好的男性的泌尿症状稳定，同时患有前列腺癌和下尿路症状的男性中有 85% 符合改善标准。在一小群患有 LAPC 的男性中观察到症状缓解。 13/224 名男性 (6%) 发生了 III 级不良事件，没有直肠损伤/瘘管或 IV 级并发症。计划消融分数与无挽救生存率线性相关。效力保留与计划消融分数之间的关系遵循 S 形曲线。 <b><i>结论：</i></b>作为传统治疗的替代方案，TULSA 对于原发性 PCa 男性的前列腺组织消融是安全有效的。还有证据表明，TULSA 可有效缓解泌尿系统症状，同时通过单一、低发病率的手术治疗 PCa。免于额外治疗或效力保留的可能性与计划的消融分数相关。", "keywords_zh": "MRI引导治疗、微创治疗、前列腺癌、系统评价、经尿道MRI引导超声消融", "keywords_en": "MRI-guided therapy, minimally invasive therapy, prostate cancer, systematic review, transurethral MRI-guided ultrasound ablation", "link": "https://pubmed.ncbi.nlm.nih.gov/35029127/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Fri, 14 Jan 2022"}, {"id": "34920992", "title_en": "Ustekinumab is effective for perianal fistulising Crohn's disease: a real-world experience and systematic review with meta-analysis", "title_zh": "乌司奴单抗对肛周瘘管克罗恩病有效：真实世界经验和荟萃分析系统评价", "authors": "Alyssa M Parian", "abstract_en": "**Background:** Perianal Crohn's disease (pCD) is a debilitating complication affecting up to 30% of Crohn's disease (CD) population, leading to increased morbidity, mortality and decreased quality of life. Despite the growing armamentarium of medications for luminal CD, their efficacy in pCD remains poorly studied.\n\n**Aim:** To determine the efficacy of ustekinumab, a biologic approved for luminal CD, in pCD through a retrospective cohort study and systematic review.\n\n**Methods:** A retrospective cohort study on patients with CD with active perianal fistulae treated with ustekinumab from September 2013 to August 2019 was performed to determine perianal fistula response and remission at 6 and 12 months after ustekinumab induction. A systematic review was performed to further establish rates of fistula response and remission with ustekinumab.\n\n**Results:** At 6 months, 48.1% (13/27) patients achieved fistula response with none achieving fistula remission on provider exam, and 59.3% (16/27) achieved patient-reported symptomatic improvement with 3.7% (1/27) achieving symptomatic remission. At 1 year, on provider exam, 55.6% (5/9) had fistula response with none achieving fistula remission, and 100% (9/9) had symptomatic improvement with 22.2% (2/9) achieving symptomatic remission. There were no major safety signals during 1-year follow-up. The systematic review of 25 studies found 44% (92/209) of patients with active perianal fistulas had a clinical response within 6 months of follow-up, and 53.9% (85/152) of patients with 12 months of follow-up achieved clinical response.\n\n**Conclusion:** Ustekinumab presents a safe and effective therapy for treatment of pCD. Prospective, randomised trials are needed to further elucidate long-term efficacy of ustekinumab for pCD.", "abstract_zh": "**背景：** 肛周克罗恩病 (pCD) 是一种使人衰弱的并发症，影响多达 30% 的克罗恩病 (CD) 人群，导致发病率、死亡率增加和生活质量下降。尽管治疗 Luminal CD 的药物种类不断增加，但它们对 pCD 的疗效仍知之甚少。\n\n**Aim：** 通过回顾性队列研究和系统评价来确定优特克单抗（一种被批准用于腔内 CD 治疗的生物制剂）在 pCD 中的疗效。\n\n**方法：** 对 2013 年 9 月至 2019 年 8 月期间接受优特克单抗治疗的患有活动性肛周瘘的 CD 患者进行了一项回顾性队列研究，以确定优特克单抗诱导后 6 个月和 12 个月时肛周瘘的反应和缓解情况。进行了系统评价，以进一步确定乌司奴单抗的瘘管缓解率和缓解率。\n\n**结果：** 6 个月时，48.1% (13/27) 的患者实现了瘘管反应，但在提供者检查时没有实现瘘管缓解，59.3% (16/27) 的患者实现了患者报告的症状改善，其中 3.7% (1/27) 实现了症状缓解。 1 年时，在提供者检查中，55.6% (5/9) 的患者有瘘管反应，但没有人实现瘘管缓解，100% (9/9) 的患者症状改善，其中 22.2% (2/9) 的患者实现症状缓解。一年随访期间未出现重大安全信号。对25项研究的系统评价发现，44%（92/209）的活动性肛周瘘患者在随访6个月内获得临床缓解，53.9%（85/152）的患者在随访12个月内获得临床缓解。\n\n**结论：** Ustekinumab 为治疗 pCD 提供了一种安全有效的疗法。需要前瞻性随机试验来进一步阐明乌特克单抗治疗 pCD 的长期疗效。", "keywords_zh": "克罗恩结肠炎、肛门、胃肠道瘘、炎症性肠病", "keywords_en": "Crohn's colitis, anal, gastrointestinal fistulae, inflammatory bowel disease", "link": "https://pubmed.ncbi.nlm.nih.gov/34920992/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1PQPGz2gzLgNzuaNos66c7B3c89tbZUZXKYTEvBxn0Ttaa8QdR&fc=20260103012404&ff=20260303212815&v=2.19.0.post6+133c1fe", "date": "Sat, 18 Dec 2021"}], "痔疮": [{"id": "41741329", "title_en": "Comment on 'Worldwide prevalence of haemorrhoids: a systematic review and meta-analysis'", "title_zh": "对“全球痔疮患病率：系统回顾和荟萃分析”的评论", "authors": "Liangbin Wang", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41741329/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 25 Feb 2026"}, {"id": "41737205", "title_en": "Discordance between radiological and pathological response to neoadjuvant immunotherapy in mismatch repair-deficient/microsatellite instability-high colorectal cancer: a meta-analysis", "title_zh": "错配修复缺陷/微卫星不稳定性高结直肠癌新辅助免疫治疗放射学和病理学反应之间的不一致：一项荟萃分析", "authors": "Wu Jiang", "abstract_en": "**Background:** Mismatch repair deficiency (dMMR) and microsatellite instability (MSI-H) cancers exhibit high immunogenicity and are highly responsive to immune checkpoint inhibitors. In patients with locally advanced dMMR/MSI-H colorectal cancer (CRC), neoadjuvant immunotherapy (NIT) has demonstrated unprecedented pathological complete response (pCR) rates, suggesting nonoperative management strategies may be possible. There remains a discrepancy between radiological assessment and pathological responses to NIT in CRC.\n\n**Methods:** We conducted a systematic review and meta-analysis of studies published between February 2015 and February 2025 to determine if radiological and pathological assessments following neoadjuvant immune checkpoint inhibitor therapy (NIT) were consistent in patients with non-metastatic dMMR/MSI-H CRC. Using PubMed, Embase, and Web of Science, the literature was retrieved, with inclusion criteria focusing on studies that reported both imaging data and pathological results. A random-effects model was used to calculate pooled odds ratios (ORs) and 95% confidence intervals (CIs). Subgroup analyses were conducted based on tumor location (colon versus rectum) and type of response (cCR versus pCR).\n\n**Results:** In 12 studies, 396 patients were included. A total rate of 59.6% discordance was found between radiological and pathological responses. Compared to rectal cancer patients (34.9%), colon cancer patients exhibited a significantly higher rate of discordance (64.2%). A total of 238 patients with confirmed pCR were incorrectly diagnosed as having residual disease on radiological assessment (OR = 61.41; 95% CI: 10.05-375.27;P < 0.00001). A high level of heterogeneity was observed across studies (I2 = 85%), but no publication bias was observed.\n\n**Conclusion:** In dMMR/MSI-H CRC, radiologic assessment alone cannot reliably assess the efficacy of NIT, particularly in colon cancer. It should be integrated with additional modalities-such as endoscopic evaluation and biomarker analysis-to ensure an accurate appraisal of treatment efficacy.", "abstract_zh": "**背景：** 错配修复缺陷（dMMR）和微卫星不稳定性（MSI-H）癌症表现出高免疫原性，并对免疫检查点抑制剂高度敏感。在局部晚期 dMMR/MSI-H 结直肠癌 (CRC) 患者中，新辅助免疫治疗 (NIT) 表现出前所未有的病理完全缓解 (pCR) 率，表明非手术治疗策略可能是可行的。 CRC 中 NIT 的放射学评估和病理反应之间仍然存在差异。\n\n**方法：** 我们对 2015 年 2 月至 2025 年 2 月期间发表的研究进行了系统回顾和荟萃分析，以确定新辅助免疫检查点抑制剂治疗 (NIT) 后的放射学和病理学评估在非转移性 dMMR/MSI-H CRC 患者中是否一致。使用 PubMed、Embase 和 Web of Science 检索文献，纳入标准侧重于报告影像数据和病理结果的研究。使用随机效应模型来计算合并比值比 (OR) 和 95% 置信区间 (CI)。根据肿瘤位置（结肠与直肠）和反应类型（cCR 与 pCR）进行亚组分析。\n\n**结果：** 12 项研究纳入了 396 名患者。放射学和病理学反应之间的总不一致率为 59.6%。与直肠癌患者（34.9%）相比，结肠癌患者表现出明显更高的不一致率（64.2%）。共有 238 名确诊 pCR 的患者在放射学评估中被错误诊断为有残留病灶（OR = 61.41；95% CI：10.05-375.27；P < 0.00001）。各研究之间观察到高度异质性 (I2 = 85%)，但未观察到发表偏倚。\n\n**结论：** 在 dMMR/MSI-H CRC 中，仅放射学评估无法可靠评估 NIT 的疗效，特别是在结肠癌中。它应与其他模式（例如内窥镜评估和生物标志物分析）相结合，以确保准确评估治疗效果。", "keywords_zh": "dMMR/MSI-H结直肠癌，荟萃分析，高微卫星不稳定性，新辅助免疫治疗，放射学评估", "keywords_en": "dMMR/MSI-H colorectal cancer, meta-analysis, microsatellite instability-high, neoadjuvant immunotherapy, radiological assessment", "link": "https://pubmed.ncbi.nlm.nih.gov/41737205/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260303213506&v=2.19.0.post6+133c1fe", "date": "Wed, 25 Feb 2026"}, {"id": "41721863", "title_en": "Life outcomes of being born with anorectal malformation: a systematic review of intersectional reporting, mental health co-morbidities, and psychosocial experiences in adulthood", "title_zh": "出生时患有肛门直肠畸形的生活结果：对成年期交叉报告、心理健康共病和心理社会经历的系统回顾", "authors": "Paul Harris", "abstract_en": "**Purpose:** Anorectal malformations exist across a spectrum of abnormalities involving the rectum, distal anus, genital and urinary tracts, and occur in approximately one in 5,000 live births. The purpose of this study was to investigate intersectional reporting, mental health co-morbidities, and psychosocial experiences of adults born with anorectal malformation.\n\n**Methods:** A systematic quantitative literature review was utilized to collect and analyze data. Articles were required to discuss population demographics, mental health comorbidities, or psychosocial experiences associated with anorectal malformation in adulthood. A total of 94 articles were found suitable for review.\n\n**Results:** Patient ethnicity, culture, sexuality, and spirituality were significantly underrepresented. Mental health co-morbidities such as anxiety and depression were discussed but rarely transitioned to intervention. Psychological challenges included psychosexual anxiety and limited professional knowledge. Sociological challenges included navigating health services and social settings. Literature prioritized continence outcomes that diminished psychosocial complexities.\n\n**Conclusions:** The intersectionality, mental health concerns, and psychosocial experiences of adults born with anorectal malformation remain largely unknown. Allied health professionals such as social workers can improve ongoing support provision, with interventions that enhance psychosocial functioning and emotional wellbeing.", "abstract_zh": "**Purp
